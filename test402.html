  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    @font-face {
      font-family: "Umdot";
      src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/Umdot12.woff2")
        format("woff2");
      font-weight: normal;
      font-display: swap;
    }

    :root {
      --background: #f3dfe6;
      --paper: #fff4f6;
      --paper-light: #fff9fa;
      --paper-box: rgba(255, 255, 255, 0.36);

      --ink: #3f3035;
      --ink-soft: #765d66;

      --line: #a97c89;
      --line-light: #dfbdc7;

      --pink: #d94a77;
      --pink-dark: #b93662;
      --pencil-red: #d94362;
    }

    * {
      box-sizing: border-box;
    }

    html {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
    }

    body {
      width: 100%;
      min-height: 100vh;
      margin: 0;
      overflow-x: hidden;
      color: var(--ink);
      background:
        radial-gradient(
          circle at 15% 10%,
          rgba(255, 255, 255, 0.2) 0,
          rgba(255, 255, 255, 0.2) 1px,
          transparent 1.5px
        ),
        radial-gradient(
          circle at 80% 30%,
          rgba(130, 74, 91, 0.04) 0,
          rgba(130, 74, 91, 0.04) 1px,
          transparent 1.5px
        ),
        var(--background);
      background-size: 17px 19px, 23px 21px, auto;
      font-family: "Umdot", serif;
      font-weight: normal;
      word-break: keep-all;
    }

    button,
    input {
      font-family: "Umdot", serif;
      font-weight: normal;
    }

    button {
      -webkit-tap-highlight-color: transparent;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .hidden {
      display: none !important;
    }

    .site-header {
      width: 100%;
      border-bottom: 1px solid rgba(176, 105, 129, 0.38);
      background: rgba(255, 245, 248, 0.96);
    }

    .site-header-inner {
      width: 100%;
      max-width: 620px;
      min-height: 58px;
      margin: 0 auto;
      padding: 11px 15px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .site-logo {
      flex-shrink: 0;
      font-size: 23px;
      line-height: 1;
      letter-spacing: -0.7px;
      color: #443238;
      white-space: nowrap;
    }

    .site-nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 15px;
    }

    .site-nav a {
      font-size: 17px;
      color: #715761;
      white-space: nowrap;
    }

    .page-wrap {
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
      padding: 20px 12px 12px;
    }

    .paper {
      position: relative;
      width: 100%;
      padding: 25px 20px 24px;
      overflow: hidden;
      background:
        radial-gradient(
          circle at 20% 20%,
          rgba(255, 255, 255, 0.25) 0,
          rgba(255, 255, 255, 0.25) 1px,
          transparent 1.5px
        ),
        radial-gradient(
          circle at 77% 42%,
          rgba(111, 67, 80, 0.035) 0,
          rgba(111, 67, 80, 0.035) 1px,
          transparent 1.6px
        ),
        var(--paper);
      background-size: 19px 21px, 27px 25px, auto;
      border: 1px solid var(--line);
      box-shadow:
        7px 8px 0 rgba(111, 69, 82, 0.11),
        inset 0 0 30px rgba(147, 83, 103, 0.025);
    }

    .paper::before {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      left: 11px;
      width: 1px;
      background: rgba(219, 86, 123, 0.22);
      pointer-events: none;
    }

    .paper-content {
      position: relative;
      z-index: 1;
      width: 100%;
    }

    .main-page {
      width: 100%;
      padding: 0;
      overflow: hidden;
      border: 1px solid var(--line);
      background: var(--paper);
      box-shadow: 7px 8px 0 rgba(111, 69, 82, 0.11);
    }

    .main-cover-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .outside-main-action,
    .outside-info-action {
      width: 100%;
      margin-top: 14px;
    }

    .primary-button,
    .secondary-button,
    .answer-button {
      width: 100%;
      border-radius: 0;
      outline: none;
      cursor: pointer;
    }

    .primary-button {
      min-height: 54px;
      padding: 13px 18px;
      border: 1px solid var(--pink-dark);
      background: var(--pink);
      color: #fffafb;
      font-size: 19px;
      box-shadow: 3px 4px 0 rgba(157, 52, 86, 0.15);
    }

    .primary-button:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 2px 0 rgba(157, 52, 86, 0.15);
    }

    .secondary-button {
      min-height: 50px;
      padding: 12px 15px;
      border: 1px solid #a9828e;
      background: rgba(255, 251, 252, 0.65);
      color: var(--ink);
      font-size: 18px;
    }

    .secondary-button:active,
    .answer-button:active {
      transform: translateY(1px);
    }

    .info-page {
      min-height: 0;
      padding-top: 27px;
      padding-bottom: 27px;
    }

    .info-screen {
      min-height: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .small-love-mark {
      position: relative;
      width: 76px;
      height: 60px;
      margin: 0 auto 12px;
    }

    .small-love-mark svg,
    .result-heart-wrap svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .heart-line {
      fill: none;
      stroke: var(--pink);
      stroke-width: 5.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .arrow-line {
      fill: none;
      stroke: var(--pink);
      stroke-width: 4.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .section-heading {
      margin: 0 0 6px;
      font-size: 23px;
      line-height: 1.45;
      letter-spacing: -0.6px;
      text-align: center;
    }

    .section-description {
      margin: 0 0 20px;
      color: var(--ink-soft);
      font-size: 15px;
      line-height: 1.65;
      text-align: center;
    }

    .student-card {
      width: 100%;
      margin: 0;
      padding: 16px 14px;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: var(--paper-box);
    }

    .student-row {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .student-label {
      flex-shrink: 0;
      font-size: 17px;
      color: #584149;
    }

    .nickname-input {
      width: 100%;
      height: 46px;
      padding: 7px 10px;
      border: none;
      border-bottom: 1px solid #a27b87;
      border-radius: 0;
      outline: none;
      background: transparent;
      color: var(--ink);
      font-size: 18px;
      text-align: center;
    }

    .nickname-input::placeholder {
      color: #b898a2;
    }

    .question-page {
      min-height: 0;
      padding-bottom: 20px;
    }

    .question-screen {
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .question-header {
      margin-bottom: 12px;
      padding-bottom: 11px;
      border-bottom: 1px solid var(--line);
    }

    .question-header-top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .question-test-name {
      font-size: 15px;
      color: #6d515b;
    }

    .question-count {
      font-size: 16px;
      color: #6d515b;
      white-space: nowrap;
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 13px;
      overflow: hidden;
      border: 1px solid #a47d89;
      background: rgba(255, 251, 252, 0.7);
    }

    .progress-fill {
      width: 10%;
      height: 100%;
      background: var(--pink);
      transition: width 0.25s ease;
    }

    .progress-hearts {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
      margin-top: 8px;
    }

    .progress-heart {
      min-width: 0;
      color: #c9a9b3;
      font-family: Arial, sans-serif;
      font-size: 13px;
      line-height: 1;
      text-align: center;
    }

    .progress-heart.completed {
      color: var(--pink);
    }

    .question-number {
      margin: 0 0 4px;
      font-size: 16px;
      color: #755963;
      text-align: center;
    }

    .question-text {
      min-height: 94px;
      margin: 0;
      padding: 7px 7px 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      font-size: 22px;
      line-height: 1.6;
      letter-spacing: -0.5px;
      text-align: center;
    }

    .answer-list {
      display: flex;
      flex-direction: column;
      gap: 9px;
      margin-top: 10px;
    }

    .answer-button {
      position: relative;
      min-height: 59px;
      padding: 12px 15px 12px 47px;
      border: 1px solid #a77f8b;
      background: rgba(255, 252, 253, 0.68);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.5;
      text-align: left;
    }

    .answer-button::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 16px;
      width: 17px;
      height: 17px;
      border: 1px solid #9f7682;
      background: rgba(255, 255, 255, 0.4);
      transform: translateY(-50%) rotate(-2deg);
    }

    .answer-button:hover {
      border-color: var(--pink);
      background: rgba(255, 243, 247, 0.95);
    }

    .result-page {
      min-height: 0;
      padding-top: 20px;
    }

    .result-capture {
      width: 100%;
      padding: 5px 1px 4px;
      background: var(--paper);
    }

    .result-top {
      text-align: center;
    }

    .result-heart-wrap {
      width: 65px;
      height: 51px;
      margin: 0 auto 7px;
    }

    .result-test-title {
      display: inline-block;
      margin: 0 auto 6px;
      padding-bottom: 5px;
      border-bottom: 2px solid rgba(150, 102, 118, 0.34);
      color: #49353c;
      font-size: 24px;
      line-height: 1.32;
      letter-spacing: -0.7px;
      text-align: center;
    }

    .result-sheet-label {
      margin: 0 0 20px;
      color: var(--ink-soft);
      font-size: 15px;
      text-align: center;
    }

    .result-card {
      width: 100%;
      padding: 20px 17px 18px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.3);
      text-align: center;
    }

    .result-name {
      margin-bottom: 8px;
      color: var(--ink-soft);
      font-size: 17px;
      text-align: center;
    }

    .result-type-wrap {
      position: relative;
      margin-bottom: 18px;
      padding: 3px 3px 15px;
      border-bottom: 1px solid var(--line-light);
      text-align: center;
    }

    .result-type {
      margin: 0;
      color: #3f2e34;
      font-size: 24px;
      line-height: 1.45;
      letter-spacing: -0.7px;
      text-align: center;
    }

    .result-type-underline {
      position: absolute;
      left: 50%;
      bottom: 8px;
      width: 48%;
      height: 3px;
      background: var(--pink);
      opacity: 0.88;
      transform: translateX(-50%) rotate(-1deg);
    }

    .result-axis-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 11px;
      margin-bottom: 20px;
    }

    .result-axis {
      min-height: 132px;
      padding: 13px 8px 11px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.35);
      text-align: center;
      overflow: hidden;
    }

    .result-axis-label {
      display: block;
      margin-bottom: 3px;
      color: var(--ink-soft);
      font-size: 15px;
      line-height: 1.4;
      text-align: center;
    }

    .result-axis-mark {
      position: relative;
      width: 100%;
      height: 78px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .result-axis-value {
      position: relative;
      z-index: 2;
      color: #45333a;
      font-size: 20px;
      line-height: 1.35;
      text-align: center;
      white-space: nowrap;
    }

    .score-pencil-circle {
      position: absolute;
      z-index: 1;
      top: 3px;
      right: 2px;
      bottom: 3px;
      left: 2px;
      width: calc(100% - 4px);
      height: calc(100% - 6px);
      display: block;
      overflow: visible;
      pointer-events: none;
    }

    .score-pencil-line {
      fill: none;
      stroke: var(--pencil-red);
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .score-pencil-line.main {
      stroke-width: 3.5;
      opacity: 0.94;
    }

    .score-pencil-line.second {
      stroke-width: 1.8;
      opacity: 0.48;
    }

    .score-pencil-line.light {
      stroke-width: 1.1;
      opacity: 0.24;
    }

    .feature-heading {
      display: table;
      margin: 0 auto 13px;
      padding: 0 3px 3px;
      border-bottom: 3px solid var(--pink);
      color: var(--pink-dark);
      font-size: 18px;
      line-height: 1.4;
      text-align: center;
    }

    .feature-list {
      margin: 0;
      padding: 0;
      list-style: none;
      text-align: center;
    }

    .feature-list li {
      margin: 0 0 10px;
      padding: 0;
      color: #503b43;
      font-size: 17px;
      line-height: 1.55;
      text-align: center;
    }

    .feature-list li:last-child {
      margin-bottom: 0;
    }

    .result-buttons {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 19px;
    }

    .result-buttons .primary-button,
    .result-buttons .secondary-button {
      width: 100%;
      max-width: none;
    }

    .ad-wrap {
      width: 100%;
      max-width: 350px;
      min-height: 140px;
      margin: 26px auto 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
    }

    .ad-wrap iframe,
    .ad-wrap > div {
      display: block;
      margin-right: auto !important;
      margin-left: auto !important;
    }

    .save-modal {
      position: fixed;
      z-index: 9999;
      inset: 0;
      padding: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(49, 31, 38, 0.72);
    }

    .save-modal-box {
      width: 100%;
      max-width: 420px;
      max-height: 92vh;
      padding: 16px;
      overflow-y: auto;
      border: 1px solid #a87d8a;
      background: var(--paper-light);
      box-shadow: 6px 7px 0 rgba(58, 37, 44, 0.2);
    }

    .save-modal-title {
      margin: 0 0 7px;
      font-size: 24px;
      line-height: 1.5;
      text-align: center;
    }

    .save-modal-description {
      margin: 0 0 13px;
      color: var(--ink-soft);
      font-size: 16px;
      line-height: 1.65;
      text-align: center;
    }

    .save-image-wrap {
      width: 100%;
      margin-bottom: 13px;
      padding: 6px;
      overflow: hidden;
      border: 1px solid #a77f8b;
      background: #fffafb;
    }

    .save-image-wrap img {
      display: block;
      width: 100%;
      height: auto;
      -webkit-touch-callout: default;
      user-select: auto;
    }

    .modal-close-button {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--pink-dark);
      border-radius: 0;
      background: var(--pink);
      color: #fffafb;
      font-size: 18px;
      cursor: pointer;
    }

    @media (max-width: 560px) {
      .site-header-inner {
        min-height: 56px;
        padding: 10px 12px;
      }

      .site-logo {
        font-size: 21px;
      }

      .site-nav {
        gap: 10px;
      }

      .site-nav a {
        font-size: 15px;
      }

      .page-wrap {
        padding: 14px 8px 8px;
      }

      .paper {
        padding: 21px 15px 20px;
        box-shadow: 4px 5px 0 rgba(111, 69, 82, 0.11);
      }

      .paper::before {
        left: 8px;
      }

      .main-page {
        padding: 0;
      }

      .info-page {
        min-height: 0;
        padding: 23px 15px;
      }

      .small-love-mark {
        width: 68px;
        height: 53px;
        margin-bottom: 10px;
      }

      .section-heading {
        font-size: 21px;
      }

      .section-description {
        margin-bottom: 18px;
        font-size: 14px;
      }

      .student-card {
        padding: 14px 11px;
      }

      .student-label {
        font-size: 16px;
      }

      .nickname-input {
        height: 43px;
        font-size: 17px;
      }

      .question-test-name {
        font-size: 14px;
      }

      .question-count,
      .question-number {
        font-size: 15px;
      }

      .question-text {
        min-height: 86px;
        padding: 6px 3px 9px;
        font-size: 19px;
        line-height: 1.6;
      }

      .answer-list {
        margin-top: 8px;
      }

      .answer-button {
        min-height: 57px;
        padding: 11px 10px 11px 43px;
        font-size: 15px;
      }

      .answer-button::before {
        left: 14px;
      }

      .result-heart-wrap {
        width: 60px;
        height: 47px;
      }

      .result-test-title {
        font-size: 20px;
      }

      .result-sheet-label {
        font-size: 14px;
      }

      .result-card {
        padding: 17px 13px 16px;
      }

      .result-name {
        font-size: 16px;
      }

      .result-type {
        font-size: 20px;
      }

      .result-axis-grid {
        gap: 8px;
      }

      .result-axis {
        min-height: 130px;
        padding: 12px 5px 10px;
      }

      .result-axis-label {
        font-size: 14px;
      }

      .result-axis-mark {
        height: 78px;
      }

      .result-axis-value {
        font-size: 17px;
      }

      .feature-heading {
        font-size: 17px;
      }

      .feature-list li {
        margin-bottom: 8px;
        font-size: 16px;
      }

      .ad-wrap {
        margin-top: 24px;
        margin-bottom: 38px;
      }
    }

    @media (max-width: 390px) {
      .site-logo {
        font-size: 20px;
      }

      .site-nav {
        gap: 8px;
      }

      .site-nav a {
        font-size: 14px;
      }

      .paper {
        padding-left: 13px;
        padding-right: 13px;
      }

      .main-page {
        padding: 0;
      }

      .question-text {
        font-size: 18px;
      }

      .answer-button {
        font-size: 14px;
      }

      .result-test-title,
      .result-type {
        font-size: 19px;
      }

      .result-axis {
        min-height: 128px;
        padding-left: 3px;
        padding-right: 3px;
      }

      .result-axis-value {
        font-size: 16px;
      }

      .feature-list li {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="site-header-inner">
      <a class="site-logo" href="https://test-it.co.kr/">테스트잇</a>

      <nav class="site-nav">
        <a href="https://test-it.co.kr/">성격</a>
        <a href="https://test-it.co.kr/">얼굴</a>
        <a href="https://test-it.co.kr/">그외</a>
        <a href="https://test-it.co.kr/">사주</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section id="mainPage" class="main-page">
      <img

        features: [
          "상대의 작은 변화도 속으로 오래 생각함",
          "서운해도 바로 표현하지 못하는 경우가 많음",

    };

    const mainPage = document.getElementById("mainPage");

    const resultPage = document.getElementById("resultPage");

    let nickname = "";

    let isAnswering = false;

    let scores = {
      stable: 0,
      anxious: 0,
      warm: 0,
      blunt: 0
    };

    function showPage(targetPage) {
      mainPage.classList.add("hidden");
      mainAction.classList.add("hidden");

      infoPage.classList.add("hidden");
      infoAction.classList.add("hidden");

      questionPage.classList.add("hidden");
      resultPage.classList.add("hidden");

      targetPage.classList.remove("hidden");

      if (targetPage === mainPage) {
        mainAction.classList.remove("hidden");
      }

      if (targetPage === infoPage) {
        infoAction.classList.remove("hidden");
      }

      window.scrollTo({
        top: 0,
        left: 0,
        behavior: "auto"
      });
    }

    function resetScores() {
      scores = {
        stable: 0,
        anxious: 0,
        warm: 0,
        blunt: 0
      };
    }

    function createProgressHearts() {
      progressHearts.innerHTML = "";

      questions.forEach(function (question, index) {
        const heart = document.createElement("span");

        heart.className = "progress-heart";
        heart.textContent = "♥";

        if (index <= currentQuestionIndex) {
          heart.classList.add("completed");
        }

        progressHearts.appendChild(heart);
      });
    }

    function updateProgress() {
      const currentNumber = currentQuestionIndex + 1;
      const progressPercent =
        (currentNumber / questions.length) * 100;

      questionCount.textContent =
        currentNumber + " / " + questions.length;

      progressFill.style.width = progressPercent + "%";

      createProgressHearts();
    }

    function renderQuestion() {
      isAnswering = false;

      const currentQuestion = questions[currentQuestionIndex];

      updateProgress();

      questionNumber.textContent =
        "문항 " + (currentQuestionIndex + 1);

      questionText.innerHTML = currentQuestion.question;
      answerList.innerHTML = "";

      currentQuestion.answers.forEach(function (answer) {
        const button = document.createElement("button");

        button.type = "button";
        button.className = "answer-button";
        button.innerHTML = answer.text;

        button.addEventListener("click", function () {
          selectAnswer(answer.score);
        });

        answerList.appendChild(button);
      });
    }

    function selectAnswer(scoreType) {
      if (isAnswering) {
        return;
      }

      isAnswering = true;

      if (!Object.prototype.hasOwnProperty.call(scores, scoreType)) {
        isAnswering = false;
        return;
      }

      scores[scoreType] += 1;
      currentQuestionIndex += 1;

      if (currentQuestionIndex < questions.length) {
        window.setTimeout(function () {
          renderQuestion();
        }, 120);

        return;
      }

      window.setTimeout(function () {
        showResult();
      }, 120);
    }

    function getResultKey() {
      const attachmentType =
        scores.stable > scores.anxious ? "stable" : "anxious";

      const expressionType =
        scores.warm > scores.blunt ? "warm" : "blunt";

      return attachmentType + "_" + expressionType;
    }

    function showResult() {
      const resultKey = getResultKey();
      const result = results[resultKey];

      resultName.textContent = nickname + "님의 결과";
      resultType.textContent = result.type;
      attachmentResult.textContent = result.attachment;
      expressionResult.textContent = result.expression;

      featureList.innerHTML = "";

      result.features.forEach(function (feature) {
        const listItem = document.createElement("li");

        listItem.textContent = feature;
        featureList.appendChild(listItem);
      });

      showPage(resultPage);
    }

      nickname = "";
      currentQuestionIndex = 0;
      isAnswering = false;

      nicknameInput.value = "";

      resetScores();

      saveImageWrap.innerHTML = "";
      saveModal.classList.add("hidden");

      showPage(mainPage);
    }

    async function waitForFonts() {
      if (!document.fonts) {
        return;
      }

      try {
        await Promise.all([
          document.fonts.load(
            'normal 24px "Umdot"',
            "테스트잇 러브어택 연애 테스트"
          ),
          document.fonts.ready
        ]);
      } catch (error) {
        console.warn(
          "폰트 로딩을 기다리는 중 문제가 발생했습니다.",
          error
        );
      }
    }

    async function makeResultImage() {
      const captureArea = document.getElementById("resultCaptureArea");

      saveButton.disabled = true;
      saveButton.textContent = "결과 이미지 만드는 중...";

      try {
        await waitForFonts();

        const canvas = await html2canvas(captureArea, {
          backgroundColor: "#fff4f6",
          scale: 2,
          useCORS: true,
          allowTaint: false,
          logging: false,
          imageTimeout: 15000,
          scrollX: 0,
          scrollY: 0,
          windowWidth: document.documentElement.clientWidth
        });

        const image = document.createElement("img");

        image.src = canvas.toDataURL("image/png");
        image.alt =
          nickname + "님의 러브어택 연애 테스트 결과";

        saveImageWrap.innerHTML = "";
        saveImageWrap.appendChild(image);

        saveModal.classList.remove("hidden");
      } catch (error) {
        console.error(error);

        alert(
          "결과 이미지를 만들지 못했어요. 다시 시도해 주세요."
        );
      } finally {
        saveButton.disabled = false;
        saveButton.textContent = "결과 이미지 저장하기";
      }
    }

    async function shareTest() {
      const shareData = {
        title: TEST_TITLE,
        text:
          "테스트잇 러브어택 연애 성격 테스트",
        url: TEST_URL
      };

      try {
        if (navigator.share) {
          await navigator.share(shareData);
          return;
        }

        if (navigator.clipboard) {
          await navigator.clipboard.writeText(TEST_URL);
          alert("테스트 링크가 복사되었어요.");
          return;
        }

        window.prompt("아래 링크를 복사해 주세요.", TEST_URL);
      } catch (error) {
        if (error && error.name !== "AbortError") {
          console.error(error);
        }
      }
    }

    mainStartButton.addEventListener("click", function () {
      showPage(infoPage);

      window.setTimeout(function () {
        nicknameInput.focus();
      }, 150);
    });

    questionStartButton.addEventListener("click", function () {
      const inputValue = nicknameInput.value.trim();

      if (!inputValue) {
        alert("이름이나 닉네임을 입력해 주세요.");
        nicknameInput.focus();
        return;
      }

      nickname = inputValue;
      currentQuestionIndex = 0;
      isAnswering = false;

      resetScores();
      renderQuestion();
      showPage(questionPage);
    });

    nicknameInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter") {
        questionStartButton.click();
      }
    });

    saveButton.addEventListener("click", makeResultImage);
    restartButton.addEventListener("click", resetTest);

    otherTestButton.addEventListener("click", function () {
      window.location.href = "https://test-it.co.kr/";
    });

    shareButton.addEventListener("click", shareTest);

    modalCloseButton.addEventListener("click", function () {
      saveModal.classList.add("hidden");
      saveImageWrap.innerHTML = "";
    });

    saveModal.addEventListener("click", function (event) {
      if (event.target === saveModal) {
        saveModal.classList.add("hidden");
        saveImageWrap.innerHTML = "";
      }
    });
  </script>
</body>
</html>
