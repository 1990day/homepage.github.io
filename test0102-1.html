<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>동심 테스트</title>

<style>
  * {
    box-sizing: border-box;
  }

  :root {
    --sky1: #dff6ff;
    --sky2: #eefcff;
    --mint: #cdf6ef;
    --yellow: #ffe889;
    --yellow-deep: #f5c94d;
    --pink: #ffd8ea;
    --pink-deep: #ee9fbc;
    --blue: #95dfff;
    --blue-deep: #62b9df;
    --lavender: #dcd6ff;
    --green: #dff7b5;
    --green-deep: #9fd16c;
    --line: #7ea3bf;
    --text: #58708b;
    --shadow: rgba(105, 150, 181, 0.18);
    --cream: #fffdf4;
    --white: rgba(255, 255, 255, 0.96);
  }

  html, body {
    margin: 0;
    min-height: 100%;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
    color: var(--text);
    overflow-x: hidden;
    background:
      linear-gradient(180deg, #dff6ff 0%, #eefcff 20%, #f7fffb 44%, #fffceb 72%, #efffcf 100%);
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      radial-gradient(circle at 10% 8%, rgba(255,255,255,0.95) 0 48px, transparent 49px),
      radial-gradient(circle at 18% 10%, rgba(255,255,255,0.95) 0 34px, transparent 35px),
      radial-gradient(circle at 78% 11%, rgba(255,255,255,0.92) 0 54px, transparent 55px),
      radial-gradient(circle at 87% 14%, rgba(255,255,255,0.92) 0 28px, transparent 29px),
      radial-gradient(circle at 73% 28%, rgba(255,245,193,0.95) 0 78px, transparent 79px),
      radial-gradient(circle at 8% 72%, rgba(255,233,244,0.85) 0 90px, transparent 91px),
      radial-gradient(circle at 87% 78%, rgba(201,248,255,0.9) 0 120px, transparent 121px);
    opacity: 0.95;
  }

  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    background:
      linear-gradient(rgba(255,255,255,0.06), rgba(255,255,255,0.06)),
      repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.06) 0px,
        rgba(255,255,255,0.06) 1px,
        transparent 1px,
        transparent 6px
      );
    mix-blend-mode: screen;
    opacity: 0.7;
  }

  .page-wrap {
    position: relative;
    z-index: 2;
    width: 100%;
    min-height: 100vh;
    padding: 24px 14px 38px;
  }

  .window {
    width: 100%;
    max-width: 470px;
    margin: 0 auto;
    position: relative;
    background: rgba(255,255,255,0.97);
    border: 3px solid var(--line);
    border-radius: 28px;
    overflow: hidden;
    box-shadow:
      0 16px 0 rgba(149, 189, 214, 0.35),
      0 30px 40px rgba(105, 150, 181, 0.16);
  }

  .window::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 88% 18%, rgba(255,223,126,0.28) 0 58px, transparent 59px),
      radial-gradient(circle at 14% 82%, rgba(207,255,190,0.32) 0 92px, transparent 93px),
      radial-gradient(circle at 80% 78%, rgba(255,211,233,0.24) 0 82px, transparent 83px);
    opacity: 0.95;
  }

  .folder-tab {
    position: absolute;
    top: -2px;
    left: 22px;
    width: 140px;
    height: 40px;
    border: 3px solid var(--line);
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    background: linear-gradient(180deg, #fff1a9 0%, #ffd96d 100%);
    box-shadow: inset 0 3px 0 rgba(255,255,255,0.55);
    z-index: 2;
  }

  .title-bar {
    position: relative;
    z-index: 3;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 16px 14px;
    border-bottom: 3px solid var(--line);
    background: linear-gradient(90deg, #a5e4ff 0%, #cbfff3 28%, #fff1a8 64%, #ffd7e7 100%);
  }

  .title-left {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .title-icon {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    border: 2px solid var(--line);
    background: linear-gradient(180deg, #fffdeb 0%, #ffe79a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.7);
    flex-shrink: 0;
  }

  .title-text {
    font-size: 15px;
    font-weight: 900;
    color: #3f5d78;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: -0.2px;
  }

  .window-controls {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .window-controls span {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 2px solid var(--line);
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.8);
  }

  .window-controls span:nth-child(1) {
    background: #ffd5de;
  }

  .window-controls span:nth-child(2) {
    background: #fff0a4;
  }

  .window-controls span:nth-child(3) {
    background: #caf5c8;
  }

  .content {
    position: relative;
    z-index: 2;
    padding: 22px 18px 24px;
    text-align: center;
  }

  .chip-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
  }

  .chip {
    padding: 7px 12px;
    border-radius: 999px;
    border: 2px solid #a7c2d7;
    font-size: 12px;
    font-weight: 800;
    color: #688097;
    box-shadow: 0 4px 0 rgba(191, 214, 231, 0.6);
  }

  .chip.sky {
    background: #e9f8ff;
  }

  .chip.yellow {
    background: #fff7c8;
  }

  .chip.pink {
    background: #ffe8f1;
  }

  .chip.green {
    background: #ebfadf;
  }

  .hero-scene {
    position: relative;
    width: 100%;
    max-width: 330px;
    height: 330px;
    margin: 0 auto 18px;
    border-radius: 34px;
    border: 3px solid #b6d0e3;
    background:
      linear-gradient(180deg, #ddf6ff 0%, #eefeff 44%, #f7ffe7 78%, #effac0 100%);
    overflow: hidden;
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,0.82),
      0 12px 24px rgba(148, 180, 203, 0.18);
  }

  .hero-scene .sky-cloud {
    position: absolute;
    background: rgba(255,255,255,0.95);
    border: 3px solid #b6d3e7;
    border-radius: 999px;
    height: 28px;
  }

  .hero-scene .sky-cloud::before,
  .hero-scene .sky-cloud::after {
    content: "";
    position: absolute;
    background: rgba(255,255,255,0.95);
    border: 3px solid #b6d3e7;
    border-radius: 50%;
  }

  .hero-scene .sky-cloud.c1 {
    width: 74px;
    top: 26px;
    left: 20px;
  }

  .hero-scene .sky-cloud.c1::before {
    width: 28px;
    height: 28px;
    left: 10px;
    top: -14px;
  }

  .hero-scene .sky-cloud.c1::after {
    width: 34px;
    height: 34px;
    right: 10px;
    top: -16px;
  }

  .hero-scene .sky-cloud.c2 {
    width: 86px;
    top: 48px;
    right: 24px;
  }

  .hero-scene .sky-cloud.c2::before {
    width: 34px;
    height: 34px;
    left: 8px;
    top: -17px;
  }

  .hero-scene .sky-cloud.c2::after {
    width: 30px;
    height: 30px;
    right: 10px;
    top: -14px;
  }

  .hero-scene .balloon {
    position: absolute;
    width: 22px;
    height: 28px;
    border-radius: 50% 50% 46% 46%;
    border: 2px solid #8faec8;
    background:
      linear-gradient(90deg, #ffd9ea 0 33%, #fff6b6 33% 66%, #d7f5ff 66% 100%);
  }

  .hero-scene .balloon::before {
    content: "";
    position: absolute;
    left: 8px;
    bottom: -8px;
    width: 4px;
    height: 7px;
    border-radius: 2px;
    background: #ffe493;
    border: 2px solid #8faec8;
  }

  .hero-scene .balloon::after {
    content: "";
    position: absolute;
    left: 9px;
    top: 26px;
    width: 1.5px;
    height: 16px;
    background: #9db6ca;
  }

  .hero-scene .balloon.b1 {
    top: 34px;
    left: 104px;
    transform: scale(1.15);
  }

  .hero-scene .balloon.b2 {
    top: 68px;
    left: 158px;
    transform: scale(0.86);
  }

  .hero-scene .balloon.b3 {
    top: 54px;
    right: 74px;
    transform: scale(0.96);
  }

  .hill {
    position: absolute;
    bottom: 70px;
    width: 170px;
    height: 120px;
    background: #b9ef8a;
    border: 3px solid #8fc36d;
    border-radius: 100px 100px 0 0;
  }

  .hill.left {
    left: -18px;
  }

  .hill.right {
    right: -24px;
    background: #d3f4a8;
  }

  .ferris {
    position: absolute;
    left: 50%;
    top: 96px;
    width: 212px;
    height: 212px;
    transform: translateX(-50%);
  }

  .ferris .wheel {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 6px solid #79d2f4;
    background: radial-gradient(circle at center, rgba(255,255,255,0.18) 0 56%, transparent 57%);
  }

  .ferris .inner {
    position: absolute;
    left: 34px;
    top: 34px;
    width: 144px;
    height: 144px;
    border-radius: 50%;
    border: 6px solid #f594c2;
  }

  .ferris .hub {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    transform: translate(-50%, -50%);
    background: #ff8fc2;
    border: 4px solid #d46a99;
    color: white;
    font-size: 14px;
    font-weight: 900;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .ferris .spoke {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 6px;
    height: 104px;
    transform-origin: center top;
    background: linear-gradient(180deg, #ffd965 0%, #f39cc5 100%);
    border-radius: 999px;
    margin-left: -3px;
    margin-top: -4px;
  }

  .ferris .s1 { transform: rotate(0deg); }
  .ferris .s2 { transform: rotate(45deg); }
  .ferris .s3 { transform: rotate(90deg); }
  .ferris .s4 { transform: rotate(135deg); }
  .ferris .s5 { transform: rotate(180deg); }
  .ferris .s6 { transform: rotate(225deg); }
  .ferris .s7 { transform: rotate(270deg); }
  .ferris .s8 { transform: rotate(315deg); }

  .ferris .leg {
    position: absolute;
    bottom: -6px;
    width: 6px;
    height: 106px;
    border-radius: 999px;
    background: #72c4ea;
  }

  .ferris .leg.l1 {
    left: 82px;
    transform: rotate(18deg);
    transform-origin: bottom center;
  }

  .ferris .leg.l2 {
    right: 82px;
    transform: rotate(-18deg);
    transform-origin: bottom center;
  }

  .ferris .base {
    position: absolute;
    bottom: -4px;
    left: 62px;
    width: 88px;
    height: 16px;
    border-radius: 999px;
    background: #d8f4ff;
    border: 3px solid #8cbad3;
  }

  .cabin {
    position: absolute;
    width: 42px;
    height: 38px;
    border-radius: 50% 50% 45% 45%;
    border: 3px solid #8cb7cf;
    background: linear-gradient(180deg, #ffffff 0 35%, #dff6ff 35% 100%);
  }

  .cabin::before {
    content: "";
    position: absolute;
    left: 9px;
    top: 7px;
    width: 20px;
    height: 10px;
    border-radius: 10px 10px 2px 2px;
    border: 2px solid #9cb8cb;
    background: #eefaff;
  }

  .cabin::after {
    content: "";
    position: absolute;
    left: 18px;
    top: -10px;
    width: 4px;
    height: 10px;
    border-radius: 999px;
    background: #ffd75f;
    border: 2px solid #8fb7ce;
  }

  .cabin.c1 { top: -8px; left: 85px; background: linear-gradient(180deg, #ffffff 0 35%, #e4ebff 35% 100%); }
  .cabin.c2 { top: 18px; right: 10px; background: linear-gradient(180deg, #ffffff 0 35%, #fff6b9 35% 100%); }
  .cabin.c3 { right: -2px; top: 86px; background: linear-gradient(180deg, #ffffff 0 35%, #ffe1ec 35% 100%); }
  .cabin.c4 { bottom: 18px; right: 24px; background: linear-gradient(180deg, #ffffff 0 35%, #dff2ff 35% 100%); }
  .cabin.c5 { bottom: -8px; left: 85px; background: linear-gradient(180deg, #ffffff 0 35%, #e2f8ff 35% 100%); }
  .cabin.c6 { bottom: 18px; left: 24px; background: linear-gradient(180deg, #ffffff 0 35%, #fff2b8 35% 100%); }
  .cabin.c7 { left: -2px; top: 86px; background: linear-gradient(180deg, #ffffff 0 35%, #dbf1ff 35% 100%); }
  .cabin.c8 { top: 18px; left: 10px; background: linear-gradient(180deg, #ffffff 0 35%, #ffe9f0 35% 100%); }

  .carousel {
    position: absolute;
    right: 16px;
    bottom: 42px;
    width: 86px;
    height: 92px;
  }

  .carousel .top {
    position: absolute;
    left: 8px;
    top: 0;
    width: 70px;
    height: 30px;
    background: linear-gradient(90deg, #ffd95f 0 33%, #ffeaa8 33% 66%, #ffc7dc 66% 100%);
    border: 3px solid #d39db3;
    border-bottom: none;
    clip-path: polygon(50% 0, 100% 100%, 0 100%);
  }

  .carousel .roof-ball {
    position: absolute;
    top: -8px;
    left: 38px;
    width: 12px;
    height: 12px;
    border-radius: 50%;
    background: #fff0a1;
    border: 2px solid #8db2c8;
  }

  .carousel .body {
    position: absolute;
    bottom: 0;
    left: 2px;
    width: 82px;
    height: 60px;
    border-radius: 14px 14px 20px 20px;
    border: 3px solid #8cb5cd;
    background: linear-gradient(90deg, #ffd9e8 0 25%, #fff2b9 25% 50%, #ffd9e8 50% 75%, #fff2b9 75% 100%);
  }

  .carousel .pole {
    position: absolute;
    bottom: 0;
    width: 4px;
    height: 56px;
    background: #7dcff0;
    border-radius: 999px;
  }

  .carousel .p1 { left: 14px; }
  .carousel .p2 { left: 38px; }
  .carousel .p3 { right: 14px; }

  .ticket-house {
    position: absolute;
    left: 8px;
    bottom: 46px;
    width: 78px;
    height: 88px;
  }

  .ticket-house .roof {
    position: absolute;
    left: 0;
    top: 0;
    width: 78px;
    height: 26px;
    border-radius: 16px 16px 0 0;
    border: 3px solid #d499b2;
    background: linear-gradient(90deg, #fff2a7 0%, #ffd8e6 100%);
  }

  .ticket-house .body {
    position: absolute;
    left: 4px;
    bottom: 0;
    width: 70px;
    height: 66px;
    border-radius: 0 0 16px 16px;
    border: 3px solid #8db7ce;
    background: linear-gradient(180deg, #ffddeb 0%, #ffd0e3 100%);
  }

  .ticket-house .window {
    position: absolute;
    left: 14px;
    top: 18px;
    width: 42px;
    height: 24px;
    border-radius: 8px;
    border: 3px solid #8cb8cf;
    background: #dff5ff;
    box-shadow: none;
  }

  .ticket-house .sign {
    position: absolute;
    left: 12px;
    top: 4px;
    width: 54px;
    font-size: 11px;
    font-weight: 900;
    color: #6b7c8f;
    letter-spacing: -0.2px;
    text-align: center;
  }

  .tree {
    position: absolute;
    width: 48px;
    height: 82px;
  }

  .tree::before {
    content: "";
    position: absolute;
    left: 8px;
    bottom: 10px;
    width: 32px;
    height: 44px;
    border-radius: 22px 22px 18px 18px;
    border: 3px solid #8ec06c;
    background: #aff08a;
  }

  .tree::after {
    content: "";
    position: absolute;
    left: 20px;
    bottom: 0;
    width: 8px;
    height: 22px;
    border-radius: 999px;
    background: #d7b58f;
    border: 2px solid #b88f64;
  }

  .tree.t1 {
    left: 84px;
    bottom: 46px;
  }

  .tree.t2 {
    left: 118px;
    bottom: 58px;
    transform: scale(0.8);
  }

  .path {
    position: absolute;
    left: 50%;
    bottom: 0;
    width: 112px;
    height: 140px;
    transform: translateX(-50%);
    background: linear-gradient(180deg, rgba(255,255,255,0) 0%, #f1efea 34%, #e9e6df 100%);
    clip-path: polygon(42% 0, 58% 0, 100% 100%, 0 100%);
  }

  .dot-flower {
    position: absolute;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff0a8;
    border: 2px solid #e4bf61;
    box-shadow:
      -8px 0 0 -1px #ffd5e7,
      8px 0 0 -1px #d7f4ff,
      0 -8px 0 -1px #e4f8c7,
      0 8px 0 -1px #ffe6b3;
  }

  .dot-flower.f1 { left: 110px; bottom: 26px; transform: scale(0.9); }
  .dot-flower.f2 { right: 86px; bottom: 20px; transform: scale(1.05); }
  .dot-flower.f3 { left: 42px; bottom: 26px; transform: scale(0.75); }

  .title-main {
    margin: 0 0 10px;
    font-size: 31px;
    line-height: 1.26;
    font-weight: 900;
    letter-spacing: -0.9px;
    color: #4b6985;
  }

  .title-sub {
    margin: 0 0 18px;
    font-size: 15px;
    line-height: 1.7;
    color: #6d8296;
    font-weight: 700;
  }

  .info-card {
    margin-bottom: 18px;
    padding: 14px;
    border-radius: 20px;
    border: 2px solid #e2d6a8;
    background: linear-gradient(180deg, #fffdf3 0%, #fff6d7 100%);
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.65);
  }

  .info-card p {
    margin: 0;
    font-size: 13px;
    line-height: 1.75;
    color: #7f7150;
    font-weight: 800;
  }

  .btn {
    width: 100%;
    border: 0;
    border-radius: 20px;
    padding: 16px 14px;
    font-size: 17px;
    font-weight: 900;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    color: #506376;
  }

  .btn:hover {
    transform: translateY(-1px);
  }

  .btn:active {
    transform: translateY(2px);
  }

  .start-btn {
    background: linear-gradient(180deg, #ffe88f 0%, #ffd75f 100%);
    border: 3px solid #d9b04a;
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,0.56),
      0 8px 0 #efc75c;
  }

  .retry-btn {
    background: linear-gradient(180deg, #d9f4ff 0%, #b6e8ff 100%);
    border: 3px solid #8ebddd;
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,0.68),
      0 8px 0 #9bcde8;
  }

  .progress-wrap {
    position: relative;
    z-index: 2;
    padding: 16px 16px 0;
  }

  .progress-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 10px;
    font-size: 13px;
    color: #688096;
    font-weight: 900;
  }

  .progress {
    width: 100%;
    height: 22px;
    padding: 3px;
    border-radius: 999px;
    border: 3px solid #b0cadf;
    background: #edf8ff;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.75);
    overflow: hidden;
  }

  .progress-bar {
    width: 0%;
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, #ffbfd7 0%, #ffe78d 30%, #b8efff 64%, #cef4b1 100%);
    transition: width 0.3s ease;
  }

  .question-scene {
    position: relative;
    margin-bottom: 16px;
    height: 126px;
    border-radius: 24px;
    border: 3px solid #c7dcec;
    background: linear-gradient(180deg, #e3f8ff 0%, #f7fffd 48%, #f7ffe4 100%);
    overflow: hidden;
    box-shadow:
      inset 0 3px 0 rgba(255,255,255,0.82),
      0 10px 18px rgba(170, 196, 214, 0.15);
  }

  .question-scene .mini-cloud {
    position: absolute;
    height: 18px;
    border-radius: 999px;
    border: 2px solid #bed8eb;
    background: rgba(255,255,255,0.95);
  }

  .question-scene .mini-cloud::before,
  .question-scene .mini-cloud::after {
    content: "";
    position: absolute;
    border-radius: 50%;
    border: 2px solid #bed8eb;
    background: rgba(255,255,255,0.95);
  }

  .question-scene .mini-cloud.m1 {
    width: 50px;
    top: 18px;
    left: 18px;
  }

  .question-scene .mini-cloud.m1::before {
    width: 18px;
    height: 18px;
    top: -10px;
    left: 8px;
  }

  .question-scene .mini-cloud.m1::after {
    width: 20px;
    height: 20px;
    top: -11px;
    right: 8px;
  }

  .question-scene .mini-cloud.m2 {
    width: 58px;
    top: 26px;
    right: 20px;
  }

  .question-scene .mini-cloud.m2::before {
    width: 20px;
    height: 20px;
    top: -10px;
    left: 8px;
  }

  .question-scene .mini-cloud.m2::after {
    width: 22px;

<script>
  const questions = [
    "나는 아직도 부를 수 있는 만화 주제가가 있다.",
    "가끔 문방구 앞에 멈춘다.",
    "하늘을 보면 예쁜 모양의 구름을 찾는다.",
    "놀이공원에 가면 범퍼카 한 번은 타야한다.",
    "뽑기 기계 앞에서 승부욕이 생긴다.",
    "어릴 때 별명을 아직 기억한다.",
    "남 모르게 횡단보도 하얀색 선만 밟을 때가 있다.",
    "내가 만화의 주인공이라고 상상할 때가 있다.",
    "우리 집에 왜 왔니 가사가 자동 재생된다.",
    "종이를 보면 비행기 한 번은 접어본다.",
    "음식 먹을 때 제일 맛있는 건 마지막에 먹는다.",
    "나는 아직도 학교 앞에서 먹던 컵 떡볶이가 생각난다.",
    "눈이 오면 첫 발자국을 찍고 싶어진다.",
    "놀이터를 지나가면 한 번쯤 그네가 타고 싶어진다.",
    "종 치는 소리를 들으면 괜히 반응한다.",
    "비밀 얘기할 때 괜히 목소리가 더 작아진다.",
    "버튼을 보면 누르고 싶다.",
    "누군가 내 이름을 불러주면 괜히 반갑다.",
    "나는 아직도 어릴 때 만들었던 이메일을 사용한다.",
    "포장지를 뜯기 전에 괜히 한번 흔들어본다."
  ];

  let currentIndex = 0;
  let score = 0;

  const startScreen = document.getElementById("startScreen");
  const testScreen = document.getElementById("testScreen");
  const resultScreen = document.getElementById("resultScreen");

  const progressBar = document.getElementById("progressBar");
  const progressText = document.getElementById("progressText");
  const questionBadge = document.getElementById("questionBadge");
  const questionText = document.getElementById("questionText");
  const resultBox = document.getElementById("resultBox");

  function startTest() {
    startScreen.classList.add("hidden");
    resultScreen.classList.add("hidden");
    testScreen.classList.remove("hidden");
    currentIndex = 0;
    score = 0;
    renderQuestion();
  }

  function renderQuestion() {
    questionText.textContent = questions[currentIndex];
    questionBadge.textContent = "QUESTION " + (currentIndex + 1);
    progressText.textContent = (currentIndex + 1) + " / " + questions.length;
    progressBar.style.width = (((currentIndex + 1) / questions.length) * 100) + "%";
  }

  function selectAnswer(isYes) {
    if (isYes) {
      score += 1;
    }

    currentIndex += 1;

    if (currentIndex < questions.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    testScreen.classList.add("hidden");
    resultScreen.classList.remove("hidden");

    let emoji = "";
    let title = "";
    let desc = "";
    let musicText = "";

    if (score >= 15) {
      emoji = "🎡";
      title = "전체 관람가";
      desc = "당신의 마음속에는 아직도 환한 유원지가 크게 남아 있습니다.<br>작고 귀여운 장면에도 쉽게 반응하고,<br>추억 버튼이 눌리면 표정부터 먼저 밝아지는 타입입니다.<br>지금도 마음 한켠에 놀이공원 입장권이 남아있는 사람이에요.";
      musicText = "동심 지수가 아주 높습니다. 좋아했던 노래나 추억의 장소를 다시 만나면 기분이 금방 더 환해질 타입입니다.";
    } else if (score >= 12) {
      emoji = "🎠";
      title = "12세 관람가";
      desc = "당신은 어른이 되었어도 마음이 꽤 말랑한 편입니다.<br>평소에는 차분해 보여도 추억이 스치면 금방 반응하고,<br>귀엽고 반짝이는 장면을 그냥 지나치지 못하는 타입입니다.<br>동심이 아주 자연스럽게 아직 남아 있어요.";
      musicText = "지금도 충분히 따뜻한 편입니다. 봄날 산책이나 놀이공원 같은 공간에서 동심이 더 또렷하게 살아납니다.";
    } else if (score >= 10) {
      emoji = "🎟️";
      title = "15세 관람가";
      desc = "당신의 동심은 사라진 게 아니라 잠시 조용히 쉬고 있는 상태입니다.<br>평소에는 현실 모드가 더 앞서지만,<br>좋아했던 장면이나 냄새, 노래를 만나면 금방 다시 깨어날 수 있습니다.<br>의외로 추억에 약한 마음을 가진 타입이에요.";
      musicText = "추억 복원력이 있는 편입니다. 너무 바쁜 일상만 아니면 어린 마음이 생각보다 빨리 돌아옵니다.";
    } else {
      emoji = "🌤️";
      title = "어른 주의";
      desc = "지금의 당신은 현실 감각이 꽤 또렷하게 켜져 있는 상태입니다.<br>그래도 동심이 완전히 없어진 건 아닙니다.<br>마음이 쉬는 시간만 생기면, 좋아했던 장면과 소리에 다시 반응할 수 있어요.<br>조금만 여유가 생기면 다시 밝아질 타입입니다.";
      musicText = "요즘 꽤 바빴던 것에 가깝습니다. 가벼운 산책, 놀이공원 풍경, 추억의 노래가 마음을 다시 풀어줄 수 있습니다.";
    }

    resultBox.innerHTML = `
      <div class="result-scene">
        <div class="result-cloud rc1"></div>
        <div class="result-cloud rc2"></div>
        <div class="result-balloon rb1"></div>
        <div class="result-balloon rb2"></div>

        <div class="result-emoji">${emoji}</div>
        <h2 class="result-title">${title}</h2>
        <div class="score-badge">동심 점수 ${score} / ${questions.length}</div>
        <p class="result-desc">${desc}</p>

        <div class="music-card">
          <div class="music-label">GUIDE</div>
          <div class="music-text">${musicText}</div>
        </div>
      </div>

      <div class="result-actions">
        <button class="btn retry-btn" onclick="restartTest()">다시 해보기</button>
      </div>
    `;
  }

  function restartTest() {
    currentIndex = 0;
    score = 0;
    resultScreen.classList.add("hidden");
    startScreen.classList.remove("hidden");
    progressBar.style.width = "0%";
    progressText.textContent = "1 / " + questions.length;
  }
</script>
</body>
</html>
