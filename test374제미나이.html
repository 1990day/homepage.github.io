<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>테스트잇 만우절 성격 테스트</title>

  <meta name="description" content="테스트잇 만우절 성격 테스트" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="테스트잇 만우절 성격 테스트" />
  <meta property="og:description" content="테스트잇 만우절 성격 테스트" />
  <meta property="og:image" content="main_hero.png" />
  <meta property="og:url" content="https://test-it.co.kr/test374" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      --bg-color: #f0f0f0; 
      --win-bg: #dfdfdf; 
      --win-border-light: #ffffff;
      --win-border-dark: #848484;
      --title-bar: #f4c2c2; 
      --box-bg: #ffffff;
      --text-main: #333333;
      --text-sub: #666666;
      --accent-pink: #d9788f; 
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "돋움", sans-serif;
      background: var(--bg-color);
      background-image: 
        linear-gradient(to right, #e8e8e8 1px, transparent 1px),
        linear-gradient(to bottom, #e8e8e8 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header-wrapper {
      width: 100%;
      background-color: var(--win-bg);
      border-bottom: 1px solid var(--win-border-dark);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 900px;
      margin: 0 auto;
      padding: 10px 20px; 
    }

    .retro-logo {
      text-decoration: none;
      color: var(--accent-pink);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .main-nav {
      display: flex;
      align-items: center;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 14px; 
    }

    .main-nav a {
      text-decoration: none;
      color: var(--text-sub);
      font-weight: 600;
      font-size: 13px;
    }

    .container {
      width: 100%;
      max-width: 600px; 
      margin: 30px auto 30px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
    }

    .window98 {
      width: 100%;
      background: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-bottom: 2px solid var(--win-border-dark);
      border-right: 2px solid var(--win-border-dark);
      display: flex;
      flex-direction: column;
    }

    .window-topbar {
      background: var(--title-bar);
      padding: 6px 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .window-title {
      color: var(--text-main);
      font-weight: 800;
      font-size: 14px;
    }

    .window-controls {
      display: flex;
      gap: 4px;
    }

    .win-btn {
      width: 20px;
      height: 20px;
      background: var(--win-bg);
      border-top: 1px solid var(--win-border-light);
      border-left: 1px solid var(--win-border-light);
      border-bottom: 1px solid var(--win-border-dark);
      border-right: 1px solid var(--win-border-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: bold;
      color: var(--text-main);
      cursor: pointer;
    }

    .win-btn:active {
      border-top: 1px solid var(--win-border-dark);
      border-left: 1px solid var(--win-border-dark);
      border-bottom: 1px solid var(--win-border-light);
      border-right: 1px solid var(--win-border-light);
      padding-top: 2px;
      padding-left: 2px;
    }

    .browser-bar {
      padding: 8px 10px;
      display: flex;
      align-items: center;
      background: var(--win-bg);
      border-bottom: 1px solid var(--win-border-dark);
    }

    .address-bar {
      flex: 1;
      height: 28px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      color: var(--text-sub);
      font-size: 12px;
      background: var(--box-bg);
      border-top: 2px solid var(--win-border-dark);
      border-left: 2px solid var(--win-border-dark);
      border-bottom: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-light);
    }

    .window-body {
      padding: 25px 20px 20px; 
      display: flex;
      flex-direction: column;
    }

    .screen {
      display: none;
      width: 100%;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    .start-content {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px 0;
    }

    .main-title {
      margin: 0 0 16px;
      font-size: 30px;
      line-height: 1.3;
      font-weight: 900;
      color: var(--text-main);
    }

    .sub-text {
      font-size: 15px;
      line-height: 1.5;
      color: var(--text-sub);
      margin-bottom: 30px;
    }

    .action-button {
      width: 100%;
      height: 56px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: var(--text-main);
      background: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-bottom: 2px solid var(--win-border-dark);
      border-right: 2px solid var(--win-border-dark);
      transition: all 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action-button:active {
      border-top: 2px solid var(--win-border-dark);
      border-left: 2px solid var(--win-border-dark);
      border-bottom: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-light);
      padding-top: 2px;
      padding-left: 2px;
    }

    .action-button.pink-btn {
      background: var(--title-bar);
    }

    .progress-wrap {
      margin-bottom: 25px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .progress-bar {
      width: 100%;
      height: 14px;
      background: var(--box-bg);
      border-top: 2px solid var(--win-border-dark);
      border-left: 2px solid var(--win-border-dark);
      border-bottom: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-light);
      padding: 1px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent-pink);
      transition: width 0.3s ease;
    }

    .question-box {
      margin-bottom: 30px;
      padding: 40px 15px;
      background: var(--box-bg);
      border-top: 2px solid var(--win-border-dark);
      border-left: 2px solid var(--win-border-dark);
      border-bottom: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-light);
      text-align: center;
    }

    .question-type {
      display: inline-block;
      font-size: 14px;
      font-weight: 900;
      color: var(--accent-pink);
      margin-bottom: 16px;
    }

    .question-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.4;
      font-weight: 800;
      color: var(--text-main);
      word-break: keep-all;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .alert-box {
      padding: 30px 15px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: var(--box-bg);
      border-top: 2px solid var(--win-border-dark);
      border-left: 2px solid var(--win-border-dark);
      border-bottom: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-light);
    }

    .result-type {
      font-size: 28px;
      font-weight: 900;
      color: var(--accent-pink);
      margin: 0 0 12px 0;
      letter-spacing: 1px;
    }

    .result-title {
      margin: 0 0 12px;
      font-size: 18px;
      color: var(--text-main);
      font-weight: 800;
    }

    .result-desc {
      margin: 0;
      font-size: 14px;
      line-height: 1.6;
      color: var(--text-sub);
      word-break: keep-all;
    }

    .traits-container {
      margin-bottom: 20px;
      background: var(--box-bg);
      border-top: 2px solid var(--win-border-dark);
      border-left: 2px solid var(--win-border-dark);
      border-bottom: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-light);
      padding: 20px 15px;
    }
    
    .traits-label {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 15px;
      color: var(--text-main);
      text-align: center;
    }

    .traits-listbox {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .trait-item {
      font-size: 13px;
      color: var(--text-main);
      background: var(--win-bg);
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #c0c0c0;
    }

    .reveal-box {
      text-align: center;
    }

    .reveal-small {
      font-size: 10px;
      color: #b0b0b0; 
      font-weight: 400;
    }

    .action-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 25px; 
    }

    .ad-container {
      width: 100%;
      max-width: 600px;
      margin: 0 auto 40px; 
      text-align: center;
    }

    .image-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .image-modal.active {
      display: flex;
    }

    .modal-guide {
      color: #fff;
      margin-bottom: 15px;
      font-size: 16px;
      font-weight: bold;
    }

    .modal-img-wrap {
      max-width: 85%;
      max-height: 75vh;
      overflow: auto;
    }

    .modal-img-wrap img {
      width: 100%;
      display: block;
    }

    .modal-close {
      margin-top: 20px;
      padding: 10px 30px;
      background: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-bottom: 2px solid var(--win-border-dark);
      border-right: 2px solid var(--win-border-dark);
      color: var(--text-main);
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header-wrapper">
    <header class="page-header wrapper">
      <a href="https://test-it.co.kr/" class="retro-logo">테스트잇</a>
      <nav>
        <ul class="main-nav">
          <li><a href="https://test-it.co.kr/test.html">성격</a></li>
          <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
          <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
          <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
        </ul>
      </nav>
    </header>
  </div>

  <main class="container">
    <section class="window98" id="capture-target">
      <div class="window-topbar">
        <div class="window-title">
          테스트잇 만우절 성격 테스트
        </div>
        <div class="window-controls">
          <span class="win-btn">_</span>
          <span class="win-btn">ㅁ</span>
          <span class="win-btn">X</span>
        </div>
      </div>

      <div class="browser-bar">
        <div class="address-bar">https://test-it.co.kr/april-mbti</div>
      </div>

      <div class="window-body">
        
        <div id="start-screen" class="screen active start-content">
          <h1 class="main-title">만우절<br>성격 테스트</h1>
          <p class="sub-text">
            평소처럼 편하게 고르면 됩니다.<br>
            마지막까지 봐야 진짜가 보입니다.
          </p>
          <button class="action-button pink-btn" onclick="startTest()">테스트 시작하기</button>
        </div>

        <div id="question-screen" class="screen">
          <div class="progress-wrap">
            <div class="progress-top">
              <span>진행률</span>
              <span id="progress-text">1 / 12</span>
            </div>
            <div class="progress-bar">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
          </div>

          <div class="question-box">
            <div class="question-type" id="question-type">Q1</div>
            <h2 class="question-title" id="question-title">질문 내용</h2>
          </div>

          <div class="choices">
            <button class="action-button" id="choice-a" onclick="selectAnswer(0)">A</button>
            <button class="action-button" id="choice-b" onclick="selectAnswer(1)">B</button>
          </div>
        </div>

        <div id="result-screen" class="screen">
          
          <div class="alert-box">
            <div class="result-type" id="fake-type">INFP</div>
            <h2 class="result-title" id="result-title">조용하지만 감정선이 깊은 타입</h2>
            <p class="result-desc" id="result-desc">설명 텍스트</p>
          </div>

          <div class="traits-container">
            <div class="traits-label">성격 특징</div>
            <div class="traits-listbox" id="trait-inline">
            </div>
          </div>

          <div class="reveal-box">
            <div class="reveal-small">
              사실 만우절 테스트라 정반대로 나온 겁니다! 실제 당신의 MBTI는 <span id="real-type-inline">ESTP</span>
            </div>
          </div>

          <div class="action-col" id="action-buttons">
            <button class="action-button pink-btn" onclick="saveAsImage()">결과 이미지 저장하기</button>
            <button class="action-button" onclick="restartTest()">다시 해보기</button>
            <button class="action-button" onclick="location.href='https://test-it.co.kr/test.html'">다른 테스트 해보기</button>
            <button class="action-button" onclick="copyResult()">테스트 공유하기</button>
          </div>

        </div>
      </div>
    </section>
  </main>

  <div class="ad-container" id="ad-container">
    <article class="coupang_ad mt-3">
        <script src="https://ads-partners.coupang.com/g.js"></script>
        <script>
            new PartnersCoupang.G({"id":798186,"template":"carousel","trackingCode":"AF4391881","width":"350","height":"140","tsource":""});
        </script>
    </article>
  </div>

  <div id="image-modal" class="image-modal">
    <div class="modal-guide">꾹 눌러서 이미지를 저장하세요!</div>
    <div class="modal-img-wrap">
      <img id="result-image" src="" alt="테스트 결과 이미지" />
    </div>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>

  <script>
    const questions = [
      { question: "오랜만에 쉬는 날이 생기면 더 끌리는 쪽은?", answers: [{ text: "사람 만나서 밖에서 시간을 보내는 편이다", type: "E" }, { text: "혼자 쉬면서 내 시간을 보내는 편이다", type: "I" }] },
      { question: "새로운 장소에 가면 먼저 보는 건?", answers: [{ text: "구조나 분위기처럼 바로 보이는 정보다", type: "S" }, { text: "여기서 어떤 일이 생길지 떠오르는 상상이다", type: "N" }] },
      { question: "친구가 고민을 말하면 먼저 드는 생각은?", answers: [{ text: "어디서부터 꼬였는지 정리해보고 싶다", type: "T" }, { text: "얼마나 힘들었을지가 먼저 느껴진다", type: "F" }] },
      { question: "여행 준비할 때 더 내 스타일은?", answers: [{ text: "일정을 어느 정도 정해두는 게 편하다", type: "J" }, { text: "가서 끌리는 대로 움직이는 게 좋다", type: "P" }] },
      { question: "여럿이 있는 자리에서 나는 보통?", answers: [{ text: "먼저 말 걸고 분위기를 여는 편이다", type: "E" }, { text: "상황을 보다가 자연스럽게 끼는 편이다", type: "I" }] },
      { question: "설명을 들을 때 더 잘 이해되는 방식은?", answers: [{ text: "예시와 순서가 분명한 설명", type: "S" }, { text: "의미와 흐름을 연결하는 설명", type: "N" }] },
      { question: "갈등 상황에서 더 중요하게 보는 것은?", answers: [{ text: "누가 봐도 납득되는 기준과 논리", type: "T" }, { text: "상대가 상처받지 않는 전달 방식", type: "F" }] },
      { question: "마감이 있는 일을 할 때 나는?", answers: [{ text: "미리 해두는 편이 마음이 편하다", type: "J" }, { text: "끝날 때쯤 몰입해서 처리하는 편이다", type: "P" }] },
      { question: "기분 전환이 필요할 때 더 가까운 쪽은?", answers: [{ text: "사람 만나거나 밖에 나가야 풀린다", type: "E" }, { text: "혼자 있어야 회복되는 편이다", type: "I" }] },
      { question: "무언가를 볼 때 더 먼저 잡히는 건?", answers: [{ text: "지금 보이는 사실과 디테일이다", type: "S" }, { text: "숨은 의미나 가능성이다", type: "N" }] },
      { question: "누군가 실수했을 때 내 반응은?", answers: [{ text: "왜 그런 실수가 났는지 원인을 본다", type: "T" }, { text: "일단 민망했겠다 싶은 마음이 먼저 든다", type: "F" }] },
      { question: "일상 루틴에 대한 내 태도는?", answers: [{ text: "흐름이 정해져 있어야 안정된다", type: "J" }, { text: "그날그날 다르게 움직이는 게 편하다", type: "P" }] }
    ];

    const resultData = {
      "INTJ": { title: "분석적이고 독립적인 전략가 타입", desc: "구조를 빠르게 파악하고 흔들림 없이 기준을 세워 움직입니다.", traits: ["혼자 생각 정리 중요", "기준이 분명한 편", "감정 소모 최소화", "큰 그림을 먼저 봄", "비효율을 못 참음", "속이 훨씬 치밀함", "판단이 빠른 편", "목표 중심 사고", "대충 넘어가는 거 싫음", "스스로 방향 잡음"] },

      "ESFP": { title: "밝고 친근하고 생기 있는 분위기형", desc: "지금 이 순간의 즐거움을 놓치지 않고 생기 있는 분위기를 만들어냅니다.", traits: ["표현 자연스럽고 친근", "현장 분위기 잘 녹아듦", "사람들과 있을 때 빛남", "즐거운 흐름 잘 만듦", "감정 표현 비교적 솔직", "답답한 분위기 잘 품", "지금 이 순간 즐김", "주변 분위기 밝게 함", "편하게 다가가는 매력", "생기 넘치는 텐션 강점"] }

    let currentQuestion = 0;
    const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    function startTest() {
      currentQuestion = 0;
      for (const key in scores) scores[key] = 0;
      showScreen("question-screen");
      renderQuestion();
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestion() {
      const q = questions[currentQuestion];
      const progress = ((currentQuestion + 1) / questions.length) * 100;

      document.getElementById("progress-text").textContent = `${currentQuestion + 1} / ${questions.length}`;
      document.getElementById("progress-fill").style.width = `${progress}%`;
      document.getElementById("question-type").textContent = `Q${currentQuestion + 1}`;
      document.getElementById("question-title").textContent = q.question;
      document.getElementById("choice-a").textContent = q.answers[0].text;
      document.getElementById("choice-b").textContent = q.answers[1].text;
    }

    function selectAnswer(index) {
      if (currentQuestion >= questions.length) return;
      const q = questions[currentQuestion];
      scores[q.answers[index].type] += 1;
      currentQuestion += 1;

      if (currentQuestion < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function calculateRealMBTI() {
      const ei = scores.E >= scores.I ? "E" : "I";
      const sn = scores.S >= scores.N ? "S" : "N";
      const tf = scores.T >= scores.F ? "T" : "F";
      const jp = scores.J >= scores.P ? "J" : "P";
      return `${ei}${sn}${tf}${jp}`;
    }

    function reverseMBTI(type) {
      const map = { E: "I", I: "E", S: "N", N: "S", T: "F", F: "T", J: "P", P: "J" };
      return type.split("").map(char => map[char]).join("");
    }

    function showResult() {
      const realType = calculateRealMBTI();
      const fakeType = reverseMBTI(realType);
      const fakeData = resultData[fakeType];

      document.getElementById("fake-type").textContent = fakeType;
      document.getElementById("result-title").textContent = fakeData.title;
      document.getElementById("result-desc").textContent = fakeData.desc;
      
      const traitsHTML = fakeData.traits.map(v => `<div class="trait-item">${v}</div>`).join("");
      document.getElementById("trait-inline").innerHTML = traitsHTML;
      
      document.getElementById("real-type-inline").textContent = realType;

      showScreen("result-screen");
    }

    function restartTest() {
      showScreen("start-screen");
    }

    function copyResult() {
      const realType = document.getElementById("real-type-inline").textContent;
      const text = `사실 만우절 테스트라 정반대로 나온 겁니다!\n실제 계산된 당신의 MBTI는 ${realType}`;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => alert("결과 문구가 복사됐어요"))
          .catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
      alert("결과 문구가 복사됐어요");
    }

    function saveAsImage() {
      const target = document.getElementById("capture-target");
      const actionCol = document.getElementById("action-buttons");
      const body = document.body;
      
      actionCol.style.display = "none";
      const originalBg = body.style.background;
      body.style.background = "#ffffff"; 
      
      html2canvas(target, {
        scale: 3, 
        backgroundColor: "#ffffff",
        useCORS: true
      }).then(canvas => {
        actionCol.style.display = "flex";
        body.style.background = originalBg;
        
        const imgData = canvas.toDataURL("image/png");
        document.getElementById("result-image").src = imgData;
        document.getElementById("image-modal").classList.add("active");
      });
    }

    function closeModal() {
      document.getElementById("image-modal").classList.remove("active");
    }
  </script>
