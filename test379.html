      position: absolute;

    }

      width: 8px;
      height: 2px;
      left: 4px;
      bottom: 4px;

      height: 6px;

      top: 4px;

      box-sizing: border-box;

    .ctrl.close::before,
    .ctrl.close::after {
      width: 10px;
      height: 2px;
      left: 3px;
      top: 8px;

          </script>
        </article>
      </div>
    </section>
  </div>

  <div id="captureModal" class="capture-modal" aria-hidden="true">
    <div class="capture-card">
      <div class="os-window" style="margin-bottom:0;">
        <div class="window-titlebar pink">
          <div class="title-left">
            <span class="window-icon"></span>
            <span class="window-title">Image Viewer</span>
          </div>
          <div class="window-controls">
            <span class="ctrl min"></span>
            <span class="ctrl max"></span>
            <span class="ctrl close"></span>
          </div>
        </div>

        <div class="capture-preview-body">
          <img id="capturePreviewImage" src="" alt="저장용 결과 이미지" />
        </div>

        <p class="save-guide">이미지를 꾹 누르면 저장할 수 있어요.</p>

        <div class="window-footer">
          <button id="closeModalBtn" class="action-btn" type="button" style="min-height:30px; width:110px; font-size:14px;">닫기</button>
        </div>
      </div>
    </div>
  </div>

  <script>
   const questions = [
      {
        a: { text: "사람 많은 자리는 재밌다<br>만나고 오면 오히려 기분이 올라간다", type: "E" },
        b: { text: "좋은 사람이어도 오래 있으면 기가 빠진다<br>혼자 쉬는 시간이 꼭 필요하다", type: "I" },
        question: "친구들과 약속이 생겼을 때<br>나는 어떤 쪽에 더 가깝나요?"
      },
      {
        a: { text: "정확한 뜻과 유래를 물어본다", type: "S" },
        b: { text: "대충 어떤 맥락의 느낌인지 때려 맞힘", type: "N" },
        question: "신조어를 들었을 때 나의 반응은 어떤가요?"
      },
      {
        a: { text: "혼자 생각할 시간 주려고 연락 안 함", type: "T" },
        b: { text: "걱정돼서 짧게라도 안부 문자를 보냄", type: "F" },
        question: "친구가 힘든 일을 겪고 잠적했다면?"
      },
      {
        a: { text: "필요한 품목을 리스트로 적어서<br>딱 그것만 구매함", type: "J" },
        b: { text: "품목을 적어서 가더라도<br>전부 구경하고 충동구매함", type: "P" },
        question: "대형 마트에 장 보러 갈 때 나는?"
      },
      {
        a: { text: "분위기 보고 먼저 말 걸면서 금방 친해진다", type: "E" },
        b: { text: "누가 먼저 말 걸어주면 편하다<br>천천히 적응하는 편이다", type: "I" },
        question: "처음 가는 모임에 도착했을 때 내 행동은?"
      },
      {
        a: { text: "상대방의 직업, 취미,<br>사는 곳 등 정보를 교환", type: "S" },
        b: { text: "대화가 잘 통하는지<br>결이 비슷한지 느낌 확인", type: "N" },
        question: "낯선 사람과 첫 대화를 나눌 때 나는?"
      },
      {
        a: { text: "내 능력을 입증하고 목표를 달성한 삶", type: "T" },
        b: { text: "사랑하는 사람들과 화목하게 지내는 삶", type: "F" },
        question: "내가 생각하는 성공한 인생이란?"
      },
      {
        a: { text: "정해진 요일이나 시간에 규칙적으로", type: "J" },
        b: { text: "바닥에 먼지가 눈에 띌 때쯤에나 함", type: "P" },
        question: "청소기를 돌리는 주기나 기준은?"
      },
      {
        a: { text: "일단 누군가에게 말하면서 정리한다", type: "E" },
        b: { text: "혼자 생각하고 마음이 정리된 뒤 말한다", type: "I" },
        question: "기분이 복잡할 때 나는 어떻게 정리하나요?"
      },
      {
        a: { text: "꽃의 색깔이 선명하고 예쁘다고 생각함", type: "S" },
        b: { text: "이 척박한 땅에서 피어난 생명력에 감탄함", type: "N" },
        question: "길가에 핀 이름 모를 꽃을 봤을 때 나는?"
      },
      {
        a: { text: "왜 친절한지 의도를 의심해 봄", type: "T" },
        b: { text: "세상은 아직 살만하다며 감동함", type: "F" },
        question: "낯선 사람이 나에게 친절을 베풀면?"
      },
      {
        a: { text: "그래서 플랜 B까지 짜야 한다고 생각", type: "J" },
        b: { text: "원래 그런 게 인생의 묘미라고 생각", type: "P" },
        question: "인생은 계획대로 되지 않는다<br>라는 말에 나는?"
      }
    ];

   
    const screens = {
      start: document.getElementById("startScreen"),
      quiz: document.getElementById("quizScreen"),
      result: document.getElementById("resultScreen")
    };

    const startBtn = document.getElementById("startBtn");
    const progressText = document.getElementById("progressText");
    const progressPercent = document.getElementById("progressPercent");
    const questionText = document.getElementById("questionText");
    const choiceAText = document.getElementById("choiceAText");
    const choiceBText = document.getElementById("choiceBText");
    const choiceA = document.getElementById("choiceA");
    const choiceB = document.getElementById("choiceB");

    const resultImage = document.getElementById("resultImage");
    const saveImageBtn = document.getElementById("saveImageBtn");
    const retryBtn = document.getElementById("retryBtn");
    const otherTestBtn = document.getElementById("otherTestBtn");
    const shareBtn = document.getElementById("shareBtn");

    const captureModal = document.getElementById("captureModal");
    const capturePreviewImage = document.getElementById("capturePreviewImage");
    const closeModalBtn = document.getElementById("closeModalBtn");

    let currentIndex = 0;
    let currentResultType = "ENFP";
    let scores = {
      E: 0,
      I: 0,
      S: 0,
      N: 0,
      T: 0,
      F: 0,
      J: 0,
      P: 0
    };

    function showScreen(name) {
      Object.values(screens).forEach((screen) => screen.classList.remove("active"));
      screens[name].classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function resetScores() {
      currentIndex = 0;
      scores = {
        E: 0,
        I: 0,
        S: 0,
        N: 0,
        T: 0,
        F: 0,
        J: 0,
        P: 0
      };
    }

    function updateProgress() {
      const currentNumber = currentIndex + 1;
      const percent = Math.round((currentNumber / questions.length) * 100);
      progressText.textContent = `QUESTION ${currentNumber} / ${questions.length}`;
      progressPercent.textContent = `${percent}%`;
    }

    function renderQuestion() {
      const q = questions[currentIndex];
      updateProgress();
    questionText.innerHTML = q.question;
choiceAText.innerHTML = q.a.text;
choiceBText.innerHTML = q.b.text;
    }

    function calculateMbti() {
      const ei = scores.E >= scores.I ? "E" : "I";
      const sn = scores.S >= scores.N ? "S" : "N";
      const tf = scores.T >= scores.F ? "T" : "F";
      const jp = scores.J >= scores.P ? "J" : "P";
      return `${ei}${sn}${tf}${jp}`;
    }

    function renderResult() {
      currentResultType = calculateMbti();
      const imageFileName = `img_${currentResultType.toLowerCase()}379.png`;
      resultImage.src = imageFileName;
      resultImage.alt = `${currentResultType} 결과 이미지`;
      capturePreviewImage.src = imageFileName;
      capturePreviewImage.alt = `${currentResultType} 저장용 결과 이미지`;
    }

    function handleAnswer(type) {
      scores[type] += 1;
      currentIndex += 1;

      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        renderResult();
        showScreen("result");
      }
    }

    startBtn.addEventListener("click", () => {
      resetScores();
      renderQuestion();
      showScreen("quiz");
    });

    choiceA.addEventListener("click", () => {
      handleAnswer(questions[currentIndex].a.type);
    });

    choiceB.addEventListener("click", () => {
      handleAnswer(questions[currentIndex].b.type);
    });

    retryBtn.addEventListener("click", () => {
      resetScores();
      showScreen("start");
    });

    otherTestBtn.addEventListener("click", () => {
      window.location.href = "https://test-it.co.kr/";
    });

function shareTest() {
  const url = "https://test-it.co.kr/test379";
  const shareText = `테스트잇 애착 키링 성격 테스트
${url}`;

  const shareData = {
    title: "테스트잇 애착 키링 성격 테스트",
    text: "테스트잇 애착 키링 성격 테스트",
    url: url
  };

  if (navigator.share) {
    navigator.share(shareData).catch(() => {
      navigator.clipboard.writeText(shareText).then(() => {
        alert("링크 복사 완료");
      }).catch(() => {
        prompt("아래 내용을 복사해 주세요.", shareText);
      });
    });
  } else {
    navigator.clipboard.writeText(shareText).then(() => {
      alert("링크 복사 완료");
    }).catch(() => {
      prompt("아래 내용을 복사해 주세요.", shareText);
    });
  }
}

    saveImageBtn.addEventListener("click", () => {
      capturePreviewImage.src = resultImage.src;
      captureModal.classList.add("show");
      captureModal.setAttribute("aria-hidden", "false");
    });

    closeModalBtn.addEventListener("click", () => {
      captureModal.classList.remove("show");
      captureModal.setAttribute("aria-hidden", "true");
    });

    captureModal.addEventListener("click", (e) => {
      if (e.target === captureModal) {
        captureModal.classList.remove("show");
        captureModal.setAttribute("aria-hidden", "true");
      }
    });

    window.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        captureModal.classList.remove("show");
        captureModal.setAttribute("aria-hidden", "true");
      }
    });
  </script>
</body>
</html>
