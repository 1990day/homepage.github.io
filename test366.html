let S = { idx: 0, scores: { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 } };

function startChat() {
    S.idx = 0;
    S.scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
    document.getElementById('main-screen').classList.add('hidden');
    document.getElementById('chat-screen').classList.remove('hidden');
    render();
}

function scrollToBottom() {
    const log = document.getElementById('chat-log');
    log.scrollTo({ top: log.scrollHeight, behavior: 'smooth' });
}

function render() {
    const data = QUESTIONS[S.idx];
    if (!data) return calculateResult();
    
    document.getElementById('gauge').style.width = ((S.idx + 1) / 12 * 100) + '%';
    
    addMsg('bot', data.q);
    
    const cArea = document.getElementById('choices');
    cArea.innerHTML = '';
    data.a.forEach((ans) => {
        const b = document.createElement('button');
        b.className = 'c-btn';
        b.innerText = ans.t;
        b.onclick = (e) => clickAns(ans, e);
        cArea.appendChild(b);
    });
    
    setTimeout(scrollToBottom, 50);
}

function clickAns(ans, event) {
    if (event) {
        const emoji = document.createElement('div');
        emoji.innerText = '✨';
        emoji.className = 'flying-emoji';
        emoji.style.left = (event.clientX - 15) + 'px';
        emoji.style.top = (event.clientY - 15) + 'px';
        document.body.appendChild(emoji);
        setTimeout(() => emoji.remove(), 800);
    }

    addMsg('user', ans.t);
    document.getElementById('choices').innerHTML = '';
    
    S.scores[ans.type]++;
    S.idx++;
    
    setTimeout(render, 800);
}

function addMsg(who, txt) {
    const log = document.getElementById('chat-log');
    
    const row = document.createElement('div');
    row.className = `msg-row ${who}-row`;
    
    if (who === 'bot') {
        const profile = document.createElement('div');
        profile.className = 'profile-pic';
        profile.innerText = '🐰';
        row.appendChild(profile);
    }
    
    const msg = document.createElement('div');
    msg.className = `msg ${who}`;
    msg.innerText = txt;
    row.appendChild(msg);
    
    log.appendChild(row);
    scrollToBottom();
}

function calculateResult() {
    document.getElementById('chat-screen').classList.add('hidden');
    document.getElementById('loading-screen').classList.remove('hidden');
    
    setTimeout(() => {
        document.getElementById('loading-screen').classList.add('hidden');
        showResult();
    }, 3000);
}

function showResult() {
    document.getElementById('result-screen').classList.remove('hidden');
    
    const bestMBTI = 
        (S.scores.E >= S.scores.I ? "E" : "I") +
        (S.scores.S >= S.scores.N ? "S" : "N") +
        (S.scores.T >= S.scores.F ? "T" : "F") +
        (S.scores.J >= S.scores.P ? "J" : "P");
        
    const worstMBTI = 
        (S.scores.E >= S.scores.I ? "I" : "E") +
        (S.scores.S >= S.scores.N ? "N" : "S") +
        (S.scores.T >= S.scores.F ? "F" : "T") +
        (S.scores.J >= S.scores.P ? "P" : "J");

    document.getElementById('best-mbti').innerText = BEST_MATCH[bestMBTI].title;
    document.getElementById('best-desc').innerText = BEST_MATCH[bestMBTI].desc;
    
    document.getElementById('worst-mbti').innerText = WORST_MATCH[worstMBTI].title;
    document.getElementById('worst-desc').innerText = WORST_MATCH[worstMBTI].desc;
    
    document.getElementById('final-mbti').innerText = bestMBTI + ' 상대와 매칭되었습니다 ❤️';
}

function saveImage() {
    const captureArea = document.getElementById('capture-area');
    html2canvas(captureArea, { scale: 2, backgroundColor: '#f0f4f7' }).then(canvas => {
        const link = document.createElement('a');
        link.download = '테스트잇_블라인드소개팅result.png';
        link.href = canvas.toDataURL("image/png");
        link.click();
    });
}

function shareTest() {
    if (navigator.share) {
        navigator.share({
            title: '테스트잇 블라인드 소개팅 테스트',
            text: '테스트잇 블라인드 소개팅 테스트\n',
            url: window.location.href
        }).catch(console.error);
    } else {
        alert('지원하지 않는 브라우저입니다. URL을 직접 복사해주세요!');
    }
}
