<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <title>테스트잇 사주 첫인상 성격 테스트</title>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo",sans-serif;color:#2f2b35;background:#eef0f6;min-height:100vh}
    a{color:inherit;text-decoration:none}
    button{font-family:inherit}
    .wrapper{width:min(560px,100%);margin:0 auto;padding:0 16px}
    .page-header{background:#eef0f6;border-bottom:1px solid rgba(255,255,255,.9);box-shadow:0 8px 18px rgba(178,182,197,.35)}
    .header-inner{height:60px;display:flex;align-items:center;justify-content:space-between}
    .logo-text{display:flex;align-items:center;justify-content:center;min-width:88px;height:34px;padding:0 13px;background:#ffe4ed;color:#2f2b35;font-size:17px;font-weight:950;letter-spacing:-.8px;border:1px solid #f5b8cb;box-shadow:5px 5px 12px rgba(184,188,202,.75),-5px -5px 12px rgba(255,255,255,.95)}
    .main-nav{display:flex;gap:7px;color:#6a6573;font-size:13px;font-weight:900}
    .main-nav a{height:32px;padding:0 9px;display:flex;align-items:center;justify-content:center;background:#eef0f6;border:1px solid rgba(255,255,255,.85);box-shadow:4px 4px 10px rgba(184,188,202,.72),-4px -4px 10px rgba(255,255,255,.95)}
    .screen{display:none;width:min(560px,100%);min-height:calc(100vh - 60px);margin:0 auto;padding:24px 14px 42px}
    .screen.active{display:block}
    .phone-page{padding:16px;background:#eef0f6;box-shadow:18px 18px 34px rgba(178,182,197,.9),-18px -18px 34px rgba(255,255,255,.95)}
    .phone-screen{padding:24px 14px 22px;background:#eef0f6;box-shadow:inset 8px 8px 16px rgba(178,182,197,.85),inset -8px -8px 16px rgba(255,255,255,.95)}
    .top-title{margin:0 0 16px;min-height:48px;padding:12px 14px;display:flex;align-items:center;justify-content:center;background:#ffe4ed;color:#2f2b35;font-size:17px;font-weight:950;text-align:center;letter-spacing:-.4px;border:1px solid #f5b8cb;box-shadow:7px 7px 15px rgba(178,182,197,.72),-7px -7px 15px rgba(255,255,255,.95)}
    .main-hero{min-height:420px;padding:34px 20px;display:flex;align-items:center;justify-content:center;text-align:center;background:#eef0f6;box-shadow:8px 8px 17px rgba(178,182,197,.78),-8px -8px 17px rgba(255,255,255,.96)}
    .main-title-card{width:100%;padding:34px 18px;background:#ffe4ed;border:1px solid #f5b8cb;box-shadow:inset 6px 6px 13px rgba(218,168,187,.28),inset -6px -6px 13px rgba(255,255,255,.82),8px 8px 17px rgba(178,182,197,.55)}
    .main-title-card h1{margin:0;color:#2f2b35;font-size:34px;line-height:1.28;font-weight:950;letter-spacing:-1.4px;word-break:keep-all}
    .start-btn,.next-btn{width:100%;height:58px;margin-top:18px;border:0;background:#ff8caf;color:#fff;font-size:16px;font-weight:950;cursor:pointer;box-shadow:8px 8px 16px rgba(190,137,157,.55),-8px -8px 16px rgba(255,255,255,.9)}
    .form-widget,.result-summary,.action-btn{background:#eef0f6;box-shadow:8px 8px 17px rgba(178,182,197,.78),-8px -8px 17px rgba(255,255,255,.96)}
    .form-widget{padding:22px 18px}
    .form-title{margin:0;text-align:center;color:#2f2b35;font-size:27px;font-weight:950;letter-spacing:-1px}
    .input-desc{margin:14px 0 20px;padding:14px;background:#ffe4ed;color:#6f6977;font-size:13px;line-height:1.55;font-weight:760;text-align:center;border:1px solid #f5b8cb;box-shadow:inset 5px 5px 10px rgba(178,182,197,.68),inset -5px -5px 10px rgba(255,255,255,.96)}
    .field{margin-bottom:16px}
    .field label{display:block;margin-bottom:8px;color:#4d4654;font-size:13px;font-weight:950}
    input,select{width:100%;height:52px;border:0;background:#eef0f6;color:#302a33;padding:0 14px;font-size:14px;font-weight:800;outline:none;box-shadow:inset 5px 5px 10px rgba(178,182,197,.72),inset -5px -5px 10px rgba(255,255,255,.95)}
    .select-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .result-layout{display:grid;gap:14px}
    .result-summary{padding:20px 16px;text-align:center;background:#ffe4ed;border:1px solid #f5b8cb}
    .result-name{margin:0;color:#2f2b35;font-size:25px;line-height:1.25;font-weight:950;letter-spacing:-1px;word-break:keep-all}
    .type-desc{margin:10px 0 0;color:#6f6977;font-size:13.5px;line-height:1.6;font-weight:760;word-break:keep-all}
    .result-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0;overflow:hidden;background:#d4d8e4;box-shadow:9px 9px 18px rgba(178,182,197,.78),-9px -9px 18px rgba(255,255,255,.96)}
    .result-widget{min-height:250px;padding:12px 9px 13px;box-shadow:inset 1px 1px 0 rgba(255,255,255,.92),inset -1px -1px 0 rgba(185,190,205,.9)}
    .result-widget:nth-child(1){background:#f5e8ee}
    .result-widget:nth-child(2){background:#e8edf8}
    .result-widget:nth-child(3){background:#e7f3ed}
    .result-widget:nth-child(4){background:#f7f0d8}
    .title-box{width:100%;min-height:36px;margin-bottom:11px;padding:7px 5px;background:#eef0f6;color:#2f2b35;font-size:14px;font-weight:950;letter-spacing:-.5px;display:flex;align-items:center;justify-content:center;text-align:center;box-shadow:5px 5px 11px rgba(178,182,197,.62),-5px -5px 11px rgba(255,255,255,.92),inset 1px 1px 0 rgba(255,255,255,.88)}
    .result-widget:nth-child(1) .title-box{color:#e85f8d}
    .result-widget:nth-child(2) .title-box{color:#5d78d6}
    .result-widget:nth-child(3) .title-box{color:#459678}
    .result-widget:nth-child(4) .title-box{color:#d99a21}
    .result-widget ul{margin:0;padding:0;list-style:none;display:grid;gap:7px}
    .result-widget li{position:relative;padding-left:11px;color:#453f4c;font-size:12.8px;line-height:1.42;font-weight:850;word-break:keep-all}
    .result-widget li:before{content:"";position:absolute;left:0;top:7px;width:4px;height:4px;background:#ff8caf}
    .action-area{display:grid;grid-template-columns:1fr;gap:12px;margin-top:18px}
    .action-btn{width:100%;height:56px;border:0;background:#eef0f6;color:#443d49;font-size:16px;font-weight:950;cursor:pointer}
    .action-btn.main{background:#ff8caf;color:#fff}
    .ad-container{margin-top:24px;text-align:center}
    .save-modal{position:fixed;inset:0;z-index:9999;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(31,28,35,.62)}
    .save-modal.active{display:flex}
    .save-modal-box{width:min(390px,100%);padding:16px;background:#eef0f6;box-shadow:12px 12px 24px rgba(20,20,24,.25),-8px -8px 18px rgba(255,255,255,.35)}
    .save-modal-title{margin:0 0 10px;padding:12px;background:#ffe4ed;border:1px solid #f5b8cb;color:#2f2b35;font-size:15px;line-height:1.45;font-weight:950;text-align:center}
    .save-preview-img{display:block;width:100%;max-height:520px;object-fit:contain;background:#fff;border:1px solid #ddd}
    .save-close-btn{width:100%;height:48px;margin-top:12px;border:0;background:#ff8caf;color:#fff;font-size:15px;font-weight:950;cursor:pointer}
.type-desc:empty{
  display:none;
}
    @media(max-width:480px){
      .wrapper{padding:0 12px}
      .header-inner{height:56px}
      .logo-text{min-width:78px;height:32px;font-size:16px;padding:0 10px}
      .main-nav{gap:5px;font-size:12px}
      .main-nav a{height:30px;padding:0 7px}
      .screen{padding:18px 10px 34px}
      .phone-page{padding:10px}
      .phone-screen{padding:16px 8px 15px}
      .top-title{min-height:42px;margin-bottom:13px;padding:9px 8px;font-size:14px;line-height:1.35}
      .main-hero{min-height:360px;padding:26px 14px}
      .main-title-card{padding:30px 14px}
      .main-title-card h1{font-size:30px}
      .result-summary{padding:17px 12px}
      .result-name{font-size:21px}
      .type-desc{font-size:12.5px;line-height:1.55}
      .result-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
      .result-widget{min-height:260px;padding:12px 8px 13px}
      .title-box{font-size:13.5px}
      .result-widget li{font-size:12px;line-height:1.42}
    }

    @media(max-width:360px){
      .main-nav{font-size:11px}
      .main-nav a{padding:0 5px}
      .result-widget{min-height:252px;padding:11px 7px 12px}
      .title-box{font-size:13px}
      .result-widget li{font-size:11.3px;line-height:1.38}
    }
  </style>
</head>

<body>
  <header class="page-header">
    <div class="header-inner wrapper">
      <a class="logo-text" href="https://test-it.co.kr/">테스트잇</a>
      <nav class="main-nav">
        <a href="https://test-it.co.kr/">성격</a>
        <a href="https://test-it.co.kr/">얼굴</a>
        <a href="https://test-it.co.kr/">그외</a>
        <a href="https://test-it.co.kr/">사주</a>
      </nav>
    </div>
  </header>

  <main>
    <section id="mainScreen" class="screen active">
      <div class="phone-page">
        <div class="phone-screen">
          <div class="main-hero">
            <div class="main-title-card">
              <h1>테스트잇<br>사주 첫인상 성격 테스트</h1>
            </div>
          </div>
        </div>
      </div>

      <button class="start-btn" type="button" onclick="goInput()">테스트 시작하기</button>

      <div class="ad-container" id="ad-container-page1">
        <article class="coupang_ad mt-3">
          <script src="https://ads-partners.coupang.com/g.js"></script>
          <script>
            new PartnersCoupang.G({
              "id": 798186,
              "template": "carousel",
              "trackingCode": "AF4391881",
              "width": "350",
              "height": "140",
              "tsource": ""
            });
          </script>
        </article>
      </div>
    </section>

    <section id="inputScreen" class="screen">
      <div class="phone-page">
        <div class="phone-screen">
          <h2 class="top-title">테스트잇 사주 첫인상 성격 테스트</h2>

          <div class="form-widget">
            <h2 class="form-title">정보 입력</h2>
            <p class="input-desc">생년월일시를 기준으로 일주 중심 성향을 정리합니다.</p>

            <div class="field">
              <label>생년월일</label>
              <div class="select-grid">
                <select id="birthYear"></select>
                <select id="birthMonth"></select>
                <select id="birthDay"></select>
              </div>
            </div>

            <div class="field">
              <label>태어난 시간</label>
              <select id="birthTime">
                <option value="unknown">태어난 시간 모름</option>
                <option value="0">자시 23:30 ~ 01:29</option>
                <option value="1">축시 01:30 ~ 03:29</option>
                <option value="2">인시 03:30 ~ 05:29</option>
                <option value="3">묘시 05:30 ~ 07:29</option>
                <option value="4">진시 07:30 ~ 09:29</option>
                <option value="5">사시 09:30 ~ 11:29</option>
                <option value="6">오시 11:30 ~ 13:29</option>
                <option value="7">미시 13:30 ~ 15:29</option>
                <option value="8">신시 15:30 ~ 17:29</option>
                <option value="9">유시 17:30 ~ 19:29</option>
                <option value="10">술시 19:30 ~ 21:29</option>
                <option value="11">해시 21:30 ~ 23:29</option>
              </select>
            </div>

            <button class="next-btn" type="button" onclick="makeResult()">결과 보기</button>
          </div>
        </div>
      </div>

      <div class="ad-container" id="ad-container-page2">
        <article class="coupang_ad mt-3">
          <script>
            new PartnersCoupang.G({
              "id": 798186,
              "template": "carousel",
              "trackingCode": "AF4391881",
              "width": "350",
              "height": "140",
              "tsource": ""
            });
          </script>
        </article>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div id="captureArea" class="phone-page">
        <div class="phone-screen">
          <h2 class="top-title">테스트잇 사주 첫인상 성격 테스트</h2>

          <div class="result-layout">
            <div class="result-summary">
              <h3 id="resultName" class="result-name"></h3>
              <p id="resultDesc" class="type-desc"></p>
            </div>

            <div class="result-grid">
              <div class="result-widget">
                <div class="title-box">첫인상</div>
                <ul id="firstList"></ul>
              </div>

              <div class="result-widget">
                <div class="title-box">진짜 성격</div>
                <ul id="realList"></ul>
              </div>

              <div class="result-widget">
                <div class="title-box">자주 듣는 말</div>
                <ul id="talkList"></ul>
              </div>

              <div class="result-widget">
                <div class="title-box">연애 스타일</div>
                <ul id="loveList"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="action-area">
        <button class="action-btn main" type="button" onclick="saveResultImage()">결과 이미지 저장하기</button>
        <button class="action-btn" type="button" onclick="restart()">다시 해보기</button>
        <button class="action-btn" type="button" onclick="location.href='https://test-it.co.kr/'">다른 테스트 해보기</button>
        <button class="action-btn" type="button" onclick="shareTest()">테스트 공유하기</button>
      </div>

      <div class="ad-container" id="ad-container-page3">
        <article class="coupang_ad mt-3">
          <script>
            new PartnersCoupang.G({
              "id": 798186,
              "template": "carousel",
              "trackingCode": "AF4391881",
              "width": "350",
              "height": "140",
              "tsource": ""
            });
          </script>
        </article>
      </div>
    </section>
  </main>

  <div id="saveModal" class="save-modal">
    <div class="save-modal-box">
      <p class="save-modal-title">아래 결과 이미지를 꾹 눌러 저장해주세요</p>
      <img id="savePreviewImg" class="save-preview-img" alt="결과 이미지">
      <button class="save-close-btn" type="button" onclick="closeSaveModal()">닫기</button>
    </div>
  </div>

    function initSelects(){
      const year=document.getElementById("birthYear");
      const month=document.getElementById("birthMonth");
      const day=document.getElementById("birthDay");

      for(let i=2026;i>=1900;i--) year.add(new Option(i+"년",i));
      for(let i=1;i<=12;i++) month.add(new Option(i+"월",i));

      function setDays(){
        const y=Number(year.value);
        const m=Number(month.value);
        const last=new Date(y,m,0).getDate();
        const current=Number(day.value)||1;
        day.innerHTML="";
        for(let i=1;i<=last;i++) day.add(new Option(i+"일",i));
        day.value=Math.min(current,last);
      }

      year.value="1990";
      month.value="10";
      setDays();
      day.value="7";
      year.addEventListener("change",setDays);
      month.addEventListener("change",setDays);
    }

    function goInput(){
      document.getElementById("mainScreen").classList.remove("active");
      document.getElementById("inputScreen").classList.add("active");
      window.scrollTo(0,0);
    }

    function getEightCharData(year,month,day,timeValue){
      if(typeof Solar==="undefined"){
        alert("사주 계산 스크립트가 아직 불러와지지 않았습니다. 잠시 후 다시 눌러주세요.");
        return null;
      }

      const hour=timeValue==="unknown"?12:timeInfo[timeValue].hour;
      const solar=Solar.fromYmdHms(year,month,day,hour,0,0);
      const lunar=solar.getLunar();
      const eight=lunar.getEightChar();

      const data={
        yearGan:eight.getYearGan(),
        yearZhi:eight.getYearZhi(),
        monthGan:eight.getMonthGan(),
        monthZhi:eight.getMonthZhi(),
        dayGan:eight.getDayGan(),
        dayZhi:eight.getDayZhi(),
        timeGan:timeValue==="unknown"?"":eight.getTimeGan(),
        timeZhi:timeValue==="unknown"?"":eight.getTimeZhi()
      };

      data.dayPillar=data.dayGan+data.dayZhi;
      return data;
    }

    function getTenGod(dayStem,targetStem){
      if(!targetStem||!tenGodMap[dayStem]) return "";
      return tenGodMap[dayStem][targetStem]||"";
    }

    function analyzeElements(data){
      const counts={"목":0,"화":0,"토":0,"금":0,"수":0};

      [data.yearGan,data.monthGan,data.dayGan,data.timeGan].forEach(function(stem){
        if(stemElement[stem]) counts[stemElement[stem]]+=1.35;
      });

      [data.yearZhi,data.monthZhi,data.dayZhi,data.timeZhi].forEach(function(branch){
        if(branchElement[branch]) counts[branchElement[branch]]+=1;
        if(hiddenStems[branch]){
          hiddenStems[branch].forEach(function(stem,index){
            counts[stemElement[stem]]+=index===0?0.45:0.22;
          });
        }
      });

      return counts;
    }

    function getElementPattern(elements){
      const order=["목","화","토","금","수"];
      const sorted=Object.entries(elements).sort(function(a,b){return b[1]-a[1]});
      const first=sorted[0];
      const second=sorted[1];
      const fifth=sorted[4];

      if(first[1]-fifth[1] <= 1.05){
        return "균형";
      }

      if(first[1] >= second[1] + 1.55){
        return first[0];
      }

      const pair=[first[0],second[0]].sort(function(a,b){
        return order.indexOf(a)-order.indexOf(b);
      }).join("");

      return elementDetailText[pair]?pair:first[0];
    }

    function analyzeTenGods(data){
      const dayStem=data.dayGan;
      const list=[];

      [data.yearGan,data.monthGan,data.timeGan].forEach(function(stem){
        const god=getTenGod(dayStem,stem);
        if(god) list.push(god);
      });

      [data.yearZhi,data.monthZhi,data.dayZhi,data.timeZhi].forEach(function(branch){
        const stem=branchMainStem[branch];
        const god=getTenGod(dayStem,stem);
        if(god) list.push(god);
      });

      const counts={};
      list.forEach(function(god){counts[god]=(counts[god]||0)+1});
      const sorted=Object.entries(counts).sort(function(a,b){return b[1]-a[1]});
      return sorted.length?sorted[0][0]:"비견";
    }

    function getPillarProfile(data){
      const pillar=data.dayPillar;
      const fallback=fallbackByStem[data.dayGan]||fallbackByStem["甲"];
      const profile=pillarProfiles[pillar]||fallback;

      return {
        name:profile.name,
      desc:"",
        first:profile.first,
        real:profile.real,
        talk:profile.talk,
        love:profile.love
      };
    }

    function makeList(id,arr){
      document.getElementById(id).innerHTML=arr.map(function(text){return "<li>"+text+"</li>"}).join("");
    }

    function makeResult(){
      const year=Number(document.getElementById("birthYear").value);
      const month=Number(document.getElementById("birthMonth").value);
      const day=Number(document.getElementById("birthDay").value);
      const timeValue=document.getElementById("birthTime").value;

      const data=getEightCharData(year,month,day,timeValue);
      if(!data) return;

      const profile=getPillarProfile(data);
      const elements=analyzeElements(data);
      const elementPattern=getElementPattern(elements);
      const elementText=elementDetailText[elementPattern]||elementDetailText["균형"];
      const mainTenGod=analyzeTenGods(data);
      const ten=tenGodText[mainTenGod]||tenGodText["비견"];

      document.getElementById("resultName").textContent=profile.name;
      document.getElementById("resultDesc").textContent=profile.desc;

      makeList("firstList",[profile.first[0],profile.first[1],profile.first[2],profile.first[3],elementText.first]);
      makeList("realList",[profile.real[0],profile.real[1],profile.real[2],profile.real[3],elementText.real,ten.real]);
      makeList("talkList",[profile.talk[0],profile.talk[1],profile.talk[2],profile.talk[3],elementText.talk]);
      makeList("loveList",[profile.love[0],profile.love[1],profile.love[2],profile.love[3],elementText.love,ten.love]);

      document.getElementById("inputScreen").classList.remove("active");
      document.getElementById("resultScreen").classList.add("active");
      window.scrollTo(0,0);
    }

    function restart(){
      document.getElementById("resultScreen").classList.remove("active");
      document.getElementById("mainScreen").classList.add("active");
      window.scrollTo(0,0);
    }

    async function saveResultImage(){
      const target=document.getElementById("captureArea");
      const modal=document.getElementById("saveModal");
      const img=document.getElementById("savePreviewImg");

      const canvas=await html2canvas(target,{
        backgroundColor:"#eef0f6",
        scale:2,
        useCORS:true
      });

      img.src=canvas.toDataURL("image/png");
      modal.classList.add("active");
    }

      document.getElementById("saveModal").classList.remove("active");

    let sharing=false;

    async function shareTest(){
      if(sharing) return;
      sharing=true;

      const shareUrl="https://test-it.co.kr/";
      const shareData={
        title:"테스트잇 사주 첫인상 성격 테스트",
        text:"사주로 보는 첫인상과 진짜 성격 테스트",
        url:shareUrl
      };

      try{
        if(navigator.share){
          await navigator.share(shareData);
        }else if(navigator.clipboard){
          await navigator.clipboard.writeText(shareUrl);
          alert("테스트 링크가 복사되었습니다.");
        }else{
          prompt("아래 링크를 복사해주세요.",shareUrl);
        }
      }catch(e){
      }finally{
        setTimeout(function(){sharing=false},700);
      }
    }
