<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>테스트잇 숨은 성격 찾기 테스트</title>
  <meta name="description" content="착한 척, 쿨한 척 뒤에 숨은 내 진짜 본성을 찾아보자">
  <meta property="og:title" content="테스트잇 숨은 성격 찾기 테스트">
  <meta property="og:description" content="나도 몰랐던 내 안의 진짜 흑막 성격은?">
  <meta property="og:url" content="https://test-it.co.kr/test395">
  <meta property="og:type" content="website">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

  <style>
    :root {
      --black: #111111;
      --white: #ffffff;
      --bg: #fffdf9;

      --main-1: #fff1f1;
      --main-2: #fff7c9;
      --main-3: #ffe9d6;
      --main-4: #e8f7dc;
      --main-5: #e4f4ff;
      --main-6: #efe7ff;
      --main-7: #ffe8f3;
      --main-8: #e7f8f3;
      --main-9: #f9f9f9;

      --tone-1: #f6fbff;
      --tone-2: #e8f4ff;
      --tone-3: #d6ecff;
      --tone-4: #bfe0ff;
      --tone-5: #ffffff;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--black);
      font-family: "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      border-radius: 0;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: background-color 0.15s ease;
    }

    .pixel-text {
      font-family: "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      font-weight: 900;
      letter-spacing: -0.5px;
    }

    .wrap {
      width: 100%;
      min-height: 100vh;
      display: block;
    }

    header {
      width: 100%;
      height: 52px;
      border-bottom: 1px solid var(--black);
      background: var(--white);
      display: flex;
      justify-content: center;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 30;
    }

    .header-inner {
      width: 100%;
      max-width: 520px;
      padding: 0 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--black);
    }

    .nav {
      display: flex;
      gap: 12px;
      font-size: 14px;
      font-weight: 800;
      white-space: nowrap;
    }

    main {
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      padding: 24px 14px 34px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
      animation: fadeIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .frame {
      width: 100%;
      border: 1px solid var(--black);
      background: var(--white);
      padding: 14px;
    }

    .hero-box {
      border: 1px solid var(--black);
      background: var(--white);
      padding: 18px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .hero-top {
      text-align: center;
      padding: 0;
    }

    .hero-title-box {
      border: 1px solid var(--black);
      background: #fffef7;
      padding: 12px 10px;
    }

    .hero-title {
      margin: 0;
      font-size: 20px;
      line-height: 1.35;
      word-break: keep-all;
      color: var(--black);
      letter-spacing: -0.8px;
      display: block;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .hero-card {
      aspect-ratio: 1 / 1.02;
      border: 1px solid var(--black);
      padding: 8px 6px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 8px;
      background: var(--white);
    }

    .hero-card:nth-child(1) { background: var(--main-1); }
    .hero-card:nth-child(2) { background: var(--main-2); }
    .hero-card:nth-child(3) { background: var(--main-3); }
    .hero-card:nth-child(4) { background: var(--main-4); }
    .hero-card:nth-child(5) { background: var(--main-5); }
    .hero-card:nth-child(6) { background: var(--main-6); }
    .hero-card:nth-child(7) { background: var(--main-7); }
    .hero-card:nth-child(8) { background: var(--main-8); }
    .hero-card:nth-child(9) { background: var(--main-9); }

    .hero-card.center {
      background: var(--white);
      color: var(--black);
    }

    .hero-card.center .hero-card-icon svg {
      stroke: var(--black);
    }

    .hero-card-top {
      font-size: 13px;
      line-height: 1.2;
      text-align: center;
      font-weight: 900;
      min-height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero-card-icon {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2px 0;
    }

    .hero-card-icon svg {
      width: 42px;
      height: 42px;
      stroke: var(--black);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .start-btn {
      width: 100%;
      min-height: 54px;
      border: 1px solid var(--black);
      background: var(--white);
      color: var(--black);
      font-size: 16px;
      font-weight: 900;
      margin-top: 12px;
    }

    .start-btn:hover {
      background: var(--main-2);
    }

    .question-card {
      border: 1px solid var(--black);
      background: var(--white);
      padding: 14px;
      display: block;
    }

    .question-head {
      border: 1px solid var(--black);
      padding: 10px 10px 12px;
      margin-bottom: 14px;
      background: var(--white);
      color: var(--black);
    }

    .question-head-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      margin-bottom: 10px;
      font-weight: 900;
    }

    .progress-cells {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 4px;
    }

    .progress-cell {
      height: 14px;
      border: 1px solid var(--black);
      background: var(--white);
    }

    .progress-cell.done {
      background: var(--main-2);
    }

    .q-mark {
      width: fit-content;
      margin: 0 auto 10px;
      padding: 6px 14px;
      border: 1px solid var(--black);
      background: var(--main-3);
      color: var(--black);
      font-size: 15px;
      font-weight: 900;
    }

    .question-text {
      margin: 0 0 10px;
      min-height: 86px;
      border: 1px solid var(--black);
      background: var(--white);
      padding: 14px 12px;
      font-size: 20px;
      line-height: 1.4;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      letter-spacing: -0.5px;
      word-break: keep-all;
      font-weight: 900;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 0;
    }

    .answer-btn {
      width: 100%;
      min-height: 66px;
      border: 1px solid var(--black);
      color: var(--black);
      padding: 12px;
      font-size: 15px;
      line-height: 1.35;
      text-align: center;
      word-break: keep-all;
      font-weight: 800;
    }

    .answer-btn:nth-child(1) {
      background: var(--main-1);
    }

    .answer-btn:nth-child(2) {
      background: var(--main-3);
    }

    .answer-btn:hover {
      background: var(--main-2);
    }

    .capture-card {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      border: 1px solid var(--black);
      background: var(--white);
      padding: 14px;
    }

    .capture-top-title {
      border: 1px solid var(--black);
      background: var(--tone-4);
      color: var(--black);
      padding: 8px 8px;
      text-align: center;
      font-size: 13px;
      margin-bottom: 12px;
      font-weight: 900;
      letter-spacing: -0.4px;
    }

    .result-main {
      border: 1px solid var(--black);
      padding: 22px 10px;
      text-align: center;
      margin-bottom: 12px;
      background: var(--tone-1);
    }

    .result-type {
      display: none;
    }

    .result-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.3;
      letter-spacing: -1px;
      word-break: keep-all;
      color: var(--black);
      background: var(--white);
      display: inline-block;
      padding: 0 8px;
    }

    .result-sub {
      margin: 14px 0 0;
      font-size: 14px;
      line-height: 1.45;
      word-break: keep-all;
      font-weight: 800;
      background: transparent;
      border-top: 1px dashed var(--black);
      padding-top: 15px;
      display: block;
    }

    .two-line {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .small-box {
      border: 1px solid var(--black);
      background: var(--tone-5);
      padding: 12px 8px;
      text-align: center;
      min-height: 86px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .small-box:first-child {
      background: var(--tone-2);
    }

    .small-box:last-child {
      background: var(--tone-3);
    }

    .small-box b {
      display: inline-block;
      font-size: 13px;
      margin: 0 auto 8px;
      padding: 3px 8px;
      border: 1px solid var(--black);
      background: var(--white);
      color: var(--black);
      font-weight: 900;
    }

    .small-box span {
      font-size: 13px;
      line-height: 1.35;
      word-break: keep-all;
      font-weight: 800;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .result-mini-card {
      min-height: 130px;
      border: 1px solid var(--black);
      padding: 8px;
      background: var(--white);
      display: flex;
      flex-direction: column;
    }

    .result-mini-card:nth-child(1) { background: var(--tone-1); }
    .result-mini-card:nth-child(2) { background: var(--tone-2); }
    .result-mini-card:nth-child(3) { background: var(--tone-3); }
    .result-mini-card:nth-child(4) { background: var(--tone-4); }
    .result-mini-card:nth-child(5) { background: var(--white); }
    .result-mini-card:nth-child(6) { background: var(--tone-3); }
    .result-mini-card:nth-child(7) { background: var(--tone-2); }
    .result-mini-card:nth-child(8) { background: var(--tone-1); }
    .result-mini-card:nth-child(9) { background: var(--tone-4); }

    .result-mini-card.center {
      background: var(--white);
      color: var(--black);
    }

    .result-mini-card.center .mini-icon svg {
      stroke: var(--black);
    }

    .mini-top {
      font-size: 12px;
      line-height: 1;
      text-align: center;
      min-height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
    }

    .mini-icon {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px 0;
    }

    .mini-icon svg {
      width: 40px;
      height: 40px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mini-text {
      min-height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 12px;
      line-height: 1.3;
      word-break: keep-all;
      font-weight: 800;
    }

    .bottom-note {
      margin-top: 10px;
      border: 1px solid var(--black);
      padding: 14px 10px;
      text-align: center;
      font-size: 13px;
      line-height: 1.45;
      word-break: keep-all;
      font-weight: 800;
      background: var(--tone-1);
    }

    .button-area {
      width: 100%;
      max-width: 420px;
      margin: 14px auto 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-btn {
      width: 100%;
      min-height: 52px;
      border: 1px solid var(--black);
      background: var(--white);
      color: var(--black);
      font-size: 15px;
      font-weight: 900;
    }

    .result-btn:hover {
      background: var(--tone-2);
    }

    .ad-box {
      width: 350px;
      max-width: 100%;
      height: 140px;
      margin: 18px auto 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .save-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 18px 14px;
      overflow-y: auto;
    }

    .save-modal.active {
      display: flex;
    }

    .save-box {
      width: 100%;
      max-width: 390px;
      border: 1px solid var(--black);
      background: var(--white);
      padding: 18px;
      text-align: center;
      margin: auto;
    }

    .save-box h3 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.3;
      font-weight: 900;
    }

    .save-box p {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.45;
      word-break: keep-all;
      font-weight: 800;
    }

    .save-preview-wrap {
      width: 100%;
      max-width: 290px;
      margin: 0 auto 18px;
      border: 1px solid var(--black);
      background: var(--white);
      padding: 0;
    }

    .save-preview {
      display: block;
      width: 100%;
      height: auto;
      border: 0;
      background: var(--white);
    }

    .close-btn {
      width: 100%;
      height: 48px;
      border: 1px solid var(--black);
      background: var(--white);
      color: var(--black);
      font-size: 15px;
      font-weight: 900;
    }

    .close-btn:hover {
      background: var(--main-2);
    }

    @media (max-width: 420px) {
      main {
        padding: 16px 10px 28px;
      }

      .header-inner {
        padding: 0 10px;
      }

      .logo {
        font-size: 17px;
      }

      .nav {
        gap: 8px;
        font-size: 13px;
      }

      .hero-box {
        padding: 14px 12px 14px;
        gap: 14px;
      }

      .hero-title-box {
        padding: 12px 10px;
      }

      .hero-title {
        font-size: 17px;
      }

      .hero-card-icon svg {
        width: 38px;
        height: 38px;
      }

      .question-text {
        min-height: 78px;
        font-size: 18px;
        margin-bottom: 9px;
        padding: 13px 10px;
      }

      .answer-btn {
        font-size: 14px;
        min-height: 62px;
      }

      .result-title {
        font-size: 22px;
      }

      .result-mini-card {
        min-height: 120px;
      }

      .mini-text {
        font-size: 11px;
      }

      .save-box {
        max-width: 300px;
        padding: 14px;
      }

      .save-box h3 {
        font-size: 18px;
      }

      .save-box p {
        font-size: 13px;
        margin-bottom: 12px;
      }

      .save-preview-wrap {
        max-width: 185px;
        margin-bottom: 12px;
      }

      .close-btn {
        height: 44px;
      }

      .ad-box {
        margin: 16px auto 0;
      }
    }

 
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="header-inner">
        <a href="https://test-it.co.kr/" class="logo">테스트잇</a>
        <nav class="nav">
     <a href="https://test-it.co.kr/test.html">성격</a>
        <a href="https://test-it.co.kr/face.html">얼굴</a>
        <a href="https://test-it.co.kr/etc.html">그외</a>
        <a href="https://test-it.co.kr/saju.html">사주</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="screen active" id="mainScreen">
        <div class="frame">
          <div class="hero-box">
            <div class="hero-top">
              <div class="hero-title-box">
                <h1 class="hero-title pixel-text">테스트잇 숨은 성격 찾기 테스트</h1>
              </div>
            </div>

            <div class="hero-grid" id="heroGrid"></div>
          </div>
        </div>

        <button type="button" class="start-btn pixel-text" onclick="startTest()">테스트 시작하기</button>
      </section>

      <section class="screen" id="questionScreen">
        <div class="question-card">
          <div class="question-head">
            <div class="question-head-top">
              <span class="pixel-text">QUESTION</span>
              <span class="pixel-text" id="countText">1 / 12</span>
            </div>
            <div class="progress-cells" id="progressCells"></div>
          </div>

          <div class="q-mark pixel-text" id="qNum">Q1</div>
          <p class="question-text" id="questionText"></p>

          <div class="answers" id="answerArea"></div>
        </div>
      </section>

      <section class="screen" id="resultScreen">
        <div class="result-wrap">
          <div class="capture-card" id="captureArea">
            <div class="capture-top-title pixel-text">테스트잇 숨은 성격 찾기 테스트</div>

            <div class="result-main">
              <div class="result-type" id="resultType"></div>
              <h2 class="result-title pixel-text" id="resultTitle"></h2>
              <p class="result-sub" id="resultSub"></p>
            </div>

            <div class="two-line">
              <div class="small-box">
                <b class="pixel-text">겉으로는</b>
                <span id="lookText"></span>
              </div>
              <div class="small-box">
                <b class="pixel-text">속으로는</b>
                <span id="hiddenText"></span>
              </div>
            </div>

            <div class="card-grid" id="resultGrid"></div>

            <div class="bottom-note" id="bottomNote"></div>
          </div>

          <div class="button-area">
            <button type="button" class="result-btn pixel-text" onclick="saveResultImage()">결과 이미지 저장하기</button>
            <button type="button" class="result-btn pixel-text" onclick="restartTest()">다시 해보기</button>
            <button type="button" class="result-btn pixel-text" onclick="location.href='https://test-it.co.kr/'">다른 테스트 해보기</button>
            <button type="button" class="result-btn pixel-text" onclick="shareTest()">테스트 공유하기</button>
          </div>
        </div>
      </section>

      <div class="ad-box">
        <script src="https://ads-partners.coupang.com/g.js"></script>
        <script>
          new PartnersCoupang.G({
            id: 798186,
            template: "carousel",
            trackingCode: "AF4391881",
            width: "350",
            height: "140"
          });
        </script>
      </div>
    </main>
  </div>

  <div class="save-modal" id="saveModal">
    <div class="save-box">
      <h3 class="pixel-text">이미지가 만들어졌어요</h3>
      <p>아래 결과 이미지를 꾹 눌러<br>이미지 저장을 눌러주세요.</p>
      <div class="save-preview-wrap">
        <img class="save-preview" id="savePreview" alt="결과 이미지">
      </div>
      <button type="button" class="close-btn pixel-text" onclick="closeSaveModal()">닫기</button>
    </div>
  </div>

  <script>
    const testUrl = "https://test-it.co.kr/test395";

    const palettes = {
      ENFJ: { tone1: "#fff7fb", tone2: "#ffe6f1", tone3: "#ffd2e4", tone4: "#f6adc9", tone5: "#ffffff" },
      ENFP: { tone1: "#fffdf3", tone2: "#fff4bf", tone3: "#ffe68b", tone4: "#f6d260", tone5: "#ffffff" },
      ENTJ: { tone1: "#f5fbff", tone2: "#dff0ff", tone3: "#bfe2ff", tone4: "#8fc8f4", tone5: "#ffffff" },
      ENTP: { tone1: "#fbf8ff", tone2: "#eee4ff", tone3: "#dac8ff", tone4: "#bea5f0", tone5: "#ffffff" },
      ESFJ: { tone1: "#fff8f4", tone2: "#ffe3d7", tone3: "#ffcbbb", tone4: "#f5a98e", tone5: "#ffffff" },
      ESFP: { tone1: "#fff7f5", tone2: "#ffe1dd", tone3: "#ffc5bd", tone4: "#f49c92", tone5: "#ffffff" },
      ESTJ: { tone1: "#f8fbfd", tone2: "#e8f0f5", tone3: "#d4e1ea", tone4: "#b9cbd8", tone5: "#ffffff" },
      ESTP: { tone1: "#fbfff4", tone2: "#edf8cf", tone3: "#d9ef9c", tone4: "#bee06f", tone5: "#ffffff" },

    const heroPreviewCards = [
      { label: "행복 버튼", icon: "smile" },

      { label: "혼자모드", icon: "home" },
      { label: "핵심", icon: "star", center: true },

      { label: "반전", icon: "switch" }

      { key: "happy", label: "행복 버튼", icon: "smile" },
      { key: "angry", label: "화났을 때", icon: "zap" },
      { key: "relation", label: "관계", icon: "users" },
      { key: "solo", label: "혼자모드", icon: "home" },
      { key: "core", label: "핵심", icon: "star", center: true },
      { key: "sensitive", label: "예민포인트", icon: "alert" },

    let currentQuestion = 0;
    let score = {
      E: 0, I: 0,
      S: 0, N: 0,
      T: 0, F: 0,
      J: 0, P: 0

    function applyResultPalette(mbti) {
      const palette = palettes[mbti] || palettes.ENFJ;
      const captureArea = document.getElementById("captureArea");

      captureArea.style.setProperty("--tone-1", palette.tone1);
      captureArea.style.setProperty("--tone-2", palette.tone2);
      captureArea.style.setProperty("--tone-3", palette.tone3);
      captureArea.style.setProperty("--tone-4", palette.tone4);
      captureArea.style.setProperty("--tone-5", palette.tone5);
    }

      const icons = {

      return icons[type] || icons.star;

    function renderHeroGrid() {
      const heroGrid = document.getElementById("heroGrid");
      heroGrid.innerHTML = "";

      heroPreviewCards.forEach(card => {
        const div = document.createElement("div");
        div.className = card.center ? "hero-card center" : "hero-card";
        div.innerHTML = `
          <div class="hero-card-top pixel-text">${card.label}</div>
          <div class="hero-card-icon">${getIconSvg(card.icon)}</div>
        `;
        heroGrid.appendChild(div);
      });
    }

    function showScreen(screenId) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });
      document.getElementById(screenId).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderProgress() {
      const wrap = document.getElementById("progressCells");
      wrap.innerHTML = "";

      for (let i = 0; i < questions.length; i++) {
        const cell = document.createElement("div");
        cell.className = i < currentQuestion ? "progress-cell done" : "progress-cell";
        wrap.appendChild(cell);
      }
    }

    function startTest() {
      currentQuestion = 0;
      score = {
        E: 0, I: 0,
        S: 0, N: 0,
        T: 0, F: 0,
        J: 0, P: 0
      };
      showScreen("questionScreen");
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentQuestion];

      document.getElementById("countText").textContent = `${currentQuestion + 1} / ${questions.length}`;
      document.getElementById("qNum").textContent = `Q${currentQuestion + 1}`;
      document.getElementById("questionText").innerHTML = q.q;
      renderProgress();

      const answerArea = document.getElementById("answerArea");
      answerArea.innerHTML = "";

      q.a.forEach(answer => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer-btn";
        btn.innerHTML = answer.text;
        btn.onclick = () => selectAnswer(answer.type);
        answerArea.appendChild(btn);
      });
    }

    function selectAnswer(type) {
      score[type] += 1;
      currentQuestion += 1;

      if (currentQuestion >= questions.length) {
        setTimeout(showResult, 120);
      } else {
        renderQuestion();
      }
    }

    function getMbti() {
      const ei = score.E >= score.I ? "E" : "I";
      const sn = score.S >= score.N ? "S" : "N";
      const tf = score.T >= score.F ? "T" : "F";
      const jp = score.J >= score.P ? "J" : "P";
      return ei + sn + tf + jp;
    }

    function renderResultCards(result) {
      const resultGrid = document.getElementById("resultGrid");
      resultGrid.innerHTML = "";

      resultCardMeta.forEach(meta => {
        const card = document.createElement("div");
        card.className = meta.center ? "result-mini-card center" : "result-mini-card";
        card.innerHTML = `
          <div class="mini-top pixel-text">${meta.label}</div>
          <div class="mini-icon">${getIconSvg(meta.icon)}</div>
          <div class="mini-text">${result[meta.key]}</div>
        `;
        resultGrid.appendChild(card);
      });
    }

    function showResult() {
      const mbti = getMbti();
      const result = results[mbti];

      applyResultPalette(mbti);

      document.getElementById("resultTitle").textContent = result.title;
      document.getElementById("resultSub").innerHTML = result.sub;
      document.getElementById("lookText").textContent = result.outer;
      document.getElementById("hiddenText").textContent = result.inner;
      document.getElementById("bottomNote").innerHTML = result.note;

      renderResultCards(result);
      showScreen("resultScreen");
    }

    function restartTest() {
      currentQuestion = 0;
      score = {
        E: 0, I: 0,
        S: 0, N: 0,
        T: 0, F: 0,
        J: 0, P: 0
      };
      showScreen("mainScreen");
    }

    function shareTest() {
      const shareData = {
        title: "테스트잇 숨은 성격 찾기 테스트",
        text: "나도 몰랐던 내 안의 진짜 흑막 성격은?",
        url: testUrl
      };

      if (navigator.share) {
        navigator.share(shareData).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(testUrl).then(() => {
          alert("테스트 주소가 복사됐어요!");
        }).catch(() => {
          prompt("아래 주소를 복사해주세요.", testUrl);
        });
      } else {
        prompt("아래 주소를 복사해주세요.", testUrl);
      }
    }

    function saveResultImage() {
      const captureArea = document.getElementById("captureArea");
      const width = Math.ceil(captureArea.scrollWidth);
      const height = Math.ceil(captureArea.scrollHeight);

      document.fonts.ready.then(() => {
        return htmlToImage.toPng(captureArea, {
          pixelRatio: 2,
          cacheBust: true,
          backgroundColor: "#ffffff",
          width: width,
          height: height,
          canvasWidth: width * 2,
          canvasHeight: height * 2,
          style: {
            margin: "0",
            transform: "none"
          }
        });
      }).then(dataUrl => {
        document.getElementById("savePreview").src = dataUrl;
        document.getElementById("saveModal").classList.add("active");
      }).catch(() => {
        alert("이미지 저장 준비 중 오류가 났어요. 다시 한 번 눌러주세요.");
      });
    }

    function closeSaveModal() {
      document.getElementById("saveModal").classList.remove("active");
    }

    renderHeroGrid();
    renderProgress();
  </script>
