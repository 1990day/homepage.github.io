      });

      const bars = document.getElementById("bars");
      bars.innerHTML = "";

      sorted.forEach((key) => {
        const percent = total === 0 ? 0 : Math.round((scores[key] / total) * 100);

        const row = document.createElement("div");
        row.className = "bar-row";

        row.innerHTML = `
          <div class="bar-info">
            <span>${results[key].name}</span>
            <div class="bar-bg">
              <div class="bar-fill" style="width: ${percent}%; background: ${resultColors[key]};"></div>
            </div>
            <span>${percent}%</span>
          </div>
        `;

        bars.appendChild(row);
      });
    }

    function restartTest() {
      document.getElementById("checkupPaper").classList.add("hidden");
      document.getElementById("checkupPaper").classList.remove("is-testing");
      document.getElementById("checkupPaper").classList.remove("is-result");
      document.getElementById("resultPage").classList.add("hidden");
      document.getElementById("questionPage").classList.add("hidden");
      document.getElementById("startPage").classList.remove("hidden");
    }

    function goOtherTest() {
      location.href = "/";
    }

    function saveResultImage() {
      const target = document.getElementById("resultCapture");

      html2canvas(target, {
        scale: 2,
        backgroundColor: "#fffefb",
        useCORS: true
      }).then((canvas) => {
        const image = canvas.toDataURL("image/png");
        document.getElementById("savePreview").src = image;
        document.getElementById("saveModal").classList.add("show");
      });
    }

    function closeSaveModal() {
      document.getElementById("saveModal").classList.remove("show");
    }

    function shareTest() {
      const text = "테스트잇 사상체질 성격 테스트";

      if (navigator.share) {
        navigator.share({
          title: "테스트잇 사상체질 성격 테스트",
          text: text,
          url: location.href
        });
      } else {
        navigator.clipboard.writeText(location.href);
        alert("테스트 링크가 복사되었습니다.");
      }
    }
  </script>
</body>
</html>
