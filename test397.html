  <style>
    :root {
      --ink: #4c4447;
      --soft-ink: #7c6f73;
      --bg: #fff8ee;
      --line-soft: #ece4e6;
      --shadow: rgba(188, 172, 176, 0.18);

      --result-bg: #fffdf8;
      --result-line: #cfc8cb;
      --result-soft: #f6f1f2;
      --result-card: #fbfbfb;
      --result-card-2: #ffffff;
      --result-point: #ff8ea8;

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.55) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.55) 1px, transparent 1px),
        var(--bg);
      background-size: 12px 12px;
      color: var(--ink);
      font-family: "NeoDunggeunmo", "Malgun Gothic", "맑은 고딕", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: "NeoDunggeunmo", "Malgun Gothic", "맑은 고딕", sans-serif;
      border-radius: 0;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: background-color 0.12s ease, transform 0.08s ease;
    }

    button:active {
      transform: translate(1px, 1px);
    }

    .pixel-text {
      font-family: "NeoDunggeunmo", "Malgun Gothic", "맑은 고딕", sans-serif;
      font-weight: 400;
      letter-spacing: -0.4px;
    }

    .wrap {
      width: 100%;
      min-height: 100vh;
    }

    header {
      width: 100%;
      min-height: 58px;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(6px);
      padding: 6px 0;
    }

    .header-inner {
      width: 100%;
      max-width: 540px;
      padding: 0 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 18px;
      color: #111111;
      background: #ffe3ed;
      border: 1px solid #f0d5c0;
      padding: 7px 10px 6px;
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .nav {
      display: flex;
      gap: 8px;
      white-space: nowrap;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      color: #111111;
      background: #fff0b8;
      border: 1px solid #f0d5c0;
      padding: 7px 8px 6px;
      line-height: 1;
      font-size: 14px;
    }

    main {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      padding: 22px 14px 34px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
      animation: fadeIn 0.18s ease-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(3px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .soft-frame {
      width: 100%;
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.83);
      padding: 8px;
      box-shadow: 4px 4px 0 var(--shadow);

    .hero-box {
      border: 1px solid #f0e4c8;
      background: #fffef9;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;

    .hero-title-box,

      background: #ffffff;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      align-items: center;
      overflow: hidden;
    }

    .hero-title-box {
      padding: 8px 10px;
      min-height: 64px;
      gap: 8px;
    }

    .title-deco,

      align-items: center;
      flex-shrink: 0;
      z-index: 2;
    }

    .title-deco {
      gap: 5px;
    }

    .title-deco span,
    .capture-title-deco span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      flex-shrink: 0;

      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .title-fit-area {
      height: 44px;
    }

    .hero-title,
    .capture-title-text {

      min-width: max-content;
      line-height: 1;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: nowrap;
      white-space: nowrap;
      transform-origin: center center;
    }

    .hero-title {
      margin: 0;
      gap: 4px;
      font-size: 28px;
      letter-spacing: -1.15px;
    }

    .title-block {
      display: inline-block;
      color: #111111;
      padding: 0.28em 0.43em 0.22em;
      border: 1px solid #f0d5c0;
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;

    .title-brand {
      background: #ffe3ed;
    }

    .title-main {
      background: #fff0b8;
    }

    .fruit-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .fruit-chip {
      border: 1px solid #ddd3d7;
      background: rgba(255,255,255,0.98);
      min-height: 86px;
      padding: 8px 4px 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 7px;
    }

    .fruit-chip-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      min-height: 48px;
    }

    .fruit-chip-name {
      font-family: "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", sans-serif;
      font-size: 13px;
      line-height: 1.2;
      text-align: center;
      word-break: keep-all;
      color: #222222;
      font-weight: 700;
      letter-spacing: -0.4px;
    }

    .start-btn {

      background: #fff1a8;
      color: #111111;
      font-size: 16px;
      margin-top: 14px;
      box-shadow: 3px 3px 0 rgba(236, 215, 137, 0.35);

    .start-btn:hover {
      background: #ffe98f;
    }

    .question-card {
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.86);
      padding: 12px;
      box-shadow: 4px 4px 0 var(--shadow);
    }

    .question-head {
      border: 1px solid #ece4e6;
      background: #fffdf8;
      padding: 10px;
      margin-bottom: 12px;
    }

    .question-head-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 15px;
      margin-bottom: 10px;
      color: #df8c7f;
    }

    .progress-fruits {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 4px;
    }

    .progress-fruit {
      position: relative;
      height: 36px;
      border: 1px solid #ebe2e4;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      line-height: 1;
      opacity: 0.35;
      filter: grayscale(1);
      transform: scale(0.96);
      transition: all 0.18s ease;
      overflow: hidden;
    }

    .progress-fruit::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: 0;
      width: 100%;
      height: 4px;
      background: #f4edf0;
    }

    .progress-fruit.done {
      opacity: 1;
      filter: none;
      transform: scale(1);
      background: #fff7cf;
      border-color: #eddca4;
      box-shadow: 2px 2px 0 rgba(236, 215, 137, 0.22);
    }

    .progress-fruit.done::after {
      background: #ffb0c7;
    }

    .progress-fruit.current {
      opacity: 1;
      filter: none;
      transform: scale(1);
      background: #ffe8f1;
      border-color: #f1c4d1;
      box-shadow: 2px 2px 0 rgba(255, 181, 203, 0.26);
      animation: fruitPulse 0.85s ease-in-out infinite alternate;
    }

    .progress-fruit.current::after {
      background: #ffd94a;
    }

    @keyframes fruitPulse {
      from { transform: scale(1); }
      to { transform: scale(1.05); }
    }

    .q-mark {
      width: fit-content;
      margin: 0 auto 10px;
      padding: 6px 14px;
      border: 1px solid #ebe2e4;
      background: #fff4f8;
      color: #ff8aa6;
      font-size: 15px;
    }

    .question-text {
      margin: 0 0 12px;
      min-height: 108px;
      border: 1px solid #ece4e6;
      background: #fffefb;
      padding: 18px 14px;
      font-size: 21px;
      line-height: 1.5;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      word-break: keep-all;
      color: var(--ink);
      letter-spacing: -0.7px;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .answer-btn {
      width: 100%;
      min-height: 72px;
      border: 1px solid #ece4e6;
      color: var(--ink);
      padding: 14px;
      font-size: 16px;
      line-height: 1.45;
      text-align: center;
      word-break: keep-all;
      background: #ffffff;
    }

    .answer-btn:nth-child(1) {
      background: #fff3f8;
    }

    .answer-btn:nth-child(2) {
      background: #fff8dd;
    }

    .answer-btn:hover {
      background: #eefaf3;
    }

    .capture-card {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      border: 1px solid var(--result-line);
      background:
        linear-gradient(90deg, rgba(255,255,255,0.36) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.36) 1px, transparent 1px),
        var(--result-bg);
      background-size: 10px 10px;
      padding: 10px;
      min-width: 0;
      color: var(--result-text);
      font-family: "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", sans-serif;
      font-weight: 800;
      letter-spacing: -0.45px;
    }

    .capture-card.capture-ready {
      width: 420px !important;
      max-width: 420px !important;
    }

    .capture-card.capture-ready .pixel-text,
    .capture-card.capture-ready .result-title,
    .capture-card.capture-ready .capture-title-text {
      font-family: "NeoDunggeunmo", "Malgun Gothic", "맑은 고딕", sans-serif !important;
      font-weight: 400 !important;
    }

    .capture-top-title {
      border: 1px dashed var(--result-line);
      background: var(--result-soft);
      padding: 8px 10px;
      margin-bottom: 10px;
      min-height: 58px;
      gap: 8px;
    }

    .capture-title-deco {
      gap: 5px;
    }

    .capture-title-deco span {
      width: clamp(20px, 5vw, 24px);
      height: clamp(20px, 5vw, 24px);
      font-size: clamp(12px, 3vw, 14px);
      background: #ffffff;
      border: 1px dashed var(--result-line);
    }

    .capture-title-fit-area {
      height: 38px;
    }

    .capture-title-text {
      gap: 4px;
      letter-spacing: -0.8px;
      font-size: 22px;
    }

    .capture-title-text .title-block {
      padding: 0.27em 0.38em 0.21em;
      color: #111111;
    }

    .result-top-grid {
      display: grid;
      grid-template-columns: 1fr 1.55fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .result-top-box,
    .result-center-box,
    .trait-box,
    .match-box {
      border: 1px dashed var(--result-line);
      background: var(--result-card);
    }

    .result-top-box {
      min-height: 136px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .top-label {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 12px;
      color: var(--result-text);
      background: var(--result-soft);
      padding: 4px 7px;
      border: 1px dashed var(--result-line);
      font-family: "NeoDunggeunmo", "Malgun Gothic", "맑은 고딕", sans-serif;
      font-weight: 400;
    }

    .top-text {
      font-size: 13px;
      line-height: 1.48;
      word-break: keep-all;
      color: var(--result-text);
      font-weight: 800;
    }

    .result-center-box {
      min-height: 136px;
      padding: 12px 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .result-title {
      margin: 10px 0 0;
      font-size: 29px;
      line-height: 1.15;
      text-align: center;
      color: var(--result-point);
      letter-spacing: -1px;
      word-break: keep-all;
      font-family: "NeoDunggeunmo", "Malgun Gothic", "맑은 고딕", sans-serif;
      font-weight: 400;
      text-shadow: 0 1px 0 rgba(255,255,255,0.72);
    }

    .trait-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .trait-box {
      min-height: 112px;
      padding: 10px 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .trait-box:nth-child(odd) {
      background: var(--result-card);
    }

    .trait-box:nth-child(even) {
      background: var(--result-card-2);
    }

    .trait-text {
      font-size: 13px;
      line-height: 1.45;
      word-break: keep-all;
      color: var(--result-text);
      font-weight: 800;
    }

    .match-box {
      padding: 12px 10px;
      background: var(--result-soft);
    }

    .match-title {
      text-align: center;
      font-size: 15px;
      color: var(--result-text);
      margin-bottom: 10px;
      font-family: "NeoDunggeunmo", "Malgun Gothic", "맑은 고딕", sans-serif;
      font-weight: 400;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .match-card {
      border: 1px dashed var(--result-line);
      background: var(--result-card);
      padding: 10px 8px;
      text-align: center;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .match-label {
      display: inline-block;
      margin: 0 auto 8px;
      padding: 4px 8px;
      font-size: 12px;
      background: var(--result-card-2);
      border: 1px dashed var(--result-line);
      color: var(--result-text);
      font-family: "NeoDunggeunmo", "Malgun Gothic", "맑은 고딕", sans-serif;
      font-weight: 400;
    }

    .match-text {
      font-size: 13px;
      line-height: 1.45;
      word-break: keep-all;
      color: var(--result-text);
      font-weight: 800;
    }

    .button-area {
      width: 100%;
      max-width: 420px;
      margin: 14px auto 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-btn {
      width: 100%;
      min-height: 52px;
      border: 1px solid #ebe2e4;
      background: rgba(255,255,255,0.9);
      color: var(--ink);
      font-size: 15px;
    }

    .result-btn:hover {
      background: #fff3f8;
    }

    .ad-box {
      width: 350px;
      max-width: 100%;
      height: 140px;
      margin: 18px auto 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .save-modal {
      position: fixed;
      inset: 0;
      background: rgba(76, 68, 71, 0.82);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 18px 14px;
      overflow-y: auto;
    }

    .save-modal.active {
      display: flex;
    }

    .save-box {
      width: 100%;
      max-width: 390px;
      border: 1px solid #ece4e6;
      background: #fffdf8;
      padding: 18px;
      text-align: center;
      margin: auto;
      box-shadow: 4px 4px 0 var(--shadow);
    }

    .save-box h3 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.3;
      color: #ff8aa6;
    }

    .save-box p {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.45;
      word-break: keep-all;
      color: var(--soft-ink);
    }

    .save-preview-wrap {
      width: 100%;
      max-width: 290px;
      margin: 0 auto 18px;
      border: 1px solid #ece4e6;
      background: #ffffff;
      padding: 0;
    }

    .save-preview {
      display: block;
      width: 100%;
      height: auto;
      border: 0;
      background: #ffffff;
    }

    .close-btn {
      width: 100%;
      height: 48px;
      border: 1px solid #ece4e6;
      background: #fff3f8;
      color: var(--ink);
      font-size: 15px;
    }

    .close-btn:hover {
      background: #ffe7ef;
    }

    .fruit-pixel {
      --fruit-a: #ff6f95;
      --fruit-b: #e54d72;
      --fruit-c: #fff08e;
      --fruit-l: #56bd5f;
      --fruit-w: #ffffff;
      width: 44px;
      height: 44px;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      gap: 1px;
      image-rendering: pixelated;
    }

    .fruit-pixel.big {
      width: 76px;
      height: 76px;
      gap: 2px;
    }

    .pix {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    .pix.a { background: var(--fruit-a); }
    .pix.b { background: var(--fruit-b); }
    .pix.c { background: var(--fruit-c); }
    .pix.l { background: var(--fruit-l); }
    .pix.w { background: var(--fruit-w); }
    .pix.s { background: #fff3b0; }
    .pix.d { background: rgba(255,255,255,0.86); }
    .pix.p { background: #ff6f9a; }
    .pix.g { background: #54c96a; }
    .pix.y { background: #ffd439; }
    .pix.o { background: #ff9a2e; }
    .pix.r { background: #e9304c; }
    .pix.f { background: #b9519d; }
    .pix.k { background: #2f2f2f; }

    .fruit-cherry { --fruit-a: #f13651; --fruit-b: #cf263f; --fruit-l: #44b554; }
    .fruit-lemon { --fruit-a: #ffd83f; --fruit-b: #efbc12; --fruit-l: #50b95b; }
    .fruit-orange { --fruit-a: #ff982b; --fruit-b: #ee7618; --fruit-l: #4dbc5b; }
    .fruit-grape { --fruit-a: #9f74ea; --fruit-b: #7b4fd2; --fruit-l: #4dbc5b; }
    .fruit-watermelon { --fruit-a: #ff5f78; --fruit-b: #46c26d; --fruit-l: #4fbb5c; }
    .fruit-melon { --fruit-a: #b9e97a; --fruit-b: #69b846; --fruit-l: #4dbc5b; }
    .fruit-blueberry { --fruit-a: #5c9fed; --fruit-b: #3278d2; --fruit-l: #4fb75c; }
    .fruit-peach { --fruit-a: #ff927f; --fruit-b: #ee6f62; --fruit-l: #4dbc5b; }

    let currentQuestion = 0;
    let score = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    function resetScore() {
      currentQuestion = 0;
      score = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
    }

    async function waitForCaptureFonts() {
      if (!document.fonts) return;

      try {
        const resultTitle = document.getElementById("resultTitle");
        const fruitName = resultTitle ? resultTitle.textContent || "석류탱" : "석류탱";

        await Promise.all([
          document.fonts.load('22px "NeoDunggeunmo"', "테스트잇 과일탱 성격 테스트"),
          document.fonts.load('29px "NeoDunggeunmo"', fruitName),
          document.fonts.ready
        ]);
      } catch (e) {}
    }

    function fitAllTitles() {
      document.querySelectorAll(".title-fit-area, .capture-title-fit-area").forEach(area => {
        const inner = area.querySelector(".fit-inner");
        if (!inner) return;

        inner.style.transform = "scale(1)";

        const available = area.clientWidth;
        const needed = inner.scrollWidth;

        if (!available || !needed) return;

        const scale = Math.min(1, (available / needed) * 0.98);
        inner.style.transform = "scale(" + scale + ")";
      });
    }

    function getPixelFruit(key, sizeClass) {
      const pattern = pixelPatterns[key] || pixelPatterns.strawberry;
      const fruit = fruitByKey[key] || fruitByKey.strawberry;
      let cells = "";

      pattern.forEach(row => {
        row.split("").forEach(ch => {
          if (ch === ".") {
            cells += '<span class="pix empty"></span>';
          } else {
            cells += '<span class="pix ' + ch + '"></span>';
          }
        });
      });

      return '<div class="fruit-pixel fruit-' + key + ' ' + (sizeClass || "") + '" role="img" aria-label="' + fruit.name + '">' + cells + '</div>';
    }

    function renderFruitBoard() {
      const board = document.getElementById("fruitBoard");
      board.innerHTML = fruitList.map(item => {
        return `
          <div class="fruit-chip">
            <div class="fruit-chip-icon">
              ${getPixelFruit(item.key, "")}
            </div>
            <div class="fruit-chip-name">${item.name}</div>
          </div>
        `;
      }).join("");
    }

    function renderProgress() {
      const wrap = document.getElementById("progressCells");
      let cells = "";

      for (let i = 0; i < questions.length; i++) {
        let stateClass = "";

        if (i < currentQuestion) {
          stateClass = "done";
        } else if (i === currentQuestion) {
          stateClass = "current";
        }

        cells += `
          <div class="progress-fruit ${stateClass}" aria-hidden="true">
            ${progressFruitIcons[i] || "🍓"}
          </div>
        `;
      }

      wrap.innerHTML = cells;
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });

      document.getElementById(id).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
      requestAnimationFrame(fitAllTitles);
    }

    function startTest() {
      resetScore();
      showScreen("questionScreen");
      renderQuestion();
    }

    function renderQuestion() {
      const item = questions[currentQuestion];

      document.getElementById("countText").textContent = (currentQuestion + 1) + " / " + questions.length;
      document.getElementById("qNum").textContent = "Q" + (currentQuestion + 1);
      document.getElementById("questionText").innerHTML = item.q;

      const answerArea = document.getElementById("answerArea");
      answerArea.innerHTML = "";

      item.a.forEach(answer => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer-btn pixel-text";
        btn.innerHTML = answer.text;
        btn.onclick = function () {
          chooseAnswer(answer.type);
        };
        answerArea.appendChild(btn);
      });

      renderProgress();
    }

    function chooseAnswer(type) {
      score[type] += 1;

      if (currentQuestion < questions.length - 1) {
        currentQuestion += 1;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function getMbti() {
      const ei = score.E > score.I ? "E" : "I";
      const sn = score.S > score.N ? "S" : "N";
      const tf = score.T > score.F ? "T" : "F";
      const jp = score.J > score.P ? "J" : "P";
      return ei + sn + tf + jp;
    }

    function applyFruitResultPalette(result) {
      const captureArea = document.getElementById("captureArea");
      const palette = fruitResultPalettes[result.key] || fruitResultPalettes.strawberry;

      captureArea.style.setProperty("--result-bg", palette.bg);
      captureArea.style.setProperty("--result-line", palette.line);
      captureArea.style.setProperty("--result-soft", palette.soft);
      captureArea.style.setProperty("--result-card", palette.card);
      captureArea.style.setProperty("--result-card-2", palette.card2);
      captureArea.style.setProperty("--result-point", palette.point);
      captureArea.style.setProperty("--result-text", palette.text);
    }

    function showResult() {
      const mbti = getMbti();
      const result = results[mbti] || results.ENFJ;

      applyFruitResultPalette(result);

      document.getElementById("resultFruit").innerHTML = getPixelFruit(result.key, "big");
      document.getElementById("resultTitle").textContent = result.title;
      document.getElementById("lookText").innerHTML = result.outer;
      document.getElementById("hiddenText").innerHTML = result.inner;
      document.getElementById("goodMatchText").textContent = result.goodMatch;
      document.getElementById("badMatchText").textContent = result.badMatch;

      const grid = document.getElementById("resultGrid");
      grid.innerHTML = result.traits.map(text => {
        return `
          <div class="trait-box">
            <div class="trait-text">${text}</div>
          </div>
        `;
      }).join("");

      showScreen("resultScreen");
    }

    function restartTest() {
      resetScore();
      showScreen("mainScreen");
      renderProgress();
    }

    function shareTest() {
      const shareData = {
        title: "테스트잇 과일탱 성격 테스트",
        text: "내 성격은 어떤 과일탱일까?",
        url: testUrl
      };

      if (navigator.share) {
        navigator.share(shareData).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(testUrl).then(() => {
          alert("테스트 링크가 복사됐어요.");
        }).catch(() => {
          alert("공유가 지원되지 않는 브라우저예요.");
        });
      } else {
        alert("공유가 지원되지 않는 브라우저예요.");
      }
    }

    async function saveResultImage() {
      const captureArea = document.getElementById("captureArea");

      if (!window.html2canvas) {
        alert("이미지 저장 기능을 불러오는 중이에요. 잠시 후 다시 눌러주세요.");
        return;
      }

      try {
        captureArea.classList.add("capture-ready");

        await waitForCaptureFonts();
        fitAllTitles();

        await new Promise(resolve => {
          requestAnimationFrame(() => {
            requestAnimationFrame(resolve);
          });
        });

        const canvas = await html2canvas(captureArea, {
          backgroundColor: "#fffdf8",
          scale: 2,
          useCORS: true,
          allowTaint: true,
          logging: false,
          width: captureArea.offsetWidth,
          height: captureArea.scrollHeight,
          windowWidth: captureArea.offsetWidth,
          windowHeight: captureArea.scrollHeight,
          scrollX: 0,
          scrollY: 0
        });

        const dataUrl = canvas.toDataURL("image/png");
        document.getElementById("savePreview").src = dataUrl;
        document.getElementById("saveModal").classList.add("active");
      } catch (e) {
        alert("이미지 저장 준비 중 오류가 났어요. 다시 한 번 눌러주세요.");
      } finally {
        captureArea.classList.remove("capture-ready");
        requestAnimationFrame(fitAllTitles);
      }
    }

    function closeSaveModal() {
      document.getElementById("saveModal").classList.remove("active");
    }

    window.addEventListener("resize", () => {
      requestAnimationFrame(fitAllTitles);
    });

    window.addEventListener("load", () => {
      renderFruitBoard();
      renderProgress();

      waitForCaptureFonts().then(() => {
        fitAllTitles();
      });
    });
  </script>
</body>
</html>
