        features: ["꽂히면 바로 움직임", "성취감에 살아남", "목표 생기면 빨라짐", "작은 성공도 크게 느낌", "불붙으면 강하게 감", "성장 느낌이 중요함", "해내면 기분 좋아짐", "몰입할 때 빛남"]
      },
      dopamine: {
        name: "도파민세포",
        file: "img383_도파민세포.png",
        features: ["재밌어야 시작됨", "새 자극에 약함", "심심하면 바로 식음", "웃긴 콘텐츠 못 지나침", "흥미 생기면 몰입함", "작은 재미로 회복함", "반복되면 지루함", "즐거운 일에 빠름"]
      },
      emotion: {
        name: "감성세포",
        file: "img383_감성세포.png",
        features: ["분위기에 바로 반응", "말투 변화 잘 느낌", "괜찮은 척 잘함", "여운이 오래 남음", "예쁜 장면에 약함", "감성 충전이 필요함", "작은 말에도 흔들림", "따뜻한 순간을 기억함"]
      },
      logic: {
        name: "이성세포",
        file: "img383_이성세포.png",
        features: ["상황 파악이 먼저", "기준 있어야 편함", "근거 없는 말 싫음", "감정 소모 줄이고 싶음", "정리되면 바로 움직임", "현실 판단에 강함", "차분히 답을 찾음", "복잡한 걸 정리함"]
      }
    };

    const baseQuestions = [
      { group: "relation", type: "normal", question: "연락창을 열었을 때 가장 먼저 신경 쓰이는 건?", answers: [
        { text: "좋아하는 사람에게 답장이 왔는지 본다", cell: "love" },
        { text: "친구 단톡방에 무슨 얘기가 쌓였는지 본다", cell: "friendship" },
        { text: "내가 먼저 보낸 연락이 더 신경 쓰인다", cell: "pride" }
      ]},
      { group: "relation", type: "normal", question: "하루가 별로였을 때 제일 위로되는 순간은?", answers: [
        { text: "누군가 다정하게 내 편을 들어줄 때", cell: "love" },
        { text: "친구들이랑 아무 말이나 하며 웃을 때", cell: "friendship" },
        { text: "내가 틀리지 않았다는 확신이 들 때", cell: "pride" }
      ]},
      { group: "relation", type: "normal", question: "사람 사이에서 내가 가장 크게 반응하는 건?", answers: [
        { text: "나를 특별하게 대해주는 느낌", cell: "love" },
        { text: "같이 있을 때 편하고 재밌는 분위기", cell: "friendship" },
        { text: "나를 가볍게 보지 않는 태도", cell: "pride" }
      ]},
      { group: "life", type: "normal", question: "완전히 비어 있는 쉬는 날, 제일 먼저 끌리는 건?", answers: [
        { text: "알람 끄고 더 자기", cell: "sleep" },
        { text: "먹고 싶던 음식 먹으러 가기", cell: "food" },
        { text: "미뤄둔 일 하나라도 끝내기", cell: "passion" }
      ]},
      { group: "life", type: "normal", question: "몸도 마음도 축 처질 때 나는 보통?", answers: [
        { text: "일단 누워서 회복한다", cell: "sleep" },
        { text: "뭐라도 먹어야 살아난다", cell: "food" },
        { text: "작은 목표라도 잡아 움직인다", cell: "passion" }
      ]},
      { group: "life", type: "normal", question: "하루 끝에 만족감이 제일 크게 드는 순간은?", answers: [
        { text: "푹 쉬어서 체력이 돌아왔을 때", cell: "sleep" },
        { text: "맛있는 걸 제대로 먹었을 때", cell: "food" },
        { text: "오늘 할 일을 해냈을 때", cell: "passion" }
      ]},
      { group: "inner", type: "normal", question: "새벽에 잠이 안 올 때 나는 주로?", answers: [
        { text: "재밌는 영상이나 글을 계속 본다", cell: "dopamine" },
        { text: "감성적인 생각에 빠진다", cell: "emotion" },
        { text: "현실적인 걱정과 계획을 정리한다", cell: "logic" }
      ]},
      { group: "inner", type: "normal", question: "갑자기 기분이 가라앉았을 때 가장 필요한 건?", answers: [
        { text: "분위기를 바꿔줄 재밌는 자극", cell: "dopamine" },
        { text: "감성을 채워줄 음악이나 장면", cell: "emotion" },
        { text: "상황을 객관적으로 정리할 기준", cell: "logic" }
      ]},
      { group: "inner", type: "normal", question: "선택해야 할 일이 생기면 내 머릿속은?", answers: [
        { text: "일단 더 끌리고 재밌어 보이는 쪽", cell: "dopamine" },
        { text: "내 감성이 어느 쪽에 끌리는지 본다", cell: "emotion" },
        { text: "손해와 가능성을 따져본다", cell: "logic" }
      ]}
    ];

    const tieQuestions = {
      relation: { group: "relation", type: "tie", question: "마음이 복잡할 때 결국 제일 먼저 떠오르는 건?", answers: [
        { text: "나를 좋아해 주는 사람의 존재", cell: "love" },
        { text: "내 편처럼 편하게 웃을 수 있는 사람들", cell: "friendship" },
        { text: "내가 무너지지 않았다는 자존감", cell: "pride" }
      ]},
      life: { group: "life", type: "tie", question: "지금 당장 컨디션을 되살릴 수 있다면?", answers: [
        { text: "아무 방해 없이 푹 자고 싶다", cell: "sleep" },
        { text: "먹고 싶던 걸 제대로 먹고 싶다", cell: "food" },
        { text: "하나라도 해내서 다시 불붙고 싶다", cell: "passion" }
      ]},
      inner: { group: "inner", type: "tie", question: "머릿속이 복잡할 때 가장 나를 끌어당기는 건?", answers: [
        { text: "생각을 끊어줄 재밌는 것", cell: "dopamine" },
        { text: "감성을 채워줄 음악과 분위기", cell: "emotion" },
        { text: "상황을 정리해서 답을 찾는 것", cell: "logic" }
      ]}
    };

    let questions = [];
    let current = 0;
    let scores = {};
    let groupScores = {};
    let normalAnswered = {};
    let finalAdded = false;

    function startTest() {
      document.getElementById("startScreen").classList.add("hidden");
      document.getElementById("questionScreen").classList.remove("hidden");
      document.getElementById("resultScreen").classList.add("hidden");

      current = 0;
      finalAdded = false;
      questions = [...baseQuestions];

      scores = {};
      groupScores = { relation: {}, life: {}, inner: {} };
      normalAnswered = { relation: 0, life: 0, inner: 0 };

      Object.keys(cellInfo).forEach(function(cell) {
        scores[cell] = 0;
      });

      makeHeartProgress();
      showQuestion();
    }

    function getDisplayTotal() {
      return finalAdded ? questions.length : questions.length + 1;
    }

    function makeHeartProgress() {
      const heartProgress = document.getElementById("heartProgress");
      heartProgress.innerHTML = "";

      for (let i = 0; i < 10; i++) {
        const span = document.createElement("span");
        span.className = "heart-step";
        span.innerText = "♥";
        heartProgress.appendChild(span);
      }
    }

    function updateHeartProgress() {
      const hearts = document.querySelectorAll(".heart-step");
      hearts.forEach(function(heart, index) {
        if (index <= current) {
          heart.classList.add("active");
        } else {
          heart.classList.remove("active");
        }
      });
    }

    function showQuestion() {
      const q = questions[current];

      document.getElementById("qCount").innerText = (current + 1) + " / " + getDisplayTotal();
      document.getElementById("questionTitle").innerText = q.question;
      updateHeartProgress();

      const answerBox = document.getElementById("answerBox");
      answerBox.innerHTML = "";

      q.answers.forEach(function(answer) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer-btn";
        btn.innerText = answer.text;
        btn.onclick = function() {
          selectAnswer(answer.cell, q);
        };
        answerBox.appendChild(btn);
      });
    }

    function selectAnswer(cell, questionData) {
      scores[cell]++;

      if (questionData.group !== "final") {
        groupScores[questionData.group][cell] = (groupScores[questionData.group][cell] || 0) + 1;

        if (questionData.type === "normal") {
          normalAnswered[questionData.group]++;
        }
      }

      current++;

      if (
        questionData.type === "normal" &&
        normalAnswered[questionData.group] === 3 &&
        isThreeWayTie(questionData.group)
      ) {
        questions.splice(current, 0, tieQuestions[questionData.group]);
      }

      if (current >= questions.length && !finalAdded) {
        addFinalQuestion();
        showQuestion();
        return;
      }

      if (current >= questions.length && finalAdded) {
        showResult();
        return;
      }

      showQuestion();
    }

    function isThreeWayTie(group) {
      const values = Object.values(groupScores[group]);
      return values.length === 3 && values.every(function(score) {
        return score === 1;
      });
    }

    function getGroupWinner(group) {
      const entries = Object.entries(groupScores[group]);
      entries.sort(function(a, b) {
        return b[1] - a[1];
      });
      return entries[0][0];
    }

    function addFinalQuestion() {
      finalAdded = true;

      const finalists = [
        getGroupWinner("relation"),
        getGroupWinner("life"),
        getGroupWinner("inner")
      ];

      questions.push({
        group: "final",
        type: "final",
        question: "결국 내 하루를 가장 강하게 움직이는 힘은?",
        answers: finalists.map(function(cell) {
          return {
            text: getFinalAnswerText(cell),
            cell: cell
          };
        })
      });
    }

    function getFinalAnswerText(cell) {
      const textMap = {
        love: "다정한 연락이나 설레는 순간",
        friendship: "친구들이랑 웃고 떠드는 시간",
        pride: "내가 나답게 지켜낸 느낌",
        sleep: "아무 방해 없이 푹 쉬는 시간",
        food: "맛있는 음식으로 채우는 행복",
        passion: "뭔가 해냈다는 확실한 성취감",
        dopamine: "재밌는 콘텐츠나 새로운 자극",
        emotion: "감성을 채워주는 분위기",
        logic: "복잡한 상황이 딱 정리되는 느낌"
      };

      return textMap[cell];
    }

    function showResult() {
      document.getElementById("questionScreen").classList.add("hidden");
      document.getElementById("resultScreen").classList.remove("hidden");

      const sorted = Object.entries(scores).sort(function(a, b) {
        return b[1] - a[1];
      });

      const first = sorted[0][0];

      document.getElementById("resultImage").src = cellInfo[first].file;
      document.getElementById("resultImage").alt = cellInfo[first].name;

      const featureList = document.getElementById("featureList");
      featureList.innerHTML = "";

      cellInfo[first].features.forEach(function(feature) {
        const item = document.createElement("li");
        item.innerText = feature;
        featureList.appendChild(item);
      });
    }

    function restartTest() {
      document.getElementById("resultScreen").classList.add("hidden");
      document.getElementById("startScreen").classList.remove("hidden");
    }

    function saveResultImage() {
      const target = document.getElementById("captureArea");

      html2canvas(target, {
        backgroundColor: null,
        scale: 2,
        useCORS: true
      }).then(function(canvas) {
        const image = canvas.toDataURL("image/png");
        document.getElementById("savedImage").src = image;
        document.getElementById("saveModal").classList.add("show");
      });
    }

    function closeSaveModal() {
      document.getElementById("saveModal").classList.remove("show");
    }

    function shareTest() {
      const shareData = {
        title: "테스트잇 프라임 세포 성격 테스트",
        text: "테스트잇 프라임 세포 성격 테스트",
        url: location.href
      };

      if (navigator.share) {
        navigator.share(shareData);
      } else {
        navigator.clipboard.writeText(location.href).then(function() {
          alert("테스트 링크가 복사되었습니다.");
        });
      }
    }
  </script>
