    { q: "갑자기 몸이 아플 때 나는?", a: {text: "증상 검색하고<br>바로 병원이나 약국 감", type: "S"}, b: {text: "이러다 큰 병이면 어떡하지?<br>걱정 먼저 함", type: "N"} },
    { q: "팀 과제를 하는데<br>한 명이 계속 실수를 한다면?", a: {text: "다음부터는 이렇게 해달라고<br>확실하게 지적한다", type: "T"}, b: {text: "기분 상하지 않게<br>돌려서 좋게 말해준다", type: "F"} },
    { q: "핸드폰에 빨간색 알림 배지가<br>많이 떠 있다면?", a: {text: "거슬린다!<br>바로바로 눌러서<br>없애야 속이 편함", type: "J"}, b: {text: "999+가 되어도<br>별로 신경 안 쓴다", type: "P"} },

    { q: "이야기할 주제가 없을 때 나는?", a: {text: "어떻게든 대화를 이어가려 한다", type: "E"}, b: {text: "굳이 말을 이어가려 하지 않는다", type: "I"} },
    { q: "새로 산 전자기기를 뜯을 때 나는?", a: {text: "설명서부터 차근차근 정독", type: "S"}, b: {text: "일단 이것저것 눌러보면서 파악", type: "N"} },
    { q: "갈등이 생겼을 때 나는?", a: {text: "잘잘못을 명확히 따져서<br>짚고 넘어가야 해", type: "T"}, b: {text: "서로 감정 상하지 않게<br>좋게좋게 풀었으면 좋겠어", type: "F"} },
    { q: "일을 시작하기 전 나의 스타일은?", a: {text: "언제부터 언제까지 뭘 할지<br>대충이라도 계획을 세운다", type: "J"}, b: {text: "일단 부딪히면서<br>그때그때 필요한 걸 처리한다", type: "P"} }
  ];
    function nextScreen(screenId) {
    document.querySelectorAll(".screen").forEach(function(screen) {
      screen.classList.remove("active");
    });
    document.getElementById(screenId).classList.add("active");
  }

  function calculateMBTI() {
    return (scores.E >= scores.I ? "E" : "I") +
           (scores.S >= scores.N ? "S" : "N") +
           (scores.T >= scores.F ? "T" : "F") +
           (scores.J >= scores.P ? "J" : "P");
  }

  function startTest() {
    const input = document.getElementById("userName").value.trim();
    userName = input ? input : "사용자";
    currentQ = 0;

    for (let key in scores) {
      scores[key] = 0;
    }

    showQuestion();
    nextScreen("screen-question");
  }

  function showQuestion() {
    if (currentQ >= questions.length) {
      showResult();
      return;
    }

    const qData = questions[currentQ];
    document.getElementById("q-title").innerHTML = qData.q;

    const btnA = document.getElementById("btn-A");
    const btnB = document.getElementById("btn-B");

    btnA.innerHTML = qData.a.text;
    btnA.onclick = function() {
      selectAnswer(qData.a.type);
    };

    btnB.innerHTML = qData.b.text;
    btnB.onclick = function() {
      selectAnswer(qData.b.type);
    };

    document.getElementById("progress").style.width = ((currentQ + 1) / questions.length * 100) + "%";
    document.getElementById("question-count").innerText = (currentQ + 1) + " / " + questions.length;
  }

  function selectAnswer(type) {
    scores[type]++;
    currentQ++;
    showQuestion();
  }

  function showResult() {
    const mbti = calculateMBTI();
    const mbtiLower = mbti.toLowerCase();
    const resultImagePath = "img_" + mbtiLower + "371.png";

    const resultImage = document.getElementById("result-image");
    
    document.getElementById("result-greeting").innerText = userName + "님의 마인드맵";
    
    resultImage.src = resultImagePath;
    resultImage.alt = mbti + " 마인드맵 결과 이미지";

    resultImage.onerror = function() {
      this.onerror = null;
      this.src = "img_enfj371.png";
    };

    nextScreen("screen-result");
  }

  function saveResultAsImage() {
    const saveBtn = document.querySelector(".action-btn.save");
    const target = document.getElementById("capture-target");

    saveBtn.innerText = "저장 중...";
    saveBtn.disabled = true;

    html2canvas(target, {
      backgroundColor: null,
      scale: 3,
      useCORS: true,
      logging: false
    }).then(function(canvas) {
      const link = document.createElement("a");
      link.download = userName + "_님의 마인드맵.png";
      link.href = canvas.toDataURL("image/png");
      link.click();

      saveBtn.innerHTML = "<span class=\"mona-font\">💾</span> 결과 이미지 저장하기";
      saveBtn.disabled = false;
    }).catch(function() {
      alert("이미지 저장에 실패했어. 화면 캡처를 이용해줘!");
      saveBtn.innerHTML = "<span class=\"mona-font\">💾</span> 결과 이미지 저장하기";
      saveBtn.disabled = false;
    });
  }

function shareTest() {
    const fixedUrl = "https://test-it.co.kr/test371";
    const title = "테스트잇 마인드맵 성격 테스트";

    if (navigator.share) {
      navigator.share({ 
        title: title,
        text: title,
        url: fixedUrl 
      }).catch(function() {});
    } else {
      const shareText = title + "\n" + fixedUrl;
      navigator.clipboard.writeText(shareText).then(function() {
        alert("링크가 복사되었어요");
      });
    }
  }
</script>
