<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>테스트잇 만우절 MBTI 성격 테스트</title>

  <meta name="description" content="만우절 기념으로 정반대로 나오는 MBTI 성격 테스트" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="테스트잇 만우절 MBTI 성격 테스트" />
  <meta property="og:description" content="평소처럼 풀었는데 결과는 정반대로 나온다고? 만우절 기념 MBTI 테스트!" />
  <meta property="og:image" content="main_hero.png" />
  <meta property="og:url" content="https://test-it.co.kr/test-april-mbti" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <style>
    :root {
      /* 파스텔톤 컬러 팔레트 */
      --bg-color: #f4f6f9; /* 연한 하늘빛 도는 회색 */
      --win-bg: #ffffff;
      --win-border: #d0d4dc;
      --title-bar: #fce4ec; /* 연핑크 */
      --btn-bg: #fdfdfd;
      --btn-hover: #fff9c4; /* 연노랑 */
      --text-main: #4a4a4a;
      --text-sub: #888888;
      --accent-pink: #f48fb1;
      --accent-blue: #b3e5fc; /* 연하늘 */
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      font-family: "Pretendard", "Apple SD Gothic Neo", "돋움", sans-serif;
      background: var(--bg-color);
      /* 모던 레트로 격자 무늬 */
      background-image: 
        linear-gradient(to right, #e2e6eb 1px, transparent 1px),
        linear-gradient(to bottom, #e2e6eb 1px, transparent 1px);
      background-size: 20px 20px;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 슬림하고 깔끔한 헤더 */
    .header-wrapper {
      width: 100%;
      background-color: var(--win-bg);
      border-bottom: 1px solid var(--win-border);
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 5px rgba(0,0,0,0.02);
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 900px;
      margin: 0 auto;
      padding: 10px 20px; 
    }

    .retro-logo {
      text-decoration: none;
      color: var(--accent-pink);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .main-nav {
      display: flex;
      align-items: center;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 14px; 
    }

    .main-nav a {
      text-decoration: none;
      color: var(--text-sub);
      font-weight: 600;
      font-size: 13px;
      transition: color 0.2s;
    }

    .main-nav a:hover, .main-nav a:active {
      color: var(--accent-pink);
    }

    /* 본문 컨테이너 */
    .container {
      width: 100%;
      max-width: 600px; /* 인스스 공유를 위해 폭을 약간 줄임 */
      margin: 30px auto 40px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    /* 모던 레트로 윈도우 창 */
    .window98 {
      width: 100%;
      background: var(--win-bg);
      border: 1px solid var(--win-border);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 4px 4px 0px rgba(208, 212, 220, 0.5); /* 요즘 레트로 감성 그림자 */
      display: flex;
      flex-direction: column;
    }

    /* 타이틀 바 */
    .window-topbar {
      background: var(--title-bar);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--win-border);
    }

    .window-title {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-main);
      font-weight: 800;
      font-size: 14px;
    }

    .window-controls {
      display: flex;
      gap: 5px;
    }

    .win-btn {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--win-bg);
      border: 1px solid var(--win-border);
      display: inline-block;
    }
    .win-btn:nth-child(1) { background: var(--accent-blue); }
    .win-btn:nth-child(2) { background: var(--btn-hover); }
    .win-btn:nth-child(3) { background: var(--accent-pink); }

    /* 주소창 */
    .browser-bar {
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid var(--win-border);
      background: #fafafa;
    }

    .address-bar {
      flex: 1;
      height: 28px;
      padding: 0 10px;
      display: flex;
      align-items: center;
      color: var(--text-sub);
      font-size: 12px;
      background: var(--win-bg);
      border: 1px solid var(--win-border);
      border-radius: 4px;
    }

    /* 내부 영역 */
    .window-body {
      padding: 30px 20px;
      display: flex;
      flex-direction: column;
      background: var(--win-bg);
    }

    .screen {
      display: none;
      width: 100%;
    }

    .screen.active {
      display: flex;
      flex-direction: column;
    }

    /* 시작 화면 */
    .start-content {
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px 0;
    }

    .main-title {
      margin: 0 0 16px;
      font-size: 32px;
      line-height: 1.3;
      font-weight: 900;
      color: var(--text-main);
      letter-spacing: -0.5px;
    }

    .sub-text {
      font-size: 15px;
      line-height: 1.5;
      color: var(--text-sub);
      margin-bottom: 30px;
    }

    .start-info {
      width: 100%;
      padding: 18px;
      font-size: 14px;
      color: var(--text-main);
      background: var(--btn-hover);
      border: 1px solid var(--win-border);
      border-radius: 6px;
      margin-bottom: 30px;
      text-align: center;
      font-weight: 600;
    }

    .start-btn {
      width: 100%;
      height: 60px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      color: var(--text-main);
      background: var(--title-bar);
      border: 1px solid var(--win-border);
      border-radius: 6px;
      transition: all 0.2s;
      box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
    }

    .start-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    /* 질문 화면 */
    .progress-wrap {
      margin-bottom: 30px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--text-main);
    }

    .progress-bar {
      width: 100%;
      height: 10px;
      background: #f0f0f0;
      border-radius: 5px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--accent-pink);
      transition: width 0.3s ease;
      border-radius: 5px;
    }

    .question-box {
      margin-bottom: 40px;
      padding: 40px 15px;
      background: var(--btn-hover);
      border: 1px solid var(--win-border);
      border-radius: 8px;
      text-align: center;
    }

    .question-type {
      display: inline-block;
      font-size: 14px;
      font-weight: 900;
      color: var(--text-main);
      margin-bottom: 16px;
      background: var(--win-bg);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--win-border);
    }

    .question-title {
      margin: 0;
      font-size: 22px;
      line-height: 1.4;
      font-weight: 800;
      color: var(--text-main);
      word-break: keep-all;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-btn {
      width: 100%;
      min-height: 65px;
      padding: 16px 20px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      color: var(--text-main);
      background: var(--win-bg);
      border: 1px solid var(--win-border);
      border-radius: 8px;
      word-break: keep-all;
      transition: all 0.2s;
      box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
    }

    .choice-btn:hover, .choice-btn:active {
      background: var(--accent-blue);
      border-color: var(--win-border);
    }

    .choice-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    /* 결과 화면 - 세로 길이 단축을 위한 여백 조정 */
    .alert-box {
      padding: 25px 15px;
      margin-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: var(--btn-hover);
      border: 1px solid var(--win-border);
      border-radius: 8px;
    }

    .result-type {
      font-size: 42px;
      font-weight: 900;
      color: var(--accent-pink);
      margin: 0 0 10px 0;
      letter-spacing: 1px;
      text-shadow: 1px 1px 0px #fff;
    }

    .result-title {
      margin: 0 0 12px;
      font-size: 20px;
      color: var(--text-main);
      font-weight: 900;
    }

    .result-desc {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text-sub);
      word-break: keep-all;
    }

    /* 성격 특징 - 인스스용 컴팩트한 태그 스타일 */
    .traits-container {
      margin-bottom: 20px;
      background: var(--win-bg);
      border: 1px solid var(--win-border);
      padding: 20px 15px;
      border-radius: 8px;
    }
    
    .traits-label {
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 12px;
      color: var(--text-main);
      text-align: center;
    }

    .traits-listbox {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
    }

    .trait-item {
      font-size: 13px;
      color: var(--text-main);
      background: #f4f6f9;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid #e2e6eb;
      font-weight: 600;
    }

    /* 만우절 멘트 - 눈에 거의 안 띄게 아주 작게 */
    .reveal-box {
      text-align: center;
      margin-bottom: 25px;
    }

    .reveal-small {
      font-size: 10px;
      color: #e5e5e5; /* 배경과 비슷하게 처리하여 얼핏 보면 안 보이게 */
      font-weight: 400;
    }

    /* 하단 버튼 4개 세로 정렬 */
    .action-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .action-btn {
      width: 100%;
      height: 54px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      color: var(--text-main);
      background: var(--win-bg);
      border: 1px solid var(--win-border);
      border-radius: 6px;
      box-shadow: 2px 2px 0px rgba(0,0,0,0.05);
      transition: all 0.1s;
    }

    .action-btn.save-img {
      background: var(--accent-pink);
      color: #fff;
      border-color: var(--accent-pink);
    }

    .action-btn:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    /* 쿠팡 광고 자연스러운 배치 (fixed 아님) */
    .ad-container {
      width: 100%;
      max-width: 900px;
      margin: 0 auto 40px; /* 메인 콘텐츠 하단에 여유있게 배치 */
      text-align: center;
    }

    /* 모달창 */
    .image-modal {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      z-index: 999;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .image-modal.active {
      display: flex;
    }

    .modal-guide {
      color: #fff;
      margin-bottom: 15px;
      font-size: 16px;
      font-weight: bold;
    }

    .modal-img-wrap {
      max-width: 85%;
      max-height: 75vh;
      overflow: auto;
      border-radius: 8px;
    }

    .modal-img-wrap img {
      width: 100%;
      display: block;
    }

    .modal-close {
      margin-top: 20px;
      padding: 12px 40px;
      background: var(--win-bg);
      color: var(--text-main);
      font-weight: bold;
      font-size: 15px;
      border: 1px solid var(--win-border);
      border-radius: 30px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="header-wrapper">
    <header class="page-header wrapper">
      <a href="https://test-it.co.kr/" class="retro-logo">테스트잇</a>
      <nav>
        <ul class="main-nav">
          <li><a href="https://test-it.co.kr/test.html">성격</a></li>
          <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
          <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
          <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
        </ul>
      </nav>
    </header>
  </div>

  <main class="container">
    <section class="window98" id="capture-target">
      <div class="window-topbar">
        <div class="window-title">
          만우절 성격 테스트
        </div>
        <div class="window-controls">
          <span class="win-btn"></span>
          <span class="win-btn"></span>
          <span class="win-btn"></span>
        </div>
      </div>

      <div class="browser-bar">
        <div class="address-bar">https://test-it.co.kr/april-mbti</div>
      </div>

      <div class="window-body">
        
        <div id="start-screen" class="screen active start-content">
          <h1 class="main-title">만우절 MBTI<br>성격 테스트</h1>
          <p class="sub-text">
            평소처럼 편하게 고르면 됩니다.<br>
            마지막까지 봐야 진짜가 보입니다.
          </p>

          <div class="start-info">
            평범해 보이지만 마지막에 반전이 숨어 있어요.
          </div>

          <button class="start-btn" onclick="startTest()">테스트 시작하기</button>
        </div>

        <div id="question-screen" class="screen">
          <div class="progress-wrap">
            <div class="progress-top">
              <span>진행률</span>
              <span id="progress-text">1 / 12</span>
            </div>
            <div class="progress-bar">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
          </div>

          <div class="question-box">
            <div class="question-type" id="question-type">Q1</div>
            <h2 class="question-title" id="question-title">질문 내용</h2>
          </div>

          <div class="choices">
            <button class="choice-btn" id="choice-a" onclick="selectAnswer(0)">A</button>
            <button class="choice-btn" id="choice-b" onclick="selectAnswer(1)">B</button>
          </div>
        </div>

        <div id="result-screen" class="screen">
          
          <div class="alert-box">
            <div class="result-type" id="fake-type">INFP</div>
            <h2 class="result-title" id="result-title">조용하지만 감정선이 깊은 타입</h2>
            <p class="result-desc" id="result-desc">설명 텍스트</p>
          </div>

          <div class="traits-container">
            <div class="traits-label">성격 특징</div>
            <div class="traits-listbox" id="trait-inline">
              </div>
          </div>

          <div class="reveal-box">
            <div class="reveal-small">
              사실 만우절 테스트라 정반대로 나온 겁니다! 실제 계산된 당신의 MBTI는 <span id="real-type-inline">ESTP</span>
            </div>
          </div>

          <div class="action-col" id="action-buttons">
            <button class="action-btn save-img" onclick="saveAsImage()">결과 이미지 저장하기</button>
            <button class="action-btn" onclick="restartTest()">다시 해보기</button>
            <button class="action-btn" onclick="location.href='https://test-it.co.kr/test.html'">다른 테스트 해보기</button>
            <button class="action-btn" onclick="copyResult()">테스트 공유하기</button>
          </div>

        </div>
      </div>
    </section>
  </main>

  <div class="ad-container" id="ad-container">
    <article class="coupang_ad mt-3">
        <script src="https://ads-partners.coupang.com/g.js"></script>
        <script>
            new PartnersCoupang.G({"id":798186,"template":"carousel","trackingCode":"AF4391881","width":"350","height":"140","tsource":""});
        </script>
    </article>
  </div>

  <div id="image-modal" class="image-modal">
    <div class="modal-guide">꾹 눌러서 이미지를 저장하세요!</div>
    <div class="modal-img-wrap">
      <img id="result-image" src="" alt="테스트 결과 이미지" />
    </div>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>

  <script>
    const questions = [
      { question: "오랜만에 쉬는 날이 생기면 더 끌리는 쪽은?", answers: [{ text: "사람 만나서 밖에서 시간을 보내는 편이다", type: "E" }, { text: "혼자 쉬면서 내 시간을 보내는 편이다", type: "I" }] },
      { question: "새로운 장소에 가면 먼저 보는 건?", answers: [{ text: "구조나 분위기처럼 바로 보이는 정보다", type: "S" }, { text: "여기서 어떤 일이 생길지 떠오르는 상상이다", type: "N" }] },
      { question: "친구가 고민을 말하면 먼저 드는 생각은?", answers: [{ text: "어디서부터 꼬였는지 정리해보고 싶다", type: "T" }, { text: "얼마나 힘들었을지가 먼저 느껴진다", type: "F" }] },
      { question: "여행 준비할 때 더 내 스타일은?", answers: [{ text: "일정을 어느 정도 정해두는 게 편하다", type: "J" }, { text: "가서 끌리는 대로 움직이는 게 좋다", type: "P" }] },
      { question: "여럿이 있는 자리에서 나는 보통?", answers: [{ text: "먼저 말 걸고 분위기를 여는 편이다", type: "E" }, { text: "상황을 보다가 자연스럽게 끼는 편이다", type: "I" }] },
      { question: "설명을 들을 때 더 잘 이해되는 방식은?", answers: [{ text: "예시와 순서가 분명한 설명", type: "S" }, { text: "의미와 흐름을 연결하는 설명", type: "N" }] },
      { question: "갈등 상황에서 더 중요하게 보는 것은?", answers: [{ text: "누가 봐도 납득되는 기준과 논리", type: "T" }, { text: "상대가 상처받지 않는 전달 방식", type: "F" }] },
      { question: "마감이 있는 일을 할 때 나는?", answers: [{ text: "미리 해두는 편이 마음이 편하다", type: "J" }, { text: "끝날 때쯤 몰입해서 처리하는 편이다", type: "P" }] },
      { question: "기분 전환이 필요할 때 더 가까운 쪽은?", answers: [{ text: "사람 만나거나 밖에 나가야 풀린다", type: "E" }, { text: "혼자 있어야 회복되는 편이다", type: "I" }] },
      { question: "무언가를 볼 때 더 먼저 잡히는 건?", answers: [{ text: "지금 보이는 사실과 디테일이다", type: "S" }, { text: "숨은 의미나 가능성이다", type: "N" }] },
      { question: "누군가 실수했을 때 내 반응은?", answers: [{ text: "왜 그런 실수가 났는지 원인을 본다", type: "T" }, { text: "일단 민망했겠다 싶은 마음이 먼저 든다", type: "F" }] },

      "ESTJ": { title: "현실 감각 좋고 정리 빠른 타입", desc: "상황을 빠르게 파악하고 기준을 세워 움직이는 편입니다. 답답한 흐름을 정리하고 실제적인 결과를 만드는 힘이 강합니다.", traits: ["정리와 통제가 편함", "할 일 미루지 않음", "현실적 판단 강함", "비효율 절대 못 참음", "책임 맡으면 든든함", "명확한 기준 선호", "일 처리 속도 빠름", "실행력 아주 좋음", "우왕좌왕 흐름 극혐", "결과 분명히 만들고 풂"] },

    let currentQuestion = 0;
    const scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    function startTest() {
      currentQuestion = 0;
      for (const key in scores) scores[key] = 0;
      showScreen("question-screen");
      renderQuestion();
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
      document.getElementById(id).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestion() {
      const q = questions[currentQuestion];
      const progress = ((currentQuestion + 1) / questions.length) * 100;

      document.getElementById("progress-text").textContent = `${currentQuestion + 1} / ${questions.length}`;
      document.getElementById("progress-fill").style.width = `${progress}%`;
      document.getElementById("question-type").textContent = `Q${currentQuestion + 1}`;
      document.getElementById("question-title").textContent = q.question;
      document.getElementById("choice-a").textContent = q.answers[0].text;
      document.getElementById("choice-b").textContent = q.answers[1].text;
    }

    function selectAnswer(index) {
      if (currentQuestion >= questions.length) return;
      const q = questions[currentQuestion];
      scores[q.answers[index].type] += 1;
      currentQuestion += 1;

      if (currentQuestion < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function calculateRealMBTI() {
      const ei = scores.E >= scores.I ? "E" : "I";
      const sn = scores.S >= scores.N ? "S" : "N";
      const tf = scores.T >= scores.F ? "T" : "F";
      const jp = scores.J >= scores.P ? "J" : "P";
      return `${ei}${sn}${tf}${jp}`;
    }

    function reverseMBTI(type) {
      const map = { E: "I", I: "E", S: "N", N: "S", T: "F", F: "T", J: "P", P: "J" };
      return type.split("").map(char => map[char]).join("");
    }

    function showResult() {
      const realType = calculateRealMBTI();
      const fakeType = reverseMBTI(realType);
      const fakeData = resultData[fakeType];

      document.getElementById("fake-type").textContent = fakeType;
      document.getElementById("result-title").textContent = fakeData.title;
      document.getElementById("result-desc").textContent = fakeData.desc;
      
      const traitsHTML = fakeData.traits.map(v => `<div class="trait-item">${v}</div>`).join("");
      document.getElementById("trait-inline").innerHTML = traitsHTML;
      
      document.getElementById("real-type-inline").textContent = realType;

      showScreen("result-screen");
    }

    function restartTest() {
      showScreen("start-screen");
    }

    function copyResult() {
      const realType = document.getElementById("real-type-inline").textContent;
      const text = `사실 만우절 테스트라 정반대로 나온 겁니다!\n실제 계산된 당신의 MBTI는 ${realType}`;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(() => alert("결과 문구가 복사됐어요"))
          .catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
      alert("결과 문구가 복사됐어요");
    }

    function saveAsImage() {
      const target = document.getElementById("capture-target");
      const actionCol = document.getElementById("action-buttons");
      const body = document.body;
      
      actionCol.style.display = "none";
      const originalBg = body.style.background;
      body.style.background = "#ffffff"; 
      
      html2canvas(target, {
        scale: 3, 
        backgroundColor: "#ffffff",
        useCORS: true
      }).then(canvas => {
        actionCol.style.display = "flex";
        body.style.background = originalBg;
        
        const imgData = canvas.toDataURL("image/png");
        document.getElementById("result-image").src = imgData;
        document.getElementById("image-modal").classList.add("active");
      });
    }

    function closeModal() {
      document.getElementById("image-modal").classList.remove("active");
    }
  </script>
