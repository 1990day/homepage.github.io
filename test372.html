  <script>
    const questions = [
      {
        question: "따뜻한 봄바람이 불어올 때<br>내 기분은?",
        answers: [
          { text: "당장 밖으로 나가서<br>놀고 싶어!", type: "E" },
          { text: "창문 열고 바람맞으며<br>쉬고 싶어", type: "I" }
        ]
      },
      {
        question: "꽃구경을 가면 먼저 눈에 들어오는 건",

          { text: "색감, 날씨,<br>실제 풍경의 디테일", type: "S" },
          { text: "분위기, 감정,<br>그 장면의 느낌", type: "N" }

      {

          { text: "맞아! 왠지 좋은 일이 생길 것 같은<br>기분이야", type: "F" }
        ]
      },
      {
        question: "봄맞이 대청소를 시작할 때<br>나의 모습은?",
        answers: [
          { text: "구역별로 순서를 정해<br>계획적으로 청소한다", type: "J" },
          { text: "일단 시작하고<br>눈에 보이는 곳부터 치운다", type: "P" }
        ]
      },
      {
        question: "벚꽃 명소에 갔는데<br>사람이 꽉 찼다",
        answers: [
          { text: "축제 분위기 제대로네!<br>신난다!", type: "E" },
          { text: "기 빨려.<br>조용한 데로 피하고 싶다", type: "I" }
        ]
      },
      {
        question: "봄이 왔다고 가장 먼저<br>느껴지는 순간은?",
        answers: [
          { text: "날씨가 따뜻해지고<br>길가에 꽃이 필 때", type: "S" },
          { text: "공기에서 미묘하고 포근한<br>봄 냄새가 날 때", type: "N" }
        ]
      },
      {
        question: "벚꽃 축제 공연 보는데<br>가수가 음이탈을 냈다",
        answers: [
          { text: "연습 좀 더 해야 할 듯<br>돈 아깝다", type: "T" },
          { text: "헐 어떡하냐<br>진짜 창피하겠다", type: "F" }
        ]
      },
      {
        question: "봄 나들이 갈 때 입을 옷을<br>정하는 타이밍은?",
        answers: [
          { text: "전날 날씨를 확인하고<br>코디를 다 짜둔다", type: "J" },
          { text: "당일날 옷장을 보고<br>맘에 드는 걸 입는다", type: "P" }
        ]
      },
      {
        question: "햇살 좋은 날 카페에 가서<br>더 하고 싶은 것은?",
        answers: [
          { text: "지나가는 사람들 구경하며<br>친구랑 떠든다", type: "E" },
          { text: "구석 자리에서 혼자 책 읽으며<br>광합성한다", type: "I" }
        ]
      },
      {
        question: "화원에서 화분을 하나<br>고른다면?",
        answers: [
          { text: "물 자주 안 줘도 되고<br>공기 정화 잘 되는 것", type: "S" },
          { text: "보자마자 내 눈에 딱 들어오는<br>운명적인 것", type: "N" }
        ]
      },
      {
        question: "누군가에게 봄 선물을<br>고른다면",
        answers: [
          { text: "실용적이고 잘 쓸 만한 걸<br>고른다", type: "T" },
          { text: "받았을 때 기분 좋아질 걸<br>고른다", type: "F" }
        ]
      },
      {
        question: "봄 축제 리플렛을 받았을 때<br>나는?",
        answers: [
          { text: "행사 일정표를 확인하고<br>볼 것들을 체크한다", type: "J" },
          { text: "지도를 슥 보고<br>발길이 닿는 대로 움직인다", type: "P" }
        ]
      }
    ];

    const introScreen = document.getElementById("intro-screen");
    const testScreen = document.getElementById("test-screen");
    const resultScreen = document.getElementById("result-screen");

    const startBtn = document.getElementById("start-btn");
    const progressText = document.getElementById("progress-text");
    const progressPercent = document.getElementById("progress-percent");
    const progressFill = document.getElementById("progress-fill");
    const questionChip = document.getElementById("question-chip");
    const questionText = document.getElementById("question-text");
    const answersWrap = document.getElementById("answers");
    const resultImage = document.getElementById("result-image");

    const saveBtn = document.getElementById("save-btn");
    const retryBtn = document.getElementById("retry-btn");
    const otherBtn = document.getElementById("other-btn");
    const shareBtn = document.getElementById("share-btn");

    let currentQuestion = 0;
    let score = {
      E: 0, I: 0,
      S: 0, N: 0,
      T: 0, F: 0,
      J: 0, P: 0
    };

    function resetTest() {
      currentQuestion = 0;
      score = {
        E: 0, I: 0,
        S: 0, N: 0,
        T: 0, F: 0,
        J: 0, P: 0
      };
    }

    function showScreen(target) {
      introScreen.classList.add("hidden");
      testScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      target.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestion() {
      const q = questions[currentQuestion];
      const percent = Math.round(((currentQuestion + 1) / questions.length) * 100);

      progressText.textContent = `${currentQuestion + 1} / ${questions.length}`;
      progressPercent.textContent = `${percent}%`;
      progressFill.style.width = `${percent}%`;

      questionChip.textContent = `QUESTION ${currentQuestion + 1}`;
      questionText.innerHTML = q.question;
      answersWrap.innerHTML = "";

      q.answers.forEach((answer) => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.innerHTML = answer.text;
        btn.addEventListener("click", () => selectAnswer(answer.type));
        answersWrap.appendChild(btn);
      });
    }

    function selectAnswer(type) {
      score[type] += 1;
      currentQuestion += 1;

      if (currentQuestion < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function getMbti() {
      const ei = score.E >= score.I ? "E" : "I";
      const sn = score.S >= score.N ? "S" : "N";
      const tf = score.T >= score.F ? "T" : "F";
      const jp = score.J >= score.P ? "J" : "P";
      return `${ei}${sn}${tf}${jp}`;
    }

    function showResult() {
      const mbti = getMbti().toLowerCase();
      resultImage.src = `img_${mbti}372.png`;
      resultImage.alt = `${mbti.toUpperCase()} 결과 이미지`;
      showScreen(resultScreen);
    }

    function saveResultImage() {
      const imageUrl = resultImage.src;
      if (!imageUrl) {
        alert("결과 이미지가 아직 없어요.");
        return;
      }

      const link = document.createElement("a");
      link.href = imageUrl;
      link.download = imageUrl.split("/").pop() || "spring-flower-result.png";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

 async function shareTest() {
    const shareUrl = "https://test-it.co.kr/test372";
    const shareData = {
      title: "테스트잇 봄꽃 성격 테스트",
      url: shareUrl
    };

    if (navigator.share) {
      try {
        await navigator.share(shareData);
      } catch (e) {}
    } else {
      try {
        await navigator.clipboard.writeText(shareUrl);
        alert("테스트 링크가 복사되었어요.");
      } catch (e) {
        alert("링크 복사에 실패했어요.");
      }
    }
  }

    startBtn.addEventListener("click", () => {
      resetTest();
      showScreen(testScreen);
      renderQuestion();
    });

    retryBtn.addEventListener("click", () => {
      resetTest();
      showScreen(introScreen);
    });

    otherBtn.addEventListener("click", () => {
      window.location.href = "https://test-it.co.kr/";
    });

    saveBtn.addEventListener("click", saveResultImage);
    shareBtn.addEventListener("click", shareTest);
  </script>
