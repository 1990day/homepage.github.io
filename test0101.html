.question-visual .mini-tree {
  position: absolute;
  right: 30px;
  bottom: 20px;
  width: 84px;
  height: 118px;
}

.question-visual .mini-tree::before {
  content: "";
  position: absolute;
  left: 36px;
  bottom: 0;
  width: 10px;
  height: 54px;
  background: #9a7456;
  border-radius: 10px;
}

.question-visual .mini-tree::after {
  content: "";
  position: absolute;
  left: 8px;
  bottom: 34px;
  width: 68px;
  height: 68px;
  border-radius: 50%;
  background: #f4cadc;
  box-shadow:
    -16px 10px 0 #f6dce7,
    18px 8px 0 #efbad1,
    6px -14px 0 #f9e4ee;
}

.question-visual .mini-bush {
  position: absolute;
  left: 160px;
  bottom: 24px;
  width: 62px;
  height: 32px;
  border-radius: 30px;
  background: #98d582;
  box-shadow: -12px 6px 0 #aee39d, 12px 4px 0 #88c773;
}

.question-visual .mini-flower {
  position: absolute;
  width: 10px;
  height: 10px;
  background: #ffb5cb;
  border-radius: 50%;
  box-shadow:
    6px 0 0 #ffd56b,
    -6px 0 0 #ff8eaf,
    0 6px 0 #ffd0da,
    0 -6px 0 #ffe08e;
}

.question-visual .mf1 { left: 150px; bottom: 58px; }
.question-visual .mf2 { left: 184px; bottom: 48px; transform: scale(0.85); }
.question-visual .mf3 { right: 106px; bottom: 55px; transform: scale(0.92); }

.question-visual .mini-petals {
  position: absolute;
  inset: 0;
  overflow: hidden;
  z-index: 2;
  pointer-events: none;
}

.question-visual .mini-petal {
  position: absolute;
  width: 10px;
  height: 7px;
  background: rgba(255, 227, 236, 0.95);
  border-radius: 10px 10px 10px 2px;
  box-shadow: 0 1px 3px rgba(210, 173, 188, 0.18);
  opacity: 0;
  animation: miniFall linear infinite;
}

.question-visual .mini-petal.mp1 { left: 10%; top: -8%; animation-duration: 6.8s; animation-delay: -0.8s; }
.question-visual .mini-petal.mp2 { left: 24%; top: -10%; animation-duration: 7.4s; animation-delay: -2.4s; }
.question-visual .mini-petal.mp3 { left: 40%; top: -6%; animation-duration: 6.2s; animation-delay: -1.5s; }
.question-visual .mini-petal.mp4 { left: 58%; top: -12%; animation-duration: 7.8s; animation-delay: -3.2s; }
.question-visual .mini-petal.mp5 { left: 73%; top: -9%; animation-duration: 6.9s; animation-delay: -4.6s; }
.question-visual .mini-petal.mp6 { left: 86%; top: -7%; animation-duration: 8.2s; animation-delay: -2.1s; }

@keyframes miniFall {
  0% {
    transform: translate3d(0, 0, 0) rotate(0deg) scale(1);
    opacity: 0;
  }
  12% {
    opacity: 1;
  }
  45% {
    transform: translate3d(10px, 60px, 0) rotate(90deg) scale(0.98);
    opacity: 0.95;
  }
  75% {
    transform: translate3d(-6px, 120px, 0) rotate(180deg) scale(0.95);
    opacity: 0.9;
  }
  100% {
    transform: translate3d(14px, 210px, 0) rotate(280deg) scale(0.9);
    opacity: 0;
  }
}

.ox-area {
  margin-top: 0;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.ox-btn {
  position: relative;
  border: none;
  outline: none;
  cursor: pointer;
  min-height: 112px;
  border-radius: 28px;
  box-shadow: var(--shadow-soft);
  transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
  overflow: hidden;
}

.ox-btn:hover {
  transform: translateY(-2px);
}

.ox-btn:active {
  transform: translateY(3px);
}

.ox-btn.o {
  background: linear-gradient(to bottom, #fff8de 0%, #ffe59e 100%);
  box-shadow:
    0 12px 24px rgba(214, 195, 103, 0.22),
    inset 0 2px 0 rgba(255,255,255,0.9),
    0 5px 0 #e8cb73;
}

.ox-btn.x {
  background: linear-gradient(to bottom, #fff1f6 0%, #ffd3e3 100%);
  box-shadow:
    0 12px 24px rgba(227, 165, 192, 0.18),
    inset 0 2px 0 rgba(255,255,255,0.9),
    0 5px 0 #ecb3cb;
}

.ox-btn .symbol {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ox-btn.o .symbol::before {
  content: "";
  width: 52px;
  height: 52px;
  border: 8px solid rgba(117, 132, 92, 0.92);
  border-radius: 50%;
  box-shadow: 0 2px 0 rgba(255,255,255,0.45);
}

.ox-btn.x .symbol::before,
.ox-btn.x .symbol::after {
  content: "";
  position: absolute;
  width: 62px;
  height: 8px;
  background: rgba(131, 104, 121, 0.92);
  border-radius: 999px;
}

.ox-btn.x .symbol::before {
  transform: rotate(45deg);
}

.ox-btn.x .symbol::after {
  transform: rotate(-45deg);
}

.ox-btn .mini-flower {
  position: absolute;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(255,255,255,0.58);
  box-shadow:
    7px 0 0 rgba(255,255,255,0.58),
    3.5px 6px 0 rgba(255,255,255,0.58),
    3.5px -6px 0 rgba(255,255,255,0.58);
  opacity: 0.9;
}

.ox-btn .f1 { left: 16px; top: 18px; transform: scale(0.8); }
.ox-btn .f2 { right: 18px; bottom: 16px; transform: scale(0.9); }
.ox-btn .f3 { right: 20px; top: 18px; transform: scale(0.7); }
.ox-btn .f4 { left: 16px; bottom: 18px; transform: scale(0.78); }

/* result 화면 수정 */
.result-wrap {
  position: relative;
  z-index: 3;
  width: 100%;
  max-width: 430px;

  min-height: 100vh;

.result-image-box {

.result-image {

.result-actions {

.action-btn {

.action-btn:hover {

.action-btn.primary {

@media (max-width: 430px) {

}
</style>
</head>
<body>
  <div class="app">

<script>
const questions = [
  "나는 아직도 부를 수 있는 만화 주제가가 있다.",
  "가끔 문방구 앞에 멈춘다.",
  "하늘을 보면 예쁜 모양의 구름을 찾는다.",
  "놀이공원에 가면 범퍼카 한 번은 타야한다.",
  "뽑기 기계 앞에서 승부욕이 생긴다.",
  "어릴 때 별명을 아직 기억한다.",
  "남 모르게 횡단보도 하얀색 선만 밟을 때가 있다.",
  "내가 만화의 주인공이라고 상상할 때가 있다.",
  "우리 집에 왜 왔니 가사가 자동 재생된다.",
  "종이를 보면 비행기 한 번은 접어본다.",
  "음식 먹을 때 제일 맛있는 건 마지막에 먹는다.",
  "나는 아직도 학교 앞에서 먹던 컵 떡볶이가 생각난다.",
  "눈이 오면 첫 발자국을 찍고 싶어진다.",
  "놀이터를 지나가면 한 번쯤 그네가 타고 싶어진다.",
  "종 치는 소리를 들으면 괜히 반응한다.",
  "비밀 얘기할 때 괜히 목소리가 더 작아진다.",
  "버튼을 보면 누르고 싶다.",
  "누군가 내 이름을 불러주면 괜히 반갑다.",
  "나는 아직도 어릴 때 만들었던 이메일을 사용한다.",
  "포장지를 뜯기 전에 괜히 한번 흔들어본다."
];

const mainScreen = document.getElementById("mainScreen");
const testScreen = document.getElementById("testScreen");
const resultScreen = document.getElementById("resultScreen");

const startBtn = document.getElementById("startBtn");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const saveImageBtn = document.getElementById("saveImageBtn");
const goMainBtn = document.getElementById("goMainBtn");
const shareBtn = document.getElementById("shareBtn");

const questionCount = document.getElementById("questionCount");
const progressBar = document.getElementById("progressBar");
const questionText = document.getElementById("questionText");
const resultImage = document.getElementById("resultImage");

let currentIndex = 0;
let score = 0;
let locked = false;

function showScreen(screen) {
  mainScreen.classList.remove("active");
  testScreen.classList.remove("active");
  resultScreen.classList.remove("active");
  screen.classList.add("active");
  window.scrollTo(0, 0);
}

function renderQuestion() {
  questionCount.textContent = `QUESTION ${currentIndex + 1} / ${questions.length}`;
  questionText.textContent = questions[currentIndex];
  progressBar.style.width = `${(currentIndex / questions.length) * 100}%`;
}

function startTest() {
  currentIndex = 0;
  score = 0;
  locked = false;
  renderQuestion();
  showScreen(testScreen);
}

function chooseAnswer(isYes) {
  if (locked) return;
  locked = true;

  if (isYes) {
    score += 1;
  }

  currentIndex += 1;

  setTimeout(() => {
    if (currentIndex < questions.length) {
      renderQuestion();
      locked = false;
    } else {
      showResult();
    }
  }, 160);
}

function showResult() {
  progressBar.style.width = "100%";
  resultImage.src = `img0101_${score}.png`;
  resultImage.alt = `동심 테스트 결과 ${score}점`;
  showScreen(resultScreen);
  locked = false;
}

function goMain() {
  showScreen(mainScreen);
}

startBtn.addEventListener("click", startTest);
yesBtn.addEventListener("click", () => chooseAnswer(true));
noBtn.addEventListener("click", () => chooseAnswer(false));
goMainBtn.addEventListener("click", goMain);

saveImageBtn.addEventListener("click", () => {
  const link = document.createElement("a");
  link.href = resultImage.src;
  link.download = "동심테스트_결과.png";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

shareBtn.addEventListener("click", () => {
  if (navigator.share) {
    navigator.share({
      title: "동심 테스트",
      text: "나의 동심 지수는 몇 점일까? 테스트해보세요!",
      url: window.location.href,
    }).catch(console.error);
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => {
      alert("테스트 링크가 복사되었습니다!");
    });
  }
});
</script>
