<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST_IT Precision OS v1.0</title>
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <style>
        /* 폰트 불러오기 */
        @import url('https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css');
        @font-face {
            font-family: 'Umdot';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/Umdot12.woff2') format('woff2');
            font-weight: normal;
            font-display: swap;
        }

        :root {
            /* 고전 회색 테마 */
            --win-bg: #c0c0c0; 
            --win-border-light: #ffffff;
            --win-border-dark: #808080; 
            --win-border-black: #000000;
            
            /* 핑크 포인트 색상 */
            --point-pink: #ff69b4; 
            --point-pink-dark: #c71585; 
        }

        body.container {
            background-color: #008080; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            font-family: 'Umdot', 'Mona', sans-serif;
            color: #000;
        }

        /* --- 고전 컴퓨터 메뉴바 스타일로 완벽하게 녹여낸 헤더 --- */
        .header-wrapper {
            width: 100%;
            background-color: var(--win-bg); 
            border-bottom: 2px solid var(--win-border-dark); 
            box-shadow: 0 1px 0 var(--win-border-light); 
            align-self: flex-start;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
            padding: 6px 4% !important; /* 여백 최소화해서 얇게 유지 */
        }

        /* 기존 이미지 대신 텍스트로 고전 윈도우 느낌 로고 구현 */
        .retro-logo {
            text-decoration: none;
            color: var(--point-pink-dark);
            font-size: 20px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            text-shadow: 1px 1px 0px var(--win-border-light);
        }

        .page-header h1 {
            margin: 0 !important;
            padding: 0 !important;
            border-bottom: none !important;
        }

        .main-nav {
            display: flex;
            flex-wrap: nowrap !important;
            align-items: center;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 8px;
        }

        .main-nav li {
            margin-left: 0;
        }

        .main-nav a {
            display: block;
            text-decoration: none;
            color: #000;
            font-weight: 700;
            background: var(--win-bg);
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            border-right: 2px solid var(--win-border-dark);
            border-bottom: 2px solid var(--win-border-dark);
            padding: 4px 10px;
            font-size: 14px;
            white-space: nowrap;
            box-sizing: border-box;
        }

        .main-nav a:active {
            border-top: 2px solid var(--win-border-dark);
            border-left: 2px solid var(--win-border-dark);
            border-right: 2px solid var(--win-border-light);
            border-bottom: 2px solid var(--win-border-light);
            padding: 5px 9px 3px 11px; /* 눌리는 효과 */
        }

        /* 모바일 반응형 */
        @media (max-width: 480px) {
            .page-header {
                padding: 4px 2% !important;
            }
            .retro-logo {
                font-size: 16px; /* 폰트 살짝 축소 */
            }
            .main-nav {
                gap: 4px; 
            }
            .main-nav a {
                padding: 4px 6px; 
                font-size: 13px; 
                letter-spacing: -0.5px; 
            }
        }
        /* --- 헤더 CSS 끝 --- */

        .window {
            width: 95%; 
            max-width: 600px;
            background: var(--win-bg);
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            border-right: 2px solid var(--win-border-black);
            border-bottom: 2px solid var(--win-border-black);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
            margin-top: 20px; 
            margin-bottom: 20px;
        }

        .title-bar {
            background: linear-gradient(90deg, var(--point-pink-dark), var(--point-pink));
            color: white;
            padding: 6px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 16px;
        }

        .title-bar-controls span {
            display: inline-block;
            width: 18px; height: 16px; text-align: center; line-height: 16px;
            background: var(--win-bg); color: black; font-size: 14px;
            border-top: 1px solid var(--win-border-light);
            border-left: 1px solid var(--win-border-light);
            border-right: 1px solid var(--win-border-black);
            border-bottom: 1px solid var(--win-border-black);
            cursor: pointer; margin-left: 2px;
        }

        .content {
            flex: 1; padding: 15px; overflow-y: auto;
            border-top: 2px solid var(--win-border-dark);
            border-left: 2px solid var(--win-border-dark);
            border-right: 2px solid var(--win-border-light);
            border-bottom: 2px solid var(--win-border-light);
            margin: 5px; background: var(--win-bg);
        }

        .screen { display: none; text-align: center; }
        .screen.active { display: block; }

        h1 { font-size: 22px; border-bottom: 2px groove var(--win-border-light); padding-bottom: 10px; margin-bottom: 20px; }

        .select-group { margin: 20px 0; background: #fff; border: 2px inset var(--win-border-dark); padding: 15px; }
        
        select { 
            padding: 5px; border: 2px inset var(--win-border-dark); 
            font-size: 16px; margin: 5px; outline: none; 
            font-family: inherit; 
        }

        .win-btn {
            background: var(--win-bg);
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            border-right: 2px solid var(--win-border-black);
            border-bottom: 2px solid var(--win-border-black);
            padding: 12px 20px; cursor: pointer; font-size: 16px; width: 100%; box-sizing: border-box;
            font-family: inherit; 
        }
        .win-btn:active {
            border-top: 2px solid var(--win-border-black);
            border-left: 2px solid var(--win-border-black);
            border-right: 2px solid var(--win-border-light);
            border-bottom: 2px solid var(--win-border-light);
            padding: 13px 19px 11px 21px;
        }

        .q-card {
            background: #fff; border: 2px inset var(--win-border-dark); 
            padding: 20px; margin: 20px 0; min-height: 80px; 
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            text-align: center; word-break: keep-all; line-height: 1.5;
        }
        
        .ans-btn {
            display: block; width: 100%; text-align: center; padding: 15px; margin-bottom: 10px;
            background: var(--win-bg); 
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            border-right: 2px solid var(--win-border-black);
            border-bottom: 2px solid var(--win-border-black);
            cursor: pointer; font-size: 16px; word-break: keep-all; 
            font-family: inherit; 
        }
        .ans-btn:active {
            border-top: 2px solid var(--win-border-black);
            border-left: 2px solid var(--win-border-black);
            border-right: 2px solid var(--win-border-light);
            border-bottom: 2px solid var(--win-border-light);
        }

        #capture-area {
            background-color: var(--win-bg);
            padding: 15px;
            border: 2px inset var(--win-border-dark);
            margin-bottom: 20px;
        }

        #capture-area h1 {
            font-size: 17px; 
            white-space: nowrap; 
            text-align: center;
            letter-spacing: -0.5px; 
        }

        .res-top-grid {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .res-box {
            flex: 1;
            background: #fff;
            border: 2px inset var(--win-border-dark);
            padding: 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .res-label { 
            font-size: 13px; color: white; 
            padding: 4px 5px; margin-bottom: 10px; display: inline-block; 
            background-color: var(--point-pink);
        }
        .res-title { font-size: 26px; color: #d32f2f; margin-bottom: 5px; }
        #res-test-name { color: #1976d2; }
        .res-subtitle { font-size: 15px; color: #555; margin-top: 5px; }

        .traits-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .traits-col {
            background: #fff;
            border: 2px inset var(--win-border-dark);
            padding: 15px;
            text-align: center; 
        }

        .traits-title {
            font-size: 18px;
            color: #000;
            border-bottom: 2px solid var(--win-border-dark);
            padding-bottom: 8px;
            margin-bottom: 15px;
            text-align: center;
            background: var(--win-bg);
            border: 1px solid var(--win-border-light);
            border-right-color: var(--win-border-dark);
            border-bottom-color: var(--win-border-dark);
        }

        .traits-col ul { list-style: none; padding: 0; margin: 0; }
        
        .traits-col li {
            font-size: 15px;
            color: #000000;
            margin-bottom: 15px;
            line-height: 1.6;
            text-align: center; 
            word-break: keep-all;
        }
        .traits-col li::before { 
            content: none; 
        }

        .action-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body class="container">

    <div class="header-wrapper">
        <header class="page-header wrapper">
            <h1><a href="index.html" class="retro-logo">💝 테스트잇</a></h1>
            <nav>
                <ul class="main-nav">
                    <li><a href="https://test-it.co.kr/test.html">성격</a></li>
                    <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
                    <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
                    <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
                </ul>
            </nav>
        </header>
    </div>

    <div class="window" id="capture-window">
        <div class="title-bar">
            <span>TEST_IT.EXE</span>
            <div class="title-bar-controls">
                <span>_</span><span>□</span><span>×</span>
            </div>
        </div>
        
        <div class="content">
            <div id="scr-start" class="screen active">
                <img src="img_main370.png" alt="테스트잇 사주 x MBTI" style="width: 100%; display: block; border: 2px inset var(--win-border-dark); box-sizing: border-box; margin-bottom: 20px;">
                
                <div>
                    <button class="win-btn" onclick="showScreen('scr-input')">분석 시작하기</button>
                </div>
            </div>

            <div id="scr-input" class="screen">
                <h1>운명 데이터 입력</h1>
                <div class="select-group">
                    <p style="font-size: 16px; margin-bottom: 15px;">생년월일을 선택하세요.</p>
                    <select id="year"></select>
                    <select id="month"></select>
                    <select id="day"></select>
                </div>
                <div style="margin-top: 30px;">
                    <button class="win-btn" onclick="beginAnalysis()">테스트 진행</button>
                </div>
            </div>

            <div id="scr-test" class="screen">
                <h2 id="q-idx" style="font-size: 16px; background: #000; color: var(--point-pink); padding: 5px; display: inline-block;">진행 중...</h2>
                <div class="q-card" id="q-txt"></div>
                <div id="ans-list"></div>
            </div>

            <div id="scr-res" class="screen">
                <div id="capture-area">
                    <h1>테스트잇 사주 MBTI 성격 테스트</h1>
                    
                    <div class="res-top-grid">
                        <div class="res-box">
                            <span class="res-label">사주 성향</span>
                            <span id="res-saju-name" class="res-title"></span>
                            <span id="res-saju-mbti" class="res-subtitle"></span>
                        </div>
                        <div class="res-box">
                            <span class="res-label">테스트 성향</span>
                            <span id="res-test-name" class="res-title"></span>
                            <span class="res-subtitle">현재 심리 상태</span>
                        </div>
                    </div>

                    <div class="traits-layout">
                        <div class="traits-col">
                            <div class="traits-title">사주 성향</div>
                            <ul id="res-saju-body"></ul>
                        </div>
                        <div class="traits-col">
                            <div class="traits-title">테스트 성향</div>
                            <ul id="res-test-body"></ul>
                        </div>
                    </div>
                </div>

                <div class="action-btns" id="action-btns">
                    <button class="win-btn" onclick="saveAsImage()">결과 이미지 저장하기</button>
                    <button class="win-btn" onclick="location.reload()">다시 해보기</button>
                    <button class="win-btn" onclick="location.href='https://test-it.co.kr'">다른 테스트 해보기</button>
                    <button class="win-btn" onclick="alert('테스트 공유 기능이 실행됩니다.')">테스트 공유하기</button>
                </div>
            </div>
        </div>
    </div>

<script>
    const ys = document.getElementById('year');
    for(let i=2026; i>=1940; i--) {
        if(i === 1990) {
            ys.innerHTML += `<option value="${i}" selected>${i}년</option>`;
        } else {
            ys.innerHTML += `<option value="${i}">${i}년</option>`;
        }
    }
    
    const ms = document.getElementById('month');
    for(let i=1; i<=12; i++) ms.innerHTML += `<option value="${i}">${i}월</option>`;
    
    const ds = document.getElementById('day');
    for(let i=1; i<=31; i++) ds.innerHTML += `<option value="${i}">${i}일</option>`;

    const stemToHangul = {"甲":"갑", "乙":"을", "丙":"병", "丁":"정", "戊":"무", "己":"기", "庚":"경", "辛":"신", "壬":"임", "癸":"계"};
    const zhiToHangul = {"子":"자", "丑":"축", "寅":"인", "卯":"묘", "辰":"진", "巳":"사", "午":"오", "未":"미", "申":"신", "酉":"유", "戌":"술", "亥":"해"};

    const iljuToMBTI = {
        "갑자": "ENFP", "갑술": "ENTJ", "갑신": "ENTP", "갑오": "ENFJ", "갑진": "ENTJ", "갑인": "ESTJ",
        "을축": "ISFJ", "을해": "INFP", "을유": "ISTP", "을미": "ISFP", "을사": "ESFP", "을묘": "INFP",
        "병자": "ENFJ", "병술": "ENFP", "병신": "ENTP", "병오": "ESTP", "병진": "ESFJ", "병인": "ENFJ",
        "정축": "ISFJ", "정해": "INFJ", "정유": "ISFP", "정미": "INFP", "정사": "ESTP", "정묘": "INFP",
        "무자": "ISTJ", "무술": "ESTJ", "무신": "ENTP", "무오": "ESTP", "무진": "ESTJ", "무인": "ENTJ",
        "기축": "ISFJ", "기해": "ISFP", "기유": "ISTP", "기미": "ESTJ", "기사": "ESFJ", "기묘": "ISTJ",
        "경자": "ENTP", "경술": "ENTJ", "경신": "ESTJ", "경오": "ESTJ", "경진": "ENTJ", "경인": "ESTP",
        "신축": "ISTJ", "신해": "INTP", "신유": "ISTJ", "신미": "ISFP", "신사": "INTJ", "신묘": "ISTP",
        "임자": "ENTP", "임술": "ENTJ", "임신": "INTP", "임오": "ENFJ", "임진": "ENTJ", "임인": "ENFP",
        "계축": "INTJ", "계해": "INTP", "계유": "ISFJ", "계미": "ISFP", "계사": "ESFJ", "계묘": "INFP"
    };

    const mbtiTraits = {
        ISTJ: ["원칙과 계획을 매우 중시함", "책임감이 강해 신뢰할 수 있음", "규칙과 질서를 철저히 지킴", "매사에 철저하고 빈틈이 없음", "변화보다는 안정을 추구함", "한번 시작한 일은 끝을 봄"],
        ISFJ: ["조용하고 헌신적인 조력자임", "타인의 감정을 세심하게 살핌", "따뜻하고 친절한 성격을 가짐", "갈등을 피하고 평화를 원함", "책임감이 강해 맡은 바를 다함", "눈치가 빠르고 세심함"],
        INFJ: ["통찰력이 매우 뛰어난 편임", "확고한 가치관과 신념을 가짐", "타인의 감정에 깊이 공감함", "혼자만의 사색 시간이 필요함", "은근한 완벽주의 성향이 있음", "소수의 사람과 아주 깊게 사귐"],
        INTJ: ["전략적이고 논리적인 사고를 함", "목표 달성에 매우 효율적임", "완벽주의 성향이 꽤 강함", "독립적이고 주관이 뚜렷함", "감정보다는 이성을 중시함", "계획을 철저하고 치밀하게 세움"],
        ISTP: ["상황 적응력이 매우 빠름", "손재주가 좋고 다재다능함", "과묵하고 분석적인 관찰자임", "효율성을 극도로 추구함", "독립적이고 간섭받는 것을 싫어함", "현재에 집중하는 현실주의자임"],
        ISFP: ["온화하고 겸손한 성격을 가짐", "예술적이고 감각적인 면이 뛰어남", "현재의 소소한 행복을 즐김", "얽매이지 않는 자유로운 영혼임", "강요받는 것을 매우 싫어함", "딱딱한 규칙이나 틀을 싫어함"],
        INFP: ["상상력이 풍부하고 창의적임", "따뜻하고 낭만적인 성향임", "타인을 잘 이해하고 온전히 수용함", "자신의 가치관과 신념을 중시함", "규칙이나 틀에 갇히는 것을 답답해함", "진정성 있는 깊은 관계를 원함"],
        INTP: ["지적 호기심이 매우 강함", "비판적이고 논리적인 사고를 함", "새로운 아이디어 탐구를 즐김", "원리를 분석하고 이해하는 것을 좋아함", "평범하고 반복되는 것을 지루해함", "복잡한 문제 해결 능력이 뛰어남"],
        ESTP: ["행동력이 넘치고 에너지가 많음", "센스가 있고 눈치가 매우 빠름", "문제를 즉각적으로 해결함", "모험과 스릴을 즐기는 편임", "규칙보다는 융통성을 중요시함", "임기응변과 순발력이 매우 능함"],
        ESFP: ["낙천적이고 긍정적인 에너지를 줌", "사교적이고 사람 만나는 것을 좋아함", "모임에서 분위기 메이커 역할을 함", "현재의 즐거움과 행복을 가장 중시함", "엄격한 규칙이나 계획을 답답해함", "융통성이 있고 얽매이지 않음"],
        ENFP: ["창의적이고 매사에 열정적임", "항상 새로운 가능성을 찾아다님", "감수성이 풍부하고 공감 능력이 뛰어남", "반복되는 일상이나 업무를 지루해함", "돌발 상황에서 임기응변에 강함", "통제받거나 규칙에 얽매이는 것을 싫어함"],
        ENTP: ["두뇌 회전이 매우 빠르고 명석함", "재치가 넘치고 말솜씨가 뛰어남", "기존의 틀을 깨고 변화를 좋아함", "논쟁하고 토론하는 것을 매우 즐김", "독창적인 아이디어가 끊임없이 나옴", "단순하고 반복적인 일을 싫어함"],
        ESTJ: ["체계적이고 정해진 규칙을 잘 지킴", "질서와 업무의 효율성을 중시함", "맡은 일에 대한 책임감이 매우 투철함", "감정보다는 논리와 사실을 우선시함", "전통과 권위 체계를 존중함", "생각을 직설적이고 명확하게 표현함"],
        ESFJ: ["사교성이 매우 뛰어나고 친화력이 좋음", "공동체의 화합과 조화를 최우선함", "주변 사람들에게 관심이 많고 잘 챙김", "전통과 보편적인 규칙을 잘 따름", "칭찬과 인정을 받는 것을 매우 좋아함", "동정심이 많고 마음이 따뜻함"],
        ENFJ: ["부드러운 카리스마와 리더십이 있음", "타인의 감정에 깊이 공감하고 이해함", "사람들을 긍정적인 방향으로 이끌어줌", "조화롭고 평화로운 인간관계를 중시함", "직관력이 뛰어나고 상황 파악이 빠름", "타인의 성장과 발전을 돕는 것을 즐김"],
        ENTJ: ["결단력과 추진력이 매우 강함", "장기적인 비전과 목표를 가지고 있음", "어디서든 리더 역할을 자연스럽게 맡음", "효율성과 성과 도출을 가장 중시함", "어려운 도전과 성취를 즐김", "상황에 대한 통제력이 강하고 단호함"]
    };

    const questions = [
        { q: "모임이 생겼을 때 나의 모습은?", type: "EI", a: "사람들과 어울리며 분위기를 주도한다", b: "조용히 경청하며 상황을 지켜본다" },
        { q: "휴일이 생기면 주로 하는 일은?", type: "EI", a: "밖으로 나가서 지인들을 만난다", b: "집에서 혼자만의 시간을 보낸다" },
        { q: "모르는 사람과 대화할 때 나는?", type: "EI", a: "어색함 없이 먼저 말을 건다", b: "상대방이 먼저 다가오길 기다린다" },
        { q: "이야기를 들을 때 더 집중하는 부분은?", type: "SN", a: "구체적인 사실과 현재 일어난 상황", b: "이면의 숨은 의미와 미래의 가능성" },
        { q: "새로운 기술을 배울 때 나는?", type: "SN", a: "기본 매뉴얼을 정독하며 익힌다", b: "직관적으로 만져보며 원리를 파악한다" },
        { q: "꿈이나 상상을 할 때 주로?", type: "SN", a: "현실에서 일어날 법한 일들을 생각한다", b: "현실과는 거리가 먼 판타지를 꿈꾼다" },
        { q: "친구가 힘든 고민을 이야기하면?", type: "TF", a: "상황을 분석해서 해결책을 제시해준다", b: "친구의 마음을 먼저 공감하고 위로한다" },
        { q: "일을 할 때 더 중요한 가치는?", type: "TF", a: "논리적인 결과와 업무의 효율성", b: "동료와의 관계와 즐거운 분위기" },
        { q: "비판을 들었을 때 나의 속마음은?", type: "TF", a: "내용이 맞다면 수긍하고 개선한다", b: "말투나 감정이 상해 한참 생각한다" },
        { q: "여행을 떠나기 전 나의 준비는?", type: "JP", a: "시간별로 동선과 일정을 미리 짠다", b: "큰 틀만 정하고 끌리는 대로 간다" },
        { q: "과제 마감 시간이 다가오면?", type: "JP", a: "미리 끝내두고 마음 편히 쉰다", b: "마지막 순간에 몰입해서 해치운다" },
        { q: "주변 정리정돈 상태는 어떤가요?", type: "JP", a: "물건 위치가 정해져 있고 깔끔하다", b: "조금 어질러져 있어도 찾는 건 다 찾는다" }
    ];

    let currentIdx = 0, score = { EI: 0, SN: 0, TF: 0, JP: 0 }, userIlju = "", displayIlju = "";

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function beginAnalysis() {
        const y = parseInt(document.getElementById('year').value);
        const m = parseInt(document.getElementById('month').value);
        const d = parseInt(document.getElementById('day').value);

        const solar = Solar.fromYmdHms(y, m, d, 12, 0, 0);
        const lunar = solar.getLunar();
        const eightChar = lunar.getEightChar();
        
        const sajuGan = eightChar.getDayGan();
        const sajuZhi = eightChar.getDayZhi();
        
        userIlju = (stemToHangul[sajuGan] || "") + (zhiToHangul[sajuZhi] || "");
        displayIlju = userIlju; 
        
        showScreen('scr-test');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('q-idx').innerText = `PROCESS ${currentIdx + 1} / 12`;
        document.getElementById('q-txt').innerText = q.q;
        const area = document.getElementById('ans-list');
        area.innerHTML = "";

        [q.a, q.b].forEach((txt, i) => {
            const btn = document.createElement('button');
            btn.className = "ans-btn";
            btn.innerText = txt;
            btn.onclick = () => {
                if(i === 0) score[q.type]++;
                currentIdx++;
                if(currentIdx < questions.length) renderQuestion();
                else showResult();
            };
            area.appendChild(btn);
        });
    }

    function showResult() {
        showScreen('scr-res');
        
        let testMbtiResult = "";
        testMbtiResult += score.EI >= 2 ? "E" : "I";
        testMbtiResult += score.SN >= 2 ? "S" : "N";
        testMbtiResult += score.TF >= 2 ? "T" : "F";
        testMbtiResult += score.JP >= 2 ? "J" : "P";

        const sajuMbtiResult = iljuToMBTI[userIlju] || "분석 불가";

        document.getElementById('res-saju-name').innerText = sajuMbtiResult;
        document.getElementById('res-saju-mbti').innerText = displayIlju + "일주";
        document.getElementById('res-test-name').innerText = testMbtiResult;
        
        let sajuTraitsHtml = "";
        if(mbtiTraits[sajuMbtiResult]) {
            mbtiTraits[sajuMbtiResult].forEach(trait => {
                sajuTraitsHtml += `<li>${trait}</li>`;
            });
        } else {
            sajuTraitsHtml = "<li>해당 일주의 특성 데이터를 불러올 수 없습니다.</li>";
        }
        document.getElementById('res-saju-body').innerHTML = sajuTraitsHtml;

        let testTraitsHtml = "";
        mbtiTraits[testMbtiResult].forEach(trait => {
            testTraitsHtml += `<li>${trait}</li>`;
        });
        document.getElementById('res-test-body').innerHTML = testTraitsHtml;
    }

    function saveAsImage() {
        const btns = document.getElementById('action-btns');
        btns.style.display = 'none';

        html2canvas(document.getElementById('capture-window'), {
            scale: 2, 
            backgroundColor: null 
        }).then(canvas => {
            btns.style.display = 'flex';
            const imgData = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = '테스트잇_사주MBTI.png';
            link.href = imgData;
            link.click();
        });
    }
</script>
