<!DOCTYPE html>
<html lang="ko">
<head>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="내가 포켓몬 트레이너가 된다면?" />
  <meta name="keywords" content="테스트잇, MBTI, 성격테스트, 포켓몬, 픽셀테스트, 픽셀MBTI, 테스트잇MBTI" />

  <meta property="og:type" content="website" />
  <meta property="og:title" content="내가 포켓몬 트레이너가 된다면?" />
  <meta property="og:description" content="내가 포켓몬 트레이너가 된다면?" />
  <meta property="og:image" content="https://test-it.co.kr/img_main0011.png" />
  <meta property="og:url" content="https://test-it.co.kr/test0011" />
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Galmuri11:wght@400;700&family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #fefce0;
      --paper: #ffffff;
      --folder: #f9eb91;
      --folder-light: #fefce0;
      --line: #4a4136;
      --yellow: #f9eb91;
      --yellow-soft: #fefce0;
      --text: #2a241d;
      --sub: #6b6257;
      --shadow: 2px 2px 0 rgba(74, 65, 54, 0.16);
      --pixel-border: 2px solid #4a4136;
      --header-h: 60px;
      --max-width: 620px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Pretendard", sans-serif;
      word-break: keep-all;
    }

    body {
      min-height: 100vh;
      background-image:
        linear-gradient(to right, rgba(249, 235, 145, 0.4) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(249, 235, 145, 0.4) 1px, transparent 1px);
      background-size: 16px 16px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      display: block;
      max-width: 100%;
    }

    button {
      font-family: inherit;
    }

    .wrapper {
      width: min(calc(100% - 32px), 980px);
      margin: 0 auto;
    }

    .page-header {
      position: sticky;
      top: 0;
      z-index: 30;
      min-height: var(--header-h);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 10px 0;
      background: rgba(254, 252, 224, 0.88);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(74, 65, 54, 0.06);
    }

    .logo-text {
      display: inline-flex;
      align-items: center;
      font-size: 15px;
      line-height: 1;
      letter-spacing: -0.01em;
      color: #5b4a2e;
      padding: 7px 10px;
      border: 1.5px solid rgba(91, 74, 46, 0.14);
      background: var(--folder);
      border-radius: 999px;
      box-shadow: 0 1px 4px rgba(91, 74, 46, 0.05);
      flex: 0 0 auto;
    }

    .main-nav {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 7px;
      flex: 1 1 auto;
      min-width: 0;
      flex-wrap: nowrap;
    }

    .main-nav a {
      padding: 7px 10px;
      border: 1.5px solid rgba(74, 65, 54, 0.12);
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 1px 4px rgba(74, 65, 54, 0.03);
      font-size: 13px;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
      border-radius: 999px;
      color: #5b5147;
    }

    .main {
      padding: 18px 0 56px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .folder-shell {
      position: relative;
      max-width: var(--max-width);
      margin: 0 auto;
      padding-top: 24px;
    }

    .folder-tab {
      position: absolute;
      left: 16px;
      top: 0;
      min-width: 180px;
      padding: 11px 16px 9px;
      border: var(--pixel-border);
      border-bottom: none;
      background: linear-gradient(to bottom, var(--folder-light), var(--folder));
      font-size: 13px;
      font-weight: 700;
      color: #584a32;
      box-shadow: 0 2px 10px rgba(74, 65, 54, 0.06);
      z-index: 2;
      border-top-left-radius: 18px;
      border-top-right-radius: 18px;
    }

    .folder-body {
      position: relative;
      border: var(--pixel-border);
      background: linear-gradient(to bottom, var(--folder-light) 0 48px, var(--paper) 48px 100%);
      box-shadow: var(--shadow);
      padding: 18px;
      min-height: 0;
      border-radius: 24px;
    }

    .folder-inner {
      margin-top: 18px;
      background: transparent;
      padding: 0;
      box-shadow: none;
      border: none;
    }

    .start-only-wrap {
      display: grid;
      gap: 16px;
    }

    .main-image-wrap {
      background: transparent;
      overflow: hidden;
      box-shadow: none;
      border: none;
      border-radius: 18px;
    }

    .main-image {
      width: 100%;
      height: auto;
      display: block;
      background: var(--bg);
      border-radius: 18px;
    }

    .start-btn,
    .choice-btn,
    .action-btn {
      width: 100%;
      border: var(--pixel-border);
      background: var(--yellow);
      color: var(--text);
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform 0.05s ease, box-shadow 0.05s ease;
      border-radius: 18px;
    }

    .start-btn:active,
    .choice-btn:active,
    .action-btn:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 rgba(74, 65, 54, 0.14);
    }

    .start-btn {
      height: 56px;
      font-size: 17px;
      font-weight: 700;
    }

    .progress-wrap {
      margin-bottom: 16px;
      display: grid;
      gap: 10px;
    }

    .progress-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #5f564c;
    }

    .progress-bar {
      position: relative;
      width: 100%;
      height: 20px;
      border: var(--pixel-border);
      background: var(--paper);
      overflow: visible;
      box-shadow: inset 0 -2px 0 rgba(74, 65, 54, 0.06);
      border-radius: 999px;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background:
        repeating-linear-gradient(
          90deg,
          var(--folder) 0 14px,
          #ebd65c 14px 28px
        );
      transition: width 0.25s ease;
      border-radius: 999px;
    }

    .progress-pichu {
      position: absolute;
      top: 50%;
      left: 0%;
      width: 36px;
      height: 36px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 3;
    }

    .progress-pichu img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .question-box {
      margin-top: 8px;
      border: var(--pixel-border);
      background: var(--paper);
      padding: 18px 14px;
      box-shadow: inset 0 -2px 0 rgba(74, 65, 54, 0.06);
      border-radius: 20px;
    }

    .question-text {
      margin: 0;
      font-size: 22px;
      line-height: 1.5;
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .question-note {
      display: none !important;
    }

    .choices {
      margin-top: 16px;
      display: grid;
      gap: 10px;
    }

    .choice-btn {
      text-align: left;
      padding: 16px 14px;
      background: var(--yellow-soft);
    }

    .choice-btn:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .choice-top {
      display: none;
    }

    .choice-desc {
      margin: 0;
      color: var(--sub);
      font-size: 15px;
      line-height: 1.55;
      font-weight: 700;
    }

    .result-image-only {
      border: var(--pixel-border);
      background: var(--paper);
      overflow: hidden;
      box-shadow: var(--shadow);
      border-radius: 18px;
    }

    .result-image-only img {
      width: 100%;
      display: block;
    }

    .action-buttons {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }

    .action-btn {
      height: 52px;
      background: var(--bg);
      font-size: 15px;
      font-weight: 800;
    }

    .loading {
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      min-height: 380px;
      padding: 40px 20px;
    }

    .loading.active {
      display: flex;
    }

    .loading-box {
      width: 100%;
      max-width: 460px;
      border: var(--pixel-border);
      background: var(--paper);
      box-shadow: var(--shadow);
      padding: 28px 20px;
      border-radius: 24px;
    }

    .loading-title {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      line-height: 1.5;
    }

    .loading-desc {
      margin: 12px 0 0;
      color: var(--sub);
      font-size: 14px;
      line-height: 1.7;
    }

    .loading-sprite {
      width: 120px;
      height: 120px;
      display: block;
      margin: 0 auto 10px auto;
      background: url("ld_img0011.png") no-repeat center center / contain;
      position: relative;
      animation: floaty 0.8s steps(2) infinite;

      image-rendering: -moz-crisp-edges;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    @keyframes floaty {
      0% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
      100% { transform: translateY(0); }
    }

    .copyright-text {
      margin-top: 20px;
      text-align: center;
      font-size: 10px;
      color: var(--sub);
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: -0.02em;
    }

    @media (min-width: 769px) {
      .copyright-text {
        font-size: 12px;
      }

      .main {
        padding-top: 14px;
      }

      .folder-shell {
        max-width: 600px;
      }
    }

    @media (max-width: 768px) {
      .wrapper {
        width: min(calc(100% - 24px), 100%);
      }

      .page-header {
        min-height: 56px;
        gap: 10px;
      }

      .logo-text {
        font-size: 14px;
        padding: 7px 9px;
      }

      .main-nav {
        gap: 6px;
      }

      .main-nav a {
        font-size: 12px;
        padding: 7px 9px;
      }

      .folder-shell {
        max-width: 100%;
        padding-top: 28px;
      }

      .folder-tab {
        left: 12px;
        min-width: 170px;
        padding: 10px 14px 9px;
        font-size: 12px;
      }

      .folder-body {
        padding: 18px 14px 18px;
        min-height: auto;
        border-radius: 22px;
        background: linear-gradient(to bottom, var(--folder-light) 0 46px, var(--paper) 46px 100%);
      }

      .folder-inner {
        padding: 0;
        border: none;
        box-shadow: none;
        background: transparent;
        border-radius: 0;
        margin-top: 4px;
      }

      .main-image-wrap,
      .result-image-only {
        border-radius: 16px;
      }

      .question-box {
        border-radius: 18px;
      }

      .question-text {
        font-size: 21px;
      }

      .start-btn {
        font-size: 16px;
      }

      .progress-pichu {
        width: 33px;
        height: 33px;
      }
    }

    @media (max-width: 430px) {
      .page-header {
        gap: 8px;
      }

      .logo-text {
        font-size: 13px;
        padding: 6px 8px;
      }

      .main-nav a {
        font-size: 11px;
        padding: 6px 7px;
      }

      .progress-pichu {
        width: 30px;
        height: 30px;
      }

      .copyright-text {
        font-size: 9px;
      }
    }
  </style>
</head>
<body>
  <header class="page-header wrapper">
    <a href="/" class="logo-text" aria-label="테스트잇 홈">테스트잇</a>

  <main class="main wrapper">

        <div class="folder-body">

    <section id="question-screen" class="screen">

        <div class="folder-body">
          <div class="folder-inner">
            <div class="progress-wrap">
              <div class="progress-top">
                <span id="progress-text">QUESTION 1 / 12</span>

              </div>

                <button type="button" class="choice-btn" id="choice-b">
                  <div class="choice-top">
                    <span class="choice-badge">A</span>

              <div class="copyright-text">

        <h2 class="loading-title">결과를 불러오는 중</h2>

    </section>

    <section id="result-screen" class="screen">
      <div class="folder-shell">
        <div class="folder-tab">내가 포켓몬 트레이너가 된다면?</div>
        <div class="folder-body">
          <div class="folder-inner">
            <div id="result-capture">

  </main>

  <script>
    const questions = [
      {
        axis: "E",
        score: true,
        question: "파트너 포켓몬을 만나는 날! 첫 만남에서 나는?",
        a: { text: "먼저 말을 붙이고 분위기를 빠르게 파악한다", value: "E" },
        b: { text: "잠깐 지켜보다가 편한 타이밍에 천천히 다가간다", value: "I" }
      },
      {
        axis: "S",
        score: true,
        question: "낯선 지방을 찾아가야 할 때 나는?",
        a: { text: "지도의 건물명과 거리를 꼼꼼히 확인하며 간다", value: "S" },
        b: { text: "대략적인 방향만 보고 일단 감으로 직진한다", value: "N" }
      },
      {
        axis: "T",
        score: true,
        question: "배틀에서 아쉽게 패배했을 때 듣고 싶은 말은?",
        a: { text: "다음번엔 이 부분을 보완하면 충분히 이길 수 있어", value: "T" },
        b: { text: "고생 많았어 너의 노력을 내가 다 알아", value: "F" }
      },
      {
        axis: "E",
        score: true,
        question: "배틀에서 패배해서 스트레스를 풀고 싶을 때 나는?",
        a: { text: "사람 만나고 밖에서 시간을 보내며 정리한다", value: "E" },
        b: { text: "집이나 조용한 공간에서 쉬어야 회복된다", value: "I" }
      },
      {
        axis: "S",
        score: true,
        question: "새로운 포켓몬을 잡으러 갈 때 더 먼저 생각하는 것은?",
        a: { text: "위치, 출현 시간, 준비해야 할 도구 같은 현실적인 정보", value: "S" },
        b: { text: "어떤 포켓몬을 만나게 될지에 대한 기대와 상상", value: "N" }
      },
      {
        axis: "T",
        score: true,
        question: "다른 트레이너와 의견이 부딪혔을 때 나는?",
        a: { text: "누가 더 합리적인 전략인지 따져보고 방향을 정한다", value: "T" },
        b: { text: "분위기가 어색해지지 않게 적당히 맞추거나 양보한다", value: "F" }
      },
      {
        axis: "E",
        score: true,
        question: "중요한 배틀을 앞두고 고민이 생기면 나는?",
        a: { text: "주변 사람들에게 말하며 조언을 구한다", value: "E" },
        b: { text: "혼자 진지하게 생각하며 마음을 정리한다", value: "I" }
      },
      {
        axis: "S",
        score: true,
        question: "트레이너로서 미래를 떠올릴 때 나는?",
        a: { text: "다음 배틀이나 가까운 일정 같은 계획부터 생각한다", value: "S" },
        b: { text: "언젠가 어떤 트레이너가 될지 큰 그림을 떠올린다", value: "N" }
      },
      {
        axis: "T",
        score: true,
        question: "포켓몬이 기대만큼 성장하지 않을 때 나는?",
        a: { text: "훈련 방식이나 전략을 수정한다", value: "T" },
        b: { text: "시간을 더 주고 지켜본다", value: "F" }
      },
      {
        axis: null,
        score: false,
        question: "파트너 포켓몬과 배틀에서 이겼을 때 나는?",
        a: { text: "주변 사람들과 기쁨을 나눈다", value: null },
        b: { text: "파트너 포켓몬과 조용히 기뻐한다", value: null }
      },
      {
        axis: null,
        score: false,
        question: "파트너 포켓몬과 새로운 지역에 도착했을 때 나는?",
        a: { text: "지형과 이동 경로를 먼저 파악한다", value: null },
        b: { text: "이곳에서 어떤 일이 생길지 먼저 떠올린다", value: null }
      },
      {
        axis: null,
        score: false,
        question: "야생의 포켓몬 발견! 나의 행동은?",
        a: { text: "곧장 몬스터볼로 잡기를 시도한다", value: null },
        b: { text: "나무열매로 환심을 산다", value: null }
      }
    ];

   const timestamp = Date.now();
const pichuFrames = [`피츄1.png?v=${timestamp}`, `피츄2.png?v=${timestamp}`];

    const startScreen = document.getElementById("start-screen");
    const questionScreen = document.getElementById("question-screen");
    const loadingScreen = document.getElementById("loading-screen");
    const resultScreen = document.getElementById("result-screen");

    const startBtn = document.getElementById("start-btn");

    const progressText = document.getElementById("progress-text");
    const progressPercent = document.getElementById("progress-percent");
    const progressFill = document.getElementById("progress-fill");
    const progressPichu = document.getElementById("progress-pichu");
    const progressPichuImg = document.getElementById("progress-pichu-img");

    const questionText = document.getElementById("question-text");
    const choiceAText = document.getElementById("choice-a-text");
    const choiceBText = document.getElementById("choice-b-text");
    const choiceAButton = document.getElementById("choice-a");
    const choiceBButton = document.getElementById("choice-b");

    const resultImage = document.getElementById("result-image");

    const restartBtn = document.getElementById("restart-btn");
    const otherBtn = document.getElementById("other-btn");

    let currentQuestionIndex = 0;
    let answers = [];
    let currentResultKey = "";
    let pichuFrameIndex = 0;

    let loadingTimer = null;
    let isSubmitting = false;
    let latestResultRequestId = 0;

    function showScreen(target) {
      startScreen.classList.remove("active");
      questionScreen.classList.remove("active");
      resultScreen.classList.remove("active");
      loadingScreen.classList.remove("active");

      if (target === "start") startScreen.classList.add("active");
      if (target === "question") questionScreen.classList.add("active");
      if (target === "result") resultScreen.classList.add("active");
      if (target === "loading") loadingScreen.classList.add("active");

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function clearPendingResultTimer() {
      if (loadingTimer) {
        clearTimeout(loadingTimer);
        loadingTimer = null;
      }
    }

    function resetTestState() {
      clearPendingResultTimer();
      isSubmitting = false;
      currentQuestionIndex = 0;
      answers = [];
      currentResultKey = "";
      resultImage.removeAttribute("src");
      choiceAButton.disabled = false;
      choiceBButton.disabled = false;
    }

    function startTest() {
      resetTestState();
      renderQuestion();
      showScreen("question");
    }

    function updateProgressPichu(progress) {
      const clampedProgress = Math.max(0, Math.min(progress, 100));
      progressPichu.style.left = `${clampedProgress}%`;
    }

    function renderQuestion() {
      const question = questions[currentQuestionIndex];
      const progress = ((currentQuestionIndex + 1) / questions.length) * 100;

      progressText.textContent = `QUESTION ${currentQuestionIndex + 1} / ${questions.length}`;
      progressPercent.textContent = `${Math.round(progress)}%`;
      progressFill.style.width = `${progress}%`;
      updateProgressPichu(progress);

      questionText.textContent = question.question;
      choiceAText.textContent = question.a.text;
      choiceBText.textContent = question.b.text;
    }

    function selectAnswer(value) {
      if (isSubmitting) return;

      const question = questions[currentQuestionIndex];

      if (question.score && value) {
        answers.push(value);
      }

      if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex += 1;
        renderQuestion();
      } else {
        calculateResult();
      }
    }

    function calculateResult() {
      if (isSubmitting) return;

      isSubmitting = true;
      choiceAButton.disabled = true;
      choiceBButton.disabled = true;
      clearPendingResultTimer();

      const requestId = ++latestResultRequestId;
      showScreen("loading");

      loadingTimer = setTimeout(() => {
        if (requestId !== latestResultRequestId) return;

        const counts = {
          E: 0, I: 0,
          S: 0, N: 0,
          T: 0, F: 0
        };

        answers.forEach(answer => {
          if (counts[answer] !== undefined) {
            counts[answer] += 1;
          }
        });

        const eOrI = counts.E >= counts.I ? "E" : "I";
        const sOrN = counts.S >= counts.N ? "S" : "N";
        const tOrF = counts.T >= counts.F ? "T" : "F";

        currentResultKey = `${eOrI}${sOrN}${tOrF}`;
        renderResultImage(currentResultKey);

        loadingTimer = null;
        isSubmitting = false;
        choiceAButton.disabled = false;
        choiceBButton.disabled = false;

        showScreen("result");
      }, 1200);
    }

    function renderResultImage(key) {
      const imagePath = `img_${key.toLowerCase()}0011.png?cb=${Date.now()}`;
      resultImage.src = imagePath;
      resultImage.alt = `${key} 결과 이미지`;
    }

    function startPichuAnimation() {
      setInterval(() => {
        pichuFrameIndex = (pichuFrameIndex + 1) % pichuFrames.length;
        progressPichuImg.src = pichuFrames[pichuFrameIndex];
      }, 350);
    }

    startBtn.addEventListener("click", startTest);

    choiceAButton.addEventListener("click", () => {
      selectAnswer(questions[currentQuestionIndex].a.value);
    });

    choiceBButton.addEventListener("click", () => {
      selectAnswer(questions[currentQuestionIndex].b.value);
    });

    restartBtn.addEventListener("click", () => {
      resetTestState();
      showScreen("start");
    });

    otherBtn.addEventListener("click", () => {
      window.location.href = "https://test-it.co.kr/";
    });

    startPichuAnimation();
    updateProgressPichu(0);
  </script>
</body>
</html>
