<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>테스트잇 - 성격 테스트로그</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DungGeunMo&display=swap');

  :root {
    --c-bg: #fff0f5;
    --c-pill1: #ffb6c1;
    --c-pill2: #ffdab9;
    --c-good: #87cefa;
    --c-bad: #dda0dd;
    --c-detail: #fff;
    --kitsch-main: #FFB6C1;
    --kitsch-btn: #FF69B4;
    --kitsch-border: #000;
  }

  body.theme-istj { --c-bg: #e3f2fd; --c-pill1: #bbdefb; --c-pill2: #c8e6c9; --c-good: #d1c4e9; --c-bad: #ffcdd2; }
  body.theme-isfj { --c-bg: #e8f5e9; --c-pill1: #c8e6c9; --c-pill2: #fff9c4; --c-good: #b2dfdb; --c-bad: #ffcc80; }
  body.theme-infj { --c-bg: #f3e5f5; --c-pill1: #e1bee7; --c-pill2: #d1c4e9; --c-good: #b3e5fc; --c-bad: #f8bbd0; }
  body.theme-intj { --c-bg: #ede7f6; --c-pill1: #d1c4e9; --c-pill2: #c5cae9; --c-good: #b2ebf2; --c-bad: #ffcdd2; }
  body.theme-istp { --c-bg: #e0f7fa; --c-pill1: #b2ebf2; --c-pill2: #b2dfdb; --c-good: #c8e6c9; --c-bad: #cfd8dc; }
  body.theme-isfp { --c-bg: #f1f8e9; --c-pill1: #dcedc8; --c-pill2: #fff9c4; --c-good: #ffcc80; --c-bad: #ffab91; }
  body.theme-infp { --c-bg: #e1f5fe; --c-pill1: #b3e5fc; --c-pill2: #e1bee7; --c-good: #f8bbd0; --c-bad: #d1c4e9; }
  body.theme-intp { --c-bg: #fafafa; --c-pill1: #cfd8dc; --c-pill2: #d1c4e9; --c-good: #b2ebf2; --c-bad: #f48fb1; }
  body.theme-estp { --c-bg: #fffde7; --c-pill1: #fff59d; --c-pill2: #ffcc80; --c-good: #ffab91; --c-bad: #b2dfdb; }
  body.theme-esfp { --c-bg: #fff3e0; --c-pill1: #ffe082; --c-pill2: #ffab91; --c-good: #f8bbd0; --c-bad: #b2ebf2; }
  body.theme-enfp { --c-bg: #fce4ec; --c-pill1: #f8bbd0; --c-pill2: #ffe082; --c-good: #b3e5fc; --c-bad: #d1c4e9; }
  body.theme-entp { --c-bg: #fff8e1; --c-pill1: #ffe082; --c-pill2: #ffcc80; --c-good: #dce775; --c-bad: #ffab91; }
  body.theme-estj { --c-bg: #f0f4c3; --c-pill1: #dce775; --c-pill2: #fff59d; --c-good: #ffcc80; --c-bad: #b2dfdb; }
  body.theme-esfj { --c-bg: #fff9c4; --c-pill1: #fff59d; --c-pill2: #ffcc80; --c-good: #f8bbd0; --c-bad: #b3e5fc; }
  body.theme-enfj { --c-bg: #fce4ec; --c-pill1: #f48fb1; --c-pill2: #ce93d8; --c-good: #81d4fa; --c-bad: #80cbc4; }
  body.theme-entj { --c-bg: #ffebee; --c-pill1: #ef9a9a; --c-pill2: #ffab91; --c-good: #ffe082; --c-bad: #b3e5fc; }

  body {
    margin: 0;
    padding: 0;
    padding-top: 60px;
    padding-bottom: 40px;
    background-color: #f0f0f0;
    font-family: 'DungGeunMo', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  /* Test It 브랜드 고정 헤더 */
  .test-it-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    box-sizing: border-box;
    backdrop-filter: blur(10px);
    background: rgba(255, 255, 255, 0.8);
    z-index: 1000;
    border-bottom: 2px solid #000;
  }
  .test-it-header .logo { font-weight: bold; font-size: 18px; color: #000; }
  .test-it-header .nav { display: flex; gap: 15px; font-size: 14px; color: #000; font-weight: bold; }

  /* 폴더폰 기기 프레임 */
  #app {
    width: 100%;
    max-width: 500px; /* 360px에서 500px로 확대 */
    background-color: var(--kitsch-main);
    border: 3px solid var(--kitsch-border);
    border-radius: 20px;
    padding: 20px 15px;
    box-shadow: inset 4px 4px 8px rgba(255,255,255,0.5), inset -4px -4px 8px rgba(0,0,0,0.2), 0 10px 20px rgba(0,0,0,0.2);
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* 폴더폰 상단 스피커 영역 */
  .speaker-area {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 15px;
  }
  .speaker-hole {
    width: 60px;
    height: 6px;
    background-color: #222;
    border-radius: 5px;
    border: 1px solid #000;
    box-shadow: inset 0px 2px 0px rgba(0,0,0,0.8);
  }

  /* 시작/질문 화면 */
  .screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
    box-sizing: border-box;
    text-align: center;
    background-color: var(--c-bg);
    min-height: 480px;
    border: 3px solid var(--kitsch-border);
    border-radius: 12px;
  }

  h1 { font-size: 26px; margin-bottom: 10px; color: #000; }
  .subtitle { font-size: 14px; margin-bottom: 40px; color: #333; line-height: 1.5; }
  
  .kitsch-btn {
    background-color: var(--kitsch-btn);
    color: #fff;
    border: 3px solid var(--kitsch-border);
    border-radius: 10px;
    padding: 15px 20px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    margin-bottom: 15px;
    box-shadow: 2px 2px 0px var(--kitsch-border);
  }
  .kitsch-btn:active {
    transform: translate(2px, 2px);
    box-shadow: 0px 0px 0px var(--kitsch-border);
  }

  .progress-container {
    width: 100%;
    height: 20px;
    background-color: #fff;
    border: 3px solid var(--kitsch-border);
    border-radius: 10px;
    margin-bottom: 40px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background-color: var(--kitsch-btn);
    width: 0%;
    transition: width 0.3s;
  }

  #question-text { 
    font-size: 18px; 
    margin-bottom: 50px; 
    line-height: 1.6; 
    background: #fff; 
    padding: 20px; 
    border: 3px solid var(--kitsch-border);
    border-radius: 12px;
    font-weight: bold;
    width: 100%;
    box-sizing: border-box;
    box-shadow: 2px 2px 0px var(--kitsch-border);
  }

  /* 결과 화면 컨테이너 */
  #result-screen {
    display: none;
    flex-direction: column;
  }

  /* 캡처되는 화면 (폴더폰 액정) */
  #capture-area {
    width: 100%;
    aspect-ratio: 9 / 16;
    background-color: var(--c-bg);
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    overflow: hidden;
    position: relative;
    border: 3px solid var(--kitsch-border);
    border-radius: 8px;
  }

  .status-bar {
    height: 24px;
    background-color: #000;
    color: #39ff14;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px;
    font-size: 12px;
    z-index: 10;
  }

  .folder-top {
    height: 40%;
    border-bottom: 3px solid #000;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background-color: #111;
  }

  /* 지지직 거리는 노이즈 패턴 */
  #noise-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36zwjjgzhhYWGMYAEYB8RmROaABADeOQ8CXl/xfgAAAABJRU5ErkJggg==');
    background-repeat: repeat;
    z-index: 2;
    display: none;
  }

  /* 고전적인 VCR 폰트 */
  #no-signal-text {
    position: absolute;
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
    z-index: 3;
    display: none;
    text-shadow: 2px 2px 0px #000;
  }

  #image-upload {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    z-index: 10;
  }

  .upload-placeholder {
    font-size: 16px;
    color: #fff;
    pointer-events: none;
    text-align: center;
    line-height: 1.6;
    z-index: 5;
    text-shadow: 1px 1px 2px #000;
  }

  #preview-img-final {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 8;
  }

  .folder-bottom {
    flex: 1;
    padding: 12px;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    background-color: var(--c-bg);
  }

  .trait-row { display: flex; gap: 8px; margin-bottom: 12px; }

  .retro-box {
    color: #000;
    border: 2px solid #000;
    border-radius: 8px;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: #fff;
  }

  .circle { border-radius: 50%; width: 55px; height: 55px; font-weight: bold; font-size: 15px; line-height: 1.2; flex-shrink: 0; }
  .pill { border-radius: 20px; padding: 6px 10px; font-size: 14px; flex: 1; font-weight: bold; }
  
  .content-split {
    display: flex;
    gap: 8px;
    flex: 1;
    align-items: stretch;
  }

  .good-bad-container {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 0.4;
  }

  .rect-small { 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    font-size: 14px; 
    font-weight: bold; 
    padding: 6px 0;
  }
  .rect-small span { font-size: 11px; opacity: 0.7; margin-bottom: 2px; font-weight: normal; }
  
  /* 성격 특징 버튼 그리드 */
  .traits-grid {
    flex: 1.6;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    align-content: stretch;
  }

  /* 버튼 그림자 완전히 제거 및 깔끔하게 처리 */
  .trait-btn {
    border: 2px solid #000;
    border-radius: 8px;
    font-size: 13px; /* 너비가 넓어져서 폰트 크기 살짝 키움 */
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
    word-break: keep-all;
    text-align: center;
    line-height: 1.3;
  }

  /* 8개 버튼에 각각 예쁘고 다채로운 마카롱 하이틴 파스텔 톤 부여 */
  .trait-btn:nth-child(1) { background-color: #FFB3BA; }
  .trait-btn:nth-child(2) { background-color: #FFDFBA; }
  .trait-btn:nth-child(3) { background-color: #FFFFBA; }
  .trait-btn:nth-child(4) { background-color: #BAFFC9; }
  .trait-btn:nth-child(5) { background-color: #BAE1FF; }
  .trait-btn:nth-child(6) { background-color: #D4B0FF; }
  .trait-btn:nth-child(7) { background-color: #FFC8E3; }
  .trait-btn:nth-child(8) { background-color: #B2F0E6; }

  /* 외부 버튼 (저장, 다시하기 등) */
  .external-actions {
    width: 100%;
    max-width: 500px; /* 여기도 500px로 통일 */
    margin-top: 15px;
    display: none;
    flex-direction: column;
    gap: 8px;
  }

  #final-save-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.9);
    z-index: 3000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  
  .save-guide-text {
    color: #fff; font-size: 16px; margin-bottom: 15px; font-weight: bold; text-align: center; line-height: 1.4;
  }

  #final-captured-image {
    width: 90%;
    max-width: 450px;
    border: 3px solid #FF69B4;
    border-radius: 12px;
    margin-bottom: 20px;
  }

  #edit-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.9);
    z-index: 2000;
    flex-direction: column;
    justify-content: center;
    align-items: center;
  }

  #edit-container {
    width: 90%;
    max-width: 400px;
    background-color: #FFE4E1;
    border: 3px solid #000;
    border-radius: 15px;
    padding: 15px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }

  .edit-title { font-size: 18px; font-weight: bold; margin-bottom: 10px; text-align: center; }

  #canvas-container {
    width: 100%;
    aspect-ratio: 1.5 / 1;
    border: 3px solid #000;
    border-radius: 8px;
    background-color: #ccc;
    position: relative;
    overflow: hidden;
    touch-action: none;
    cursor: grab;
  }
  #canvas-container:active { cursor: grabbing; }
  canvas { display: block; width: 100%; height: 100%; }

  .pc-controls { display: flex; justify-content: center; gap: 5px; margin-top: 10px; }
  
  @media (max-width: 768px) {
    .pc-controls { display: none !important; }
  }

  .edit-controls { margin-top: 15px; display: flex; flex-direction: column; gap: 10px; }
  .control-row { display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: bold; }
  .control-row input[type="range"] { flex: 1; margin: 0 10px; }

  .edit-actions { display: flex; gap: 10px; margin-top: 15px; }

</style>
</head>
<body>

<header class="test-it-header">
  <div class="logo">TEST IT</div>
  <div class="nav">
    <span>성격</span>
    <span>얼굴</span>
    <span>그외</span>
    <span>사주</span>
  </div>
</header>

<div id="app">
  <div class="speaker-area"><div class="speaker-hole"></div></div>
  
  <div id="main-screen" class="screen">
    <h1>성격 테스트로그</h1>
    <div class="subtitle">나의 지금을<br>폴더폰 감성으로 기록하기</div>
    <button class="kitsch-btn" onclick="startTest()">테스트 시작하기</button>
  </div>

  <div id="question-screen" class="screen" style="display:none;">
    <div class="progress-container">
      <div class="progress-bar" id="progress"></div>
    </div>
    <div id="question-text">질문이 표시됩니다.</div>
    <button class="kitsch-btn" style="background-color: #fff; color:#000;" id="btn-a" onclick="selectAnswer('A')">A 선택지</button>
    <button class="kitsch-btn" style="background-color: #fff; color:#000;" id="btn-b" onclick="selectAnswer('B')">B 선택지</button>
  </div>

  <div id="result-screen">
    <div id="capture-area">
      <div class="status-bar">
        <span>테스트잇 성격 로그 테스트</span>
        <span>[■■■]</span>
      </div>
      
      <div class="folder-top" id="folder-top">
        <div id="noise-overlay"></div>
        <div id="no-signal-text">NO SIGNAL</div>
        
        <input type="file" id="image-upload" accept="image/*">
        <div class="upload-placeholder" id="upload-placeholder">📸<br>터치하여 사진 업로드</div>
        <img id="preview-img-final" alt="최종 사진">
      </div>
      
      <div class="folder-bottom">
        <div class="trait-row">
          <div class="retro-box circle">MY<br>LOG</div>
          <div style="display: flex; flex-direction: column; gap: 8px; flex: 1;">
            <div class="retro-box pill" id="res-keyword1" style="background-color: var(--c-pill1);">키워드1</div>
            <div class="retro-box pill" id="res-keyword2" style="background-color: var(--c-pill2);">키워드2</div>
          </div>
        </div>
        
        <div class="content-split">
          <div class="good-bad-container">
            <div class="retro-box rect-small" style="background-color: var(--c-good);"><span>GOOD</span><div id="res-good">장점</div></div>
            <div class="retro-box rect-small" style="background-color: var(--c-bad);"><span>BAD</span><div id="res-bad">단점</div></div>
          </div>
          <div class="traits-grid" id="res-details">
            </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="external-actions" id="external-actions">
  <button class="kitsch-btn" style="background:#000;" onclick="captureAndShowImage()">결과 이미지 저장하기</button>
  <button class="kitsch-btn" style="background:#fff; color:#000;" onclick="location.reload()">다시 해보기</button>
  <button class="kitsch-btn" style="background:#fff; color:#000;" onclick="alert('다른 테스트 페이지로 이동합니다.')">다른 테스트 해보기</button>
</div>

<div id="final-save-modal">
  <div class="save-guide-text">결과가 완성되었습니다!<br>이미지를 꾹 눌러서 저장해주세요.</div>
  <img id="final-captured-image" src="" alt="완성된 이미지">
  <button class="kitsch-btn" style="width:90%; max-width:350px; background:#fff; color:#000;" onclick="document.getElementById('final-save-modal').style.display='none'">닫기</button>
</div>

<div id="edit-modal">
  <div id="edit-container">
    <div class="edit-title">사진 편집</div>
    <div id="canvas-container">
      <canvas id="edit-canvas"></canvas>
    </div>
    
    <div class="pc-controls">
      <button class="kitsch-btn" style="padding:8px; margin-bottom:0;" onclick="adjustCanvas('zoomIn')">+</button>
      <button class="kitsch-btn" style="padding:8px; margin-bottom:0;" onclick="adjustCanvas('zoomOut')">-</button>
      <button class="kitsch-btn" style="padding:8px; margin-bottom:0;" onclick="adjustCanvas('up')">▲</button>
      <button class="kitsch-btn" style="padding:8px; margin-bottom:0;" onclick="adjustCanvas('down')">▼</button>
      <button class="kitsch-btn" style="padding:8px; margin-bottom:0;" onclick="adjustCanvas('left')">◀</button>
      <button class="kitsch-btn" style="padding:8px; margin-bottom:0;" onclick="adjustCanvas('right')">▶</button>
    </div>
    
    <div class="edit-controls">
      <div class="control-row">
        <span>밝기</span>
        <input type="range" id="brightness-slider" min="50" max="150" value="100">
      </div>
      <div class="control-row">
        <span>흑백 필터</span>
        <input type="checkbox" id="grayscale-check" style="transform: scale(1.5);">
      </div>
    </div>

    <div class="edit-actions">
      <button class="kitsch-btn" style="background:#ff4d4d; margin-bottom:0; padding:10px;" onclick="deletePhoto()">사진 삭제</button>
      <button class="kitsch-btn" style="background:#fff; color:#000; margin-bottom:0; padding:10px;" onclick="closeEditModal()">취소</button>
      <button class="kitsch-btn" style="background:#000; margin-bottom:0; padding:10px;" onclick="applyEdit()">적용하기</button>
    </div>
  </div>
</div>

<script>
  const qnaList = [
    { q: "주말에 갑자기 일정이 취소되었다!", a: { text: "아싸! 집에서 뒹굴거려야지", type: "I" }, b: { text: "심심한데 다른 친구 번개할까?", type: "E" } },
    { q: "처음 가는 모임 장소에 도착했다.", a: { text: "옆 사람에게 먼저 말을 걸어본다", type: "E" }, b: { text: "누군가 말 걸어주길 기다린다", type: "I" } },
    { q: "스트레스를 잔뜩 받았을 때 나는?", a: { text: "혼자 조용히 생각 정리할 시간 필요", type: "I" }, b: { text: "사람들과 만나서 수다 떨며 푼다!", type: "E" } },

    "ENTJ": { k1: "완벽주의", k2: "통솔력갑", good: "빠른결단력", bad: "팩트폭격기", details: ["답답하면 속터짐", "효율이 최우선", "목표는 달성한다", "타고난 리더재질", "시간낭비 아까워", "논리적 불도저", "이성적인 판단", "압도적 카리스마"] }
  };

  let currentQ = 0;
  let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

  function startTest() {
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('question-screen').style.display = 'flex';
    showQuestion();
  }

  function showQuestion() {
    const qData = qnaList[currentQ];
    document.getElementById('question-text').innerHTML = `<span style="font-size:14px; color:#555;">Q${currentQ + 1}.</span><br>${qData.q}`;
    document.getElementById('btn-a').innerText = qData.a.text;
    document.getElementById('btn-b').innerText = qData.b.text;
    const percent = (currentQ / qnaList.length) * 100;
    document.getElementById('progress').style.width = percent + '%';
  }

  function selectAnswer(choice) {
    const qData = qnaList[currentQ];
    const selectedType = choice === 'A' ? qData.a.type : qData.b.type;
    scores[selectedType]++;
    
    currentQ++;
    if (currentQ >= qnaList.length) {
      document.getElementById('progress').style.width = '100%';
      setTimeout(calculateResult, 300);
    } else {
      showQuestion();
    }
  }

  function calculateResult() {
    let mbti = "";
    mbti += (scores.E >= scores.I) ? "E" : "I";
    mbti += (scores.S >= scores.N) ? "S" : "N";
    mbti += (scores.T >= scores.F) ? "T" : "F";
    mbti += (scores.J >= scores.P) ? "J" : "P";

    document.getElementById('question-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
    document.getElementById('external-actions').style.display = 'flex'; 
    document.body.className = 'theme-' + mbti.toLowerCase();

    const resData = resultsData[mbti];
    document.getElementById('res-keyword1').innerText = resData.k1; 
    document.getElementById('res-keyword2').innerText = resData.k2; 
    document.getElementById('res-good').innerText = resData.good;
    document.getElementById('res-bad').innerText = resData.bad;
    
    let detailsHtml = '';
    resData.details.forEach(item => {
      detailsHtml += `<div class="trait-btn"><span>${item}</span></div>`;
    });
    document.getElementById('res-details').innerHTML = detailsHtml;
    
    document.getElementById('noise-overlay').style.display = 'none';
    document.getElementById('no-signal-text').style.display = 'none';
    document.getElementById('upload-placeholder').style.display = 'block';
  }

  const imageUpload = document.getElementById('image-upload');
  const editModal = document.getElementById('edit-modal');
  const canvasContainer = document.getElementById('canvas-container');
  const canvas = document.getElementById('edit-canvas');
  const ctx = canvas.getContext('2d');
  const previewImgFinal = document.getElementById('preview-img-final');
  
  const brightnessSlider = document.getElementById('brightness-slider');
  const grayscaleCheck = document.getElementById('grayscale-check');
  const uploadPlaceholder = document.getElementById('upload-placeholder');
  const noiseOverlay = document.getElementById('noise-overlay');
  const noSignalText = document.getElementById('no-signal-text');

  let imgObj = new Image();
  let imgX = 0, imgY = 0, imgScale = 1;
  let isDragging = false;
  let startX, startY;
  let initialDist = null;
  let initialScale = 1;

  function resizeCanvas() {
    canvas.width = canvasContainer.clientWidth;
    canvas.height = canvasContainer.clientHeight;
    renderCanvas();
  }

  imageUpload.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        imgObj.onload = function() {
          editModal.style.display = 'flex';
          resizeCanvas();
          const scaleW = canvas.width / imgObj.width;
          const scaleH = canvas.height / imgObj.height;
          imgScale = Math.max(scaleW, scaleH);
          imgX = (canvas.width - imgObj.width * imgScale) / 2;
          imgY = (canvas.height - imgObj.height * imgScale) / 2;
          
          brightnessSlider.value = 100;
          grayscaleCheck.checked = false;
          renderCanvas();
        };
        imgObj.src = event.target.result;
      }
      reader.readAsDataURL(file);
    }
  });

  brightnessSlider.addEventListener('input', renderCanvas);
  grayscaleCheck.addEventListener('change', renderCanvas);

  function renderCanvas() {
    if (!imgObj.src) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    let filterStr = `brightness(${brightnessSlider.value}%)`;
    if (grayscaleCheck.checked) filterStr += ` grayscale(100%)`;
    ctx.filter = filterStr;
    
    ctx.translate(imgX, imgY);
    ctx.scale(imgScale, imgScale);
    ctx.drawImage(imgObj, 0, 0);
    ctx.restore();
  }

  function adjustCanvas(action) {
    const step = 20;
    if (action === 'zoomIn') imgScale *= 1.1;
    if (action === 'zoomOut') imgScale *= 0.9;
    if (action === 'up') imgY -= step;
    if (action === 'down') imgY += step;
    if (action === 'left') imgX -= step;
    if (action === 'right') imgX += step;
    renderCanvas();
  }

  function getDistance(touches) {
    return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
  }

  canvasContainer.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX - imgX;
    startY = e.clientY - imgY;
  });

  canvasContainer.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX - imgX;
      startY = e.touches[0].clientY - imgY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      initialDist = getDistance(e.touches);
      initialScale = imgScale;
    }
  }, {passive: false});

  window.addEventListener('mousemove', (e) => {
    if (isDragging) {
      imgX = e.clientX - startX;
      imgY = e.clientY - startY;
      renderCanvas();
    }
  });

  window.addEventListener('touchmove', (e) => {
    if (isDragging && e.touches.length === 1) {
      e.preventDefault();
      imgX = e.touches[0].clientX - startX;
      imgY = e.touches[0].clientY - startY;
      renderCanvas();
    } else if (e.touches.length === 2) {
      e.preventDefault();
      const currentDist = getDistance(e.touches);
      if (initialDist) {
        const factor = currentDist / initialDist;
        imgScale = initialScale * factor;
        if (imgScale < 0.1) imgScale = 0.1;
        renderCanvas();
      }
    }
  }, {passive: false});

  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('touchend', () => isDragging = false);

  canvasContainer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvas.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    const wheelFactor = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = imgScale * wheelFactor;
    
    imgX = mouseX - (mouseX - imgX) * (newScale / imgScale);
    imgY = mouseY - (mouseY - imgY) * (newScale / imgScale);
    imgScale = newScale;
    renderCanvas();
  });

  function closeEditModal() {
    editModal.style.display = 'none';
    imageUpload.value = '';
  }

  function deletePhoto() {
    imgObj.src = '';
    previewImgFinal.src = '';
    previewImgFinal.style.display = 'none';
    
    noiseOverlay.style.display = 'none';
    noSignalText.style.display = 'none';
    uploadPlaceholder.style.display = 'block';
    
    closeEditModal();
  }

  function applyEdit() {
    previewImgFinal.src = canvas.toDataURL('image/png');
    previewImgFinal.style.display = 'block';
    
    noiseOverlay.style.display = 'none';
    noSignalText.style.display = 'none';
    uploadPlaceholder.style.display = 'none';
    
    closeEditModal();
  }

  function captureAndShowImage() {
    const captureArea = document.getElementById('capture-area');
    const isUploaded = previewImgFinal.src && previewImgFinal.style.display !== 'none';
    
    if (!isUploaded) {
      noiseOverlay.style.display = 'block';
      noSignalText.style.display = 'block';
      uploadPlaceholder.style.display = 'none';
    }

    setTimeout(() => {
      html2canvas(captureArea, { scale: 3, useCORS: true, backgroundColor: null }).then(canvas => {
        const finalModal = document.getElementById('final-save-modal');
        const finalImage = document.getElementById('final-captured-image');
        
        finalImage.src = canvas.toDataURL('image/png');
        finalModal.style.display = 'flex';
        
        if (!isUploaded) {
          noiseOverlay.style.display = 'none';
          noSignalText.style.display = 'none';
          uploadPlaceholder.style.display = 'block';
        }
      });
    }, 200);
  }
</script>
