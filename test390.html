<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트잇 미니홈피 프로필 성격 테스트</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css">
<style>
*{box-sizing:border-box}

body{
  margin:0;
  font-family:"NeoDunggeunmo","Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
  color:#222;
  background:#b9ecff;
  background-image:
    radial-gradient(circle at 8px 8px,rgba(255,255,255,.9) 0 2px,transparent 3px),
    radial-gradient(circle at 25px 25px,rgba(255,255,255,.55) 0 1px,transparent 2px),
    linear-gradient(180deg,#a8dcff 0%,#dff7ff 100%);
  background-size:36px 36px,56px 56px,100% 100%;
}

button,input,select{
  font-family:"NeoDunggeunmo","Apple SD Gothic Neo","Pretendard","Malgun Gothic",sans-serif;
}

a{text-decoration:none;color:inherit}

.wrapper{
  width:min(560px,100%);
  margin:0 auto;
  padding:0 12px 42px;
}

.page-header{
  width:min(560px,calc(100% - 24px));
  min-height:42px;
  margin:12px auto 10px;
  background:#e9e9e9;
  border:1px solid #333;
  box-shadow:4px 4px 0 rgba(0,0,0,.18);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:0 8px;
}

.logo{
  display:flex;
  align-items:center;
  flex-shrink:0;
  font-size:17px;
  font-weight:400;
  letter-spacing:-1px;
  white-space:nowrap;
}

.logo img{display:none}

.main-nav{
  display:flex;
  flex-shrink:0;
  gap:3px;
  font-size:11px;
  font-weight:400;
  white-space:nowrap;
}

.main-nav a{
  background:#fff;
  border:1px solid #777;
  padding:3px 5px;
}

.screen{display:none}
.screen.active{display:block}

.cy-window{
  background:#e8e8e8;
  border:2px solid #4a4a4a;
  padding:5px;
  box-shadow:5px 5px 0 rgba(0,0,0,.22);
}

.win-top{
  height:34px;
  border-bottom:1px solid #555;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 7px;
}

.win-title{
  display:flex;
  align-items:center;
  gap:7px;
  font-size:17px;
  font-weight:400;
  letter-spacing:-1px;
}

.win-title:before{
  content:"";
  width:22px;
  height:22px;
  background:#444;
  border:2px solid #222;
  clip-path:polygon(50% 0,100% 34%,100% 100%,68% 100%,68% 62%,32% 62%,32% 100%,0 100%,0 34%);
}

.win-btns{
  display:flex;
  gap:4px;
}

.win-btns span{
  width:21px;
  height:21px;
  border:2px solid #555;
  background:var(--btn,#c7b8ff);
  display:grid;
  place-items:center;
  font-size:12px;
  font-weight:400;
  line-height:1;
}

.homepage{
  position:relative;
  margin:10px 5px 5px;
  background:#fff;
  border:2px solid #777;
  border-radius:12px;
  padding:12px;
  box-shadow:4px 4px 0 rgba(0,0,0,.25);
}

.side-tabs{
  display:none !important;
}

.homepage-head{
  min-height:54px;
  border-bottom:1px solid #ddd;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding:0 4px 9px;
}

.homepage-title{
  font-size:18px;
  font-weight:400;
  letter-spacing:-.7px;
}

.today-box{
  font-size:11px;
  font-weight:400;
  color:#555;
}

.today-box b{color:#ff5a8e}

.miniroom-tabs{
  display:flex;
  align-items:flex-end;
  gap:6px;
  margin-top:9px;
}

.mini-tab{
  display:inline-block;
  max-width:70%;
  padding:7px 13px;
  border:1px solid #777;
  border-bottom:none;
  border-radius:8px 8px 0 0;
  background:var(--tab,#c7b8ff);
  font-size:17px;
  font-weight:400;
  color:#222;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.zodiac-tab{
  max-width:30%;
  background:#fff;
  font-size:12px;
}

.miniroom{
  height:315px;
  border:1px solid #777;
  position:relative;
  overflow:hidden;
  background:var(--roomBase,#ffd7ec);
}

.room-back{
  position:absolute;
  inset:0;
  background:linear-gradient(90deg,var(--wall1,#ffa6cf) 0 50%,var(--wall2,#ffb4da) 50% 100%);
}

.room-floor{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:52%;
  background:var(--floor,#ffd8e8);
  clip-path:polygon(50% 0,100% 37%,100% 100%,0 100%,0 37%);
}

.room-corner{
  position:absolute;
  left:50%;
  top:0;
  height:52%;
  border-left:1px dotted rgba(0,0,0,.25);
}

.room-left-line{
  position:absolute;
  left:0;
  top:48%;
  width:50%;
  border-top:8px solid var(--line,#e97bb0);
  transform:skewY(-24deg);
  transform-origin:right;
}

.room-right-line{
  position:absolute;
  right:0;
  top:48%;
  width:50%;
  border-top:8px solid var(--line,#e97bb0);
  transform:skewY(24deg);
  transform-origin:left;
}

.wall-stripe{
  position:absolute;
  right:0;
  top:0;
  width:120px;
  height:165px;
  background:repeating-linear-gradient(90deg,var(--stripe,#d96aa5) 0 6px,#fff 6px 13px);
}

.window-art{
  position:absolute;
  left:24px;
  top:45px;
  width:96px;
  height:72px;
  border:5px solid rgba(255,255,255,.75);
  background:linear-gradient(135deg,#fff 0 14%,#a6e8ff 15% 52%,#fff 53% 58%,#8fd9f6 59%);
  box-shadow:5px 5px 0 rgba(0,0,0,.06);
  transform:skewY(-8deg);
}

.sofa-art{
  position:absolute;
  left:28px;
  bottom:70px;
  width:92px;
  height:64px;
  background:var(--sofa,#69d8d0);
  border-radius:10px;
  transform:skewY(-12deg);
  box-shadow:5px 5px 0 rgba(0,0,0,.08);
}

.sofa-art:after{
  content:"";
  position:absolute;
  left:30px;
  top:22px;
  width:30px;
  height:24px;
  background:var(--pillow,#cfc5ff);
  border:3px solid rgba(255,255,255,.6);
}

.poster-art{
  position:absolute;
  left:252px;
  top:70px;
  width:55px;
  height:65px;
  border:4px solid rgba(255,255,255,.78);
  background:
    radial-gradient(circle,#fff 0 5px,var(--posterDot,#6bc7ff) 6px 15px,#fff 16px 21px,transparent 22px),
    var(--posterBg,#b9f5cf);
  transform:rotate(4deg);
}

.acc-art{
  position:absolute;
  left:200px;
  top:82px;
  width:72px;
  height:48px;
  border:5px solid rgba(255,255,255,.7);
  background:
    linear-gradient(45deg,transparent 42%,var(--acc,#ff7fbd) 43% 57%,transparent 58%),
    linear-gradient(-45deg,transparent 42%,var(--acc,#ff7fbd) 43% 57%,transparent 58%);
  transform:rotate(-6deg);
}

.balloon-art{
  position:absolute;
  right:52px;
  bottom:98px;
  width:35px;
  height:47px;
  background:#9edcff;
  border:4px solid rgba(255,255,255,.65);
  border-radius:50%;
  box-shadow:24px 8px 0 #89f0df;
}

.balloon-art:after{
  content:"";
  position:absolute;
  left:13px;
  bottom:-42px;
  width:1px;
  height:45px;
  border-left:2px solid rgba(255,255,255,.8);
  transform:rotate(8deg);
}

.sign-art{
  position:absolute;
  right:28px;
  bottom:68px;
  border:3px solid rgba(255,255,255,.85);
  background:var(--sign,#c7b8ff);
  color:#fff;
  padding:6px 10px;
  font-size:13px;
  font-weight:400;
  transform:rotate(-10deg);
}

.avatar{
  position:absolute;
  width:74px;
  height:125px;
  bottom:58px;
  z-index:5;
}

.avatar.left{left:150px}
.avatar.right{right:115px}

.head{
  width:46px;
  height:46px;
  margin:0 auto;
  border:3px solid #333;
  background:#ffd3aa;
  border-radius:4px;
  position:relative;
}

.hair{
  position:absolute;
  left:-4px;
  top:-10px;
  width:50px;
  height:24px;
  background:#1f1f1f;
  border:3px solid #333;
  border-radius:16px 16px 5px 5px;
}

.face{
  position:absolute;
  left:10px;
  top:24px;
  width:22px;
  height:5px;
  border-left:3px solid #333;
  border-right:3px solid #333;
}

.body-art{
  width:52px;
  height:60px;
  margin:-1px auto 0;
  border:3px solid #fff;
  background:var(--cloth,#edf8ff);
  box-shadow:0 0 0 2px rgba(120,160,180,.2);
  position:relative;
}

.body-art:after{
  content:"";
  position:absolute;
  left:10px;
  bottom:-30px;
  width:11px;
  height:30px;
  background:#c6c6c6;
  box-shadow:22px 0 #c6c6c6;
}

.speech{
  position:absolute;
  background:#fff;
  border:2px solid #555;
  box-shadow:3px 3px 0 rgba(0,0,0,.08);
  padding:10px 13px;
  min-width:112px;
  text-align:center;
  font-size:12px;
  font-weight:400;
  line-height:1.4;
  word-break:keep-all;
  z-index:7;
}

.speech:after{
  content:"";
  position:absolute;
  bottom:-9px;
  left:50%;
  width:14px;
  height:14px;
  background:#fff;
  border-right:2px solid #555;
  border-bottom:2px solid #555;
  transform:translateX(-50%) rotate(45deg);
}

.speech.left{left:118px;top:94px}
.speech.right{right:88px;top:88px}

.friend-bar{
  margin-top:10px;
  border:1px solid #ffdb25;
  background:#feffbe;
  border-radius:999px;
  padding:8px 13px;
  font-size:14px;
  font-weight:400;
}

.friend-list{
  background:#fff;
  padding:2px 4px 0;
}

.friend-row{
  display:grid;
  grid-template-columns:24px 1fr;
  gap:8px;
  align-items:center;
  padding:10px 0;
  border-bottom:1px dashed #aaa;
  font-size:13px;
  font-weight:400;
}

.friend-row:before{
  content:"";
  width:20px;
  height:16px;
  background:
    linear-gradient(135deg,transparent 46%,#fff 47% 53%,transparent 54%),
    var(--bar,#9bece2);
  border:1px solid #888;
  box-shadow:2px 2px 0 rgba(0,0,0,.08);
}

.form-card,.question-card{
  border:3px double #b8b8b8;
  background:#fff;
  padding:16px 13px;
}

.form-title{
  margin:0 0 9px;
  text-align:center;
  font-size:18px;
  font-weight:400;
}

.form-desc{
  margin:0 0 15px;
  text-align:center;
  font-size:13px;
  font-weight:400;
  line-height:1.55;
  color:#555;
}

.input-group{margin-bottom:13px}

.input-group label{
  display:block;
  margin-bottom:6px;
  font-size:13px;
  font-weight:400;
}

.input-group input,.birth-selects select{
  width:100%;
  height:42px;
  border:1px solid #777;
  background:#f7fbff;
  padding:0 10px;
  font-size:14px;
  font-weight:400;
  border-radius:2px;
}

.birth-selects{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:7px;
}

.progress-box{
  margin-bottom:12px;
  background:#fff;
  border:1px solid #777;
  padding:8px;
}

.progress-info{
  display:flex;
  justify-content:space-between;
  margin-bottom:6px;
  font-size:12px;
  font-weight:400;
}

.progress-track{
  height:15px;
  border:1px solid #333;
  background:#fff;
  overflow:hidden;
}

.progress-fill{
  width:0%;
  height:100%;
  background:repeating-linear-gradient(90deg,#d7f6ff 0 14px,#fff7a6 14px 28px,#ffd8ee 28px 42px);
  transition:.2s;
}

.q-title{
  min-height:72px;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  font-size:17px;
  font-weight:400;
  line-height:1.45;
  word-break:keep-all;
}

.answer-list{
  display:grid;
  gap:9px;
  margin-top:15px;
}

.answer-btn{
  border:1px solid #777;
  background:#fff;
  box-shadow:3px 3px 0 rgba(0,0,0,.1);
  padding:13px 12px;
  font-size:14px;
  font-weight:400;
  line-height:1.45;
  text-align:left;
  color:#222;
  border-radius:3px;
}

button{cursor:pointer}

.btn-stack{
  display:grid;
  gap:9px;
  margin-top:14px;
}

.main-btn,.sub-btn{
  width:100%;
  min-height:46px;
  border:2px solid #333;
  box-shadow:3px 3px 0 rgba(0,0,0,.14);
  font-size:15px;
  font-weight:400;
  border-radius:3px;
}

.main-btn{background:#d7f6ff;color:#111}
.sub-btn{background:#fff;color:#222}

.mini-result{
  width:100%;
  background:var(--page);
  border:2px solid #333;
  padding:0 10px 18px;
  box-shadow:4px 4px 0 rgba(0,0,0,.14);
}

.result-title{
  min-height:42px;
  border-bottom:2px solid #333;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:400;
  letter-spacing:-1px;
  text-align:center;
}

.result-miniroom-wrap{margin:8px 0}

.result-miniroom{
  height:220px;
  border:2px solid #333;
  position:relative;
  margin-bottom:10px;
  display:flex;
  flex-direction:column;
  border-radius:4px;
  overflow:hidden;
  background:var(--theme-bg,#ffccde);
}

.room-walls{
  flex:6;
  display:flex;
  width:100%;
}

.wall-left{
  flex:1;
  background:var(--theme-wall-l,#ffdae6);
  border-right:1px solid rgba(0,0,0,.1);
  position:relative;
}

.wall-right{
  flex:1;
  background:var(--theme-wall-r,#ffe6f0);
  position:relative;
}

.result-room-floor{
  flex:4;
  background:var(--theme-floor,#ffd1e1);
  border-top:1px solid rgba(0,0,0,.1);
  position:relative;
  background-image:radial-gradient(rgba(255,255,255,.4) 1px,transparent 1px);
  background-size:15px 15px;
}

.room-prop-1{
  position:absolute;
  bottom:10px;
  right:20px;
  font-size:40px;
  z-index:1;
  filter:drop-shadow(2px 2px 0 rgba(0,0,0,.1));
}

.room-prop-2{
  position:absolute;
  bottom:20px;
  left:20px;
  font-size:35px;
  z-index:1;
  filter:drop-shadow(2px 2px 0 rgba(0,0,0,.1));
}

.room-chars{
  position:absolute;
  bottom:10px;
  width:100%;
  display:flex;
  justify-content:space-around;
  padding:0 30px;
  z-index:3;
}

.char-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  position:relative;
}

.char-emoji{
  font-size:55px;
  filter:drop-shadow(2px 2px 0 rgba(0,0,0,.2));
}

.char-bubble{
  background:#fff;
  border:2px solid #333;
  padding:8px 12px;
  font-size:13px;
  border-radius:8px;
  position:absolute;
  bottom:65px;
  text-align:center;
  white-space:pre-wrap;
  min-width:110px;
  line-height:1.35;
  word-break:keep-all;
  box-shadow:2px 2px 0 rgba(0,0,0,.1);
}

.char-bubble:after{
  content:"";
  position:absolute;
  bottom:-7px;
  left:50%;
  transform:translateX(-50%);
  border-width:7px 7px 0;
  border-style:solid;
  border-color:#333 transparent transparent transparent;
}

.bgm-player-box{
  margin-top:10px;
  width:100%;
  background:#fff;
  border:2px solid #ccc;
  border-radius:3px;
  padding:6px 10px;
  font-size:12px;
  display:flex;
  gap:10px;
  align-items:center;
}

.bgm-icon{
  white-space:nowrap;
}

.bgm-song{
  background:#f0f0f0;
  border:1px solid #aaa;
  padding:4px 8px;
  flex:1;
  text-align:left;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.result-profile{
  background:#fff;
  border:1px solid #777;
  margin-top:9px;
  padding:10px;
}

.profile-post{
  border:1px solid #aaa;
  background:#fff;
}

.profile-post-head{
  min-height:34px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  border-bottom:1px solid #bbb;
  background:#f5f5f5;
  padding:7px 9px;
  font-size:12px;
  font-weight:400;
}

.profile-post-title{
  display:flex;
  align-items:center;
  gap:6px;
}

.profile-post-title span{
  display:inline-block;
  width:8px;
  height:8px;
  background:var(--sign);
  border:1px solid #555;
}

.profile-post-date{
  color:#777;
  font-size:11px;
}

.profile-memo{
  padding:10px 11px 12px;
  background:
    linear-gradient(90deg,transparent 0 31px,rgba(180,180,180,.25) 31px 32px,transparent 32px),
    repeating-linear-gradient(180deg,#fff 0 35px,#f8f8f8 35px 36px);
}

.main-room-image{
  width:100%;
  height:100%;
  object-fit:contain;
  display:block;
  background:#fff;
}

.trait-item{
  min-height:35px;
  border-bottom:1px dotted #aaa;
  padding:8px 4px;
  display:flex;
  align-items:center;
  justify-content:flex-start;
  text-align:left;
  font-size:13px;
  font-weight:400;
  line-height:1.35;
  word-break:keep-all;
  background:transparent;
}

.trait-item:first-child{
  border-top:1px dotted #aaa;
}

.trait-item:before{
  content:"";
  display:inline-block;
  width:9px;
  height:9px;
  border:1px solid #555;
  background:var(--bar);
  margin:0 9px 0 3px;
  flex:0 0 auto;
}

.profile-reply{
  border-top:1px solid #ccc;
  background:#fafafa;
  padding:8px 9px;
}

.reply-row{
  display:grid;
  grid-template-columns:48px 1fr;
  gap:8px;
  align-items:center;
  font-size:12px;
  font-weight:400;
}

.reply-name{color:#3c7f95}

.reply-box{
  height:26px;
  border:1px solid #ccc;
  background:#fff;
  color:#999;
  display:flex;
  align-items:center;
  padding:0 8px;
}

.preview-modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  z-index:9999;
  padding:24px 14px;
  align-items:center;
  justify-content:center;
}

.preview-modal.active{display:flex}

.preview-box{
  width:min(360px,100%);
  background:#fff;
  border:2px solid #333;
  box-shadow:5px 5px 0 rgba(0,0,0,.22);
  padding:12px;
  text-align:center;
}

.preview-box p{
  margin:0 0 10px;
  font-size:14px;
  font-weight:400;
}

.preview-box img{
  width:260px;
  max-width:100%;
  border:1px solid #777;
  display:block;
  margin:0 auto 10px;
}

.preview-close{
  width:100%;
  height:40px;
  border:2px solid #333;
  background:#d7f6ff;
  font-size:14px;
  font-weight:400;
}

.ad-box{
  margin-top:18px;
  display:flex;
  justify-content:center;
}

@media(max-width:430px){
  .page-header{
    width:calc(100% - 18px);
    padding:0 6px;
    gap:5px;
  }

  .logo{font-size:16px}

  .main-nav{
    display:flex;
    gap:2px;
    font-size:10px;
  }

  .main-nav a{padding:3px 4px}
  .win-title{font-size:15px}
  .miniroom{height:280px}
  .window-art{left:17px;width:82px;height:60px}
  .sofa-art{left:13px;width:82px;height:58px}
  .poster-art{left:205px;top:72px;width:50px;height:58px}
  .acc-art{left:158px}
  .avatar.left{left:102px;transform:scale(.88);transform-origin:bottom}
  .avatar.right{right:45px;transform:scale(.88);transform-origin:bottom}
  .speech.left{left:66px;top:87px}
  .speech.right{right:25px;top:82px}
  .result-title{font-size:16px}

let currentQuestion=0;

function initBirthSelects(){
  const y=document.getElementById("birthYear");
  const m=document.getElementById("birthMonth");
  const d=document.getElementById("birthDay");
  const now=new Date().getFullYear();

  y.innerHTML="<option value=\"\">년도</option>";
  m.innerHTML="<option value=\"\">월</option>";
  d.innerHTML="<option value=\"\">일</option>";

  for(let i=now;i>=1940;i--) y.innerHTML+=`<option value="${i}">${i}년</option>`;
  for(let i=1;i<=12;i++) m.innerHTML+=`<option value="${i}">${i}월</option>`;
  for(let i=1;i<=31;i++) d.innerHTML+=`<option value="${i}">${i}일</option>`;
}

function showScreen(name){
  Object.values(screens).forEach(screen=>screen.classList.remove("active"));
  screens[name].classList.add("active");
  window.scrollTo({top:0,behavior:"smooth"});
}

function goInfo(){
  showScreen("info");
}

function startQuiz(){
  const name=document.getElementById("userName").value.trim();
  const year=document.getElementById("birthYear").value;
  const month=document.getElementById("birthMonth").value;
  const day=document.getElementById("birthDay").value;

  if(!name){
    alert("닉네임이나 이름을 입력해주세요.");
    return;
  }

  if(!year||!month||!day){
    alert("생년월일을 모두 선택해주세요.");
    return;
  }

  userName=name;
  userBirth={year,month,day};
  currentQuestion=0;
  scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

  showScreen("quiz");
  renderQuestion();
}

function renderQuestion(){
  const question=questions[currentQuestion];
  const percent=Math.round((currentQuestion/questions.length)*100);

  document.getElementById("questionCount").textContent=`QUESTION ${currentQuestion+1} / ${questions.length}`;
  document.getElementById("percentText").textContent=`${percent}%`;
  document.getElementById("progressFill").style.width=`${percent}%`;
  document.getElementById("questionTitle").textContent=question.q;

  const answerList=document.getElementById("answerList");
  answerList.innerHTML="";

  question.a.forEach(answer=>{
    const btn=document.createElement("button");
    btn.className="answer-btn";
    btn.textContent=answer.text;
    btn.onclick=()=>selectAnswer(answer.type);
    answerList.appendChild(btn);
  });
}

function selectAnswer(type){
  scores[type]++;
  currentQuestion++;

  if(currentQuestion>=questions.length){
    document.getElementById("progressFill").style.width="100%";
    document.getElementById("percentText").textContent="100%";
    showResult();
  }else{
    renderQuestion();
  }
}

function getMbti(){
  return[
    scores.E>=scores.I?"E":"I",
    scores.S>=scores.N?"S":"N",
    scores.T>=scores.F?"T":"F",
    scores.J>=scores.P?"J":"P"
  ].join("");
}

function getZodiac(month,day){
  month=Number(month);
  day=Number(day);

  if((month===1&&day>=20)||(month===2&&day<=18))return"물병자리";
  if((month===2&&day>=19)||(month===3&&day<=20))return"물고기자리";
  if((month===3&&day>=21)||(month===4&&day<=19))return"양자리";
  if((month===4&&day>=20)||(month===5&&day<=20))return"황소자리";
  if((month===5&&day>=21)||(month===6&&day<=20))return"쌍둥이자리";
  if((month===6&&day>=21)||(month===7&&day<=22))return"게자리";
  if((month===7&&day>=23)||(month===8&&day<=22))return"사자자리";
  if((month===8&&day>=23)||(month===9&&day<=22))return"처녀자리";
  if((month===9&&day>=23)||(month===10&&day<=22))return"천칭자리";
  if((month===10&&day>=23)||(month===11&&day<=21))return"전갈자리";
  if((month===11&&day>=22)||(month===12&&day<=21))return"궁수자리";
  return"염소자리";
}

function applyTheme(mbti){
  const area=document.getElementById("captureArea");
  const theme=mbtiThemes[mbti];

  area.style.setProperty("--page",theme.bg);
  area.style.setProperty("--theme-bg",theme.bg);
  area.style.setProperty("--theme-table",theme.table);
  area.style.setProperty("--theme-wall-l",theme.wall_l);
  area.style.setProperty("--theme-wall-r",theme.wall_r);
  area.style.setProperty("--theme-floor",theme.floor);
  area.style.setProperty("--theme-label",theme.label);
  area.style.setProperty("--bar",theme.table);
  area.style.setProperty("--sign",theme.label);
  area.style.setProperty("--tab",theme.table);
  area.style.setProperty("--btn",theme.table);
}

function showResult(){
  const mbti=getMbti();
  const zodiac=getZodiac(userBirth.month,userBirth.day);
  const data=resultData[mbti];
  const mini=miniroomData[mbti];

  applyTheme(mbti);

  document.getElementById("resultMiniroomName").textContent=`${userName}의 Miniroom`;
  document.getElementById("resultZodiacTab").textContent=zodiac;
  document.getElementById("roomSpeech1").textContent=mini.speech;
  document.getElementById("roomSpeech2").textContent=mini.speech2;
  document.getElementById("roomSprite1").textContent=mini.sprite;
  document.getElementById("roomSprite2").textContent=mini.sprite2;
  document.getElementById("roomProp1").textContent=theme.prop1;
  document.getElementById("roomProp2").textContent=theme.prop2;
  document.getElementById("resultBgm").textContent=mini.bgm;

  const traitList=document.getElementById("traitList");
  traitList.innerHTML="";

  data.traits.forEach(text=>{
    const item=document.createElement("div");
    item.className="trait-item";
    item.textContent=text;
    traitList.appendChild(item);
  });

  showScreen("result");
}

function resetTest(){
  currentQuestion=0;
  scores={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  closePreview();
  showScreen("start");
}

function saveResultImage(){
  const target=document.getElementById("captureArea");

  html2canvas(target,{
    backgroundColor:null,
    scale:2,
    useCORS:true,
    allowTaint:true
  }).then(canvas=>{
    document.getElementById("previewImage").src=canvas.toDataURL("image/png");
    document.getElementById("previewModal").classList.add("active");
  });
}

function closePreview(){
  document.getElementById("previewModal").classList.remove("active");
}

let sharing=false;

async function shareTest(){
  const shareUrl="https://test-it.co.kr/";
  const shareTitle="테스트잇 미니홈피 프로필 성격 테스트";
  const shareText="내 미니홈피 프로필 성격은 뭘까?";

  if(sharing)return;
  sharing=true;

  try{
    if(navigator.share){
      await navigator.share({
        title:shareTitle,
        text:shareText,
        url:shareUrl
      });
    }else if(navigator.clipboard){
      await navigator.clipboard.writeText(shareUrl);
      alert("테스트 링크가 복사되었습니다.");
    }else{
      const temp=document.createElement("input");
      temp.value=shareUrl;
      document.body.appendChild(temp);
      temp.select();
      document.execCommand("copy");
      document.body.removeChild(temp);
      alert("테스트 링크가 복사되었습니다.");
    }
  }catch(error){
    if(error.name!=="AbortError"){
      alert("공유를 다시 시도해주세요.");
    }
  }finally{
    setTimeout(()=>{sharing=false},800);
  }
}
