<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>테스트잇 - 성격 테스트로그</title>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DungGeunMo&display=swap');

  :root {
    --c-bg: #fff0f5;
    --c-pill1: #ffb6c1;
    --c-pill2: #ffdab9;
    --c-good: #87cefa;
    --c-bad: #dda0dd;
    --c-detail: #fff;
    
    /* 레트로 폰 바디 색상 - 회색(실버) */
    --phone-body: #d9d9d9;
    --phone-border: #999999;
    --retro-lcd: #c4d4af; 
    --lcd-text: #2e352e; /* 추가된 텍스트/테두리 색상 */

    /* 헤더 및 외부 버튼용 윈도우 스타일 색상 */
    --win-bg: #e0e0e0;
    --win-border-light: #ffffff;
    --win-border-dark: #000000;
    --text: #000000;
  }

  body.theme-istj { --c-bg: #e3f2fd; --c-pill1: #bbdefb; --c-pill2: #c8e6c9; --c-good: #d1c4e9; --c-bad: #ffcdd2; }
  body.theme-isfj { --c-bg: #e8f5e9; --c-pill1: #c8e6c9; --c-pill2: #fff9c4; --c-good: #b2dfdb; --c-bad: #ffcc80; }
  body.theme-infj { --c-bg: #f3e5f5; --c-pill1: #e1bee7; --c-pill2: #d1c4e9; --c-good: #b3e5fc; --c-bad: #f8bbd0; }
  body.theme-intj { --c-bg: #ede7f6; --c-pill1: #d1c4e9; --c-pill2: #c5cae9; --c-good: #b2ebf2; --c-bad: #ffcdd2; }
  body.theme-istp { --c-bg: #e0f7fa; --c-pill1: #b2ebf2; --c-pill2: #b2dfdb; --c-good: #c8e6c9; --c-bad: #cfd8dc; }
  body.theme-isfp { --c-bg: #f1f8e9; --c-pill1: #dcedc8; --c-pill2: #fff9c4; --c-good: #ffcc80; --c-bad: #ffab91; }
  body.theme-infp { --c-bg: #e1f5fe; --c-pill1: #b3e5fc; --c-pill2: #e1bee7; --c-good: #f8bbd0; --c-bad: #d1c4e9; }
  body.theme-intp { --c-bg: #fafafa; --c-pill1: #cfd8dc; --c-pill2: #d1c4e9; --c-good: #b2ebf2; --c-bad: #f48fb1; }
  body.theme-estp { --c-bg: #fffde7; --c-pill1: #fff59d; --c-pill2: #ffcc80; --c-good: #ffab91; --c-bad: #b2dfdb; }
  body.theme-esfp { --c-bg: #fff3e0; --c-pill1: #ffe082; --c-pill2: #ffab91; --c-good: #f8bbd0; --c-bad: #b2ebf2; }
  body.theme-enfp { --c-bg: #fce4ec; --c-pill1: #f8bbd0; --c-pill2: #ffe082; --c-good: #b3e5fc; --c-bad: #d1c4e9; }
  body.theme-entp { --c-bg: #fff8e1; --c-pill1: #ffe082; --c-pill2: #ffcc80; --c-good: #dce775; --c-bad: #ffab91; }
  body.theme-estj { --c-bg: #f0f4c3; --c-pill1: #dce775; --c-pill2: #fff59d; --c-good: #ffcc80; --c-bad: #b2dfdb; }
  body.theme-esfj { --c-bg: #fff9c4; --c-pill1: #fff59d; --c-pill2: #ffcc80; --c-good: #f8bbd0; --c-bad: #b3e5fc; }
  body.theme-enfj { --c-bg: #fce4ec; --c-pill1: #f48fb1; --c-pill2: #ce93d8; --c-good: #81d4fa; --c-bad: #80cbc4; }
  body.theme-entj { --c-bg: #ffebee; --c-pill1: #ef9a9a; --c-pill2: #ffab91; --c-good: #ffe082; --c-bad: #b3e5fc; }

  body {
    margin: 0;
    padding: 0;
    padding-bottom: 40px;
    background-color: #f5f2eb;
    font-family: 'DungGeunMo', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
  }

  .header-wrapper {
    width: 100%;
    background-color: var(--win-bg);
    border-bottom: 2px outset var(--win-border-light);
    box-shadow: 0 1px 0 var(--win-border-light);
    align-self: flex-start;
    margin-bottom: 20px;
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
    padding: 6px 4% !important;
  }

  .retro-logo {
    text-decoration: none;
    color: var(--text);
    font-size: 18px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 5px;
    background-color: var(--win-bg);
    padding: 5px 10px;
    border-top: 2px solid var(--win-border-light);
    border-left: 2px solid var(--win-border-light);
    border-right: 2px solid var(--win-border-dark);
    border-bottom: 2px solid var(--win-border-dark);
  }

  .retro-logo:active {
    border-top: 2px solid var(--win-border-dark);
    border-left: 2px solid var(--win-border-dark);
    border-right: 2px solid var(--win-border-light);
    border-bottom: 2px solid var(--win-border-light);
    padding: 6px 9px 4px 11px;
  }

  .page-header h1 {
    margin: 0 !important;
    padding: 0 !important;
    border-bottom: none !important;
  }

  .main-nav {
    display: flex;
    flex-wrap: nowrap !important;
    align-items: center;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: 14px;
  }

  .main-nav li {
    margin-left: 0;
  }

  .main-nav a {
    display: block;
    text-decoration: none;
    color: var(--text);
    font-weight: 700;
    background: var(--win-bg);
    border-top: 2px solid var(--win-border-light);
    border-left: 2px solid var(--win-border-light);
    border-right: 2px solid var(--win-border-dark);
    border-bottom: 2px solid var(--win-border-dark);
    padding: 6px 12px;
    font-size: 15px;
    white-space: nowrap;
    box-sizing: border-box;
  }

  .main-nav a:active {
    border-top: 2px solid var(--win-border-dark);
    border-left: 2px solid var(--win-border-dark);
    border-right: 2px solid var(--win-border-light);
    border-bottom: 2px solid var(--win-border-light);
    padding: 7px 11px 5px 13px;
  }

  #app {
    width: 100%;
    max-width: 500px; 
    background-color: var(--phone-body);
    border: 3px solid var(--phone-border);
    border-radius: 40px 40px 50px 50px;
    padding: 20px 20px 30px 20px; 
    box-shadow: inset 4px 4px 10px rgba(255,255,255,0.6), inset -4px -4px 12px rgba(0,0,0,0.15), 5px 15px 25px rgba(0,0,0,0.2);
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .phone-top-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 15px;
  }
  
  .speaker-hole {
    width: 50px;
    height: 6px;
    background-color: #222;
    border-radius: 10px;
    border: 1px solid #000;
    box-shadow: inset 0px 2px 3px rgba(0,0,0,0.8);
    margin-bottom: 5px; 
  }

  .screen-glass {
    background: #2b2b2b;
    border-radius: 20px 20px 30px 30px;
    padding: 20px 15px 35px 15px;
    border: 2px solid #111;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.9), 0 2px 3px rgba(255,255,255,0.4);
    display: flex;
    flex-direction: column;
    position: relative;
  }

  .lcd-screen {
    width: 100%;
    border: 3px solid #000;
    border-radius: 4px;
    box-sizing: border-box;
    overflow: hidden;
    position: relative;
    display: flex;
    flex-direction: column;
  }

  #main-screen {
    background-color: var(--retro-lcd);
    min-height: 380px; 
  }

  #question-screen {
    background-color: var(--retro-lcd);
    min-height: 380px; 
  }

  #result-screen {
    background-color: var(--c-bg); 
    height: auto;
  }

  .status-bar {
    height: 24px;
    color: #000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 8px;
    font-size: 12px;
    z-index: 10;
    flex-shrink: 0;
    border-bottom: 2px dashed rgba(0,0,0,0.3);
    margin-bottom: 10px;
  }

  .battery-icon {
    display: flex;
    align-items: center;
    margin-right: 5px;
  }

  .glass-bottom-text {
    position: absolute;
    bottom: 10px;
    left: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    color: #888;
    font-size: 11px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    letter-spacing: 1px;
  }

  .screen-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 10px 20px;
    box-sizing: border-box;
    text-align: center;
  }

  .retro-title {
    font-size: 28px;
    color: var(--lcd-text);
    margin-top: 10px;
    margin-bottom: 20px;
    line-height: 1.2;
    letter-spacing: -1px;
  }
  
  .retro-subtitle {
    color: var(--lcd-text);
    font-size: 14px;
    margin-bottom: 30px;
    line-height: 1.5;
  }

  .pixel-btn {
    background-color: transparent;
    color: var(--lcd-text);
    border: 2px solid var(--lcd-text);
    border-radius: 0;
    padding: 12px 15px;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    font-family: inherit;
    width: 100%;
    margin-bottom: 10px;
    text-align: center;
    word-break: keep-all;
    box-shadow: inset -2px -2px 0 rgba(46,53,46,0.42);
  }
  .pixel-btn:active {
    background-color: var(--lcd-text);
    color: var(--retro-lcd);
    box-shadow: inset 2px 2px 0 rgba(0,0,0,0.4);
  }

  .start-btn-external, .ext-btn {
    background-color: var(--win-bg);
    color: var(--text);
    font-family: inherit;
    font-weight: 800;
    font-size: 16px;
    padding: 12px;
    border: 2px solid var(--lcd-text);
    box-shadow: inset -2px -2px 0 rgba(46,53,46,0.2);
    cursor: pointer;
    width: 90%;
    max-width: 360px;
    box-sizing: border-box;
    margin: 0 auto;
    text-align: center;
    word-break: keep-all;
  }
  
  .start-btn-external {
    margin-top: 25px;
    font-size: 18px;
    display: block;
  }

  .start-btn-external:active, .ext-btn:active {
    background-color: #d0d0d0;
    box-shadow: inset 2px 2px 0 rgba(46,53,46,0.2);
    padding: 13px 11px 11px 13px;
  }

  .progress-container {
    width: 100%;
    height: 10px;
    background-color: transparent;
    border: 2px solid var(--lcd-text);
    margin-bottom: 30px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    background-color: var(--lcd-text);
    width: 0%;
    transition: width 0.2s;
  }

  #question-text { 
    font-size: 18px; 
    margin-bottom: 30px; 
    line-height: 1.5; 
    color: var(--lcd-text);
    font-weight: bold;
    width: 100%;
    word-break: keep-all;
  }

  .minimal-keypad {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    margin-top: 25px;
  }
  
  .pad-btn {
    background: #eee;
    border: 2px solid #999;
    box-shadow: inset 2px 2px 4px #fff, 2px 2px 4px rgba(0,0,0,0.2);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #333;
    font-family: Arial, sans-serif;
    font-weight: bold;
  }
  
  .btn-side {
    width: 40px;
    height: 20px;
    border-radius: 10px;
  }
  
  .btn-center {
    width: 50px;
    height: 40px;
    border-radius: 20px;
    font-size: 12px;
  }

  .folder-top {
    aspect-ratio: 4 / 3; 
    border-bottom: 3px solid #000;
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    background-color: #111;
  }

  #noise-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image: url('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAQAAAAECAYAAACp8Z5+AAAAIklEQVQIW2NkQAKrVq36zwjjgzhhYWGMYAEYB8RmROaABADeOQ8CXl/xfgAAAABJRU5ErkJggg==');
    background-repeat: repeat;
    z-index: 2;
    display: none;
  }

  #no-signal-text {
    position: absolute;
    color: #fff;
    font-family: 'Courier New', Courier, monospace;
    font-size: 20px;
    font-weight: bold;
    letter-spacing: 1px;
    z-index: 3;
    display: none;
    text-shadow: 2px 2px 0px #000;
  }

  #image-upload {
    position: absolute;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    z-index: 10;
  }

  .upload-placeholder {
    font-size: 16px;
    color: #fff;
    pointer-events: none;
    text-align: center;
    line-height: 1.6;
    z-index: 5;
    text-shadow: 1px 1px 2px #000;
  }

  #preview-img-final {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 8;
  }

  .folder-bottom {
    flex: 1;
    padding: 25px 20px;
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
  }

  .trait-row { 
    display: flex; 
    gap: 15px; 
    margin-bottom: 25px; 
    align-items: stretch; 
  }

  .retro-box {
    color: var(--lcd-text);
    border: 2px solid var(--lcd-text);
    border-radius: 0; 
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    background: #fff;
    box-shadow: inset -2px -2px 0 rgba(46,53,46,0.2);
  }

  .circle { 
    width: 80px; 
    border-radius: 0; 
    font-weight: bold; 
    font-size: 16px; 
    line-height: 1.3; 
    flex-shrink: 0; 
  }
  
  .pill { 
    border-radius: 0; 
    padding: 12px; 
    font-size: 15px; 
    flex: 1; 
    font-weight: bold; 
  }
  
  .content-split {
    display: flex;
    gap: 15px; 
    flex: 1;
    align-items: stretch;
  }

  .good-bad-container {
    display: flex;
    flex-direction: column;
    gap: 15px; 
    flex: 0.4;
  }

  .rect-small { 
    flex: 1; 
    display: flex; 
    flex-direction: column; 
    font-size: 15px; 
    font-weight: bold; 
    padding: 18px 0; 
    border-radius: 0;
  }
  .rect-small span { font-size: 12px; opacity: 0.7; margin-bottom: 6px; font-weight: normal; }
  
  .traits-grid {
    flex: 1.6;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px; 
    align-content: stretch;
  }

  .trait-btn {
    border: 2px solid var(--lcd-text);
    border-radius: 0;
    font-size: 14px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px; 
    word-break: keep-all;
    text-align: center;
    line-height: 1.4;
    color: var(--lcd-text);
    box-shadow: inset -2px -2px 0 rgba(46,53,46,0.18);
  }

  .trait-btn:nth-child(1) { background-color: #FFB3BA; }
  .trait-btn:nth-child(2) { background-color: #FFDFBA; }
  .trait-btn:nth-child(3) { background-color: #FFFFBA; }
  .trait-btn:nth-child(4) { background-color: #BAFFC9; }
  .trait-btn:nth-child(5) { background-color: #BAE1FF; }
  .trait-btn:nth-child(6) { background-color: #D4B0FF; }
  .trait-btn:nth-child(7) { background-color: #FFC8E3; }
  .trait-btn:nth-child(8) { background-color: #B2F0E6; }

  .external-actions {
    width: 100%;
    margin-top: 20px;
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    box-sizing: border-box;
  }

  #final-save-modal, #edit-modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.85);
    z-index: 3000;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  
  .save-guide-text {
    color: #fff; font-size: 16px; margin-bottom: 20px; font-weight: bold; text-align: center; line-height: 1.5;
  }

  #final-captured-image {
    width: 90%;
    max-width: 400px;
    border: 2px solid #fff;
    border-radius: 10px;
    margin-bottom: 25px;
  }

  #edit-container {
    width: 90%;
    max-width: 400px;
    background-color: var(--win-bg);
    border-top: 2px solid var(--win-border-light);
    border-left: 2px solid var(--win-border-light);
    border-right: 2px solid var(--win-border-dark);
    border-bottom: 2px solid var(--win-border-dark);
    padding: 20px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }

  .edit-title { font-size: 18px; font-weight: bold; margin-bottom: 15px; text-align: center; color: #000; }

  #canvas-container {
    width: 100%;
    aspect-ratio: 1.5 / 1;
    border-top: 2px solid var(--win-border-dark);
    border-left: 2px solid var(--win-border-dark);
    border-right: 2px solid var(--win-border-light);
    border-bottom: 2px solid var(--win-border-light);
    background-color: #eee;
    position: relative;
    overflow: hidden;
    touch-action: none;
    cursor: grab;
  }
  #canvas-container:active { cursor: grabbing; }
  canvas { display: block; width: 100%; height: 100%; }

  .pc-controls { display: flex; justify-content: center; gap: 5px; margin-top: 15px; }
  
  @media (max-width: 480px) {
    .page-header {
      padding: 6px 12px !important;
    }
    .retro-logo {
      font-size: 16px;
      padding: 3px 8px;
    }
    .main-nav {
      gap: 8px;
    }
    .main-nav a {
      padding: 5px 8px;
      font-size: 14px;
      letter-spacing: -0.5px;
    }

    #app {
      padding: 15px 10px 25px 10px;
      border-radius: 30px 30px 40px 40px;
    }
    .screen-glass {
      padding: 15px 10px 25px 10px;
    }
    .folder-bottom {
      padding: 15px 10px;
    }
    .trait-row {
      gap: 8px;
      margin-bottom: 15px;
    }
    .content-split {
      gap: 8px;
    }
    .good-bad-container {
      gap: 8px;
    }
    .traits-grid {
      gap: 8px;
    }
    .circle {
      width: 60px;
      font-size: 14px;
    }
    .pill {
      padding: 8px;
      font-size: 13px;
    }
    .rect-small {
      padding: 12px 0;
      font-size: 13px;
    }
    .trait-btn {
      padding: 8px 4px;
      font-size: 12px;
    }
    .pc-controls { 
      display: none !important; 
    }
  }

  .pc-controls button {
    background-color: var(--win-bg);
    border-top: 2px solid var(--win-border-light);
    border-left: 2px solid var(--win-border-light);
    border-right: 2px solid var(--win-border-dark);
    border-bottom: 2px solid var(--win-border-dark);
    font-weight: bold;
    padding: 5px 10px;
    cursor: pointer;
  }
  .pc-controls button:active {
    border-top: 2px solid var(--win-border-dark);
    border-left: 2px solid var(--win-border-dark);
    border-right: 2px solid var(--win-border-light);
    border-bottom: 2px solid var(--win-border-light);
  }

  .edit-controls { margin-top: 20px; display: flex; flex-direction: column; gap: 12px; color: #000; }
  .control-row { display: flex; align-items: center; justify-content: space-between; font-size: 14px; font-weight: bold; }
  .control-row input[type="range"] { flex: 1; margin: 0 10px; }

  .edit-actions { display: flex; gap: 10px; margin-top: 20px; }
  .edit-actions button { 
    flex: 1; 
    padding: 10px; 
    background-color: var(--win-bg);
    border-top: 2px solid var(--win-border-light);
    border-left: 2px solid var(--win-border-light);
    border-right: 2px solid var(--win-border-dark);
    border-bottom: 2px solid var(--win-border-dark);
    font-weight: bold; 
    font-family: inherit; 
    cursor: pointer; 
  }
  .edit-actions button:active {
    border-top: 2px solid var(--win-border-dark);
    border-left: 2px solid var(--win-border-dark);
    border-right: 2px solid var(--win-border-light);
    border-bottom: 2px solid var(--win-border-light);
  }

</style>
</head>
<body>

<div class="header-wrapper">
  <header class="page-header wrapper">

  };

  let currentQ = 0;
  let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

  function startTest() {
    document.getElementById('main-screen').style.display = 'none';
    document.getElementById('question-screen').style.display = 'flex';
    document.getElementById('external-start-btn').style.display = 'none'; 
    showQuestion();
  }

  function showQuestion() {
    const qData = qnaList[currentQ];
    document.getElementById('question-text').innerHTML = `Q${currentQ + 1}.<br><br>${qData.q}`;
    document.getElementById('btn-a').innerText = qData.a.text;
    document.getElementById('btn-b').innerText = qData.b.text;
    const percent = (currentQ / qnaList.length) * 100;
    document.getElementById('progress').style.width = percent + '%';
  }

  function selectAnswer(choice) {
    const qData = qnaList[currentQ];
    const selectedType = choice === 'A' ? qData.a.type : qData.b.type;
    scores[selectedType]++;
    
    currentQ++;
    if (currentQ >= qnaList.length) {
      document.getElementById('progress').style.width = '100%';
      setTimeout(calculateResult, 300);
    } else {
      showQuestion();
    }
  }

  function calculateResult() {
    let mbti = "";
    mbti += (scores.E >= scores.I) ? "E" : "I";
    mbti += (scores.S >= scores.N) ? "S" : "N";
    mbti += (scores.T >= scores.F) ? "T" : "F";
    mbti += (scores.J >= scores.P) ? "J" : "P";

    document.getElementById('question-screen').style.display = 'none';
    document.getElementById('result-screen').style.display = 'flex';
    document.getElementById('external-actions').style.display = 'flex'; 
    document.body.className = 'theme-' + mbti.toLowerCase();

    const resData = resultsData[mbti];
    document.getElementById('res-keyword1').innerText = resData.k1; 
    document.getElementById('res-keyword2').innerText = resData.k2; 
    document.getElementById('res-good').innerText = resData.good;
    document.getElementById('res-bad').innerText = resData.bad;
    
    let detailsHtml = '';
    resData.details.forEach(item => {
      detailsHtml += `<div class="trait-btn"><span>${item}</span></div>`;
    });
    document.getElementById('res-details').innerHTML = detailsHtml;
    
    document.getElementById('noise-overlay').style.display = 'none';
    document.getElementById('no-signal-text').style.display = 'none';
    document.getElementById('upload-placeholder').style.display = 'block';
  }

  function shareTest() {
    const url = window.location.href;
    navigator.clipboard.writeText(url).then(() => {
      alert('테스트 링크가 복사되었습니다!');
    }).catch(() => {
      alert('링크 복사에 실패했습니다.');
    });
  }

  const imageUpload = document.getElementById('image-upload');
  const editModal = document.getElementById('edit-modal');
  const canvasContainer = document.getElementById('canvas-container');
  const canvas = document.getElementById('edit-canvas');
  const ctx = canvas.getContext('2d');
  const previewImgFinal = document.getElementById('preview-img-final');
  
  const brightnessSlider = document.getElementById('brightness-slider');
  const grayscaleCheck = document.getElementById('grayscale-check');
  const uploadPlaceholder = document.getElementById('upload-placeholder');
  const noiseOverlay = document.getElementById('noise-overlay');
  const noSignalText = document.getElementById('no-signal-text');

  let imgObj = new Image();
  let imgX = 0, imgY = 0, imgScale = 1;
  let isDragging = false;
  let startX, startY;
  let initialDist = null;
  let initialScale = 1;

  const HIGH_RES_SCALE = 4;

  function resizeCanvas() {
    canvas.width = canvasContainer.clientWidth * HIGH_RES_SCALE;
    canvas.height = canvasContainer.clientHeight * HIGH_RES_SCALE;
    renderCanvas();
  }

  imageUpload.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function(event) {
        imgObj.onload = function() {
          editModal.style.display = 'flex';
          resizeCanvas();
          
          const scaleW = canvasContainer.clientWidth / imgObj.width;
          const scaleH = canvasContainer.clientHeight / imgObj.height;
          imgScale = Math.max(scaleW, scaleH);
          
          imgX = (canvasContainer.clientWidth - imgObj.width * imgScale) / 2;
          imgY = (canvasContainer.clientHeight - imgObj.height * imgScale) / 2;
          
          brightnessSlider.value = 100;
          grayscaleCheck.checked = false;
          renderCanvas();
        };
        imgObj.src = event.target.result;
      }
      reader.readAsDataURL(file);
    }
  });

  brightnessSlider.addEventListener('input', renderCanvas);
  grayscaleCheck.addEventListener('change', renderCanvas);

  function renderCanvas() {
    if (!imgObj.src) return;
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    let filterStr = `brightness(${brightnessSlider.value}%)`;
    if (grayscaleCheck.checked) filterStr += ` grayscale(100%)`;
    ctx.filter = filterStr;
    
    ctx.translate(imgX * HIGH_RES_SCALE, imgY * HIGH_RES_SCALE);
    ctx.scale(imgScale * HIGH_RES_SCALE, imgScale * HIGH_RES_SCALE);
    ctx.drawImage(imgObj, 0, 0);
    ctx.restore();
  }

  function adjustCanvas(action) {
    const step = 20;
    if (action === 'zoomIn') imgScale *= 1.1;
    if (action === 'zoomOut') imgScale *= 0.9;
    if (action === 'up') imgY -= step;
    if (action === 'down') imgY += step;
    if (action === 'left') imgX -= step;
    if (action === 'right') imgX += step;
    renderCanvas();
  }

  function getDistance(touches) {
    return Math.hypot(touches[0].clientX - touches[1].clientX, touches[0].clientY - touches[1].clientY);
  }

  canvasContainer.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX - imgX;
    startY = e.clientY - imgY;
  });

  canvasContainer.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
      isDragging = true;
      startX = e.touches[0].clientX - imgX;
      startY = e.touches[0].clientY - imgY;
    } else if (e.touches.length === 2) {
      isDragging = false;
      initialDist = getDistance(e.touches);
      initialScale = imgScale;
    }
  }, {passive: false});

  window.addEventListener('mousemove', (e) => {
    if (isDragging) {
      imgX = e.clientX - startX;
      imgY = e.clientY - startY;
      renderCanvas();
    }
  });

  window.addEventListener('touchmove', (e) => {
    if (isDragging && e.touches.length === 1) {
      e.preventDefault();
      imgX = e.touches[0].clientX - startX;
      imgY = e.touches[0].clientY - startY;
      renderCanvas();
    } else if (e.touches.length === 2) {
      e.preventDefault();
      const currentDist = getDistance(e.touches);
      if (initialDist) {
        const factor = currentDist / initialDist;
        imgScale = initialScale * factor;
        if (imgScale < 0.1) imgScale = 0.1;
        renderCanvas();
      }
    }
  }, {passive: false});

  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('touchend', () => isDragging = false);

  canvasContainer.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = canvasContainer.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    
    const wheelFactor = e.deltaY > 0 ? 0.9 : 1.1;
    const newScale = imgScale * wheelFactor;
    
    imgX = mouseX - (mouseX - imgX) * (newScale / imgScale);
    imgY = mouseY - (mouseY - imgY) * (newScale / imgScale);
    imgScale = newScale;
    renderCanvas();
  });

  function closeEditModal() {
    editModal.style.display = 'none';
    imageUpload.value = '';
  }

  function deletePhoto() {
    imgObj.src = '';
    previewImgFinal.src = '';
    previewImgFinal.style.display = 'none';
    
    noiseOverlay.style.display = 'none';
    noSignalText.style.display = 'none';
    uploadPlaceholder.style.display = 'block';
    
    closeEditModal();
  }

  function applyEdit() {
    previewImgFinal.src = canvas.toDataURL('image/png');
    previewImgFinal.style.display = 'block';
    
    noiseOverlay.style.display = 'none';
    noSignalText.style.display = 'none';
    uploadPlaceholder.style.display = 'none';
    
    closeEditModal();
  }

 function captureAndShowImage() {
  const captureArea = document.getElementById('result-screen'); 
  const isUploaded = previewImgFinal.src && previewImgFinal.style.display !== 'none';
  
  if (!isUploaded) {
    noiseOverlay.style.display = 'block';
    noSignalText.style.display = 'block';
    uploadPlaceholder.style.display = 'none';
  }

  setTimeout(() => {
    html2canvas(captureArea, { scale: 3, useCORS: true, backgroundColor: null }).then(canvas => {
      const finalModal = document.getElementById('final-save-modal');
      const finalImage = document.getElementById('final-captured-image');
      
      finalImage.src = canvas.toDataURL('image/png');
      finalModal.style.display = 'flex';
      
      if (!isUploaded) {
        noiseOverlay.style.display = 'none';
        noSignalText.style.display = 'none';
        uploadPlaceholder.style.display = 'block';
      }
    });
  }, 200);
}
</script>
