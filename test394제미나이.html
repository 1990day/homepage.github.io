<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>테스트잇 MBTI 성격 테스트</title>
<link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    :root {
        --bg-outer: #e0f2fe;
        --card-bg: #ffffff;
        --text-color: #0f172a;
        --border-color: #1e3a8a;
        --theme-bg: #bae6fd;
        --theme-table: #7dd3fc;
        --theme-label: #0284c7;
    }

    * {
        box-sizing: border-box;
        font-family: 'NeoDunggeunmo', sans-serif;
        margin: 0;
        padding: 0;
    }

    body {
        background: linear-gradient(180deg, #e0f2fe 0%, #bae6fd 48%, #7dd3fc 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px;
        min-height: 100vh;
        color: var(--text-color);
    }

    .page-header {
        width: min(650px, calc(100% - 2px));
        margin: 0 auto 15px;
        height: 56px;
        padding: 0 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border: 2px solid var(--border-color);
        background: #f8fafc;
        border-radius: 10px;
        box-shadow: 4px 4px 0 rgba(2, 132, 199, 0.65);
    }

    .logo-text {
        font-size: 20px;
        font-weight: 900;
        text-decoration: none;
        color: var(--border-color);
    }

    .main-nav {
        display: flex;
        gap: 5px;
    }

    .main-nav a {
        padding: 6px 8px;
        border: 1.5px solid var(--border-color);
        background: #e0f2fe;
        border-radius: 6px;
        text-decoration: none;
        color: var(--border-color);
        font-size: 12px;
    }

    .app-wrapper {
        width: 100%;
        max-width: 650px;
        background: var(--card-bg);
        border: 2px solid var(--border-color);
        border-radius: 16px;
        box-shadow: 6px 6px 0 rgba(2, 132, 199, 0.6);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .screen {
        display: none;
        flex-direction: column;
        width: 100%;
        padding: 30px 10px;
        align-items: center;
    }

    .screen.active {
        display: flex;
    }

    .screen-title { 
        font-size: 26px; 
        margin-bottom: 30px; 
        line-height: 1.4; 
        color: #0284c7; 
        text-align: center; 
        font-weight: bold;
        text-shadow: 2px 2px 0 #fde047;
        word-break: keep-all;
    }

    .progress-container {
        width: 100%;
        max-width: 400px;
        height: 20px;
        background-color: #f0f9ff;
        border: 2px solid var(--border-color);
        border-radius: 10px;
        margin-bottom: 35px;
        overflow: hidden;
    }

    .progress-bar {
        width: 0%;
        height: 100%;
        background-color: #38bdf8;
        transition: width 0.2s ease;
    }

    .question-box {
        width: 100%;
        max-width: 400px;
        font-size: 18px;
        text-align: center;
        line-height: 1.5;
        margin-bottom: 40px;
        min-height: 80px;
        display: flex;
        align-items: center;
        justify-content: center;
        word-break: keep-all;
    }

    .action-btn {
        background-color: #0284c7;
        color: #fff;
        border: 2px solid var(--border-color);
        padding: 16px 20px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        max-width: 400px;
        border-radius: 10px;
        box-shadow: 3px 3px 0 #7dd3fc;
    }

    .action-btn:active {
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0 #7dd3fc;
    }

    .choice-btn {
        background-color: #ffffff;
        color: var(--text-color);
        font-size: 15px;
        margin-bottom: 12px;
        box-shadow: 3px 3px 0 rgba(56, 189, 248, 0.5);
        text-align: left;
        line-height: 1.4;
    }

    .choice-btn:hover {
        background-color: #e0f2fe;
    }

    .result-theme-bg {
        background-color: var(--theme-bg);
        width: 100%;
        padding: 15px 10px;
        display: flex;
        flex-direction: column;
    }

    .result-header {
        position: relative;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        line-height: 1.35;
        padding: 13px 12px 12px;
        border: 2px solid var(--border-color);
        background: #ffffff;
        color: var(--text-color);
        border-radius: 8px;
        margin: 4px 6px 16px;
        box-shadow: 4px 4px 0 rgba(2, 132, 199, 0.35);
    }

    .result-header::before {
        content: "TESTIT";
        position: absolute;
        top: -11px;
        left: 14px;
        padding: 2px 8px;
        background: #fde047;
        border: 2px solid var(--border-color);
        border-radius: 999px;
        font-size: 10px;
        color: var(--text-color);
    }

    .result-header::after {
        content: "☀️";
        position: absolute;
        top: -12px;
        right: 14px;
        font-size: 22px;
        filter: drop-shadow(1px 1px 0 var(--border-color));
    }

    .mbti-bubble-area {
        border: 2px solid var(--border-color);
        background: #ffffff;
        padding: 20px 15px;
        margin-bottom: 15px;
        border-radius: 12px;
        box-shadow: 4px 4px 0 rgba(2, 132, 199, 0.25);
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
    }

    .char-sprite-box {
        font-size: 55px;
        margin-bottom: 10px;
        filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1));
    }

    .speech-bubble-main {
        background: #e0f2fe;
        border: 2px solid var(--border-color);
        border-radius: 10px;
        padding: 15px;
        width: 100%;
        font-size: 14px;
        line-height: 1.6;
        color: var(--text-color);
        word-break: keep-all;
    }

    .speech-bubble-main div {
        margin-bottom: 4px;
    }
    .speech-bubble-main div:last-child {
        margin-bottom: 0;
    }

    .profile-info-box {
        background-color: #ffffff;
        border: 2px solid var(--border-color);
        border-radius: 10px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        box-shadow: 4px 4px 0 rgba(56, 189, 248, 0.55);
    }
    
    .info-table {
        display: flex;
        background-color: var(--theme-table);
        border: 2px solid var(--border-color);
        border-radius: 8px;
        margin-bottom: 15px;
        overflow: hidden;
    }

    .info-cell {
        flex: 1;
        padding: 12px;
        text-align: center;
        font-size: 16px;
        font-weight: bold;
    }

    .info-cell:first-child {
        border-right: 2px solid var(--border-color);
        background: #38bdf8;
        color: white;
        text-shadow: 1px 1px 0 var(--border-color);
    }

    #res-mbti {
        background: #fde047;
    }

    .traits-list {
        list-style: none;
        padding: 0;
        margin: 0;
        width: 100%;
    }

    .traits-list li {
        text-align: center;
        padding: 12px 5px;
        border-bottom: 1px dashed #7dd3fc;
        font-size: 14px; 
        line-height: 1.4;
        word-break: keep-all;
    }

    .traits-list li:last-child {
        border-bottom: none;
    }

    #out-of-frame-buttons {
        display: none; 
        width: 100%;
        max-width: 650px;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-top: 15px;
    }

    .btn-save {
        background-color: #0284c7;
        color: white;
        border: 2px solid var(--border-color);
        padding: 16px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        border-radius: 10px;
        box-shadow: 3px 3px 0 #7dd3fc;
    }

    .btn-sub {
        background-color: #ffffff;
        color: var(--text-color);
        border: 2px solid var(--border-color);
        padding: 14px;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
        border-radius: 10px;
        font-weight: bold;
        box-shadow: 3px 3px 0 rgba(125, 211, 252, 0.75);
    }

    #save-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.85);
        z-index: 999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    #save-modal.active {
        display: flex;
    }

    #saved-image {
        max-width: 95%;
        max-height: 80vh;
        border: 2px solid white;
        border-radius: 8px;
    }

    .modal-text {
        color: white;
        font-size: 18px;
        margin-bottom: 15px;
        text-align: center;
        font-weight: bold;
    }

    .close-modal-btn {
        background: #0284c7;
        color: white;
        border: 2px solid white;
        padding: 10px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    @media screen and (max-width: 600px) {
        .screen-title {
            font-size: 22px;
        }
        .result-header {
            font-size: 17px;
            padding: 13px 8px 11px;
            margin: 4px 2px 15px;
        }
        .speech-bubble-main {
            font-size: 13px;
            padding: 12px;
        }
        .info-cell {
            font-size: 14px;
            padding: 10px;
        }
        .traits-list li {
            font-size: 13px;
            padding: 10px 2px;
        } 
    }
</style>
</head>
<body>

<header class="page-header">
    <a class="logo-text" href="https://test-it.co.kr/">테스트잇</a>
    <nav class="main-nav">
        <a href="https://test-it.co.kr/test.html">성격</a>
        <a href="https://test-it.co.kr/face.html">얼굴</a>
        <a href="https://test-it.co.kr/etc.html">그외</a>
        <a href="https://test-it.co.kr/saju.html">사주</a>
    </nav>
</header>

<div class="app-wrapper" id="capture-area">
    <!-- 시작 화면 -->
    <div id="screen-start" class="screen active">
        <div class="screen-title">테스트잇<br>MBTI 성격 테스트</div>
        <div style="font-size: 80px; margin-bottom: 40px; filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.15));">🏄‍♂️</div>
        <button class="action-btn" onclick="nextScreen('screen-start', 'screen-quiz')">여름 테스트 시작</button>
    </div>

    <!-- 퀴즈 화면 -->
    <div id="screen-quiz" class="screen">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="question-box" id="question-text">질문 내용이 들어갑니다.</div>
        <button class="action-btn choice-btn" id="btn-a" onclick="submitAnswer('A')">선택지 A</button>
        <button class="action-btn choice-btn" id="btn-b" onclick="submitAnswer('B')">선택지 B</button>
    </div>

    <!-- 결과 화면 -->
    <div id="screen-result" class="screen" style="padding: 10px;">
        <div class="result-theme-bg" id="result-theme">
            <div class="result-header">테스트잇 MBTI 성격 테스트 결과</div>
            
            <!-- 상단 10개 간결한 특징 말풍선 영역 -->
            <div class="mbti-bubble-area">
                <div class="char-sprite-box">🐬</div>
                <div class="speech-bubble-main" id="mbti-bubble-traits">
                    <!-- 간결한 특징 10개 삽입 지점 -->
                </div>
            </div>

            <!-- 하단 20개 특징 리스트 영역 -->
            <div class="profile-info-box">
                <div class="info-table">
                    <div class="info-cell">나의 성격 유형</div>
                    <div class="info-cell" id="res-mbti">MBTI</div>
                </div>
                <ul class="traits-list" id="traits-list">
                    <!-- 상세 특징 20개 삽입 지점 -->
                </ul>
            </div>
        </div>
    </div>
</div>

<div id="out-of-frame-buttons">
    <button class="btn-save" onclick="saveResultImage()">결과 이미지 저장하기</button>
    <button class="btn-sub" onclick="location.reload()">다시 해보기</button>
    <button class="btn-sub" onclick="alert('다른 테스트 페이지로 이동 준비중입니다.')">다른 테스트 해보기</button>
    <button class="btn-sub" onclick="shareTest()">테스트 공유하기</button>
</div>

<div id="save-modal">
    <div class="modal-text">아래 이미지를 꾹 눌러서<br>내 폰에 저장해 보세요!</div>
    <img id="saved-image" src="" alt="결과 이미지">
    <button class="close-modal-btn" onclick="closeModal()">닫기</button>
</div>

<script>
    const questions = [
        { type: "EI", q: "주말에 약속이 취소되었을 때 나의 반응은?", a: "아쉬우니 당장 다른 만날 사람을 찾아본다.", b: "오히려 좋아! 집에서 혼자만의 충전 시간을 즐긴다." },
        { type: "EI", q: "새로운 사람들과 모인 자리에서 나는 주로 어떤 편인가요?", a: "대화를 주도하거나 먼저 적극적으로 말을 건는다.", b: "조용히 이야기를 들으며 리액션을 주로 한다." },
        { type: "EI", q: "에너지가 방전되었을 때 가장 생각나는 것은?", a: "시끌벅적한 곳에 가거나 친구들과 수다 떨기", b: "조용한 방에서 아무에게도 방해받지 않고 쉬기" },
        
        { type: "SN", q: "영화를 보거나 소설을 읽을 때 더 끌리는 부분은?", a: "현실감 있고 명확한 묘사와 탄탄한 연출", b: "세계관 뒤에 숨겨진 은유와 상상력을 자극하는 스토리" },
        { type: "SN", q: "친구가 길을 걷다 하늘의 구름을 보고 예쁘다고 할 때 내 생각은?", a: "진짜 몽실몽실하고 하얗게 생겼네 맛있겠다.", b: "구름을 타고 날아다니는 상상이나 기후 변화에 대한 생각" },
        { type: "SN", q: "새로운 업무나 조리법을 배울 때 선호하는 방식은?", a: "기존에 검증된 매뉴얼과 정석적인 방법을 그대로 따른다.", b: "대략적인 가이드라인만 보고 내 방식대로 자유롭게 시도한다." },
        
        { type: "TF", q: "친구가 속상한 일로 울면서 고민을 털어놓을 때 나의 첫 반응은?", a: "왜 그런 일이 생겼는지 원인을 파악하고 해결책을 생각한다.", b: "친구가 느꼈을 감정에 깊이 공감하며 위로부터 건넨다." },
        { type: "TF", q: "이야기를 나눌 때 내가 더 가치 있다고 느끼는 대화는?", a: "논리적이고 객관적인 사실에 기반하여 결론을 내는 대화", b: "서로의 가치관과 감정을 존중하며 유대감을 쌓는 대화" },
        { type: "TF", q: "친구가 열심히 준비했던 자격증 시험에서 떨어졌다고 한다면?", a: "혹시 몇 점 차이로 떨어졌어? 다음 시험은 언제야?", b: "아고 고생 많았는데 속상하겠다 오늘 맛있는 거 먹으러 가자" },
        
        { type: "JP", q: "여행을 가기로 결정했을 때 나의 계획 스타일은?", a: "일자별, 시간별 동선과 맛집 리스트를 미리 완벽히 정리한다.", b: "큰 틀이나 숙소만 정해두고 세부 일정은 현지 기분에 맞춘다." },
        { type: "JP", q: "해야 할 과제나 중요한 업무가 주어졌을 때 처리 방식은?", a: "계획을 미리 세워두고 매일 정해진 분량만큼 여유롭게 끝낸다.", b: "미루고 미루다가 마감 직전의 몰입도와 짜릿함을 이용해 끝낸다." },
        { type: "JP", q: "내 방이나 주변 물건들을 정리 정돈할 때 나는?", a: "모든 물건이 정해진 위치에 깔끔하게 수납되어 있어야 편안하다.", b: "조금 어질러져 있어도 내가 어디 뒀는지 알고 있으면 상관없다." }
    ];

    let currentIdx = 0;
    let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    function nextScreen(hideId, showId) {
        document.getElementById(hideId).classList.remove('active');
        document.getElementById(showId).classList.add('active');
        window.scrollTo(0, 0); 
        if(showId === 'screen-quiz') {
            showQuestion();
        }
    }

    function showQuestion() {
        if(currentIdx >= questions.length) {
            calculateResult();
            return;
        }
        
        const percent = (currentIdx / questions.length) * 100;
        document.getElementById('progress-bar').style.width = percent + '%';
        
        const qData = questions[currentIdx];
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('btn-a').innerText = qData.a;
        document.getElementById('btn-b').innerText = qData.b;
    }

    function submitAnswer(choice) {
        const qData = questions[currentIdx];
        const dim = qData.type;
        
        if(choice === 'A') {
            scores[dim[0]]++;
        } else {
            scores[dim[1]]++;
        }
        
        currentIdx++;
        showQuestion();
    }

    function calculateResult() {
        let mbti = "";
        mbti += (scores.E >= scores.I) ? "E" : "I";
        mbti += (scores.S >= scores.N) ? "S" : "N";
        mbti += (scores.T >= scores.F) ? "T" : "F";
        mbti += (scores.J >= scores.P) ? "J" : "P";
        
        displayResult(mbti);
    }

const mbtiData = {

    function displayResult(mbti) {
        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
        document.getElementById('out-of-frame-buttons').style.display = 'flex';
        
        document.getElementById('res-mbti').innerText = mbti;
        
        const data = mbtiData[mbti] || mbtiData["ISTJ"];
        
        // 상단 말풍선 특징 채우기
        const bubbleArea = document.getElementById('mbti-bubble-traits');
        bubbleArea.innerHTML = data.bubble.map(t => `<div>• ${t}</div>`).join('');
        
        // 하단 상세 리스트 특징 채우기
        const listArea = document.getElementById('traits-list');
        listArea.innerHTML = data.list.map(t => `<li>${t}</li>`).join('');
    }

    function saveResultImage() {
        const captureArea = document.getElementById('capture-area');
        html2canvas(captureArea, { useCORS: true }).then(canvas => {
            document.getElementById('saved-image').src = canvas.toDataURL('image/png');
            document.getElementById('save-modal').classList.add('active');
        });
    }

    function closeModal() {
        document.getElementById('save-modal').classList.remove('active');
    }

    function shareTest() {
        if (navigator.share) {
            navigator.share({
                title: '테스트잇 MBTI 성격 테스트',
                url: window.location.href
            }).catch(() => {});
        } else {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('테스트 링크 주소가 복사되었습니다.');
            });
        }
    }
