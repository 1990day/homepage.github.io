<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트잇 마인드맵 성격 테스트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
  @import url("https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css");

  @font-face {
    font-family: "Umdot";
    src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/Umdot12.woff2") format("woff2");
    font-weight: normal;
    font-display: swap;
  }

  @font-face {
    font-family: "Galmuri14";
    src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2506-1@1.0/Galmuri14.woff2") format("woff2");
    font-weight: normal;
    font-display: swap;
  }

  @font-face {
    font-family: "Rimgul";
    src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/Limgul12.woff2") format("woff2");
    font-weight: normal;
    font-display: swap;
  }

  :root {
    --text: #2f3550;
    --text-soft: #58617f;
    --shadow: 0 18px 40px rgba(122, 120, 177, 0.16);

    /* 결과 닉네임 위치 조절 */
    --mindmap-title-top: 35%;
    --mindmap-title-left: 22.8%;
    --mindmap-title-width: 27%;
    --mindmap-title-font-size: 19px;
    --mindmap-title-line-height: 1.15;
    --mindmap-title-color: #7b5d8d;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: auto;
    -moz-osx-font-smoothing: auto;
  }

  body,
  button,
  input,
  p,
  h1,
  h2,
  span,
  div,
  a,
  li {
    font-family: "Rimgul", sans-serif;
  }

  body.container {
    min-height: 100vh;
    background:
      radial-gradient(circle at 8% 18%, rgba(255, 220, 191, 0.95) 0%, rgba(255, 220, 191, 0.08) 18%, transparent 34%),
      radial-gradient(circle at 88% 18%, rgba(255, 205, 231, 0.95) 0%, rgba(255, 205, 231, 0.08) 18%, transparent 35%),
      radial-gradient(circle at 18% 88%, rgba(186, 225, 255, 0.95) 0%, rgba(186, 225, 255, 0.08) 18%, transparent 35%),
      radial-gradient(circle at 86% 84%, rgba(255, 223, 240, 0.95) 0%, rgba(255, 223, 240, 0.08) 18%, transparent 35%),
      linear-gradient(135deg, #f8d8e8 0%, #d6d3fb 46%, #c8e3ff 72%, #ffd7ef 100%);
    color: var(--text);
  }

  .page-shell {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    min-height: 100vh;
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    box-shadow: 0 12px 40px rgba(71, 77, 117, 0.14);
    overflow-x: hidden;
    border-left: 1px solid rgba(255,255,255,0.35);
    border-right: 1px solid rgba(255,255,255,0.35);
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 14px !important;
    padding-bottom: 12px !important;
    padding-left: 4%;
    padding-right: 4%;
    border-bottom: 1px solid rgba(255,255,255,0.38);
    position: relative;
    background: rgba(255,255,255,0.22);
    backdrop-filter: blur(10px);
  }

  .page-header h1 {
    margin: 0 !important;
    line-height: 1;
  }

  .logo {
    width: 86px;
    display: block;
  }

  .main-nav {
    display: flex;
    flex-wrap: nowrap !important;
    align-items: center;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: 8px;
  }

  .main-nav a {
    display: block;
    text-decoration: none;
    color: #4e5775;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 13px;
    white-space: nowrap;
    box-shadow: 0 8px 20px rgba(145, 145, 185, 0.12);
    transition: all 0.2s ease;
  }

  .main-nav a:hover {
    background: rgba(255,255,255,0.92);
    transform: translateY(-1px);
  }

  #app {
    width: 100%;
    min-height: calc(100vh - 66px);
    position: relative;
    display: flex;
    flex-direction: column;
  }

  .content-wrapper {
    padding: 14px 14px 18px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }

  .screen {
    display: none;
    animation: fadeIn 0.22s ease-out;
    width: 100%;
  }

  .screen.active {
    display: block;
  }

  .screen.active.flex-center {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    flex-grow: 1;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .glass-panel {
    width: 100%;
    border-radius: 30px;
    padding: 18px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.50), rgba(255,255,255,0.24)),
      linear-gradient(135deg, rgba(255,255,255,0.22), rgba(255,255,255,0.08));
    border: 1px solid rgba(255,255,255,0.58);
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .glass-panel::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 12% 12%, rgba(255,255,255,0.45), transparent 20%),
      radial-gradient(circle at 85% 18%, rgba(255,255,255,0.25), transparent 18%),
      radial-gradient(circle at 18% 88%, rgba(255,255,255,0.22), transparent 18%);
    pointer-events: none;
  }

  .main-image-wrap,
  .name-card,
  .question-card,
  .result-card {
    position: relative;
    z-index: 1;
  }

  .main-image-wrap img {
    width: 100%;
    display: block;
    border-radius: 28px;
    box-shadow: 0 18px 34px rgba(132, 126, 177, 0.16);
    border: 1px solid rgba(255,255,255,0.72);
  }

  .main-cta {
    margin-top: 16px;
  }

  .sub-copy {
    text-align: center;
    color: var(--text-soft);
    font-size: 15px;
    line-height: 1.65;
    margin-top: 14px;
    margin-bottom: 16px;
  }

  .pattern-btn {
    width: 100%;
    border: none;
    border-radius: 18px;
    padding: 16px 18px;
    font-size: 16px;
    cursor: pointer;
    color: #fff;
    background: linear-gradient(135deg, #ff93c6 0%, #8bb8ff 100%);
    box-shadow: 0 12px 24px rgba(149, 150, 210, 0.22);
    transition: transform 0.12s ease, filter 0.12s ease;
  }

  .pattern-btn:hover {
    filter: brightness(1.03);
  }

  .pattern-btn:active {
    transform: translateY(1px);
  }

  .name-card,
  .question-card,
  .result-card {
    padding: 18px;
  }

  .section-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 108px;
    height: 34px;
    padding: 0 14px;
    border-radius: 999px;
    background: rgba(255,255,255,0.75);
    border: 1px solid rgba(255,255,255,0.7);
    color: #657099;
    font-size: 12px;
    margin-bottom: 14px;
    box-shadow: 0 8px 18px rgba(168, 166, 210, 0.12);
  }

  .main-title {
    font-size: 28px;
    line-height: 1.42;
    color: var(--text);
    margin-bottom: 10px;
    word-break: keep-all;
    text-align: center;
  }

  .main-desc {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text-soft);
    margin-bottom: 20px;
    word-break: keep-all;
    text-align: center;
  }

  .name-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input[type="text"] {
    width: 100%;
    padding: 16px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.82);
    background: rgba(255,255,255,0.82);
    color: var(--text);
    font-size: 16px;
    text-align: center;
    outline: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
  }

  input[type="text"]:focus {
    background: rgba(255,255,255,0.96);
    border-color: rgba(173, 201, 255, 0.95);
  }

  .progress-bar {
    width: 100%;
    height: 10px;
    background: rgba(255,255,255,0.62);
    border-radius: 999px;
    margin-bottom: 14px;
    overflow: hidden;
  }

  .progress {
    height: 100%;
    background: linear-gradient(90deg, #ff9fcc 0%, #92b7ff 100%);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 999px;
  }

  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .question-count,
  .question-type {
    font-size: 12px;
    color: #667399;
    background: rgba(255,255,255,0.70);
    border: 1px solid rgba(255,255,255,0.74);
    border-radius: 999px;
    padding: 6px 10px;
  }

  #q-title {
    margin-bottom: 18px;
    line-height: 1.58;
    font-size: 22px;
    color: var(--text);
    word-break: keep-all;
    text-align: left;
    padding: 2px 2px 4px;
  }

  .answer-btn {
    background: rgba(255,255,255,0.84);
    color: var(--text);
    border: 1px solid rgba(255,255,255,0.82);
    border-radius: 20px;
    padding: 16px 14px;
    text-align: left;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
    line-height: 1.58;
    word-break: keep-all;
    font-size: 16px;
    box-shadow: 0 10px 22px rgba(144, 145, 198, 0.10);
    transition: transform 0.12s ease, background 0.12s ease, border-color 0.12s ease;
  }

  .answer-btn:hover {
    background: rgba(255,255,255,0.96);
    border-color: rgba(182, 203, 255, 0.95);
  }

  .answer-btn:active {
    transform: translateY(1px);
  }

  .result-card {
    overflow: visible;
  }

  .result-preview-wrap {
    width: 100%;
  }

  .capture-target {
    position: relative;
    width: 100%;
    display: inline-block;
    line-height: 0;
    overflow: visible;
    background: transparent;
  }

  .result-image {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 0;
    object-fit: contain;
    box-shadow: none;
    border: none;
  }

  .result-overlay-title {
    position: absolute;
    top: var(--mindmap-title-top);
    left: var(--mindmap-title-left);
    width: var(--mindmap-title-width);
    font-family: "Umdot", sans-serif !important;
    font-size: var(--mindmap-title-font-size);
    line-height: var(--mindmap-title-line-height);
    color: var(--mindmap-title-color);
    text-align: center;
    white-space: normal;
    word-break: keep-all;
    letter-spacing: 0;
    z-index: 5;
    pointer-events: none;
    text-shadow:
      0 1px 0 rgba(255,255,255,0.95),
      0 0 8px rgba(255,255,255,0.55);
  }

  .result-action-area {
    width: 100%;
    margin-top: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .action-btn {
    width: 100%;
    border: none;
    padding: 14px 18px;
    font-size: 16px;
    border-radius: 18px;
    cursor: pointer;
    transition: transform 0.1s;
    font-family: "Galmuri14", sans-serif;
  }

  .action-btn:active {
    transform: translateY(1px);
  }

  .action-btn.save {
    background: linear-gradient(135deg, #8fc2ff 0%, #75a7ff 100%);
    color: #ffffff;
    border: 2px solid rgba(255,255,255,0.82);
    box-shadow: 0 12px 20px rgba(130, 168, 255, 0.24);
  }

  .action-btn.restart {
    background: linear-gradient(135deg, #ffd993 0%, #ffc277 100%);
    color: #ffffff;
    border: 2px solid rgba(255,255,255,0.82);
    box-shadow: 0 12px 20px rgba(255, 186, 103, 0.24);
  }

  .action-btn.others {
    background: linear-gradient(135deg, #b5eaa8 0%, #88d7af 100%);
    color: #ffffff;
    border: 2px solid rgba(255,255,255,0.82);
    box-shadow: 0 12px 20px rgba(136, 215, 175, 0.22);
  }

  .action-btn.share {
    background: rgba(255,255,255,0.9);
    color: #7b8fca;
    border: 2px solid rgba(255,255,255,0.82);
    box-shadow: 0 12px 20px rgba(170, 173, 214, 0.16);
  }

  .ad-container {
    width: 100%;
    margin-top: 14px;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: visible;
  }

  .coupang_ad {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .coupang_ad iframe,
  .coupang_ad ins,
  .coupang_ad div {
    max-width: 100% !important;
  }

  @media (max-width: 390px) {
    :root {
      --mindmap-title-font-size: 16px;
      --mindmap-title-top: 34.6%;
      --mindmap-title-left: 22%;
      --mindmap-title-width: 29%;
    }

    .page-header {
      padding-top: 12px !important;
      padding-bottom: 10px !important;
    }

    .logo {
      width: 76px;
    }

    .main-nav {
      gap: 6px;
    }

    .main-nav a {
      padding: 7px 10px;
      font-size: 11px;
    }

    .content-wrapper {
      padding: 10px 10px 14px;
    }

    .glass-panel,
    .name-card,
    .question-card,
    .result-card {
      border-radius: 24px;
      padding: 14px;
    }

    .main-image-wrap img {
      border-radius: 22px;
    }

    .main-title {
      font-size: 24px;
    }

    .main-desc,
    .sub-copy {
      font-size: 14px;
    }

    #q-title {
      font-size: 19px;
    }

    .answer-btn {
      font-size: 14px;
    }
  }
</style>
</head>

<body class="container">
  <div class="page-shell">
    <header class="page-header wrapper">
      <h1><a href="index.html"><img class="logo" src="img_logo.png" alt="test it"></a></h1>
      <nav>
        <ul class="main-nav">
          <li><a href="https://test-it.co.kr/test.html">성격</a></li>
          <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
          <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
          <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
        </ul>
      </nav>
    </header>

    <div id="app">
      <div class="content-wrapper">

        <div id="screen-main" class="screen flex-center active">
          <div class="glass-panel">
            <div class="main-image-wrap">
              <img src="img_main371.png" alt="테스트잇 마인드맵 성격 테스트 메인 이미지">
            </div>
            <p class="sub-copy">
              질문에 답하고<br>
              나만의 마인드맵 결과를 확인해봐
            </p>
            <div class="main-cta">
              <button class="pattern-btn" onclick="nextScreen('screen-name')">테스트 시작하기</button>
            </div>
          </div>
        </div>

        <div id="screen-name" class="screen flex-center">
          <div class="glass-panel name-card">
            <div class="section-badge">NAME FILE</div>
            <h1 class="main-title">이름 입력</h1>
            <p class="main-desc">
              결과 이미지에 들어갈<br>
              이름이나 닉네임을 적어줘
            </p>

            <div class="name-input-wrap">
              <input type="text" id="userName" placeholder="예: 다혜">
              <button class="pattern-btn" onclick="startTest()">다 적었어</button>
            </div>
          </div>
        </div>

        <div id="screen-question" class="screen flex-center">
          <div class="glass-panel question-card">
            <div class="section-badge">QUESTION</div>

            <div class="progress-bar">
              <div class="progress" id="progress"></div>
            </div>

            <div class="question-meta">
              <div class="question-count" id="question-count">1 / 12</div>
              <div class="question-type">mind check</div>
            </div>

            <h2 id="q-title">질문</h2>

            <button class="answer-btn" id="btn-A">답변 A</button>
            <button class="answer-btn" id="btn-B">답변 B</button>
          </div>
        </div>

        <div id="screen-result" class="screen">
          <div class="glass-panel result-card">
            <div class="result-preview-wrap">
              <div id="capture-target" class="capture-target">
                <img id="result-image" class="result-image" src="" alt="마인드맵 결과 이미지">
                <div id="result-overlay-title" class="result-overlay-title"></div>
              </div>
            </div>

            <div class="result-action-area">
              <button class="action-btn save" onclick="saveResultAsImage()">결과 이미지 저장하기</button>
              <button class="action-btn restart" onclick="location.reload()">다시 하기</button>
              <button class="action-btn others" onclick="alert('다른 테스트 준비 중!')">다른 테스트</button>
              <button class="action-btn share" onclick="shareTest()">공유하기</button>
            </div>

            <div class="ad-container" id="ad-container">
              <article class="coupang_ad mt-3">
                <script src="https://ads-partners.coupang.com/g.js"></script>
                <script>
                  new PartnersCoupang.G({
                    "id":798186,
                    "template":"carousel",
                    "trackingCode":"AF4391881",
                    "width":"350",
                    "height":"140",
                    "tsource":""
                  });
                </script>
              </article>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

<script>
  let currentQ = 0;
  let userName = "";

  const scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

  const questions = [
    { q: "주말에 약속이 취소되었다 내 머릿속은?", a: {text: "아쉽다 다른 친구라도 만날까?", type: "E"}, b: {text: "오히려 좋다 집에서 쉬어야지", type: "I"} },
    { q: "처음 가는 모임에 참석했을 때 나는?", a: {text: "먼저 다가가서 말을 건넨다", type: "E"}, b: {text: "누가 말을 걸어줄 때까지 기다린다", type: "I"} },
    { q: "스트레스를 받을 때 푸는 방식은?", a: {text: "사람들과 수다 떨면서 푼다", type: "E"}, b: {text: "혼자만의 시간을 가지며 푼다", type: "I"} },

    { q: "사과를 보면 드는 생각은?", a: {text: "빨갛다 맛있다 과일", type: "S"}, b: {text: "백설공주 뉴턴 아이폰", type: "N"} },
    { q: "요리할 때 나는?", a: {text: "레시피에 적힌 정량대로 계량한다", type: "S"}, b: {text: "대충 눈대중으로 감칠맛을 찾는다", type: "N"} },
    { q: "노래를 들을 때 더 집중하는 것은?", a: {text: "멜로디와 리듬이 좋으면 좋다", type: "S"}, b: {text: "가사의 의미와 감성에 몰입한다", type: "N"} },

    { q: "친구가 나 우울해서 화분 샀어라고 한다면?", a: {text: "무슨 화분 샀어 어디서 샀어?", type: "T"}, b: {text: "왜 우울해 무슨 일 있었어?", type: "F"} },
    { q: "고민을 털어놓는 친구에게 해주는 말은?", a: {text: "현실적인 해결책을 제시해 준다", type: "T"}, b: {text: "편을 들어주고 공감해 준다", type: "F"} },
    { q: "일할 때 더 중요하게 생각하는 것은?", a: {text: "효율성과 정확한 결과", type: "T"}, b: {text: "팀원들과의 조화와 분위기", type: "F"} },

    { q: "여행을 가기 전 나의 준비 상태는?", a: {text: "일정표와 맛집 리스트를 미리 정리한다", type: "J"}, b: {text: "가서 끌리는 대로 하면 된다", type: "P"} },
    { q: "내 방 책상의 상태는?", a: {text: "항상 물건이 제자리에 정리되어 있다", type: "J"}, b: {text: "나름의 규칙은 있지만 남이 보면 지저분하다", type: "P"} },
    { q: "갑자기 일정이 변경되었다면?", a: {text: "스트레스받고 계획을 다시 짜야 한다", type: "J"}, b: {text: "그럴 수도 있지 하고 유연하게 넘긴다", type: "P"} }
  ];

  function nextScreen(screenId) {
    document.querySelectorAll(".screen").forEach(function(screen) {
      screen.classList.remove("active");
    });
    document.getElementById(screenId).classList.add("active");
  }

  function calculateMBTI() {
    return (scores.E >= scores.I ? "E" : "I") +
           (scores.S >= scores.N ? "S" : "N") +
           (scores.T >= scores.F ? "T" : "F") +
           (scores.J >= scores.P ? "J" : "P");
  }

  function startTest() {
    const input = document.getElementById("userName").value.trim();
    userName = input ? input : "당신";
    currentQ = 0;

    for (let key in scores) {
      scores[key] = 0;
    }

    showQuestion();
    nextScreen("screen-question");
  }

  function showQuestion() {
    if (currentQ >= questions.length) {
      showResult();
      return;
    }

    const qData = questions[currentQ];
    document.getElementById("q-title").innerHTML = qData.q;

    const btnA = document.getElementById("btn-A");
    const btnB = document.getElementById("btn-B");

    btnA.innerHTML = qData.a.text;
    btnA.onclick = function() {
      selectAnswer(qData.a.type);
    };

    btnB.innerHTML = qData.b.text;
    btnB.onclick = function() {
      selectAnswer(qData.b.type);
    };

    document.getElementById("progress").style.width = ((currentQ + 1) / questions.length * 100) + "%";
    document.getElementById("question-count").innerText = (currentQ + 1) + " / " + questions.length;
  }

  function selectAnswer(type) {
    scores[type]++;
    currentQ++;
    showQuestion();
  }

  function showResult() {
    const mbti = calculateMBTI();
    const mbtiLower = mbti.toLowerCase();
    const resultImagePath = "img_" + mbtiLower + "371.png";

    const resultImage = document.getElementById("result-image");
    const overlayTitle = document.getElementById("result-overlay-title");

    overlayTitle.innerText = userName + "의 마인드맵";
    resultImage.src = resultImagePath;
    resultImage.alt = mbti + " 마인드맵 결과 이미지";

    resultImage.onerror = function() {
      this.onerror = null;
      this.src = "img_enfj371.png";
    };

    nextScreen("screen-result");
  }

  function saveResultAsImage() {
    const saveBtn = document.querySelector(".action-btn.save");
    const target = document.getElementById("capture-target");

    saveBtn.innerText = "저장 중...";
    saveBtn.disabled = true;

    html2canvas(target, {
      backgroundColor: null,
      scale: 4,
      useCORS: true,
      logging: false
    }).then(function(canvas) {
      const link = document.createElement("a");
      link.download = userName + "_마인드맵.png";
      link.href = canvas.toDataURL("image/png");
      link.click();

      saveBtn.innerText = "결과 이미지 저장하기";
      saveBtn.disabled = false;
    }).catch(function() {
      alert("이미지 저장에 실패했어");
      saveBtn.innerText = "결과 이미지 저장하기";
      saveBtn.disabled = false;
    });
  }

  function shareTest() {
    const url = location.href;
    const title = userName + "의 마인드맵";

    if (navigator.share) {
      navigator.share({ title: title, url: url }).catch(function() {});
    } else {
      navigator.clipboard.writeText(url).then(function() {
        alert("링크가 복사되었어요");
      });
    }
  }
</script>
</body>
</html>
