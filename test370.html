    let currentIdx = 0, score = { EI: 0, SN: 0, TF: 0, JP: 0 }, userIlju = "", displayIlju = "";

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        document.getElementById('ad-container').style.display = 'flex';
    }

    function beginAnalysis() {
        const y = parseInt(document.getElementById('year').value);
        const m = parseInt(document.getElementById('month').value);
        const d = parseInt(document.getElementById('day').value);

        const solar = Solar.fromYmdHms(y, m, d, 12, 0, 0);
        const lunar = solar.getLunar();
        const eightChar = lunar.getEightChar();
        
        const sajuGan = eightChar.getDayGan();
        const sajuZhi = eightChar.getDayZhi();
        
        userIlju = (stemToHangul[sajuGan] || "") + (zhiToHangul[sajuZhi] || "");
        displayIlju = userIlju; 
        
        showScreen('scr-test');
        renderQuestion();
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        
        const pct = Math.round(((currentIdx + 1) / questions.length) * 100);
        document.getElementById('progress-fill').style.width = pct + '%';
        document.getElementById('q-idx-text').innerText = `성향 데이터 분석 중... ${currentIdx + 1} / 12`;

        document.getElementById('q-txt').innerHTML = q.q;
        const area = document.getElementById('ans-list');
        area.innerHTML = "";

        [q.a, q.b].forEach((txt, i) => {
            const btn = document.createElement('button');
            btn.className = "ans-btn";
            btn.innerHTML = txt;
            btn.onclick = () => {
                if(i === 0) score[q.type]++;
                currentIdx++;
                if(currentIdx < questions.length) renderQuestion();
                else showResult();
            };
            area.appendChild(btn);
        });
    }

    function showResult() {
        showScreen('scr-res');
        
        let testMbtiResult = "";
        testMbtiResult += score.EI >= 2 ? "E" : "I";
        testMbtiResult += score.SN >= 2 ? "S" : "N";
        testMbtiResult += score.TF >= 2 ? "T" : "F";
        testMbtiResult += score.JP >= 2 ? "J" : "P";

        const sajuMbtiResult = iljuToMBTI[userIlju] || "분석 불가";

        document.getElementById('saju-avatar').src = `https://api.dicebear.com/7.x/pixel-art/png?seed=Saju_${userIlju}`;
        document.getElementById('test-avatar').src = `https://api.dicebear.com/7.x/pixel-art/png?seed=Test_${testMbtiResult}`;

        document.getElementById('res-saju-name').innerText = sajuMbtiResult;
        document.getElementById('res-saju-mbti').innerText = displayIlju + "일주";
        document.getElementById('res-test-name').innerText = testMbtiResult;
        
        let sajuTraitsHtml = "";
        if(mbtiTraits[sajuMbtiResult]) {
            mbtiTraits[sajuMbtiResult].forEach(trait => {
                sajuTraitsHtml += `<li>${trait}</li>`;
            });
        } else {
            sajuTraitsHtml = "<li>해당 일주의 특성 데이터를 불러올 수 없습니다.</li>";
        }
        document.getElementById('res-saju-body').innerHTML = sajuTraitsHtml;

        let testTraitsHtml = "";
        mbtiTraits[testMbtiResult].forEach(trait => {
            testTraitsHtml += `<li>${trait}</li>`;
        });
        document.getElementById('res-test-body').innerHTML = testTraitsHtml;
    }

    function saveAsImage() {
        const btns = document.getElementById('action-btns');
        const adContainer = document.getElementById('ad-container');
        btns.style.display = 'none';
        adContainer.style.display = 'none'; 

        html2canvas(document.getElementById('capture-window'), {
            scale: 2, 
            backgroundColor: null,
            useCORS: true 
        }).then(canvas => {
            btns.style.display = 'flex';
            adContainer.style.display = 'flex'; 
            const imgData = canvas.toDataURL("image/png");
            const link = document.createElement('a');
            link.download = '테스트잇_사주MBTI.png';
            link.href = imgData;
            link.click();
        });
    }
    function shareTest() {
        const shareData = {
            title: '테스트잇 사주 MBTI 성격 테스트',
            text: '테스트잇 사주 MBTI 성격 테스트',
            url: window.location.href
        };

        if (navigator.share) {
            navigator.share(shareData).catch((error) => console.log('공유 에러:', error));
        } else {
            // Web Share API를 지원하지 않는 브라우저(PC 등)용 클립보드 복사 기능
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert('테스트 링크가 클립보드에 복사되었습니다. 친구들에게 공유해보세요!');
            }).catch(() => {
                alert('공유하기를 지원하지 않는 환경입니다. 주소창의 링크를 직접 복사해주세요.');
            });
        }
    }
