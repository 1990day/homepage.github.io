  <style>
    * {

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
      opacity: 0.45;
    }

    body::before {
      width: 220px;
      height: 220px;
      left: -50px;
      top: 140px;
      background:
        radial-gradient(circle at 30% 30%, rgba(255,255,255,0.95), rgba(255,255,255,0.15) 45%, rgba(173,216,255,0.1) 60%, rgba(255,255,255,0) 70%);

    body::after {
      width: 180px;

    @keyframes floatBubble {

        transform: translateY(0px) translateX(0px) scale(1);
      }
      50% {
        transform: translateY(-14px) translateX(8px) scale(1.03);
      }

        transform: translateY(0px) translateX(0px) scale(1);

    @keyframes spin {

    .wrapper {

<body>
  <div class="header-wrapper">
    <header class="page-header wrapper">
      <h1><a href="https://test-it.co.kr/" class="retro-logo">테스트잇</a></h1>
      <nav>
        <ul class="main-nav">
          <li><a href="https://test-it.co.kr/test.html">성격</a></li>
          <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
          <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
          <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
        </ul>
      </nav>
    </header>
  </div>

  <main class="app">
    <section id="introScreen" class="screen active">
      <div class="card intro-card">
        <div class="intro-image-wrap">
          <img
            src="img_main0104.png"
            alt="동심 회복 테스트 메인 이미지"
            class="intro-image"
          />
        </div>

        <div class="intro-bottom">
          <button id="startBtn" class="start-btn">테스트 시작하기</button>
        </div>
      </div>
    </section>

    <section id="questionScreen" class="screen">
      <div class="card question-card">
        <div class="question-top">
          <div class="question-count">
            <span id="questionNumber">1 / 20</span>
            <span id="progressText">진행률 5%</span>
          </div>

          <div class="progress-wrap">
            <div id="progressBar" class="progress-bar">
              <div class="pinwheel">
                <div class="blade b1"></div>
                <div class="blade b2"></div>
                <div class="blade b3"></div>
                <div class="blade b4"></div>
                <div class="center"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="question-box">
          <div class="question-label">QUESTION</div>
          <p id="questionText" class="question-text"></p>
        </div>

        <div class="answer-group">
          <button id="oBtn" class="answer-btn o-btn">O</button>
          <button id="xBtn" class="answer-btn x-btn">X</button>

    <section id="resultScreen" class="screen">
      <div class="card result-card">
        <div class="result-image-wrap">
          <img
            id="resultImage"
            class="result-image"
            alt="테스트 결과 이미지"
          />
        </div>

        <div class="result-actions">
          <button id="restartBtn" class="restart-btn">다시 테스트하기</button>
          <button id="shareBtn" class="share-btn">결과 문구 복사하기</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      "나는 아직도 부를 수 있는 만화 주제가가 있다.",
      "가끔 문방구 앞에 멈춘다.",
      "하늘을 보면 예쁜 모양의 구름을 찾는다.",
      "놀이공원에 가면 범퍼카 한 번은 타야한다.",
      "뽑기 기계 앞에서 승부욕이 생긴다.",
      "어릴 때 별명을 아직 기억한다.",
      "남 모르게 횡단보도 하얀색 선만 밟을 때가 있다.",
      "내가 만화의 주인공이라고 상상할 때가 있다.",
      "'우리 집에 왜 왔니' 가사가 자동 재생된다.",
      "종이를 보면 비행기 한 번은 접어본다.",
      "음식 먹을 때 제일 맛있는 건 마지막에 먹는다.",
      "나는 아직도 학교 앞에서 먹던 컵 떡볶이가 생각난다.",
      "눈이 오면 첫 발자국을 찍고 싶어진다.",
      "놀이터를 지나가면 한 번쯤 그네가 타고 싶어진다.",
      "종 치는 소리를 들으면 괜히 반응한다.",
      "비밀 얘기할 때 괜히 목소리가 더 작아진다.",
      "버튼을 보면 누르고 싶다.",
      "누군가 내 이름을 불러주면 괜히 반갑다.",
      "나는 아직도 어릴 때 만들었던 이메일을 사용한다.",
      "포장지를 뜯기 전에 괜히 한번 흔들어본다."
    ];

    const RESULT_IMAGES = {
      all: "result_all.png",
      age12: "result_12.png",
      age15: "result_15.png",
      adult: "result_adult.png"
    };

    let currentQuestionIndex = 0;
    let yesCount = 0;

    const introScreen = document.getElementById("introScreen");
    const questionScreen = document.getElementById("questionScreen");
    const resultScreen = document.getElementById("resultScreen");

    const startBtn = document.getElementById("startBtn");
    const oBtn = document.getElementById("oBtn");
    const xBtn = document.getElementById("xBtn");
    const restartBtn = document.getElementById("restartBtn");
    const shareBtn = document.getElementById("shareBtn");

    const questionNumber = document.getElementById("questionNumber");
    const progressText = document.getElementById("progressText");
    const progressBar = document.getElementById("progressBar");
    const questionText = document.getElementById("questionText");
    const resultImage = document.getElementById("resultImage");

    function preloadImages(imageList) {
      imageList.forEach(function (src) {
        const img = new Image();
        img.src = src;
      });
    }

    function showScreen(screen) {
      introScreen.classList.remove("active");
      questionScreen.classList.remove("active");
      resultScreen.classList.remove("active");
      screen.classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startTest() {
      currentQuestionIndex = 0;
      yesCount = 0;
      showScreen(questionScreen);
      renderQuestion();
    }

    function renderQuestion() {
      const total = questions.length;
      const current = currentQuestionIndex + 1;
      const progress = Math.round((current / total) * 100);

      questionNumber.textContent = current + " / " + total;
      progressText.textContent = "진행률 " + progress + "%";
      progressBar.style.width = progress + "%";
      questionText.textContent = questions[currentQuestionIndex];
    }

    function answerQuestion(isYes) {
      if (isYes) {
        yesCount += 1;
      }

      currentQuestionIndex += 1;

      if (currentQuestionIndex < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function getResultImage(score) {
      if (score >= 16) {
        return RESULT_IMAGES.all;
      } else if (score >= 13) {
        return RESULT_IMAGES.age12;
      } else if (score >= 10) {
        return RESULT_IMAGES.age15;
      } else {
        return RESULT_IMAGES.adult;
      }
    }

    function showResult() {
      const resultSrc = getResultImage(yesCount);

      resultImage.style.visibility = "hidden";
      resultImage.removeAttribute("src");

      const loader = new Image();
      loader.onload = function () {
        resultImage.src = resultSrc;
        resultImage.alt = "테스트 결과 이미지";
        resultImage.style.visibility = "visible";
        showScreen(resultScreen);
      };
      loader.onerror = function () {
        resultImage.src = resultSrc;
        resultImage.alt = "테스트 결과 이미지";
        resultImage.style.visibility = "visible";
        showScreen(resultScreen);
      };
      loader.src = resultSrc;
    }

    function restartTest() {
      currentQuestionIndex = 0;
      yesCount = 0;
      progressBar.style.width = "0%";
      showScreen(introScreen);
    }

    function copyResultText() {
      let resultText = "";

      if (yesCount >= 16) {
        resultText = "전체 관람가 / 당신의 마음속에는 영원한 동심이 있습니다.";
      } else if (yesCount >= 13) {
        resultText = "12세 관람가 / 더 어려지고 싶으시다고요? 4/29 6시 LUCY의 <전체 관람가>를 들으시면 됩니다.";
      } else if (yesCount >= 10) {
        resultText = "15세 관람가 / 어린 시절이 그립죠? 4/29 6시 LUCY의 <전체 관람가>와 떠나봅시다.";
      } else {
        resultText = "⚠️어른 주의⚠️ / 추억 복원 패치가 필요합니다. 4/29 6시 LUCY의 <전체 관람가> 리스닝 필수";
      }

      const textToCopy = "내 결과: " + resultText;

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(textToCopy)
          .then(function () {
            alert("결과 문구가 복사되었습니다.");
          })
          .catch(function () {
            fallbackCopy(textToCopy);
          });
      } else {
        fallbackCopy(textToCopy);
      }
    }

    function fallbackCopy(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
