    function startTest() {
      current = 0;
      scores = {
        taeyang: 0,
        taeeum: 0,
        soyang: 0,
        soeum: 0
      };

      document.getElementById("screenTop").innerText = "테스트잇 사상체질 성격 테스트";
      document.getElementById("startPage").classList.add("hidden");
      document.getElementById("testArea").classList.remove("hidden");
      document.getElementById("resultPage").classList.add("hidden");
      document.getElementById("questionPage").classList.remove("hidden");
      renderQuestion();
    }

    function renderQuestion() {
      const item = questions[current];
      const progress = Math.round((current / questions.length) * 100);

      document.getElementById("stepText").innerText = "Q" + (current + 1) + " / " + questions.length;
      document.getElementById("percentText").innerText = progress + "%";
      document.getElementById("progressFill").style.width = progress + "%";
      document.getElementById("questionTitle").innerText = item.q;

      const optionBox = document.getElementById("optionBox");
      optionBox.innerHTML = "";

      item.a.forEach((option) => {
        const button = document.createElement("button");
        button.className = "option";
        button.innerHTML = `<span>${option.text}</span>`;
        button.onclick = () => selectAnswer(option.score);
        optionBox.appendChild(button);
      });
    }

    function selectAnswer(score) {
      Object.keys(score).forEach((key) => {
        scores[key] += score[key];
      });

      current++;

      if (current >= questions.length) {
        checkTieBeforeResult();
      } else {
        renderQuestion();
      }
    }

    function checkTieBeforeResult() {
      const maxScore = Math.max(...Object.values(scores));
      const topKeys = Object.keys(scores).filter((key) => scores[key] === maxScore);

      if (topKeys.length >= 2) {
        renderTieQuestion(topKeys);
      } else {
        showResult();
      }
    }

    function renderTieQuestion(topKeys) {
      document.getElementById("stepText").innerText = "FINAL";
      document.getElementById("percentText").innerText = "100%";
      document.getElementById("progressFill").style.width = "100%";
      document.getElementById("questionTitle").innerText = "마지막으로 하나만 더 고른다면?";

      const optionBox = document.getElementById("optionBox");
      optionBox.innerHTML = "";

      topKeys.forEach((key) => {
        const button = document.createElement("button");
        button.className = "option";
        button.innerHTML = `<span>${tieBreakTexts[key]}</span>`;
        button.onclick = () => {
          scores[key] += 2;
          showResult();
        };
        optionBox.appendChild(button);
      });
    }

    function showResult() {
      const total = Object.values(scores).reduce((sum, value) => sum + value, 0);
      const sorted = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
      const topKey = sorted[0];
      const topResult = results[topKey];

      document.getElementById("screenTop").innerText = "테스트잇 사상체질 성격 테스트";
      document.getElementById("questionPage").classList.add("hidden");
      document.getElementById("resultPage").classList.remove("hidden");

      document.getElementById("resultName").innerText = topResult.name;
      document.getElementById("resultOne").innerText = topResult.one;

      const featureList = document.getElementById("featureList");
      featureList.innerHTML = "";

      topResult.features.forEach((feature) => {
        const item = document.createElement("div");
        item.className = "check-item";
        item.innerText = feature;
        featureList.appendChild(item);
      });

      const bars = document.getElementById("bars");
      bars.innerHTML = "";

      sorted.forEach((key) => {
        const percent = total === 0 ? 0 : Math.round((scores[key] / total) * 100);

        const row = document.createElement("div");
        row.className = "bar-row";

        row.innerHTML = `
          <div class="bar-info">
            <span>${results[key].name}</span>
            <div class="bar-bg">
              <div class="bar-fill" style="width: ${percent}%; background: ${resultColors[key]};"></div>
            </div>
            <span>${percent}%</span>
          </div>
        `;

        bars.appendChild(row);
      });
    }

      document.getElementById("screenTop").innerText = "테스트잇";
      document.getElementById("testArea").classList.add("hidden");
      document.getElementById("resultPage").classList.add("hidden");
      document.getElementById("questionPage").classList.add("hidden");
      document.getElementById("startPage").classList.remove("hidden");
    }

    function saveResultImage() {
      const target = document.getElementById("saveCapture");

      html2canvas(target, {
        scale: 3,
        backgroundColor: null,
        useCORS: true,
        scrollX: 0,
        scrollY: 0,
        windowWidth: document.documentElement.clientWidth,
        windowHeight: document.documentElement.clientHeight,
        ignoreElements: function(element) {
          return element.classList && element.classList.contains("result-buttons");
        }
      }).then((canvas) => {
        const image = canvas.toDataURL("image/png");
        document.getElementById("savePreview").src = image;
        document.getElementById("saveModal").classList.add("show");
      });
    }

    function closeSaveModal() {
      document.getElementById("saveModal").classList.remove("show");
