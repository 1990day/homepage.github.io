const highlightColors = ["pink", "yellow", "blue", "purple", "green"];

function escapeRegExp(text) {
  return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function highlightImportantWords(text, index) {
  const sortedKeywords = [...highlightKeywords].sort((a, b) => b.length - a.length);
  const colorClass = highlightColors[index % highlightColors.length];

  for (const keyword of sortedKeywords) {
    if (text.includes(keyword)) {
      const regex = new RegExp(escapeRegExp(keyword), "g");
      return text.replace(
        regex,
        `<span class="feature-em ${colorClass}">${keyword}</span>`
      );
    }
  }

  return text;
}

      if (text.includes("<br>")) return text;

      const words = text.split(" ");
      if (words.length < 2) return text;

      let bestIndex = -1;
      let minDiff = Infinity;
      const totalLength = text.length;

      let currentLength = 0;
      for (let i = 0; i < words.length - 1; i += 1) {
        currentLength += words[i].length + (i > 0 ? 1 : 0);
        const diff = Math.abs(totalLength / 2 - currentLength);
        if (diff < minDiff) {
          minDiff = diff;
          bestIndex = i;
        }
      }

      if (bestIndex === -1) return text;

      const first = words.slice(0, bestIndex + 1).join(" ");
      const second = words.slice(bestIndex + 1).join(" ");
      return `${first}<br>${second}`;
    }

    function escapeRegExp(text) {
      return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function highlightImportantWords(text, index) {
      const sortedKeywords = [...highlightKeywords].sort((a, b) => b.length - a.length);
      const colorClass = highlightColors[index % highlightColors.length];

      for (const keyword of sortedKeywords) {
        if (text.includes(keyword)) {
          const regex = new RegExp(escapeRegExp(keyword));
          return text.replace(regex, `<span class="feature-em ${colorClass}">${keyword}</span>`);
        }
      }

      return text;
    }

    function renderQuestion() {
      const q = questions[currentQuestionIndex];
      const percent = currentQuestionIndex / questions.length * 100;

      progressText.textContent = "두근두근 연애 취향 분석 중";
      progressCount.textContent = `${currentQuestionIndex + 1} / ${questions.length}`;
      progressFill.style.width = `${percent}%`;

      questionText.innerHTML = formatQuestionText(q.question);
      answerList.innerHTML = "";

      q.answers.forEach((answer) => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.type = "button";
        btn.innerHTML = `<span class="answer-title">${formatQuestionText(answer.title)}</span>`;
        btn.addEventListener("mousedown", (e) => e.preventDefault());
        btn.addEventListener("click", async () => {
          scores[answer.value] += 1;
          currentQuestionIndex += 1;

          if (currentQuestionIndex < questions.length) {
            renderQuestion();
          } else {
            progressFill.style.width = "100%";
            await showLoadingSequence();
            renderResult();
            showScreen("result");
          }
        });
        answerList.appendChild(btn);
      });
    }

    function getMbtiResult() {
      const ei = scores.E > scores.I ? "E" : "I";
      const sn = scores.S > scores.N ? "S" : "N";
      const tf = scores.T > scores.F ? "T" : "F";
      const jp = scores.J > scores.P ? "J" : "P";
      return `${ei}${sn}${tf}${jp}`;
    }

    function getOppositeType(type) {
      const map = {
        E: "I",
        I: "E",
        S: "N",
        N: "S",
        T: "F",
        F: "T",
        J: "P",
        P: "J"
      };
      return type.split("").map((char) => map[char]).join("");
    }

    function getPartnerLabel() {
      return selectedMode === "girlfriend" ? "여친" : "남친";
    }

    function calculateSyncPercent(resultType) {
      const pairs = [
        ["E", "I"],
        ["S", "N"],
        ["T", "F"],
        ["J", "P"]
      ];

      let totalGap = 0;

      pairs.forEach(([a, b]) => {
        totalGap += Math.abs(scores[a] - scores[b]);
      });

      let base = 78 + totalGap * 2;
      if (resultType.includes("F")) base += 2;
      if (resultType.includes("J")) base += 1;
      return Math.max(76, Math.min(96, base));
    }

    function showLoadingSequence() {
      return new Promise((resolve) => {
        let msgIndex = 0;
        loadingStatus.textContent = loadingMessages[0];
        loadingScreen.classList.add("show");

        const interval = setInterval(() => {
          msgIndex += 1;
          if (msgIndex < loadingMessages.length) {
            loadingStatus.textContent = loadingMessages[msgIndex];
          }
        }, 550);

        setTimeout(() => {
          clearInterval(interval);
          loadingScreen.classList.remove("show");
          resolve();
        }, 2300);
      });
    }

  saveImageBtn.addEventListener("click", async () => {
  const target = document.getElementById("resultCapture");
  const resultButtons = document.getElementById("resultButtons");
  const prevButtonsDisplay = resultButtons.style.display;

  resultButtons.style.display = "none";

  try {
    if (document.fonts && document.fonts.ready) {
      await document.fonts.ready;
    }

    const clonedClass = "capture-mode";
    document.body.classList.add(clonedClass);
    target.classList.add(clonedClass);

    await new Promise((resolve) => setTimeout(resolve, 200));

    const canvas = await html2canvas(target, {
      backgroundColor: "#fff8fc",
      scale: 3,
      useCORS: true,
      imageTimeout: 0,
      logging: false,
      scrollX: 0,
      scrollY: 0,
      removeContainer: true,
      foreignObjectRendering: false,
      onclone: (clonedDoc) => {
        clonedDoc.body.classList.add("capture-mode");
        const clonedTarget = clonedDoc.getElementById("resultCapture");
        if (clonedTarget) {
          clonedTarget.classList.add("capture-mode");
          clonedTarget.style.transform = "translateZ(0)";
        }
      }
    });

    const link = document.createElement("a");
    link.download = "monthly-love-result.png";
    link.href = canvas.toDataURL("image/png");
    link.click();

    showToast("결과 이미지가 저장되었어요");
  } catch (error) {
    console.error(error);
    showToast("이미지 저장에 실패했어요");
  } finally {
    resultButtons.style.display = prevButtonsDisplay || "grid";
    document.body.classList.remove("capture-mode");
    target.classList.remove("capture-mode");
  }
});

      const shareUrl = window.location.href;

      if (navigator.share) {
        try {
          await navigator.share({
            title: shareTitle,
            text: shareText,
            url: shareUrl
          });
        } catch (error) {}
      } else {
        try {
          await navigator.clipboard.writeText(shareUrl);
          showToast("테스트 링크가 복사되었어요");
        } catch (error) {
          showToast("공유에 실패했어요");
