    let currentQ = 0;
    let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };

    function nextScreen(hideId, showId) {
        document.getElementById(hideId).classList.remove('active');
        document.getElementById(showId).classList.add('active');
        window.scrollTo(0, 0);
    }

    function startTest() {
        currentQ = 0;
        scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0 };
        document.getElementById('main-start').style.display = 'none';
        document.getElementById('start-button-wrap').style.display = 'none';
        document.getElementById('capture-area').classList.add('active');
        document.getElementById('screen-question').classList.add('active');
        showQuestion();
    }

    function showQuestion() {
        if (currentQ >= questions.length) {
            document.getElementById('q-progress').style.width = "100%";
            calculateResult();
            return;
        }

        const qData = questions[currentQ];
        document.getElementById('progress-text').innerText = "TRACK " + String(currentQ + 1).padStart(2, "0") + " / " + questions.length;
        document.getElementById('q-progress').style.width = ((currentQ) / questions.length * 100) + '%';
        document.getElementById('q-text').innerHTML = qData.q;

        const btn1 = document.getElementById('ans-1');
        const btn2 = document.getElementById('ans-2');

        btn1.innerText = qData.a1;
        btn1.onclick = () => answer(qData.t1);

        btn2.innerText = qData.a2;
        btn2.onclick = () => answer(qData.t2);
    }

    function answer(type) {
        scores[type]++;
        currentQ++;
        showQuestion();
    }

    function calculateResult() {
        let mbti = "";
        mbti += (scores.E >= scores.I) ? "E" : "I";
        mbti += (scores.S >= scores.N) ? "S" : "N";
        mbti += (scores.T >= scores.F) ? "T" : "F";
        mbti += (scores.J >= scores.P) ? "J" : "P";
        showResult(mbti);
    }

    function showResult(mbti) {
        const resData = results[mbti];
        const rootStyles = document.getElementById('result-theme').style;

        rootStyles.setProperty('--theme-bg', resData.bg);
        rootStyles.setProperty('--theme-card', resData.card);
        rootStyles.setProperty('--theme-border', resData.border);
        rootStyles.setProperty('--theme-text', resData.text);
        rootStyles.setProperty('--theme-sub', resData.sub);

        document.getElementById('album-art').innerText = resData.icon;
        document.getElementById('song-title').innerText = resData.title;
        document.getElementById('res-good').innerText = resData.good;
        document.getElementById('res-bad').innerText = resData.bad;

        const traitUl = document.getElementById('traits-list');
        traitUl.innerHTML = "";
        resData.traits.forEach(trait => {
            const li = document.createElement('li');
            li.innerText = trait;
            traitUl.appendChild(li);
        });

        nextScreen('screen-question', 'screen-result');
        document.getElementById('out-of-frame-buttons').style.display = 'flex';
    }

    function saveResultImage() {
        const captureArea = document.getElementById('capture-area');
        const saveBtn = document.querySelector('.btn-save');
        saveBtn.innerText = "이미지 생성 중...";
        html2canvas(captureArea, { scale: 2 }).then(canvas => {
            document.getElementById('saved-image').src = canvas.toDataURL('image/png');
            document.getElementById('save-modal').classList.add('active');
            saveBtn.innerText = "결과 이미지 저장하기";
        });
    }

    function closeModal() {
        document.getElementById('save-modal').classList.remove('active');
    }

 function shareTest() {
    if (navigator.share) {

            title: '테스트잇 플레이리스트 성격 테스트',

        }).catch(console.error);
