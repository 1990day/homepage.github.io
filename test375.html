    const pastLifeData = {
      "갑자": { character: "깐깐한 사헌부 대사헌", traits: ["융통성 제로의 꼿꼿한 원칙주의자", "뇌물은 쳐다도 안 보는 청렴결백", "한번 물면 안 놓는 집요함", "남들 눈치 안 보는 마이웨이", "겉으론 차가워도 속은 나라 걱정뿐", "결과보다 과정을 중요하게 생각함", "자기 관리에 철저하고 흐트러짐이 없음"], desc: "추운 겨울의 튼튼한 거목처럼 흔들림이 없습니다. 관원들의 비리를 감찰하고 왕에게도 팩트 폭행을 서슴지 않던 조선 최고의 감찰관이었습니다." },

      "경자": { character: "피도 눈물도 없는 감찰", traits: ["얼음장처럼 차갑고 철저한 조선의 이성주의자", "흑백 논리가 분명하고 선 긋기에 매우 능함", "말수가 적지만 한번 입 열면 고관대작들도 떪", "완벽주의 성향으로 먼지 하나까지 털어댐", "정의감이 투철하여 친척이라도 잡아넣음", "차갑고 냉철한 이성으로 상황을 객관적으로 봄", "불의와 타협하지 않는 꼿꼿한 성품"], desc: "차가운 바위에서 떨어지는 물방울처럼 냉철하고 이성적입니다. 감정에 휩쓸리지 않고 권력자들의 부정부패를 날카롭게 적발해 귀양을 보내버리던 사헌부 감찰이었습니다." },
      "신축": { character: "까다로운 백자 도공", traits: ["가마 불도 내 맘에 안 들면 엎어버리는 극강의 고집", "차가워 보이지만 내면엔 예술적 혼이 불탐", "완벽한 백색이 나올 때까지 수천 번을 굽고 깸", "혼자 흙을 빚는 고요한 시간을 가장 사랑함", "제자들의 실수를 용납하지 않고 팩폭을 날림", "남의 간섭을 극도로 싫어하는 마이웨이", "내면의 감정을 잘 드러내지 않는 포커페이스"], desc: "차가운 동토 속에 묻힌 다이아몬드처럼 완벽주의가 심합니다. 왕실에 진상할 티끌 하나 없는 완벽한 달항아리를 굽기 위해 평생 흙과 불과 싸우던 왕실 관요의 도공이었습니다." },
      "임인": { character: "청산유수 이야기꾼 전기수", traits: ["봄을 맞은 강물처럼 생동감 넘치고 유쾌한 입담", "아주머니들을 들었다 놨다 하는 타고난 달변가", "머리가 비상하여 책 한 권을 통째로 다 외움", "관청에 얽매이는 걸 싫어하고 장터를 떠돎", "베풀기를 좋아해 국밥 한 그릇에 이야기를 풀어줌", "어디로 튈지 모르는 창의력과 아이디어 뱅크", "말을 기가 막히게 잘해서 위기를 잘 모면함"], desc: "봄날에 힘차게 흐르는 강물처럼 멈출 줄 모르는 에너지가 있습니다. 저잣거리에 돗자리를 깔고 심청전, 홍길동전을 기가 막히게 낭독하여 돈을 쓸어담던 이야기꾼이었습니다." },
      "계묘": { character: "약방의 감초 혜민서 의원", traits: ["백성들을 촉촉하게 감싸는 따뜻한 마음씨", "피 보는 침술보다 조용히 약을 달이는 걸 선호함", "환자의 얼굴빛만 봐도 병을 아는 무서운 직감", "출세 경쟁을 피하고 서민들 병 고치는 데 만족함", "세심하게 이웃을 챙기고 약재를 나눠주는 성격", "따뜻하고 다정하여 주변에 사람이 많음", "다투는 것을 싫어하고 평화로운 해결을 원함"], desc: "봄비처럼 조용히 내려 병든 사람을 소생시키는 따뜻함이 있습니다. 출세가 보장된 내의원을 마다하고 병든 백성들을 치료해주며 평화롭게 살던 혜민서의 의원이었습니다." },
      "갑진": { character: "배짱 두둑한 군관", traits: ["기름진 땅에 뿌리내린 거목 같은 배짱과 깡", "활쏘기 대회에서 늘 1등을 놓치지 않는 멘탈", "통솔력이 탁월하여 휘하 병사들이 형님으로 모심", "자존심이 강해 무관을 무시하는 문관들과 잘 싸움", "잔머리 안 굴리고 시원시원하게 직진하는 스타일", "난세에 영웅이 될 수 있는 강한 리더십", "자존심이 매우 세고 지는 것을 참지 못함"], desc: "비옥한 땅의 거목처럼 배짱이 두둑하고 멘탈이 강합니다. 외적이 쳐들어오면 가장 앞장서서 활을 쏘며 병사들의 사기를 하늘 끝까지 끌어올리던 믿음직한 군관이었습니다." },
      "을사": { character: "입에 모터 달린 역관(통역관)", traits: ["바위 틈을 파고드는 유연하고 능구렁이 같은 처세술", "중국어, 일본어까지 마스터하는 미친 언어 감각", "사신단 따라 북경 가서 은근히 밀무역도 즐김", "언변이 화려하고 양반들 사이에서 기죽지 않음", "명나라 황제 앞에서도 당황하지 않는 카멜레온", "눈치가 백단이라 상황 파악이 매우 빠름", "화려한 언변으로 사람을 구워삶는 재주가 탁월함"], desc: "아름답게 피어난 덩굴꽃처럼 화려한 언변과 유연함을 지녔습니다. 사신단을 따라가 기가 막힌 통역으로 외교 문제를 해결하고 밀무역으로 거대한 부를 챙기던 천재 역관이었습니다." },
      "병오": { character: "남사당패 줄타기 달인", traits: ["한여름의 태양 같은 폭발적인 에너지와 화려함", "장터 사람들의 시선과 환호를 즐기는 타고난 관종", "화끈하고 호탕해서 판돈 딴 것도 다 술값으로 씀", "내 줄타기 실력에 스크래치 나는 것을 절대 못 참음", "추진력이 좋아 즉흥적으로 팔도 유랑을 떠남", "자신감이 넘치고 어디서든 주인공이 되어야 함", "뒤끝이 없고 시원시원해서 쿨한 매력이 있음"], desc: "가장 뜨거운 한여름의 태양처럼 강렬하고 아슬아슬한 매력을 뿜어냅니다. 수십 미터 공중의 밧줄 위에서 부채 하나 들고 백성들의 혼을 쏙 빼놓던 조선 최고의 곡예사였습니다." },
      "정미": { character: "인자한 서당 훈장님", traits: ["화롯불처럼 따뜻하고 열정적인 교육열", "학동들의 글 읽는 소리에서 인생의 행복을 느낌", "독립심이 강해 산골짜기 서당에서도 잘 지냄", "말 안 듣는 학동에겐 회초리로 따끔하게 팩폭함", "마을 사람들의 대소사를 다 챙기는 엄마 리더십", "겉은 부드러워 보이지만 속은 은근히 욱함", "자신이 맡은 사람들을 끝까지 책임지는 모성애"], desc: "따뜻한 아랫목처럼 포근하면서도 학문에 대한 열정이 있습니다. 시골 마을에서 아이들에게 천자문을 가르치고 동네의 크고 작은 분쟁을 지혜롭게 해결해주던 훈장님이었습니다." },
      "무신": { character: "청나라 오가는 거상", traits: ["가을 산처럼 풍요롭고 못 구하는 물건이 없는 능력자", "압록강 넘어 북경까지 한 달 만에 주파하는 실행력", "상황 판단이 빠르고 환치기와 이익 계산이 철저함", "융통성이 좋아 오랑캐든 양반이든 거래를 성사시킴", "고집이 세지만 돈이 되는 합리적인 이유엔 수긍함", "어떤 일이든 뚝딱 해내는 미친 실행력과 능력", "상황에 맞춰 유연하게 사고하는 융통성"], desc: "거대한 산속에 엄청난 자원을 품고 있습니다. 험난한 국경을 넘어 청나라의 신문물을 들여와 조선 양반들에게 비싸게 팔아넘기며 막대한 부를 축적하던 대상인이었습니다." },
      "기유": { character: "깐깐한 전주 한지 장인", traits: ["가을 들녘의 알곡처럼 내실 있고 손끝이 야무짐", "평생 종이만 뜬 지독하고 외골수적인 장인정신", "자기만의 배합 비율이 확고해 남의 말을 절대 안 들음", "물이 조금만 탁해도 종이를 다 찢어버리는 예민함", "스트레스를 좋은 안주와 막걸리로 푸는 소박함", "한 가지 일에 몰두하는 지독한 집중력", "디테일을 귀신같이 잡아내는 예리한 관찰력"], desc: "가을 들녘의 황금빛 벼처럼 내실이 꽉 차 있고 꼼꼼합니다. 질긴 닥나무를 수만 번 두드려 천 년을 가는 조선 최고의 명품 한지를 만들어내던 고집불통 장인이었습니다." },
      "경술": { character: "대장간 수석 대장장이", traits: ["용광로를 품은 철광산 같은 압도적 덩치와 기백", "무거운 망치를 하루 종일 휘두르는 엄청난 뚝심", "한번 약속한 낫과 호미는 밤을 새워서라도 만들어줌", "거짓과 꼼수를 가장 극혐하는 직구 팩폭러", "수습 대장장이들을 쥐락펴락하며 이끄는 보스 기질", "한번 화가 나면 걷잡을 수 없는 불도저 성격", "거짓말을 극혐하고 투명한 관계를 지향함"], desc: "단단한 철광석 속에 뜨거운 용광로를 품은 듯한 기백이 있습니다. 쇳물을 들이마시며 묵묵히 망치질을 해 조선 팔도 농민들의 농기구를 책임지던 강인한 대장장이였습니다." },
      "신해": { character: "산속 은둔 천재 선비", traits: ["맑은 계곡물에 씻긴 백옥처럼 고결하고 깔끔 떠는 성격", "붕당 정치의 더러움을 피해 산으로 숨은 개인주의", "두뇌 회전이 비상하고 시와 그림에 영감이 넘침", "세상 돌아가는 꼴을 비판하는 팩트 폭행의 달인", "먼지 하나 없는 서재를 유지하는 결벽증에 가까운 완벽주의", "세상과 타협하기 싫어하는 고결한 성품", "직관력이 비상하여 영감이 남다르게 번뜩임"], desc: "흐르는 맑은 물속에 빛나는 보석처럼 고결하고 예민한 성품을 지녔습니다. 썩어빠진 조정을 등지고 깊은 산속 폭포 아래서 역사에 남을 시조를 짓던 은둔형 천재였습니다." },
      "임자": { character: "은밀한 정보 캐는 체탐인(첩자)", traits: ["한겨울의 거센 파도처럼 필요할 땐 무자비한 행동력", "정체를 절대 들키지 않는 심해 같은 완벽한 포커페이스", "비상한 두뇌로 적진의 지도를 단번에 외우는 직관력", "임무에 실패하는 것을 죽기보다 싫어하는 승부욕", "비밀이 많고 친척에게도 진짜 직업을 숨기고 삶", "속을 도통 알 수 없는 깊고 신비로운 매력", "승부욕이 강해 남몰래 철저히 준비하는 타입"], desc: "끝을 알 수 없는 캄캄하고 깊은 바닷속 같은 신비로움과 치밀함이 있습니다. 오랑캐 진영이나 역모 세력에 위장 잠입하여 국가의 1급 기밀을 빼내오던 특수 요원이었습니다." },
      "계축": { character: "눈보라 뚫는 함경도 상인", traits: ["얼어붙은 북방의 땅에서도 버티는 묵묵한 참을성", "불평불만 없이 무거운 봇짐을 지고 산을 넘는 뚝심", "한번 욱하면 눈보라처럼 무섭게 터지는 다혈질", "겉은 얼음장처럼 차가워도 동료가 아프면 약을 달여줌", "영감이 발달하여 도적 떼가 숨은 낌새를 잘 알아챔", "묵묵한 참을성 뒤에 숨겨진 엄청난 뚝심", "차갑게 보이지만 내 사람에겐 한없이 다정함"], desc: "차가운 눈보라 속에서도 굳건히 버티는 강인함과 묵묵함이 있습니다. 매서운 칼바람이 부는 함경도의 험준한 산맥을 넘어 명태와 모피를 실어 나르던 강인한 상인이었습니다." },
      "갑인": { character: "지리산 산적 두목", traits: ["하늘로 뻗은 소나무처럼 관군 앞에서도 안 꺾이는 자존심", "수백 명의 산적을 눈빛 하나로 제압하는 카리스마", "스케일이 커서 관찰사의 행차를 통째로 털어버림", "나라의 법이나 간섭받는 것을 극도로 혐오하는 마이웨이", "약탈한 재물을 부하들에게 공평하게 나누는 보스 기질", "꺾일지언정 굽히지 않는 대나무 같은 자존심", "자신의 무리를 이끄고 책임지는 보스 기질"], desc: "거대한 숲을 호령하는 가장 높고 튼튼한 거목과 같습니다. 부패한 벼슬아치들을 혐오하여 지리산 깊은 곳에 산채를 짓고 자신만의 규칙으로 무리를 다스리던 호탕한 두목이었습니다." },
      "을묘": { character: "궁중 내의원 최고 의녀", traits: ["밟혀도 다시 자라는 들풀 같은 궁궐 내 끈질긴 생명력", "부드러운 미소 속에 감춰진 신분 상승의 지독한 승부욕", "맥 짚는 법 하나에 꽂히면 밤새워 의서를 파고드는 집요함", "예민하고 섬세하여 비빈들의 미세한 안색 변화를 놓치지 않음", "궁중 암투 속에서도 어느 편에 설지 아는 탁월한 눈치", "어려운 환경에서도 결국 살아남는 잡초 멘탈", "목표를 이루기 위해 조용히 칼을 가는 타입"], desc: "가녀린 풀꽃 같아 보이지만 바위도 뚫고 나오는 끈질김이 있습니다. 천민 출신이라는 한계를 극복하고 침술과 탕약 기술 하나로 왕실 여성들의 건강을 책임지던 최고 의녀였습니다." },

      "경신": { character: "의리파 왈패 두목", traits: ["단단한 쇠스랑처럼 주먹 하나는 조선 팔도 최강인 맷집", "한번 싸우기로 결정하면 앞장서서 돌격하는 무서운 실행력", "밥 굶는 동생들 챙기는 의리를 목숨보다 소중하게 생각함", "계산 굴리는 양반들을 극혐하고 단순 명쾌하게 주먹으로 정리함", "내 구역 상인들을 건드리는 다른 패거리는 절대 용서치 않음", "의리를 목숨보다 중요하게 생각하는 상남자/상여자", "잔머리 굴리는 사람을 제일 싫어하고 팩트로 조짐"], desc: "순도 100%의 단단한 무쇠처럼 의리가 넘치고 무력이 뛰어납니다. 저잣거리에서 오직 실력과 주먹 하나로 승부하며 상권을 보호비 명목으로 장악하던 의리 넘치는 왈패 두목이었습니다." },
      "신유": { character: "궁중 최고 다모(수사관)", traits: ["잘 벼려진 칼날처럼 매우 예민하고 현장 단서를 귀신같이 찾음", "시체의 아주 작은 상처 하나도 놓치지 않는 지독한 깐깐함", "사또 앞에서도 사건의 진실을 직설적으로 말하는 팩트 폭행러", "현장을 치울 때 결벽증에 가깝게 완벽하고 깔끔하게 처리함", "동료를 쉽게 믿지 않고 결정적 단서는 혼자 독고다이로 캐냄", "결벽증에 가까울 정도로 완벽주의 성향이 강함", "남의 실수를 용납하지 않고 날카롭게 지적함"], desc: "얼음같이 차갑고 예리한 보석처럼 빈틈이 없고 수사에 완벽주의 성향을 지녔습니다. 관아에서 여자의 몸으로 양반들이 놓친 살인 사건의 실마리를 족족 찾아내던 천재 다모였습니다." },
      "임술": { character: "대운하 파는 토목 관원", traits: ["거대한 댐에 갇힌 물처럼 산을 뚫어버릴 엄청난 잠재력", "스케일이 남달라 강줄기를 바꾸는 큰 판을 기획하는 능력", "수백 명의 인부들을 호통치며 통솔하는 거친 카리스마", "자존심이 세서 현장 일 모르는 책상머리 문관들을 무시함", "홍수가 나면 즉각적으로 둑을 쌓아 대처하는 유연한 임기응변", "큰 판을 짜고 사람을 움직이는 리더십과 잠재력", "상황을 거시적으로 바라보는 탁월한 안목"], desc: "거대한 에너지를 모아두었다가 필요할 때 쏟아내는 기백이 있습니다. 한양으로 세곡선이 들어올 수 있도록 거대한 강줄기를 정비하고 운하를 파던 국가 소속의 천재 건축가였습니다." },
      "계해": { character: "날씨 맞추는 관상감 천문관", traits: ["끝을 알 수 없는 깊은 바다처럼 우주의 이치에 대한 지혜가 넘침", "붕당 정치의 싸움을 극혐하고 별자리만 보고 싶어 하는 평화주의자", "바람의 냄새만 맡아도 비가 올지 아는 징그럽게 정확한 영감", "가뭄이나 홍수를 막을 제사 아이디어가 꼬리에 꼬리를 묾", "권력이나 재물보다 다가올 일식과 월식을 계산하는 데 관심이 미쳐있음", "우주 만물의 이치에 관심이 많은 신비주의자", "현실적인 이득보다 정신적인 가치를 더 쫓음"], desc: "가장 깊고 신비로운 바다처럼 지혜롭고 영감으로 가득 차 있습니다. 밤하늘의 별을 보고 내일의 날씨와 나라의 가뭄, 홍수를 정확하게 예측해 농사철을 알려주던 신비한 천문학자였습니다." }

    const hanjaToHangulMap = {
      "甲": "갑", "乙": "을", "丙": "병", "丁": "정", "戊": "무", "己": "기", "庚": "경", "辛": "신", "壬": "임", "癸": "계",
      "子": "자", "丑": "축", "寅": "인", "卯": "묘", "辰": "진", "巳": "사", "午": "오", "未": "미", "申": "신", "酉": "유", "戌": "술", "亥": "해"
    };

    function getHangulIlju(hanjaStr) {
      if (!hanjaStr || hanjaStr.length !== 2) return hanjaStr;
      return (hanjaToHangulMap[hanjaStr[0]] || hanjaStr[0]) + (hanjaToHangulMap[hanjaStr[1]] || hanjaStr[1]);
    }

    function initDateDropdowns() {
      const yearSelect = document.getElementById('birthYear');
      const monthSelect = document.getElementById('birthMonth');
      const daySelect = document.getElementById('birthDay');

      const currentYear = new Date().getFullYear();
      for (let i = currentYear; i >= 1950; i--) {
        let option = document.createElement('option');
        option.value = i;
        option.text = i + '년';
        if (i === 1995) option.selected = true;
        yearSelect.appendChild(option);
      }

      for (let i = 1; i <= 12; i++) {
        let option = document.createElement('option');
        option.value = i;
        option.text = i + '월';
        if (i === 1) option.selected = true;
        monthSelect.appendChild(option);
      }

      for (let i = 1; i <= 31; i++) {
        let option = document.createElement('option');
        option.value = i;
        option.text = i + '일';
        if (i === 1) option.selected = true;
        daySelect.appendChild(option);
      }
    }

    initDateDropdowns();

    function goToInput() {
      document.getElementById('home-screen').style.display = 'none';
      document.getElementById('input-screen').style.display = 'block';
    }

    function resetTest() {
      document.getElementById('userName').value = '';
      document.getElementById('result-screen').style.display = 'none';
      document.getElementById('home-screen').style.display = 'block';
    }

    function calculateResult() {
      const name = document.getElementById('userName').value.trim();
      
      const year = parseInt(document.getElementById('birthYear').value, 10);
      const month = parseInt(document.getElementById('birthMonth').value, 10);
      const day = parseInt(document.getElementById('birthDay').value, 10);

      if (!name) {
        alert("시스템 오류: 사용자 이름을 입력해야 스캔이 가능합니다.");
        return;
      }

      try {
        const solar = Solar.fromYmd(year, month, day);
        const lunar = solar.getLunar();
        const bazi = lunar.getEightChar();
        
        const iljuHanja = bazi.getDay();
        const ilju = getHangulIlju(iljuHanja);

        const resultData = pastLifeData[ilju];

        if (resultData) {
          document.getElementById('res-name').innerText = name;
          document.getElementById('res-job').innerText = resultData.character;
          
          // 일주 서브타이틀 업데이트
          document.getElementById('res-ilju-subtitle').innerText = '조선시대 ' + ilju + '(' + iljuHanja + ') 일주';
          
          const traitsListElement = document.getElementById('res-traits-list');
          traitsListElement.innerHTML = ''; 
          resultData.traits.forEach(trait => {
            const li = document.createElement('li');
            li.innerText = trait;
            traitsListElement.appendChild(li);
          });

          document.getElementById('res-job-desc').innerText = resultData.desc;
          
          document.getElementById('input-screen').style.display = 'none';
          document.getElementById('result-screen').style.display = 'block';
        } else {
          alert(`시스템 오류: 일주(${ilju}) 데이터가 존재하지 않습니다.`);
        }
      } catch (e) {
        alert("치명적 오류: 생년월일 파싱 중 시스템 충돌이 발생했습니다.");
        console.error(e);
      }
    }

    function showImageModal() {
      const captureArea = document.getElementById('result-capture-area');
      const modal = document.getElementById('image-modal');
      const resultImg = document.getElementById('rendered-image');

      html2canvas(captureArea, {
        scale: 2,
        backgroundColor: "#c0c0c0" 
      }).then(canvas => {
        const imgData = canvas.toDataURL('image/png');
        resultImg.src = imgData;
        modal.style.display = 'flex';
      }).catch(err => {
        alert("시스템 오류: 이미지 생성에 실패했습니다.");
        console.error(err);
      });
    }

    function closeModal(event, forceClose = false) {
      const modal = document.getElementById('image-modal');
      if (forceClose || event.target === modal) {
        modal.style.display = 'none';
      }
    }

    function shareTest() {
      const shareUrl = window.location.href;
      
      if (navigator.share) {
        navigator.share({
          title: '테스트잇 사주 조선시대 직업 테스트',
          text: '테스트잇 사주 조선시대 직업 테스트',
          url: shareUrl
        }).catch(err => {
          console.error('공유 실패:', err);
        });
      } else {
        const dummy = document.createElement('input');
        document.body.appendChild(dummy);
        dummy.value = shareUrl;
        dummy.select();
        document.execCommand('copy');
        document.body.removeChild(dummy);
        alert('테스트 링크가 복사되었습니다!');
      }
    }
  </script>
