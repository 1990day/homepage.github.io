<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마인드맵 성격 테스트 - 인스타 스토리용</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url("https://cdn.jsdelivr.net/gh/MonadABXY/mona-font/web/mona.css");

  @font-face {
    font-family: "Umdot";
    src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/Umdot12.woff2") format("woff2");
    font-weight: normal;
    font-display: swap;
  }

  @font-face {
    font-family: "Galmuri14";
    src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2506-1@1.0/Galmuri14.woff2") format("woff2");
    font-weight: normal;
    font-display: swap;
  }

  :root {
    --line: rgba(112, 131, 167, 0.28);
    --bg: #f7f1c8;
    --panel: #f7f9fd;
    --text: #23283a;
    --text-soft: #4b5473;
    --text-sub: #5d6787;
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: geometricPrecision;
  }

  body,
  button,
  input,
  .detail-text,
  .detail-header,
  p,
  h1,
  h2,
  span,
  div,
  a,
  li {
    font-family: "Galmuri14", sans-serif;
  }

  .emoji-font {
    font-family: "Mona", "Apple Color Emoji", "Segoe UI Emoji", sans-serif !important;
  }

  body.container {
    background: linear-gradient(180deg, #f4ecbf 0%, #efe4ac 100%);
    color: var(--text);
    min-height: 100vh;
  }

  .page-shell {
    width: 100%;
    max-width: 500px;
    margin: 0 auto;
    background: var(--panel);
    min-height: 100vh;
    box-shadow: 0 14px 42px rgba(32, 40, 65, 0.12);
    overflow-x: hidden;
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 14px !important;
    padding-bottom: 12px !important;
    padding-left: 4%;
    padding-right: 4%;
    border-bottom: 1px solid var(--line);
    position: relative;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(3px);
  }

  .page-header h1 {
    margin: 0 !important;
    line-height: 1;
  }

  .logo {
    width: 86px;
    margin-top: 0;
    display: block;
  }

  .main-nav {
    display: flex;
    flex-wrap: nowrap !important;
    align-items: center;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: 8px;
  }

  .main-nav li {
    margin-left: 0;
  }

  .main-nav a {
    display: block;
    text-decoration: none;
    color: #44506a;
    background: rgba(255,255,255,0.82);
    border: 1px solid rgba(112,131,167,0.18);
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 13px;
    white-space: nowrap;
    box-shadow: 0 6px 18px rgba(0,0,0,0.04);
    transition: all 0.2s ease;
  }

  .main-nav a:hover {
    background: #fff;
    color: #111;
    transform: translateY(-1px);
    text-decoration: none;
  }

  #app {
    width: 100%;
    background: #f7f9fd;
    min-height: calc(100vh - 66px);
    position: relative;
    display: flex;
    flex-direction: column;
    transition: background-color 0.35s ease;
  }

  .content-wrapper {
    padding: 10px 16px 14px;
    flex-grow: 1;
    display: flex;
    flex-direction: column;
  }

  .screen {
    display: none;
    animation: fadeIn 0.22s ease-out;
    text-align: center;
    width: 100%;
  }

  .screen.active {
    display: block;
  }

  .screen.active.flex-center {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    flex-grow: 1;
  }

  .screen.block-view {
    padding-top: 0;
    padding-bottom: 4px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .folder-stage {
    position: relative;
    width: 100%;
    padding-top: 18px;
    margin-top: 2px;
  }

  .folder-tab {
    position: absolute;
    top: 0;
    left: 18px;
    min-width: 128px;
    height: 40px;
    padding: 0 16px;
    border: 2px solid #7083a7;
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    background: linear-gradient(180deg, #fff7c9 0%, #ffe894 100%);
    color: #3d4966;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    z-index: 2;
    box-shadow: 0 -1px 0 rgba(255,255,255,0.8) inset;
  }

  .folder-panel {
    position: relative;
    width: 100%;
    background: linear-gradient(180deg, #fffdf5 0%, #fff8db 100%);
    border: 2px solid #7083a7;
    border-radius: 22px;
    padding: 18px 18px 16px;
    box-shadow:
      0 12px 28px rgba(73, 92, 130, 0.10),
      inset 0 1px 0 rgba(255,255,255,0.85);
    overflow: hidden;
  }

  .folder-panel::before {
    content: "";
    position: absolute;
    top: 16px;
    right: 16px;
    width: 74px;
    height: 54px;
    border-radius: 12px;
    background: rgba(255,255,255,0.28);
    border: 1px solid rgba(112,131,167,0.16);
  }

  .folder-panel::after {
    content: "";
    position: absolute;
    inset: auto 0 0 0;
    height: 18px;
    background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(112,131,167,0.06) 100%);
    pointer-events: none;
  }

  .folder-inner {
    position: relative;
    z-index: 1;
  }

  .folder-badges {
    display: flex;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 14px;
  }

  .folder-badge {
    height: 28px;
    padding: 0 10px;
    border-radius: 999px;
    background: #ffffff;
    color: #5d6787;
    border: 1.5px solid #d4dceb;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    white-space: nowrap;
  }

  .folder-badge.soft-pink {
    background: #fff1f6;
    border-color: #f3cad9;
    color: #8a6270;
  }

  .folder-badge.soft-blue {
    background: #eef5ff;
    border-color: #cddcf5;
    color: #556684;
  }

  .main-title {
    font-size: 34px;
    line-height: 1.28;
    color: var(--text);
    margin-bottom: 10px;
    word-break: keep-all;
  }

  .main-desc {
    font-size: 16px;
    line-height: 1.7;
    color: var(--text-sub);
    margin-bottom: 18px;
    word-break: keep-all;
  }

  .folder-preview {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .preview-note {
    min-height: 74px;
    border-radius: 16px;
    padding: 12px 10px;
    text-align: left;
    border: 1.5px solid #d8e0ef;
    background: rgba(255,255,255,0.9);
    color: var(--text-soft);
    font-size: 13px;
    line-height: 1.55;
    box-shadow: 0 4px 10px rgba(80, 98, 135, 0.05);
  }

  .preview-note strong {
    display: block;
    margin-bottom: 6px;
    color: var(--text);
    font-size: 13px;
  }

  .pattern-btn {
    background: linear-gradient(180deg, #4b5878 0%, #38445f 100%);
    color: #ffffff;
    border: 2px solid #38445f;
    padding: 15px 18px;
    font-size: 16px;
    border-radius: 16px;
    cursor: pointer;
    width: 100%;
    margin-bottom: 0;
    transition: transform 0.12s ease, filter 0.12s ease;
    box-shadow: 0 8px 16px rgba(56, 68, 95, 0.18);
  }

  .pattern-btn:hover {
    filter: brightness(1.03);
  }

  .pattern-btn:active {
    transform: translateY(1px);
  }

  .name-input-wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  input[type="text"] {
    width: 100%;
    padding: 16px;
    border-radius: 16px;
    border: 2px solid #d7deea;
    background: #ffffff;
    color: var(--text);
    font-size: 16px;
    text-align: center;
    outline: none;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
  }

  input[type="text"]:focus {
    border-color: #9bacca;
    background: #fcfdff;
  }

  .question-folder {
    position: relative;
    width: 100%;
    padding-top: 18px;
    margin-top: 2px;
  }

  .question-tab {
    position: absolute;
    top: 0;
    left: 18px;
    min-width: 120px;
    height: 38px;
    padding: 0 14px;
    border: 2px solid #7486a7;
    border-bottom: none;
    border-radius: 15px 15px 0 0;
    background: linear-gradient(180deg, #dce9ff 0%, #bfd6ff 100%);
    color: #49556f;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    z-index: 2;
  }

  .question-panel {
    position: relative;
    width: 100%;
    background: linear-gradient(180deg, #ffffff 0%, #f8fbff 100%);
    border: 2px solid #7486a7;
    border-radius: 22px;
    padding: 16px 16px 14px;
    box-shadow: 0 12px 26px rgba(80, 96, 130, 0.08);
  }

  .progress-bar {
    width: 100%;
    height: 10px;
    background: #e9eef6;
    border-radius: 999px;
    margin-bottom: 14px;
    overflow: hidden;
  }

  .progress {
    height: 100%;
    background: linear-gradient(90deg, #91a8d5 0%, #6d84b2 100%);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 999px;
  }

  .question-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 12px;
  }

  .question-count,
  .question-type {
    font-size: 12px;
    color: #657394;
    background: #f2f6fb;
    border: 1px solid #dde6f1;
    border-radius: 999px;
    padding: 6px 10px;
  }

  #q-title {
    margin-bottom: 18px;
    line-height: 1.58;
    font-size: 22px;
    color: var(--text);
    word-break: keep-all;
    text-align: left;
    padding: 2px 2px 4px;
  }

  .answer-btn {
    background: #ffffff;
    color: var(--text);
    border: 2px solid #d8e0ec;
    border-radius: 18px;
    padding: 16px 14px;
    text-align: left;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
    line-height: 1.58;
    word-break: keep-all;
    font-size: 16px;
    box-shadow: 0 4px 10px rgba(78, 96, 130, 0.04);
    transition: border-color 0.12s ease, background 0.12s ease, transform 0.12s ease;
  }

  .answer-btn:hover {
    border-color: #9fb2d1;
    background: #f9fbff;
  }

  .answer-btn:active {
    transform: translateY(1px);
  }

  .result-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .capture-area {
    width: 100%;
    max-width: 430px;
    min-height: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 14px 4px;
    border-radius: 28px;
    position: relative;
    overflow: hidden;
    background-color: transparent;
  }

  .paper-sheet {
    position: absolute;
    inset: 8px 10px 4px 10px;
    border-radius: 8px;
    background: #ffffff;
    border: 1.5px solid rgba(195, 202, 220, 0.95);
    box-shadow:
      0 6px 18px rgba(120, 130, 160, 0.08),
      inset 0 0 0 1px rgba(255,255,255,0.9);
    z-index: 0;
  }

  .mindmap-lines {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  .mindmap-lines svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .mindmap-lines path,
  .mindmap-lines line {
    stroke: rgba(126, 154, 214, 0.78);
    stroke-width: 2.6;
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .mindmap-lines circle {
    fill: rgba(126, 154, 214, 0.95);
  }

  .result-top {
    position: relative;
    z-index: 2;
    width: 100%;
    text-align: center;
    margin-bottom: 0;
    min-height: 0;
  }

  .center-card {
    position: relative;
    z-index: 3;
    width: 250px;
    min-height: 84px;
    border: 3px solid #ff6ea8;
    background: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    box-shadow: 3px 3px 0px #ff6ea8;
    border-radius: 24px;
    margin: 2px 0 14px;
    padding: 12px 12px;
    flex-direction: column;
  }

  .center-subtitle {
    font-size: 18px;
    color: #465171;
    background: #fff4b8;
    border-radius: 999px;
    padding: 8px 14px;
    border: 2px solid #f0d95e;
    line-height: 1.3;
    word-break: keep-all;
  }

  .cards-grid {
    position: relative;
    z-index: 3;
    width: 100%;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 10px;
    align-items: stretch;
    margin-bottom: 0;
  }

  .sticker-card {
    background: rgba(255,255,255,0.99);
    border-radius: 18px;
    padding: 12px 10px;
    text-align: left;
    position: relative;
    min-height: 112px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
  }

  .sticker-card.full-width {
    grid-column: 1 / -1;
    min-height: 104px;
    margin-bottom: 0;
  }

  .sticker-card.pink {
    border: 2px solid #ff9eb5;
    box-shadow: 2px 2px 0px #ff9eb5;
  }

  .sticker-card.blue {
    border: 2px solid #8ac4ff;
    box-shadow: 2px 2px 0px #8ac4ff;
  }

  .sticker-card.green {
    border: 2px solid #a3e098;
    box-shadow: 2px 2px 0px #a3e098;
  }

  .sticker-card.yellow {
    border: 2px solid #ffdf73;
    box-shadow: 2px 2px 0px #ffdf73;
  }

  .detail-header {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 8px;
    font-size: 17px;
    border-bottom: 1px dashed #e2e2e2;
    padding-bottom: 7px;
    color: var(--text);
    line-height: 1.32;
    word-break: keep-all;
    text-align: center;
    letter-spacing: 0;
  }

  .detail-icon {
    font-size: 18px;
    margin-right: 6px;
    flex-shrink: 0;
    font-family: "Mona", "Apple Color Emoji", "Segoe UI Emoji", sans-serif !important;
  }

  .detail-text {
    font-size: 15px;
    color: var(--text-soft);
    line-height: 1.5;
    word-break: keep-all;
    text-align: center;
    letter-spacing: 0;
  }

  .result-action-area {
    width: 100%;
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .action-btn {
    width: 100%;
    border: none;
    padding: 14px 18px;
    font-size: 16px;
    border-radius: 16px;
    cursor: pointer;
    transition: transform 0.1s;
    font-family: "Galmuri14", sans-serif;
  }

  .action-btn:active {
    transform: translateY(1px);
  }

  .action-btn.save {
    background: #76bfff;
    color: #ffffff;
    border: 3px solid #ff6ea8;
    box-shadow: 3px 3px 0px #ff6ea8;
  }

  .action-btn.restart {
    background: #ffec8a;
    color: #ff5f8e;
    border: 3px solid #ff5f8e;
    box-shadow: 3px 3px 0px #ff5f8e;
  }

  .action-btn.others {
    background: #a3e098;
    color: #ffffff;
    border: 3px solid #5f7b57;
    box-shadow: 3px 3px 0px #5f7b57;
  }

  .action-btn.share {
    background: #ffffff;
    color: #76bfff;
    border: 3px solid #76bfff;
    box-shadow: 3px 3px 0px #76bfff;
  }

  @media (max-width: 390px) {
    .content-wrapper {
      padding: 8px 10px 10px;
    }

    .folder-tab,
    .question-tab {
      left: 12px;
      min-width: 108px;
      font-size: 11px;
    }

    .folder-panel,
    .question-panel {
      border-radius: 20px;
    }

    .folder-panel {
      padding: 16px 14px 14px;
    }

    .question-panel {
      padding: 14px 12px 12px;
    }

    .main-title {
      font-size: 30px;
    }

    .main-desc {
      font-size: 15px;
    }

    .folder-preview {
      gap: 8px;
    }

    .preview-note {
      min-height: 66px;
      font-size: 12px;
      padding: 10px 9px;
    }

    .capture-area {
      padding: 6px 12px 4px;
    }

    .cards-grid {
      gap: 8px;
    }

    .sticker-card {
      min-height: 104px;
      padding: 10px 8px;
    }

    .detail-header {
      font-size: 15px;
    }

    .detail-text {
      font-size: 13px;
    }

    .center-card {
      width: 220px;
      margin: 2px 0 12px;
    }

    .center-subtitle {
      font-size: 15px;
    }

    #q-title {
      font-size: 19px;
    }

    .answer-btn {
      font-size: 14px;
    }
  }
</style>
</head>

<body class="container">
  <div class="page-shell">
    <header class="page-header wrapper">
      <h1><a href="index.html"><img class="logo" src="img_logo.png" alt="test it"></a></h1>
      <nav>
        <ul class="main-nav">
          <li><a href="https://test-it.co.kr/test.html">성격</a></li>
          <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
          <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
          <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
        </ul>
      </nav>
    </header>

    <div id="app">
      <div class="content-wrapper">

        <div id="screen-main" class="screen flex-center active">
          <div class="folder-stage">
            <div class="folder-tab">MY FOLDER</div>
            <div class="folder-panel">
              <div class="folder-inner">
                <div class="folder-badges">
                  <div class="folder-badge soft-pink">성격 기록</div>
                  <div class="folder-badge soft-blue">mind map</div>
                </div>

                <h1 class="main-title">내 머릿속 다이어리</h1>
                <p class="main-desc">
                  내 머릿속엔 어떤 생각들이 퍼져 있을까<br>
                  질문에 답하고 나만의 마인드맵 결과를 확인해봐
                </p>

                <div class="folder-preview">
                  <div class="preview-note">
                    <strong>생각 흐름</strong>
                    평소 반응과 습관을 가볍게 체크
                  </div>
                  <div class="preview-note">
                    <strong>결과 카드</strong>
                    한 장 이미지처럼 깔끔하게 저장 가능
                  </div>
                </div>

                <button class="pattern-btn" onclick="nextScreen('screen-name')">테스트 시작하기</button>
              </div>
            </div>
          </div>
        </div>

        <div id="screen-name" class="screen flex-center">
          <div class="folder-stage">
            <div class="folder-tab">NAME FILE</div>
            <div class="folder-panel">
              <div class="folder-inner">
                <div class="folder-badges">
                  <div class="folder-badge">result name</div>
                  <div class="folder-badge soft-pink">nickname ok</div>
                </div>

                <h1 class="main-title">이름 입력</h1>
                <p class="main-desc">
                  결과지에 들어갈 이름이나 닉네임을 적어줘
                </p>

                <div class="name-input-wrap">
                  <input type="text" id="userName" placeholder="예: 다혜">
                  <button class="pattern-btn" onclick="startTest()">다 적었어</button>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div id="screen-question" class="screen flex-center">
          <div class="question-folder">
            <div class="question-tab">QUESTION</div>
            <div class="question-panel">
              <div class="progress-bar">
                <div class="progress" id="progress"></div>
              </div>

              <div class="question-meta">
                <div class="question-count" id="question-count">1 / 12</div>
                <div class="question-type">mind check</div>
              </div>

              <h2 id="q-title">질문</h2>

              <button class="answer-btn" id="btn-A" onclick="selectAnswer('A')">답변 A</button>
              <button class="answer-btn" id="btn-B" onclick="selectAnswer('B')">답변 B</button>
            </div>
          </div>
        </div>

        <div id="screen-result" class="screen block-view">
          <div class="result-wrapper">
            <div class="capture-area" id="capture-area">
              <div class="paper-sheet"></div>

              <div class="mindmap-lines">
                <svg viewBox="0 0 430 1460" preserveAspectRatio="none">
                  <line x1="215" y1="120" x2="112" y2="180"></line>

  function nextScreen(screenId) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    const screen = document.getElementById(screenId);
    screen.classList.add("active");

    if (screenId === "screen-result") {
      const mbti = calculateMBTI();
      document.getElementById("app").style.backgroundColor = pastelColors[mbti] || "#ffffff";
    } else {
      document.getElementById("app").style.backgroundColor = "#f7f9fd";
    }
  }

  function calculateMBTI() {
    return (scores.E >= scores.I ? "E" : "I") +
           (scores.S >= scores.N ? "S" : "N") +
           (scores.T >= scores.F ? "T" : "F") +
           (scores.J >= scores.P ? "J" : "P");
  }

  function startTest() {
    const input = document.getElementById("userName").value.trim();
    userName = input ? input : "당신";
    currentQ = 0;
    for (let key in scores) scores[key] = 0;
    showQuestion();
    nextScreen("screen-question");
  }

  function showQuestion() {
    if (currentQ >= questions.length) {
      showResult();
      return;
    }

    const qData = questions[currentQ];
    document.getElementById("q-title").innerHTML = qData.q;
    document.getElementById("btn-A").innerHTML = qData.a.text;
    document.getElementById("btn-A").onclick = () => selectAnswer(qData.a.type);
    document.getElementById("btn-B").innerHTML = qData.b.text;
    document.getElementById("btn-B").onclick = () => selectAnswer(qData.b.type);
    document.getElementById("progress").style.width = ((currentQ + 1) / questions.length * 100) + "%";
    document.getElementById("question-count").innerText = (currentQ + 1) + " / " + questions.length;
  }

  function selectAnswer(type) {
    scores[type]++;
    currentQ++;
    showQuestion();
  }

  function cleanText(text) {
    return text.replace(/\./g, "").trim();
  }

  function showResult() {
    const mbti = calculateMBTI();
    const data = resultData[mbti] || resultData["DEFAULT"];
    const bg = pastelColors[mbti] || "#ffffff";

    document.getElementById("mm-center-subtitle").innerText = userName + "님의 마인드맵";

    const captureArea = document.getElementById("capture-area");
    captureArea.style.backgroundColor = bg;

    const colors = ["pink", "blue", "yellow", "green", "pink", "blue", "yellow", "green", "pink"];
    let html = "";

    data.branches.forEach((branch, index) => {
      const firstSpaceIndex = branch.main.indexOf(" ");
      const emoji = branch.main.substring(0, firstSpaceIndex);
      const title = branch.main.substring(firstSpaceIndex).trim();
      const colorClass = colors[index % colors.length];
      const extraClass = index === 8 ? "full-width" : "";

      html += `
        <div class="sticker-card ${colorClass} ${extraClass}">
          <div class="detail-header"><span class="detail-icon emoji-font">${emoji}</span>${title}</div>
          <div class="detail-text">${cleanText(branch.sub)}</div>
        </div>
      `;
    });

    document.getElementById("cards-container").innerHTML = html;

    requestAnimationFrame(() => {
      nextScreen("screen-result");
      requestAnimationFrame(() => {
        updateResultHeight();
      });
    });
  }

  function updateResultHeight() {
    const target = document.getElementById("capture-area");
    const paper = target.querySelector(".paper-sheet");
    const linesSvg = target.querySelector(".mindmap-lines svg");

    if (!target || !paper || !linesSvg) return;

    target.style.height = "auto";
    target.style.minHeight = "auto";

    const contentHeight = target.scrollHeight;
    const finalHeight = contentHeight + 2;

    target.style.height = finalHeight + "px";
    target.style.minHeight = finalHeight + "px";
    linesSvg.setAttribute("viewBox", `0 0 430 ${finalHeight}`);
  }

  function saveResultAsImage() {
    const mbti = calculateMBTI();
    const target = document.getElementById("capture-area");
    const saveBtn = document.querySelector(".action-btn.save");
    const paper = target.querySelector(".paper-sheet");

    updateResultHeight();

    if (paper) {
      paper.style.backgroundColor = "#ffffff";
    }

    saveBtn.innerHTML = '<span class="emoji-font">⏳</span> 생성 중...';
    saveBtn.disabled = true;

    html2canvas(target, {
      backgroundColor: pastelColors[mbti] || "#ffffff",
      scale: 5,
      useCORS: true,
      logging: false
    }).then(canvas => {
      const link = document.createElement("a");
      link.download = userName + "_머릿속_다이어리.png";
      link.href = canvas.toDataURL("image/png");
      link.click();
      saveBtn.innerHTML = '<span class="emoji-font">💾</span> 결과 이미지 저장하기';
      saveBtn.disabled = false;
    }).catch(() => {
      alert("이미지 저장 실패 캡처를 이용해 주세요");
      saveBtn.innerHTML = '<span class="emoji-font">💾</span> 결과 이미지 저장하기';
      saveBtn.disabled = false;
    });
  }

  function shareTest() {
    const url = location.href;
    const title = userName + "의 머릿속 다이어리";
    if (navigator.share) {
      navigator.share({ title: title, url: url }).catch(console.error);
    } else {
      navigator.clipboard.writeText(url).then(() => {
        alert("링크가 복사되었어요");
      });
    }
  }

  window.addEventListener("resize", () => {
    const resultScreen = document.getElementById("screen-result");
    if (resultScreen.classList.contains("active")) {
      updateResultHeight();
    }
  });
</script>
