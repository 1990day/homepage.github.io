<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5522499110435321" crossorigin="anonymous"></script>

  <meta charset="UTF-8">

  <meta property="og:type" content="website">
  <meta property="og:title" content="테스트잇 농작물 친구들 성격 테스트">
  <meta property="og:description" content="테스트잇 농작물 친구들 성격 테스트">

  <link rel="icon" type="image/png" href="favicon.png">

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    @font-face {
      font-family: 'Umdot';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/Umdot12.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    :root {
      --background: #b7aa8f;
      --paper: #f7f7f3;
      --white: #ffffff;
      --green-light: #d8ed62;
      --green: #5f8646;
      --green-dark: #355429;
      --line: #7d8378;
      --text: #242820;
      --sub: #666d60;
      --cream: #eee2b9;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      font-family: 'Umdot', sans-serif !important;
      font-weight: normal !important;
      text-shadow: none !important;
      box-shadow: none !important;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      color: var(--text);
      background: var(--background);
      overflow-x: hidden;
    }

    button {
      cursor: pointer;
    }

    .site-header {
      width: 100%;
      height: 56px;
      background: #fffdf3;
      border-bottom: 1px solid var(--line);
    }

    .header-inner {
      width: min(100%, 620px);
      height: 100%;
      margin: 0 auto;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo,
    .header-menu a {
      color: var(--green-dark);
      text-decoration: none;
      white-space: nowrap;
    }

    .logo {
      font-size: 20px;
    }

    .header-menu {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .header-menu a {
      color: #51574d;
      font-size: 14px;
    }

    .page {
      min-height: calc(100vh - 56px);
      padding: 28px 12px 50px;
      background: var(--background);
    }

    .screen {
      display: none;
      width: min(100%, 600px);
      margin: 0 auto;
    }

    .screen.active {
      display: block;
      animation: screenIn 0.2s ease;
    }

    @keyframes screenIn {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .main-image-frame {
      width: 100%;
      overflow: hidden;
      background: #fffefa;
      border: 1px solid var(--line);
    }

    .main-image {
      display: block;
      width: 100%;
      height: auto;
    }

    .start-button {
      width: 100%;
      min-height: 54px;
      margin-top: 14px;
      padding: 12px;
      border: 1px solid var(--line);
      background: var(--green);
      color: #ffffff;
      font-size: 17px;
    }

    .start-button:active,
    .answer-button:active,
    .result-button:active {
      transform: scale(0.985);
    }

    .progress-panel,
    .question-card,
    .loading-card {
      background: var(--paper);
      border: 1px solid var(--line);
    }

    .progress-panel {
      padding: 15px;
    }

    .progress-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 13px;
    }

    .progress-label {
      color: var(--green-dark);
    }

    .progress-count {
      color: #654832;
    }

    .progress-track {
      height: 16px;
      overflow: hidden;
      background: #ded5b7;
      border: 1px solid var(--line);
    }

    .progress-fill {
      width: 8.33%;
      height: 100%;
      background: var(--green-light);
      transition: width 0.2s ease;
    }

    .question-card {
      margin-top: 16px;
      padding: 22px 18px 20px;
    }

    .question-number {
      display: inline-block;
      padding: 6px 10px;
      background: var(--cream);
      border: 1px solid var(--line);
      color: #654832;
      font-size: 13px;
    }

    .question-text {
      min-height: 95px;
      margin: 12px 0 0;
      color: var(--text);
      font-size: 21px;
      line-height: 1.55;
      text-align: center;
      word-break: keep-all;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .answer-list {
      display: grid;
      gap: 11px;
      margin-top: 18px;
    }

    .answer-button {
      width: 100%;
      min-height: 54px;
      padding: 13px 14px;
      background: #ffffff;
      border: 1px solid var(--line);
      color: #3f4838;
      font-size: 15px;
      line-height: 1.5;
      word-break: keep-all;
    }

    .answer-button:hover {
      background: #f1f6e7;
    }

    .answer-button:disabled {
      cursor: default;
    }

    .loading-card {
      min-height: 230px;
      padding: 32px 20px 28px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .loading-title {
      margin: 0;
      color: var(--green-dark);
      font-size: 21px;
      line-height: 1.5;
    }

    .loading-description {
      margin: 8px 0 0;
      color: var(--sub);
      font-size: 13px;
    }

    .loading-dots {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-top: 22px;
    }

    .loading-dots span {
      width: 10px;
      height: 10px;
      background: var(--green);
      border: 1px solid var(--line);
      animation: dotLoading 1.1s ease-in-out infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    @keyframes dotLoading {
      0%,
      100% {
        transform: translateY(0);
        opacity: 0.45;
      }

      50% {
        transform: translateY(-6px);
        opacity: 1;
      }
    }

    .result-wrapper,
    .result-capture {
      width: 100%;
    }

    .result-capture {
      overflow: hidden;
      background: var(--paper);
      border: 1px solid var(--line);
    }

    .result-header {
      min-height: 60px;
      padding: 10px 28px;
      background: var(--green-light);
      border-bottom: 1px solid var(--line);
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-header-title {
      position: relative;
      margin: 0;
      padding: 8px 20px 7px;
      background: #fffef8;
      border: 1px solid var(--line);
      color: #20231e;
      font-size: clamp(15px, 4vw, 21px);
      line-height: 1.3;
      letter-spacing: -0.02em;
      white-space: nowrap;
    }

    .result-header-title::before,
    .result-header-title::after {
      content: "";
      position: absolute;
      top: 50%;
      width: 7px;
      height: 7px;
      background: var(--green-light);
      border: 1px solid var(--line);
      transform: translateY(-50%) rotate(45deg);
    }

    .result-header-title::before {
      left: -15px;
    }

    .result-header-title::after {
      right: -15px;
    }

    .result-content {
      padding: 12px;
    }

    .result-inner-box {
      padding: 12px;
      background: var(--paper);
      border: 1px solid var(--line);
    }

    .result-hero {
      padding: 10px;
      background: var(--white);
      border: 1px solid var(--line);
    }

    .result-scene {
      position: relative;
      width: 100%;
      min-height: 210px;
      overflow: hidden;
      background: #eef8ff;
      border: 1px solid var(--line);
    }

    .scene-cloud {
      position: absolute;
      background: #fffef6;
      border: 1px solid #bcc4b2;
      border-radius: 999px;
      z-index: 1;
    }

    .scene-cloud::before,
    .scene-cloud::after {
      content: "";
      position: absolute;
      background: #fffef6;
      border: 1px solid #bcc4b2;
      border-radius: 50%;
    }

    .scene-cloud-left {
      top: 20px;
      left: 22px;
      width: 56px;
      height: 22px;
    }

    .scene-cloud-left::before {
      width: 24px;
      height: 24px;
      left: 7px;
      top: -12px;
    }

    .scene-cloud-left::after {
      width: 18px;
      height: 18px;
      right: 9px;
      top: -8px;
    }

    .scene-cloud-right {
      top: 34px;
      right: 28px;
      width: 48px;
      height: 18px;
    }

    .scene-cloud-right::before {
      width: 22px;
      height: 22px;
      left: 6px;
      top: -11px;
    }

    .scene-cloud-right::after {
      width: 16px;
      height: 16px;
      right: 6px;
      top: -7px;
    }

    .scene-hill {
      position: absolute;
      bottom: 60px;
      background: #c7dea0;
      border-top: 1px solid #adc27e;
      z-index: 1;
    }

    .scene-hill-left {
      left: -10px;
      width: 54%;
      height: 72px;
      border-top-right-radius: 85px 62px;
    }

    .scene-hill-right {
      right: -10px;
      width: 56%;
      height: 84px;
      border-top-left-radius: 90px 68px;
      background: #b8d487;
    }

    .scene-grass-strip {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 60px;
      height: 14px;
      background: #84b960;
      border-top: 1px solid var(--line);
      z-index: 2;
    }

    .scene-soil {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 60px;
      background: #9a734a;
      border-top: 1px solid var(--line);
      z-index: 2;
    }

    .scene-grass {
      position: absolute;
      color: #7baa4d;
      font-size: 20px;
      line-height: 1;
      z-index: 2;
    }

    .scene-grass-left {
      left: 28px;
      bottom: 82px;
    }

    .scene-grass-right {
      right: 30px;
      bottom: 88px;
    }

    .scene-flower {
      position: absolute;
      color: #f5acc9;
      font-size: 16px;
      line-height: 1;
      z-index: 2;
    }

    .scene-flower-left {
      left: 70px;
      bottom: 100px;
    }

    .scene-flower-right {
      right: 76px;
      bottom: 110px;
    }

    .result-hero-image-wrap {
      position: absolute;
      left: 50%;
      bottom: 52px;
      width: 140px;
      height: 120px;
      transform: translateX(-50%);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 4;
      overflow: visible;
    }

    .result-hero-image {
      display: block;
      width: 108px;
      height: 108px;
      object-fit: contain;
      transform: scale(1.42);
      transform-origin: center bottom;
    }

    .scene-name-badge {
      position: absolute;
      left: 50%;
      bottom: 10px;
      transform: translateX(-50%);
      min-width: 100px;
      min-height: 34px;
      padding: 7px 15px;
      background: var(--green-light);
      border: 1px solid var(--line);
      color: #456320;
      text-align: center;
      z-index: 4;
    }

    .result-name-inline {
      display: inline-block;
      color: #456320;
      font-size: 21px;
      line-height: 1;
    }

    .scene-side-icon {
      position: absolute;
      bottom: 17px;
      font-size: 23px;
      line-height: 1;
      z-index: 4;
    }

    .scene-side-left {
      left: 18px;
    }

    .scene-side-right {
      right: 18px;
    }

    .trait-list {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      grid-auto-rows: 108px;
      gap: 8px;
      margin-top: 12px;
    }

    .trait-item {
      width: 100%;
      height: 108px;
      min-width: 0;
      min-height: 0;
      padding: 8px 7px;
      overflow: hidden;
      background: var(--white);
      border: 1px solid var(--line);
      color: #1f231d;
      font-size: 14px;
      line-height: 1.45;
      letter-spacing: -0.03em;
      text-align: center;
      word-break: keep-all;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .farm-friend-box {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .farm-friend {
      min-width: 0;
      overflow: hidden;
      background: var(--white);
      border: 1px solid var(--line);
      text-align: center;
    }

    .farm-friend-label {
      min-height: 34px;
      margin: 0;
      padding: 6px 4px;
      background: var(--green-light);
      border-bottom: 1px solid var(--line);
      font-size: 13px;
      line-height: 1.3;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .farm-friend-result {
      min-height: 86px;
      padding: 6px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      align-items: center;
      gap: 5px;
    }

    .farm-match-item {
      min-width: 0;
      padding: 3px 2px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
    }

    .farm-friend-image {
      display: block;
      width: 46px;
      height: 46px;
      object-fit: contain;
      transform: scale(1.18);
      transform-origin: center;
    }

    .farm-friend-name {
      margin: 0;
      color: #252821;
      font-size: 12px;
      line-height: 1.15;
      white-space: nowrap;
    }

    .result-buttons {
      display: grid;
      gap: 10px;
      margin-top: 18px;
    }

    .result-button {
      width: 100%;
      min-height: 51px;
      padding: 10px 12px;
      background: #fffefa;
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 14px;
    }

    .result-button.primary {
      background: var(--green);
      color: #ffffff;
    }

    .result-button.share {
      background: #e7ddb9;
    }

    .ad-wrap {
      width: 100%;
      margin: 30px auto 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-align: center;
    }

    .ad-inner {
      width: 350px;
      max-width: 100%;
      min-height: 140px;
      margin: 0 auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow: hidden;
    }

    .ad-inner iframe {
      display: block;
      margin: 0 auto !important;
      border: 0;
    }

    .save-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      padding: 25px 16px;
      background: rgba(35, 42, 30, 0.72);
      overflow-y: auto;
      align-items: center;
      justify-content: center;
    }

    .save-modal.active {
      display: flex;
    }

    .save-modal-panel {
      position: relative;
      width: min(100%, 420px);
      max-height: calc(100vh - 50px);
      padding: 18px 15px 17px;
      overflow-y: auto;
      background: #fffefa;
      border: 1px solid var(--line);
    }

    .save-modal-close {
      position: absolute;
      top: 9px;
      right: 9px;
      width: 32px;
      height: 32px;
      padding: 0;
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--text);
      font-size: 18px;
    }

    .save-modal-title {
      margin: 1px 38px 5px;
      color: var(--green-dark);
      font-size: 18px;
      text-align: center;
    }

    .save-modal-description {
      margin: 0 0 13px;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.55;
      text-align: center;
    }

    .save-image-area {
      min-height: 180px;
      padding: 7px;
      background: #e7edd9;
      border: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .save-image-area img {
      display: block;
      width: 100%;
      height: auto;
      border: 1px solid var(--line);
    }

    .save-image-loading {
      color: var(--green-dark);
      font-size: 13px;
      line-height: 1.7;
      text-align: center;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 25px;
      z-index: 300;
      width: max-content;
      max-width: calc(100% - 32px);
      padding: 12px 17px;
      background: #344429;
      border: 1px solid #ffffff;
      color: #ffffff;
      font-size: 13px;
      line-height: 1.4;
      text-align: center;
      transform: translate(-50%, 15px);
      opacity: 0;
      pointer-events: none;
      transition:
        opacity 0.25s ease,
        transform 0.25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translate(-50%, 0);
    }

    @media (max-width: 560px) {
      .page {
        padding: 12px 8px 42px;
      }

      .screen {
        width: min(100%, 520px);
      }

      .question-card {
        padding: 18px 12px 16px;
      }

      .question-text {
        min-height: 84px;
        font-size: 18px;
      }

      .answer-button {
        min-height: 64px;
        padding: 12px 10px;
        font-size: 14px;
      }

      .loading-card {
        min-height: 200px;
        padding: 26px 16px 24px;
      }

      .loading-title {
        font-size: 19px;
      }

      .loading-dots {
        margin-top: 18px;
      }

      .result-header {
        min-height: 54px;
        padding: 8px 24px;
      }

      .result-header-title {
        padding: 7px 14px 6px;
        font-size: 15px;
      }

      .result-content {
        padding: 8px;
      }

      .result-inner-box {
        padding: 8px;
      }

      .result-hero {
        padding: 8px;
      }

      .result-scene {
        min-height: 192px;
      }

      .scene-cloud-left {
        top: 16px;
        left: 16px;
        width: 48px;
        height: 18px;
      }

      .scene-cloud-right {
        top: 28px;
        right: 18px;
        width: 42px;
        height: 16px;
      }

      .scene-hill {
        bottom: 56px;
      }

      .scene-grass-strip {
        bottom: 56px;
        height: 13px;
      }

      .scene-soil {
        height: 56px;
      }

      .result-hero-image-wrap {
        bottom: 48px;
        width: 116px;
        height: 104px;
      }

      .result-hero-image {
        width: 90px;
        height: 90px;
        transform: scale(1.42);
      }

      .scene-name-badge {
        bottom: 8px;
        min-width: 88px;
        min-height: 30px;
        padding: 6px 13px;
      }

      .result-name-inline {
        font-size: 17px;
      }

      .scene-side-icon {
        bottom: 14px;
        font-size: 19px;
      }

      .trait-list {
        grid-auto-rows: 91px;
        gap: 6px;
        margin-top: 10px;
      }

      .trait-item {
        height: 91px;
        padding: 7px 5px;
        font-size: 12px;
        line-height: 1.38;
      }

      .farm-friend-box {
        gap: 6px;
      }

      .farm-friend-label {
        min-height: 31px;
        padding: 5px 3px;
        font-size: 11px;
      }

      .farm-friend-result {
        min-height: 72px;
        padding: 4px 3px 5px;
        gap: 2px;
      }

      .farm-match-item {
        padding: 2px 1px 3px;
      }

      .farm-friend-image {
        width: 38px;
        height: 38px;
        transform: scale(1.14);
      }

      .farm-friend-name {
        font-size: 11px;
      }

      .ad-wrap {
        margin-top: 24px;
      }
    }

    @media (max-width: 390px) {
      .header-inner {
        padding: 0 11px;
      }

      .logo {
        font-size: 18px;
      }

      .header-menu {
        gap: 8px;
      }

      .header-menu a {
        font-size: 13px;
      }

      .page {
        padding-left: 6px;
        padding-right: 6px;
      }

      .result-header {
        min-height: 52px;
        padding: 8px 20px;
      }

      .result-header-title {
        padding: 6px 10px 5px;
        font-size: 14px;
      }

      .result-scene {
        min-height: 180px;
      }

      .scene-hill {
        bottom: 52px;
      }

      .scene-grass-strip {
        bottom: 52px;

    let currentQuestion = 0;
    let isAnswering = false;
    let currentResultType = "";
    let toastTimer = null;

    const scores = {
      E: 0,
      I: 0,
      S: 0,
      N: 0,
      T: 0,
      F: 0,
      J: 0,
      P: 0
    };

    const startScreen =
      document.getElementById("startScreen");

    const questionScreen =
      document.getElementById("questionScreen");

    const loadingScreen =
      document.getElementById("loadingScreen");

    const resultScreen =
      document.getElementById("resultScreen");

    function showScreen(screen) {
      [
        startScreen,
        questionScreen,
        loadingScreen,
        resultScreen
      ].forEach((item) => {
        item.classList.remove("active");
      });

      screen.classList.add("active");

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function resetTestState() {
      currentQuestion = 0;
      isAnswering = false;
      currentResultType = "";

      Object.keys(scores).forEach((key) => {
        scores[key] = 0;
      });

      document.getElementById("progressCount").textContent =
        `1 / ${questions.length}`;

      document.getElementById("progressFill").style.width =
        `${100 / questions.length}%`;

      document.getElementById("questionNumber").textContent =
        "문항 01";

      document.getElementById("questionText").textContent =
        "";

      document.getElementById("answerList").innerHTML =
        "";
    }

    function startTest() {
      resetTestState();
      showScreen(questionScreen);
      renderQuestion();
    }

    function renderQuestion() {
      const data =
        questions[currentQuestion];

      const progress =
        ((currentQuestion + 1) / questions.length) * 100;

      document.getElementById("questionNumber").textContent =
        `문항 ${String(currentQuestion + 1).padStart(2, "0")}`;

      document.getElementById("questionText").innerHTML =
        data.question;

      document.getElementById("progressCount").textContent =
        `${currentQuestion + 1} / ${questions.length}`;

      document.getElementById("progressFill").style.width =
        `${progress}%`;

      const answerList =
        document.getElementById("answerList");

      answerList.innerHTML =
        "";

      data.answers.forEach((answer) => {
        const button =
          document.createElement("button");

        button.type =
          "button";

        button.className =
          "answer-button";

        button.innerHTML =
          answer.text;

        button.addEventListener("click", () => {
          selectAnswer(answer.score);
        });

        answerList.appendChild(button);
      });

      isAnswering =
        false;
    }

    function selectAnswer(score) {
      if (isAnswering) {
        return;
      }

      isAnswering =
        true;

      scores[score] +=
        1;

      document
        .querySelectorAll(".answer-button")
        .forEach((button) => {
          button.disabled = true;
        });

      currentQuestion +=
        1;

      if (currentQuestion < questions.length) {
        renderQuestion();
      } else {
        calculateResult();
      }
    }

    function calculateResult() {
      const energy =
        scores.E > scores.I ? "E" : "I";

      const information =
        scores.S > scores.N ? "S" : "N";

      const decision =
        scores.T > scores.F ? "T" : "F";

      const lifestyle =
        scores.J > scores.P ? "J" : "P";

      currentResultType =
        energy +
        information +
        decision +
        lifestyle;

      showScreen(loadingScreen);

      setTimeout(() => {
        renderResult(currentResultType);
        showScreen(resultScreen);
      }, 3000);
    }

    function createMatchItem(name) {
      const item =
        document.createElement("div");

      item.className =
        "farm-match-item";

      const image =
        document.createElement("img");

      image.className =
        "farm-friend-image";

      image.src =
        cropImages[name];

      image.alt =
        name;

      const title =
        document.createElement("p");

      title.className =
        "farm-friend-name";

      title.textContent =
        name;

      item.appendChild(image);
      item.appendChild(title);

      return item;
    }

    function renderMatchList(containerId, names) {
      const container =
        document.getElementById(containerId);

      container.innerHTML =
        "";

      names.forEach((name) => {
        container.appendChild(
          createMatchItem(name)
        );
      });
    }

    function renderResult(type) {
      const result =
        results[type];

      const resultHeroImage =
        document.getElementById("resultHeroImage");

      resultHeroImage.src =
        cropImages[result.name];

      resultHeroImage.alt =
        result.name;

      document.getElementById("resultName").textContent =
        result.name;

      const traitList =
        document.getElementById("traitList");

      traitList.innerHTML =
        "";

      result.traits.forEach((trait) => {
        const item =
          document.createElement("div");

        item.className =
          "trait-item";

        item.textContent =
          trait;

        traitList.appendChild(item);
      });

      renderMatchList(
        "goodMatchList",
        result.good
      );

      renderMatchList(
        "differentMatchList",
        result.different
      );
    }

    function restartTest() {
      closeSaveModal();
      resetTestState();

      document.getElementById("traitList").innerHTML =
        "";

      document.getElementById("goodMatchList").innerHTML =
        "";

      document.getElementById("differentMatchList").innerHTML =
        "";

      showScreen(startScreen);
    }

   async function shareTest() {
  const shareTitle =
    "테스트잇 농작물 친구들 성격 테스트";

  const shareUrl =
    "https://test-it.co.kr/test403";

  if (navigator.share) {
    try {
      await navigator.share({
        text: shareTitle,
        url: shareUrl
      });
    } catch (error) {
      if (error.name !== "AbortError") {
        copyShareLink(
          `${shareTitle}\n${shareUrl}`
        );
      }
    }
  } else {
    copyShareLink(
      `${shareTitle}\n${shareUrl}`
    );
  }
}

    async function copyShareLink(url) {
      try {
        await navigator.clipboard.writeText(url);

        showToast(
          "테스트 링크가 복사되었습니다."
        );
      } catch (error) {
        const textarea =
          document.createElement("textarea");

        textarea.value =
          url;

        textarea.style.position =
          "fixed";

        textarea.style.opacity =
          "0";

        document.body.appendChild(textarea);

        textarea.focus();
        textarea.select();

        document.execCommand("copy");

        textarea.remove();

        showToast(
          "테스트 링크가 복사되었습니다."
        );
      }
    }

    function waitForImage(image) {
      if (
        image.complete &&
        image.naturalWidth > 0
      ) {
        return Promise.resolve();
      }

      return new Promise((resolve) => {
        const finish = () => {
          image.removeEventListener(
            "load",
            finish
          );

          image.removeEventListener(
            "error",
            finish
          );

          resolve();
        };

        image.addEventListener(
          "load",
          finish
        );

        image.addEventListener(
          "error",
          finish
        );
      });
    }

    async function waitForResultImages() {
      const resultImages =
        Array.from(
          document.querySelectorAll(
            "#resultCapture img"
          )
        );

      await Promise.all(
        resultImages.map((image) => {
          return waitForImage(image);
        })
      );
    }

        const canvas =
          await html2canvas(resultCapture, {
            scale: 2,
            useCORS: true,
            allowTaint: false,
            backgroundColor: "#f7f7f3",
            logging: false,
            scrollX: 0,
            scrollY: -window.scrollY,
            windowWidth:
              document.documentElement.clientWidth
          });

        const image =
          new Image();

        image.src =
          canvas.toDataURL("image/png");

        image.alt =
          "농작물 친구들 성격 테스트 결과 이미지";

        image.draggable =
          false;

        saveImageArea.innerHTML =
          "";

        saveImageArea.appendChild(
          image
        );
      } catch (error) {
        console.error(error);

        saveImageArea.innerHTML = `
          <div class="save-image-loading">
            이미지 생성 중 오류가 발생했습니다.<br>
            잠시 후 다시 시도해 주세요.
          </div>
        `;
      }
    }

    function closeSaveModal() {
      document
        .getElementById("saveModal")
        .classList.remove("active");

      document.body.style.overflow =
        "";
    }

    function handleModalBackground(event) {
      if (event.target.id === "saveModal") {
        closeSaveModal();
      }
    }

    function showToast(message) {
      const toast =
        document.getElementById("toast");

      toast.textContent =
        message;

      toast.classList.add("show");

      clearTimeout(toastTimer);

      toastTimer =
        setTimeout(() => {
          toast.classList.remove("show");
        }, 2200);
    }
  </script>
</body>
</html>
