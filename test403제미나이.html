<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>테스트잇 농작물 친구들 성격 테스트</title>
  <meta name="description" content="나는 밭에서 어떤 농작물일까? 테스트잇 농작물 성격 테스트">
  <meta name="keywords" content="테스트잇,농작물성격테스트,성격테스트">
  <meta property="og:type" content="website">
  <meta property="og:title" content="테스트잇 농작물 성격 테스트">
  <meta property="og:description" content="나는 밭에서 어떤 농작물일까?">
  <meta property="og:url" content="https://test-it.co.kr/">

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    @font-face {
      font-family: 'Umdot';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/Umdot12.woff2') format('woff2');
      font-weight: normal;
      font-display: swap;
    }

    :root {
      --sky: #f4f9f1;
      --cream: #fffcf8;
      --paper: #ffffff;
      --green: #689f4b;
      --green-dark: #4a7532;
      --green-light: #cde2bd;
      --grass: #8ebf6a;
      --grass-light: #b9d89e;
      --soil: #aa8469;
      --soil-dark: #825f46;
      --soil-light: #c9a489;
      --yellow: #fcd977;
      --text: #41483b;
      --sub-text: #7f8a75;
      --line: #8ebf6a; 
      --lime-bg: #eafa8c;
      --white: #ffffff;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      border-width: 1px !important;
      font-family: 'Umdot', sans-serif !important;
      font-weight: normal !important;
      text-shadow: none !important;
      box-shadow: none !important; 
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      color: var(--text);
      background: var(--sky);
      overflow-x: hidden;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    button {
      font-family: inherit;
    }

    .site-header {
      width: 100%;
      height: 56px;
      background: var(--paper);
      border-bottom: 1px dotted var(--line);
      position: relative;
      z-index: 50;
    }

    .header-inner {
      width: min(100%, 620px);
      height: 100%;
      margin: 0 auto;
      padding: 0 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      color: var(--green-dark);
      text-decoration: none;
      font-size: 20px;
      letter-spacing: -1px;
    }

    .header-menu {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .header-menu a {
      color: var(--sub-text);
      text-decoration: none;
      font-size: 14px;
      white-space: nowrap;
    }

    .page {
      position: relative;
      min-height: calc(100vh - 56px);
      padding: 28px 16px 70px;
      overflow: hidden;
    }

    .background-field {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      height: 145px;
      background: var(--soil-light);
      border-top: 1px dotted var(--soil);
      z-index: -3;
    }

    .cloud {
      position: fixed;
      width: 80px;
      height: 28px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px dotted var(--line);
      border-radius: 20px;
      z-index: -3;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      background: inherit;
      border: inherit;
      border-bottom: 0;
      border-radius: 50%;
    }

    .cloud::before {
      width: 31px;
      height: 31px;
      left: 11px;
      bottom: 13px;
    }

    .cloud::after {
      width: 39px;
      height: 39px;
      right: 8px;
      bottom: 12px;
    }

    .cloud-one {
      top: 100px;
      left: 7%;
    }

    .cloud-two {
      top: 165px;
      right: 7%;
      transform: scale(0.72);
    }

    .sun {
      position: fixed;
      top: 88px;
      right: 13%;
      width: 58px;
      height: 58px;
      background: var(--yellow);
      border: 1px dotted #e1be54;
      border-radius: 50%;
      z-index: -4;
    }

    .screen {
      display: none;
      width: min(100%, 520px);
      margin: 0 auto;
      position: relative;
      z-index: 2;
    }

    .screen.active {
      display: block;
      animation: screenIn 0.35s ease;
    }

    @keyframes screenIn {
      from {
        opacity: 0;
        transform: translateY(9px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .start-card {
      background: var(--paper);
      border: 1px dotted var(--line);
      padding: 24px 20px 25px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border-radius: 4px;
    }

    .start-title {
      margin: 15px 0;
      color: var(--green-dark);
      font-size: 24px;
      line-height: 1.35;
      letter-spacing: -1px;
      word-break: keep-all;
    }

    .start-title strong {
      display: block;
      margin-top: 5px;
      color: var(--text);
      font-size: 32px;
      line-height: 1.25;
    }

    .start-description {
      margin: 14px 0 20px;
      color: var(--sub-text);
      font-size: 15px;
      line-height: 1.65;
      word-break: keep-all;
    }

    .farm-scene {
      height: 180px;
      margin: 10px 0 22px;
      background: var(--sky);
      border: 1px dotted var(--line);
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      color: var(--sub-text);
    }

    .start-button,
    .answer-button,
    .result-button {
      width: 100%;
      border: 1px dotted var(--line);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
      border-radius: 4px;
    }

    .start-button {
      min-height: 55px;
      background: var(--green);
      color: var(--white);
      font-size: 17px;
    }

    .start-guide {
      margin: 16px 0 0;
      color: var(--sub-text);
      font-size: 12px;
    }

    .progress-panel {
      background: var(--paper);
      border: 1px dotted var(--line);
      padding: 15px;
      border-radius: 4px;
    }

    .progress-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .progress-label, .progress-count {
      color: var(--green-dark);
      font-size: 13px;
    }

    .progress-track {
      height: 12px;
      background: var(--sky);
      border: 1px dotted var(--line);
      position: relative;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      width: 8.33%;
      height: 100%;
      background: var(--green-light);
      transition: width 0.35s ease;
    }

    .question-card {
      margin-top: 15px;
      background: var(--paper);
      border: 1px dotted var(--line);
      padding: 24px 18px 30px;
      position: relative;
      border-radius: 4px;
    }

    .question-number {
      display: inline-block;
      margin: 0 0 15px;
      padding: 6px 12px;
      background: var(--sky);
      border: 1px dotted var(--line);
      color: var(--green-dark);
      font-size: 13px;
      border-radius: 4px;
    }

    .question-text {
      min-height: 80px;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 20px;
      line-height: 1.5;
      text-align: center;
      word-break: keep-all;
    }

    .answer-list {
      display: grid;
      gap: 12px;
      margin-top: 20px;
    }

    .answer-button {
      min-height: 65px;
      padding: 14px 15px;
      background: var(--cream);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
      word-break: keep-all;
    }

    .answer-button:hover {
      background: var(--sky);
    }

    .start-button:active,
    .answer-button:active,
    .result-button:active {
      transform: scale(0.98);
    }

    .loading-card {
      min-height: 400px;
      background: var(--paper);
      border: 1px dotted var(--line);
      padding: 60px 20px;
      text-align: center;
      border-radius: 4px;
    }

    .loading-title {
      margin: 0;
      color: var(--green-dark);
      font-size: 22px;
      line-height: 1.5;
    }

    .loading-description {
      margin: 15px 0 30px;
      color: var(--sub-text);
      font-size: 14px;
    }

    .loading-farm {
      font-size: 60px;
      animation: loadingFloat 1.5s ease-in-out infinite;
    }

    @keyframes loadingFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .result-capture {
      width: 100%;
      background: var(--paper);
      border: 1px dotted var(--line);
      display: flex;
      flex-direction: column;
    }

    .result-header-text {
      text-align: center;
      font-size: 22px;
      color: var(--text);
      background-color: var(--lime-bg); 
      padding: 18px 15px;
      border-bottom: 1px dotted var(--line);
    }

    .result-inner {
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    .result-top-section {
      display: flex;
      gap: 15px;
      padding: 15px;
      border: 1px dotted var(--line);
    }

    .result-img-box {
      width: 130px;
      height: 130px;
      border: 1px dotted var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      padding: 10px;
    }

    .result-img-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .result-desc-box {
      flex-grow: 1;
      border: 1px dotted var(--line);
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 15px;
    }

    .desc-row {
      display: flex;
      gap: 10px;
      font-size: 16px;
      color: var(--text);
      line-height: 1.6;
    }

    .desc-label {
      white-space: nowrap;
    }

    .desc-value {
      word-break: keep-all;
    }

    .result-grid-4x4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .trait-item {
      aspect-ratio: 1 / 1;
      border: 1px dotted var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
      font-size: 14.5px;
      word-break: keep-all;
      background: transparent;
      color: var(--text);
      line-height: 1.45;
    }

    .result-bottom-section {
      display: flex;
      gap: 15px;
    }

    .match-box {
      flex: 1;
      border: 1px dotted var(--line);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .match-title {
      background-color: var(--lime-bg);
      border-bottom: 1px dotted var(--line);
      text-align: center;
      padding: 12px;
      font-size: 16px;
    }

    .match-content {
      text-align: center;
      padding: 20px 10px;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .match-img-box {
      width: 80px; 
      height: 80px;
    }

    .match-img-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .match-name {
      font-size: 16px;
      color: var(--text);
    }

    .result-buttons {
      display: grid;
      gap: 10px;
      margin-top: 15px;
    }

    .result-button {
      min-height: 50px;
      background: var(--paper);
      font-size: 15px;
    }

    .result-button.primary {
      background: var(--green);
      color: var(--white);
    }

    .save-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      padding: 20px;
      background: rgba(0, 0, 0, 0.6);
      align-items: center;
      justify-content: center;
    }

    .save-modal.active { display: flex; }

    .save-modal-panel {
      width: 100%;
      max-width: 400px;
      background: var(--paper);
      padding: 20px;
      border-radius: 8px;
      position: relative;
    }

    .save-image-area img {
      width: 100%;
      border: 1px dotted var(--line);
      border-radius: 4px;
    }

    @media (max-width: 390px) {
      .result-img-box {
        width: 100px;
        height: 100px;
      }
      .desc-row {
        font-size: 14px;
      }
      .trait-item {
        font-size: 12px;
        padding: 4px;
      }
      .match-img-box {
        width: 60px;
        height: 60px;
      }
      .match-name {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="https://test-it.co.kr/" class="logo">테스트잇</a>
      <nav class="header-menu">
        <a href="https://test-it.co.kr/">성격</a>
        <a href="https://test-it.co.kr/">얼굴</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="cloud cloud-one"></div>
    <div class="cloud cloud-two"></div>
    <div class="sun"></div>
    <div class="background-field"></div>

    <section id="startScreen" class="screen active">
      <div class="start-card">
        <h1 class="start-title">
          밭에서 자란 내 성격은?
          <strong>농작물 친구들 테스트</strong>
        </h1>
        <p class="start-description">
          가볍고 재미있는 타입일까,<br>
          조용하고 진지한 타입일까?
        </p>

        <div class="farm-scene">
          농작물들이 무럭무럭 자라는 중 🌱
        </div>

        <button type="button" class="start-button" onclick="startTest()">
          내 농작물 확인하러 가기
        </button>
        <p class="start-guide">총 12질문 · 가장 쉬운 말로 만들었어요</p>
      </div>
    </section>

    <section id="questionScreen" class="screen">
      <div class="progress-panel">
        <div class="progress-top">
          <span class="progress-label">질문에 답하는 중</span>
          <span id="progressCount" class="progress-count">1 / 12</span>
        </div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
      </div>

      <div class="question-card">
        <div id="questionNumber" class="question-number">문항 01</div>
        <h2 id="questionText" class="question-text"></h2>
        <div id="answerList" class="answer-list"></div>
      </div>
    </section>

    <section id="loadingScreen" class="screen">
      <div class="loading-card">
        <div class="loading-farm">🌱</div>
        <h2 class="loading-title">나와 닮은 농작물을<br>찾고 있어요</h2>
        <p class="loading-description">잠시만 기다려 주세요...</p>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <div id="resultCapture" class="result-capture">
        <div class="result-header-text">테스트잇 농작물 친구들 성격 테스트</div>
        
        <div class="result-inner">
          <div class="result-top-section">
            <div class="result-img-box" id="resultCropIcon"></div>
            <div class="result-desc-box">
              <div class="desc-row">
                <div class="desc-label">결과 :</div>
                <div class="desc-value" id="resultName"></div>
              </div>
              <div class="desc-row">
                <div class="desc-label">특징 :</div>
                <div class="desc-value" id="resultSubtitle"></div>
              </div>
            </div>
          </div>
          
          <div id="traitList" class="result-grid-4x4"></div>

          <div class="result-bottom-section">
            <div class="match-box">
              <div class="match-title">잘 맞는 농작물</div>
              <div class="match-content" id="goodMatch"></div>
            </div>
            <div class="match-box">
              <div class="match-title">안 맞는 농작물</div>
              <div class="match-content" id="differentMatch"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="result-buttons">
        <button type="button" class="result-button primary" onclick="openSaveModal()">결과 이미지 저장하기</button>
        <button type="button" class="result-button" onclick="restartTest()">다시 해보기</button>
      </div>
    </section>
  </main>

  <div id="saveModal" class="save-modal" onclick="handleModalBackground(event)">
    <div class="save-modal-panel">
      <h2 style="margin:0 0 15px; font-size:18px; text-align:center; color:#4a7532;">결과 이미지 저장</h2>
      <div id="saveImageArea" class="save-image-area">이미지를 만드는 중입니다...</div>
      <button type="button" class="result-button" style="margin-top:15px;" onclick="closeSaveModal()">닫기</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        question: "쉬는 날 나는 보통?",
        answers: [
          { text: "사람들을 만나서 신나게 논다", score: "E" },
          { text: "집에서 혼자 조용히 쉰다", score: "I" }
        ]
      },
      {
        question: "길을 가다 예쁜 꽃을 보면?",
        answers: [
          { text: "와 예쁘다! 무슨 꽃이지? 관찰한다", score: "S" },
          { text: "이 꽃을 보니까 옛날 생각이 난다", score: "N" }
        ]
      },
      {
        question: "친구가 '나 우울해서 화분 샀어'라고 하면?",
        answers: [
          { text: "어떤 화분 샀어? 예쁜 거 샀어?", score: "T" },
          { text: "왜 우울해? 무슨 일 있었어?", score: "F" }
        ]
      },
      {
        question: "무언가 새로운 일을 시작할 때 나는?",
        answers: [
          { text: "진지하게 하나씩 알아보고 차분하게 시작한다", score: "J" },
          { text: "일단 가벼운 마음으로 부딪혀보고 재미를 찾는다", score: "P" }
        ]
      },
      {
        question: "모임에 나갔을 때 나는?",
        answers: [
          { text: "먼저 다가가서 친근하게 말을 건다", score: "E" },
          { text: "누가 말을 걸어줄 때까지 조용히 기다린다", score: "I" }
        ]
      },
      {
        question: "멍 때릴 때 내 머릿속은?",
        answers: [
          { text: "진짜 아무 생각도 안 하고 가만히 있는다", score: "S" },
          { text: "이런저런 말도 안 되는 상상들이 이어진다", score: "N" }
        ]
      },
      {
        question: "친구가 고민을 이야기할 때 나는?",
        answers: [
          { text: "어떻게 해결하면 좋을지 방법을 같이 찾는다", score: "T" },
          { text: "많이 힘들었겠다며 마음을 먼저 위로해준다", score: "F" }
        ]
      },
      {
        question: "재미있는 영상을 발견했을 때 나는?",
        answers: [
          { text: "하던 일을 끝내고 나중에 차분하게 본다", score: "J" },
          { text: "새로운 재미를 참지 못하고 바로 본다", score: "P" }
        ]
      },
      {
        question: "기분이 우울할 때 푸는 방법은?",
        answers: [
          { text: "친구들과 밖에서 수다 떨며 털어낸다", score: "E" },
          { text: "혼자 맛있는 거 먹으며 푹 잔다", score: "I" }
        ]
      },
      {
        question: "요리할 때 나는 주로?",
        answers: [
          { text: "레시피에 적힌 방법 그대로 따라 한다", score: "S" },
          { text: "내 입맛대로 이것저것 새로운 걸 넣어본다", score: "N" }
        ]
      },
      {
        question: "게임을 하다 졌을 때 내 반응은?",

    let currentQuestion = 0;
    const scores = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function showScreen(screen) {
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      screen.classList.add('active');
      window.scrollTo(0, 0);
    }

    function startTest() {
      currentQuestion = 0;
      Object.keys(scores).forEach(k => scores[k] = 0);
      showScreen(document.getElementById('questionScreen'));
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('questionNumber').textContent = `문항 ${String(currentQuestion + 1).padStart(2, '0')}`;
      document.getElementById('questionText').textContent = q.question;
      document.getElementById('progressCount').textContent = `${currentQuestion + 1} / 12`;
      document.getElementById('progressFill').style.width = `${((currentQuestion + 1) / 12) * 100}%`;

      const list = document.getElementById('answerList');
      list.innerHTML = "";
      q.answers.forEach(a => {
        const btn = document.createElement("button");
        btn.className = "answer-button";
        btn.textContent = a.text;
        btn.onclick = () => {
          scores[a.score]++;
          currentQuestion++;
          if(currentQuestion < 12) renderQuestion();
          else calculateResult();
        };
        list.appendChild(btn);
      });
    }

    function calculateResult() {
      showScreen(document.getElementById('loadingScreen'));
      const type = (scores.E > scores.I ? "E" : "I") + 
                   (scores.S > scores.N ? "S" : "N") + 
                   (scores.T > scores.F ? "T" : "F") + 
                   (scores.J > scores.P ? "J" : "P");

      setTimeout(() => {
        const res = results[type];
        
        document.getElementById('resultCropIcon').innerHTML = `<img src="${res.img}" alt="${res.name}">`;
        document.getElementById('resultName').textContent = res.name;
        document.getElementById('resultSubtitle').innerHTML = res.subtitle;
        
        const traits = document.getElementById('traitList');
        traits.innerHTML = "";
        res.traits.forEach(t => {
          const div = document.createElement("div");
          div.className = "trait-item";
          div.textContent = t;
          traits.appendChild(div);
        });

        const goodMatch = results[res.good];
        const diffMatch = results[res.different];

        document.getElementById('goodMatch').innerHTML = `
          <div class="match-img-box"><img src="${goodMatch.img}" alt="${goodMatch.name}"></div>
          <div class="match-name">${goodMatch.name}</div>
        `;
        
        document.getElementById('differentMatch').innerHTML = `
          <div class="match-img-box"><img src="${diffMatch.img}" alt="${diffMatch.name}"></div>
          <div class="match-name">${diffMatch.name}</div>
        `;

        showScreen(document.getElementById('resultScreen'));
      }, 2000);
    }

    function restartTest() { startTest(); }

    async function openSaveModal() {
      const modal = document.getElementById('saveModal');
      const area = document.getElementById('saveImageArea');
      modal.classList.add('active');
      area.innerHTML = "이미지를 캡처하고 있습니다...";
      try {
        const canvas = await html2canvas(document.getElementById('resultCapture'), { scale: 2 });
        const img = new Image();
        img.src = canvas.toDataURL("image/png");
        area.innerHTML = "";
        area.appendChild(img);
      } catch(e) {
        area.innerHTML = "오류가 발생했습니다.";
      }
    }

    function closeSaveModal() {
      document.getElementById('saveModal').classList.remove('active');
    }

    function handleModalBackground(e) {
      if(e.target.id === 'saveModal') closeSaveModal();
    }
  </script>
