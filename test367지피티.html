  <style>
    :root{
      --bg: #e9edf3;
      --win: #ffffff;
      --line: #cfd6e2;
      --text: #0f172a;
      --muted: #64748b;
      --blue: #2563eb;
      --blue2: #1d4ed8;
      --folder: #f7f8fb;
      --shadow: 0 10px 28px rgba(15,23,42,0.10);

    *{ box-sizing: border-box; }
    body{

    .app{

      margin: 18px auto 48px;
      padding: 0 14px;
    }

    .winbar{
      background: linear-gradient(#fbfcff, #f1f5ff);
      border: 1px solid var(--line);
      border-radius: var(--radius) var(--radius) 0 0;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      gap: 10px;
    }

    .win-left{
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 160px;
    }

    .traffic{ display:flex; gap:6px; align-items:center; }
    .dot{ width:12px; height:12px; border-radius:50%; border:1px solid rgba(0,0,0,0.12); }
    .dot.red{ background:#ff5f57; }
    .dot.yellow{ background:#febc2e; }

    .win-title{

      font-size: 13px;
      color: #111827;
      letter-spacing: -0.2px;
      white-space: nowrap;
    }

    .win-right{
      display: flex;
      align-items: center;
      gap: 8px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      flex: 1;
      min-width: 0;
      justify-content: flex-end;
    }
    .win-right::-webkit-scrollbar{ height: 6px; }
    .win-right::-webkit-scrollbar-thumb{ background: rgba(15,23,42,0.18); border-radius: 999px; }

    .nav-pill{
      flex: 0 0 auto;
      height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: #ffffff;
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 800;
      font-size: 12px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      box-shadow: 0 2px 10px rgba(15,23,42,0.06);
      white-space: nowrap;
    }
    .nav-pill:hover{
      background: #f8fafc;
      color: var(--text);
      text-decoration: none;
    }

    .addr{
      background: var(--win);

      border-top: 0;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 12px 26px rgba(15,23,42,0.06);
    }
    .addr-btn{
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: #fff;
      font-weight: 900;
      color: #334155;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      flex: 0 0 auto;
    }
    .addr-bar{

      border-top: 0;
      border-radius: 0 0 var(--radius) var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;

    .content{
      padding: 16px 16px 22px;
      background: #ffffff;
      min-height: 640px;

    .folder-top{

      align-items:center;

      gap:10px;
      padding:10px 12px;
      border:1px solid var(--line);

      position:absolute;

      left:2px;
      width:10px;
      height:6px;
      border-radius:3px 3px 0 0;
      background:#ffd978;
      border:1px solid rgba(0,0,0,0.06);
      border-bottom:0;
    }
    .folder-meta{ color:var(--muted); font-size:12px; font-weight:800; white-space:nowrap; }

    .panel{
      border:1px solid var(--line);
      border-radius:14px;
      background:#ffffff;
      box-shadow:var(--shadow2);
      overflow:hidden;
    }
    .panel-body{ padding:14px; }

    article{ display:block; }
    .start{ display:block; }
    .name{ display:none; }
    .question{ display:none; }
    .result{ display:none; }

    .main-img{
      width:100%;
      display:block;
      border-radius:12px;
      border:1px solid var(--line);
      background:#f8fafc;
    }

    .start-btn-wrap{
      margin-top:12px;
      display:flex;
      justify-content:center;
    }

    .win-btn{

      max-width:420px;
      min-height:52px;
      border-radius:12px;
      border:1px solid var(--line);
      background:#ffffff;
      color:var(--text);
      font-weight:1000;
      font-size:14px;
      letter-spacing:-0.2px;
      box-shadow:0 6px 16px rgba(15,23,42,0.12);

      padding:12px 14px;
      white-space:normal;

      color:#fff;
    }

    button:focus,
    button:active,
    .win-btn:focus,
    .win-btn:active{
      outline: none !important;
      box-shadow: none !important;
    }

    .btn-row{
      display:grid;
      gap:10px;
      justify-items:center;
      margin-top:10px;
    }

    .progress{
      height:10px;
      border-radius:999px;
      background:#eef2f7;
      overflow:hidden;
      margin:4px 0 14px;
    }
    .progress-bar{
      background:var(--blue);
      border-radius:999px;
      transition: width .35s ease;
    }

    .q-title{
      margin:0 0 12px;
      font-size:17px;
      font-weight:1100;
      letter-spacing:-0.4px;
      line-height:1.55;
      text-align:center;
    }

    /* 질문 버튼 색깔 수정 */
    .question .win-btn{
      background: linear-gradient(#f3f6ff, #e9efff);
      border-color: rgba(99,102,241,0.35);
      box-shadow: 0 10px 22px rgba(15,23,42,0.10);
      color: #0f172a;
    }
    .question .win-btn:hover{
      background: linear-gradient(#eef2ff, #e0e7ff);
      border-color: rgba(99,102,241,0.45);
    }
    .question .win-btn:active{
      transform: translateY(0px);
      background: linear-gradient(#e5e7eb, #e0e7ff);
    }

    .name-wrap{
      max-width:520px;
      margin:0 auto;
      padding:4px 0 2px;
      text-align:center;
    }
    .name-title{
      margin: 8px 0 6px;
      font-size: 16px;
      font-weight: 1100;
      letter-spacing: -0.3px;
    }
    .name-desc{
      margin: 0 0 12px;
      font-size: 12px;
      font-weight: 900;
      color: var(--muted);
      line-height: 1.5;
    }
    .name-input{
      width: 100%;
      height: 50px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: #f8fafc;
      padding: 0 14px;
      font-size: 14px;
      font-weight: 1000;
      outline: none;
    }
    .name-input:focus{
      background: #ffffff;
      border-color: rgba(37,99,235,0.45);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.12);
    }

    .report{
      width:100%;
      max-width:900px;
      margin:0 auto;
      text-align:left;
    }

    .result .panel-body{ padding: 14px; }

    .capture{
      --theme: #2563eb;
      --themeSoft: rgba(37,99,235,0.10);
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #ffffff;
      box-shadow: 0 10px 22px rgba(15,23,42,0.08);
      position: relative;
      overflow: hidden;
    }
    .capture:before{
      content:"";
      position:absolute;
      left:0;
      right:0;
      top:0;
      height: 8px;
      background: linear-gradient(90deg, var(--theme), rgba(255,255,255,0));
      opacity: 0.95;
    }
    .capture:after{
      content:"";
      position:absolute;
      width: 240px;
      height: 240px;
      border-radius: 999px;
      right: -120px;
      top: -120px;
      background: radial-gradient(circle at 30% 30%, var(--themeSoft), transparent 62%);
      pointer-events:none;
    }

    .report-head{
      text-align: center;
      padding: 14px 8px 14px;
      position: relative;
      z-index: 1;
    }
    .report-title{
      margin:0;
      font-size:18px;
      font-weight:1200;
      letter-spacing:-0.4px;
    }
    .report-emp{
      margin: 10px 0 0;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(203,213,225,0.95);
      background: #ffffff;
      font-weight: 1100;
      box-shadow: 0 8px 16px rgba(15,23,42,0.10);
      max-width: 100%;
    }
    .report-emp #role-badge{
      max-width: 260px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      display: inline-block;
      vertical-align: bottom;
    }
    .report-emp .badge-dot{
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: var(--theme);
      flex: 0 0 auto;
    }

    .divider{
      height: 1px;
      background: #e5eaf2;
      margin: 10px 0 14px;
      position: relative;
      z-index: 1;
    }

    .card{
      border: 1px solid rgba(203,213,225,0.85);
      border-radius: 14px;
      background: linear-gradient(180deg, var(--themeSoft), rgba(255,255,255,0.95));
      box-shadow: 0 10px 22px rgba(15,23,42,0.06);
      padding: 14px 12px;
      position: relative;
      z-index: 1;
    }

    .card h3{
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 1200;
      letter-spacing: -0.3px;
      text-align:center;
      color:#0f172a;
    }

    .list{
      margin: 0;
      padding: 0;
      list-style: none;
      text-align: center;
      color: #0f172a;
      font-weight: 1000;
      line-height: 1.8;
      font-size: 13px;
    }
    .list li{
      margin: 8px 0;
      display:flex;
      align-items:flex-start;
      justify-content:center;
      gap:8px;
    }
    .list li:before{
      content: "•";
      flex: 0 0 auto;
      color: var(--theme);
      font-weight: 1300;
      margin-top: 1px;
    }

    .summary{
      margin-top:12px;
      padding:12px 12px;
      border: 1px dashed rgba(148,163,184,0.7);
      border-radius: 12px;
      background:#ffffff;
      font-size:13px;
      font-weight:1000;
      line-height:1.7;
      color:#0f172a;
      text-align:center;
    }

    .actions{
      margin-top:14px;
      display:grid;
      gap:10px;
      justify-items:center;
    }

    .ad-wrap{
      width: 320px;
      margin: 18px auto 0;
    }

    @media (max-width: 520px){
      .winbar{ padding: 8px 10px; gap: 8px; }
      .win-left{ min-width: 0; gap: 8px; }
      .win-title{ font-size: 12px; }
      .dot{ width:10px; height:10px; }
      .win-right{ gap: 6px; }
      .nav-pill{ height: 28px; padding: 0 8px; font-size: 11px; }
    }

    @media (max-width: 520px){
      .addr{ align-items: flex-start; gap: 8px; padding: 8px 10px; }
      .addr-btn{ width: 32px; height: 32px; }
      .addr-bar{
        height: auto;
        min-height: 32px;
        padding: 6px 10px;
        font-size: 12px;
        white-space: normal;
        overflow: visible;
        text-overflow: clip;
        line-height: 1.35;
      }
      .crumb, .sep{ white-space: normal; }
    }

    body.is-capturing .capture:after{ opacity: 0 !important; }
    body.is-capturing .card{
      background: #ffffff !important;
      box-shadow: none !important;
    }
  </style>
</head>

      "ENTJ": { summary:"우선순위를 빠르게 잡고 결정하며, 결과를 만들기 위해 팀을 끌고 가는 타입이다.", traits:["결정이 빠르고 기준이 선명하다","성과 기준을 확실히 잡는다","비효율을 못 참는 편이다","리더 역할이 자연스럽다","직설적으로 들릴 수 있다","자원 배분을 빠르게 한다","팀 속도를 끌어올린다","느린 결정 과정이 답답하다","설명이 없으면 반발이 생길 수 있다","이유를 한 줄 붙이면 협업이 좋아진다","목표 달성에 집중이 강하다","결과를 내는 쪽으로 행동이 빠르다"] }
    };

    function normalizeName(raw){
      var s = (raw || "").trim();
      s = s.replace(/\s+/g, "");
      s = s.replace(/[0-9]/g, "");
      s = s.replace(/[~`!@#$%^&*()_\-+={}[\]|\\:;"<>,.?/]/g, "");
      return s;
    }

    function goName(){
      $(".start").hide();
      $(".name").show();
      setTimeout(function(){
        var input = document.getElementById("userName");
        if (input) input.focus();
      }, 60);
    }

    function backToStart(){
      $(".name").hide();
      $(".start").show();
    }

    function start(){
      var input = document.getElementById("userName");
      var nm = normalizeName(input ? input.value : "");
      if (!nm){
        alert("이름을 입력해주세요.");
        return;
      }
      window.__userName = nm;

      $(".name").hide();
      $(".question").show();
      next();
    }

    function blurActive(){
      try{
        if (document.activeElement && document.activeElement.blur){
          document.activeElement.blur();
        }
      }catch(e){}
    }

    $("#A").on("click", function(){
      blurActive();
      var type = $("#type").val();
      var preValue = $("#"+type).val();
      $("#"+type).val(parseInt(preValue,10) + 1);
      next();
    });

    $("#B").on("click", function(){
      blurActive();
      next();
    });

    $("#A, #B").on("mousedown touchstart", function(){
      blurActive();
    });

    function applyTheme(mbti){
      var t = theme[mbti] || { c:"#2563eb", s:"rgba(37,99,235,0.12)" };
      var el = document.getElementById("capture-area");
      if (!el) return;
      el.style.setProperty("--theme", t.c);
      el.style.setProperty("--themeSoft", t.s);
    }

    function renderReport(mbti){
      var data = result[mbti];
      var nm = window.__userName || "ㅇㅇㅇ";
      var badge = document.getElementById("role-badge");
      if (badge) badge.textContent = nm + "사원";

      applyTheme(mbti);

      var listHtml = "";
      for (var i = 0; i < data.traits.length; i++){
        listHtml += "<li>" + data.traits[i] + "</li>";
      }
      $("#trait-list").html(listHtml);

      $("#report-summary").text(data.summary);
    }

    function next(){
      if (num === 13){
        $(".question").hide();
        $(".result").show();

        var mbti = "";
        ($("#EI").val() < 2) ? mbti += "I" : mbti += "E";
        ($("#SN").val() < 2) ? mbti += "N" : mbti += "S";
        ($("#TF").val() < 2) ? mbti += "T" : mbti += "F";
        ($("#JP").val() < 2) ? mbti += "J" : mbti += "P";

        renderReport(mbti);
        return;
      }

      $(".progress-bar").attr("style","width: calc(100/12*" + num + "%)");
      $("#title").html(q[num]["title"]);
      $("#type").val(q[num]["type"]);
      $("#A").html(q[num]["A"]);
      $("#B").html(q[num]["B"]);
      num++;
    }

    function saveResultImage(){
      var target = document.getElementById("capture-area");
      if (!target) return;

      var nm = (window.__userName && window.__userName.trim()) ? window.__userName.trim() : "ㅇㅇㅇ";

      var badge = document.getElementById("role-badge");
      if (badge) badge.textContent = nm + "사원";

      document.body.classList.add("is-capturing");

      var waitFonts = (document.fonts && document.fonts.ready) ? document.fonts.ready : Promise.resolve();

      waitFonts.then(function(){
        requestAnimationFrame(function(){
          requestAnimationFrame(function(){
            html2canvas(target, {
              backgroundColor: "#ffffff",
              scale: 2,
              useCORS: true,
              onclone: function(clonedDoc){
                var b = clonedDoc.querySelector("#capture-area #role-badge");
                if (b) b.textContent = nm + "사원";
              }
            }).then(function(canvas){
              document.body.classList.remove("is-capturing");

              var link = document.createElement("a");
              link.href = canvas.toDataURL("image/png");
              link.download = nm + "_사회생활_성격보고서.png";
              document.body.appendChild(link);
              link.click();
              document.body.removeChild(link);
            }).catch(function(){
              document.body.classList.remove("is-capturing");
              alert("이미지 저장에 실패했습니다. 브라우저 권한 또는 보안 설정을 확인해주세요.");
            });
          });
        });
      });
    }

    document.addEventListener("DOMContentLoaded", function () {
      var shareButton = document.getElementById("share-btn");
      if (shareButton) {
        shareButton.addEventListener("click", function () {
          var testURL = "https://test-it.co.kr/test367";
          var shareText = "테스트잇 사회생활 성격 테스트";

          if (navigator.share) {
            navigator.share({
              title: "테스트잇 사회생활 성격 테스트",
              text: shareText,
              url: testURL
            }).catch(function(){});
          } else if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(shareText + " " + testURL).then(function () {
              alert("링크가 복사되었습니다.");
            }).catch(function(){});
          } else {
            alert("공유 기능을 지원하지 않는 브라우저입니다.");
          }
        });
      }

      var input = document.getElementById("userName");
      if (input){
        input.addEventListener("keydown", function(e){
          if (e.key === "Enter"){
            start();
          }
        });
      }
    });
  </script>
