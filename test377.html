<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>레트로 폰꾸 성격 테스트</title>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    @import url("https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css");

    :root{
      --phone:#ffb1cd;
      --phone-border:#f47aa6;
      --screen-top:#fffcf2;
      --screen-bottom:#fff5f9;
      --text:#5d4d57;
      --sub:#8d7580;
      --pink:#f7c7da;
      --yellow:#fff1b8;
      --blue:#dcefff;
      --mint:#e4f6d8;
      --lav:#eceefe;
      --peach:#ffe7da;
      --line:#363033;
      --shadow:#ffd7e5;
      --accent:#f16f9d;
      --accent-dark:#d85b89;
      
      /* 헤더용 컬러 변수 */
      --win-bg: #fff0f6;
      --win-border-light: #ffffff;
      --win-border-dark: #efb3c8;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      min-height:100vh;
      padding:0 0 40px 0;
      display:flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      font-family:"NeoDunggeunmo", sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 18% 18%, rgba(255,255,255,0.8) 0 34px, transparent 35px),
        radial-gradient(circle at 82% 20%, rgba(255,228,240,0.8) 0 44px, transparent 45px),
        radial-gradient(circle at 18% 82%, rgba(255,242,190,0.45) 0 48px, transparent 49px),
        radial-gradient(circle at 86% 80%, rgba(221,243,255,0.45) 0 50px, transparent 51px),
        linear-gradient(180deg,#fff4f8 0%,#fff9fb 100%);
    }

    /* --- 헤더 --- */
    .header-wrapper {
      width: 100%;
      background-color: var(--win-bg); 
      border-bottom: 2px outset var(--win-border-light); 
      box-shadow: 0 1px 0 var(--win-border-light); 
      align-self: flex-start;
      margin-bottom: 20px; 
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1100px;
      margin: 0 auto;
      padding: 6px 4% !important; 
    }

    .retro-logo {
      text-decoration: none;
      color: var(--text);
      font-size: 18px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 5px;
      background-color: var(--win-bg); 
      padding: 5px 10px; 
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-dark);
      border-bottom: 2px solid var(--win-border-dark);
    }

    .retro-logo:active { 
      border-top: 2px solid var(--win-border-dark);
      border-left: 2px solid var(--win-border-dark);
      border-right: 2px solid var(--win-border-light);
      border-bottom: 2px solid var(--win-border-light);
      padding: 6px 9px 4px 11px; 
    }

    .page-header h1 {
      margin: 0 !important;
      padding: 0 !important;
      border-bottom: none !important;
    }

    .main-nav {
      display: flex;
      flex-wrap: nowrap !important;
      align-items: center;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 14px; 
    }

    .main-nav li {
      margin-left: 0;
    }

    .main-nav a {
      display: block;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      background: var(--win-bg);
      border-top: 2px solid var(--win-border-light);
      border-left: 2px solid var(--win-border-light);
      border-right: 2px solid var(--win-border-dark);
      border-bottom: 2px solid var(--win-border-dark);
      padding: 6px 12px;
      font-size: 15px; 
      white-space: nowrap;
      box-sizing: border-box;
    }

    .main-nav a:active {
      border-top: 2px solid var(--win-border-dark);
      border-left: 2px solid var(--win-border-dark);
      border-right: 2px solid var(--win-border-light);
      border-bottom: 2px solid var(--win-border-light);
      padding: 7px 11px 5px 13px; 
    }

    @media (max-width: 480px) {
      .page-header {
        padding: 6px 12px !important;
      }
      .retro-logo {
        font-size: 16px; 
        padding: 3px 8px; 
      }
      .main-nav {
        gap: 8px; 
      }
      .main-nav a {
        padding: 5px 8px; 
        font-size: 14px; 
        letter-spacing: -0.5px; 
      }
    }

    .wrap{
      width:100%;
      max-width:390px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
      padding: 0 12px;
    }

    .phone{
      width:100%;
      background: var(--phone);
      border: 6px solid var(--phone-border);
      border-radius: 46px;
      box-shadow: 6px 6px 0 var(--shadow), inset 0 0 16px rgba(255,255,255,0.6);
      padding: 24px 14px 24px 14px; /* 하단 패딩 줄여서 홈버튼 공간 없앰 */
      position:relative;
      overflow:hidden;
    }

    .phone::before{
      content:"";
      position:absolute;
      inset: 6px;
      border: 2px solid #ff91b8;
      border-radius: 38px;
      pointer-events:none;
    }

    .speaker{
      width: 90px;
      height: 16px;
      border-radius: 999px;
      margin: 0 auto 16px;
      background: #f17b9b;
      border: 2px solid #e16688;
      position:relative;
    }

    .speaker::after{
      content:"";
      width: 40px;
      height: 6px;
      border-radius:999px;
      background:rgba(255,255,255,0.7);
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
    }

    .screen{
      min-height:350px; 
      border-radius: 20px;
      border: 4px solid #f19ebd;
      background:
        radial-gradient(circle at 18% 16%, rgba(255,255,255,0.65) 0 2px, transparent 3px),
        radial-gradient(circle at 82% 18%, rgba(255,255,255,0.65) 0 2px, transparent 3px),
        radial-gradient(circle at 24% 74%, rgba(255,255,255,0.65) 0 2px, transparent 3px),
        linear-gradient(180deg,var(--screen-top) 0%,var(--screen-bottom) 100%);
      padding:12px;
      position:relative;
      overflow:hidden;
      display:none;
      flex-direction:column;
    }

    .screen.active{
      display:flex;
    }

    .status{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:11px;
      color:#ae718a;
      margin-bottom:8px;
      padding:0 3px;
      position:relative;
      z-index:2;
    }

    .float-deco{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:1;
    }

    .float-deco span{
      position:absolute;
      color:rgba(255,255,255,0.95);
      animation:twinkle 2.4s infinite ease-in-out;
    }

    .float-deco span:nth-child(1){top:42px;left:18px;font-size:17px;}
    .float-deco span:nth-child(2){top:72px;right:22px;font-size:14px;animation-delay:.3s;}
    .float-deco span:nth-child(3){top:150px;left:72px;font-size:14px;animation-delay:.8s;}
    .float-deco span:nth-child(4){bottom:140px;right:24px;font-size:18px;animation-delay:1s;}
    .float-deco span:nth-child(5){bottom:92px;left:22px;font-size:15px;animation-delay:.5s;}

    @keyframes twinkle{
      0%,100%{opacity:.45;transform:scale(.93);}
      50%{opacity:1;transform:scale(1.07);}
    }

    .start-inner{
      position:relative;
      z-index:2;
      flex:1;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:0 0 20px;
    }

    .main-img {
      width: 100%;
      max-width: 100%;
      margin-bottom: 20px;
      border-radius: 12px;
      object-fit: cover;
      display: block;
    }

    .primary-btn{
      border:none;
      border-radius:999px;
      padding:16px 26px;
      background:linear-gradient(180deg,#ff97be 0%,var(--accent) 100%);
      color:#fff;
      font-family:inherit;
      font-size:16px;
      cursor:pointer;
      box-shadow:0 5px 0 var(--accent-dark);
      width: 80%;
    }

    .primary-btn:active{
      transform:translateY(4px);
      box-shadow:0 1px 0 var(--accent-dark);
    }

    .question-inner{
      flex:1;
      position:relative;
      z-index:2;
      padding:6px 2px 20px;
    }

    .question-card{
      background:rgba(255,255,255,0.9);
      border:2px solid #efb9ce;
      border-radius:24px;
      box-shadow:4px 4px 0 #ffe2ec;
      padding:16px 14px;
    }

    .question-head{
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:12px;
      color:#b57492;
      margin-bottom:12px;
    }

    .progress-wrap{
      width:100%;
      height:16px;
      border-radius:999px;
      background:#fff0f6;
      border:2px solid #efb9ce;
      overflow:hidden;
      margin-bottom:18px;
    }

    .progress-bar{
      height:100%;
      width:0%;
      border-radius:999px;
      background:linear-gradient(90deg,#ff99c2 0%,#fff19f 50%,#bde6ff 100%);
      transition:width .3s ease;
    }

    .question-text{
      font-size:19px;
      line-height:1.6;
      min-height:86px;
      text-align:center;
      color:#875f6e;
      margin-bottom:18px;
      word-break:keep-all;
    }

    .answer-list{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .answer-btn{
      background:linear-gradient(180deg,#fffefe 0%,#fff2f8 100%);
      border:2px solid #efb9ce;
      border-radius:18px;
      padding:15px 12px;
      font-family:inherit;
      font-size:14px;
      color:#7a616c;
      line-height:1.55;
      cursor:pointer;
      box-shadow:0 4px 0 #ffe1ec;
      text-align:center;
      word-break:keep-all;
    }

    .answer-btn:active{
      transform:translateY(3px);
      box-shadow:0 1px 0 #ffe1ec;
    }

    .result-inner{
      flex:1;
      position:relative;
      z-index:2;
      padding:2px 0 10px;
    }

    .story-board{
      background:linear-gradient(180deg,#f7fbff 0%,#fffef5 42%,#fff7fb 100%);
      border:2px solid #efbdd1;
      border-radius:24px;
      padding:10px;
      min-height:585px;
      position:relative;
      overflow:hidden;
    }

    .story-grid{
      display:flex;
      flex-direction:column;
      gap:10px;
      position:relative;
      z-index:2;
    }

    .card{
      border:3px solid var(--line);
      border-radius:18px;
      background:#fff;
      padding:10px;
      position:relative;
    }

    .soft-blue{ background:var(--blue); }
    .soft-pink{ background:var(--pink); }
    .soft-yellow{ background:var(--yellow); }
    .soft-mint{ background:var(--mint); }
    .soft-lav{ background:var(--lav); }
    .soft-peach{ background:var(--peach); }

    .top-card{
      text-align:center;
      padding: 10px 12px; /* 상단 부분 패딩 줄임 */
    }

    .top-mini{
      font-size:12px;
      color:#534a4f;
      margin-bottom:6px;
    }

    .top-emoji{
      font-size:32px; /* 이모지 폰트 사이즈 줄임 */
      line-height:1;
      margin-bottom:6px;
    }

    .top-app{
      font-size:24px; /* 어플 이름 폰트 사이즈 줄임 */
      line-height:1.2;
      color:#51474c;
      margin-bottom:6px;
      word-break:keep-all;
    }

    .top-desc{
      font-size:13px; /* 설명 폰트 사이즈 줄임 */
      line-height:1.5;
      color:#665a61;
      word-break:keep-all;
    }

    .two-col{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .feature-title{
      font-size:13px;
      color:#4f474b;
      margin-bottom:8px;
    }

    .feature-list{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    .feature-item{
      display:flex;
      align-items:flex-start;
      gap:7px;
      font-size:12px;
      line-height:1.45;
      color:#51484c;
      word-break:keep-all;
    }

    .feature-dot{
      width:14px;
      height:14px;
      border:2px solid var(--line);
      border-radius:4px;
      background:#fff;
      flex:0 0 auto;
      margin-top:1px;
    }

    .banner{
      text-align:center;
      font-size:20px;
      line-height:1.4;
      padding:12px 10px;
    }

    .banner small{
      display:block;
      font-size:12px;
      margin-top:6px;
      color:#6f6268;
      line-height:1.5;
      word-break:keep-all;
    }

    .info-card{
      min-height:96px;
      display:flex;
      flex-direction:column;
      gap:8px;
      justify-content:flex-start;
    }

    .info-title{
      font-size:11px;
      color:#fff;
      background-color: var(--accent); /* 회색에서 눈에 띄는 핑크색으로 변경 */
      padding: 4px 8px;
      border-radius: 8px;
      display: inline-block;
      align-self: flex-start;
      margin-bottom: 2px;
      font-weight: 800;
    }

    .info-name{
      font-size:15px;
      line-height:1.45;
      color:#4e454a;
      word-break:keep-all;
      font-weight: 800;
    }

    .info-desc{
      font-size:13px;
      line-height:1.5;
      color:#554a50;
      word-break:keep-all;
      padding: 0 2px;
    }

    .corner-sticker{
      position:absolute;
      font-size:19px;
      opacity:.95;
    }

    .st1{ top:8px; left:10px; }
    .st2{ top:20px; right:12px; }
    .st3{ bottom:90px; left:14px; }
    .st4{ bottom:56px; right:12px; }

    .actions{
      display:none;
      width:100%;
      flex-direction:column;
      gap:10px;
    }

    .action-btn{
      width:100%;
      border:2px solid #efb7cc;
      border-radius:18px;
      padding:15px;
      background:#fff;
      color:#bf6f8e;
      font-family:inherit;
      font-size:14px;
      cursor:pointer;
      box-shadow:0 4px 0 #efb7cc;
    }

    .action-btn.primary{
      background:linear-gradient(180deg,#ff92bb 0%,#f06d9c 100%);
      color:#fff;
      border-color:#f06d9c;
      box-shadow:0 4px 0 #d75d88;
    }

    .action-btn:active{
      transform:translateY(4px);
      box-shadow:none;
    }

    .modal{
      display:none;
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.62);
      backdrop-filter:blur(3px);
      z-index:9999;
      align-items:center;
      justify-content:center;
      padding:18px;
    }

    .modal-box{
      width:100%;
      max-width:380px;
      background:#fff4f8;
      border:4px solid #efb8cd;
      border-radius:24px;
      padding:18px;
      text-align:center;
      box-shadow:6px 6px 0 #ffd9e6;
    }

    .modal-title{
      margin:0 0 12px;
      font-size:14px;
      color:#bf6f8f;
      line-height:1.6;
    }

    #captureImage{
      width:100%;
      max-height:64vh;
      object-fit:contain;
      border-radius:16px;
      border:2px solid #efbfd1;
      background:#fff;
    }

    .close-btn{
      margin-top:14px;
      border:2px solid #efb7cc;
      border-radius:16px;
      padding:12px 16px;
      background:#fff;
      color:#bf6f8e;
      font-family:inherit;
      font-size:14px;
      cursor:pointer;
    }

    .ad-container {
      width: 100%;
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }

    @media (max-width:380px){
      .two-col{
        grid-template-columns:1fr;
      }
      .top-app{
        font-size:24px;
      }
    }
  </style>
</head>
<body>
  <div class="modal" id="modal">
    <div class="modal-box">
      <p class="modal-title">이미지를 길게 눌러 저장하면 됨</p>
      <img id="captureImage" src="" alt="결과 이미지">
      <button class="close-btn" onclick="closeModal()">닫기</button>
    </div>
  </div>

  <div class="header-wrapper">
    <header class="page-header wrapper">
      <h1><a href="https://test-it.co.kr/" class="retro-logo">테스트잇</a></h1> 
      <nav>
        <ul class="main-nav">
          <li><a href="https://test-it.co.kr/test.html">성격</a></li>
          <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
          <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
          <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
        </ul>
      </nav>
    </header>
  </div>

  <div class="wrap">
    <div class="phone" id="phoneCase">
      <div class="speaker"></div>

      <section class="screen active" id="startScreen">
        <div class="float-deco">
          <span>✦</span>
          <span>♡</span>
          <span>♪</span>
          <span>✿</span>
          <span>♡</span>
        </div>

        <div class="start-inner">
          <img src="img_main377.png" alt="테스트 메인 이미지" class="main-img">
          <button class="primary-btn" onclick="startTest()">테스트 시작하기</button>
        </div>
      </section>

      <section class="screen" id="questionScreen">
        <div class="status">
          <span id="qCount">1 / 12</span>
          <span>TEST</span>
          <span>LTE 100%</span>
        </div>

        <div class="float-deco">
          <span>✦</span>
          <span>♡</span>
          <span>♪</span>
          <span>✿</span>
          <span>♡</span>
        </div>

        <div class="question-inner">
          <div class="question-card">
            <div class="question-head">
              <span id="qStep">QUESTION 1</span>
            </div>

            <div class="progress-wrap">
              <div class="progress-bar" id="progressBar"></div>
            </div>

            <div class="question-text" id="qText">질문 준비 중</div>
            <div class="answer-list" id="answerList"></div>
          </div>
        </div>
      </section>

      <section class="screen" id="resultScreen">
        <div class="status" style="justify-content: center;">
          <span style="font-size: 13px; color: #a76883; font-weight: bold;">테스트잇 레트로 폰꾸 성격 테스트</span>
        </div>

        <div class="result-inner">
          <div class="story-board">
            <div class="corner-sticker st1">✦</div>
            <div class="corner-sticker st2">♡</div>
            <div class="corner-sticker st3">✿</div>
            <div class="corner-sticker st4">♪</div>

            <div class="story-grid">
              <div class="card soft-blue top-card">
                <div class="top-mini">나랑 닮은 어플</div>
                <div class="top-emoji" id="resultIcon">📅</div>
                <div class="top-app" id="resultAppTop">캘린더</div>
                <div class="top-desc" id="resultOneLine">차분하게 계획 세우고<br>끝까지 해내는 타입</div>
              </div>

              <div class="two-col">
                <div class="card soft-peach">
                  <div class="feature-title">성격 특징</div>
                  <div class="feature-list" id="resultTraits"></div>
                </div>

                <div class="card soft-mint">
                  <div class="feature-title">이런 편</div>
                  <div class="feature-list" id="resultTodo"></div>
                </div>
              </div>

              <div class="card soft-pink banner">
                상태메시지
                <small id="resultLock">한마디</small>
              </div>

              <div class="two-col">
                <div class="card soft-yellow info-card">
                  <div class="info-title">배터리 충전 방식</div>
                  <div class="info-desc" id="resultEnergy">-</div>
                </div>

                <div class="card soft-blue info-card">
                  <div class="info-title">연애 위젯</div>
                  <div class="info-desc" id="resultLove">-</div>
                </div>
              </div>

              <div class="two-col">
                <div class="card soft-yellow info-card">
                  <div class="info-title">잘맞는 어플</div>
                  <div class="info-name" id="resultGoodMatchName">-</div>
                  <div class="info-desc" id="resultGoodMatchDesc">-</div>
                </div>

                <div class="card soft-lav info-card">
                  <div class="info-title">안맞는 어플</div>
                  <div class="info-name" id="resultBadMatchName">-</div>
                  <div class="info-desc" id="resultBadMatchDesc">-</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <div class="actions" id="bottomActions">
      <button class="action-btn primary" onclick="captureResult()">결과 이미지 저장하기</button>
      <button class="action-btn" onclick="restartTest()">다시 해보기</button>
      <button class="action-btn" onclick="goOtherTest()">다른 테스트 해보기</button>
      <button class="action-btn" onclick="shareTest()">테스트 공유하기</button>

      ENFJ: {

        traits: ["따뜻한 카리스마의 소유자", "타인의 잠재력을 끌어냄", "말 한마디로 천 냥 빚 갚음"],
        todo: ["도움이 필요한 사람을 그냥 못 지나침", "상처받아도 티 안 내려고 노력함", "의미 있는 인간관계를 원함"],
        energy: "서로에게 긍정적인 에너지를<br>주고받으며 시너지가 날 때 힘이 나요",
        love: "같이 미래를 그리며 서로에게<br>든든한 아군이 되는 연애",
        goodMatch: { name: "음악", desc: "긍정적인 말로 항상 저를 응원해 줘요" },

        todo: ["비전 없는 일에는 시간 안 씀", "감정적인 위로보단 해결책 제시", "스스로에게도 타인에게도 엄격함"],
        energy: "어려운 미션을 해결하고<br>성공적으로 목표를 이뤘을 때 짜릿해요",

        lock: "한계는 내가 정하는 것이다"
      }
    };

    let current = 0;
    let score = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

    function startTest() {
      current = 0;
      score = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

      document.getElementById("startScreen").classList.remove("active");
      document.getElementById("resultScreen").classList.remove("active");
      document.getElementById("questionScreen").classList.add("active");
      document.getElementById("bottomActions").style.display = "none";

      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestion() {
      const q = questions[current];
      document.getElementById("qCount").innerText = `${current + 1} / ${questions.length}`;
      document.getElementById("qStep").innerText = `QUESTION ${current + 1}`;
      document.getElementById("qText").innerText = q.q;
      document.getElementById("progressBar").style.width = `${((current + 1) / questions.length) * 100}%`;

      const answerList = document.getElementById("answerList");
      answerList.innerHTML = "";

      const answers = [
        { text: q.a1, type: q.type[0] },
        { text: q.a2, type: q.type[1] }
      ];

      answers.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.innerText = item.text;
        btn.onclick = () => chooseAnswer(item.type);
        answerList.appendChild(btn);
      });
    }

    function chooseAnswer(type) {
      score[type] += 1;
      current += 1;

      if (current < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function getMbti() {
      let mbti = "";
      mbti += score.E >= score.I ? "E" : "I";
      mbti += score.S >= score.N ? "S" : "N";
      mbti += score.T >= score.F ? "T" : "F";
      mbti += score.J >= score.P ? "J" : "P";
      return mbti;
    }

    function fillList(targetId, items) {
      const box = document.getElementById(targetId);
      box.innerHTML = "";
      items.forEach(text => {
        const item = document.createElement("div");
        item.className = "feature-item";
        item.innerHTML = `<span class="feature-dot"></span><span>${text}</span>`;
        box.appendChild(item);
      });
    }

    function showResult() {
      const mbti = getMbti();
      const data = results[mbti];

      document.getElementById("questionScreen").classList.remove("active");
      document.getElementById("resultScreen").classList.add("active");
      document.getElementById("bottomActions").style.display = "flex";

      document.getElementById("resultIcon").innerText = data.icon;
      document.getElementById("resultAppTop").innerText = data.appName;
      document.getElementById("resultOneLine").innerHTML = data.oneLine;
      document.getElementById("resultEnergy").innerHTML = data.energy;
      document.getElementById("resultLove").innerHTML = data.love;
      document.getElementById("resultGoodMatchName").innerText = data.goodMatch.name;
      document.getElementById("resultGoodMatchDesc").innerHTML = data.goodMatch.desc;
      document.getElementById("resultBadMatchName").innerText = data.badMatch.name;
      document.getElementById("resultBadMatchDesc").innerHTML = data.badMatch.desc;
      document.getElementById("resultLock").innerText = data.lock;

      fillList("resultTraits", data.traits);
      fillList("resultTodo", data.todo);

      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function restartTest() {
      document.getElementById("resultScreen").classList.remove("active");
      document.getElementById("questionScreen").classList.remove("active");
      document.getElementById("startScreen").classList.add("active");
      document.getElementById("bottomActions").style.display = "none";
      current = 0;
      score = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function captureResult() {
      const target = document.getElementById("phoneCase");

      html2canvas(target, {
        scale: 2,
        useCORS: true,
        backgroundColor: null
      }).then(canvas => {
        const imgUrl = canvas.toDataURL("image/png");
        document.getElementById("captureImage").src = imgUrl;
        document.getElementById("modal").style.display = "flex";
      });
    }

    function closeModal() {
      document.getElementById("modal").style.display = "none";
    }

    function goOtherTest() {
      alert("다른 테스트 링크 연결만 해주면 바로 사용 가능");
    }

    function shareTest() {
      const url = window.location.href;
      const shareData = {
        title: "레트로 폰꾸 성격 테스트",
        text: "내 성격을 진짜 어플 느낌으로 보여주는 테스트",
        url: url
      };

      if (navigator.share) {
        navigator.share(shareData).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => {
          alert("링크 복사 완료");
        });
      }
    }
  </script>
