  <style>

        radial-gradient(circle at 82% 8%, rgba(255,241,199,0.65) 0, rgba(255,241,199,0) 220px),

    a {
      color: inherit;

    }

    button,
    input,
    select {
      font-family: "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
      color: var(--black);
    }

    button {
      cursor: pointer;
      border-radius: 18px;
      transition: transform 0.08s ease, background-color 0.12s ease;
    }

    button:active {
      transform: translateY(2px);
    }

    .wrap {
      width: 100%;
      min-height: 100vh;
    }

    header {
      width: 100%;
      min-height: 58px;
      background: #fff0c9;
      border-bottom: 1px solid #e8d7aa;
      box-shadow: 0 4px 14px rgba(120, 96, 45, 0.08);
      display: flex;
      justify-content: center;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(8px);
      padding: 6px 0;
    }

    .header-inner {
      width: 100%;
      max-width: 560px;
      padding: 0 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }

    .logo {
      font-size: 18px;
      font-weight: 900;
      background: #fffaf0;
      border: 1px solid #ead8a9;
      box-shadow: 0 4px 10px rgba(120, 96, 45, 0.08);
      padding: 9px 12px 8px;
      line-height: 1;
      white-space: nowrap;
      flex-shrink: 0;
      border-radius: 16px;
    }

    .nav {
      display: flex;
      gap: 7px;
      white-space: nowrap;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      background: #fffaf0;
      border: 1px solid #ead8a9;
      box-shadow: 0 4px 10px rgba(120, 96, 45, 0.08);
      padding: 8px 9px 7px;
      line-height: 1;
      font-size: 14px;
      font-weight: 800;
      border-radius: 14px;
    }

    main {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      padding: 22px 14px 34px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
      animation: fadeIn 0.18s ease-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(3px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .main-image-box {
      width: 100%;

      margin: 0 auto;

    .input-card,

    .start-btn {

      display: block;

    .start-btn:hover,
    .submit-btn:hover,

    }

    .input-title {

      line-height: 1.3;
      word-break: keep-all;
      font-weight: 900;
      letter-spacing: 0.4px;
    }

    .input-grid {
      display: grid;
      gap: 12px;
    }

    .field-label {
      display: block;
      margin-bottom: 7px;
      font-size: 14px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.2px;
    }

    .field-input {
      width: 100%;
      height: 48px;
      border: 0;
      background: #ffffff;
      padding: 0 13px;
      font-size: 15px;
      font-weight: 700;
      outline: none;
      letter-spacing: 0.2px;
      border-radius: 16px;
      box-shadow: inset 0 0 0 2px #f1e7c8;
    }

    .select-row {
      display: grid;
      grid-template-columns: 1fr 0.78fr 0.78fr;
      gap: 8px;
    }

    .select-wrap {
      position: relative;
    }

    .select-wrap::after {
      content: "▾";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 12px;
      font-weight: 900;
    }

    .field-select {
      width: 100%;
      height: 48px;
      border: 0;
      background: #ffffff;
      padding: 0 30px 0 11px;
      font-size: 14px;
      font-weight: 700;
      outline: none;
      letter-spacing: 0.2px;
      border-radius: 16px;
      box-shadow: inset 0 0 0 2px #f1e7c8;
      appearance: none;
      -webkit-appearance: none;
    }

    .input-buttons {
      display: grid;
      gap: 8px;
      margin-top: 16px;
    }

    .submit-btn {
      background: #fff2a8;
    }

    .loading-card {
      max-width: 500px;
      margin: 0 auto;
      text-align: center;
      padding: 26px 14px 28px;
      overflow: hidden;
    }

    .loading-title {
      margin: 0 0 8px;
      font-size: 23px;
      line-height: 1.35;
      word-break: keep-all;
      font-weight: 900;
      letter-spacing: 0.4px;
    }

    .loading-sub {
      margin: 0 0 17px;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 700;
      color: #5b5b4d;
    }

    .tetris-stage {
      width: 222px;
      margin: 0 auto 15px;
      padding: 13px;
      border: 0;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(120, 96, 45, 0.13);
      border-radius: 20px;
    }

    .tetris-board {
      position: relative;
      width: 100%;
      aspect-ratio: 10 / 14;
      border-radius: 12px;
      background:
        linear-gradient(90deg, rgba(120,120,100,0.08) 1px, transparent 1px),
        linear-gradient(0deg, rgba(120,120,100,0.08) 1px, transparent 1px),
        #fbfff0;
      background-size: calc(100% / 10) calc(100% / 14);
      overflow: hidden;
      box-shadow: inset 0 0 0 2px #edf3c7;
    }

    .settled,
    .piece {
      position: absolute;
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-auto-rows: 1fr;
      gap: 2px;
      width: calc((100% / 10) * 2 - 2px);
      height: calc((100% / 14) * 2 - 2px);
    }

    .piece.i-piece {
      grid-template-columns: repeat(4, 1fr);
      width: calc((100% / 10) * 4 - 2px);
      height: calc((100% / 14) * 1 - 2px);
    }

    .piece.l-piece {
      width: calc((100% / 10) * 2 - 2px);
      height: calc((100% / 14) * 3 - 2px);
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: repeat(3, 1fr);
    }

    .cell {
      border: 0;
      border-radius: 5px;
      box-shadow:
        inset 0 -2px 0 rgba(0,0,0,0.08),
        inset 0 2px 0 rgba(255,255,255,0.55);
    }

    .pink { background: #ffbdd2; }
    .yellow { background: #ffe27f; }
    .blue { background: #b7dcff; }
    .green { background: #bfecc9; }
    .purple { background: #d8c4ff; }

    .s1 { left: 20%; bottom: 0; }
    .s2 { left: 40%; bottom: 0; }
    .s3 { left: 60%; bottom: 0; }
    .s4 { left: 20%; bottom: 14.285%; }
    .s5 { left: 60%; bottom: 14.285%; }

    .drop-a {
      left: 0%;
      top: -2%;
      animation: dropA 2.1s steps(7) infinite;
    }

    .drop-b {
      left: 48%;
      top: -2%;
      animation: dropB 2.1s steps(7) infinite 0.7s;
    }

    .drop-c {
      left: 20%;
      top: -2%;
      animation: dropC 2.1s steps(7) infinite 1.4s;
    }

    @keyframes dropA {
      0% { transform: translateY(0); opacity: 0; }
      8% { opacity: 1; }
      72% { transform: translateY(220px); opacity: 1; }
      86% { transform: translateY(220px); opacity: 1; }
      100% { transform: translateY(220px); opacity: 0; }
    }

    @keyframes dropB {
      0% { transform: translateY(0); opacity: 0; }
      8% { opacity: 1; }
      72% { transform: translateY(170px); opacity: 1; }
      86% { transform: translateY(170px); opacity: 1; }
      100% { transform: translateY(170px); opacity: 0; }
    }

    @keyframes dropC {
      0% { transform: translateY(0); opacity: 0; }
      8% { opacity: 1; }
      72% { transform: translateY(120px); opacity: 1; }
      86% { transform: translateY(120px); opacity: 1; }
      100% { transform: translateY(120px); opacity: 0; }
    }

    .loading-text {

    .capture-card {

      box-shadow: none !important;

    }

    .result-title-hero {
      border: 0;
      background: var(--day-panel-deep);
      padding: 14px 8px 13px;
      margin-bottom: 10px;
      text-align: center;
      border-radius: 18px;
    }

    .result-test-title {
      margin: 0;
      font-size: clamp(15px, 4.5vw, 20px);
      line-height: 1.2;
      letter-spacing: 0.6px;
      white-space: nowrap;
      word-break: keep-all;
      font-weight: 900;
      color: var(--black);
    }

    .result-top {
      border: 0;
      background: var(--day-panel);
      padding: 12px 10px 11px;
      margin-bottom: 10px;
      text-align: center;
      border-radius: 18px;
    }

    .result-user {
      margin: 0 0 7px;
      font-size: 16px;
      line-height: 1.35;
      word-break: keep-all;
      font-weight: 900;
      color: var(--black);
      letter-spacing: 0.35px;
    }

    .result-pillar {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0.6px;
      word-break: keep-all;
      font-weight: 900;
      color: var(--black);
    }

    .stats-box {
      border: 0;
      background: var(--day-panel);
      padding: 12px 10px;
      margin-bottom: 10px;
      border-radius: 18px;
    }

    .stat-row {
      display: grid;
      grid-template-columns: 82px 1fr 46px;
      align-items: center;
      gap: 8px;
    }

    .stat-row + .stat-row {
      margin-top: 10px;
    }

    .stat-label {
      font-size: 13px;
      font-weight: 900;
      line-height: 1.2;
      color: var(--black);
      letter-spacing: 0.3px;
    }

    .stat-squares {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 4px;
    }

    .stat-square {
      aspect-ratio: 1 / 1;
      border: 0;
      background: var(--day-empty);
      border-radius: 4px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.12);
    }

    .stat-square.fill {
      background: var(--day-fill);
    }

    .stat-percent {
      text-align: right;
      font-size: 13px;
      font-weight: 900;
      line-height: 1;
      color: var(--black);
    }

    .trait-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, auto);
      gap: 8px;
    }

    .trait-box {
      border: 0;
      background: var(--day-panel);
      min-height: 96px;
      padding: 10px 7px;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      border-radius: 16px;
    }

    .trait-text {
      font-size: 13px;
      line-height: 1.5;
      word-break: keep-all;
      color: var(--black);
      font-weight: 900;
      letter-spacing: 0.3px;
    }

    .match-box {
      border: 0;
      background: var(--day-panel);
      margin-top: 10px;
      padding: 12px 10px;
      border-radius: 18px;
    }

    .match-title {
      text-align: center;
      font-size: 16px;
      font-weight: 900;
      margin-bottom: 10px;
      color: var(--black);
      letter-spacing: 0.4px;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .match-card {
      border: 0;
      background: var(--day-panel-deep);
      padding: 12px 8px;
      text-align: center;
      min-height: 82px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-radius: 16px;
    }

    .match-label {
      font-size: 13px;
      font-weight: 900;
      margin-bottom: 8px;
      color: var(--black);
      letter-spacing: 0.3px;
    }

    .match-text {
      font-size: 15px;
      font-weight: 900;
      line-height: 1.35;
      word-break: keep-all;
      color: var(--black);
    }

    .button-area {
      width: 100%;
      max-width: 420px;
      margin: 14px auto 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ad-box {
      width: 350px;
      max-width: 100%;
      height: 140px;
      margin: 18px auto 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .save-modal {
      position: fixed;
      inset: 0;

      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 18px 14px;
      overflow-y: auto;
    }

    .save-modal.active {
      display: flex;
    }

    .save-box {
      width: 100%;
      max-width: 310px;
      border: 0;

    .save-preview-wrap {

    .save-preview {
      display: block;

      background: #ffffff;

    .close-btn {

    }

    @media (max-width: 480px) {
      .header-inner {
        padding: 0 10px;

      }

      .field-select {

      .result-test-title {

      .result-user {
        font-size: 14px;

      .result-pillar {

      }

      .trait-grid {

      }

      .trait-box {

        padding: 8px 6px;
      }

      .trait-text {
        font-size: 12px;
        line-height: 1.45;

      }

      .match-label {

      }

    @media (min-width: 1024px) {

        max-width: 800px;
      }

      main {
        max-width: 800px;
      }

<body>
  <div class="wrap">
    <header>
      <div class="header-inner">
        <a href="https://test-it.co.kr/" class="logo">테스트잇</a>
        <nav class="nav">
          <a href="https://test-it.co.kr/test.html">성격</a>
          <a href="https://test-it.co.kr/face.html">얼굴</a>
          <a href="https://test-it.co.kr/etc.html">그외</a>
          <a href="https://test-it.co.kr/saju.html">사주</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="screen active" id="mainScreen">
        <div class="main-image-box">
          <img src="img_main398.png" alt="테스트잇 네모네모 사주 성격 테스트">
        </div>
        <button type="button" class="start-btn" onclick="startTest()">테스트 시작하기</button>
      </section>

      <section class="screen" id="inputScreen">
        <div class="frame">
          <div class="input-card">
            <h2 class="input-title">정보 입력</h2>

            <div class="input-grid">
              <div class="field-box">
                <label class="field-label" for="nickname">닉네임</label>
                <input type="text" class="field-input" id="nickname" maxlength="12" placeholder="닉네임 입력">
              </div>

              <div class="field-box">
                <div class="field-label">생년월일 / 양력</div>
                <div class="select-row">
                  <div class="select-wrap">
                    <select class="field-select" id="birthYear" onchange="updateDayOptions()"></select>
                  </div>
                  <div class="select-wrap">
                    <select class="field-select" id="birthMonth" onchange="updateDayOptions()"></select>
                  </div>
                  <div class="select-wrap">
                    <select class="field-select" id="birthDay"></select>
                  </div>
                </div>
              </div>
            </div>

            <div class="input-buttons">
              <button type="button" class="submit-btn" onclick="submitInfo()">결과 보기</button>
            </div>
          </div>
        </div>

      const branches = ["자","축","인","묘","진","사","오","미","신","유","술","해"];

      function solarToJdn(year, month, day) {
        const a = Math.floor((14 - month) / 12);
        const y = year + 4800 - a;
        const m = month + 12 * a - 3;

        return day
          + Math.floor((153 * m + 2) / 5)
          + 365 * y
          + Math.floor(y / 4)
          - Math.floor(y / 100)
          + Math.floor(y / 400)
          - 32045;
      }

      function getDayPillar(year, month, day) {
        const jdn = solarToJdn(year, month, day);
        const index = ((jdn + 49) % 60 + 60) % 60;
        const stem = stems[index % 10];
        const branch = branches[index % 12];

        return {
          index,
          stem,
          branch,
          name: stem + branch
        };
      }

      return { getDayPillar };
    })();

    function blendWithWhite(hex, ratio) {
      const clean = hex.replace("#", "");
      const r = parseInt(clean.substring(0, 2), 16);
      const g = parseInt(clean.substring(2, 4), 16);
      const b = parseInt(clean.substring(4, 6), 16);

      const nr = Math.round(r + (255 - r) * ratio);
      const ng = Math.round(g + (255 - g) * ratio);
      const nb = Math.round(b + (255 - b) * ratio);

      return "#" + [nr, ng, nb].map(v => v.toString(16).padStart(2, "0")).join("");
    }

      document.getElementById(id).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startTest() {
      showScreen("inputScreen");
    }

    function restartTest() {
      document.getElementById("nickname").value = "";
      setDefaultBirthday();
      showScreen("mainScreen");
    }

    function makeOption(value, label, selected) {
      return `<option value="${value}" ${selected ? "selected" : ""}>${label}</option>`;
    }

    function initBirthSelects() {
      const yearSelect = document.getElementById("birthYear");
      const monthSelect = document.getElementById("birthMonth");
      const currentYear = new Date().getFullYear();

      let yearHtml = "";
      for (let y = currentYear; y >= 1920; y--) {
        yearHtml += makeOption(y, y + "년", y === 1995);
      }
      yearSelect.innerHTML = yearHtml;

      let monthHtml = "";
      for (let m = 1; m <= 12; m++) {
        monthHtml += makeOption(m, m + "월", m === 1);
      }
      monthSelect.innerHTML = monthHtml;

      updateDayOptions(1);
    }

    function setDefaultBirthday() {
      document.getElementById("birthYear").value = "1995";
      document.getElementById("birthMonth").value = "1";
      updateDayOptions(1);
    }

    function daysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function updateDayOptions(forceDay) {
      const year = parseInt(document.getElementById("birthYear").value, 10);
      const month = parseInt(document.getElementById("birthMonth").value, 10);
      const daySelect = document.getElementById("birthDay");
      const currentDay = forceDay || parseInt(daySelect.value || "1", 10);
      const maxDay = daysInMonth(year, month);
      const selectedDay = Math.min(currentDay, maxDay);

      let dayHtml = "";
      for (let d = 1; d <= maxDay; d++) {
        dayHtml += makeOption(d, d + "일", d === selectedDay);
      }
      daySelect.innerHTML = dayHtml;
    }

    function submitInfo() {
      const nickname = document.getElementById("nickname").value.trim() || "이름없음";
      const year = parseInt(document.getElementById("birthYear").value, 10);
      const month = parseInt(document.getElementById("birthMonth").value, 10);
      const day = parseInt(document.getElementById("birthDay").value, 10);

      userInfo = {
        nickname,
        year,
        month,
        day,
        pillar: SajuSquareLib.getDayPillar(year, month, day)
      };

      showScreen("loadingScreen");

      setTimeout(() => {
        renderResult();
        showScreen("resultScreen");
      }, 3000);
    }

    function clamp(num, min, max) {
      return Math.max(min, Math.min(max, num));
    }

    function countKeywordScore(text, keywords) {
      let score = 0;
      keywords.forEach(item => {
        if (text.includes(item.word)) {
          score += item.score;
        }
      });
      return score;
    }

    function computeStats(pillar, data) {
      const text = data.traits.join(" ");
      const elemCharmBonus = { 목: 3, 화: 5, 토: 2, 금: 4, 수: 4 };
      const elemPopularityBonus = { 목: 4, 화: 6, 토: 2, 금: 3, 수: 5 };

      const charmKeywords = [
        { word: "다정", score: 5 }, { word: "상냥", score: 5 }, { word: "세련", score: 5 },
        { word: "예술", score: 5 }, { word: "감각", score: 4 }, { word: "화려", score: 4 },
        { word: "유쾌", score: 4 }, { word: "위트", score: 4 }, { word: "눈치", score: 3 },
        { word: "기획", score: 4 }, { word: "전략", score: 3 }, { word: "집중", score: 3 },
        { word: "당당", score: 3 }, { word: "솔직", score: 3 }, { word: "센스", score: 4 },
        { word: "포근", score: 3 }, { word: "따뜻", score: 4 }
      ];

      const popularityKeywords = [
        { word: "공감", score: 6 }, { word: "사람", score: 4 }, { word: "리더", score: 5 },
        { word: "조율", score: 5 }, { word: "대인관계", score: 6 }, { word: "배려", score: 4 },
        { word: "의리", score: 4 }, { word: "신뢰", score: 5 }, { word: "상냥", score: 4 },
        { word: "다정", score: 4 }, { word: "소통", score: 4 }, { word: "유쾌", score: 3 },
        { word: "위트", score: 3 }, { word: "포용", score: 4 }, { word: "도와", score: 3 },
        { word: "주변", score: 2 }, { word: "말재주", score: 3 }, { word: "말", score: 2 }
      ];

      const charm =
        56 +
        countKeywordScore(text, charmKeywords) +
        (elemCharmBonus[data.elem] || 0) +
        (charmBiasMap[pillar.name] || 0);

      const popularity =
        54 +
        countKeywordScore(text, popularityKeywords) +
        (elemPopularityBonus[data.elem] || 0) +
        (popularityBiasMap[pillar.name] || 0);

      return {
        charm: clamp(charm, 55, 95),
        popularity: clamp(popularity, 52, 94)
      };
    }

    function renderStatSquares(percent) {
      const fillCount = Math.max(1, Math.min(10, Math.round(percent / 10)));
      let html = "";
      for (let i = 1; i <= 10; i++) {
        html += `<span class="stat-square ${i <= fillCount ? "fill" : ""}"></span>`;
      }
      return html;
    }

    function renderResult() {
      const pillar = userInfo.pillar;
      const data = iljuDatabase[pillar.name] || iljuDatabase["갑자"];
      const traits = data.traits.slice(0, 12);
      const stats = computeStats(pillar, data);

      applyDayColor(pillar.index);

      document.getElementById("resultUserText").textContent = userInfo.nickname + "님의 사주 성격 특징";
      document.getElementById("pillarTitle").textContent = pillar.name + "일주";
      document.getElementById("goodMatchText").textContent = data.good || "";
      document.getElementById("badMatchText").textContent = data.bad || "";

      document.getElementById("statsBox").innerHTML = `
        <div class="stat-row">
          <div class="stat-label">일주 매력</div>
          <div class="stat-squares">${renderStatSquares(stats.charm)}</div>
          <div class="stat-percent">${stats.charm}%</div>
        </div>
        <div class="stat-row">
          <div class="stat-label">일주 인기</div>
          <div class="stat-squares">${renderStatSquares(stats.popularity)}</div>
          <div class="stat-percent">${stats.popularity}%</div>
        </div>
      `;

      document.getElementById("resultGrid").innerHTML = traits.map(text => {
        return `
          <div class="trait-box">
            <div class="trait-text">${text}</div>
          </div>
        `;
      }).join("");

      waitForCaptureFonts();
    }

   async function waitForCaptureFonts() {
  if (!document.fonts) return;
  try {
    const pillarText = document.getElementById("pillarTitle")?.textContent || "갑을병정무기경신임계자축인묘진사오미신유술해일주";

    await Promise.all([
      document.fonts.load('900 20px "Pretendard"', "테스트잇 네모네모 사주 성격 테스트"),
      document.fonts.load('900 18px "Pretendard"', pillarText),
      document.fonts.ready
    ]);
  } catch (e) {}
}

    function shareTest() {
      const shareData = {
        title: "테스트잇 네모네모 사주 성격 테스트",
        text: "테스트잇 네모네모 사주 성격 테스트",
        url: testUrl
      };

      if (navigator.share) {
        navigator.share(shareData).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(testUrl).then(() => {
          alert("테스트 링크가 복사됐어요.");
        }).catch(() => {
          alert("공유가 지원되지 않는 브라우저예요.");
        });
      } else {
        alert("공유가 지원되지 않는 브라우저예요.");
      }
    }

    async function saveResultImage() {
  const saveBtn = document.querySelector(".button-area .result-btn");
  const originalText = saveBtn.textContent;
  saveBtn.textContent = "이미지 만드는 중...";
  saveBtn.disabled = true;

  const captureArea = document.getElementById("captureArea");

  if (!window.htmlToImage) {
    alert("이미지 저장 기능을 불러오는 중이에요. 잠시 후 다시 눌러주세요.");
    saveBtn.textContent = originalText;
    saveBtn.disabled = false;
    return;
  }

  try {
    await waitForCaptureFonts();

    await new Promise(resolve => {
      requestAnimationFrame(() => {
        requestAnimationFrame(resolve);
      });
    });

    const rect = captureArea.getBoundingClientRect();
   const dataUrl = await htmlToImage.toPng(captureArea, {
  cacheBust: false,
  pixelRatio: 1.3,
  backgroundColor: "#fffdf4",
  width: Math.ceil(rect.width),
  height: Math.ceil(captureArea.scrollHeight),
  style: {
    margin: "0",
    transform: "none"
  }
});

    document.getElementById("savePreview").src = dataUrl;
    document.getElementById("saveModal").classList.add("active");
  } catch (e) {
    alert("이미지 저장 준비 중 오류가 났어요. 다시 한 번 눌러주세요.");
  } finally {
    saveBtn.textContent = originalText;
    saveBtn.disabled = false;
  }
}

    function closeSaveModal() {
      document.getElementById("saveModal").classList.remove("active");
    }

    window.addEventListener("load", () => {
      initBirthSelects();
      waitForCaptureFonts();
    });
  </script>
</body>
