<!DOCTYPE html>
<html lang="ko">
<head>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테스트잇x미스틱스토리 동심 테스트(가제)</title>
  <meta name="description" content="테스트잇x미스틱스토리 동심 테스트(가제)" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="테스트잇x미스틱스토리 동심 테스트(가제)" />
  <meta property="og:description" content="테스트잇x미스틱스토리 동심 테스트(가제)" />
  <meta property="og:url" content="https://test-it.co.kr/test0103" />
  <style>
    @import url('https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css');

    :root {
      --main-pink: #f06292;
      --dark-pink: #d81b60;
      --light-pink: #f8bbd0;
      --bg-pink: #fce4ec;
      --cream: #fff9e6;
      --shadow: #ad1457;

      --header-bg: #f8bbd0;
      --header-border: #f48fb1;
      --ink: #111;
      --white: #fff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: "Galmuri11", monospace, sans-serif;
      background-color: var(--bg-pink);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }

    .wrapper {
      width: 100%;
      max-width: 600px;
      margin: 0 auto;
      padding: 0 14px;
    }

    /* 헤더 CSS */
    .header-wrapper {
      width: 100%;
      background-color: var(--header-bg);
      border-bottom: 4px solid var(--header-border);
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }

    .page-header h1 {
      margin: 0;
      padding: 0;
      flex-shrink: 0;
    }

    .retro-logo {
      font-family: "Galmuri11", monospace;
      font-size: 16px;
      font-weight: 700;
      background: #fff;
      border: 3px solid var(--shadow);
      padding: 6px 12px;
      text-decoration: none;
      color: var(--shadow);
      box-shadow: 2px 2px 0 var(--shadow);
      display: flex;
      align-items: center;
      transition: all 0.1s;
    }

    .retro-logo:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .main-nav {
      display: flex;
      flex-wrap: nowrap;
      align-items: center;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 10px;
    }

    .main-nav a {
      display: block;
      font-family: "Galmuri11", monospace;
      text-decoration: none;
      color: var(--shadow);
      font-weight: 700;
      background: #fff;
      border: 3px solid var(--shadow);
      padding: 5px 8px;
      font-size: 13px;
      box-shadow: 2px 2px 0 var(--shadow);
      transition: all 0.1s;
      white-space: nowrap;
    }

    .main-nav a:active {
      transform: translate(2px, 2px);
      box-shadow: none;
    }

    .player-outer {
      width: 100%;
      max-width: 520px;
      margin-top: 24px;
      padding: 0 12px 28px;
      position: relative;
    }

    .player-body {
      background: linear-gradient(180deg, #f48fb1 0%, var(--main-pink) 100%);
      border: 5px solid var(--shadow);
      border-radius: 38px;
      padding: 26px 18px 18px;
      box-shadow: 0 12px 0 var(--shadow), 8px 16px 24px rgba(0, 0, 0, 0.16);
      position: relative;
    }

    .top-dials {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 14px;
      padding-right: 14px;
    }

    .dial {
      width: 25px;
      height: 12px;
      background: #f3f3f3;
      border: 3px solid #bdbdbd;
      border-radius: 4px;
    }

    .sticker {
      position: absolute;
      background: white;
      border: 2px solid #333;
      padding: 4px 10px;
      font-size: 11px;
      font-weight: bold;
      z-index: 10;
      box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.12);
    }

    .st-heart {
      top: 54px;
      left: -8px;
      transform: rotate(-15deg);
      color: #ff4081;
      border-radius: 10px;
    }

    .st-love {
      top: 102px;
      right: -4px;
      transform: rotate(10deg);
      border-radius: 50%;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 9px;
      line-height: 1.1;
    }

    .face-plate {
      background: var(--cream);
      border: 4px solid var(--shadow);
      border-radius: 22px;
      padding: 22px 14px;
      min-height: 220px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.08);
    }

    .tape-title {
      font-size: 12px;
      color: var(--shadow);
      margin-bottom: 14px;
      letter-spacing: 1px;
    }

    .tape-window {
      background: var(--bg-pink);
      width: 88%;
      max-width: 360px;
      height: 68px;
      border-radius: 12px;
      margin: 12px auto 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 90px;
      border: 4px solid var(--shadow);
      position: relative;
      flex-shrink: 0;
    }

    .reel {
      width: 38px;
      height: 38px;
      background: #fff;
      border-radius: 50%;
      border: 5px dashed #b0b0b0;
      position: relative;
    }

    .reel::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 12px;
      height: 12px;
      background: #cccccc;
      border-radius: 50%;
    }

    .spinning {
      animation: spin 2.5s linear infinite;
    }

    @keyframes spin {
      100% {
        transform: rotate(360deg);
      }
    }

    .progress-wrap {
      width: 84%;
      max-width: 340px;
      height: 12px;
      background: #fff1f5;
      border-radius: 999px;
      margin-top: 12px;
      overflow: hidden;
      border: 2px solid var(--shadow);
      display: none;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, var(--light-pink), var(--dark-pink));
      transition: width 0.3s;
    }

    .question-text {
      font-size: 17px;
      color: #333;
      line-height: 1.55;
      word-break: keep-all;
      margin-top: 8px;
      white-space: pre-line;
      min-height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .control-deck {
      background: linear-gradient(180deg, #f7a8c2 0%, #f48fb1 100%);
      border: 4px solid var(--shadow);
      border-radius: 22px;
      padding: 18px 16px;
      margin-top: 18px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.35);
    }

    .deck-label {
      font-size: 10px;
      color: var(--shadow);
      letter-spacing: 2px;
      text-align: center;
    }

    .btn-action {
      font-family: "Galmuri11", monospace;
      border-radius: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.1s;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 3px solid var(--shadow);
      box-shadow: 0 6px 0 var(--shadow);
      appearance: none;
      -webkit-appearance: none;
    }

    .btn-action:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 var(--shadow);
    }

    .btn-ox {
      width: 92px;
      height: 62px;
      font-size: 28px;
      background: var(--cream);
      color: var(--shadow);
    }

    .btn-wide {
      width: 168px;
      height: 56px;
      font-size: 18px;
      background: #fff7fb;
      color: var(--shadow);
    }

    .btn-start {
      background: #fff1f7;
      color: var(--dark-pink);
    }

    .btn-rewind {
      background: #ffe9f1;
      color: var(--dark-pink);
    }

    .btn-group {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .section {
      display: none;
      width: 100%;
    }

    .section.active {
      display: block;
    }

    .wrap-hide {
      display: none;
    }

    .wrap-show {
      display: flex;
    }

    .result-box {
      text-align: center;
      line-height: 1.65;
      color: #333;
      white-space: normal;
    }

    @media (max-width: 560px) {
      .page-header {
        gap: 10px;
      }

      .main-nav {
        gap: 6px;
      }

      .main-nav a {
        padding: 4px 6px;
        font-size: 11px;
      }

      .retro-logo {
        font-size: 14px;
        padding: 5px 8px;
      }

      .player-outer {
        margin-top: 18px;
        padding: 0 10px 24px;
      }

      .player-body {
        border-radius: 30px;
        padding: 22px 14px 16px;
      }

      .face-plate {
        min-height: 220px;
        padding: 20px 12px;
      }

      .tape-window {
        width: 92%;
        gap: 58px;
        height: 64px;
      }

      .question-text {
        font-size: 16px;
      }

      .btn-ox {
        width: 84px;
        height: 58px;
        font-size: 26px;
      }

      .btn-wide {
        width: 154px;
        height: 54px;
        font-size: 17px;
      }

      .st-heart {
        top: 50px;
        left: -6px;
        font-size: 10px;
      }

      .st-love {
        top: 96px;
        right: -2px;
      }
    }

    @media (max-width: 480px) {
      .wrapper {
        padding: 0 10px;
      }

      .page-header {
        align-items: flex-start;
      }

      .page-header nav {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .page-header nav::-webkit-scrollbar {
        display: none;
      }

      .main-nav {
        min-width: max-content;
      }

      .retro-logo {
        font-size: 14px;
        padding: 5px 8px;
      }

      .main-nav {
        gap: 6px;
      }

      .main-nav a {
        padding: 4px 6px;
        font-size: 11px;
      }

      .tape-title {
        font-size: 11px;
      }

      .question-text {
        font-size: 15px;
        min-height: 74px;
      }

      .btn-group {
        gap: 12px;
      }

      .btn-ox {
        width: 78px;
        height: 56px;
        font-size: 24px;
      }

      .btn-wide {
        width: 148px;
        height: 52px;
        font-size: 16px;
      }

      .progress-wrap {
        width: 88%;
      }
    }
  </style>
</head>
<body>
  <div class="header-wrapper">
    <header class="page-header wrapper">
      <h1><a href="https://test-it.co.kr/" class="retro-logo">테스트잇</a></h1>
      <nav>
        <ul class="main-nav">
          <li><a href="https://test-it.co.kr/test.html">성격</a></li>
          <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
          <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
          <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
        </ul>
      </nav>
    </header>
  </div>

  <div class="player-outer">
    <div class="player-body">
      <div class="sticker st-heart">we are the same! ❤️</div>
      <div class="sticker st-love">we need LOVE</div>

      <div class="top-dials">
        <div class="dial"></div>
        <div class="dial"></div>
      </div>

      <div class="face-plate">
        <div class="tape-title">Childhood Test Vol.1 / Side A</div>

        <div id="main-section" class="section active">
          <h2 style="color: var(--dark-pink); margin: 5px 0;">테스트잇X미스틱스토리<br>동심 테스트(가제)</h2>
          <p style="font-size: 14px; line-height: 1.5; margin: 10px 0 0;">당신의 마음속 동심 주파수를 맞춰보세요.</p>
        </div>

        <div id="question-section" class="section">
          <div class="question-text" id="question-text"></div>
        </div>

        <div id="result-section" class="section">
          <h3 style="color: var(--dark-pink); margin-top: 0;">튜닝 완료</h3>
          <div class="result-box" id="result-text"></div>
        </div>

        <div class="tape-window">
          <div class="reel" id="reel-l"></div>
          <div class="reel" id="reel-r"></div>
        </div>

        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <div class="control-deck">
        <div class="deck-label">STEREO PLAYER CONTROLS</div>

        <div id="ctrl-start" class="wrap-show">
          <button class="btn-action btn-wide btn-start" onclick="startTest()">PLAY ▷</button>
        </div>

        <div id="ctrl-ox" class="wrap-hide btn-group">
          <button class="btn-action btn-ox" onclick="nextQuestion(true)">O</button>
          <button class="btn-action btn-ox" onclick="nextQuestion(false)">X</button>
        </div>

        <div id="ctrl-result" class="wrap-hide">
          <button class="btn-action btn-wide btn-rewind" onclick="location.reload()">REWIND ⏪</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      "1. 나는 아직도 부를 수 있는 만화 주제가가 있다.",
      "2. 가끔 문방구 앞에 멈춘다.",
      "3. 하늘을 보면 예쁜 모양의 구름을 찾는다.",
      "4. 놀이공원에 가면 범퍼카 한 번은 타야한다.",
      "5. 뽑기 기계 앞에서 승부욕이 생긴다.",
      "6. 어릴 때 별명을 아직 기억한다.",
      "7. 남 모르게\n횡단보도 하얀색 선만 밟을 때가 있다.",
      "8. 내가 만화의 주인공이라고 상상할 때가 있다.",
      "9. '우리 집에 왜 왔니' 가사가 자동 재생된다.",
      "10. 종이를 보면 비행기 한 번은 접어본다.",
      "11. 음식 먹을 때 제일 맛있는 건 마지막에 먹는다.",
      "12.나는 아직도 학교 앞에서 먹던\n컵 떡볶이가 생각난다.",
      "13. 눈이 오면 첫 발자국을 찍고 싶어진다.",
      "14.놀이터를 지나가면\n한 번쯤 그네가 타고 싶어진다.",
      "15. 종 치는 소리를 들으면 괜히 반응한다.",
      "16. 비밀 얘기할 때 괜히 목소리가 더 작아진다.",
      "17. 버튼을 보면 누르고 싶다.",
      "18. 누군가 내 이름을 불러주면 괜히 반갑다.",
      "19.나는 아직도\n어릴 때 만들었던 이메일을 사용한다.",
      "20. 포장지를 뜯기 전에 괜히 한번 흔들어본다."
    ];

    let currentQuestionIndex = 0;
    let scoreO = 0;

    function startTest() {
      document.getElementById('main-section').classList.remove('active');
      document.getElementById('question-section').classList.add('active');
      document.getElementById('ctrl-start').classList.replace('wrap-show', 'wrap-hide');
      document.getElementById('ctrl-ox').classList.replace('wrap-hide', 'wrap-show');
      document.getElementById('progress-wrap').style.display = 'block';

      document.getElementById('reel-l').classList.add('spinning');
      document.getElementById('reel-r').classList.add('spinning');

      showQuestion();
    }

    function showQuestion() {
      const progress = (currentQuestionIndex / questions.length) * 100;
      document.getElementById('progress-bar').style.width = progress + '%';
      document.getElementById('question-text').innerText = questions[currentQuestionIndex];
    }

    function nextQuestion(isO) {
      if (isO) scoreO++;
      currentQuestionIndex++;

      if (currentQuestionIndex < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      document.getElementById('question-section').classList.remove('active');
      document.getElementById('result-section').classList.add('active');
      document.getElementById('ctrl-ox').classList.replace('wrap-show', 'wrap-hide');
      document.getElementById('ctrl-result').classList.replace('wrap-hide', 'wrap-show');
      document.getElementById('progress-bar').style.width = '100%';

      document.getElementById('reel-l').classList.remove('spinning');
      document.getElementById('reel-r').classList.remove('spinning');

      const resDiv = document.getElementById('result-text');
      let msg = "";

      if (scoreO >= 16 && scoreO <= 20) {
        msg = "<strong>[전체 관람가]</strong><br>당신의 마음속에는 영원한 동심이 있습니다.";
      } else if (scoreO >= 13 && scoreO <= 15) {
        msg = "<strong>[12세 관람가]</strong><br>더 어려지고 싶으시다고요?<br>4/29 6시<br>LUCY의 &lt;전체 관람가&gt;를 들으시면 됩니다.";
      } else if (scoreO >= 10 && scoreO <= 12) {
        msg = "<strong>[15세 관람가]</strong><br>어린 시절이 그립죠?<br>4/29 6시<br>LUCY의 &lt;전체 관람가&gt;와 떠나봅시다.";
      } else {
        msg = "<strong>⚠️어른 주의⚠️</strong><br>추억 복원 패치가 필요합니다.<br>4/29 6시<br>LUCY의 &lt;전체 관람가&gt; 리스닝 필수";
      }

      resDiv.innerHTML = msg;
    }
  </script>
</body>
</html>
