<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>테스트잇 숨은 성격 찾기 테스트</title>
  <meta name="description" content="착한 척, 쿨한 척 뒤에 숨은 내 진짜 본성을 찾아보자">
  <meta property="og:title" content="테스트잇 숨은 성격 찾기 테스트">
  <meta property="og:description" content="나도 몰랐던 내 안의 진짜 흑막 성격은?">
  <meta property="og:url" content="https://test-it.co.kr/test395">
  <meta property="og:type" content="website">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

  <style>
    /* 픽셀 폰트 적용 */
    @font-face {
      font-family: 'NeoDunggeunmo';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2001@1.3/NeoDunggeunmo.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0; padding: 0;
      background: #ffffff; /* 순백색 바탕 */
      color: #111111;
      /* 전체 기본 폰트는 가독성 좋은 고딕 계열 사용 */
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    a { color: inherit; text-decoration: none; }

    button {
      border-radius: 0; cursor: pointer;
      appearance: none; -webkit-appearance: none;
      transition: background-color 0.15s ease;
    }

    /* 픽셀 폰트가 필요한 곳에만 적용하는 클래스 */
    .pixel-text {
      font-family: 'NeoDunggeunmo', sans-serif;
      font-weight: normal;
      letter-spacing: 0.5px;
    }

    .wrap {
      width: 100%; min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* 헤더 */
    header {
      width: 100%; height: 52px;
      border-bottom: 1px solid #111111;
      background: #ffffff;
      display: flex; justify-content: center; align-items: center;
      position: sticky; top: 0; z-index: 30;
    }
    .header-inner {
      width: 100%; max-width: 520px; padding: 0 14px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .logo { font-size: 18px; font-family: 'NeoDunggeunmo', sans-serif; letter-spacing: -0.5px; color: #111; }
    .nav { display: flex; gap: 12px; font-size: 14px; font-family: 'NeoDunggeunmo', sans-serif; white-space: nowrap; }

    main {
      width: 100%; max-width: 520px;
      margin: 0 auto; padding: 24px 14px 40px;
      flex: 1;
    }

    .screen { display: none; }
    .screen.active { display: block; animation: fadeIn 0.2s ease-out; }

    @keyframes fadeIn {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    /* 얇은 선 메인 프레임 */
    .frame {
      width: 100%; border: 1px solid #111111;
      background: #ffffff; padding: 14px;
    }

    /* 메인 화면 */
    .hero-box {
      border: 1px solid #111111; background: #ffffff;
      padding: 16px; display: flex; flex-direction: column; gap: 16px;
    }
    .hero-top {
      border: 1px solid #111111; padding: 20px 10px; text-align: center;
      background: #ffffff;
    }
    .hero-top .mini-label {
      display: inline-block; padding: 4px 10px;
      border: 1px solid #111111; background: #ffffff; color: #111111;
      font-size: 13px; margin-bottom: 14px;
    }
    .hero-title { 
      margin: 0 0 10px 0; font-size: 32px; line-height: 1.3; word-break: keep-all; 
      color: #111111;
    }
    .hero-sub { 
      margin: 15px 0 0; font-size: 14px; line-height: 1.6; word-break: keep-all; font-weight: bold;
      background: #ffffff; border-top: 1px dashed #111111; padding-top: 15px;
    }

    .hero-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .hero-card {
      aspect-ratio: 1 / 1.18; border: 1px solid #111111;
      padding: 8px 6px; display: flex; flex-direction: column; justify-content: space-between; background: #ffffff;
    }
    .hero-card-top { font-size: 13px; line-height: 1; text-align: center; }
    .hero-card-icon { flex: 1; display: flex; justify-content: center; align-items: center; padding: 6px 0; }
    /* 아이콘 두께 얇게 1.5로 통일 */
    .hero-card-icon svg { width: 40px; height: 40px; stroke: #111111; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .hero-card-bottom {
      text-align: center; font-size: 12px; line-height: 1.2; word-break: keep-all; font-weight: bold;
      min-height: 28px; display: flex; align-items: center; justify-content: center;
    }

    /* 메인화면 가운데 카드 (하얀색 복구) */
    .hero-card.center { background: #ffffff; color: #111111; }
    .hero-card.center .hero-card-icon svg { stroke: #111111; }

    .start-btn {
      width: 100%; min-height: 54px; border: 1px solid #111111;
      background: #ffffff; color: #111111; font-size: 16px;
    }
    .start-btn:hover { background: #f4f4f4; } 

    /* 질문 화면 */
    .question-card {
      border: 1px solid #111111; background: #ffffff;
      padding: 14px; display: flex; flex-direction: column;
    }
    .question-head {
      border: 1px solid #111111; padding: 10px 10px 12px; margin-bottom: 14px;
      background: #ffffff; color: #111111;
    }
    .question-head-top {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 15px; margin-bottom: 10px;
    }
    .progress-cells { display: grid; grid-template-columns: repeat(12, 1fr); gap: 4px; }
    .progress-cell { height: 14px; border: 1px solid #111111; background: #ffffff; }
    .progress-cell.done { background: #111111; }

    .q-mark {
      width: fit-content; margin: 0 auto 12px; padding: 6px 14px;
      border: 1px solid #111111; background: #ffffff; color: #111111; font-size: 15px;
    }

    .question-text {
      margin: 0 0 16px; min-height: 100px;
      border: 1px solid #111111; padding: 18px 12px;
      font-size: 20px; line-height: 1.4; text-align: center;
      display: flex; justify-content: center; align-items: center;
      letter-spacing: -0.5px; word-break: keep-all; font-weight: bold;
    }

    .answers {
      display: flex; flex-direction: column; gap: 10px; margin-top: auto; 
    }

    .answer-btn {
      width: 100%; min-height: 70px; border: 1px solid #111111;
      background: #ffffff; color: #111111; padding: 12px;
      font-size: 15px; line-height: 1.35; font-family: "Malgun Gothic", sans-serif;
      text-align: center; word-break: keep-all; font-weight: bold;
    }
    .answer-btn:hover { background: #f4f4f4; }

    /* 결과 화면 */
    .capture-card {
      width: 100%; max-width: 420px; margin: 0 auto;
      border: 1px solid #111111; background: #ffffff; padding: 14px;
    }

    .capture-top-title {
      border: 1px solid #111111; background: #ffffff; color: #111111; 
      padding: 6px 8px; text-align: center; font-size: 13px; margin-bottom: 12px;
    }

    .result-main {
      border: 1px solid #111111; padding: 24px 10px; text-align: center; margin-bottom: 12px;
      background: #ffffff;
    }

    .result-type { display: none; }

    .result-title {
      margin: 0; font-size: 26px; line-height: 1.3;
      letter-spacing: -1px; word-break: keep-all;
      color: #111111; background: #ffffff; display: inline-block; padding: 0 10px;
    }

    .result-sub {
      margin: 14px 0 0; font-size: 14px; line-height: 1.45; word-break: keep-all; font-weight: bold;
      background: #ffffff; border-top: 1px dashed #111111; padding-top: 15px; display: block;
    }

    .two-line {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px;
    }

    .small-box {
      border: 1px solid #111111; background: #ffffff; padding: 12px 8px;
      text-align: center; min-height: 86px; display: flex; flex-direction: column; justify-content: center;
    }

    .small-box b {
      display: inline-block; font-size: 13px; margin: 0 auto 8px;
      padding: 3px 8px; border: 1px solid #111111; background: #ffffff; color: #111111;
    }
    
    /* 겉과 속 텍스트 (가독성 좋은 고딕 폰트) */
    .small-box span {
      font-size: 13px; line-height: 1.35; word-break: keep-all; font-weight: bold;
    }

    .card-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    }

    .result-mini-card {
      min-height: 130px; border: 1px solid #111111; padding: 8px;
      background: #ffffff; display: flex; flex-direction: column;
    }

    /* 결과화면 가운데 핵심 카드 (하얀색 복구) */
    .result-mini-card.center {
      background: #ffffff; color: #111111; 
    }
    .result-mini-card.center .mini-icon svg { stroke: #111111; }

    .mini-top {
      font-size: 12px; line-height: 1; text-align: center;
      min-height: 16px; display: flex; align-items: center; justify-content: center;
    }

    .mini-icon {
      flex: 1; display: flex; align-items: center; justify-content: center; padding: 8px 0;
    }
    .mini-icon svg {
      width: 40px; height: 40px; stroke: currentColor; fill: none;
      stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round;
    }

    /* 하단 9개 카드 텍스트 (가독성 좋은 고딕 폰트) */
    .mini-text {
      min-height: 38px; display: flex; align-items: center; justify-content: center;
      text-align: center; font-size: 12px; line-height: 1.3; word-break: keep-all; font-weight: bold;
    }

    /* 맨 아래 참고 문구 (가독성 좋은 고딕 폰트) */
    .bottom-note {
      margin-top: 10px; border: 1px solid #111111; padding: 14px 10px;
      text-align: center; font-size: 13px; line-height: 1.45; word-break: keep-all; font-weight: bold;
      background: #ffffff;
    }

    .button-area {
      width: 100%; max-width: 420px; margin: 14px auto 0;
      display: flex; flex-direction: column; gap: 8px;
    }

    .result-btn {
      width: 100%; min-height: 52px; border: 1px solid #111111;
      background: #ffffff; color: #111111; font-size: 15px;
    }
    .result-btn:hover { background: #f4f4f4; }
    
    .save-modal {
      position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85);
      display: none; justify-content: center; align-items: center; z-index: 100; padding: 18px;
    }
    .save-modal.active { display: flex; }
    .save-box {
      width: 100%; max-width: 330px; border: 1px solid #111111; background: #ffffff;
      padding: 20px; text-align: center;
    }
    .save-box h3 { margin: 0 0 10px; font-size: 20px; line-height: 1.3; }
    .save-box p { margin: 0 0 18px; font-size: 14px; line-height: 1.45; word-break: keep-all; }
    .save-preview { display: block; width: 100%; max-width: 230px; margin: 0 auto 18px; border: 1px solid #111111; background: #ffffff; }
    .close-btn { width: 100%; height: 48px; border: 1px solid #111111; background: #ffffff; color: #111111; font-size: 15px; }
    .close-btn:hover { background: #f4f4f4; }

    @media (max-width: 420px) {
      main { padding: 16px 10px 34px; }
      .header-inner { padding: 0 10px; }
      .hero-box { padding: 12px; }
      .hero-title { font-size: 28px; }
      .question-text { min-height: 90px; font-size: 18px; }
      .answer-btn { font-size: 14px; min-height: 64px; }
      .result-title { font-size: 24px; }
      .result-mini-card { min-height: 120px; }
      .mini-text { font-size: 11px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="header-inner">
        <a href="https://test-it.co.kr/" class="logo">테스트잇</a>
        <nav class="nav">
          <a href="https://test-it.co.kr/">성격</a>
          <a href="https://test-it.co.kr/">얼굴</a>
          <a href="https://test-it.co.kr/">그외</a>
          <a href="https://test-it.co.kr/">사주</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="screen active" id="mainScreen">
        <div class="frame">
          <div class="hero-box">
            <div class="hero-top">
              <div class="mini-label pixel-text">HIDDEN PERSONALITY</div>
              <h1 class="hero-title pixel-text">숨은 성격<br>찾기 테스트</h1>
              <p class="hero-sub">
                착한 척, 쿨한 척은 이제 그만!<br>
                내 안에 조용히 숨겨져 있던<br>
                진짜 본성을 카드로 스캔해보자
              </p>
            </div>

            <div class="hero-grid" id="heroGrid"></div>

            <button type="button" class="start-btn pixel-text" onclick="startTest()">테스트 시작하기</button>
          </div>
        </div>
      </section>

      <section class="screen" id="questionScreen">
        <div class="question-card">
          <div class="question-head">
            <div class="question-head-top">
              <span class="pixel-text">QUESTION</span>
              <span class="pixel-text" id="countText">1 / 12</span>
            </div>
            <div class="progress-cells" id="progressCells"></div>
          </div>

          <div class="q-mark pixel-text" id="qNum">Q1</div>
          <p class="question-text" id="questionText"></p>

          <div class="answers" id="answerArea"></div>
        </div>
      </section>

      <section class="screen" id="resultScreen">
        <div class="result-wrap">
          <div class="capture-card" id="captureArea">
            <div class="capture-top-title pixel-text">테스트잇 숨은 성격 찾기 테스트</div>

            <div class="result-main">
              <div class="result-type" id="resultType"></div>
              <h2 class="result-title pixel-text" id="resultTitle"></h2>
              <p class="result-sub" id="resultSub"></p>
            </div>

            <div class="two-line">
              <div class="small-box">
                <b class="pixel-text">겉으로는</b>
                <span id="lookText"></span>
              </div>
              <div class="small-box">
                <b class="pixel-text">속으로는</b>
                <span id="hiddenText"></span>
              </div>
            </div>

            <div class="card-grid" id="resultGrid"></div>

            <div class="bottom-note" id="bottomNote"></div>
          </div>

          <div class="button-area">
            <button type="button" class="result-btn pixel-text" onclick="saveResultImage()">결과 이미지 저장하기</button>
            <button type="button" class="result-btn pixel-text" onclick="restartTest()">다시 해보기</button>
            <button type="button" class="result-btn pixel-text" onclick="location.href='https://test-it.co.kr/'">다른 테스트 해보기</button>
            <button type="button" class="result-btn pixel-text" onclick="shareTest()">테스트 공유하기</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="save-modal" id="saveModal">
    <div class="save-box">
      <h3 class="pixel-text">이미지가 만들어졌어요</h3>
      <p>아래 결과 이미지를 꾹 눌러<br>이미지 저장을 눌러주세요.</p>
      <img class="save-preview" id="savePreview" alt="결과 이미지">
      <button type="button" class="close-btn pixel-text" onclick="closeSaveModal()">닫기</button>
    </div>
  </div>

  <script>
    const testUrl = "https://test-it.co.kr/test395";

    const questions = [
      {
        q: "친한 친구가 자기 지인들을 데려와서 같이 놀자고 한다.<br>나의 진짜 속마음은?",
        a: [
          { text: "오 새로운 사람들! 텐션 올려서 재밌게 놀아야지", type: "E" },
          { text: "아... (기 빨린다) 조용히 웃으며 맞장구만 친다", type: "I" }
        ]
      },
      {
        q: "이번 주 내내 퇴근 후 약속이 꽉 차 있다.<br>달력을 본 나의 기분은?",
        a: [
          { text: "바쁘게 사는 나, 제법 멋져. 아드레날린 뿜뿜", type: "E" },
          { text: "언제 쉬지...? 보기만 해도 벌써부터 피곤하다", type: "I" }
        ]
      },
      {
        q: "내가 더 선호하는 인간관계 대화 방식은?",
        a: [
          { text: "여럿이서 주제가 휙휙 바뀌며 티키타카 되는 단톡방", type: "E" },
          { text: "마음 맞는 사람과 하나의 주제로 깊게 얘기하는 1:1 대화", type: "I" }
        ]
      },
      {
        q: "길을 걷다 독특하게 생긴 건물을 발견했다.<br>이때 내 머릿속에 드는 생각은?",
        a: [
          { text: "'저기 뭐 하는 곳이지? 카페인가?' 용도를 검색해 본다", type: "S" },
          { text: "'저기 안엔 대체 어떤 비밀 공간이 있을까?' 상상해 본다", type: "N" }
        ]
      },
      {
        q: "친구가 '나 어제 꿈에서 좀비한테 쫓겼어!'라고 한다면?",
        a: [
          { text: "헐 그래서 어떻게 도망쳤어? 결국 잡혔어?", type: "S" },
          { text: "대박 나도 예전에 비슷한 꿈 꿨는데!! (상상력 발동)", type: "N" }
        ]
      },
      {
        q: "집에서 간단하게 요리를 할 때 나의 태도는?",
        a: [
          { text: "'물 500ml, 3분 30초' 레시피의 정확한 계량이 필수다", type: "S" },
          { text: "'대충 이 정도 넣으면 맛있겠지?' 나의 감을 100% 믿는다", type: "N" }
        ]
      },
      {
        q: "친구가 '나 요즘 너무 우울해서 파마했어'라고 한다면?",
        a: [
          { text: "무슨 색으로 했어? 너랑 잘 어울려? (사실 확인)", type: "T" },
          { text: "왜 우울했어 ㅠㅠ 무슨 일 있었어? (감정 공감)", type: "F" }
        ]
      },
      {
        q: "둘 중 들었을 때 내가 더 깊게 상처받는 말은?",
        a: [
          { text: "넌 진짜 주변 생각 안 하고 이기적인 것 같아", type: "T" },
          { text: "넌 진짜 융통성 없고 일 더럽게 못하는구나", type: "F" }
        ]
      },
      {
        q: "화가 잔뜩 난 친구가 억울한 일을 하소연할 때 나는?",
        a: [
          { text: "왜 그런 일이 일어났는지 인과관계를 객관적으로 파악한다", type: "T" },
          { text: "누가 잘잘못을 떠나 일단 친구 편을 들며 같이 분노해 준다", type: "F" }
        ]
      },
      {
        q: "내일 아침 일찍 여행을 떠나야 한다.<br>나의 짐 싸기 스타일은?",
        a: [
          { text: "며칠 전부터 필요한 물품 리스트 적어서 캐리어 꽉 채워둠", type: "J" },
          { text: "으악 내일 입을 옷만 대충 쑤셔 넣고 잠들기 바쁨", type: "P" }
        ]
      },
      {
        q: "주말에 친구들과 영화를 보러 가기로 했다.",
        a: [
          { text: "몇 시 영화, 무슨 밥, 어느 카페 갈지 미리 싹 정해둬야 맘이 편함", type: "J" },
          { text: "일단 영화관 근처에서 만나서 그날 땡기는 거 먹기로 함", type: "P" }
        ]
      },
      {
        q: "핸드폰 배터리가 15% 남았다는 알림이 떴다.",

        sub: "흔들림 없는 원칙주의자 같지만 3년 전 실수 떠올리며 괴로워함",
        outer: "바늘 찔러도 피 안 나오는 로봇",
        inner: "속으론 온갖 최악의 상황 걱정",
        happy: "오늘 할 일을 완벽하게 다 끝냈을 때",
        angry: "칼같이 선 긋고 차갑게 대답함",
        relation: "예의와 선을 지키는 깔끔한 사이",
        solo: "루틴대로 움직이며 안정감 찾기",
        core: "돌다리도 백 번 두드리는 완벽주의",
        sensitive: "약속 파기, 규칙 위반, 비효율",
        strength: "어떻게든 끝까지 해내는 책임감",
        stress: "예고 없이 튀어나오는 돌발 상황",
        twist: "친해지면 의외의 팩폭 개그 시전함",
        note: "알파고처럼 일 처리를 완벽하게 해내지만 속으로는 누군가 날 안 좋게 볼까 봐 전전긍긍합니다. 겉으론 태연한 척해도 작은 지적에 엄청난 내상을 입습니다."
      },
      ISTP: {
        title: "무심한 집착광",
        sub: "만사가 다 귀찮은 무생물 같지만 하나 꽂히면 식음 전폐하고 끝장 봄",
        outer: "만사 귀찮은 무뚝뚝한 돌멩이",
        inner: "관심 분야엔 엄청난 광기 발동",
        happy: "꽂힌 관심사에 미친 듯이 몰입할 때",
        angry: "'어쩌라고' 마인드로 아예 무시함",
        relation: "용건만 간단히, 간섭 절대 노",
        solo: "내가 좋아하는 것에 에너지 몰빵",
        core: "최소 노력으로 최대 효율 뽑기",
        sensitive: "쓸데없는 참견, 감정적인 강요",
        strength: "감정에 휩쓸리지 않는 문제 해결력",
        stress: "구구절절 긴 설명 들어야 할 때",
        twist: "자기 사람에겐 속으로 꽤 다정함",
        note: "숨 쉬는 것도 귀찮아 보이지만 한번 흥미가 생기면 무서운 집중력과 집요함을 보입니다. 인간관계도 좁고 깊어서 의외로 내 사람에겐 꽤 따뜻합니다."
      }
    };

    const heroPreviewCards = [
      { label: "행복 버튼", icon: "smile", text: "기분 좋아짐" },
      { label: "화났을 때", icon: "zap", text: "보이는 행동" },
      { label: "관계", icon: "users", text: "관계 스타일" },
      { label: "혼자모드", icon: "home", text: "혼자 있을 때" },
      { label: "핵심", icon: "star", text: "핵심 팩폭", center: true },
      { label: "예민포인트", icon: "alert", text: "극혐 포인트" },
      { label: "잘하는점", icon: "target", text: "진짜 무기" },
      { label: "스트레스", icon: "battery", text: "방전 포인트" },
      { label: "반전", icon: "switch", text: "반전 매력" }
    ];

    const resultCardMeta = [
      { key: "happy", label: "행복 버튼", icon: "smile" },
      { key: "angry", label: "화났을 때", icon: "zap" },
      { key: "relation", label: "관계", icon: "users" },
      { key: "solo", label: "혼자모드", icon: "home" },
      { key: "core", label: "핵심", icon: "star", center: true },
      { key: "sensitive", label: "예민포인트", icon: "alert" },
      { key: "strength", label: "잘하는점", icon: "target" },
      { key: "stress", label: "스트레스", icon: "battery" },
      { key: "twist", label: "반전", icon: "switch" }
    ];

    let currentQuestion = 0;
    let score = {
      E: 0, I: 0,
      S: 0, N: 0,
      T: 0, F: 0,
      J: 0, P: 0
    };

    function getIconSvg(type) {
      const icons = {
        smile: `
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <circle cx="32" cy="32" r="24"></circle>
            <path d="M20 40c4 6 12 8 24 0"></path>
            <circle cx="22" cy="24" r="3" fill="currentColor" stroke="none"></circle>
            <circle cx="42" cy="24" r="3" fill="currentColor" stroke="none"></circle>
          </svg>
        `,
        zap: `
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M36 10L16 38h16l-4 16 20-28H32z"></path>
          </svg>
        `,
        users: `
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <circle cx="24" cy="24" r="8"></circle>
            <circle cx="42" cy="26" r="6"></circle>
            <path d="M12 48c2-7 8-11 15-11s13 4 15 11"></path>
            <path d="M36 47c1.5-5 5.5-8 10-8 3 0 6 1 8 3"></path>
          </svg>
        `,
        home: `
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M10 30l22-18 22 18"></path>
            <path d="M16 28v24h32V28"></path>
            <path d="M28 52V38h8v14"></path>
          </svg>
        `,
        star: `
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M32 10l6 14 16 2-12 10 4 16-14-8-14 8 4-16-12-10 16-2z"></path>
          </svg>
        `,
        alert: `
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M32 10l22 40H10z"></path>
            <path d="M32 24v12"></path>
            <circle cx="32" cy="43" r="1.8" fill="currentColor" stroke="none"></circle>
          </svg>
        `,
        target: `
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <circle cx="32" cy="32" r="18"></circle>
            <circle cx="32" cy="32" r="10"></circle>
            <circle cx="32" cy="32" r="3" fill="currentColor" stroke="none"></circle>
          </svg>
        `,
        battery: `
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <rect x="10" y="22" width="40" height="20"></rect>
            <path d="M50 28h4v8h-4"></path>
            <path d="M18 26v12"></path>
          </svg>
        `,
        switch: `
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <path d="M12 22h30"></path>
            <path d="M34 14l8 8-8 8"></path>
            <path d="M52 42H22"></path>
            <path d="M30 34l-8 8 8 8"></path>
          </svg>
        `
      };

      return icons[type] || icons.star;
    }

    function renderHeroGrid() {
      const heroGrid = document.getElementById("heroGrid");
      heroGrid.innerHTML = "";

      heroPreviewCards.forEach(card => {
        const div = document.createElement("div");
        div.className = card.center ? "hero-card center" : "hero-card";
        div.innerHTML = `
          <div class="hero-card-top pixel-text">${card.label}</div>
          <div class="hero-card-icon">${getIconSvg(card.icon)}</div>
          <div class="hero-card-bottom">${card.text}</div>
        `;
        heroGrid.appendChild(div);
      });
    }

    function showScreen(screenId) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });
      document.getElementById(screenId).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderProgress() {
      const wrap = document.getElementById("progressCells");
      wrap.innerHTML = "";

      for (let i = 0; i < questions.length; i++) {
        const cell = document.createElement("div");
        cell.className = i < currentQuestion ? "progress-cell done" : "progress-cell";
        wrap.appendChild(cell);
      }
    }

    function startTest() {
      currentQuestion = 0;
      score = {
        E: 0, I: 0,
        S: 0, N: 0,
        T: 0, F: 0,
        J: 0, P: 0
      };
      showScreen("questionScreen");
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentQuestion];

      document.getElementById("countText").textContent = `${currentQuestion + 1} / ${questions.length}`;
      document.getElementById("qNum").textContent = `Q${currentQuestion + 1}`;
      document.getElementById("questionText").innerHTML = q.q;
      renderProgress();

      const answerArea = document.getElementById("answerArea");
      answerArea.innerHTML = "";

      q.a.forEach(answer => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer-btn";
        btn.innerHTML = answer.text;
        btn.onclick = () => selectAnswer(answer.type);
        answerArea.appendChild(btn);
      });
    }

    function selectAnswer(type) {
      score[type] += 1;
      currentQuestion += 1;

      if (currentQuestion >= questions.length) {
        setTimeout(showResult, 120);
      } else {
        renderQuestion();
      }
    }

    function getMbti() {
      const ei = score.E >= score.I ? "E" : "I";
      const sn = score.S >= score.N ? "S" : "N";
      const tf = score.T >= score.F ? "T" : "F";
      const jp = score.J >= score.P ? "J" : "P";
      return ei + sn + tf + jp;
    }

    function renderResultCards(result) {
      const resultGrid = document.getElementById("resultGrid");
      resultGrid.innerHTML = "";

      resultCardMeta.forEach(meta => {
        const card = document.createElement("div");
        card.className = meta.center ? "result-mini-card center" : "result-mini-card";
        card.innerHTML = `
          <div class="mini-top pixel-text">${meta.label}</div>
          <div class="mini-icon">${getIconSvg(meta.icon)}</div>
          <div class="mini-text">${result[meta.key]}</div>
        `;
        resultGrid.appendChild(card);
      });
    }

    function showResult() {
      const mbti = getMbti();
      const result = results[mbti];

      document.getElementById("resultTitle").textContent = result.title;
      document.getElementById("resultSub").innerHTML = result.sub;
      document.getElementById("lookText").textContent = result.outer;
      document.getElementById("hiddenText").textContent = result.inner;
      document.getElementById("bottomNote").innerHTML = result.note;

      renderResultCards(result);
      showScreen("resultScreen");
    }

    function restartTest() {
      startTest();
    }

    function shareTest() {
      const shareData = {
        title: "테스트잇 숨은 성격 찾기 테스트",
        text: "나도 몰랐던 내 안의 진짜 흑막 성격은?",
        url: testUrl
      };

      if (navigator.share) {
        navigator.share(shareData).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(testUrl).then(() => {
          alert("테스트 주소가 복사됐어요!");
        }).catch(() => {
          prompt("아래 주소를 복사해주세요.", testUrl);
        });
      } else {
        prompt("아래 주소를 복사해주세요.", testUrl);
      }
    }

    function saveResultImage() {
      const captureArea = document.getElementById("captureArea");

      document.fonts.ready.then(() => {
        return htmlToImage.toPng(captureArea, {
          pixelRatio: 2,
          cacheBust: true,
          backgroundColor: "#ffffff"
        });
      }).then(dataUrl => {
        document.getElementById("savePreview").src = dataUrl;
        document.getElementById("saveModal").classList.add("active");
      }).catch(() => {
        alert("이미지 저장 준비 중 오류가 났어요. 다시 한 번 눌러주세요.");
      });
    }

    function closeSaveModal() {
      document.getElementById("saveModal").classList.remove("active");
    }

    renderHeroGrid();
    renderProgress();
  </script>
</body>
</html>
