<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MBTI TEST 379</title>
<style>
  @font-face {
    font-family: 'RetroFont';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2304-01@1.0/MaruBuri-Regular.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
  }

  :root {
    --bg-outside: #e4e6ea;
    --board-pink: #f7d8e2;
    --board-border: #e0c2cb;
    --win-bg: #f4f4f4;
    --win-title-purple: #958bb6;
    --win-title-pink: #d69db3;
    --win-border-light: #ffffff;
    --win-border-dark: #888888;
    --win-border-black: #000000;
    --accent-mint: #b2dfdb;
    --text: #333333;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  
  body { 
    font-family: 'RetroFont', sans-serif; 
    background-color: var(--bg-outside);
    margin: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    padding: 0 0 60px 0; 
    background-image: repeating-linear-gradient(45deg, transparent, transparent 2px, rgba(0,0,0,0.02) 2px, rgba(0,0,0,0.02) 4px);
  }

  /* --- 헤더 --- */
  .header-wrapper {
    width: 100%;
    background-color: var(--win-bg); 
    border-bottom: 2px outset var(--win-border-light); 
    box-shadow: 0 1px 0 var(--win-border-dark); 
    align-self: flex-start;
    margin-bottom: 20px; 
    z-index: 50;
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
    padding: 6px 4% !important; 
  }

  .retro-logo {
    text-decoration: none;
    color: var(--text);
    font-size: 18px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 5px;
    background-color: var(--win-bg); 
    padding: 5px 10px; 
    border-top: 2px solid var(--win-border-light);
    border-left: 2px solid var(--win-border-light);
    border-right: 2px solid var(--win-border-dark);
    border-bottom: 2px solid var(--win-border-dark);
  }

  .retro-logo:active { 
    border-top: 2px solid var(--win-border-dark);
    border-left: 2px solid var(--win-border-dark);
    border-right: 2px solid var(--win-border-light);
    border-bottom: 2px solid var(--win-border-light);
    padding: 6px 9px 4px 11px; 
  }

  .page-header h1 {
    margin: 0 !important;
    padding: 0 !important;
    border-bottom: none !important;
  }

  .main-nav {
    display: flex;
    flex-wrap: nowrap !important;
    align-items: center;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: 14px; 
  }

  .main-nav li {
    margin-left: 0;
  }

  .main-nav a {
    display: block;
    text-decoration: none;
    color: var(--text);
    font-weight: 700;
    background: var(--win-bg);
    border-top: 2px solid var(--win-border-light);
    border-left: 2px solid var(--win-border-light);
    border-right: 2px solid var(--win-border-dark);
    border-bottom: 2px solid var(--win-border-dark);
    padding: 6px 12px;
    font-size: 15px; 
    white-space: nowrap;
    box-sizing: border-box;
  }

  .main-nav a:active {
    border-top: 2px solid var(--win-border-dark);
    border-left: 2px solid var(--win-border-dark);
    border-right: 2px solid var(--win-border-light);
    border-bottom: 2px solid var(--win-border-light);
    padding: 7px 11px 5px 13px; 
  }

  @media (max-width: 480px) {
    .page-header {
      padding: 6px 12px !important;
    }
    .retro-logo {
      font-size: 16px; 
      padding: 3px 8px; 
    }
    .main-nav {
      gap: 8px; 
    }
    .main-nav a {
      padding: 5px 8px; 
      font-size: 14px; 
      letter-spacing: -0.5px; 
    }
  }

  /* 콘텐츠 영역 래퍼 */
  .content-wrapper {
    width: 100%;
    max-width: 650px; 
    padding: 0 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 핑크 다이어리 보드 */
  .board-container {
    position: relative;
    width: 100%;
    background-color: var(--board-pink);
    border-radius: 20px;
    border: 3px solid #fff;
    box-shadow: 0 0 0 4px var(--board-border), 5px 5px 15px rgba(0,0,0,0.1);
    padding: 30px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 바인더 링 장식 */
  .ring-group {
    position: absolute;
    right: -12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .ring-group.top { top: 80px; }
  .ring-group.bottom { bottom: 80px; }
  
  .ring {
    width: 24px;
    height: 8px;
    background: linear-gradient(to bottom, #dcdcdc, #ffffff, #888888);
    border: 1px solid #555;
    border-radius: 4px;
    box-shadow: 2px 2px 3px rgba(0,0,0,0.2);
  }

  /* 윈도우 창 공통 레이아웃 */
  .window {
    width: 100%;
    background-color: var(--win-bg);
    border: 2px solid;
    border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
    box-shadow: 1px 1px 0 1px var(--win-border-black);
    display: none;
    flex-direction: column;
  }
  .window.active { display: flex; animation: windowOpen 0.3s ease-out; }

  @keyframes windowOpen {
    from { transform: translateY(10px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  /* 타이틀 바 */
  .title-bar {
    background-color: var(--win-title-purple);
    padding: 4px 6px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 2px solid var(--win-border-light);
  }
  .title-bar.pink { background-color: var(--win-title-pink); }
  
  .title-bar-left { display: flex; align-items: center; gap: 5px; }
  .title-icon { width: 14px; height: 14px; background: #fff; border: 1px solid #333; }
  .title-bar-text { color: white; font-weight: bold; font-size: 14px; letter-spacing: 0.5px; }
  
  .title-bar-controls { display: flex; gap: 2px; }
  .title-bar-controls button {
    width: 18px; height: 18px;
    background-color: #dfdfdf;
    border: 1px solid;
    border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
    font-size: 10px; display: flex; align-items: center; justify-content: center;
    font-weight: bold; cursor: pointer;
  }
  .title-bar-controls button:active {
    border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
  }

  /* 본문 영역 */
  .window-body { padding: 20px 15px; text-align: center; background: #ececec; border: 2px solid #fff; border-right-color: #ccc; border-bottom-color: #ccc; margin: 2px; }
  
  /* 이미지들 */
  #main-img, #result-img {
    width: 100%;
    max-width: 550px; 
    height: auto; 
    object-fit: contain; 
    border: 2px solid;
    border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
    margin: 0 auto 20px; 
    display: block;
    background-color: #fff;
  }

  /* 프로그레스 바 */
  .progress-container {
    height: 20px;
    background-color: #fff;
    border: 2px solid;
    border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
    margin-bottom: 20px;
    padding: 2px;
  }
  .progress-fill {
    height: 100%;
    background-color: var(--win-title-purple);
    width: 0%;
    transition: width 0.3s;
  }

  /* 질문 박스 */
  .question-box {
    background: #ffffff;
    border: 2px solid;
    border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
    padding: 20px 15px;
    margin-bottom: 20px;
    font-size: 16px;
    font-weight: bold;
    color: #333;
    min-height: 100px;
    display: flex; align-items: center; justify-content: center;
    word-break: keep-all;
    line-height: 1.4;
  }

  /* 버튼 그룹 */
  .btn-stack { display: flex; flex-direction: column; gap: 10px; }

  .retro-btn {
    width: 100%;
    padding: 14px 10px;
    background-color: #e2e2e2;
    border: 2px solid;
    border-color: var(--win-border-light) var(--win-border-dark) var(--win-border-dark) var(--win-border-light);
    font-family: 'RetroFont', sans-serif;
    font-size: 15px;
    color: #222;
    cursor: pointer;
    outline: none;
  }
  .retro-btn:active {
    border-color: var(--win-border-dark) var(--win-border-light) var(--win-border-light) var(--win-border-dark);
    padding: 15px 9px 13px 11px;
  }
  .retro-btn.start { font-weight: bold; background-color: var(--board-pink); border-color: #fff #c69ba8 #c69ba8 #fff; }
  .retro-btn.save { font-weight: bold; background-color: var(--win-title-pink); color: white; border-color: #fff #a17b8d #a17b8d #fff; }

  /* 쿠팡 광고 컨테이너 */
  .ad-container {
    width: 100%;
    margin-top: 20px;
    display: flex;
    justify-content: center;
  }

  /* 하단 작업 표시줄 (태스크바) */
  .taskbar {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 35px;
    background-color: #c0c0c0;
    border-top: 2px solid #fff;
    display: flex;
    align-items: center;
    padding: 0 5px;
    z-index: 100;
  }
  .start-btn {
    display: flex;
    align-items: center;
    gap: 5px;
    height: 26px;
    padding: 0 8px;
    background-color: #c0c0c0;
    border: 2px solid;
    border-color: #fff #888 #888 #fff;
    font-family: 'RetroFont', sans-serif;
    font-weight: bold;
    font-size: 12px;
  }
  .start-icon { width: 16px; height: 14px; background: #888; border: 1px solid #333; display: inline-block; }
  .taskbar-item {
    margin-left: 10px;
    display: flex;
    align-items: center;
    gap: 5px;
    height: 26px;
    padding: 0 8px;
    background-color: #dfdfdf;
    border: 2px solid;
    border-color: #888 #fff #fff #888;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="header-wrapper">
  <header class="page-header wrapper">
    <h1><a href="https://test-it.co.kr/" class="retro-logo">테스트잇</a></h1> 
    <nav>
      <ul class="main-nav">
        <li><a href="https://test-it.co.kr/test.html">성격</a></li>
        <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
        <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
        <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
      </ul>
    </nav>
  </header>
</div>

<div class="content-wrapper">
  <div class="board-container">
    <div class="ring-group top">
      <div class="ring"></div>
      <div class="ring"></div>
    </div>
    <div class="ring-group bottom">
      <div class="ring"></div>
      <div class="ring"></div>
    </div>

    <div id="main-page" class="window active">
      <div class="title-bar">
        <div class="title-bar-left">
          <div class="title-icon"></div>
          <div class="title-bar-text">Test_Start.exe</div>
        </div>
        <div class="title-bar-controls">
          <button>_</button><button>□</button><button>X</button>
        </div>
      </div>
      <div class="window-body">
        <img id="main-img" src="img_main379.png" alt="테스트잇 메인 이미지">
        <button class="retro-btn start" onclick="startTest()">테스트 시작하기</button>
      </div>
    </div>

    <div id="question-page" class="window">
      <div class="title-bar pink">
        <div class="title-bar-left">
          <div class="title-icon" style="background:#fff2f2;"></div>
          <div class="title-bar-text">Question.exe</div>
        </div>
        <div class="title-bar-controls">
          <button>_</button><button>□</button><button>X</button>
        </div>
      </div>
      <div class="window-body">
        <div class="progress-container">
          <div id="progress-bar" class="progress-fill"></div>
        </div>
        <div id="question-text" class="question-box"></div>
        <div id="answer-buttons" class="btn-stack">
          <button id="ans-btn-1" class="retro-btn"></button>
          <button id="ans-btn-2" class="retro-btn"></button>
        </div>
      </div>
    </div>

    <div id="result-page" class="window">
      <div class="title-bar">
        <div class="title-bar-left">
          <div class="title-icon"></div>
          <div class="title-bar-text">Result_Report.png</div>
        </div>
        <div class="title-bar-controls">
          <button>_</button><button>□</button><button>X</button>
        </div>
      </div>
      <div class="window-body">
        <img id="result-img" src="" alt="결과 이미지 로딩 중...">
        
        <div class="btn-stack">
          <button class="retro-btn save" onclick="showSaveGuide()">결과 이미지 저장하기</button>
          <button class="retro-btn start" onclick="goHome()">다시 해보기</button>
          <button class="retro-btn" onclick="openLink()">다른 테스트 해보기</button>
          <button class="retro-btn" onclick="share()">테스트 공유하기</button>
        </div>
      </div>
    </div>
  </div>

  <div class="ad-container" id="ad-container">
    <article class="coupang_ad mt-3">
      <script src="https://ads-partners.coupang.com/g.js"></script>
      <script>
        new PartnersCoupang.G({"id":798186,"template":"carousel","trackingCode":"AF4391881","width":"350","height":"140","tsource":""});
      </script>
    </article>
  </div>
</div>

<div class="taskbar">
  <div class="start-btn">
    <span class="start-icon"></span> Start
  </div>
  <div class="taskbar-item">
    📁 File
  </div>
</div>

<script>
  const questions = [
    { q: "친구들과 파티에 갔을 때 나는?", a: [{t: "분위기를 주도하며 신나게 논다", v: "e"}, {t: "조용한 구석에서 아는 사람과 대화한다", v: "i"}] },
    { q: "쉬는 날 계획이 취소되었다면?", a: [{t: "아쉽지만 다른 친구를 찾아본다", v: "e"}, {t: "오히려 좋아! 집에서 푹 쉰다", v: "i"}] },
    { q: "처음 보는 사람에게 나는?", a: [{t: "먼저 말을 걸고 친해지려 노력한다", v: "e"}, {t: "상대방이 먼저 말을 걸 때까지 기다린다", v: "i"}] },
    { q: "사과를 떠올리면 어떤 생각이 들어?", a: [{t: "빨갛고 맛있겠다, 아삭하겠다", v: "s"}, {t: "백설공주, 뉴턴, 아이폰이 생각난다", v: "n"}] },
    { q: "요리를 할 때 나는?", a: [{t: "레시피대로 정확한 양을 넣는다", v: "s"}, {t: "눈대중으로 대충 감에 맡긴다", v: "n"}] },
    { q: "영화가 끝나고 난 뒤 나는?", a: [{t: "재미있었다! 줄거리를 다시 생각한다", v: "s"}, {t: "만약 저 상황이 나였다면? 뒷이야기를 상상한다", v: "n"}] },
    { q: "고민을 털어놓는 친구에게 나는?", a: [{t: "해결책을 제시하며 조언해준다", v: "t"}, {t: "속상했겠다며 진심으로 공감해준다", v: "f"}] },
    { q: "더 기분 좋은 칭찬은?", a: [{t: "너 진짜 똑똑하다, 일 잘한다", v: "t"}, {t: "너 진짜 착하다, 마음이 따뜻하다", v: "f"}] },
    { q: "화가 났을 때 나는?", a: [{t: "논리적으로 무엇이 잘못됐는지 따진다", v: "t"}, {t: "상대방이 내 감정을 알아주길 바란다", v: "f"}] },
    { q: "여행을 떠나기 전 나는?", a: [{t: "시간별로 일정을 꼼꼼히 짠다", v: "j"}, {t: "큰 틀만 정하고 발길 닿는 대로 간다", v: "p"}] },
    { q: "과제가 주어졌을 때 나는?", a: [{t: "미리미리 계획해서 여유롭게 끝낸다", v: "j"}, {t: "마지막에 몰아서 폭풍처럼 끝낸다", v: "p"}] },
    { q: "책상이 정리되어 있지 않으면?", a: [{t: "집중이 안 돼서 먼저 치우고 시작한다", v: "j"}, {t: "전혀 상관없이 내 할 일을 한다", v: "p"}] }
  ];

  let currentIdx = 0;
  let scores = { e: 0, i: 0, s: 0, n: 0, t: 0, f: 0, j: 0, p: 0 };

  function showPage(pageId) {
    document.querySelectorAll('.window').forEach(win => win.classList.remove('active'));
    document.getElementById(pageId).classList.add('active');
  }

  function startTest() {
    currentIdx = 0;
    scores = { e: 0, i: 0, s: 0, n: 0, t: 0, f: 0, j: 0, p: 0 };
    showPage('question-page');
    renderQuestion();
  }

  function renderQuestion() {
    if(currentIdx >= questions.length) {
      showResult();
      return;
    }
    
    const progress = (currentIdx / questions.length) * 100;
    document.getElementById('progress-bar').style.width = progress + '%';
    
    const qData = questions[currentIdx];
    document.getElementById('question-text').innerText = qData.q;
    
    const b1 = document.getElementById('ans-btn-1');
    const b2 = document.getElementById('ans-btn-2');
    
    b1.innerText = qData.a[0].t;
    b1.onclick = () => { scores[qData.a[0].v]++; next(); };
    
    b2.innerText = qData.a[1].t;
    b2.onclick = () => { scores[qData.a[1].v]++; next(); };
  }

  function next() {
    currentIdx++;
    renderQuestion();
  }

  function showResult() {
    const mbti = 
      (scores.e >= scores.i ? 'e' : 'i') +
      (scores.s >= scores.n ? 's' : 'n') +
      (scores.t >= scores.f ? 't' : 'f') +
      (scores.j >= scores.p ? 'j' : 'p');
    
    document.getElementById('result-img').src = `img_${mbti}379.png`;
    showPage('result-page');
  }

  function goHome() {
    showPage('main-page');
  }

  function openLink() {
    window.location.href = 'https://testit.kr';
  }

  function share() {
    if (navigator.share) {
      navigator.share({ title: 'MBTI 379 TEST', url: window.location.href });
    } else {
      alert("링크가 복사되었습니다!");
    }
  }

  function showSaveGuide() {
    alert("이미지를 꾹 누르면 저장할 수 있습니다");
  }
</script>

</body>
</html>
