<body>
  <header class="page-header">

    <nav class="main-nav">

    </nav>
  </header>

  <main class="wrapper">
    <section id="mainScreen" class="screen active">
      <div class="window-card">
        <div class="window-bar"></div>
        <div class="window-icons">
          <div class="window-icon">−</div>
          <div class="window-icon">×</div>
        </div>
        <img class="main-img" src="img_main386.png" alt="테스트 메인 이미지">
      </div>
      <button class="start-btn" type="button" onclick="startTest()">테스트 시작하기</button>
    </section>

    <section id="questionScreen" class="screen">
      <div class="question-card">
        <div class="progress-wrap">
          <div id="progress" class="progress"></div>
        </div>
        <div id="qNum" class="q-num"></div>
        <div id="question" class="question"></div>
        <div id="answers" class="answer-list"></div>
      </div>
    </section>

    <section id="resultScreen" class="screen">
      <img id="resultImage" class="result-img" src="" alt="결과 이미지">

      <div class="button-group">
        <button class="action-btn" type="button" onclick="saveResultImage()">결과 이미지 저장하기</button>
        <button class="action-btn" type="button" onclick="restartTest()">다시 해보기</button>
        <button class="action-btn" type="button" onclick="goOtherTest()">다른 테스트 해보기</button>
        <button class="action-btn" type="button" onclick="shareTest()">테스트 공유하기</button>
      </div>

      <div class="ad-container" id="ad-container-page1">

          new PartnersCoupang.G({
            "id": 798186,
            "template": "carousel",
            "trackingCode": "AF4391881",
            "width": "350",
            "height": "140",
            "tsource": ""

  <div id="captureModal" class="capture-modal">
    <div class="capture-box">
      <p>이미지를 꾹 눌러 저장해주세요</p>
      <img id="capturePreview" src="" alt="결과 저장 이미지">
      <button class="close-btn" type="button" onclick="closeCapture()">닫기</button>
    </div>
  </div>

  <script>
    const questions = [
      {
        q: "쉬는 날 갑자기 시간이 비었다",
        a: [
          { text: "누군가에게 연락해서 약속부터 잡음", type: "E" },
          { text: "혼자 편하게 보낼 계획부터 생각함", type: "I" }
        ]
      },
      {
        q: "친구가 신기한 꿈 얘기를 해준다",
        a: [
          { text: "신기한 꿈 꿨네 하고 끝", type: "S" },
          { text: "무슨 의미 있는 꿈인가 찾아봄", type: "N" }
        ]
      },
      {
        q: "친구가 새 옷을 입고 와서<br>어떠냐고 묻는다",
        a: [
          { text: "안 어울리면 솔직히 말함", type: "T" },
          { text: "너무 이상하지 않으면 괜찮다고 해줌", type: "F" }
        ]
      },
      {
        q: "일주일 뒤에 약속이 잡혔다",
        a: [
          { text: "미리 시간과 일정 생각해둠", type: "J" },
          { text: "가까워지면 생각해도 된다고 느낌", type: "P" }
        ]
      },
      {
        q: "친구랑 헤어진 뒤 집 가는 길",
        a: [
          { text: "오늘 재밌었다 아직도 신나있음", type: "E" },
          { text: "혼자 있는 시간이 반가움", type: "I" }
        ]
      },
      {
        q: "물건을 살 때 더 중요한 건?",
        a: [
          { text: "기능, 가격, 후기", type: "S" },
          { text: "느낌, 취향, 끌림", type: "N" }
        ]
      },
      {
        q: "나 요즘 너무 무기력해. 퇴사할까?<br>라고 하는 친구에게",
        a: [
          { text: "이직할 곳은 정해놨어? 모아둔 돈은 있고?", type: "T" },
          { text: "많이 힘들어? 회사 사람들이 괴롭혀?", type: "F" }
        ]
      },
      {
        q: "배달 메뉴를 고를 때 나는?",
        a: [
          { text: "빨리 정하고 주문함", type: "J" },
          { text: "끝까지 고민하다 늦어짐", type: "P" }
        ]
      },
      {
        q: "새로운 사람과 친해질 때 나는?",
        a: [
          { text: "대화를 자주 하면서 금방 가까워진다", type: "E" },
          { text: "시간을 두고 천천히 마음을 연다", type: "I" }
        ]
      },
      {
        q: "갑자기 좀비 사태가 터진다면?",
        a: [
          { text: "그럴 일이 없어서 몰입이 안 됨", type: "S" },
          { text: "마트로 가야 하나? 진지하게 고민함", type: "N" }
        ]
      },
      {
        q: "결정을 내려야 할 때<br>내가 더 믿는 기준은?",
        a: [
          { text: "논리적으로 맞는지<br>손해는 없는지", type: "T" },
          { text: "내 마음이 불편하지 않은지<br>후회 안 할지", type: "F" }
        ]
      },
      {
        q: "바탕화면이나 카톡 알림 숫자 상태는?",
        a: [
          { text: "알림 떠 있는 거 절대 못 봄<br>싹 다 읽음 처리", type: "J" },
          { text: "카톡 999+, 메일 9999+<br>전혀 타격 없음", type: "P" }
        ]
      }
    ];

    let current = 0;

    const score = {
      E: 0, I: 0,
      S: 0, N: 0,
      T: 0, F: 0,
      J: 0, P: 0
    };

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(function(screen) {
        screen.classList.remove("active");
      });
      document.getElementById(id).classList.add("active");
      window.scrollTo(0, 0);
    }

    function resetTest() {
      current = 0;
      Object.keys(score).forEach(function(key) {
        score[key] = 0;
      });
      document.getElementById("progress").style.width = "0%";
      document.getElementById("answers").innerHTML = "";
      document.getElementById("question").innerHTML = "";
      document.getElementById("qNum").innerHTML = "";
    }

    function startTest() {
      resetTest();
      showScreen("questionScreen");
      renderQuestion();
    }

    function renderQuestion() {
      const item = questions[current];

      document.getElementById("qNum").innerHTML = (current + 1) + " / " + questions.length;
      document.getElementById("question").innerHTML = item.q;
      document.getElementById("progress").style.width = (current / questions.length * 100) + "%";

      const answers = document.getElementById("answers");
      answers.innerHTML = "";

      item.a.forEach(function(answer) {
        const btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.type = "button";
        btn.innerHTML = answer.text;
        btn.onclick = function() {
          selectAnswer(answer.type);
        };
        answers.appendChild(btn);
      });
    }

    function selectAnswer(type) {
      score[type] += 1;
      current += 1;

      if (current >= questions.length) {
        document.getElementById("progress").style.width = "100%";
        showResult();
      } else {
        renderQuestion();
      }
    }

    function showResult() {
      const mbti =
        (score.E >= score.I ? "e" : "i") +
        (score.S >= score.N ? "s" : "n") +
        (score.T >= score.F ? "t" : "f") +
        (score.J >= score.P ? "j" : "p");

      document.getElementById("resultImage").src = "img_" + mbti + "386.png";
      showScreen("resultScreen");
    }

    function restartTest() {
      resetTest();
      document.getElementById("resultImage").src = "";
      showScreen("mainScreen");
    }

    function goOtherTest() {
      location.href = "https://test-it.co.kr/";
    }

    function shareTest() {
      const shareUrl = "https://test-it.co.kr/test386";
      const shareTitle = "테스트잇 이미지 프로필 성격 테스트";

      if (navigator.share) {
        navigator.share({
          title: shareTitle,
          text: shareTitle,
          url: shareUrl
        }).catch(function() {});
      } else {
        navigator.clipboard.writeText(shareUrl).then(function() {
          alert("테스트 링크가 복사되었습니다.");
        });
      }
    }

    function saveResultImage() {
      const target = document.getElementById("resultImage");

      html2canvas(target, {
        backgroundColor: null,
        scale: 2,
        useCORS: true
      }).then(function(canvas) {
        document.getElementById("capturePreview").src = canvas.toDataURL("image/png");
        document.getElementById("captureModal").classList.add("active");
      });
    }

    function closeCapture() {
      document.getElementById("captureModal").classList.remove("active");
    }
  </script>
</body>
</html>
