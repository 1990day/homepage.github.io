<!DOCTYPE html>
<html lang="ko">
<head>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-5522499110435321" crossorigin="anonymous"></script>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테스트잇 과일탱 성격 테스트</title>
  <meta name="description" content="테스트잇 과일탱 성격 테스트" />
  <meta name="keywords" content="테스트잇,성격테스트,과일탱성격테스트,과일탱,과일성격테스트,테스트잇과일탱성격테스트,mbti테스트,심리테스트">
  <meta property="og:type" content="website" />
  <meta property="og:title" content="테스트잇 과일탱 성격 테스트" />
  <meta property="og:description" content="내 성격은 어떤 과일탱일까? 상큼하게 알아보는 과일탱 성격 테스트" />
  <meta property="og:url" content="https://test-it.co.kr/test397" />
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>

  <style>
    :root {
      --ink: #4c4447;
      --soft-ink: #7c6f73;
      --white: #ffffff;
      --bg: #fff8ee;
      --line: #d6cfd1;
      --line-soft: #ece4e6;
      --pink: #ffe7ef;
      --yellow: #fff4bc;
      --peach: #ffe8d8;
      --mint: #e4f8ef;
      --sky: #e9f5ff;
      --lavender: #f1ebff;
      --shadow: rgba(188, 172, 176, 0.18);

      --result-bg: #fffdf8;
      --result-line: #cfc8cb;
      --result-soft: #f6f1f2;
      --result-card: #fbfbfb;
      --result-card-2: #ffffff;
      --result-point: #ff8ea8;
      --result-text: #4c4447;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.55) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.55) 1px, transparent 1px),
        var(--bg);
      background-size: 12px 12px;
      color: var(--ink);
      font-family: "NeoDunggeunmo", "Malgun Gothic", "맑은 고딕", sans-serif;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button {
      font-family: "NeoDunggeunmo", "Malgun Gothic", "맑은 고딕", sans-serif;
      border-radius: 0;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: background-color 0.12s ease, transform 0.08s ease;
    }

    button:active {
      transform: translate(1px, 1px);
    }

    .pixel-text {
      font-family: "NeoDunggeunmo", "Malgun Gothic", "맑은 고딕", sans-serif;
      font-weight: 400;
      letter-spacing: -0.4px;
    }

    .wrap {
      width: 100%;
      min-height: 100vh;
    }

    header {
      width: 100%;
      height: 52px;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.9);
      display: flex;
      justify-content: center;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(6px);
    }

    .header-inner {
      width: 100%;
      max-width: 540px;
      padding: 0 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 18px;
      color: #ff8aa6;
    }

    .nav {
      display: flex;
      gap: 12px;
      font-size: 14px;
      color: var(--soft-ink);
      white-space: nowrap;
    }

    main {
      width: 100%;
      max-width: 540px;
      margin: 0 auto;
      padding: 22px 14px 34px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
      animation: fadeIn 0.18s ease-out;
    }

    @keyframes fadeIn {
      0% { opacity: 0; transform: translateY(3px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .soft-frame {
      width: 100%;
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.83);
      padding: 10px;
      box-shadow: 4px 4px 0 var(--shadow);
    }

    .hero-box {
      border: 1px solid #f0e4c8;
      background:
        radial-gradient(circle at 14% 16%, #fff4bc 0 6px, transparent 7px),
        radial-gradient(circle at 82% 20%, #ffe6ef 0 7px, transparent 8px),
        radial-gradient(circle at 18% 84%, #e4f8ef 0 6px, transparent 7px),
        radial-gradient(circle at 82% 78%, #e9f5ff 0 7px, transparent 8px),
        #fffef9;
      padding: 16px 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .hero-title-box {
      border: 1px solid #f0e4c8;
      background: rgba(255,255,255,0.88);
      text-align: center;
      padding: 14px 10px 12px;
    }

    .hero-kicker {
      display: inline-block;
      margin-bottom: 8px;
      padding: 5px 9px;
      background: var(--yellow);
      border: 1px solid #f5e5ac;
      color: #d49557;
      font-size: 12px;
      line-height: 1;
    }

    .hero-title {
      margin: 0;
      font-size: 24px;
      line-height: 1.25;
      color: #ff82a1;
      letter-spacing: -1px;
      word-break: keep-all;
    }

    .hero-desc {
      margin: 10px 0 0;
      font-size: 13px;
      line-height: 1.45;
      color: var(--soft-ink);
      word-break: keep-all;
    }

    .fruit-board {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .fruit-chip {
      border: 1px solid #ece4e6;
      background: rgba(255,255,255,0.84);
      min-height: 82px;
      padding: 8px 4px 7px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 6px;
    }

    .fruit-chip-name {
      font-size: 11px;
      line-height: 1.15;
      text-align: center;
      word-break: keep-all;
    }

    .start-btn {
      width: 100%;
      min-height: 54px;
      border: 1px solid #efe3c0;
      background: #fff1a8;
      color: #725d63;
      font-size: 16px;
      margin-top: 14px;
      box-shadow: 3px 3px 0 rgba(236, 215, 137, 0.35);
    }

    .start-btn:hover {
      background: #ffe98f;
    }

    .question-card {
      border: 1px solid var(--line-soft);
      background: rgba(255,255,255,0.86);
      padding: 12px;
      box-shadow: 4px 4px 0 var(--shadow);
    }

    .question-head {
      border: 1px solid #ece4e6;
      background: #fffdf8;
      padding: 10px;
      margin-bottom: 12px;
    }

    .question-head-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      margin-bottom: 9px;
      color: #df8c7f;
    }

    .progress-cells {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 4px;
    }

    .progress-cell {
      height: 13px;
      border: 1px solid #ebe2e4;
      background: #ffffff;
    }

    .progress-cell.done {
      background: #ffe7ef;
    }

    .q-mark {
      width: fit-content;
      margin: 0 auto 10px;
      padding: 6px 14px;
      border: 1px solid #ebe2e4;
      background: #fff4f8;
      color: #ff8aa6;
      font-size: 14px;
    }

    .question-text {
      margin: 0 0 10px;
      min-height: 96px;
      border: 1px solid #ece4e6;
      background: #fffefb;
      padding: 16px 12px;
      font-size: 18px;
      line-height: 1.45;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      word-break: keep-all;
      color: var(--ink);
      letter-spacing: -0.6px;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .answer-btn {
      width: 100%;
      min-height: 64px;
      border: 1px solid #ece4e6;
      color: var(--ink);
      padding: 12px;
      font-size: 14px;
      line-height: 1.4;
      text-align: center;
      word-break: keep-all;
      background: #ffffff;
    }

    .answer-btn:nth-child(1) {
      background: #fff3f8;
    }

    .answer-btn:nth-child(2) {
      background: #fff8dd;
    }

    .answer-btn:hover {
      background: #eefaf3;
    }

    /* 결과창 폰트 최우선 맑은 고딕 적용 (가독성 향상) */
    .capture-card,
    .capture-card * {
      font-family: "Malgun Gothic", "맑은 고딕", sans-serif !important;
      letter-spacing: normal !important;
    }

    .capture-card {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      border: 1px solid var(--result-line);
      background:
        linear-gradient(90deg, rgba(255,255,255,0.36) 1px, transparent 1px),
        linear-gradient(0deg, rgba(255,255,255,0.36) 1px, transparent 1px),
        var(--result-bg);
      background-size: 10px 10px;
      padding: 10px;
      min-width: 0;
      color: var(--result-text);
    }

    .capture-card.capture-ready {
      width: 420px !important;
      max-width: 420px !important;
    }

    .capture-top-title {
      border: 1px dashed var(--result-line);
      background: var(--result-soft);
      color: var(--result-text);
      padding: 11px 8px;
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .result-top-grid {
      display: grid;
      grid-template-columns: 1fr 1.55fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .result-top-box,
    .result-center-box,
    .trait-box,
    .match-box {
      border: 1px dashed var(--result-line);
      background: var(--result-card);
    }

    .result-top-box {
      min-height: 136px;
      padding: 10px 8px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }

    .top-label {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 11px;
      font-weight: bold;
      color: var(--result-text);
      background: var(--result-soft);
      padding: 4px 7px;
      border: 1px dashed var(--result-line);
    }

    .top-text {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
      word-break: keep-all;
      color: var(--result-text);
    }

    .result-center-box {
      min-height: 136px;
      padding: 12px 8px 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .result-title {
      margin: 10px 0 0;
      font-size: 26px;
      font-weight: 800;
      line-height: 1.15;
      text-align: center;
      color: var(--result-point);
      word-break: keep-all;
    }

    .trait-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .trait-box {
      min-height: 112px;
      padding: 10px 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .trait-box:nth-child(odd) {
      background: var(--result-card);
    }

    .trait-box:nth-child(even) {
      background: var(--result-card-2);
    }

    .trait-text {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
      word-break: keep-all;
      color: var(--result-text);
    }

    .match-box {
      padding: 12px 10px;
      background: var(--result-soft);
    }

    .match-title {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: var(--result-text);
      margin-bottom: 10px;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .match-card {
      border: 1px dashed var(--result-line);
      background: var(--result-card);
      padding: 10px 8px;
      text-align: center;
      min-height: 88px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .match-label {
      display: inline-block;
      margin: 0 auto 8px;
      padding: 4px 8px;
      font-size: 11px;
      font-weight: bold;
      background: var(--result-card-2);
      border: 1px dashed var(--result-line);
      color: var(--result-text);
    }

    .match-text {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.45;
      word-break: keep-all;
      color: var(--result-text);
    }

    .button-area {
      width: 100%;
      max-width: 420px;
      margin: 14px auto 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result-btn {
      width: 100%;
      min-height: 52px;
      border: 1px solid #ebe2e4;
      background: rgba(255,255,255,0.9);
      color: var(--ink);
      font-size: 15px;
    }

    .result-btn:hover {
      background: #fff3f8;
    }

    .ad-box {
      width: 350px;
      max-width: 100%;
      height: 140px;
      margin: 18px auto 0;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .save-modal {
      position: fixed;
      inset: 0;
      background: rgba(76, 68, 71, 0.82);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 18px 14px;
      overflow-y: auto;
    }

    .save-modal.active {
      display: flex;
    }

    .save-box {
      width: 100%;
      max-width: 390px;
      border: 1px solid #ece4e6;
      background: #fffdf8;
      padding: 18px;
      text-align: center;
      margin: auto;
      box-shadow: 4px 4px 0 var(--shadow);
    }

    .save-box h3 {
      margin: 0 0 10px;
      font-size: 20px;
      line-height: 1.3;
      color: #ff8aa6;
    }

    .save-box p {
      margin: 0 0 18px;
      font-size: 14px;
      line-height: 1.45;
      word-break: keep-all;
      color: var(--soft-ink);
    }

    .save-preview-wrap {
      width: 100%;
      max-width: 290px;
      margin: 0 auto 18px;
      border: 1px solid #ece4e6;
      background: #ffffff;
      padding: 0;
    }

    .save-preview {
      display: block;
      width: 100%;
      height: auto;
      border: 0;
      background: #ffffff;
    }

    .close-btn {
      width: 100%;
      height: 48px;
      border: 1px solid #ece4e6;
      background: #fff3f8;
      color: var(--ink);
      font-size: 15px;
    }

    .close-btn:hover {
      background: #ffe7ef;
    }

    .fruit-pixel {
      --fruit-a: #ff8aa7;
      --fruit-b: #e76080;
      --fruit-c: #fff4bd;
      --fruit-l: #85cf79;
      --fruit-w: #ffffff;
      width: 42px;
      height: 42px;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(9, 1fr);
      gap: 1px;
      image-rendering: pixelated;
    }

    .fruit-pixel.big {
      width: 76px;
      height: 76px;
      gap: 2px;
    }

    .pix {
      display: block;
      width: 100%;
      height: 100%;
      background: transparent;
    }

    .pix.a { background: var(--fruit-a); }
    .pix.b { background: var(--fruit-b); }
    .pix.c { background: var(--fruit-c); }
    .pix.l { background: var(--fruit-l); }
    .pix.w { background: var(--fruit-w); }
    .pix.s { background: #fff7be; }
    .pix.d { background: rgba(255,255,255,0.72); }
    .pix.p { background: #ff9bb5; }
    .pix.g { background: #8edb9a; }
    .pix.y { background: #ffd85f; }
    .pix.o { background: #ffb25b; }
    .pix.r { background: #e94f68; }
    .pix.f { background: #cc7aa9; }

    .fruit-strawberry { --fruit-a: #ff86a2; --fruit-b: #f26686; --fruit-l: #72c66f; }
    .fruit-cherry { --fruit-a: #f25d71; --fruit-b: #d9435b; --fruit-l: #68bd68; }
    .fruit-lemon { --fruit-a: #ffe77a; --fruit-b: #f5cf47; --fruit-l: #83c86b; }
    .fruit-orange { --fruit-a: #ffb25b; --fruit-b: #f18d3d; --fruit-l: #74c874; }
    .fruit-grape { --fruit-a: #b898f1; --fruit-b: #9875dc; --fruit-l: #77c779; }
    .fruit-watermelon { --fruit-a: #ff8fa8; --fruit-b: #6fd59a; --fruit-l: #73c96e; }
    .fruit-melon { --fruit-a: #c9ee91; --fruit-b: #a8dc73; --fruit-l: #74c874; }
    .fruit-blueberry { --fruit-a: #88baf7; --fruit-b: #6297df; --fruit-l: #75bd7a; }
    .fruit-peach { --fruit-a: #ffb3a6; --fruit-b: #f6938a; --fruit-l: #79c775; }
    .fruit-kiwi { --fruit-a: #91d76e; --fruit-b: #6fbd55; --fruit-c: #f7f1bd; --fruit-l: #7bc974; }
    .fruit-pineapple { --fruit-a: #ffd76c; --fruit-b: #eeb946; --fruit-l: #7bc974; }
    .fruit-plum { --fruit-a: #c080c8; --fruit-b: #a763b3; --fruit-l: #76c774; }
    .fruit-pomegranate { --fruit-a: #ec6174; --fruit-b: #cf3f58; --fruit-l: #74c874; }
    .fruit-dragonfruit { --fruit-a: #ff8fbd; --fruit-b: #f06aa5; --fruit-c: #ffffff; --fruit-l: #7bc974; }
    .fruit-greenapple { --fruit-a: #b7eb66; --fruit-b: #97d74f; --fruit-l: #75c774; }
    .fruit-fig { --fruit-a: #d28ab8; --fruit-b: #b96fa3; --fruit-l: #77c775; }

    @media (max-width: 420px) {
      main {
        padding: 16px 10px 28px;
      }

      .header-inner {
        padding: 0 10px;
      }

      .logo {
        font-size: 17px;
      }

      .nav {
        gap: 8px;
        font-size: 13px;
      }

      .hero-title {
        font-size: 21px;
      }

      .fruit-board {
        gap: 6px;
      }

      .fruit-chip {
        min-height: 74px;
        padding: 7px 3px 6px;
      }

      .fruit-chip-name {
        font-size: 10px;
      }

      .fruit-pixel {
        width: 35px;
        height: 35px;
      }

      .fruit-pixel.big {
        width: 64px;
        height: 64px;
      }

      .question-text {
        min-height: 88px;
        font-size: 17px;
        padding: 14px 10px;
      }

      .answer-btn {
        font-size: 13px;
        min-height: 62px;
      }

      .result-top-grid {
        gap: 8px;
      }

      .result-top-box,
      .result-center-box {
        min-height: 122px;
      }

      .result-title {
        font-size: 24px; /* 살짝 조정 */
      }

      .trait-grid {
        gap: 8px;
      }

      .trait-box {
        min-height: 98px;
        padding: 8px 6px;
      }

      .trait-text,
      .top-text,
      .match-text {
        font-size: 12px; /* 모바일 환경 가독성 고려 */
      }

      .top-label,
      .match-label {
        font-size: 11px;
      }

      .save-box {
        max-width: 330px;
        padding: 14px;
      }

      .save-box h3 {
        font-size: 18px;
      }

      .save-preview-wrap {
        max-width: 230px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="header-inner">
        <a href="https://test-it.co.kr/" class="logo pixel-text">테스트잇</a>
        <nav class="nav pixel-text">
          <a href="https://test-it.co.kr/test.html">성격</a>
          <a href="https://test-it.co.kr/face.html">얼굴</a>
          <a href="https://test-it.co.kr/etc.html">그외</a>
          <a href="https://test-it.co.kr/saju.html">사주</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="screen active" id="mainScreen">
        <div class="soft-frame">
          <div class="hero-box">
            <div class="hero-title-box">
              <div class="hero-kicker pixel-text">FRUIT TANG TEST</div>
              <h1 class="hero-title pixel-text">테스트잇<br>과일탱 성격 테스트</h1>
              <p class="hero-desc">상큼한 과일 중에서<br>나와 가장 닮은 과일탱은 누구일까?</p>
            </div>

            <div class="fruit-board" id="fruitBoard"></div>
          </div>
        </div>

        <button type="button" class="start-btn pixel-text" onclick="startTest()">테스트 시작하기</button>
      </section>

      <section class="screen" id="questionScreen">

    let currentQuestion = 0;
    let score = {
      E: 0, I: 0,
      S: 0, N: 0,
      T: 0, F: 0,
      J: 0, P: 0
    };

    function resetScore() {
      currentQuestion = 0;
      score = {
        E: 0, I: 0,
        S: 0, N: 0,
        T: 0, F: 0,
        J: 0, P: 0
      };
    }

    function getPixelFruit(key, sizeClass) {
      const pattern = pixelPatterns[key] || pixelPatterns.strawberry;
      const fruit = fruitByKey[key] || fruitByKey.strawberry;
      let cells = "";

      pattern.forEach(row => {
        row.split("").forEach(ch => {
          if (ch === ".") {
            cells += '<span class="pix empty"></span>';
          } else {
            cells += '<span class="pix ' + ch + '"></span>';
          }
        });
      });

      return '<div class="fruit-pixel fruit-' + key + ' ' + (sizeClass || "") + '" role="img" aria-label="' + fruit.name + '">' + cells + '</div>';
    }

    function renderFruitBoard() {
      const board = document.getElementById("fruitBoard");
      board.innerHTML = fruitList.map(item => {
        return `
          <div class="fruit-chip">
            ${getPixelFruit(item.key, "")}
            <div class="fruit-chip-name pixel-text">${item.name}</div>
          </div>
        `;
      }).join("");
    }

    function renderProgress() {
      const wrap = document.getElementById("progressCells");
      let cells = "";

      for (let i = 0; i < questions.length; i++) {
        cells += '<div class="progress-cell ' + (i <= currentQuestion ? "done" : "") + '"></div>';
      }

      wrap.innerHTML = cells;
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });
      document.getElementById(id).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function startTest() {
      resetScore();
      showScreen("questionScreen");
      renderQuestion();
    }

    function renderQuestion() {
      const item = questions[currentQuestion];

      document.getElementById("countText").textContent = (currentQuestion + 1) + " / " + questions.length;
      document.getElementById("qNum").textContent = "Q" + (currentQuestion + 1);
      document.getElementById("questionText").innerHTML = item.q;

      const answerArea = document.getElementById("answerArea");
      answerArea.innerHTML = "";

      item.a.forEach(answer => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "answer-btn pixel-text";
        btn.innerHTML = answer.text;
        btn.onclick = function () {
          chooseAnswer(answer.type);
        };
        answerArea.appendChild(btn);
      });

      renderProgress();
    }

    function chooseAnswer(type) {
      score[type] += 1;

      if (currentQuestion < questions.length - 1) {
        currentQuestion += 1;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function getMbti() {
      const ei = score.E > score.I ? "E" : "I";
      const sn = score.S > score.N ? "S" : "N";
      const tf = score.T > score.F ? "T" : "F";
      const jp = score.J > score.P ? "J" : "P";
      return ei + sn + tf + jp;
    }

    function applyFruitResultPalette(result) {
      const captureArea = document.getElementById("captureArea");
      const palette = fruitResultPalettes[result.key] || fruitResultPalettes.strawberry;

      captureArea.style.setProperty("--result-bg", palette.bg);
      captureArea.style.setProperty("--result-line", palette.line);
      captureArea.style.setProperty("--result-soft", palette.soft);
      captureArea.style.setProperty("--result-card", palette.card);
      captureArea.style.setProperty("--result-card-2", palette.card2);
      captureArea.style.setProperty("--result-point", palette.point);
      captureArea.style.setProperty("--result-text", palette.text);
    }

    function showResult() {
      const mbti = getMbti();
      const result = results[mbti] || results.ENFJ;

      applyFruitResultPalette(result);

      document.getElementById("resultFruit").innerHTML = getPixelFruit(result.key, "big");
      document.getElementById("resultTitle").textContent = result.title;
      document.getElementById("lookText").innerHTML = result.outer;
      document.getElementById("hiddenText").innerHTML = result.inner;
      document.getElementById("goodMatchText").textContent = result.goodMatch;
      document.getElementById("badMatchText").textContent = result.badMatch;

      const grid = document.getElementById("resultGrid");
      grid.innerHTML = result.traits.map(text => {
        return `
          <div class="trait-box">
            <div class="trait-text">${text}</div>
          </div>
        `;
      }).join("");

      showScreen("resultScreen");
    }

    function restartTest() {
      resetScore();
      showScreen("mainScreen");
      renderProgress();
    }

    function shareTest() {
      const shareData = {
        title: "테스트잇 과일탱 성격 테스트",
        text: "내 성격은 어떤 과일탱일까?",
        url: testUrl
      };

      if (navigator.share) {
        navigator.share(shareData).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(testUrl).then(() => {
          alert("테스트 링크가 복사됐어요.");
        }).catch(() => {
          alert("공유가 지원되지 않는 브라우저예요.");
        });
      } else {
        alert("공유가 지원되지 않는 브라우저예요.");
      }
    }

    function saveResultImage() {
      const captureArea = document.getElementById("captureArea");

      if (!window.htmlToImage) {
        alert("이미지 저장 기능을 불러오는 중이에요. 잠시 후 다시 눌러주세요.");
        return;
      }

      captureArea.classList.add("capture-ready");

      const ready = document.fonts && document.fonts.ready ? document.fonts.ready : Promise.resolve();

      ready.then(() => {
        const width = 420;
        const height = Math.ceil(captureArea.scrollHeight);

        return htmlToImage.toPng(captureArea, {
          pixelRatio: 2,
          cacheBust: true,
          backgroundColor: "#fffdf8",
          width: width,
          height: height,
          canvasWidth: width * 2,
          canvasHeight: height * 2,
          style: {
            width: width + "px",
            maxWidth: width + "px",
            margin: "0",
            transform: "none"
          }
        });
      }).then(dataUrl => {
        document.getElementById("savePreview").src = dataUrl;
        document.getElementById("saveModal").classList.add("active");
      }).catch(() => {
        alert("이미지 저장 준비 중 오류가 났어요. 다시 한 번 눌러주세요.");
      }).finally(() => {
        captureArea.classList.remove("capture-ready");
      });
    }

    function closeSaveModal() {
      document.getElementById("saveModal").classList.remove("active");
    }

    renderFruitBoard();
    renderProgress();
  </script>
