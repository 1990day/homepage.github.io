<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트잇 - 봄꽃 성격 테스트</title>
<style>
  /* 기본 배경 및 컨테이너 설정 */
  body.container {
    background-color: #fff4f7; /* 봄 느낌의 아주 연한 핑크 배경 (유리 질감 헤더를 위해) */
    color: #333;
    font-family: 'Pretendard', -apple-system, sans-serif;
    margin: 0 auto;
    max-width: 420px;
    min-height: 100vh;
    box-shadow: 0 0 30px rgba(255, 118, 165, 0.1);
    position: relative;
  }

  .page-shell {
    width: 100%;
    height: 100%;
  }

  /* --- 유저 요청 테스트잇 고정 헤더 CSS --- */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 14px !important;
    padding-bottom: 12px !important;
    padding-left: 4%;
    padding-right: 4%;
    border-bottom: 1px solid rgba(255,255,255,0.38);
    position: relative;
    background: rgba(255,255,255,0.4); /* 배경색이 살짝 비치도록 투명도 조정 */
    backdrop-filter: blur(10px);
    z-index: 10;
  }

  .page-header h1 {
    margin: 0 !important;
    line-height: 1;
  }

  .logo {
    width: 86px;
    display: block;
  }

  .main-nav {
    display: flex;
    flex-wrap: nowrap !important;
    align-items: center;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: 8px;
  }

  .main-nav a {
    display: block;
    text-decoration: none;
    color: #4e5775;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 999px;
    padding: 8px 12px;
    font-size: 13px;
    white-space: nowrap;
    box-shadow: 0 8px 20px rgba(145, 145, 185, 0.12);
    transition: all 0.2s ease;
  }

  .main-nav a:hover {
    background: rgba(255,255,255,0.92);
    transform: translateY(-1px);
  }
  /* --------------------------------------- */

  /* 콘텐츠 영역 여백 */
  .content-area {
    padding: 30px 20px 40px;
  }

  .screen { display: none; }
  .screen.active { display: block; }

  h2.main-title {
    font-size: 1.5rem;
    text-align: center;
    margin-top: 0;
    margin-bottom: 10px;
    color: #222;
  }

  .sub-text {
    text-align: center;
    color: #777;
    margin-bottom: 25px;
    font-size: 0.95rem;
  }

  /* 메인/결과 이미지 영역 (깔끔한 정방형) */
  .image-box {
    width: 100%;
    aspect-ratio: 1 / 1;
    background-color: #fff;
    border-radius: 16px;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ff9cbd;
    font-weight: bold;
    font-size: 1.1rem;
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
  }

  button {
    width: 100%;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid #ffe4ec;
    border-radius: 12px;
    background-color: #fff;
    color: #444;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    word-break: keep-all;
    line-height: 1.4;
    box-shadow: 0 2px 8px rgba(0,0,0,0.02);
  }
  
  button:hover, button:active {
    background-color: #ff76a5;
    color: #fff;
    border-color: #ff76a5;
  }

  .primary-btn {
    background-color: #ff76a5;
    color: #fff;
    border: none;
    font-size: 1.1rem;
    padding: 18px;
    box-shadow: 0 4px 15px rgba(255, 118, 165, 0.3);
  }

  .primary-btn:hover {
    background-color: #ff5c93;
  }

  /* 프로그래스 바 */
  .progress-wrapper {
    margin-bottom: 30px;
  }

  .progress-text {
    text-align: center;
    font-size: 0.85rem;
    color: #ff76a5;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .progress-container {
    width: 100%;
    background-color: #fff;
    border-radius: 20px;
    height: 6px;
  }

  .progress-bar {
    height: 100%;
    background-color: #ff76a5;
    border-radius: 20px;
    width: 0%;
    transition: width 0.4s ease;
  }

  .question-text {
    font-size: 1.25rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 40px;
    line-height: 1.5;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #222;
  }

  /* 결과창 스타일 */
  .result-subtitle {
    text-align: center;
    font-size: 1rem;
    color: #777;
    margin-bottom: 5px;
  }

  .result-title {
    text-align: center;
    font-size: 1.8rem;
    font-weight: 900;
    color: #ff76a5;
    margin-bottom: 25px;
  }

  .traits-container {
    background-color: #fff;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.03);
  }

  .traits-container h3 {
    margin-top: 0;
    font-size: 1.1rem;
    color: #333;
    margin-bottom: 15px;
    text-align: center;
  }

  .trait-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .trait-list li {
    position: relative;
    padding-left: 20px;
    margin-bottom: 12px;
    font-size: 0.95rem;
    line-height: 1.5;
    color: #444;
  }

  .trait-list li::before {
    content: '🌸';
    position: absolute;
    left: 0;
    top: 1px;
    font-size: 0.75rem;
  }

  .vertical-buttons {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
</style>
</head>
<body class="container">
  <div class="page-shell">
    
    <header class="page-header wrapper">
      <h1><a href="index.html"><img class="logo" src="img_logo.png" alt="test it"></a></h1>
      <nav>
        <ul class="main-nav">
          <li><a href="https://test-it.co.kr/test.html">성격</a></li>
          <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
          <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
          <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
        </ul>
      </nav>
    </header>

    <div class="content-area">
      <div id="start-screen" class="screen active">
        <h2 class="main-title">나를 닮은 봄꽃은?</h2>
        <p class="sub-text">나의 성향과 찰떡인 봄꽃 알아보기</p>
        <div class="image-box">메인 이미지 자리</div>
        <button class="primary-btn" onclick="startTest()">테스트 시작하기</button>
      </div>

      <div id="question-screen" class="screen">
        <div class="progress-wrapper">
          <div id="progress-text" class="progress-text">1 / 12</div>
          <div class="progress-container">
            <div id="progress" class="progress-bar"></div>
          </div>
        </div>
        <div id="question" class="question-text"></div>
        <button id="btn-a" onclick="nextQuestion(0)"></button>
        <button id="btn-b" onclick="nextQuestion(1)"></button>
      </div>

      <div id="result-screen" class="screen">
        <div class="result-subtitle">당신과 꼭 닮은 봄꽃은...</div>
        <div id="flower-name" class="result-title"></div>
        <div class="image-box">결과 이미지 자리</div>
        
        <div class="traits-container">
          <h3>성격 특징 10가지</h3>
          <ul id="trait-list" class="trait-list">
            </ul>
        </div>
        
        <div class="vertical-buttons">
          <button onclick="saveImage()">결과 이미지 저장하기</button>
          <button onclick="location.reload()">다시 해보기</button>
          <button onclick="goOtherTests()">다른 테스트 해보기</button>
          <button onclick="shareTest()">테스트 공유하기</button>
        </div>
      </div>
    </div>
  </div>

<script>

  function startTest() {
    document.getElementById('start-screen').classList.remove('active');
    document.getElementById('question-screen').classList.add('active');
    updateQuestion();
  }

  function updateQuestion() {
    const progressPercent = ((currentQuestion) / 12) * 100;
    document.getElementById('progress').style.width = progressPercent + '%';
    document.getElementById('progress-text').innerText = `${currentQuestion + 1} / 12`;

    const qna = qnaList[currentQuestion];
    document.getElementById('question').innerHTML = qna.q;
    document.getElementById('btn-a').innerText = qna.a[0].text;
    document.getElementById('btn-b').innerText = qna.a[1].text;
  }

  function nextQuestion(choiceIndex) {
    const type = qnaList[currentQuestion].a[choiceIndex].type;
    scores[type]++;
    
    currentQuestion++;
    
    if (currentQuestion < 12) {
      updateQuestion();
    } else {
      document.getElementById('progress').style.width = '100%';
      document.getElementById('progress-text').innerText = '12 / 12';
      setTimeout(showResult, 400); 
    }
  }

  function showResult() {
    document.getElementById('question-screen').classList.remove('active');
    document.getElementById('result-screen').classList.add('active');
    
    const mbti = (scores.E > scores.I ? "E" : "I") +
                 (scores.S > scores.N ? "S" : "N") +
                 (scores.T > scores.F ? "T" : "F") +
                 (scores.J > scores.P ? "J" : "P");

    const myFlower = results[mbti];
    
    document.getElementById('flower-name').innerText = myFlower.flower;
    
    const traitListUl = document.getElementById('trait-list');
    traitListUl.innerHTML = '';
    
    myFlower.traits.forEach(trait => {
      const li = document.createElement('li');
      li.innerText = trait;
      traitListUl.appendChild(li);
    });
  }
