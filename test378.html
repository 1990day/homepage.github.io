<head>

<style>
    @font-face {
        font-family: 'Galmuri14';
        src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_20-10-21@1.0/Galmuri14.woff') format('woff');
        font-weight: normal;
        font-style: normal;
    }

    :root {
        --bg-color: #ffd1dc; 
        --pink-wall: #e6e6fa; 
        --floor-dot: #cdaee0; 

        --win-gray: #d4d0c8; 
        --win-bg: #dfdbd4; 
        --win-light: #ffffff; 
        --win-dark: #808080; 
        --win-deep: #404040; 

        --title-pink-1: #ffb6c1; 
        --title-pink-2: #dda0dd; 

        --text-main: #000000; 
        --text-soft: #222222; 
        --point-pink: #8b008b; 
    }

    * {
        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Galmuri14', sans-serif;
        min-height: 100vh;
        color: var(--text-main);
        display: flex;
        flex-direction: column;
        align-items: center;
        overflow-x: hidden;
        background: linear-gradient(180deg, var(--bg-color) 0%, var(--pink-wall) 100%);
        position: relative;
        -webkit-font-smoothing: none;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: crispEdges;
    }

    body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        background: radial-gradient(circle at 1px 1px, var(--floor-dot) 1.5px, transparent 1.5px);
        background-size: 18px 18px;
        opacity: 0.6;
        z-index: 0;
    }

    .stars {
        display: none;
    }

    .header-wrapper {
        width: 100%;
        background: var(--win-gray);
        border-bottom: 2px solid var(--win-deep);
        box-shadow: 0 1px 0 var(--win-light) inset;
        position: relative;
        z-index: 20;
    }

    .page-header {
        max-width: 1100px;
        margin: 0 auto;
        padding: 12px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .page-header h1 {
        margin: 0;
        padding: 0;
        display: flex;
        align-items: center;
    }

    .retro-logo {
        text-decoration: none;
        color: var(--text-main);
        font-size: 20px;
        text-shadow: 1px 1px 0 #fff;
    }

    .main-nav {
        display: flex;
        list-style: none;
        margin: 0;
        padding: 0;
        gap: 8px;
        flex-wrap: nowrap;
    }

    .main-nav a {
        text-decoration: none;
        color: var(--text-main);
        font-size: 15px;
        padding: 8px 12px;
        background: var(--win-gray);
        border-top: 2px solid var(--win-light);
        border-left: 2px solid var(--win-light);
        border-right: 2px solid var(--win-dark);
        border-bottom: 2px solid var(--win-dark);
        white-space: nowrap;
    }

    .layout-container {
        width: 100%;
        max-width: 560px;
        padding: 28px 14px 42px;
        display: flex;
        flex-direction: column;
        align-items: center;
        position: relative;
        z-index: 10;
    }

    .space-terminal {
        width: 100%;
        background: var(--win-gray);
        border-top: 3px solid var(--win-light);
        border-left: 3px solid var(--win-light);
        border-right: 3px solid var(--win-deep);
        border-bottom: 3px solid var(--win-deep);
        box-shadow: 6px 6px 0 rgba(0, 0, 0, 0.15);
        overflow: hidden;
        position: relative;
    }

    .terminal-header {
        background: linear-gradient(90deg, var(--title-pink-1) 0%, var(--title-pink-2) 100%);
        padding: 8px 14px;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .terminal-title {
        color: #000;
        font-size: clamp(13px, 4vw, 17px);
        font-weight: bold;
        display: flex;
        align-items: center;
        gap: 6px;
        white-space: nowrap;
    }

    .terminal-controls {
        display: flex;
        gap: 5px;
        align-items: center;
    }

    .terminal-controls span {
        display: inline-block;
        width: 20px;
        height: 20px;
        background: var(--win-gray);
        border-top: 2px solid var(--win-light);
        border-left: 2px solid var(--win-light);
        border-right: 2px solid var(--win-dark);
        border-bottom: 2px solid var(--win-dark);
        position: relative;
    }

    .terminal-controls span:nth-child(1)::before {
        content: "_";
        position: absolute;
        left: 50%;
        top: 35%;
        transform: translate(-50%, -50%);
        font-size: 14px;
        color: var(--text-main);
    }

    .terminal-controls span:nth-child(2)::before {
        content: "□";
        position: absolute;
        left: 50%;
        top: 45%;
        transform: translate(-50%, -50%);
        font-size: 14px;
        color: var(--text-main);
    }

    .terminal-controls span:nth-child(3)::before {
        content: "×";
        position: absolute;
        left: 50%;
        top: 48%;
        transform: translate(-50%, -50%);
        font-size: 16px;
        color: var(--text-main);
    }

    .terminal-content {
        background: var(--win-bg);
        padding: 24px 18px;
        min-height: 480px; 
        position: relative;
    }

    .screen {
        display: none;
        flex-direction: column;
        height: 100%;
        position: relative;
        z-index: 1;
    }

    .screen.active {
        display: flex;
    }

    h2 {
        text-align: center;
        font-size: 26px;
        color: var(--point-pink);
        margin: 10px 0 22px;
        line-height: 1.45;
    }

    .intro-text {
        font-size: 17px;
        line-height: 1.8;
        text-align: center;
        margin-bottom: 18px;
        color: var(--text-main);
        background: var(--win-gray);
        border-top: 2px solid var(--win-dark);
        border-left: 2px solid var(--win-dark);
        border-right: 2px solid var(--win-light);
        border-bottom: 2px solid var(--win-light);
        padding: 14px 16px;
        word-break: keep-all;
    }

    .scanner-monitor {
        background: var(--win-gray);
        border-top: 2px solid var(--win-dark);
        border-left: 2px solid var(--win-dark);
        border-right: 2px solid var(--win-light);
        border-bottom: 2px solid var(--win-light);
        padding: 12px;
        margin-bottom: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .scanner-screen {
        background: #111;
        height: 140px;
        position: relative;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        border-top: 3px solid var(--win-deep);
        border-left: 3px solid var(--win-deep);
        border-right: 3px solid var(--win-light);
        border-bottom: 3px solid var(--win-light);
    }

    .scan-icon {
        font-size: 52px;
        opacity: 0.9;
        filter: drop-shadow(0 0 12px #ffb6c1);
        animation: pulseIcon 2s infinite;
    }

    .scan-line {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 3px;
        background: rgba(221, 160, 221, 0.8);
        box-shadow: 0 0 15px 3px rgba(221, 160, 221, 0.6);
        animation: scanMove 2.5s linear infinite;
        z-index: 2;
    }

    .scanner-grid {
        position: absolute;
        inset: 0;
        background-image: 
            linear-gradient(rgba(255, 255, 255, 0.1) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255, 255, 255, 0.1) 1px, transparent 1px);
        background-size: 20px 20px;
        z-index: 1;
    }

    .scanner-text {
        font-size: 14px;
        color: #000;
        font-family: 'Galmuri14', sans-serif;
        text-align: left;
        line-height: 1.6;
        background: #fff;
        padding: 8px 10px;
        border: 1px solid var(--win-dark);
    }

    @keyframes scanMove {
        0% { top: 0; opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { top: 100%; opacity: 0; }
    }

    @keyframes pulseIcon {
        0% { transform: scale(0.95); opacity: 0.6; }
        50% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(0.95); opacity: 0.6; }
    }

    .input-line {
        margin-bottom: 20px;
    }

    .input-line label {
        display: block;
        margin-bottom: 8px;
        font-size: 16px;
        color: var(--text-main);
    }

    input[type="text"],
    select {
        width: 100%;
        min-height: 50px;
        padding: 10px 14px;
        background: #f5f5f5;
        color: var(--text-main);
        font-family: 'Galmuri14', sans-serif;
        font-size: 17px;
        border-top: 2px solid var(--win-dark);
        border-left: 2px solid var(--win-dark);
        border-right: 2px solid var(--win-light);
        border-bottom: 2px solid var(--win-light);
        outline: none;
        appearance: none;
        -webkit-appearance: none;
        border-radius: 0;
    }

    input[type="text"]::placeholder {
        color: #999999;
    }

    input[type="text"]:focus,
    select:focus {
        background: #ffffff;
    }

    .date-row {
        display: flex;
        gap: 8px;
    }

    .radio-group {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }

    .radio-group input {
        display: none;
    }

    .radio-group label {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 50px;
        background: var(--win-gray);
        color: var(--text-main);
        font-size: 17px;
        cursor: pointer;
        border-top: 2px solid var(--win-light);
        border-left: 2px solid var(--win-light);
        border-right: 2px solid var(--win-dark);
        border-bottom: 2px solid var(--win-dark);
    }

    .radio-group input:checked + label {
        background: #e6ccff; 
        border-top: 2px solid var(--win-dark);
        border-left: 2px solid var(--win-dark);
        border-right: 2px solid var(--win-light);
        border-bottom: 2px solid var(--win-light);
    }

    .btn-action {
        width: 100%;
        min-height: 58px;
        margin-top: 15px;
        background: #e6ccff; 
        color: #000;
        font-family: 'Galmuri14', sans-serif;
        font-size: 19px;
        cursor: pointer;
        border-top: 2px solid var(--win-light);
        border-left: 2px solid var(--win-light);
        border-right: 2px solid var(--win-dark);
        border-bottom: 2px solid var(--win-dark);
        border-radius: 0;
        box-shadow: 1px 1px 0 var(--win-deep);
    }

    .btn-action:active {
        border-top: 2px solid var(--win-dark);
        border-left: 2px solid var(--win-dark);
        border-right: 2px solid var(--win-light);
        border-bottom: 2px solid var(--win-light);
        transform: translateY(1px);
        box-shadow: none;
    }

    .result-header {
        text-align: center;
        margin-bottom: 20px;
    }

    /* 플렉스박스 버그 원천 차단: inline-block으로 아날로그 방식 적용 */
    .search-bar-style {
        display: inline-block; 
        background: var(--win-gray);
        color: var(--text-main);
        min-height: 46px;
        padding: 10px 16px;
        font-size: 16px;
        border-top: 2px solid var(--win-dark);
        border-left: 2px solid var(--win-dark);
        border-right: 2px solid var(--win-light);
        border-bottom: 2px solid var(--win-light);
        line-height: 1.5;
        word-break: keep-all;
        text-align: center;
    }

    .search-icon {
        font-size: 18px;
        vertical-align: middle;
        margin-right: 4px;
    }

    /* 캡처 증발 방지 */
    .res-name {
        color: #8b008b !important;
        font-weight: bold;
    }

    .data-card-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px; 
        padding-bottom: 10px;
    }

    .data-card {
        background: var(--win-gray);
        min-height: 145px;
        padding: 24px 10px 12px;
        text-align: center;
        position: relative;
        border-top: 2px solid var(--win-light);
        border-left: 2px solid var(--win-light);
        border-right: 2px solid var(--win-dark);
        border-bottom: 2px solid var(--win-dark);
        box-shadow: 2px 2px 0 var(--win-deep); 
        display: flex;
        flex-direction: column;
        justify-content: flex-start;
        align-items: center;
    }

    .data-card::before {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        height: 18px;
        background: var(--card-color);
        border-bottom: 2px solid var(--win-dark);
    }

    .card-icon {
        font-size: 32px;
        margin-top: 4px;
        margin-bottom: 8px;
    }

    .card-title {
        font-size: 15px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text-main);
        background: var(--win-bg);
        border: 1px solid var(--win-dark); 
        padding: 4px 8px;
        line-height: 1.4;
    }

    .card-desc {
        font-size: 15px;
        line-height: 1.45;
        word-break: keep-all;
        margin: 0;
        color: #000000;
        font-weight: bold;
        padding: 0 2px;
        letter-spacing: -0.3px;
    }

    .external-buttons {
        margin-top: 24px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        width: 100%;
        z-index: 10;
    }

    .btn-outside {
        width: 100%;
        min-height: 56px;
        background: var(--win-gray);
        color: var(--text-main);
        font-family: 'Galmuri14', sans-serif;
        font-size: 17px;
        cursor: pointer;
        border-top: 2px solid var(--win-light);
        border-left: 2px solid var(--win-light);
        border-right: 2px solid var(--win-dark);
        border-bottom: 2px solid var(--win-dark);
        border-radius: 0;
        box-shadow: 1px 1px 0 var(--win-deep);
    }

    .btn-outside:active {
        border-top: 2px solid var(--win-dark);
        border-left: 2px solid var(--win-dark);
        border-right: 2px solid var(--win-light);
        border-bottom: 2px solid var(--win-light);
        transform: translateY(1px);
        box-shadow: none;
    }

    #imageModal {
        position: fixed;
        inset: 0;
        background: rgba(40, 10, 20, 0.85);
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        padding: 20px;
    }

    #modalImage {
        max-width: 90%;
        max-height: 70vh;
        border-top: 3px solid var(--win-light);
        border-left: 3px solid var(--win-light);
        border-right: 3px solid var(--win-dark);
        border-bottom: 3px solid var(--win-dark);
        background: var(--win-gray);
    }

    .modal-text {
        color: #fff;
        margin-top: 20px;
        margin-bottom: 20px;
        font-size: 16px;
    }

    .modal-close {
        background: var(--win-gray);
        color: var(--text-main);
        padding: 16px 32px;
        font-family: inherit;
        font-size: 16px;
        cursor: pointer;
        border-top: 2px solid var(--win-light);
        border-left: 2px solid var(--win-light);
        border-right: 2px solid var(--win-dark);
        border-bottom: 2px solid var(--win-dark);
        border-radius: 0;
    }

    .ad-container {
        width: 100%;
        display: flex;
        justify-content: center;
        margin-top: 20px;
        z-index: 10;
    }

    @media (max-width: 480px) {
        .page-header {
            padding: 12px 10px;
            flex-direction: row; 
            justify-content: space-between;
            align-items: center;
        }

        .main-nav {
            gap: 4px;
        }

        .main-nav a {
            font-size: 13px;
            padding: 6px 6px;
        }

        .retro-logo {
            font-size: 17px;
        }

        .layout-container {
            padding: 20px 12px 30px;
        }

        .terminal-content {
            padding: 20px 14px;
            min-height: 460px; 
        }

        h2 {
            font-size: 24px;
        }

        .intro-text {
            font-size: 15px;
            padding: 12px;
        }

        .scanner-screen {
            height: 120px;
        }
        
        .scan-icon {
            font-size: 46px;
        }

        .scanner-text {
            font-size: 13px;
        }

        .search-bar-style {
            font-size: 15px;
            min-height: 42px;
            padding: 10px 12px;
        }

        .data-card-grid {
            gap: 10px; 
        }

        .data-card {
            min-height: 135px;
            padding: 22px 6px 10px;
        }

        .card-icon {
            font-size: 28px;
            margin-top: 0px;
            margin-bottom: 6px;
        }

        .card-title {
            font-size: 14px;
            padding: 4px 6px;
            margin-bottom: 6px;
        }

        .card-desc {
            font-size: 14px;
            line-height: 1.35;
        }
    }
</style>
</head>
<body>

<div class="stars" id="starfield"></div>

  <div class="header-wrapper">
    <header class="page-header wrapper">
      <h1><a href="https://test-it.co.kr/" class="retro-logo">테스트잇</a></h1> 
      <nav>
        <ul class="main-nav">
          <li><a href="https://test-it.co.kr/test.html">성격</a></li>
          <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
          <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
          <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
        </ul>
      </nav>
    </header>
  </div>

<div class="layout-container">
    <div class="space-terminal" id="captureArea">
        <div class="terminal-header">
            <div class="terminal-title">테스트잇 내 사주의 세포들 테스트</div>
            <div class="terminal-controls">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="terminal-content">
            <div id="screen-start" class="screen active">
                <h2>사주 세포 탐색기</h2>
                <div class="intro-text">
                    사주를 스캔하여 핵심 세포 8가지를 추출합니다.
                </div>
                
                <div class="scanner-monitor">
                    <div class="scanner-screen">
                        <div class="scanner-grid"></div>
                        <div class="scan-line"></div>
                        <div class="scan-icon">🔮</div>
                    </div>
                    <div class="scanner-text">
                        > Loading system modules...<br>
                        > Ready to scan cell data_<br>
                    </div>
                </div>

                <button class="btn-action" onclick="showScreen('screen-input')">테스트 시작하기</button>
            </div>

            <div id="screen-input" class="screen">
                <div style="flex-grow:1;">
                    <h2 style="font-size:22px;">[정보를 입력해주세요]</h2>

                    <div class="input-line">
                        <label>▶ 이름이나 닉네임</label>
                        <input type="text" id="userName" placeholder="이름을 입력하세요">
                    </div>

                    <div class="input-line">
                        <label>▶ 양력/음력</label>
                        <div class="radio-group">
                            <input type="radio" name="calendar" id="solar" value="solar" checked>
                            <label for="solar">양력</label>

                            <input type="radio" name="calendar" id="lunar" value="lunar">
                            <label for="lunar">음력</label>
                        </div>
                    </div>

                    <div class="input-line">
                        <label>▶ 생년월일</label>
                        <div class="date-row">
                            <select id="year"></select>
                            <select id="month"></select>
                            <select id="day"></select>
                        </div>
                    </div>

                    <div class="input-line">
                        <label>▶ 태어난 시간</label>
                        <select id="time">
                            <option value="-1">모름 (선택 안함)</option>
                            <option value="0">자시(23:30~01:29)</option>
                            <option value="2">축시(01:30~03:29)</option>
                            <option value="4">인시(03:30~05:29)</option>
                            <option value="6">묘시(05:30~07:29)</option>
                            <option value="8">진시(07:30~09:29)</option>

<script>
    function initDropdowns() {
        const ySel = document.getElementById("year");
        const mSel = document.getElementById("month");
        const dSel = document.getElementById("day");

        for (let i = 2024; i >= 1950; i--) {
            const o = document.createElement("option");
            o.value = i;
            o.text = i + "년";
            if (i === 1995) o.selected = true;
            ySel.appendChild(o);
        }

        for (let i = 1; i <= 12; i++) {
            const o = document.createElement("option");
            o.value = i;
            o.text = i + "월";
            mSel.appendChild(o);
        }

        for (let i = 1; i <= 31; i++) {
            const o = document.createElement("option");
            o.value = i;
            o.text = i + "일";
            dSel.appendChild(o);
        }
    }

    function showScreen(id) {
        document.querySelectorAll(".screen").forEach(screen => screen.classList.remove("active"));
        document.getElementById(id).classList.add("active");

        if (id === "screen-start" || id === "screen-input" || id === "screen-loading") {
            document.getElementById("externalButtons").style.display = "none";
        } else if (id === "screen-result") {
            document.getElementById("externalButtons").style.display = "flex";
        }
    }

    function resetApp() {
        document.getElementById("userName").value = "";
        showScreen("screen-start");
    }

function shareTest() {
        const targetUrl = 'https://test-it.co.kr/test378';
        
        const shareData = {
            title: '테스트잇 내 사주의 세포들 테스트',
            text: '테스트잇 내 사주의 세포들 테스트',
            url: targetUrl
        };

        if (navigator.share) {
            navigator.share(shareData).catch((error) => console.log('공유 실패:', error));
        } else {
            navigator.clipboard.writeText(targetUrl).then(() => {
                alert('테스트 링크가 복사되었습니다!');
            });
        }
    }

    let currentSeed = 0;

    function seededRandom() {
        const x = Math.sin(currentSeed++) * 10000;
        return x - Math.floor(x);
    }

    function shuffleArray(array) {
        const arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(seededRandom() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function hasAnyChar(pool, targets) {
        return targets.some(char => pool.includes(char));
    }

    function getGanList(chars) {
        return chars.filter((_, i) => i % 2 === 0);
    }

    function getZhiList(chars) {
        return chars.filter((_, i) => i % 2 !== 0);
    }

    const getElementInfo = (char) => {
        const map = {
            "甲":"목", "乙":"목", "寅":"목", "卯":"목",
            "丙":"화", "丁":"화", "巳":"화", "午":"화",
            "戊":"토", "己":"토", "辰":"토", "戌":"토", "丑":"토", "未":"토",
            "庚":"금", "辛":"금", "申":"금", "酉":"금",
            "壬":"수", "癸":"수", "亥":"수", "子":"수"
        };
        return map[char] || "";
    };

    const getDetailDeity = (myGan, targetChar) => {
        const yinYang = {
            "甲":"+", "丙":"+", "戊":"+", "庚":"+", "壬":"+",
            "寅":"+", "辰":"+", "巳":"+", "申":"+", "戌":"+", "亥":"+",
            "乙":"-", "丁":"-", "己":"-", "辛":"-", "癸":"-",
            "卯":"-", "丑":"-", "午":"-", "未":"-", "酉":"-", "子":"-"
        };

        const myE = getElementInfo(myGan);
        const tE = getElementInfo(targetChar);
        const myY = yinYang[myGan];
        const tY = yinYang[targetChar];
        const sameYinYang = myY === tY;

        if (myE === tE) return sameYinYang ? "비견" : "겁재";
        if ((myE === "목" && tE === "화") || (myE === "화" && tE === "토") || (myE === "토" && tE === "금") || (myE === "금" && tE === "수") || (myE === "수" && tE === "목")) return sameYinYang ? "식신" : "상관";
        if ((myE === "목" && tE === "토") || (myE === "화" && tE === "금") || (myE === "토" && tE === "수") || (myE === "금" && tE === "목") || (myE === "수" && tE === "화")) return sameYinYang ? "편재" : "정재";
        if ((myE === "목" && tE === "금") || (myE === "화" && tE === "수") || (myE === "토" && tE === "목") || (myE === "금" && tE === "화") || (myE === "수" && tE === "토")) return sameYinYang ? "편관" : "정관";
        if ((myE === "목" && tE === "수") || (myE === "화" && tE === "목") || (myE === "토" && tE === "화") || (myE === "금" && tE === "토") || (myE === "수" && tE === "금")) return sameYinYang ? "편인" : "정인";
        return "";
    };

        showScreen("screen-loading");

        loadingText.innerHTML = "> 사주 분석 시작_<br>> 모든 세포 스캔 중...";
        
        setTimeout(() => {
            loadingText.innerHTML += "<br>> 사주 세포 추출 진행 중_";
        }, 1000);

        setTimeout(() => {
            loadingText.innerHTML += "<br>> 스캔 완료! 결과를 로드합니다.";
        }, 2000);

        setTimeout(() => {
            showScreen("screen-result");
        }, 3000);
    }

    function calculateResult() {
        const name = document.getElementById("userName").value.trim();
        if (!name) {
            alert("이름을 입력해주세요.");
            return;
        }

        const isSolar = document.getElementById("solar").checked;
        const year = parseInt(document.getElementById("year").value, 10);
        const month = parseInt(document.getElementById("month").value, 10);
        const day = parseInt(document.getElementById("day").value, 10);
        const timeOption = parseInt(document.getElementById("time").value, 10);
        const hour = timeOption === -1 ? 12 : timeOption;

        currentSeed = year * 1000000 + month * 10000 + day * 100 + hour;

        let date;
        if (isSolar) {
            date = Solar.fromYmdHms(year, month, day, hour, 0, 0).getLunar();
        } else {
            date = Lunar.fromYmdHms(year, month, day, hour, 0, 0);
        }

        const bazi = date.getEightChar();
        const chars = [
            bazi.getYearGan(),
            bazi.getYearZhi(),
            bazi.getMonthGan(),
            bazi.getMonthZhi(),
            bazi.getDayGan(),
            bazi.getDayZhi()
        ];

        if (timeOption !== -1) {
            chars.push(bazi.getTimeGan(), bazi.getTimeZhi());
        }

        const dayGan = bazi.getDayGan();
        const dayZhi = bazi.getDayZhi();
        const monthZhi = bazi.getMonthZhi();
        const zhiStr = chars.filter((c, i) => i % 2 !== 0).join("");
        const dayPillar = dayGan + dayZhi;
        const ganList = getGanList(chars);
        const zhiList = getZhiList(chars);

        const elements = {"목":0,"화":0,"토":0,"금":0,"수":0};
        const deities = {"비견":0,"겁재":0,"식신":0,"상관":0,"편재":0,"정재":0,"편관":0,"정관":0,"편인":0,"정인":0};

        chars.forEach(char => {
            const el = getElementInfo(char);
            if (el) elements[el]++;

            const deity = getDetailDeity(dayGan, char);
            if (deity) deities[deity]++;
        });

        const highPriorityCells = [];

        // 수정됨: 도화, 역마, 화개는 2개 이상일 때만 나오도록 조건 강화
        const dohwaCount = zhiList.filter(z => ["子","午","卯","酉"].includes(z)).length;
        if (dohwaCount >= 2) highPriorityCells.push({i:"🌸",n:"도화세포",d:"가만히 있어도 시선을 끄는 마성의 매력"});

        if (hwagaeCount >= 2) highPriorityCells.push({i:"🎭",n:"화개세포",d:"뛰어난 예술적 감각과 감성적인 내면"});

        if (["甲午","丙寅","丁未","戊辰","庚戌","辛酉","壬子"].includes(dayPillar)) {
            highPriorityCells.push({i:"💋",n:"홍염세포",d:"특정 사람을 지독하게 홀려버리는 끌림"});
        }

        const guimunPairs = [["子","酉"],["丑","午"],["寅","未"],["卯","申"],["辰","亥"],["巳","戌"]];

    function saveAsImage() {
        const wrapper = document.getElementById("captureArea");

        // 브라우저가 화면에 이름을 완전히 새겨넣을 시간을 0.5초(500ms)로 늘렸습니다.
        setTimeout(() => {
            html2canvas(wrapper, {
                scale: 2,
                backgroundColor: "#dfdbd4", // 투명 대신 배경색을 확실히 지정
                useCORS: true
            }).then(canvas => {
                document.getElementById("modalImage").src = canvas.toDataURL("image/png");
                document.getElementById("imageModal").style.display = "flex";
            }).catch(err => {
                console.log("캡처 에러: ", err);
            });
        }, 500);
    }

    function closeModal() {
        document.getElementById("imageModal").style.display = "none";
    }
