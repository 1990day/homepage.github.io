<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트잇 사주 만세력 프로필 테스트</title>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  
  @font-face {
    font-family: 'Umdot';
    src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/Umdot12.woff2') format('woff2');
    font-weight: normal;
    font-display: swap;
}

  :root {
    --bg-blue: #9ac2e5; 
    --folder-yellow: #fff5c0; 
    --line-color: #1e3a8a; 
    --text-main: #1e3a8a;
    --text-sub: #3b5998;
    --white: #ffffff;
    --accent-red: #e11d48; 
    
    --wood-bg: #d3f9d8; --wood-txt: #2b8a3e;
    --fire-bg: #ffe3e3; --fire-txt: #c92a2a;
    --earth-bg: #ffebb3; --earth-txt: #d97706;
    --metal-bg: #f1f3f5; --metal-txt: #495057;
    --water-bg: #d0ebff; --water-txt: #0b7285;

    --win-bg: #dfdfdf;
    --win-border-light: #ffffff;
    --win-border-dark: #808080;
  }

  body {
    font-family: 'Umdot', sans-serif;
    background-color: var(--bg-blue);
    background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 15px 15px;
    margin: 0;
    padding: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    color: var(--text-main);
    min-height: 100vh;
  }

  .header-wrapper {
    width: 100%;
    background-color: var(--bg-blue);
    border-bottom: 2px solid var(--line-color);
  }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
    padding: 6px 4% !important; 
  }

  .retro-logo {
    text-decoration: none;
    color: #000;
    font-size: 18px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 5px;
    background-color: var(--win-bg); 
    padding: 5px 10px; 
    border-top: 2px solid var(--win-border-light);
    border-left: 2px solid var(--win-border-light);
    border-right: 2px solid var(--win-border-dark);
    border-bottom: 2px solid var(--win-border-dark);
  }

  .retro-logo:active { 
    border-top: 2px solid var(--win-border-dark);
    border-left: 2px solid var(--win-border-dark);
    border-right: 2px solid var(--win-border-light);
    border-bottom: 2px solid var(--win-border-light);
    padding: 6px 9px 4px 11px; 
  }

  .page-header h1 {
    margin: 0 !important;
    padding: 0 !important;
    border-bottom: none !important;
  }

  .main-nav {
    display: flex;
    flex-wrap: nowrap !important;
    align-items: center;
    list-style: none;
    margin: 0;
    padding: 0;
    gap: 12px; 
  }

  .main-nav li {
    margin-left: 0;
  }

  .main-nav a {
    display: block;
    text-decoration: none;
    color: #000;
    font-weight: 700;
    background: var(--win-bg);
    border-top: 2px solid var(--win-border-light);
    border-left: 2px solid var(--win-border-light);
    border-right: 2px solid var(--win-border-dark);
    border-bottom: 2px solid var(--win-border-dark);
    padding: 4px 10px;
    font-size: 14px; 
    white-space: nowrap;
    box-sizing: border-box;
  }

  .main-nav a:active {
    border-top: 2px solid var(--win-border-dark);
    border-left: 2px solid var(--win-border-dark);
    border-right: 2px solid var(--win-border-light);
    border-bottom: 2px solid var(--win-border-light);
    padding: 5px 9px 3px 11px; 
  }

  @media (max-width: 480px) {
    .page-header {
      padding: 6px 12px !important;
    }
    .retro-logo {
      font-size: 16px; 
      padding: 3px 8px; 
    }
    .main-nav {
      gap: 6px; 
    }
    .main-nav a {
      padding: 4px 6px; 
      font-size: 13px; 
      letter-spacing: -0.5px; 
    }
  }

  #app {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 15px;
    box-sizing: border-box;
  }

  .screen {
    display: none;
    width: 100%;
    flex-direction: column;
    animation: fadeIn 0.4s ease-out;
  }

  .screen.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  #capture-area {
    width: 100%;
    background-color: var(--bg-blue);
    background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 15px 15px;
    padding: 30px 15px 15px 15px;
    box-sizing: border-box;
    margin-bottom: 20px;
  }

  .folder-wrapper {
    width: 100%;
    position: relative;
  }

  .folder-tab {
    width: auto;
    min-width: 130px;
    height: 35px;
    background-color: var(--folder-yellow);
    border: 2px solid var(--line-color);
    border-bottom: none;
    margin-left: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 800;
    color: var(--line-color);
    position: relative;
    z-index: 2;
    padding: 0 15px;
  }

  .folder-body {
    background-color: var(--folder-yellow);
    border: 2px solid var(--line-color);
    padding: 25px 20px;
    box-shadow: 4px 6px 0px rgba(30, 58, 138, 0.15);
    position: relative;
    z-index: 1;
    margin-top: -2px;
  }

  .folder-inner {
    border: 2px dashed #d1d5db;
    border-color: rgba(30, 58, 138, 0.3);
    padding: 20px;
    background-color: transparent;
  }

  .sticker-title {
    background-color: var(--white);
    border: 2px solid var(--line-color);
    padding: 10px 15px;
    font-size: 22px;
    font-weight: 800;
    text-align: center;
    color: var(--line-color);
    box-shadow: 3px 3px 0px var(--line-color);
    transform: rotate(-2deg);
    margin: 10px auto 30px auto;
    width: max-content;
  }

  .main-desc {
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-sub);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    background-color: var(--white);
    color: var(--line-color);
    border: 2px solid var(--line-color);
    border-radius: 0;
    box-shadow: 3px 3px 0px var(--line-color);
    font-family: 'Pretendard', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.1s;
  }

  .btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0px var(--line-color);
  }
  
  .btn-highlight {
    background-color: var(--line-color);
    color: var(--white);
    box-shadow: 3px 3px 0px var(--text-sub);
  }

  .btn-col-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    padding: 0 15px;
    box-sizing: border-box;
  }

  .form-group-full {
    margin-bottom: 15px;
    background-color: var(--white);
    border: 2px solid var(--line-color);
    padding: 10px 15px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 5px;
  }
  
  .form-group-full.row-style {
    flex-direction: row;
    align-items: center;
    justify-content: space-between;
  }

  .form-group-full label {
    font-size: 14px;
    font-weight: 700;
    color: var(--line-color);
    white-space: nowrap;
  }
  
  .form-group-full.row-style label {
    margin-right: 15px;
  }

  .form-group-full.row-style input {
    width: 60%;
  }

  .form-inline-group {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  .input-item {
    flex: 1;
    background-color: var(--white);
    border: 2px solid var(--line-color);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    min-width: 0;
  }

  .input-item label {
    font-size: 12px;
    font-weight: 700;
    color: var(--line-color);
    margin-bottom: 5px;
  }

  select, input[type="text"] {
    width: 100%;
    padding: 8px;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    font-weight: 600;
    background-color: #f8fafc;
    border: 1.5px solid var(--line-color);
    border-radius: 0;
    color: var(--line-color);
    box-sizing: border-box;
  }

  select {
    cursor: pointer;
  }

  select:focus, input[type="text"]:focus {
    outline: none;
    background-color: #fff;
  }

  .profile-table {
    width: 100%;
    background-color: var(--white);
    border: 2px solid var(--line-color);
  }

  .saju-top-area {
    display: flex;
    border-bottom: 2px solid var(--line-color);
  }

  .ilju-title-box {
    width: 35%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 800;
    border-right: 2px solid var(--line-color);
    background-color: #eff6ff;
    padding: 0 10px;
    text-align: center;
    word-break: break-all;
  }

  .palja-grid-box {
    width: 65%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
  }

  .palja-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    border-right: 2px solid var(--line-color);
    border-bottom: 2px solid var(--line-color);
    padding: 12px 0;
  }

  .palja-cell:nth-child(4n) { border-right: none; }
  .palja-cell:nth-child(n+5) { border-bottom: none; }

  .wood { background-color: var(--wood-bg); color: var(--wood-txt); }
  .fire { background-color: var(--fire-bg); color: var(--fire-txt); }
  .earth { background-color: var(--earth-bg); color: var(--earth-txt); }
  .metal { background-color: var(--metal-bg); color: var(--metal-txt); }
  .water { background-color: var(--water-bg); color: var(--water-txt); }
  .empty-cell { background-color: #f1f5f9; color: #94a3b8; }

  .section-heading {
    text-align: center;
    padding: 10px;
    background-color: #eff6ff;
    font-size: 15px;
    font-weight: 800;
    border-bottom: 2px solid var(--line-color);
    letter-spacing: 0.5px;
  }

  .summary-grid {
    display: flex;
    border-bottom: 2px solid var(--line-color);
  }

  .summary-col {
    flex: 1;
    text-align: center;
    padding: 15px 5px;
    border-right: 2px solid var(--line-color);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .summary-col:last-child { border-right: none; }

  .col-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-sub);
    margin-bottom: 12px;
  }

  .col-content {
    display: flex;
    justify-content: space-evenly;
    font-size: 14px;
    font-weight: 700;
  }

  .circled {
    position: relative;
    color: var(--accent-red);
    font-weight: 800;
    z-index: 1;
  }
  
  .circled::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 140%;
    height: 140%;
    border: 2.5px solid var(--accent-red);
    border-radius: 50%;
    transform: translate(-50%, -50%) rotate(-10deg);
    z-index: -1;
  }

  .trait-list {
    padding: 20px 20px;
    font-size: 13px;
    line-height: 1.6;
    font-weight: 600;
    border-bottom: 2px solid var(--line-color);
  }

  .trait-list div {
    position: relative;
    padding-left: 15px;
    margin-bottom: 8px;
    word-break: keep-all; 
  }

  .trait-list div::before {
    content: '-';
    position: absolute;
    left: 0;
    font-weight: bold;
    color: var(--line-color);
  }

  .job-grid {
    display: flex;
    padding: 15px 0;
    border-bottom: 2px solid var(--line-color);
  }

  .job-col {
    flex: 1;
    text-align: center;
    padding: 0 10px;
    border-right: 2px dashed var(--line-color);
  }
  
  .job-col:last-child { border-right: none; }

  .job-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-sub);
    margin-bottom: 8px;
    text-decoration: underline;
    text-decoration-color: var(--accent-red);
    text-decoration-style: wavy;
  }

  .job-desc {
    font-size: 13px;
    font-weight: 800;
    line-height: 1.5;
    color: var(--text-main);
    word-break: keep-all; 
  }

  .element-score-grid {
    display: flex;
  }

  .es-cell {
    flex: 1;
    text-align: center;
    padding: 12px 0;
    border-right: 2px solid var(--line-color);
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .es-cell:last-child {
    border-right: none;
  }

  .es-label {
    font-size: 12px;
    font-weight: 800;
    color: var(--text-sub);
  }

  .es-val {
    font-size: 16px;
    font-weight: 800;
    color: var(--line-color);
  }

  .paperclip {
    position: absolute;
    top: -15px;
    right: 30px;
    width: 15px;
    height: 45px;
    border: 3px solid #cbd5e1;
    border-radius: 10px;
    border-bottom-left-radius: 0;
    z-index: 10;
    transform: rotate(15deg);
    background: transparent;
  }

  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: rgba(30, 58, 138, 0.7);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-content {
    background-color: var(--folder-yellow);
    border: 2px solid var(--line-color);
    border-radius: 0;
    padding: 20px;
    max-width: 400px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 6px 6px 0px var(--line-color);
    text-align: center;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 20px;
    font-weight: 800;
    color: var(--line-color);
    cursor: pointer;
  }

  .modal-text {
    font-size: 16px;
    font-weight: 800;
    color: var(--accent-red);
    margin: 10px 0 20px 0;
  }

  #modal-image-container img {
    width: 100%;
    border: 2px solid var(--line-color);
    display: block;
  }

  .ad-container {
    width: 100%;
    display: flex;
    justify-content: center;
    margin-top: 30px;
  }
</style>
</head>
<body>

<div class="header-wrapper">
  <header class="page-header wrapper">
    <h1><a href="https://test-it.co.kr/" class="retro-logo">테스트잇</a></h1> 
    <nav>
      <ul class="main-nav">
        <li><a href="https://test-it.co.kr/test.html">성격</a></li>
        <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
        <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
        <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
      </ul>
    </nav>
  </header>
</div>

<div id="app">
  <div id="screen-main" class="screen active">
    <div class="folder-wrapper">
      <div class="paperclip"></div>
      <div class="folder-tab">테스트잇 367.zip</div>
      <div class="folder-body">
        <div class="folder-inner">
          <div class="sticker-title">사주 만세력 프로필</div>
          <div class="main-desc">내 사주 팔자 전체의 십성과 격국을 분석해<br>입체적이고 트렌디한 이력서 프로필을<br>만들어 드립니다.</div>
          <button class="btn" onclick="showScreen('screen-input')">프로필 생성하기</button>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-input" class="screen">
    <div class="folder-wrapper">
      <div class="paperclip" style="right: auto; left: 30px; transform: rotate(-15deg);"></div>
      <div class="folder-tab">정보 입력</div>
      <div class="folder-body">
        <div class="folder-inner">
          
          <div class="form-group-full row-style">
            <label>이름/닉네임</label>
            <input type="text" id="user-name" placeholder="입력해주세요">
          </div>

          <div class="form-inline-group">
            <div class="input-item">
              <label>양력/음력</label>
              <select id="sel-type"><option value="solar">양력</option><option value="lunar">음력</option></select>
            </div>
            <div class="input-item">
              <label>생년</label>
              <select id="sel-year"></select>
            </div>
          </div>
          
          <div class="form-inline-group">
            <div class="input-item">
              <label>생월</label>
              <select id="sel-month"></select>
            </div>
            <div class="input-item">
              <label>생일</label>
              <select id="sel-day"></select>
            </div>
          </div>
          
          <div class="form-group-full">
            <label>생시</label>
            <select id="sel-time">
              <option value="-1">모름</option><option value="0">자시(23:30~01:29)</option><option value="2">축시(01:30~03:29)</option>
              <option value="4">인시(03:30~05:29)</option><option value="6">묘시(05:30~07:29)</option><option value="8">진시(07:30~09:29)</option>
              <option value="10">사시(09:30~11:29)</option><option value="12">오시(11:30~13:29)</option><option value="14">미시(13:30~15:29)</option>
              <option value="16">신시(15:30~17:29)</option><option value="18">유시(17:30~19:29)</option><option value="20">술시(19:30~21:29)</option>
              <option value="22">해시(21:30~23:29)</option>
            </select>
          </div>
          
          <button class="btn" onclick="calculateAndShowResult()">결과 확인하기</button>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-result" class="screen">
    <div id="capture-area">
      <div class="folder-wrapper" style="margin-top: 0;">
        <div class="paperclip"></div>
        <div class="folder-tab">테스트잇 사주 만세력 프로필 테스트</div>

        <div class="folder-body" style="padding: 15px;">
          
          <div class="profile-table">
            <div class="saju-top-area">
              <div class="ilju-title-box" id="res-ilju-title"></div>
              <div class="palja-grid-box" id="res-palja-grid"></div>
            </div>

            <div class="section-heading">내 사주 프로필</div>
            <div class="summary-grid">
              <div class="summary-col">
                <div class="col-title">내 사주는</div>
                <div class="col-content" id="res-strength-content">
                  </div>
              </div>
              <div class="summary-col">
                <div class="col-title">매력도</div>
                <div class="col-content" id="res-charm-content">
                  </div>
              </div>
              <div class="summary-col">
                <div class="col-title">재물운</div>
                <div class="col-content" id="res-wealth-content">
                  </div>
              </div>
            </div>
            
            <div class="summary-grid" style="border-top: none;">
              <div class="summary-col">
                <div class="col-title">연애스타일</div>
                <div class="col-content" id="res-love-content">
                  </div>
              </div>
              <div class="summary-col">
                <div class="col-title">인기</div>
                <div class="col-content" id="res-pop-content">
                  </div>
              </div>
              <div class="summary-col">
                <div class="col-title">사회생활</div>
                <div class="col-content" id="res-social-content" style="gap: 4px; font-size: 13px; letter-spacing: -0.5px;">
                  </div>
              </div>
            </div>

            <div class="section-heading">내 사주 성격 특징</div>
            <div class="trait-list" id="res-personality"></div>

            <div class="section-heading">사주로 보는 내 직업</div>
            <div class="job-grid">
              <div class="job-col">
                <div class="job-title">[ 전생의 역할 ]</div>
                <div class="job-desc" id="res-job-past"></div>
              </div>
              <div class="job-col">
                <div class="job-title">[ 현대의 직무 ]</div>
                <div class="job-desc" id="res-job-present"></div>
              </div>
            </div>

            <div class="element-score-grid">

    "병진일주": ["밝고 명랑하며 어떤 환경에서도 적응을 잘함", "포용력이 넓고 베푸는 것을 좋아하는 대인배", "호기심이 많고 매사에 긍정적이고 활동적임", "은근한 끈기가 있어 한 가지 일을 묵묵히 해냄"],
    "정사일주": ["겉모습은 차분해도 속에는 뜨거운 열정이 있음", "자존심이 세고 주관이 뚜렷해 남에게 안 짐", "추진력이 좋고 한 번 시작한 일은 끝을 봄", "감정 표현에 솔직하고 의리가 넘치는 성격"],
    "무오일주": ["화끈하고 통이 크며 웬만한 일에는 꿈쩍도 안 함", "엄청난 에너지를 뿜어내는 타고난 리더", "자존심이 무척 강하고 남에게 지시받는 걸 싫어함", "추진력과 돌파력이 뛰어나 위기에 아주 강함"],
    "기미일주": ["묵묵하고 성실하게 자기 길을 걷는 엄청난 끈기", "한 번 믿은 사람은 끝까지 챙기는 의리파", "자기 주관이 아주 확고하고 고집이 셈", "어려운 환경에서도 흔들리지 않는 뚝심의 소유자"],
    "경신일주": ["맺고 끊음이 칼같이 확실하고 의리를 중시함", "어떤 난관도 뚫고 나가는 강력한 추진력을 가짐", "자존심이 아주 강하고 불의를 절대 참지 못함", "한 번 결심한 것은 뒤돌아보지 않고 직진함"],
    "신유일주": ["가장 날카롭고 예리한 판단력을 가진 완벽주의자", "호불호가 극명하고 자기 관리가 아주 철저함", "세련된 미적 감각과 섬세함을 모두 갖춤", "자존심이 세고 타인의 간섭을 무척 싫어함"],
    "임술일주": ["스케일이 크고 어떤 상황에서도 여유를 잃지 않음", "사람을 아우르는 포용력과 통솔력이 뛰어남", "속을 잘 보여주지 않는 무거운 카리스마가 있음", "책임감이 강하고 목표를 향해 진득하게 나아감"],
    "계해일주": ["유연하고 부드러우며 사람들과 아주 잘 어울림", "속을 알 수 없는 깊이와 뛰어난 직관력을 가짐", "어떤 환경에든 물 흐르듯 자연스럽게 적응함", "생각이 깊고 조심스러우며 인내심이 뛰어남"]
  };

  window.onload = function() {
    const yearSelect = document.getElementById('sel-year');
    const currentYear = new Date().getFullYear();
    for(let i = currentYear; i >= 1930; i--) yearSelect.options.add(new Option(i + '년', i));
    yearSelect.value = "1995";
    const monthSelect = document.getElementById('sel-month');
    for(let i = 1; i <= 12; i++) monthSelect.options.add(new Option(i + '월', i));
    const daySelect = document.getElementById('sel-day');
    for(let i = 1; i <= 31; i++) daySelect.options.add(new Option(i + '일', i));
  };

  function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
  }

  function calculateAndShowResult() {
    const userNameInput = document.getElementById('user-name').value;
    const userName = userNameInput.trim() !== '' ? userNameInput : '이름없음';
    
    const type = document.getElementById('sel-type').value;
    const y = parseInt(document.getElementById('sel-year').value);
    const m = parseInt(document.getElementById('sel-month').value);
    const d = parseInt(document.getElementById('sel-day').value);
    const h = parseInt(document.getElementById('sel-time').value);

    let solarDate = type === 'solar' ? Solar.fromYmdHms(y, m, d, h >= 0 ? h : 12, 0, 0) : Lunar.fromYmdHms(y, m, d, h >= 0 ? h : 12, 0, 0).getSolar();
    const lunar = solarDate.getLunar();
    const bazi = lunar.getEightChar();
    
    const timeGan = h >= 0 ? bazi.getTimeGan() : '';
    const timeZhi = h >= 0 ? bazi.getTimeZhi() : '';
    
    const sajuArray = [
      { gan: timeGan, zhi: timeZhi },
      { gan: bazi.getDayGan(), zhi: bazi.getDayZhi() },
      { gan: bazi.getMonthGan(), zhi: bazi.getMonthZhi() },
      { gan: bazi.getYearGan(), zhi: bazi.getYearZhi() }
    ];

    const dayGan = bazi.getDayGan();
    const dayZhi = bazi.getDayZhi();
    
    const myInfo = ohaengInfo[dayGan];
    const myType = myInfo.type; 
    const myYY = myInfo.yy; 

    const motherElement = producingElement[myType];
    const iljuName = myInfo.name.charAt(0) + ohaengInfo[dayZhi].name.charAt(0) + "일주";

    const gridEl = document.getElementById('res-palja-grid');
    gridEl.innerHTML = '';
    
    sajuArray.forEach(pillar => {
      const info = ohaengInfo[pillar.gan];
      const div = document.createElement('div');
      div.className = `palja-cell ${info ? elementClassMap[info.type] : 'empty-cell'}`;
      div.innerHTML = info ? info.name : '-';
      gridEl.appendChild(div);
    });

    sajuArray.forEach(pillar => {
      const info = ohaengInfo[pillar.zhi];
      const div = document.createElement('div');
      div.className = `palja-cell ${info ? elementClassMap[info.type] : 'empty-cell'}`;
      div.innerHTML = info ? info.name : '-';
      gridEl.appendChild(div);
    });

    document.getElementById('res-ilju-title').innerText = userName;

    const elementCounts = { '목':0, '화':0, '토':0, '금':0, '수':0 };
    let myPowerScore = 0; 
    let totalScore = 0;
    const shipseongScores = { '비견':0, '겁재':0, '식신':0, '상관':0, '편재':0, '정재':0, '편관':0, '정관':0, '편인':0, '정인':0 };

    sajuArray.forEach(p => {
      if(p.gan && ohaengInfo[p.gan]) {
        let info = ohaengInfo[p.gan];
        elementCounts[info.type] += 1;
        totalScore += 1;
        if(info.type === myType || info.type === motherElement) myPowerScore += 1;
        
        let ss = getShipseong(myType, myYY, info.type, info.yy);
        if(ss) shipseongScores[ss] += 1;
      }
      
      if(p.zhi && ohaengInfo[p.zhi]) {
        let info = ohaengInfo[p.zhi];
        
        elementCounts[info.type] += 1;
        totalScore += 1;
        if(info.type === myType || info.type === motherElement) myPowerScore += 1;
        let ss = getShipseong(myType, myYY, info.type, info.yy);
        if(ss) shipseongScores[ss] += 1;
        
        let zhiChar = info.name.charAt(0);
        let weights = jijangganWeights[zhiChar];
        if(weights) {
          for(let jGan in weights) {
            let elType = stemElements[jGan];
            let w = weights[jGan] * 0.5; 
            
            if(elType) {
              elementCounts[elType] += w;
              totalScore += w;
              if(elType === myType || elType === motherElement) myPowerScore += w;
              
              const hanjaMap = {'갑':'甲','을':'乙','병':'丙','정':'丁','무':'戊','기':'己','경':'庚','신':'辛','임':'壬','계':'癸'};
              let jInfo = ohaengInfo[hanjaMap[jGan]];
              if(jInfo) {
                 let jSs = getShipseong(myType, myYY, jInfo.type, jInfo.yy);
                 if(jSs) shipseongScores[jSs] += w;
              }
            }
          }
        }
      }
    });

    let finalPersonality = [];

    // 1. 일주 성격을 가장 먼저 배치 (무조건 4줄 다 들어감)
    if(iljuBaseTraits[iljuName]) {
      finalPersonality.push(...iljuBaseTraits[iljuName]);
    }

    // 2. 일간(나의 본질) 성격 배치 (1줄)
    const dayGanChar = ohaengInfo[dayGan] ? ohaengInfo[dayGan].name.charAt(0) : '';
    if(dayGanTraits[dayGanChar]) {
      finalPersonality.push(dayGanTraits[dayGanChar]);
    }

    let minElem = '', minCount = 99;
    for(let el in elementCounts) {
      if(elementCounts[el] < minCount) { minCount = elementCounts[el]; minElem = el; }
    }
    const isMuja = minCount === 0;

    let maxElemScore = -1;
    for (let el in elementCounts) {
        if (elementCounts[el] > maxElemScore) { maxElemScore = elementCounts[el]; }
    }
    let topElems = [];
    for (let el in elementCounts) {
        if (elementCounts[el] === maxElemScore) { topElems.push(el); }
    }
    
    // 3. 가장 강한 오행 특징 (1줄)
    if (topElems.length > 1) {
        finalPersonality.push("특정 기운에 치우치지 않고 여러 기운이 조화를 이루고 있음");
    } else {
        const domTraits = {
          '목': "성장 욕구가 강하고 진취적으로 나아가는 성향",
          '화': "열정적이고 솔직하며 감정 표현이 풍부한 편",
          '토': "중재자 역할을 잘하며 신용과 끈기를 중시함",
          '금': "맺고 끊음이 확실하고 결단력과 의리가 있음",
          '수': "지혜롭고 생각의 깊이가 있으며 유연하게 대처함"
        };
        if (domTraits[topElems[0]]) finalPersonality.push(domTraits[topElems[0]]);
    }

    let powerRatio = myPowerScore / totalScore;
    if (powerRatio > 0.5) {
        document.getElementById('res-strength-content').innerHTML = '<span class="circled">강한편</span><span>약한편</span>';
    } else if (powerRatio < 0.5) {
        document.getElementById('res-strength-content').innerHTML = '<span>강한편</span><span class="circled">약한편</span>';
    } else {
        document.getElementById('res-strength-content').innerHTML = '<span class="circled">중도/균형</span>';
    }

    let dohwaCount = 0;
    let hwagaeCount = 0;
    const dohwaChars = ['자', '오', '묘', '유'];
    const hwagaeChars = ['진', '술', '축', '미'];
    
    sajuArray.forEach(p => {
      if(p.zhi && ohaengInfo[p.zhi]) {
        let zhiChar = ohaengInfo[p.zhi].name.charAt(0);
        if(dohwaChars.includes(zhiChar)) dohwaCount++;
        if(hwagaeChars.includes(zhiChar)) hwagaeCount++;
      }
    });

    const isCharmStrong = dohwaCount >= 1; 
    document.getElementById('res-charm-content').innerHTML = isCharmStrong ? '<span class="circled">강한편</span><span>약한편</span>' : '<span>강한편</span><span class="circled">약한편</span>';

    const wealthScore = shipseongScores['편재'] + shipseongScores['정재'];
    const isWealthStrong = wealthScore >= 1.0;
    document.getElementById('res-wealth-content').innerHTML = isWealthStrong ? '<span class="circled">강한편</span><span>약한편</span>' : '<span>강한편</span><span class="circled">약한편</span>';

    const popScore = shipseongScores['비견'] + shipseongScores['겁재'];
    const isPopHigh = (popScore >= 1.5) || (hwagaeCount >= 1) || (dohwaCount >= 2);
    document.getElementById('res-pop-content').innerHTML = isPopHigh ? '<span class="circled">많은편</span><span>적은편</span>' : '<span>많은편</span><span class="circled">적은편</span>';

    let sweetScore = shipseongScores['정재'] + shipseongScores['정관'] + shipseongScores['식신'] + shipseongScores['정인'];
    let tsunScore = shipseongScores['편관'] + shipseongScores['상관'] + shipseongScores['겁재'] + shipseongScores['편재'];
    if (sweetScore > tsunScore) {
        document.getElementById('res-love-content').innerHTML = '<span class="circled">다정다감</span><span>츤데레</span>';
    } else if (tsunScore > sweetScore) {
        document.getElementById('res-love-content').innerHTML = '<span>다정다감</span><span class="circled">츤데레</span>';
    } else {
        document.getElementById('res-love-content').innerHTML = '<span class="circled">밀당고수</span>';
    }

    let myWayScore = shipseongScores['비견'] + shipseongScores['편인'] + shipseongScores['편관'];
    let inssaScore = shipseongScores['식신'] + shipseongScores['상관'] + shipseongScores['편재'] + shipseongScores['정재'];
    if (myWayScore > inssaScore) {
        document.getElementById('res-social-content').innerHTML = '<span class="circled">마이웨이</span><span>인싸재질</span>';
    } else if (inssaScore > myWayScore) {
        document.getElementById('res-social-content').innerHTML = '<span>마이웨이</span><span class="circled">인싸재질</span>';
    } else {
        document.getElementById('res-social-content').innerHTML = '<span class="circled">선택적 인싸</span>';
    }

    // 4. 십성 강점 상위 딱 2개만 출력 (2줄)
    let sortedShipseongs = Object.keys(shipseongScores).sort((a, b) => shipseongScores[b] - shipseongScores[a]);
    let top1 = sortedShipseongs[0];
    let top2 = sortedShipseongs[1];
    
    if(top1 && shipseongScores[top1] > 0 && dynamicTraits[top1]) finalPersonality.push(dynamicTraits[top1]);
    if(top2 && shipseongScores[top2] > 0 && dynamicTraits[top2]) finalPersonality.push(dynamicTraits[top2]);

    // 5. 무자(없는 오행) 특성 (0~1줄)
    const missingTraits = {
      '목': "새로운 시작을 주저하거나 계획성이 부족할 수 있음",
      '화': "감정 표현이 서툴고 차분하며 이성적인 편임",
      '토': "정착보다 변화를 추구하며 얽매이는 걸 싫어함",
      '금': "결단력이 다소 부족하고 마무리가 약할 때가 있음",
      '수': "현실적이고 직선적이며 융통성 발휘가 어려울 수 있음"
    };
    if (isMuja && missingTraits[minElem]) {
      finalPersonality.push(missingTraits[minElem]);
    }

    finalPersonality = [...new Set(finalPersonality)]; 
    document.getElementById('res-personality').innerHTML = finalPersonality.map(t => `<div>${t}</div>`).join('');

    const baseJob = iljuJobs[iljuName] || { p: "부지런한 마을 관리인", pr: "사무직 종사자" };
    const modifier = shipseongModifier[top1] || { past: "묵묵히 자기 일을 해낸", present: "안정적으로 업무를 수행하는" };

    document.getElementById('res-job-past').innerHTML = `${modifier.past}<br>${baseJob.p}`;
    document.getElementById('res-job-present').innerHTML = `${modifier.present}<br>${baseJob.pr}`;

    document.getElementById('score-wood').innerText = elementCounts['목'].toFixed(1);
    document.getElementById('score-fire').innerText = elementCounts['화'].toFixed(1);
    document.getElementById('score-earth').innerText = elementCounts['토'].toFixed(1);
    document.getElementById('score-metal').innerText = elementCounts['금'].toFixed(1);
    document.getElementById('score-water').innerText = elementCounts['수'].toFixed(1);

    showScreen('screen-result');
  }

  function saveImage() {
    const captureTarget = document.getElementById('capture-area');
    
    html2canvas(captureTarget, {
      scale: 2, 
      backgroundColor: null,
      logging: false,
      useCORS: true 
    }).then(canvas => {
      const imgData = canvas.toDataURL("image/png");
      const imgElement = document.createElement("img");
      imgElement.src = imgData;
      
      const container = document.getElementById('modal-image-container');
      container.innerHTML = ''; 
      container.appendChild(imgElement);
      
      document.getElementById('image-modal').classList.add('active');
    });
  }

  function closeModal() {
    document.getElementById('image-modal').classList.remove('active');
  }

  function shareTest() {
    if (navigator.share) {
      navigator.share({
        title: '테스트잇 사주 만세력 프로필 테스트',
        text: '테스트잇 사주 만세력 프로필 테스트',
        url: "https://test-it.co.kr/test376",
      })
      .catch(console.error);
    } else {
      alert('현재 브라우저에서는 공유 기능이 지원되지 않습니다. URL을 복사해 주세요!');
    }
  }
</script>
