    const monthBranchSeason = {
        "인": ["spring", "봄"],
        "묘": ["spring", "봄"],
        "진": ["spring", "봄"],
        "사": ["summer", "여름"],
        "오": ["summer", "여름"],
        "미": ["summer", "여름"],
        "신": ["autumn", "가을"],
        "유": ["autumn", "가을"],
        "술": ["autumn", "가을"],
        "해": ["winter", "겨울"],
        "자": ["winter", "겨울"],
        "축": ["winter", "겨울"]
    };

    function getTimeValue(timeIndex) {
        const timeMap = {
            1: [0, 30],
            2: [2, 30],
            3: [4, 30],
            4: [6, 30],
            5: [8, 30],
            6: [10, 30],
            7: [12, 30],
            8: [14, 30],
            9: [16, 30],
            10: [18, 30],
            11: [20, 30],
            12: [22, 30]
        };
        return timeMap[timeIndex] || null;
    }

    function getPillarValue(saju, keys) {
        for (const key of keys) {
            if (saju && typeof saju[key] === "string" && saju[key].length >= 2) {
                return saju[key];
            }
        }
        return "";
    }

    function getSajuElementMessage(saju, isTimeUnknown) {
        const counts = { "목": 0, "화": 0, "토": 0, "금": 0, "수": 0 };

        const pillars = [
            getPillarValue(saju, ["yearPillar", "year", "yearGanji"]),
            getPillarValue(saju, ["monthPillar", "month", "monthGanji"]),
            getPillarValue(saju, ["dayPillar", "day", "dayGanji"])
        ];

        if (!isTimeUnknown) {
            pillars.push(getPillarValue(saju, ["hourPillar", "timePillar", "hour", "timeGanji"]));
        }

        pillars.join("").split("").forEach(ch => {
            const element = elementMap[ch];
            if (element) counts[element]++;
        });

        const values = Object.values(counts);
        const max = Math.max(...values);
        const min = Math.min(...values);

        if (max - min <= 1) {
            return isTimeUnknown ? "시간 미입력 기준으로는 오행이 비교적 고르게 흐름" : elementText["균형"];
        }

        const order = ["목", "화", "토", "금", "수"];
        const strongElements = Object.keys(counts).filter(key => counts[key] === max).sort((a, b) => order.indexOf(a) - order.indexOf(b));
        const key = strongElements.join("");

        if (isTimeUnknown) {
            return `${strongElements.join("·")} 기운이 강한 편이나 시간에 따라 달라질 수 있음`;
        }

        return elementText[key] || `${strongElements.join("·")} 기운이 강하게 드러나는 편`;
    }

    function getSeasonByMonthPillar(saju) {
        const monthPillar = getPillarValue(saju, ["monthPillar", "month", "monthGanji"]);
        const branch = monthPillar.charAt(1);
        return monthBranchSeason[branch] || ["winter", "겨울"];
    }

    function getDayPillar(saju) {
        return getPillarValue(saju, ["dayPillar", "day", "dayGanji"]);
    }

    window.startTest = function() {
        const userName = document.getElementById('userName').value.trim();
        const y = parseInt(document.getElementById('userYear').value);
        const m = parseInt(document.getElementById('userMonth').value);
        const d = parseInt(document.getElementById('userDay').value);
        const timeIndex = parseInt(document.getElementById('userTime').value);

        if (!userName || !y || !m || !d || Number.isNaN(timeIndex)) {
            alert("입력 정보를 다 채워주세요!");
            return;
        }

        let saju;

        try {
            if (timeIndex === 0) {
                saju = calculateSajuSimple(y, m, d);
            } else {
                const timeValue = getTimeValue(timeIndex);
                saju = calculateSaju(y, m, d, timeValue[0], timeValue[1], {
                    longitude: 127.5,
                    applyTimeCorrection: true
                });
            }
        } catch (error) {
            alert("사주 계산 중 오류가 발생했어요. 날짜를 다시 확인해주세요.");
            console.error(error);
            return;
        }

        const myIlju = getDayPillar(saju);
        const seasonData = getSeasonByMonthPillar(saju);
        const seasonKey = seasonData[0];
        const seasonName = seasonData[1];
        const elementLine = getSajuElementMessage(saju, timeIndex === 0);

        showResult(userName, seasonKey, seasonName, myIlju, elementLine);
    };

    function showResult(userName, seasonKey, seasonName, ilju, elementLine) {
        const theme = seasonThemes[seasonKey];
        const traits = [...(iljuTraits[ilju] || ["매력 넘치는 성격임"])];
        if (elementLine) traits.push(elementLine);
        const bubbleSpeech = iljuSpeech[ilju] || "나의 성격 분석";

        const resultThemeElement = document.getElementById('result-theme');
        resultThemeElement.style.setProperty('--theme-bg', theme.bg);
        resultThemeElement.style.setProperty('--theme-table', theme.table);
        resultThemeElement.style.setProperty('--theme-label', theme.label);

        document.getElementById('land-sky').style.background = theme.skyGradient;
        document.getElementById('land-ground').style.backgroundColor = theme.groundColor;

        document.getElementById('res-name').innerText = userName;
   const seasonCell = document.getElementById('res-season');
seasonCell.innerText = seasonName + " 사주";
seasonCell.className = "info-cell " + seasonKey + "-season";
        document.getElementById('season-label-box').innerText = theme.labelText;
        
        document.getElementById('prop-1').innerText = theme.props[0];
        document.getElementById('prop-2').innerText = theme.props[1];
        document.getElementById('prop-3').innerText = theme.props[2];
        document.getElementById('prop-4').innerText = theme.props[3];

        document.getElementById('char-sprite-1').innerText = theme.sprite;
        document.getElementById('char-speech-1').innerText = bubbleSpeech;

        const traitUl = document.getElementById('traits-list');
        traitUl.innerHTML = "";
        traits.forEach(trait => {
            const li = document.createElement('li');
         li.innerHTML = trait;
            traitUl.appendChild(li);
        });

        nextScreen('screen-input', 'screen-result');
        document.getElementById('out-of-frame-buttons').style.display = 'flex';
    }

    window.saveResultImage = function() {
        const captureArea = document.getElementById('capture-area');
        const saveBtn = document.querySelector('.btn-save');
        saveBtn.innerText = "이미지 생성 중...";
        html2canvas(captureArea, { scale: 2 }).then(canvas => {
            document.getElementById('saved-image').src = canvas.toDataURL('image/png');
            document.getElementById('save-modal').classList.add('active');
            saveBtn.innerText = "결과 이미지 저장하기";
        });
    };

    window.closeModal = function() {
        document.getElementById('save-modal').classList.remove('active');
    };
