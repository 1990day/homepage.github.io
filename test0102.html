<!DOCTYPE html>
<html lang="ko">
<head>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>테스트잇x미스틱스토리 동심 테스트(가제)</title>
  <meta name="description" content="테스트잇x미스틱스토리 동심 테스트(가제)" />
  <meta property="og:type" content="website" />
  <meta property="og:title" content="테스트잇x미스틱스토리 동심 테스트(가제)" />
  <meta property="og:description" content="테스트잇x미스틱스토리 동심 테스트(가제)" />
  <meta property="og:url" content="https://test-it.co.kr/test0102" />

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --line: #7ea3bf;
      --text: #58708b;
      --header-line: #a9cbe0;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background:
        linear-gradient(180deg, #dff6ff 0%, #eefcff 20%, #f7fffb 44%, #fffceb 72%, #efffcf 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        radial-gradient(circle at 10% 8%, rgba(255,255,255,0.95) 0 48px, transparent 49px),
        radial-gradient(circle at 18% 10%, rgba(255,255,255,0.95) 0 34px, transparent 35px),
        radial-gradient(circle at 78% 11%, rgba(255,255,255,0.92) 0 54px, transparent 55px),
        radial-gradient(circle at 87% 14%, rgba(255,255,255,0.92) 0 28px, transparent 29px),
        radial-gradient(circle at 73% 28%, rgba(255,245,193,0.95) 0 78px, transparent 79px),
        radial-gradient(circle at 8% 72%, rgba(255,233,244,0.85) 0 90px, transparent 91px),
        radial-gradient(circle at 87% 78%, rgba(201,248,255,0.9) 0 120px, transparent 121px);
      opacity: 0.95;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background:
        linear-gradient(rgba(255,255,255,0.06), rgba(255,255,255,0.06)),
        repeating-linear-gradient(
          0deg,
          rgba(255,255,255,0.06) 0px,
          rgba(255,255,255,0.06) 1px,
          transparent 1px,
          transparent 6px
        );
      mix-blend-mode: screen;
      opacity: 0.7;
    }

    .header-wrapper {
      position: relative;
      z-index: 4;
      width: 100%;
      padding: 14px 14px 0;
    }

    .page-header {
      max-width: 1100px;
      margin: 0 auto;
      padding: 10px 14px;
      border: 2px solid var(--header-line);
      border-radius: 22px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.92) 0%, rgba(243,251,255,0.92) 100%);
      box-shadow:
        0 10px 24px rgba(111, 158, 188, 0.10),
        inset 0 2px 0 rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .logo {
      text-decoration: none;
      color: #46657f;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: -0.3px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .logo::before {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: linear-gradient(180deg, #ffd8ea 0%, #ffe78f 100%);
      box-shadow:
        18px 0 0 #d8f6ff,
        36px 0 0 #d8f3c7;
      margin-right: 34px;
      flex-shrink: 0;
    }

    .main-nav {
      display: flex;
      align-items: center;
      gap: 8px;
      list-style: none;
      margin: 0;
      padding: 0;
      flex-wrap: nowrap;
    }

    .main-nav li {
      margin: 0;
      padding: 0;
    }

    .main-nav a {
      display: block;
      text-decoration: none;
      color: #5a738b;
      font-size: 14px;
      font-weight: 800;
      padding: 8px 13px;
      border-radius: 999px;
      background: rgba(255,255,255,0.82);
      border: 1.5px solid #c6ddec;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
      white-space: nowrap;
    }

    .page-wrap {
      position: relative;
      z-index: 2;
      width: 100%;
      min-height: 100vh;
      padding: 22px 14px 38px;
    }

    .window {
      width: 100%;
      max-width: 470px;
      margin: 0 auto;
      position: relative;
      background: rgba(255,255,255,0.97);
      border: 3px solid var(--line);
      border-radius: 28px;
      overflow: hidden;
      box-shadow:
        0 16px 0 rgba(149, 189, 214, 0.35),
        0 30px 40px rgba(105, 150, 181, 0.16);
    }

    .window::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 88% 18%, rgba(255,223,126,0.28) 0 58px, transparent 59px),
        radial-gradient(circle at 14% 82%, rgba(207,255,190,0.32) 0 92px, transparent 93px),
        radial-gradient(circle at 80% 78%, rgba(255,211,233,0.24) 0 82px, transparent 83px);
      opacity: 0.95;
    }

    .title-bar {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px 16px 14px;
      border-bottom: 3px solid var(--line);
      background: linear-gradient(90deg, #a5e4ff 0%, #cbfff3 28%, #fff1a8 64%, #ffd7e7 100%);
      min-height: 68px;
    }

    .title-left {
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 0;
      width: 100%;
    }

    .title-icon {
      display: none;
    }

    .title-text {
      font-size: 15px;
      font-weight: 900;
      color: #3f5d78;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      letter-spacing: -0.2px;
      text-align: center;
      width: 100%;
      padding: 0 12px;
    }

    .window-controls {
      display: none;
    }

    .window-controls span {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 2px solid var(--line);
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.8);
    }

    .window-controls span:nth-child(1) {
      background: #ffd5de;
    }

    .window-controls span:nth-child(2) {
      background: #fff0a4;
    }

    .window-controls span:nth-child(3) {
      background: #caf5c8;
    }

    .content {
      position: relative;
      z-index: 2;
      padding: 22px 18px 24px;
      text-align: center;
    }

    .result-content {
      padding: 0;
      text-align: left;
    }

    .main-image-wrap {
      width: 100%;
    }

    .main-image {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 24px;
      border: 3px solid #c7dcec;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,0.82),
        0 10px 18px rgba(170, 196, 214, 0.15);
      background: #ffffff;
    }

    .btn {
      width: 100%;
      border: 0;
      border-radius: 20px;
      padding: 16px 14px;
      font-size: 17px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      color: #506376;
    }

    .btn:hover {
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(2px);
    }

    .start-btn {
      margin-top: 16px;
      background: linear-gradient(180deg, #ffe88f 0%, #ffd75f 100%);
      border: 3px solid #d9b04a;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,0.56),
        0 8px 0 #efc75c;
    }

    .retry-btn {
      background: linear-gradient(180deg, #d9f4ff 0%, #b6e8ff 100%);
      border: 3px solid #8ebddd;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,0.68),
        0 8px 0 #9bcde8;
    }

    .progress-wrap {
      position: relative;
      z-index: 2;
      padding: 16px 16px 0;
    }

    .progress-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #688096;
      font-weight: 900;
    }

    .progress {
      width: 100%;
      height: 22px;
      padding: 3px;
      border-radius: 999px;
      border: 3px solid #b0cadf;
      background: #edf8ff;
      box-shadow: inset 0 2px 0 rgba(255,255,255,0.75);
      overflow: hidden;
    }

    .progress-bar {
      width: 0%;
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffbfd7 0%, #ffe78d 30%, #b8efff 64%, #cef4b1 100%);
      transition: width 0.3s ease;
    }

    .question-scene {
      position: relative;
      margin-bottom: 16px;
      height: 126px;
      border-radius: 24px;
      border: 3px solid #c7dcec;
      background: linear-gradient(180deg, #e3f8ff 0%, #f7fffd 48%, #f7ffe4 100%);
      overflow: hidden;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,0.82),
        0 10px 18px rgba(170, 196, 214, 0.15);
    }

    .question-scene .mini-cloud {
      position: absolute;
      height: 18px;
      border-radius: 999px;
      border: 2px solid #bed8eb;
      background: rgba(255,255,255,0.95);
    }

    .question-scene .mini-cloud::before,
    .question-scene .mini-cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 2px solid #bed8eb;
      background: rgba(255,255,255,0.95);
    }

    .question-scene .mini-cloud.m1 {
      width: 50px;
      top: 18px;
      left: 18px;
      animation: cloudFloatA 10s ease-in-out infinite alternate;
    }

    .question-scene .mini-cloud.m1::before {
      width: 18px;
      height: 18px;
      top: -10px;
      left: 8px;
    }

    .question-scene .mini-cloud.m1::after {
      width: 20px;
      height: 20px;
      top: -11px;
      right: 8px;
    }

    .question-scene .mini-cloud.m2 {
      width: 58px;
      top: 26px;
      right: 20px;
      animation: cloudFloatB 11.5s ease-in-out infinite alternate;
    }

    .question-scene .mini-cloud.m2::before {
      width: 20px;
      height: 20px;
      top: -10px;
      left: 8px;
    }

    .question-scene .mini-cloud.m2::after {
      width: 22px;
      height: 22px;
      top: -12px;
      right: 8px;
    }

    .question-scene .wheel-mini-wrap {
      position: absolute;
      left: 50%;
      bottom: 12px;
      width: 96px;
      height: 96px;
      transform: translateX(-50%);
    }

    .question-scene .wheel-shell {
      position: absolute;
      inset: 0;
    }

    .question-scene .wheel-rotator {
      position: absolute;
      inset: 0;
      animation: wheelTurn 90s linear infinite;
      transform-origin: center center;
    }

    .question-scene .wheel-mini-wheel {
      position: absolute;
      inset: 0;
    }

    .question-scene .wheel-mini-outer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 4px solid #77cdef;
      z-index: 2;
    }

    .question-scene .wheel-mini-inner {
      position: absolute;
      left: 15px;
      top: 15px;
      width: 66px;
      height: 66px;
      border-radius: 50%;
      border: 4px solid #f3a0c7;
      z-index: 1;
    }

    .question-scene .wheel-hub {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18px;
      height: 18px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: #ff94c4;
      border: 3px solid #da6d9d;
      z-index: 6;
    }

    .question-scene .wheel-line {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 4px;
      height: 42px;
      margin-left: -2px;
      margin-top: -2px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ffd86d 0%, #f699c4 100%);
      transform-origin: center top;
      z-index: 1;
    }

    .question-scene .w1 { transform: rotate(0deg); }
    .question-scene .w2 { transform: rotate(45deg); }
    .question-scene .w3 { transform: rotate(90deg); }
    .question-scene .w4 { transform: rotate(135deg); }
    .question-scene .w5 { transform: rotate(180deg); }
    .question-scene .w6 { transform: rotate(225deg); }
    .question-scene .w7 { transform: rotate(270deg); }
    .question-scene .w8 { transform: rotate(315deg); }

    .question-scene .mini-cabin {
      position: absolute;
      width: 16px;
      height: 14px;
      border-radius: 7px 7px 6px 6px;
      border: 2px solid #8cb7cf;
      background: linear-gradient(180deg, #ffffff 0 40%, #dff6ff 40% 100%);
      z-index: 5;
      transform-origin: center center;
      animation: counterWheelTurn 90s linear infinite;
    }

    .question-scene .mini-cabin::before {
      content: "";
      position: absolute;
      left: 3px;
      top: 2px;
      width: 6px;
      height: 3px;
      border-radius: 3px 3px 2px 2px;
      border: 1.5px solid #9cb8cb;
      background: #eefaff;
    }

    .question-scene .mini-cabin::after {
      content: "";
      position: absolute;
      left: 5px;
      top: -6px;
      width: 2px;
      height: 6px;
      border-radius: 999px;
      background: #ffd75f;
      border: 1.5px solid #8fb7ce;
    }

    .question-scene .mc1 { top: -5px; left: 40px; background: linear-gradient(180deg, #ffffff 0 40%, #e4ebff 40% 100%); }
    .question-scene .mc2 { top: 10px; right: 7px; background: linear-gradient(180deg, #ffffff 0 40%, #fff6b9 40% 100%); }
    .question-scene .mc3 { right: -2px; top: 40px; background: linear-gradient(180deg, #ffffff 0 40%, #ffe1ec 40% 100%); }
    .question-scene .mc4 { bottom: 10px; right: 7px; background: linear-gradient(180deg, #ffffff 0 40%, #dff2ff 40% 100%); }
    .question-scene .mc5 { bottom: -5px; left: 40px; background: linear-gradient(180deg, #ffffff 0 40%, #e2f8ff 40% 100%); }
    .question-scene .mc6 { bottom: 10px; left: 7px; background: linear-gradient(180deg, #ffffff 0 40%, #fff2b8 40% 100%); }
    .question-scene .mc7 { left: -2px; top: 40px; background: linear-gradient(180deg, #ffffff 0 40%, #dbf1ff 40% 100%); }
    .question-scene .mc8 { top: 10px; left: 7px; background: linear-gradient(180deg, #ffffff 0 40%, #ffe9f0 40% 100%); }

    .question-scene .mini-leg {
      position: absolute;
      bottom: 0;
      width: 4px;
      height: 42px;
      background: #74c5ea;
      border-radius: 999px;
      z-index: 1;
    }

    .question-scene .ml1 {
      left: calc(50% - 18px);
      transform: rotate(18deg);
      transform-origin: bottom center;
    }

    .question-scene .ml2 {
      left: calc(50% + 14px);
      transform: rotate(-18deg);
      transform-origin: bottom center;
    }

    .question-scene .grass {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 26px;
      background:
        radial-gradient(circle at 8px 16px, rgba(198,238,148,0.95) 0 12px, transparent 13px) 0 0 / 28px 24px repeat-x,
        linear-gradient(180deg, rgba(212,248,174,0.8) 0%, rgba(189,234,144,0.95) 100%);
      z-index: 0;
    }

    .question-scene .tent {
      position: absolute;
      right: 26px;
      bottom: 18px;
      width: 52px;
      height: 56px;
      animation: tentSway 3.8s ease-in-out infinite;
      transform-origin: bottom center;
    }

    .question-scene .tent::before {
      content: "";
      position: absolute;
      inset: 0 auto auto 0;
      width: 52px;
      height: 32px;
      background: linear-gradient(90deg, #ffd96a 0 50%, #ffd7e8 50% 100%);
      border: 3px solid #d7a1b6;
      clip-path: polygon(50% 0, 100% 100%, 0 100%);
    }

    .question-scene .tent::after {
      content: "";
      position: absolute;
      left: 7px;
      bottom: 0;
      width: 38px;
      height: 24px;
      border-radius: 8px;
      border: 3px solid #8eb7cf;
      background: #fff7d3;
    }

    .question-card {
      position: relative;
      background: linear-gradient(180deg, #ffffff 0%, #fffdf4 100%);
      border: 3px solid #c8dcec;
      border-radius: 26px;
      padding: 22px 16px 18px;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,0.86),
        0 10px 18px rgba(170, 196, 214, 0.15);
    }

    .question-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 106px;
      padding: 7px 14px;
      border-radius: 999px;
      margin-bottom: 14px;
      background: #fff5c7;
      border: 2px solid #e2cd88;
      color: #7a6833;
      font-size: 12px;
      font-weight: 900;
      box-shadow: 0 4px 0 rgba(235, 220, 165, 0.5);
    }

    .question-text {
      margin: 0;
      font-size: 20px;
      line-height: 1.5;
      font-weight: 900;
      color: #4f6a84;
      letter-spacing: -0.4px;
      word-break: keep-all;
    }

    .button-row {
      display: flex;
      gap: 12px;
      margin-top: 18px;
    }

    .ox-btn {
      flex: 1;
      padding: 16px 12px;
      border-radius: 22px;
      border: 3px solid transparent;
      font-size: 28px;
      font-weight: 900;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      color: #53657a;
    }

    .ox-btn:hover {
      transform: translateY(-1px);
    }

    .ox-btn:active {
      transform: translateY(2px);
    }

    .ox-btn.o {
      background: linear-gradient(180deg, #ddfff0 0%, #baf4d3 100%);
      border-color: #8cc9a6;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,0.8),
        0 8px 0 #9dd9b7;
    }

    .ox-btn.x {
      background: linear-gradient(180deg, #ffe9f1 0%, #ffcfe0 100%);
      border-color: #dea2b6;
      box-shadow:
        inset 0 3px 0 rgba(255,255,255,0.8),
        0 8px 0 #ecb5c8;
    }

    .hidden {
      display: none;
    }

    .result-layout {
      width: 100%;
      text-align: center;
    }

    .result-image-wrap {
      width: 100%;
      padding: 0;
      margin: 0;
    }

    .result-image {
      display: block;
      width: 100%;
      height: auto;
      border-radius: 0 0 24px 24px;
      background: #ffffff;
    }

    .result-actions {
      padding: 16px 18px 20px;
      display: grid;
      gap: 12px;
    }

    @keyframes cloudFloatA {
      0% { transform: translateX(0px); }
      50% { transform: translateX(6px) translateY(-1px); }
      100% { transform: translateX(12px); }
    }

    @keyframes cloudFloatB {
      0% { transform: translateX(0px); }
      50% { transform: translateX(-5px) translateY(1px); }
      100% { transform: translateX(-10px); }
    }

    @keyframes wheelTurn {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes counterWheelTurn {
      from { transform: rotate(0deg); }
      to { transform: rotate(-360deg); }
    }

    @keyframes tentSway {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(1deg); }
      100% { transform: rotate(0deg); }
    }

    @media (max-width: 480px) {
      .header-wrapper {
        padding: 10px 10px 0;
      }

      .page-header {
        padding: 9px 10px;
        gap: 8px;
      }

      .logo {
        font-size: 16px;
      }

      .logo::before {
        width: 10px;
        height: 10px;
        box-shadow:
          15px 0 0 #d8f6ff,
          30px 0 0 #d8f3c7;
        margin-right: 28px;
      }

      .main-nav {
        gap: 5px;
      }

      .main-nav a {
        padding: 7px 9px;
        font-size: 12px;
        letter-spacing: -0.4px;
      }

      .page-wrap {
        padding: 18px 10px 34px;
      }

      .content {
        padding: 20px 14px 20px;
      }

      .result-content {
        padding: 0;
      }

      .result-actions {
        padding: 14px 14px 18px;
      }

      .title-text {
        font-size: 14px;
        padding: 0 6px;
      }

      .question-text {
        font-size: 18px;
        line-height: 1.45;
      }
    }
  </style>
</head>
<body>
  <div class="header-wrapper">
    <header class="page-header wrapper">
      <a href="https://test-it.co.kr/" class="logo">테스트잇</a>
      <nav>
        <ul class="main-nav">
          <li><a href="https://test-it.co.kr/test.html">성격</a></li>
          <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
          <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
          <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
        </ul>
      </nav>
    </header>
  </div>

  <div class="page-wrap">

    <div class="window" id="startScreen">
      <div class="content">
        <div class="main-image-wrap">
          <img src="img_main0101임시2.png" alt="동심 테스트 메인 이미지" class="main-image">
        </div>
        <button class="btn start-btn" onclick="startTest()">테스트 시작하기</button>
      </div>
    </div>

    <div class="window hidden" id="testScreen">
      <div class="title-bar">
        <div class="title-left">
          <div class="title-icon">🎠</div>
          <div class="title-text">동심 체크 중...</div>
        </div>
        <div class="window-controls">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-top">
          <span id="progressText">1 / 20</span>
          <span>테스트 진행 중</span>
        </div>
        <div class="progress">
          <div class="progress-bar" id="progressBar"></div>
        </div>
      </div>

      <div class="content">
        <div class="question-scene">
          <div class="mini-cloud m1"></div>
          <div class="mini-cloud m2"></div>

          <div class="wheel-mini-wrap">
            <div class="wheel-shell">
              <div class="wheel-rotator">
                <div class="wheel-mini-wheel">
                  <div class="wheel-mini-outer"></div>
                  <div class="wheel-mini-inner"></div>

                  <div class="wheel-line w1"></div>
                  <div class="wheel-line w2"></div>
                  <div class="wheel-line w3"></div>
                  <div class="wheel-line w4"></div>
                  <div class="wheel-line w5"></div>
                  <div class="wheel-line w6"></div>
                  <div class="wheel-line w7"></div>
                  <div class="wheel-line w8"></div>

                  <div class="mini-cabin mc1"></div>
                  <div class="mini-cabin mc2"></div>
                  <div class="mini-cabin mc3"></div>
                  <div class="mini-cabin mc4"></div>
                  <div class="mini-cabin mc5"></div>
                  <div class="mini-cabin mc6"></div>
                  <div class="mini-cabin mc7"></div>
                  <div class="mini-cabin mc8"></div>
                </div>
              </div>

              <div class="wheel-hub"></div>
            </div>
          </div>

          <div class="mini-leg ml1"></div>
          <div class="mini-leg ml2"></div>

          <div class="tent"></div>
          <div class="grass"></div>
        </div>

        <div class="question-card">
          <div class="question-badge" id="questionBadge">QUESTION 1</div>
          <p class="question-text" id="questionText"></p>
        </div>

        <div class="button-row">
          <button class="ox-btn o" onclick="selectAnswer(true)">O</button>
          <button class="ox-btn x" onclick="selectAnswer(false)">X</button>
        </div>
      </div>
    </div>

    <div class="window hidden" id="resultScreen">
      <div class="title-bar">
        <div class="title-left">
          <div class="title-icon">🎪</div>
          <div class="title-text">결과 확인</div>
        </div>
        <div class="window-controls">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>

      <div class="content result-content" id="resultBox"></div>
    </div>

  </div>

  <script>
    const questions = [
      "나는 아직도 부를 수 있는 만화 주제가가 있다.",
      "가끔 문방구 앞에 멈춘다.",
      "하늘을 보면 예쁜 모양의 구름을 찾는다.",
      "놀이공원에 가면 범퍼카 한 번은 타야한다.",
      "뽑기 기계 앞에서 승부욕이 생긴다.",
      "어릴 때 별명을 아직 기억한다.",
      "남 모르게 횡단보도 하얀색 선만 밟을 때가 있다.",
      "내가 만화의 주인공이라고 상상할 때가 있다.",
      "우리 집에 왜 왔니 가사가 자동 재생된다.",
      "종이를 보면 비행기 한 번은 접어본다.",
      "음식 먹을 때 제일 맛있는 건 마지막에 먹는다.",
      "나는 아직도 학교 앞에서 먹던 컵 떡볶이가 생각난다.",
      "눈이 오면 첫 발자국을 찍고 싶어진다.",
      "놀이터를 지나가면 한 번쯤 그네가 타고 싶어진다.",
      "종 치는 소리를 들으면 괜히 반응한다.",
      "비밀 얘기할 때 괜히 목소리가 더 작아진다.",
      "버튼을 보면 누르고 싶다.",
      "누군가 내 이름을 불러주면 괜히 반갑다.",
      "나는 아직도 어릴 때 만들었던 이메일을 사용한다.",
      "포장지를 뜯기 전에 괜히 한번 흔들어본다."
    ];

    let currentIndex = 0;
    let score = 0;

    const startScreen = document.getElementById("startScreen");
    const testScreen = document.getElementById("testScreen");
    const resultScreen = document.getElementById("resultScreen");

    const progressBar = document.getElementById("progressBar");
    const progressText = document.getElementById("progressText");
    const questionBadge = document.getElementById("questionBadge");
    const questionText = document.getElementById("questionText");
    const resultBox = document.getElementById("resultBox");

    function startTest() {
      startScreen.classList.add("hidden");
      resultScreen.classList.add("hidden");
      testScreen.classList.remove("hidden");
      currentIndex = 0;
      score = 0;
      renderQuestion();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestion() {
      questionText.textContent = questions[currentIndex];
      questionBadge.textContent = "QUESTION " + (currentIndex + 1);
      progressText.textContent = (currentIndex + 1) + " / " + questions.length;
      progressBar.style.width = (((currentIndex + 1) / questions.length) * 100) + "%";
    }

    function selectAnswer(isYes) {
      if (isYes) {
        score += 1;
      }

      currentIndex += 1;

      if (currentIndex < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      testScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });

      const resultImageName = `img0102_${score}.png`;

      resultBox.innerHTML = `
        <div class="result-layout">
          <div class="result-image-wrap">
            <img src="${resultImageName}" alt="동심 테스트 결과 ${score}점" class="result-image">
          </div>
          <div class="result-actions">
            <button class="btn retry-btn" onclick="restartTest()">다시 해보기</button>
          </div>
        </div>
      `;
    }

    function restartTest() {
      currentIndex = 0;
      score = 0;
      resultScreen.classList.add("hidden");
      startScreen.classList.remove("hidden");
      progressBar.style.width = "0%";
      progressText.textContent = "1 / " + questions.length;
      window.scrollTo({ top: 0, behavior: "smooth" });
    }
  </script>
</body>
</html>
