<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테스트잇 사주 만세력 프로필 테스트</title>
<script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  
  :root {
    --bg-blue: #9ac2e5; 
    --folder-yellow: #fff5c0; 
    --line-color: #1e3a8a; 
    --text-main: #1e3a8a;
    --text-sub: #3b5998;
    --white: #ffffff;
    --accent-red: #e11d48; 
    
    --wood-bg: #d3f9d8; --wood-txt: #2b8a3e;
    --fire-bg: #ffe3e3; --fire-txt: #c92a2a;
    --earth-bg: #ffebb3; --earth-txt: #d97706;
    --metal-bg: #f1f3f5; --metal-txt: #495057;
    --water-bg: #d0ebff; --water-txt: #0b7285;
  }

  body {
    font-family: 'Pretendard', sans-serif;
    background-color: var(--bg-blue);
    background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 15px 15px;
    margin: 0;
    padding: 30px 15px;
    display: flex;
    justify-content: center;
    color: var(--text-main);
  }

  #app {
    width: 100%;
    max-width: 460px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .screen {
    display: none;
    width: 100%;
    flex-direction: column;
    animation: fadeIn 0.4s ease-out;
  }

  .screen.active {
    display: flex;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* 캡처 영역 (배경 포함하여 깔끔하게 캡처되도록 설정) */
  #capture-area {
    width: 100%;
    background-color: var(--bg-blue);
    background-image: linear-gradient(rgba(255,255,255,0.1) 1px, transparent 1px),
                      linear-gradient(90deg, rgba(255,255,255,0.1) 1px, transparent 1px);
    background-size: 15px 15px;
    padding: 30px 15px 15px 15px; /* 상단 탭과 클립을 위한 여백 */
    box-sizing: border-box;
    margin-bottom: 20px;
  }

  .folder-wrapper {
    width: 100%;
    position: relative;
  }

  .folder-tab {
    width: auto;
    min-width: 130px;
    height: 35px;
    background-color: var(--folder-yellow);
    border: 2px solid var(--line-color);
    border-bottom: none;
    margin-left: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 15px;
    font-weight: 800;
    color: var(--line-color);
    position: relative;
    z-index: 2;
    padding: 0 15px;
  }

  .folder-body {
    background-color: var(--folder-yellow);
    border: 2px solid var(--line-color);
    padding: 25px 20px;
    box-shadow: 4px 6px 0px rgba(30, 58, 138, 0.15);
    position: relative;
    z-index: 1;
    margin-top: -2px;
  }

  .folder-inner {
    border: 2px dashed #d1d5db;
    border-color: rgba(30, 58, 138, 0.3);
    padding: 20px;
    background-color: transparent;
  }

  .sticker-title {
    background-color: var(--white);
    border: 2px solid var(--line-color);
    padding: 10px 15px;
    font-size: 22px;
    font-weight: 800;
    text-align: center;
    color: var(--line-color);
    box-shadow: 3px 3px 0px var(--line-color);
    transform: rotate(-2deg);
    margin: 10px auto 30px auto;
    width: max-content;
  }

  .main-desc {
    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--text-sub);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  .btn {
    width: 100%;
    padding: 14px;
    background-color: var(--white);
    color: var(--line-color);
    border: 2px solid var(--line-color);
    box-shadow: 3px 3px 0px var(--line-color);
    font-family: 'Pretendard', sans-serif;
    font-size: 15px;
    font-weight: 800;
    cursor: pointer;
    transition: all 0.1s;
  }

  .btn:active {
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0px var(--line-color);
  }
  
  .btn-highlight {
    background-color: var(--line-color);
    color: var(--white);
    box-shadow: 3px 3px 0px var(--text-sub);
  }

  /* 세로 정렬 버튼 그룹 */
  .btn-col-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    padding: 0 15px;
    box-sizing: border-box;
  }

  .form-group-full {
    margin-bottom: 15px;
    background-color: var(--white);
    border: 2px solid var(--line-color);
    padding: 10px 15px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .form-group-full label {
    font-size: 14px;
    font-weight: 700;
    color: var(--line-color);
    white-space: nowrap;
    margin-right: 15px;
  }
  
  .form-group-full select {
    width: 60%;
  }

  .form-inline-group {
    display: flex;
    gap: 10px;
    margin-bottom: 15px;
  }

  .input-item {
    flex: 1;
    background-color: var(--white);
    border: 2px solid var(--line-color);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
  }

  .input-item label {
    font-size: 12px;
    font-weight: 700;
    color: var(--line-color);
    margin-bottom: 5px;
  }

  select {
    width: 100%;
    padding: 8px;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    font-weight: 600;
    background-color: #f8fafc;
    border: 1.5px solid var(--line-color);
    border-radius: 0;
    color: var(--line-color);
    cursor: pointer;
  }

  select:focus {
    outline: none;
    background-color: #fff;
  }

  .profile-table {
    width: 100%;
    background-color: var(--white);
    border: 2px solid var(--line-color);
  }

  .saju-top-area {
    display: flex;
    border-bottom: 2px solid var(--line-color);
  }

  .ilju-title-box {
    width: 35%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    font-weight: 800;
    border-right: 2px solid var(--line-color);
    background-color: #eff6ff;
  }

  .palja-grid-box {
    width: 65%;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(2, 1fr);
  }

  .palja-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    font-weight: 800;
    border-right: 2px solid var(--line-color);
    border-bottom: 2px solid var(--line-color);
    padding: 12px 0;
  }

  .palja-cell:nth-child(4n) { border-right: none; }
  .palja-cell:nth-child(n+5) { border-bottom: none; }

  .wood { background-color: var(--wood-bg); color: var(--wood-txt); }
  .fire { background-color: var(--fire-bg); color: var(--fire-txt); }
  .earth { background-color: var(--earth-bg); color: var(--earth-txt); }
  .metal { background-color: var(--metal-bg); color: var(--metal-txt); }
  .water { background-color: var(--water-bg); color: var(--water-txt); }
  .empty-cell { background-color: #f1f5f9; color: #94a3b8; }

  .section-heading {
    text-align: center;
    padding: 10px;
    background-color: #eff6ff;
    font-size: 15px;
    font-weight: 800;
    border-bottom: 2px solid var(--line-color);
    letter-spacing: 0.5px;
  }

  .summary-grid {
    display: flex;
    border-bottom: 2px solid var(--line-color);
  }

  .summary-col {
    flex: 1;
    text-align: center;
    padding: 15px 5px;
    border-right: 2px solid var(--line-color);
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .summary-col:last-child { border-right: none; }

  .col-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-sub);
    margin-bottom: 12px;
  }

  .col-content {
    display: flex;
    justify-content: space-evenly;
    font-size: 14px;
    font-weight: 700;
  }

  .circled {
    position: relative;
    color: var(--accent-red);
    font-weight: 800;
    z-index: 1;
  }
  
  .circled::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    width: 140%;
    height: 140%;
    border: 2.5px solid var(--accent-red);
    border-radius: 50%;
    transform: translate(-50%, -50%) rotate(-10deg);
    z-index: -1;
  }

  .trait-list {
    padding: 20px 20px;
    font-size: 14px;
    line-height: 1.7;
    font-weight: 600;
    border-bottom: 2px solid var(--line-color);
  }

  .trait-list div {
    position: relative;
    padding-left: 15px;
    margin-bottom: 8px;
  }

  .trait-list div::before {
    content: '-';
    position: absolute;
    left: 0;
    font-weight: bold;
    color: var(--line-color);
  }

  .job-grid {
    display: flex;
    padding: 15px 0;
  }

  .job-col {
    flex: 1;
    text-align: center;
    padding: 0 10px;
    border-right: 2px dashed var(--line-color);
  }
  
  .job-col:last-child { border-right: none; }

  .job-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-sub);
    margin-bottom: 8px;
    text-decoration: underline;
    text-decoration-color: var(--accent-red);
    text-decoration-style: wavy;
  }

  .job-desc {
    font-size: 14px;
    font-weight: 800;
    line-height: 1.5;
    color: var(--text-main);
  }

  .paperclip {
    position: absolute;
    top: -15px;
    right: 30px;
    width: 15px;
    height: 45px;
    border: 3px solid #cbd5e1;
    border-radius: 10px;
    border-bottom-left-radius: 0;
    z-index: 10;
    transform: rotate(15deg);
    background: transparent;
  }

  /* 팝업 모달 스타일 */
  .modal-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-color: rgba(30, 58, 138, 0.7);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }

  .modal-overlay.active {
    display: flex;
  }

  .modal-content {
    background-color: var(--folder-yellow);
    border: 2px solid var(--line-color);
    padding: 20px;
    max-width: 400px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 6px 6px 0px var(--line-color);
    text-align: center;
    position: relative;
  }

  .modal-close {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 20px;
    font-weight: 800;
    color: var(--line-color);
    cursor: pointer;
  }

  .modal-text {
    font-size: 16px;
    font-weight: 800;
    color: var(--accent-red);
    margin: 10px 0 20px 0;
  }

  #modal-image-container img {
    width: 100%;
    border: 2px solid var(--line-color);
    display: block;
  }

</style>
</head>
<body>

<div id="app">
  <div id="screen-main" class="screen active">
    <div class="folder-wrapper">
      <div class="paperclip"></div>
      <div class="folder-tab">PROFILE.ZIP</div>
      <div class="folder-body">
        <div class="folder-inner">
          <div class="sticker-title">사주 만세력 프로필</div>
          <div class="main-desc">내 사주 팔자 전체의 십성과 격국을 분석해<br>입체적이고 트렌디한 이력서 프로필을<br>만들어 드립니다.</div>
          <button class="btn" onclick="showScreen('screen-input')">프로필 생성하기</button>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-input" class="screen">
    <div class="folder-wrapper">
      <div class="paperclip" style="right: auto; left: 30px; transform: rotate(-15deg);"></div>
      <div class="folder-tab">INPUT DATA</div>
      <div class="folder-body">
        <div class="folder-inner">
          
          <div class="form-group-full">
            <label>양력/음력</label>
            <select id="sel-type"><option value="solar">양력</option><option value="lunar">음력</option></select>
          </div>
          
          <div class="form-inline-group">
            <div class="input-item">
              <label>생년</label>
              <select id="sel-year"></select>
            </div>
            <div class="input-item">
              <label>생월</label>
              <select id="sel-month"></select>
            </div>
          </div>
          
          <div class="form-inline-group">
            <div class="input-item">
              <label>생일</label>
              <select id="sel-day"></select>
            </div>
            <div class="input-item">
              <label>생시</label>
              <select id="sel-time">
                <option value="-1">모름</option><option value="0">자시(23:30~01:29)</option><option value="2">축시(01:30~03:29)</option>
                <option value="4">인시(03:30~05:29)</option><option value="6">묘시(05:30~07:29)</option><option value="8">진시(07:30~09:29)</option>
                <option value="10">사시(09:30~11:29)</option><option value="12">오시(11:30~13:29)</option><option value="14">미시(13:30~15:29)</option>
                <option value="16">신시(15:30~17:29)</option><option value="18">유시(17:30~19:29)</option><option value="20">술시(19:30~21:29)</option>
                <option value="22">해시(21:30~23:29)</option>
              </select>
            </div>
          </div>
          
          <button class="btn" onclick="calculateAndShowResult()">결과 확인하기</button>
        </div>
      </div>
    </div>
  </div>

  <div id="screen-result" class="screen">
    <div id="capture-area">
      <div class="folder-wrapper" style="margin-top: 0;">
        <div class="paperclip"></div>
        <div class="folder-tab">테스트잇 사주 만세력 프로필 테스트</div>

        <div class="folder-body" style="padding: 15px;">
          
          <div class="profile-table">
            <div class="saju-top-area">
              <div class="ilju-title-box" id="res-ilju-title"></div>
              <div class="palja-grid-box" id="res-palja-grid"></div>
            </div>

            <div class="section-heading">내 사주 프로필 요약</div>
            <div class="summary-grid">
              <div class="summary-col">
                <div class="col-title">내 사주는</div>
                <div class="col-content">
                  <span id="res-strength-strong">강한편</span>
                  <span id="res-strength-weak">약한편</span>
                </div>
              </div>
              <div class="summary-col">
                <div class="col-title">매력도</div>
                <div class="col-content">
                  <span id="res-charm-strong">강한편</span>
                  <span id="res-charm-weak">약한편</span>
                </div>
              </div>
              <div class="summary-col">
                <div class="col-title">오행 정리</div>
                <div style="font-size: 13px; font-weight: 800; line-height: 1.4;" id="res-summary"></div>
              </div>
            </div>

            <div class="section-heading">내 사주 입체 성격</div>
            <div class="trait-list" id="res-personality"></div>

            <div class="section-heading">추천 직업 매칭</div>
            <div class="job-grid">
              <div class="job-col">
                <div class="job-title">[ 전생의 역할 ]</div>
                <div class="job-desc" id="res-job-past"></div>
              </div>
              <div class="job-col">
                <div class="job-title">[ 현대의 직무 ]</div>
                <div class="job-desc" id="res-job-present"></div>
              </div>
            </div>
          </div>

        </div>
      </div>
    </div>
    <div class="btn-col-group">
      <button class="btn btn-highlight" onclick="saveImage()">결과 이미지 저장하기</button>
      <button class="btn" onclick="location.reload()">다시 해보기</button>
      <button class="btn" onclick="alert('다른 테스트 준비 중입니다!')">다른 테스트 해보기</button>
      <button class="btn" onclick="shareTest()">테스트 공유하기</button>
    </div>
  </div>
</div>

<div id="image-modal" class="modal-overlay">
  <div class="modal-content">
    <div class="modal-close" onclick="closeModal()">X</div>
    <div class="modal-text">꾹 눌러서 이미지를 저장하세요!</div>
    <div id="modal-image-container"></div>
  </div>
</div>

<script>
  const ohaengInfo = {
    '甲':{name:'갑목', type:'목', yy:'+'}, '乙':{name:'을목', type:'목', yy:'-'},
    '丙':{name:'병화', type:'화', yy:'+'}, '丁':{name:'정화', type:'화', yy:'-'},
    '戊':{name:'무토', type:'토', yy:'+'}, '己':{name:'기토', type:'토', yy:'-'},
    '庚':{name:'경금', type:'금', yy:'+'}, '辛':{name:'신금', type:'금', yy:'-'},
    '壬':{name:'임수', type:'수', yy:'+'}, '癸':{name:'계수', type:'수', yy:'-'},
    '子':{name:'자수', type:'수', yy:'-'}, '丑':{name:'축토', type:'토', yy:'-'},
    '寅':{name:'인목', type:'목', yy:'+'}, '卯':{name:'묘목', type:'목', yy:'-'},
    '辰':{name:'진토', type:'토', yy:'+'}, '巳':{name:'사화', type:'화', yy:'+'},
    '午':{name:'오화', type:'화', yy:'-'}, '未':{name:'미토', type:'토', yy:'-'},
    '申':{name:'신금', type:'금', yy:'+'}, '酉':{name:'유금', type:'금', yy:'-'},
    '戌':{name:'술토', type:'토', yy:'+'}, '亥':{name:'해수', type:'수', yy:'+'}
  };

  const elementClassMap = { '목':'wood', '화':'fire', '토':'earth', '금':'metal', '수':'water' };

  const producingElement = { '목':'수', '화':'목', '토':'화', '금':'토', '수':'금' };
  const controllingElement = { '목':'금', '화':'수', '토':'목', '금':'화', '수':'토' };

  function getShipseong(myType, myYY, targetType, targetYY) {
    if(myType === targetType) return myYY === targetYY ? '비견' : '겁재';
    if(
      (myType==='목'&&targetType==='화') || (myType==='화'&&targetType==='토') ||
      (myType==='토'&&targetType==='금') || (myType==='금'&&targetType==='수') || (myType==='수'&&targetType==='목')
    ) return myYY === targetYY ? '식신' : '상관';
    if(
      (myType==='목'&&targetType==='토') || (myType==='화'&&targetType==='금') ||
      (myType==='토'&&targetType==='수') || (myType==='금'&&targetType==='목') || (myType==='수'&&targetType==='화')
    ) return myYY === targetYY ? '편재' : '정재';
    if(
      (targetType==='목'&&myType==='토') || (targetType==='화'&&myType==='금') ||
      (targetType==='토'&&myType==='수') || (targetType==='금'&&myType==='목') || (targetType==='수'&&myType==='화')
    ) return myYY === targetYY ? '편관' : '정관';
    if(
      (targetType==='목'&&myType==='화') || (targetType==='화'&&myType==='토') ||
      (targetType==='토'&&myType==='금') || (targetType==='금'&&myType==='수') || (targetType==='수'&&myType==='목')
    ) return myYY === targetYY ? '편인' : '정인';
    return '';
  }

  const shipseongModifier = {
    '비견': { past: "자기 힘으로 우뚝 선", present: "주관이 뚜렷하고 독립적인" },
    '겁재': { past: "치열한 경쟁을 이겨낸", present: "승부욕이 강하고 끈기 있는" },
    '식신': { past: "한 우물만 깊게 파고든", present: "타고난 재주가 있고 전문적인" },

    const myYY = myInfo.yy; 

    const motherElement = producingElement[myType];
    const iljuName = myInfo.name.charAt(0) + ohaengInfo[dayZhi].name.charAt(0) + "일주";

    const gridEl = document.getElementById('res-palja-grid');
    gridEl.innerHTML = '';
    
    sajuArray.forEach(pillar => {
      const info = ohaengInfo[pillar.gan];
      const div = document.createElement('div');
      div.className = `palja-cell ${info ? elementClassMap[info.type] : 'empty-cell'}`;
      div.innerHTML = info ? info.name : '-';
      gridEl.appendChild(div);
    });

    sajuArray.forEach(pillar => {
      const info = ohaengInfo[pillar.zhi];
      const div = document.createElement('div');
      div.className = `palja-cell ${info ? elementClassMap[info.type] : 'empty-cell'}`;
      div.innerHTML = info ? info.name : '-';
      gridEl.appendChild(div);
    });

    document.getElementById('res-ilju-title').innerText = iljuName;

    const elementCounts = { '목':0, '화':0, '토':0, '금':0, '수':0 };
    let myPowerScore = 0; 
    let totalScore = 0;
    const shipseongScores = { '비견':0, '겁재':0, '식신':0, '상관':0, '편재':0, '정재':0, '편관':0, '정관':0, '편인':0, '정인':0 };

    sajuArray.forEach(p => {
      if(p.gan && ohaengInfo[p.gan]) {
        let info = ohaengInfo[p.gan];
        elementCounts[info.type] += p.weightGan;
        totalScore += p.weightGan;
        if(info.type === myType || info.type === motherElement) myPowerScore += p.weightGan;
        
        let ss = getShipseong(myType, myYY, info.type, info.yy);
        if(ss) shipseongScores[ss] += p.weightGan;
      }
      if(p.zhi && ohaengInfo[p.zhi]) {
        let info = ohaengInfo[p.zhi];
        elementCounts[info.type] += p.weightZhi;
        totalScore += p.weightZhi;
        if(info.type === myType || info.type === motherElement) myPowerScore += p.weightZhi;

        let ss = getShipseong(myType, myYY, info.type, info.yy);
        if(ss) shipseongScores[ss] += p.weightZhi;
      }
    });

    let maxElem = '', minElem = '', maxCount = -1, minCount = 99;
    for(let el in elementCounts) {
      if(elementCounts[el] > maxCount) { maxCount = elementCounts[el]; maxElem = el; }
      if(elementCounts[el] < minCount) { minCount = elementCounts[el]; minElem = el; }
    }
    const isMuja = minCount === 0;

    document.getElementById('res-summary').innerHTML = `${maxElem}기운 강함<br>${isMuja ? minElem + '기운 없음' : minElem + '기운 약함'}`;

    const isStrong = (myPowerScore / totalScore) >= 0.5;
    document.getElementById('res-strength-strong').className = isStrong ? 'circled' : '';
    document.getElementById('res-strength-weak').className = !isStrong ? 'circled' : '';

    let dohwaCount = 0;
    const dohwaChars = ['자', '오', '묘', '유'];
    sajuArray.forEach(p => {
      if(p.zhi && ohaengInfo[p.zhi]) {
        let zhiChar = ohaengInfo[p.zhi].name.charAt(0);
        if(dohwaChars.includes(zhiChar)) dohwaCount++;
      }
    });
    const isCharmStrong = dohwaCount >= 1; 
    document.getElementById('res-charm-strong').className = isCharmStrong ? 'circled' : '';
    document.getElementById('res-charm-weak').className = !isCharmStrong ? 'circled' : '';

    let maxShipseong = '', maxSsScore = -1;
    for(let ss in shipseongScores) {
      if(shipseongScores[ss] > maxSsScore) { maxSsScore = shipseongScores[ss]; maxShipseong = ss; }
    }

    let finalPersonality = [];
    if(iljuBaseTraits[iljuName]) finalPersonality.push(...iljuBaseTraits[iljuName]);
    if(maxShipseong && dynamicTraits[maxShipseong]) finalPersonality.push(dynamicTraits[maxShipseong]);
    finalPersonality.push(isStrong ? dynamicTraits['신강'] : dynamicTraits['신약']);

    document.getElementById('res-personality').innerHTML = finalPersonality.map(t => `<div>${t}</div>`).join('');

    const baseJob = iljuJobs[iljuName] || { p: "부지런한 마을 관리인", pr: "사무직 종사자" };
    const modifier = shipseongModifier[maxShipseong] || { past: "묵묵히 자기 일을 해낸", present: "안정적으로 업무를 수행하는" };

    document.getElementById('res-job-past').innerHTML = `${modifier.past}<br>${baseJob.p}`;
    document.getElementById('res-job-present').innerHTML = `${modifier.present}<br>${baseJob.pr}`;

    showScreen('screen-result');
  }

  function saveImage() {
    const captureTarget = document.getElementById('capture-area');
    
    html2canvas(captureTarget, {
      scale: 2, 
      backgroundColor: null,
      logging: false,
      useCORS: true 
    }).then(canvas => {
      const imgData = canvas.toDataURL("image/png");
      const imgElement = document.createElement("img");
      imgElement.src = imgData;
      
      const container = document.getElementById('modal-image-container');
      container.innerHTML = ''; 
      container.appendChild(imgElement);
      
      document.getElementById('image-modal').classList.add('active');
    });
  }

  function closeModal() {
    document.getElementById('image-modal').classList.remove('active');
  }

  function shareTest() {
    if (navigator.share) {
      navigator.share({
        title: '사주 만세력 프로필 테스트',
        text: '내 진짜 사주 오행과 심리를 분석해 입체적인 프로필을 만들어보세요!',
        url: window.location.href,
      })
      .catch(console.error);
    } else {
      alert('현재 브라우저에서는 공유 기능이 지원되지 않습니다. URL을 복사해 주세요!');
    }
  }
</script>
