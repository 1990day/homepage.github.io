  let currentQuestionIndex = 0;
  let testScore = 0;

  window.onload = () => {
    const yearSel = document.getElementById("sel-year");
    const monthSel = document.getElementById("sel-month");
    const daySel = document.getElementById("sel-day");

    const currYear = new Date().getFullYear();
    for (let i = currYear; i >= 1930; i--) {
      yearSel.options.add(new Option(`${i}년`, i));
    }
    for (let i = 1; i <= 12; i++) {
      monthSel.options.add(new Option(`${i}월`, i));
    }
    for (let i = 1; i <= 31; i++) {
      daySel.options.add(new Option(`${i}일`, i));
    }

    yearSel.value = "1990";
    monthSel.value = "1";
    daySel.value = "1";
  };

  function moveAdContainer(toId) {
    const adContainer = document.getElementById("ad-container");
    const target = document.getElementById(toId);
    if(target && adContainer.parentNode !== target) {
        target.appendChild(adContainer);
    }
  }

  function nextScreen(hideId, showId, moveAd = true) {
    document.getElementById(hideId).classList.remove("active");
    document.getElementById(showId).classList.add("active");
    if(moveAd) moveAdContainer(showId);
  }

  function startTest() {
    currentQuestionIndex = 0;
    testScore = 0;
    renderQuestion();
    nextScreen("screen-input", "screen-test", false); 
  }

  function renderQuestion() {
    const item = questions[currentQuestionIndex];
    document.getElementById("q-text").innerHTML = item.q;
    document.getElementById("answer-a").innerHTML = item.a;
    document.getElementById("answer-b").innerHTML = item.b;
    document.getElementById("progress-label").innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
  }

  function answerQuestion(score) {
    testScore += score;
    currentQuestionIndex++;

    if (currentQuestionIndex < questions.length) {
      const screen = document.getElementById("screen-test");
      screen.style.animation = "none";
      screen.offsetHeight;
      screen.style.animation = "fadeIn .3s ease forwards"; 
      renderQuestion();
    } else {
      processResult();
    }
  }

  function calculateSajuHSP() {
    const y = parseInt(document.getElementById("sel-year").value, 10);
    const m = parseInt(document.getElementById("sel-month").value, 10);
    const d = parseInt(document.getElementById("sel-day").value, 10);
    let h = parseInt(document.getElementById("sel-time").value, 10);
    const cal = document.getElementById("sel-cal").value;

    if (h === -1) h = 12;

    let bazi;
    if (cal === "solar") {
      bazi = Solar.fromYmdHms(y, m, d, h, 0, 0).getLunar().getEightChar();
    } else {
      bazi = Lunar.fromYmdHms(y, m, d, h, 0, 0).getEightChar();
    }

    const branches = [bazi.getYearZhi(), bazi.getMonthZhi(), bazi.getDayZhi(), bazi.getTimeZhi()];
    const stems = [bazi.getYearGan(), bazi.getMonthGan(), bazi.getDayGan(), bazi.getTimeGan()];
    const allChars = [...stems, ...branches];
    const dayMaster = stems[2];

    let hspScore = 0;
    let reasons = [];

    const gwimunPairs = ["子酉","酉子","丑午","午丑","寅未","未寅","卯申","申卯","辰亥","亥辰","巳戌","戌巳"];
    let gwimunCount = 0;
    for(let i = 0; i < branches.length - 1; i++) {
        if(gwimunPairs.includes(branches[i] + branches[i+1])) gwimunCount++;
    }
    if (gwimunCount > 0) {
        hspScore += 25;
        reasons.push("촉과 영감이 발달하는 귀문관살");
    }

    const hyeonchimChars = ["甲","申","卯","午","辛","未"];
    let hyeonchimCount = allChars.filter(c => hyeonchimChars.includes(c)).length;
    if (hyeonchimCount >= 2) {
        hspScore += 15;
        reasons.push("신경이 예리하고 디테일에 강한 현침살");
    }

    const pyeoninMap = { 
      "甲":["壬","亥"], "乙":["癸","子"], "丙":["甲","寅"], "丁":["乙","卯"], 
      "戊":["丙","巳"], "己":["丁","午"], "庚":["戊","辰","戌"], "辛":["己","丑","未"], 
      "壬":["庚","申"], "癸":["辛","酉"] 
    };
    const sanggwanMap = {
      "甲":["丁","午"], "乙":["丙","巳"], "丙":["己","丑","未"], "丁":["戊","辰","戌"],
      "戊":["辛","酉"], "己":["庚","申"], "庚":["癸","子"], "辛":["壬","亥"],
      "壬":["乙","卯"], "癸":["甲","寅"]
    };
    
    let pyeoninCount = allChars.filter(c => (pyeoninMap[dayMaster] || []).includes(c)).length;
    let sanggwanCount = allChars.filter(c => (sanggwanMap[dayMaster] || []).includes(c)).length;
    
    if (pyeoninCount >= 1) {
        hspScore += 12;
        reasons.push("생각이 깊고 눈치가 비상한 편인");
    }
    if (sanggwanCount >= 1) {
        hspScore += 10;
        reasons.push("감정선이 섬세하고 반응이 빠른 상관");
    }

    const waterMetal = ["壬","癸","亥","子","庚","辛","申","酉"];
    let wmCount = allChars.filter(c => waterMetal.includes(c)).length;
    if (wmCount >= 4) { 
        hspScore += 15; 
        reasons.push("감수성과 예리함을 높이는 수/금 오행 과다"); 
    }

    const supportMap = {
        "甲":["甲","乙","寅","卯","壬","癸","亥","자"],
        "乙":["甲","乙","寅","卯","壬","癸","亥","자"],
        "丙":["丙","丁","巳","오","甲","乙","寅","卯"],
        "丁":["丙","丁","巳","오","甲","乙","寅","卯"],
        "戊":["戊","己","진","술","축","미","丙","丁","巳","오"],
        "己":["戊","己","진","술","축","미","丙","丁","巳","오"],
        "庚":["庚","辛","申","酉","戊","己","진","술","축","미"],
        "辛":["庚","辛","申","酉","戊","己","진","술","축","미"],
        "壬":["壬","癸","亥","자","庚","辛","申","酉"],
        "癸":["壬","癸","亥","자","庚","辛","申","酉"]
    };
    let supportCount = allChars.filter(c => (supportMap[dayMaster] || []).includes(c)).length;
    if (supportCount <= 3) { 
        hspScore += 15; 
        reasons.push("외부 환경의 영향을 쉽게 받는 신약한 기운"); 
    }

    const yinStems = ["乙","丁","己","辛","癸"];
    if (yinStems.includes(dayMaster)) {
        hspScore += 8;
        if(!reasons.includes("내면이 섬세한 음간(陰干)의 성향")) reasons.push("내면이 섬세한 음간(陰干)의 성향");
    }

    const scorePercent = Math.max(10, Math.min(99, hspScore + 10));
    let summary = "";

    if (reasons.length >= 3) {
        summary = `사주 원국에 ${reasons[0]}, ${reasons[1]}, 그리고 ${reasons[2]} 등의 기운이 복합적으로 작용하고 있습니다. 타인의 감정이나 환경의 미세한 변화를 스펀지처럼 빨아들이는 타고난 초민감자 기질이 보입니다.`;
    } else if (reasons.length === 2) {
        summary = `사주에 ${reasons[0]} 및 ${reasons[1]} 요소가 자리 잡고 있습니다. 겉으로는 티가 나지 않을 수 있지만, 특정 상황이나 관계에서 남들보다 훨씬 깊고 예민하게 반응하는 편입니다.`;
    } else if (reasons.length === 1) {
        summary = `전체적으로는 무난한 편이나, 사주 속 ${reasons[0]}의 영향으로 본인이 중요하게 생각하는 포인트에서는 감각이 날카로워집니다.`;
    } else {
        summary = `사주에 극도로 예민함을 뜻하는 살이나 기운이 거의 없습니다. 외부의 시선이나 자극에 크게 타격받지 않고 본인만의 중심을 잘 유지하는 단단한 멘탈의 소유자입니다.`;
    }

    return { scorePercent, summary };
  }

  function analyzeTest(score) {
    const percent = Math.round((score / questions.length) * 100);
    let summary = "";

    if (score >= 8) {
      summary = "일상의 작은 소음이나 분위기 변화에도 피로를 쉽게 느끼며, 에너지를 방어하기 위한 철저한 혼자만의 충전 시간이 필수인 심리 상태입니다.";
    } else if (score >= 5) {
      summary = "미묘한 뉘앙스를 다 읽고 있으면서도 겉으로는 티를 내지 않아, 내면의 피로감을 은근히 쌓아두고 있는 상태입니다.";
    } else if (score >= 3) {
      summary = "평소엔 웬만한 자극을 잘 넘기지만, 스트레스가 쌓이거나 컨디션이 떨어지면 예민함의 스위치가 훅 켜집니다.";
    } else {
      summary = "환경 변화나 타인의 감정에 둔감한 편이며, 웬만한 일은 마음에 담아두지 않고 쿨하게 털어내는 안정적인 심리 상태입니다.";
    }

    return { scorePercent: percent, summary };
  }

  function combineResults(sajuPercent, testPercent) {
    const total = Math.round((sajuPercent * 0.4) + (testPercent * 0.6));
    let typeName, typeDesc, keywords;

    if (total >= 92) {
      typeName = "인간 안테나형";
      typeDesc = "공기의 흐름만 바뀌어도 알아채는 완벽한 초민감자! 모든 감각이 열려 있어 쉽게 방전되니 꼭 휴식이 필요해요.";
      keywords = ["과부하 주의", "디테일 귀신", "깊은 공감", "강제 솔로타임"];
    } else if (total >= 84) {
      typeName = "유리알 센서형";
      typeDesc = "투명하고 섬세해서 작은 자극에도 금이 가듯 반응해요. 남들이 놓치는 뉘앙스까지 전부 캐치해내는 능력이 있습니다.";
      keywords = ["감정 스펀지", "눈치 100단", "소음 취약", "은근한 완벽주의"];
    } else if (total >= 76) {
      typeName = "분위기 흡수형";
      typeDesc = "주변 환경과 사람들의 기분에 쉽게 동화되는 편입니다. 슬픈 영화를 보면 남들보다 여운이 며칠은 더 길게 가요.";
      keywords = ["공감 능력자", "빠른 기력소진", "과몰입러", "섬세한 감수성"];
    } else if (total >= 68) {
      typeName = "디테일 캐치형";
      typeDesc = "무던해 보이지만 머릿속으론 수만 가지 디테일을 분석하고 있어요. 타인의 말 한마디를 곱씹는 경향이 있습니다.";
      keywords = ["생각이 꼬리를 묾", "관찰력 갑", "뒤끝 조금", "완벽주의"];
    } else if (total >= 60) {
      typeName = "선택적 예민보스형";
      typeDesc = "내 관심사나 내 바운더리 안의 일에 대해서만 예민함의 스위치가 켜집니다. 그 외의 일에는 의외로 쿨한 편이에요.";
      keywords = ["내 사람만 챙김", "스위치 온오프", "포인트 빡침", "취향 확고"];
    } else if (total >= 52) {
      typeName = "겉바속촉 멘탈형";
      typeDesc = "겉으로는 쿨하고 무던해 보이지만, 집에 돌아오면 오늘 했던 말실수를 이불 차며 후회하는 숨겨진 예민러입니다.";
      keywords = ["이불킥 장인", "상처 잘받음", "티 안냄", "사회적 가면"];
    } else if (total >= 44) {
      typeName = "눈치백단 조율사형";
      typeDesc = "예민함을 타인을 찌르는 무기가 아니라 상황을 부드럽게 만드는 눈치로 사용하는 타협의 달인입니다.";
      keywords = ["사회생활 만렙", "분위기 메이커", "적당한 스트레스", "평화주의자"];
    } else if (total >= 36) {
      typeName = "현실주의 방어막형";
      typeDesc = "감정적인 여운보다는 지금 당장 해결해야 할 현실에 집중합니다. 웬만한 자극은 이성으로 필터링해버려요.";
      keywords = ["효율 중시", "멘탈 관리", "논리적", "감정 분리"];
    } else if (total >= 28) {
      typeName = "타격감 제로형";
      typeDesc = "남들이 눈치 보고 스트레스받을 때 '뭐 어때' 하고 넘겨버리는 대단한 스루 능력을 갖췄습니다.";
      keywords = ["마이웨이", "내 알 바 아님", "빠른 회복", "초긍정"];
    } else if (total >= 20) {
      typeName = "평정심 유지러형";
      typeDesc = "외부 환경이 어떻게 변하든 내 페이스를 유지합니다. 타인의 감정에 깊이 개입하지 않아 감정 소모가 적습니다.";
      keywords = ["바위 멘탈", "흔들리지 않음", "감정의 주파수 일정", "독고다이"];
    } else if (total >= 10) {
      typeName = "강철 멘탈형";
      typeDesc = "웬만한 소음이나 스트레스 상황에서도 꿀잠을 잘 수 있는 축복받은 강철 멘탈입니다. 예민함과는 거리가 멉니다.";
      keywords = ["어디서든 꿀잠", "스트레스 내성", "둔감력", "단순 명쾌"];
    } else {
      typeName = "우주최강 둔감형";
      typeDesc = "세상 풍파에도 아랑곳하지 않는 극강의 무던함! 눈치 보느라 에너지를 낭비하는 일이 살면서 거의 없습니다.";
      keywords = ["눈치 제로", "행복 지수 높음", "세상 편함", "무념무상"];
    }

    return { total, typeName, typeDesc, keywords };
  }

  function processResult() {
    const sajuResult = calculateSajuHSP();
    const testResult = analyzeTest(testScore);
    const finalResult = combineResults(sajuResult.scorePercent, testResult.scorePercent);

    document.getElementById("gauge-percent").innerText = `${finalResult.total}%`;
    document.getElementById("saju-mini").innerHTML = `사주<br>${sajuResult.scorePercent}%`;
    document.getElementById("test-mini").innerHTML = `테스트<br>${testResult.scorePercent}%`;
    
    document.getElementById("final-type-name").innerHTML = `<span class="wavy-text">${finalResult.typeName}</span>`;
    document.getElementById("final-type-desc").innerText = finalResult.typeDesc;
    
    document.getElementById("res-saju-desc").innerText = sajuResult.summary;
    document.getElementById("res-test-desc").innerText = testResult.summary;

    const keywordGrid = document.getElementById("keyword-grid");
    keywordGrid.innerHTML = "";
    finalResult.keywords.forEach(kw => {
      const div = document.createElement("div");
      div.className = "dashed-box grid-item";
      div.innerHTML = `<span class="wavy-text">${kw}</span>`;
      keywordGrid.appendChild(div);
    });

    nextScreen("screen-test", "screen-result");
  }

  async function shareTest() {
    const shareData = {
      title: "테스트잇 초민감자 성격 테스트",
      text: "테스트잇 초민감자 성격 테스트",
      url: "https://test-it.co.kr/test373"
    };

    if (navigator.share) {
      try {
        await navigator.share(shareData);
        return;
      } catch (e) {
        return;
      }
    }

    try {
      await navigator.clipboard.writeText(`${shareData.title}\n${shareData.url}`);
      alert("테스트 링크를 복사했어요! 친구들에게 공유해보세요!");
    } catch (e) {
      const textArea = document.createElement("textarea");
      textArea.value = `${shareData.title}\n${shareData.url}`;
      document.body.appendChild(textArea);
      textArea.select();
      try {
        document.execCommand("copy");
        alert("테스트 링크를 복사했어요! 친구들에게 공유해보세요!");
      } catch (err) {
        alert("주소창의 링크를 직접 복사해주세요.");
      }
      document.body.removeChild(textArea);
    }
  }

  async function saveResultAsImage() {
    const target = document.getElementById("result-capture");
    try {
      const canvas = await html2canvas(target, {
        backgroundColor: "#f4f4f4",
        scale: 2
      });
      const imgData = canvas.toDataURL("image/png");
      
      document.getElementById("modal-img-result").src = imgData;
      document.getElementById("image-modal").classList.add("active");
    } catch (e) {
      alert("이미지 생성 중 오류가 발생했습니다.");
    }
  }

  function closeImageModal() {
    document.getElementById("image-modal").classList.remove("active");
  }
