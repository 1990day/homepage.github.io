<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>테스트잇 점성술 성격 테스트</title>

  <script src="https://cdn.jsdelivr.net/npm/astronomy-engine@2.1.19/astronomy.browser.min.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

    @font-face {
      font-family: "Umdot";
      src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/Umdot12.woff2") format("woff2");
      font-weight: normal;
      font-display: swap;
    }

    @font-face {
      font-family: "Rimgul";
      src: url("https://cdn.jsdelivr.net/gh/projectnoonnu/2601-4@1.1/Limgul12.woff2") format("woff2");
      font-weight: normal;
      font-display: swap;
    }

    :root {
      --bg: #ffe8f0;
      --grid1: rgba(255,255,255,0.48);
      --grid2: rgba(255,190,210,0.34);
      --frame: #ddea75;
      --frame-line: #94a84d;
      --panel: #f8f8ef;
      --panel-line: #b8b8aa;
      --white: #ffffff;
      --ink: #2f3438;
      --sub: #6b7378;
      --blue: #3bb7e3;
      --pink: #f8dbe3;
      --yellow: #f7efb8;
      --mint: #dcefd7;
      --lavender: #e5def6;
      --peach: #f7e4cf;
      --shadow: 0 14px 30px rgba(160,107,127,0.14);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      min-height: 100vh;
      font-family: "Rimgul", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(90deg, var(--grid1) 0 12px, transparent 12px 24px),
        linear-gradient(var(--grid1) 0 12px, transparent 12px 24px),
        linear-gradient(90deg, var(--grid2) 0 1px, transparent 1px 24px),
        linear-gradient(var(--grid2) 0 1px, transparent 1px 24px),
        var(--bg);
      background-size: 24px 24px, 24px 24px, 24px 24px, 24px 24px, auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0 12px 42px;
      overflow-x: hidden;
    }

    a,
    button,
    input,
    select {
      font-family: inherit;
    }

    .header-wrapper {
      width: calc(100% + 24px);
      margin: 0 -12px 24px;
      background: rgba(255,255,255,0.82);
      border-bottom: 1px solid #f1bfcf;
      backdrop-filter: blur(4px);
    }

    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 980px;
      margin: 0 auto;
      padding: 11px 4%;
      gap: 12px;
    }

    .page-header h1 {
      margin: 0;
      line-height: 1;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .retro-logo {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: var(--ink);
      font-size: 27px;
      font-weight: 950;
      letter-spacing: -0.07em;
      line-height: 1;
      white-space: nowrap;
    }

    .retro-logo::before {
      content: "";
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: #ffa8ba;
      flex-shrink: 0;
    }

    .main-nav {
      display: flex;
      align-items: center;
      list-style: none;
      margin: 0;
      padding: 0;
      gap: 6px;
    }

    .main-nav li {
      margin: 0;
      padding: 0;
    }

    .main-nav a {
      display: block;
      text-decoration: none;
      color: var(--ink);
      font-weight: 900;
      font-size: 14px;
      letter-spacing: -0.03em;
      padding: 7px 11px;
      border: 1px solid #e7c2cf;
      border-radius: 999px;
      background: rgba(255,255,255,0.84);
      line-height: 1;
    }

    .page {
      display: none;
      width: 100%;
    }

    .page.active {
      display: flex;
      justify-content: center;
    }

    .home-wrap {
      width: 100%;
      max-width: 760px;
    }

    .mini-shell {
      position: relative;
      width: 100%;
      background: linear-gradient(180deg, #e6ef85 0%, var(--frame) 100%);
      border: 2px solid var(--frame-line);
      border-radius: 24px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .mini-shell::before {
      content: "";
      position: absolute;
      inset: 14px;
      border: 2px dotted rgba(119,142,67,0.55);
      border-radius: 18px;
      pointer-events: none;
    }

    .mini-inner {
      position: relative;
      z-index: 1;
      background: var(--panel);
      border: 1px solid var(--panel-line);
      border-radius: 20px;
      padding: 16px;
    }

    .card-panel {
      border: 1px solid var(--panel-line);
      border-radius: 16px;
      overflow: hidden;
      background: #ffffff;
    }

    .card-head {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      min-height: 48px;
      padding: 10px 14px;
      background: linear-gradient(180deg, #f7fafc 0%, #eef5f8 100%);
      border-bottom: 1px solid #dde4e8;
    }

    .card-head-title {
      width: 100%;
      text-align: center;
      color: var(--ink);
      font-size: 18px;
      font-weight: 950;
      letter-spacing: -0.05em;
      word-break: keep-all;
      line-height: 1.2;
    }

    .window-controls {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .window-controls span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border: 1px solid #c6d4db;
      border-radius: 5px;
      background: rgba(255,255,255,0.92);
      color: #627881;
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .card-head.result-head {
      justify-content: flex-start;
      padding-right: 72px;
    }

    .card-head.result-head .card-head-title {
      text-align: left;
      color: var(--ink);
    }

    .card-body {
      padding: 14px;
    }

    .home-shell {
      padding: 14px;
    }

    .home-shell::before {
      display: none;
    }

    .home-visual {
      position: relative;
      z-index: 1;
      width: 100%;
      aspect-ratio: 600 / 570;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-radius: 18px;
      background: #f8f8ef;
    }

    .home-visual img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .action-row {
      display: flex;
      justify-content: center;
      margin-top: 14px;
    }

    .action-btn {
      appearance: none;
      border: 1px solid #d6c0c8;
      background: linear-gradient(180deg, #ffffff 0%, #f6edf0 100%);
      color: var(--ink);
      padding: 13px 18px;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: -0.04em;
      border-radius: 10px;
      box-shadow: 0 2px 0 rgba(0,0,0,0.07);
    }

    .action-btn.secondary {
      width: 100%;
    }

    .action-btn:active {
      transform: translateY(1px);
    }

    .field-section {
      border: 1px solid #d9dfdf;
      border-radius: 14px;
      overflow: hidden;
      background: #ffffff;
      margin-bottom: 12px;
    }

    .field-section:last-child {
      margin-bottom: 0;
    }

    .field-title {
      margin: 0;
      padding: 10px 12px;
      border-bottom: 1px solid #e2e6e5;
      color: var(--ink);
      font-size: 14px;
      font-weight: 900;
      letter-spacing: -0.03em;
      background: #f9faf7;
    }

    .field-body {
      padding: 12px;
    }

    .field-row {
      display: block;
      margin-bottom: 12px;
    }

    .field-row:last-child {
      margin-bottom: 0;
    }

    .field-row > label {
      display: block;
      margin-bottom: 8px;
      color: var(--ink);
      font-size: 13px;
      font-weight: 900;
    }

    .select-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    .date-selects {
      flex-wrap: nowrap;
    }

    .date-selects select {
      min-width: 0;
    }

    #selYear {
      flex: 1.45 1 0;
      min-width: 104px;
    }

    #selMonth,
    #selDay {
      flex: 1 1 0;
      min-width: 72px;
    }

    .time-selects #selHour,
    .time-selects #selMin {
      flex: 1 1 0;
      min-width: 84px;
    }

    select,
    input[type="text"] {
      height: 40px;
      border: 1px solid #d8cfd4;
      background: #ffffff;
      color: var(--ink);
      padding: 0 10px;
      font-size: 14px;
      font-weight: 800;
      outline: none;
      border-radius: 10px;
    }

    select {
      min-width: 0;
    }

    input[type="text"] {
      width: 100%;
    }

    .checkbox-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      margin-top: 2px;
      font-size: 13px;
      font-weight: 800;
      color: var(--ink);
    }

    input[type="checkbox"] {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 1px solid #cdbfc7;
      background: #ffffff;
      border-radius: 4px;
      margin: 0;
      position: relative;
      cursor: pointer;
      flex-shrink: 0;
    }

    input[type="checkbox"]:checked {
      background: #fde6ee;
      border-color: #d6a0b4;
    }

    input[type="checkbox"]:checked::after {
      content: "✓";
      position: absolute;
      inset: -1px 0 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #a56279;
      font-size: 13px;
      font-weight: 900;
    }

    .hint-text {
      margin: 0;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.55;
      font-weight: 700;
      word-break: keep-all;
    }

    .suggestions {
      display: block;
      margin-top: 8px;
      max-height: 240px;
      overflow-y: auto;
      border: 1px solid #ead5dd;
      border-radius: 12px;
      background: #fef7fa;
      padding: 6px;
    }

    .suggestions:empty {
      display: none;
    }

    .suggestion-item {
      padding: 9px 10px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.45;
      font-weight: 800;
      color: var(--ink);
      border: 1px solid transparent;
      border-radius: 10px;
      background: #ffffff;
      margin-bottom: 5px;
    }

    .suggestion-item:last-child {
      margin-bottom: 0;
    }

    .suggestion-item:hover {
      border-color: #e1adc1;
      background: #fff0f5;
    }

    .suggestion-item.active {
      border-color: #d58fac;
      background: #ffe8f0;
    }

    .suggestion-item small {
      display: block;
      margin-top: 4px;
      color: #7a858a;
      font-size: 11px;
      font-weight: 700;
    }

    .selected-place {
      margin-top: 10px;
      padding: 10px 11px;
      border: 1px solid #e4d7dd;
      border-radius: 11px;
      background: #fff8fb;
      color: var(--sub);
      font-size: 12px;
      line-height: 1.5;
      font-weight: 800;
      word-break: keep-all;
    }

    .selected-place.is-selected {
      background: #ffe8f0;
      border-color: #d58fac;
      color: #a24e6f;
    }

    .loading-stage {
      min-height: 430px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .loading-wrap {
      width: 100%;
      max-width: 520px;
      padding: 18px;
      text-align: center;
      border: 1px solid #ead8de;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(170,105,128,0.08);
    }

    .loading-scene {
      position: relative;
      width: 100%;
      height: 240px;
      overflow: hidden;
      border-radius: 18px;
      background:
        radial-gradient(circle at 18% 20%, rgba(255,255,255,0.85) 0 12px, transparent 12px),
        radial-gradient(circle at 82% 24%, rgba(255,255,255,0.75) 0 9px, transparent 9px),
        linear-gradient(180deg, #edf6fb 0%, #edf6fb 70%, #d8ebf7 70%, #d8ebf7 100%);
      border: 1px solid #dce6ec;
      margin-bottom: 16px;
    }

    .loading-ground {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 68px;
      background: linear-gradient(180deg, #d9ebf6 0%, #c7e1f0 100%);
      border-top: 1px solid #c5dae7;
    }

    .loading-ground::before {
      content: "";
      position: absolute;
      left: -20px;
      right: -20px;
      top: -22px;
      height: 46px;
      background: #e6f2f8;
      border-radius: 50%;
    }

    .walk-path {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 26px;
      height: 20px;
      border-radius: 999px;
      background: rgba(255,255,255,0.46);
      box-shadow: inset 0 0 0 1px rgba(186,210,225,0.7);
    }

    .walker {
      position: absolute;
      left: -90px;
      bottom: 48px;
      width: 66px;
      height: 112px;
      animation: walkAcross 4.1s linear infinite;
    }

    .walker-inner {
      position: relative;
      width: 100%;
      height: 100%;
      animation: walkerBounce 0.48s ease-in-out infinite alternate;
    }

    .walker-head {
      position: absolute;
      top: 6px;
      left: 19px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #ffe1cf;
      border: 2px solid #775963;
      z-index: 3;
    }

    .walker-hair {
      position: absolute;
      top: 0;
      left: 15px;
      width: 36px;
      height: 27px;
      border-radius: 18px 18px 12px 12px;
      background: #8b5b5d;
      z-index: 4;
    }

    .walker-body {
      position: absolute;
      top: 32px;
      left: 16px;
      width: 34px;
      height: 38px;
      border-radius: 14px 14px 10px 10px;
      background: #96c97a;
      border: 2px solid #62834f;
      z-index: 2;
    }

    .walker-skirt {
      position: absolute;
      top: 62px;
      left: 16px;
      width: 34px;
      height: 18px;
      background: #f4d7df;
      border: 2px solid #8e7480;
      border-top: none;
      clip-path: polygon(8% 0, 92% 0, 100% 100%, 0 100%);
      z-index: 2;
    }

    .walker-arm {
      position: absolute;
      top: 38px;
      width: 10px;
      height: 32px;
      background: #ffe1cf;
      border: 2px solid #775963;
      border-radius: 10px;
      z-index: 1;
      transform-origin: top center;
    }

    .walker-arm.left {
      left: 12px;
      animation: armLeft 0.38s ease-in-out infinite alternate;
    }

    .walker-arm.right {
      right: 12px;
      animation: armRight 0.38s ease-in-out infinite alternate;
    }

    .walker-leg {
      position: absolute;
      top: 76px;
      width: 10px;
      height: 34px;
      background: #ffe1cf;
      border: 2px solid #775963;
      border-radius: 10px;
      transform-origin: top center;
      z-index: 1;
    }

    .walker-leg.left {
      left: 20px;
      animation: legLeft 0.38s ease-in-out infinite alternate;
    }

    .walker-leg.right {
      right: 20px;
      animation: legRight 0.38s ease-in-out infinite alternate;
    }

    .walker-shoe {
      position: absolute;
      bottom: -2px;
      width: 16px;
      height: 8px;
      border-radius: 8px;
      background: #6a7c91;
      left: -3px;
    }

    .walker-leg.right .walker-shoe {
      left: -1px;
    }

    .loading-bubble {
      position: absolute;
      left: 50%;
      top: 22px;
      transform: translateX(-50%);
      min-width: 180px;
      padding: 10px 14px;
      border-radius: 14px;
      background: rgba(255,255,255,0.92);
      border: 1px solid #d8e5ec;
      color: #4b6169;
      font-size: 13px;
      font-weight: 900;
      letter-spacing: -0.03em;
      box-shadow: 0 6px 10px rgba(120,162,184,0.12);
    }

    .loading-bubble::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 14px;
      height: 14px;
      background: rgba(255,255,255,0.92);
      border-right: 1px solid #d8e5ec;
      border-bottom: 1px solid #d8e5ec;
      transform: translateX(-50%) rotate(45deg);
    }

    .loading-text {
      margin: 0 0 14px;
      color: var(--ink);
      font-size: 14px;
      line-height: 1.6;
      font-weight: 800;
      word-break: keep-all;
    }

    .loading-dots {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .loading-dots span {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffb4ca;
      opacity: 0.35;
      animation: dotPulse 0.9s infinite;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.15s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.3s;
    }

    .progress-shell {
      border: 1px solid #ead9e0;
      border-radius: 999px;
      background: #fef8fa;
      padding: 4px;
    }

    .progress-bar-fill {
      width: 0%;
      height: 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ffbfd4 0%, #ff9fbd 100%);
      transition: width 0.12s linear;
    }

    .result-cardnews-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .result-news-card {
      min-height: 260px;
      border: 1px solid #dddde1;
      border-radius: 18px;
      overflow: hidden;
      background: #ffffff;
      box-shadow: 0 8px 18px rgba(150,111,126,0.08);
      display: flex;
      flex-direction: column;
    }

    .result-news-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 14px 12px;
      border-bottom: 1px solid #e8e5e7;
    }

    .result-news-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 36px;
      height: 24px;
      padding: 0 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      border: 1px solid rgba(0,0,0,0.08);
      color: #6b7378;
      font-size: 12px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .result-news-title {
      margin: 0;
      color: #2f3438;
      font-size: 22px;
      line-height: 1.25;
      font-weight: 950;
      letter-spacing: -0.055em;
      word-break: keep-all;
    }

    .result-news-body {
      flex: 1;
      padding: 14px;
    }

    .result-news-items {
      display: block;
    }

    .result-news-pack {
      border-radius: 16px;
      padding: 14px;
      border: 1px solid #eadfe3;
      background: #fffafb;
    }

    .result-news-line {
      position: relative;
      padding-left: 18px;
      margin-bottom: 12px;
      color: #2f3438;
      font-size: 15px;
      line-height: 1.72;
      font-weight: 800;
      letter-spacing: -0.02em;
      word-break: keep-all;
    }

    .result-news-line:last-child {
      margin-bottom: 0;
    }

    .result-news-line::before {
      content: "";
      position: absolute;
      left: 0;
      top: 10px;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff9bbb;
    }

    .news-basic .result-news-head {
      background: linear-gradient(180deg, #fff6cf 0%, #f8efc1 100%);
    }

    .news-basic .result-news-body {
      background: #fffdf3;
    }

    .news-basic .result-news-pack {
      background: #fffdfa;
      border-color: #efe4c8;
    }

    .news-basic .result-news-line::before {
      background: #ff9dbe;
    }

    .news-moon .result-news-head {
      background: linear-gradient(180deg, #eef7ff 0%, #deedff 100%);
    }

    .news-moon .result-news-body {
      background: #f8fbff;
    }

    .news-moon .result-news-pack {
      background: #fcfdff;
      border-color: #d9e7f7;
    }

    .news-moon .result-news-line::before {
      background: #9fc9ff;
    }

    .news-mercury .result-news-head {
      background: linear-gradient(180deg, #f1faec 0%, #e3f1db 100%);
    }

    .news-mercury .result-news-body {
      background: #fbfef8;
    }

    .news-mercury .result-news-pack {
      background: #fcfffa;
      border-color: #d8e8d0;
    }

    .news-mercury .result-news-line::before {
      background: #9fce8f;
    }

    .news-love .result-news-head {
      background: linear-gradient(180deg, #fff0f5 0%, #fde3ec 100%);
    }

    .news-love .result-news-body {
      background: #fff9fb;
    }

    .news-love .result-news-pack {
      background: #fffbfd;
      border-color: #f0dce5;
    }

    .news-love .result-news-line::before {
      background: #ff99b7;

    let selectedPlace = null;
    let selectedPlaceKey = "";
    let searchTimer = null;

    const placeInput = document.getElementById("placeInput");
    const suggestions = document.getElementById("suggestions");
    const selectedPlaceText = document.getElementById("selectedPlaceText");
    const unknownTime = document.getElementById("unknownTime");
    const selYear = document.getElementById("selYear");
    const selMonth = document.getElementById("selMonth");
    const selDay = document.getElementById("selDay");
    const selHour = document.getElementById("selHour");
    const selMin = document.getElementById("selMin");

    window.onload = function() {
      for (let i = 2026; i >= 1950; i--) {
        selYear.add(new Option(i + "년", i));
      }

      for (let i = 1; i <= 12; i++) {
        selMonth.add(new Option(i + "월", i));
      }

      for (let i = 0; i <= 23; i++) {
        selHour.add(new Option(i + "시", i));
      }

      for (let i = 0; i <= 59; i++) {
        selMin.add(new Option(i + "분", i));
      }

      selYear.value = 1995;
      selMonth.value = 1;
      selHour.value = 12;
      selMin.value = 0;

      updateDays();
      selDay.value = 1;
      renderSuggestions(FALLBACK_PLACES.slice(0, 30));
    };

    selYear.addEventListener("change", updateDays);
    selMonth.addEventListener("change", updateDays);

    function updateDays() {
      const y = Number(selYear.value || 1995);
      const m = Number(selMonth.value || 1);
      const previousDay = Number(selDay.value || 1);
      const lastDay = new Date(y, m, 0).getDate();

      selDay.innerHTML = "";

      for (let i = 1; i <= lastDay; i++) {
        selDay.add(new Option(i + "일", i));
      }

      selDay.value = Math.min(previousDay, lastDay);
    }

    unknownTime.addEventListener("change", () => {
      selHour.disabled = unknownTime.checked;
      selMin.disabled = unknownTime.checked;
    });

    function getPlaceKey(place) {
      if (!place) return "";
      return `${place.name}|${place.address}|${place.lat}|${place.lon}`;
    }

    placeInput.addEventListener("input", () => {
      selectedPlace = null;
      selectedPlaceKey = "";
      selectedPlaceText.textContent = "지역명을 검색해서 선택해 주세요.";
      selectedPlaceText.classList.remove("is-selected");
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => searchPlaces(placeInput.value.trim()), 220);
    });

    placeInput.addEventListener("focus", () => {
      searchPlaces(placeInput.value.trim());
    });

    async function searchPlaces(query) {
      if (!query) {
        renderSuggestions(FALLBACK_PLACES.slice(0, 30));
        return;
      }

      if (KAKAO_REST_API_KEY) {
        try {
          const url = `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(query)}&size=15`;
          const res = await fetch(url, {
            headers: { Authorization: `KakaoAK ${KAKAO_REST_API_KEY}` }
          });

          if (res.ok) {
            const data = await res.json();
            const list = data.documents
              .filter(item => item.x && item.y)
              .map(item => ({
                name: item.place_name || item.address_name || query,
                address: item.road_address_name || item.address_name || item.place_name,
                lat: Number(item.y),
                lon: Number(item.x)
              }));

            if (list.length) {
              renderSuggestions(list);
              return;
            }
          }
        } catch (error) {
          console.warn(error);
        }
      }

      const normalizedQuery = normalizePlaceQuery(query);
      const lower = normalizedQuery.toLowerCase();

      const fallback = FALLBACK_PLACES.filter(place =>
        `${place.name} ${place.address}`.toLowerCase().includes(lower)
      ).slice(0, 50);

      renderSuggestions(fallback);
    }

    function normalizePlaceQuery(query) {
      return query
        .replaceAll("전라북도", "전북특별자치도")
        .replaceAll("전북도", "전북특별자치도")
        .replaceAll("강원도", "강원특별자치도");
    }

    function renderSuggestions(list) {
      if (!list.length) {
        suggestions.innerHTML = `
          <div class="suggestion-item">
            검색 결과가 없어요
            <small>더 큰 지역명으로 다시 입력해 주세요.</small>
          </div>
        `;
        return;
      }

      suggestions.innerHTML = list.map((place, index) => {
        const activeClass = selectedPlaceKey && selectedPlaceKey === getPlaceKey(place) ? "active" : "";
        return `
          <div class="suggestion-item ${activeClass}" data-index="${index}">
            ${place.name}
            <small>${place.address || ""} · 위도 ${place.lat.toFixed(4)} · 경도 ${place.lon.toFixed(4)}</small>
          </div>
        `;
      }).join("");

      [...suggestions.querySelectorAll(".suggestion-item")].forEach((item, index) => {
        if (list[index]) {
          item.addEventListener("click", () => {
            selectedPlace = list[index];
            selectedPlaceKey = getPlaceKey(selectedPlace);
            placeInput.value = selectedPlace.name;
            selectedPlaceText.textContent = `${selectedPlace.address || selectedPlace.name} 기준으로 계산합니다.`;
            selectedPlaceText.classList.add("is-selected");
            renderSuggestions(list);
          });
        }
      });
    }

    function goToPage(pageId) {
      document.querySelectorAll(".page").forEach(page => page.classList.remove("active"));
      document.getElementById(pageId).classList.add("active");

      if (pageId === "page2") {
        searchPlaces(placeInput.value.trim());
      }
    }

    function processData() {
      if (!selectedPlace) {
        alert("지역을 검색하고 선택해 주세요.");
        return;
      }

      if (unknownTime.checked) {
        alert("정확한 결과를 위해 태어난 시간을 입력해 주세요.");
        return;
      }

      if (!isValidSelectedDate()) {
        alert("올바른 생년월일을 선택해 주세요.");
        return;
      }

      goToPage("page3");

      const bar = document.getElementById("progressBar");
      const loadingText = document.getElementById("loadingText");
      const loadingMessages = [
        "행성 좌표를 불러오는 중...",
        "지역 경도와 항성시를 계산하는 중...",
        "상승궁과 하우스를 계산하는 중...",
        "결과를 정리하는 중..."
      ];

      let width = 0;
      let step = 0;
      bar.style.width = "0%";
      loadingText.textContent = loadingMessages[0];

      const interval = setInterval(() => {
        width += 5;
        if (width > 100) width = 100;
        bar.style.width = width + "%";

        if (width >= 25 && step === 0) {
          loadingText.textContent = loadingMessages[1];
          step = 1;
        } else if (width >= 55 && step === 1) {
          loadingText.textContent = loadingMessages[2];
          step = 2;
        } else if (width >= 82 && step === 2) {
          loadingText.textContent = loadingMessages[3];
          step = 3;
        }

        if (width >= 100) {
          clearInterval(interval);
          setTimeout(() => {
            calculateAstrology();
          }, 260);
        }
      }, 160);
    }

    function isValidSelectedDate() {
      const y = Number(selYear.value);
      const m = Number(selMonth.value);
      const d = Number(selDay.value);
      const lastDay = new Date(y, m, 0).getDate();
      return d >= 1 && d <= lastDay;
    }

    function localKstToUtcDate(year, month, day, hour, minute) {
      return new Date(Date.UTC(year, month - 1, day, hour - KOREA_TIMEZONE_OFFSET, minute, 0));
    }

    function julianDayFromDate(date) {
      return date.getTime() / 86400000 + 2440587.5;
    }

    function normalizeDegrees(deg) {
      return ((deg % 360) + 360) % 360;
    }

    function normalize180(deg) {
      return ((deg + 180) % 360 + 360) % 360 - 180;
    }

    function degToRad(deg) {
      return deg * Math.PI / 180;
    }

    function radToDeg(rad) {
      return rad * 180 / Math.PI;
    }

    function getZodiacIndex(longitude) {
      return Math.floor(normalizeDegrees(longitude) / 30) % 12;
    }

    function getJulianCenturies(jd) {
      return (jd - 2451545.0) / 36525;
    }

    function getMeanObliquity(jd) {
      const t = getJulianCenturies(jd);
      return 23.439291111 - 0.013004167 * t - 0.000000163889 * t * t + 0.000000503611 * t * t * t;
    }

    function getGreenwichSiderealTime(jd) {
      const t = getJulianCenturies(jd);
      const gmst =
        280.46061837 +
        360.98564736629 * (jd - 2451545.0) +
        0.000387933 * t * t -
        (t * t * t) / 38710000;

      return normalizeDegrees(gmst);
    }

    function getLocalSiderealTime(jd, eastLongitude) {
      return normalizeDegrees(getGreenwichSiderealTime(jd) + eastLongitude);
    }

    function eclipticToRaDec(lambdaDeg, epsilonDeg) {
      const lambda = degToRad(lambdaDeg);
      const epsilon = degToRad(epsilonDeg);

      const x = Math.cos(lambda);
      const y = Math.sin(lambda) * Math.cos(epsilon);
      const z = Math.sin(lambda) * Math.sin(epsilon);

      const ra = normalizeDegrees(radToDeg(Math.atan2(y, x)));
      const dec = radToDeg(Math.asin(z));

      return { ra, dec };
    }

    function getAscendantLongitude(jd, latitude, eastLongitude) {
      const lstDeg = getLocalSiderealTime(jd, eastLongitude);
      const epsilonDeg = getMeanObliquity(jd);

      const theta = degToRad(lstDeg);
      const phi = degToRad(latitude);
      const epsilon = degToRad(epsilonDeg);

      const a = Math.cos(phi) * Math.cos(theta);
      const b = Math.sin(phi) * Math.sin(epsilon) + Math.cos(phi) * Math.sin(theta) * Math.cos(epsilon);

      const candidate1 = normalizeDegrees(radToDeg(Math.atan2(-a, b)));
      const candidate2 = normalizeDegrees(candidate1 + 180);

      const c1 = eclipticToRaDec(candidate1, epsilonDeg);
      const c2 = eclipticToRaDec(candidate2, epsilonDeg);

      const h1 = normalize180(lstDeg - c1.ra);
      const h2 = normalize180(lstDeg - c2.ra);

      if (h1 < 0 && h2 >= 0) return candidate1;
      if (h2 < 0 && h1 >= 0) return candidate2;

      return candidate1;
    }

    function getWholeSignHouse(planetSignIndex, ascSignIndex) {
      return ((planetSignIndex - ascSignIndex + 12) % 12) + 1;
    }

    function getAspect(lon1, lon2, desc) {
      let diff = Math.abs(normalizeDegrees(lon1) - normalizeDegrees(lon2));
      if (diff > 180) diff = 360 - diff;

      if (diff <= 8) return `${desc} 에너지가 강하게 붙어 한쪽 성향이 확실히 드러남.`;
      if (Math.abs(diff - 60) <= 6) return `${desc} 흐름이 자연스럽게 이어져 판단과 행동이 부드럽게 연결됨.`;
      if (Math.abs(diff - 90) <= 8) return `${desc} 사이에 긴장이 있어 감정과 선택이 자주 부딪힐 수 있음.`;
      if (Math.abs(diff - 120) <= 8) return `${desc} 조합이 안정적이라 장점이 비교적 쉽게 풀림.`;
      if (Math.abs(diff - 180) <= 8) return `${desc} 방향이 달라 기복이나 갈등으로 느껴질 수 있음.`;

      return null;
    }

    function calculateAstrology() {
      const y = Number(selYear.value);
      const m = Number(selMonth.value);
      const d = Number(selDay.value);
      const h = Number(selHour.value);
      const min = Number(selMin.value);

      const utcDate = localKstToUtcDate(y, m, d, h, min);
      const astroTime = new Astronomy.AstroTime(utcDate);
      const jd = julianDayFromDate(utcDate);

      const sunLon = Astronomy.Ecliptic(Astronomy.GeoVector("Sun", astroTime, true)).elon;
      const moonLon = Astronomy.Ecliptic(Astronomy.GeoVector("Moon", astroTime, true)).elon;
      const merLon = Astronomy.Ecliptic(Astronomy.GeoVector("Mercury", astroTime, true)).elon;
      const venLon = Astronomy.Ecliptic(Astronomy.GeoVector("Venus", astroTime, true)).elon;
      const marLon = Astronomy.Ecliptic(Astronomy.GeoVector("Mars", astroTime, true)).elon;
      const ascLon = getAscendantLongitude(jd, selectedPlace.lat, selectedPlace.lon);

      const sunIdx = getZodiacIndex(sunLon);
      const moonIdx = getZodiacIndex(moonLon);
      const ascIdx = getZodiacIndex(ascLon);
      const merIdx = getZodiacIndex(merLon);
      const venIdx = getZodiacIndex(venLon);
      const marIdx = getZodiacIndex(marLon);

      const sunHouse = getWholeSignHouse(sunIdx, ascIdx);

      const aspects = [];
      const asp1 = getAspect(sunLon, moonLon, "태양과 달의");
      const asp2 = getAspect(venLon, marLon, "금성과 화성의");
      const asp3 = getAspect(merLon, moonLon, "수성과 달의");

      if (asp1) aspects.push(asp1);
      if (asp2) aspects.push(asp2);
      if (asp3) aspects.push(asp3);
      if (aspects.length === 0) {
        aspects.push("주요 행성 간 큰 충돌이 적어서 반응 흐름이 비교적 안정적으로 이어짐.");
      }

      document.getElementById("titleBasic").innerText = "성격의 본질";
      document.getElementById("titleMoon").innerText = "감정 반응";
      document.getElementById("titleMercury").innerText = "사고방식과 소통";
      document.getElementById("titleLove").innerText = "연애와 매력";
      document.getElementById("titleConflict").innerText = "스트레스 반응";
      document.getElementById("titleHouse").innerText = "활동 방향";

      const makeList = arr => `
        <div class="result-news-pack">
          ${arr.map(item => `<div class="result-news-line">${item}</div>`).join("")}
        </div>
      `;

      const basicTraits = [
        ...db.sun[sunIdx],
        ...db.ascendant[ascIdx]
      ];

      const conflictTraits = [
        ...db.mars[marIdx],
        ...aspects
      ];

      document.getElementById("resBasic").innerHTML = makeList(basicTraits);
      document.getElementById("resMoon").innerHTML = makeList(db.moon[moonIdx]);
      document.getElementById("resMercury").innerHTML = makeList(db.mercury[merIdx]);
      document.getElementById("resLove").innerHTML = makeList(db.venus[venIdx]);
      document.getElementById("resConflict").innerHTML = makeList(conflictTraits);
      document.getElementById("resHouse").innerHTML = makeList(db.houses[sunHouse - 1]);

      goToPage("page4");
    }

      window.location.href = "https://test-it.co.kr/test.html";
    }

      if (navigator.share) {

      } catch (e) {
        alert("공유 링크 복사에 실패했습니다.");
      }
    }
