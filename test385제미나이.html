<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>테스트잇 레드레드 성격 테스트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
  
  body, html {
    margin: 0;
    padding: 0;
    font-family: 'Pretendard', sans-serif;
    background-color: #222222;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
  }

  .site-header {
    width: 100%;
    height: 60px;
    background-color: #111111;
    border-bottom: 2px solid #333;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 900;
    color: #ffcc00;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 100;
    letter-spacing: 2px;
  }

  #app-container {
    width: 100%;
    max-width: 800px;
    min-height: 100vh;
    padding: 90px 15px 40px 15px;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-sizing: border-box;
    position: relative;
  }

  .traffic-box {
    background-color: #333333;
    width: 100%;
    border-radius: 0; /* 네모 테두리 */
    padding: 30px 15px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-sizing: border-box;
    border: 2px solid #555;
  }

  .screen {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
  }

  .screen.active {
    display: flex;
  }

  .light-group {
    display: flex;
    gap: 15px;
    margin-bottom: 25px;
  }

  /* 신호등 알맹이는 원형 유지 */
  .light {
    width: 25px;
    height: 25px;
    border-radius: 50%;
    background-color: #555;
    box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
  }
  .light.red-on { background-color: #ff3b30; box-shadow: 0 0 15px #ff3b30; }
  .light.yellow-on { background-color: #ffcc00; box-shadow: 0 0 15px #ffcc00; }
  .light.green-on { background-color: #34c759; box-shadow: 0 0 15px #34c759; }

  .title {
    font-size: 32px;
    font-weight: 900;
    text-align: center;
    margin-bottom: 20px;
    line-height: 1.3;
  }

  .desc {
    text-align: center;
    font-size: 16px;
    color: #aaaaaa;
    margin-bottom: 40px;
    line-height: 1.5;
  }

  .btn {
    width: 100%;
    max-width: 400px;
    background-color: #444;
    border: 1px solid #666;
    color: #fff;
    padding: 18px;
    border-radius: 0; /* 네모 테두리 */
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 12px;
    cursor: pointer;
    transition: 0.2s;
    word-break: keep-all;
  }
  .btn:hover { background-color: #555; }
  .btn:active { background-color: #ffcc00; color: #000; border-color: #ffcc00; }
  .btn.start { background-color: #ffcc00; color: #000; font-size: 18px; border-color: #ffcc00; }
  .btn.start:hover { background-color: #ffd633; }

  .q-num {
    font-size: 18px;
    font-weight: bold;
    color: #ffcc00;
    margin-bottom: 15px;
  }
  
  .q-text {
    font-size: 22px;
    text-align: center;
    word-break: keep-all;
    font-weight: 700;
    margin-bottom: 50px;
    min-height: 80px;
    line-height: 1.4;
  }

  .mbti-title {
    font-size: 32px;
    font-weight: 900;
    margin-bottom: 25px;
    color: #ffcc00;
    word-break: keep-all;
    text-align: center;
    line-height: 1.3;
  }

  .result-wrapper {
    display: flex;
    flex-direction: column;
    gap: 15px;
    width: 100%;
  }

  /* 네모 테두리로 영역 분리 확실하게 */
  .result-section {
    flex: 1;
    border-radius: 0; /* 네모 테두리 */
    padding: 15px;
    box-sizing: border-box;
    display: flex;
    flex-direction: column;
  }
  
  .green-sec { 
    background-color: rgba(52, 199, 89, 0.05); 
    border: 2px solid #34c759;
  }
  .red-sec { 
    background-color: rgba(255, 59, 48, 0.05); 
    border: 2px solid #ff3b30;
  }

  .sec-header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 15px;
    font-size: 18px;
    font-weight: 900;
  }
  
  .green-sec .sec-header { color: #34c759; }
  .red-sec .sec-header { color: #ff3b30; }

  /* 텍스트 짤림 방지 최적화 */
  .traits-list {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px 6px;
    width: 100%;
  }

  .trait-item {
    font-size: 13px;
    font-weight: 600;
    color: #eeeeee;
    display: flex;
    align-items: center;
    white-space: nowrap; /* 한 줄 고정 */
    letter-spacing: -0.5px; /* 자간 축소 */
  }
  
  /* 심플한 원형 불빛 포인트 */
  .trait-item::before {
    content: '●';
    font-size: 10px;
    margin-right: 6px;
  }
  .green-sec .trait-item::before { color: #34c759; text-shadow: 0 0 4px #34c759; }
  .red-sec .trait-item::before { color: #ff3b30; text-shadow: 0 0 4px #ff3b30; }

  @media (min-width: 600px) {
    .result-wrapper { flex-direction: row; }
    .traits-list { grid-template-columns: 1fr; }
    .trait-item { font-size: 15px; letter-spacing: 0; }
    .mbti-title { font-size: 40px; }
  }

  .control-btns {
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 30px;
  }
  
  @media (min-width: 600px) {
    .control-btns { flex-direction: row; justify-content: center; flex-wrap: wrap; }
    .control-btns .btn { width: calc(50% - 10px); margin-bottom: 0; }
  }

  #capture-area { background-color: #222222; }

  #modal {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background-color: rgba(0,0,0,0.9);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
  #modal-img { width: 85%; max-width: 400px; border: 2px solid #555; }
  .modal-txt { color: #fff; margin-bottom: 20px; font-weight: bold; font-size: 16px; text-align: center;}
  .close-btn { margin-top: 20px; background: #ffcc00; color: #000; border: none; padding: 12px 30px; font-weight: bold; cursor: pointer; border-radius: 0; }
</style>
</head>
<body>

<div class="site-header">TEST IT</div>

<div id="app-container">
  
  <div class="traffic-box" id="capture-area">
    
    <div id="screen-start" class="screen active">
      <div class="light-group">
        <div class="light red-on"></div>
        <div class="light yellow-on"></div>
        <div class="light green-on"></div>
      </div>
      <div class="title">테스트잇<br>레드레드 성격 테스트</div>
      <div class="desc">
        나에게 긍정적인 행동(GREEN)과<br>
        멈춰야 할 행동(RED)을 알아봅니다.
      </div>
      <button class="btn start" onclick="startTest()">테스트 시작하기</button>
    </div>

    <div id="screen-question" class="screen">
      <div class="light-group">
        <div class="light red-on" id="light-1"></div>
        <div class="light yellow-on" id="light-2"></div>
        <div class="light green-on" id="light-3"></div>
      </div>
      <div id="q-num" class="q-num">Q. 1 / 12</div>
      <div id="q-text" class="q-text">질문</div>
      <button class="btn" id="btn-a" onclick="selectAns(1)">답변 A</button>
      <button class="btn" id="btn-b" onclick="selectAns(2)">답변 B</button>
    </div>

    <div id="screen-result" class="screen">
      <div class="desc" style="margin-bottom: 10px; color: #fff;">나의 신호등 성격 유형은</div>
      <div id="mbti-nickname" class="mbti-title"></div>

      <div class="result-wrapper">
        <div class="result-section green-sec">
          <div class="sec-header">
            <div class="light green-on" style="width: 12px; height: 12px;"></div>
            GREEN GREEN
          </div>
          <div id="green-list" class="traits-list"></div>
        </div>

        <div class="result-section red-sec">
          <div class="sec-header">
            <div class="light red-on" style="width: 12px; height: 12px;"></div>
            RED RED
          </div>
          <div id="red-list" class="traits-list"></div>
        </div>
      </div>
    </div>

  </div>

  <div id="control-area" class="control-btns" style="display: none;">
    <button class="btn start" onclick="saveImage()">결과 이미지 저장하기</button>
    <button class="btn" onclick="restart()">다시 해보기</button>
    <button class="btn" onclick="alert('준비 중입니다.')">다른 테스트 해보기</button>
    <button class="btn" onclick="share()">테스트 공유하기</button>
  </div>

</div>

<div id="modal">
  <div class="modal-txt">👇 이미지를 꾹 눌러서 저장해주세요 👇</div>
  <img id="modal-img" src="" alt="결과 이미지">
  <button class="close-btn" onclick="closeModal()">닫기</button>
</div>

  let step = 0;
  let score = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };

  function animateLights() {
    const l1 = document.getElementById('light-1');
    const l2 = document.getElementById('light-2');
    const l3 = document.getElementById('light-3');
    
    l1.className = 'light'; l2.className = 'light'; l3.className = 'light';

    let r = Math.random();
    if(r < 0.33) l1.classList.add('red-on');
    else if(r < 0.66) l2.classList.add('yellow-on');
    else l3.classList.add('green-on');
  }

  function startTest() {
    document.getElementById('screen-start').classList.remove('active');
    document.getElementById('screen-question').classList.add('active');
    renderQ();
  }

  function renderQ() {
    const q = qData[step];
    document.getElementById('q-num').innerText = `Q. ${step + 1} / 12`;
    document.getElementById('q-text').innerText = q.q;
    document.getElementById('btn-a').innerText = q.a;
    document.getElementById('btn-b').innerText = q.b;
    animateLights();
  }

  function selectAns(choice) {
    const type = qData[step].type;
    if(choice === 1) score[type[0]]++;
    else score[type[1]]++;

    step++;
    if(step < 12) renderQ();
    else showResult();
  }

  function showResult() {
    let mbti = "";
    mbti += score.E > score.I ? 'E' : 'I';
    mbti += score.S > score.N ? 'S' : 'N';
    mbti += score.T > score.F ? 'T' : 'F';
    mbti += score.J > score.P ? 'J' : 'P';

    const data = rData[mbti];
    
    document.getElementById('mbti-nickname').innerText = data.name;
    
    let gHtml = "";
    data.g.forEach(t => {
      gHtml += `<div class="trait-item">${t}</div>`;
    });
    document.getElementById('green-list').innerHTML = gHtml;

    let rHtml = "";
    data.r.forEach(t => {
      rHtml += `<div class="trait-item">${t}</div>`;
    });
    document.getElementById('red-list').innerHTML = rHtml;

    document.getElementById('screen-question').classList.remove('active');
    document.getElementById('screen-result').classList.add('active');
    document.getElementById('control-area').style.display = 'flex';
  }

  function restart() {
    step = 0;
    score = { E:0, I:0, S:0, N:0, T:0, F:0, J:0, P:0 };
    document.getElementById('control-area').style.display = 'none';
    document.getElementById('screen-result').classList.remove('active');
    document.getElementById('screen-start').classList.add('active');
  }

  function saveImage() {
    const target = document.getElementById('capture-area');
    html2canvas(target, { 
      scale: 2,
      backgroundColor: '#222222',
      useCORS: true
    }).then(canvas => {
      document.getElementById('modal-img').src = canvas.toDataURL('image/png');
      document.getElementById('modal').style.display = 'flex';
    });
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
  }

  function share() {
    if (navigator.share) {
      navigator.share({
        title: '레드레드 성격 테스트',
        text: '나의 긍정 신호와 주의 신호 알아보기',
        url: window.location.href,
      }).catch(console.error);
    } else {
      alert("링크를 복사해서 공유해주세요!");
    }
  }
