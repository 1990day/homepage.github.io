      showStart();
    }

    function showStart(){
      screenStart.classList.remove("hidden");
      screenQuiz.classList.add("hidden");
      screenResult.classList.add("hidden");
    }
    
    function showQuiz(){
      screenStart.classList.add("hidden");
      screenQuiz.classList.remove("hidden");
      screenResult.classList.add("hidden");
      renderQuestion();
    }
    
    function showResult(type){
      currentType = type;
      screenStart.classList.add("hidden");
      screenQuiz.classList.add("hidden");
      screenResult.classList.remove("hidden");

      const data = RESULTS[type] || { king:"알 수 없음", oneLine:"결과 데이터가 비어 있어요", traits:[] };

      kingName.textContent = data.king;
      oneLine.textContent = data.oneLine;

      const lines = (data.traits || []).slice(0,15).join("\n");
      traitsBlock.textContent = lines;
    }

    function renderQuestion(){
      const total = QUESTIONS.length;
      const q = QUESTIONS[idx];

      progressTxt.textContent = (idx+1) + " / " + total;
      progressBar.style.width = Math.round(((idx+1)/total)*100) + "%";

      qTitle.innerHTML = q.q;
      txtA.innerHTML = q.A;
      txtB.innerHTML = q.B;
    }

    function applyAnswer(i, choice){
      const q = QUESTIONS[i];
      const first = q.axis[0];
      const second = q.axis[1];

      answers[i] = choice;
      if(choice === "A") score[first] += 1;
      else score[second] += 1;
    }

    function computeType(){
      const EorI = score.E >= score.I ? "E" : "I";
      const SorN = score.S >= score.N ? "S" : "N";
      const TorF = score.T >= score.F ? "T" : "F";
      const JorP = score.J >= score.P ? "J" : "P";
      return EorI + SorN + TorF + JorP;
    }

    function toastShow(msg){
      toast.textContent = msg;
      toast.style.display = "block";
      clearTimeout(toast._t);
      toast._t = setTimeout(()=> toast.style.display="none", 1500);
    }

    btnStart.addEventListener("click", showQuiz);

    btnA.addEventListener("click", ()=>{ applyAnswer(idx, "A"); next(); });
    btnB.addEventListener("click", ()=>{ applyAnswer(idx, "B"); next(); });

    function next(){
      const total = QUESTIONS.length;
      if(idx < total - 1){
        idx += 1;
        renderQuestion();
      } else {
        showResult(computeType());
      }
    }

    btnRetry.addEventListener("click", resetAll);

    btnSaveImg.addEventListener("click", () => {
      const target = document.getElementById("captureArea");
      html2canvas(target, { 
        scale: 2,
        backgroundColor: "#2b3247" 
      }).then(canvas => {
        const link = document.createElement("a");
        link.download = "조선의왕_테스트결과.png";
        link.href = canvas.toDataURL("image/png");
        link.click();
      });
    });

    btnShare.addEventListener("click", () => {
      const type = currentType || computeType();
      const data = RESULTS[type] || {};
      const lines = (data.traits || []).slice(0,15).join("\n");

      const text =
        "테스트잇 | 내가 조선의 왕이라면\n" +
        "결과: " + (data.king || "") + "\n" +
        (data.oneLine ? data.oneLine + "\n" : "") +
        "\n" + lines +
        "\n\n👉 링크: https://test-it.co.kr/test365";

      if (navigator.share) {
        navigator.share({
          title: '조선의 왕 성격 테스트',
          text: text,
        }).catch((error) => console.log('공유 실패', error));
      } else {
        const ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "absolute";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        ta.setSelectionRange(0, 99999);
        try {
          document.execCommand("copy");
          toastShow("링크 복사 완료");
        } catch (err) {
          toastShow("복사 실패");
        }
        document.body.removeChild(ta);
      }
    });

    (function init(){
      showStart();
    })();
  </script>
</body>
</html>
