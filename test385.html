<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>테스트잇 레드레드 성격 테스트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");

*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:"Pretendard",sans-serif;background:#f6f6f6;color:#111}
a{text-decoration:none;color:inherit}
button{font-family:inherit;border:0;cursor:pointer}

.page-header{background:#fff;border-bottom:1px solid #ddd}
.wrapper{max-width:520px;margin:0 auto;padding:0 16px}
.header-inner{height:56px;display:flex;align-items:center;justify-content:space-between}
.logo img{height:28px;display:block}
.main-nav{display:flex;gap:13px;font-size:13px;font-weight:700;color:#111}

#app-container{width:100%;max-width:430px;margin:0 auto;padding:14px 12px 36px}
.screen{display:none}
.screen.active{display:block}

.app-card{background:#fff;border:1.5px solid #111;padding:18px;box-shadow:none}
#capture-area{background:#fff}

.signal-bar{width:188px;height:58px;margin:0 auto 18px;background:#111;border:1.5px solid #111;display:flex;align-items:center;justify-content:center;gap:12px}
.light{width:34px;height:34px;border-radius:50%;border:2px solid #000;background:#555}
.red-on{background:#d94a4a!important;background-color:#d94a4a!important}
.yellow-on{background:#ffd12f!important;background-color:#ffd12f!important}
.green-on{background:#28d866!important;background-color:#28d866!important}

.title{text-align:center;font-size:36px;line-height:1.08;letter-spacing:-1.4px;font-weight:850;margin:0 0 14px;color:#111}
.title .red-word{color:#d94a4a}
.title .green-word{color:#18b854}

.desc{text-align:center;font-size:16px;line-height:1.5;font-weight:750;color:#222;margin:0 0 22px}
.green-text{color:#18b854;font-weight:850}
.red-text{color:#d94a4a;font-weight:850}

.start-info{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.info-card{border:1.5px solid #111;padding:13px 11px;min-height:94px;color:#111}
.info-card.green{background:#28d866}
.info-card.red{background:#d94a4a;color:#fff}
.info-card b{display:block;font-size:22px;font-weight:850;margin-bottom:8px}
.info-card span{font-size:13px;line-height:1.35;font-weight:750;word-break:keep-all}

.btn{width:100%;min-height:52px;padding:14px 16px;border:1.5px solid #111;background:#fff;color:#111;font-size:16px;font-weight:850;box-shadow:none;margin-bottom:10px}
.btn.start{background:#ffd12f;color:#111;border-color:#111}
.btn.green{background:#28d866;color:#111;border-color:#111}
.btn.red{background:#d94a4a;color:#fff;border-color:#111}

.question-progress{
  margin-bottom:16px;
  border:1.5px solid #111;
  background:#fff;
  padding:13px;
}

.progress-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
  font-weight:850;
  margin-bottom:11px;
  color:#111;
}

.signal-progress{display:grid;grid-template-columns:repeat(12,1fr);gap:5px}
.signal-dot{height:15px;border:1px solid #111;background:#ececec}
.signal-dot.done.green{background:#28d866}
.signal-dot.done.yellow{background:#ffd12f}
.signal-dot.done.red{background:#d94a4a}
.signal-dot.now{animation:blinkSignal .7s infinite alternate;border-color:#111}

@keyframes blinkSignal{
  from{opacity:.35}
  to{opacity:1}
}

.q-card{
  background:#fff3b8;
  border:2px solid #111;
  box-shadow:none;
  padding:18px;
  color:#111;
}

.q-num{
  display:inline-flex;
  align-items:center;
  height:34px;
  padding:0 13px;
  background:#111;
  color:#ffd12f;
  font-size:14px;
  font-weight:850;
  margin-bottom:14px;
}

.q-text{
  font-size:22px;
  line-height:1.4;
  letter-spacing:-.6px;
  font-weight:850;
  margin:0 0 20px;
  word-break:keep-all;
  color:#111;
}

.answer-btn{
  text-align:left;
  font-size:16px;
  line-height:1.45;
  font-weight:750;
  color:#111;
  min-height:66px;
  background:#fffbe2;
  border:1.5px solid #111;
}

.answer-btn:hover{background:#fff6c8}
.answer-btn:active{transform:scale(.99)}

.result-top{
  text-align:center;
  margin-bottom:16px;
  border:1.5px solid #111;
  background:#fff;
  padding:14px 12px;
}

.result-label{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:28px;
  padding:0 12px;
  background:#ffd12f;
  color:#111;
  font-size:12px;
  font-weight:850;
  margin-bottom:9px;
}

.result-name{
  font-size:31px;
  line-height:1.12;
  font-weight:850;
  letter-spacing:-1px;
  margin-bottom:8px;
  color:#111;
}

.result-sub{
  display:inline-block;
  font-size:14px;
  line-height:1.45;
  font-weight:750;
  color:#111;
  word-break:keep-all;
  background:#f1f1f1;
  padding:8px 10px;
  border:1px solid #111;
}

.result-wrapper{display:grid;grid-template-columns:1fr;gap:12px}
.result-section{border:1.5px solid #111}
.result-section.green-sec{background:#28d866}
.result-section.red-sec{background:#d94a4a}

.sec-header{
  height:42px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:900;
  letter-spacing:.2px;
  border-bottom:1.5px solid rgba(0,0,0,.35);
}

.green-sec .sec-header{background:#28d866;color:#111}
.red-sec .sec-header{background:#d94a4a;color:#111}

.traits-list{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px;padding:12px 11px}

.trait-item{
  display:flex;
  align-items:flex-start;
  font-size:13px;
  line-height:1.32;
  font-weight:750;
  letter-spacing:-.45px;
  word-break:keep-all;
}

.green-sec .trait-item{color:#111}
.red-sec .trait-item{color:#111}

.trait-item:before{
  content:"";
  width:7px;
  height:7px;
  margin:6px 6px 0 0;
  flex:0 0 auto;
}

.green-sec .trait-item:before{background:#111}
.red-sec .trait-item:before{background:#111}

.control-btns{display:none;flex-direction:column;gap:10px;margin-top:20px}
.control-btns .btn{margin-bottom:0}

#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.86);z-index:1000;align-items:center;justify-content:center;flex-direction:column;padding:18px}
.modal-txt{color:#fff;font-size:15px;line-height:1.45;font-weight:800;text-align:center;margin-bottom:14px}
#modal-img{width:86%;max-width:320px;border:2px solid #fff}
.close-btn{margin-top:16px;background:#ffd12f;color:#111;border:2px solid #111;padding:13px 34px;font-weight:800}

@media(max-width:390px){
  #app-container{padding:14px 10px 32px}
  .app-card{padding:15px}
  .title{font-size:31px}
  .q-text{font-size:20px}
  .answer-btn{font-size:15px}
  .result-name{font-size:27px}
  .result-sub{font-size:13px}
  .traits-list{gap:7px 7px;padding:10px 8px}
  .trait-item{font-size:11.8px;letter-spacing:-.65px;font-weight:750}
  .sec-header{height:39px;font-size:16px}
  .main-nav{gap:9px;font-size:12px}
  .signal-progress{gap:4px}
  .signal-dot{height:13px}
}
</style>
</head>
<body>

<header class="page-header">
  <div class="wrapper header-inner">
    <a class="logo" href="https://test-it.co.kr/">
      <img src="img_logo.png" alt="테스트잇">
    </a>
    <nav class="main-nav">
      <a href="https://test-it.co.kr/test.html">성격</a>
      <a href="https://test-it.co.kr/face.html">얼굴</a>
      <a href="https://test-it.co.kr/etc.html">그외</a>
      <a href="https://test-it.co.kr/saju.html">사주</a>
    </nav>
  </div>
</header>

<div id="app-container">
  <div class="app-card" id="capture-area">
    <div id="screen-start" class="screen active">
      <div class="signal-bar">
        <div class="light red-on"></div>
        <div class="light yellow-on"></div>
        <div class="light green-on"></div>
      </div>

      <h1 class="title">
        테스트잇<br>
        <span class="red-word">레드레드</span><br>
        <span class="green-word">성격 테스트</span>
      </h1>

      <p class="desc">
        내가 잘하는 행동은 <span class="green-text">GREEN GREEN</span><br>
        줄이면 좋은 행동은 <span class="red-text">RED RED</span>
      </p>

      <div class="start-info">
        <div class="info-card green">
          <b>GREEN</b>
          <span>네가 잘하고 계속 하면 좋은 행동</span>
        </div>
        <div class="info-card red">
          <b>RED</b>
          <span>네가 자주 하지만 하면 안 되는 행동</span>
        </div>
      </div>

      <button class="btn start" onclick="startTest()">테스트 시작하기</button>
    </div>

    <div id="screen-question" class="screen">
      <div class="question-progress">
        <div class="progress-top">
          <span id="q-num">Q. 1 / 12</span>
          <span>REDRED TEST</span>
        </div>
        <div id="signal-progress" class="signal-progress"></div>
      </div>

      <div class="q-card">
        <div class="q-num" id="q-label">Q1</div>
        <div id="q-text" class="q-text">질문</div>
        <button class="btn answer-btn" id="btn-a" onclick="selectAns(1)">답변 A</button>
        <button class="btn answer-btn" id="btn-b" onclick="selectAns(2)">답변 B</button>
      </div>
    </div>

    <div id="screen-result" class="screen">
      <div class="signal-bar">
        <div class="light red-on"></div>
        <div class="light yellow-on"></div>
        <div class="light green-on"></div>
      </div>

      <div class="result-top">
        <div class="result-label">테스트잇 레드레드 성격 테스트</div>
        <div id="mbti-nickname" class="result-name"></div>
        <div id="result-sub" class="result-sub"></div>
      </div>

      <div class="result-wrapper">
        <div class="result-section green-sec">
          <div class="sec-header">GREEN GREEN</div>
          <div id="green-list" class="traits-list"></div>
        </div>

        <div class="result-section red-sec">
          <div class="sec-header">RED RED</div>
          <div id="red-list" class="traits-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="control-area" class="control-btns">
    <button class="btn green" onclick="saveImage()">결과 이미지 저장하기</button>
    <button class="btn start" onclick="restart()">다시 해보기</button>
    <button class="btn" onclick="location.href='https://test-it.co.kr/test.html'">다른 테스트 해보기</button>
    <button class="btn red" onclick="share()">테스트 공유하기</button>
  </div>
</div>

<div id="modal">
  <div class="modal-txt">이미지를 꾹 눌러서 저장해주세요</div>
  <img id="modal-img" src="" alt="결과 이미지">
  <button class="close-btn" onclick="closeModal()">닫기</button>
</div>

<script>
const qData=[
  {type:"EI",q:"친구랑 둘이 놀다가 갑자기 친구의 친구들이 합류한다고 하면?",a:"사람 많아지면 더 재밌을 것 같아서 바로 분위기를 맞춘다",b:"갑자기 낯선 사람이 늘면 에너지를 다시 계산하게 된다"},
  {type:"EI",q:"회사나 학교에서 쉬는 시간이 생겼을 때 나는?",a:"근처 사람에게 말을 걸거나 가벼운 농담을 던진다",b:"혼자 폰을 보거나 조용히 숨 돌리는 시간이 더 편하다"},
  {type:"EI",q:"하루 종일 사람들을 많이 만난 날 밤에 나는?",a:"피곤해도 오늘 있었던 얘기를 누군가에게 또 하고 싶다",b:"말을 너무 많이 해서 이제 아무 소리도 듣고 싶지 않다"},
  {type:"SN",q:"처음 가는 동네에서 맛집을 고를 때 나는?",a:"리뷰 수, 메뉴 사진, 가격, 위치를 보고 고른다",b:"간판 분위기나 이름에서 끌리는 곳이 더 궁금해진다"},
  {type:"SN",q:"친구가 이 옷 어때? 라고 물어봤을 때 나는?",a:"색, 핏, 계절감처럼 실제로 보이는 부분을 말한다",b:"그 옷이 주는 이미지나 분위기를 먼저 말한다"},
  {type:"SN",q:"새로운 일을 시작하기 전에 머릿속에 먼저 뜨는 건?",a:"준비물, 순서, 시간, 지금 해야 하는 단계",b:"이걸 하면 앞으로 어떤 가능성이 생길지"},
  {type:"TF",q:"친구가 같은 실수를 반복해서 힘들어할 때 나는?",a:"왜 반복되는지 패턴을 찾아서 현실적인 방법을 말한다",b:"또 힘들었겠다 싶어서 마음부터 먼저 달래준다"},
  {type:"TF",q:"내가 상대에게 서운한 일이 생겼을 때 더 필요한 건?",a:"상대가 상황을 정확히 이해하고 고칠 점을 아는 것",b:"상대가 내 마음을 진심으로 알아주는 것"},
  {type:"TF",q:"팀 과제에서 의견이 갈릴 때 나는?",a:"누구 말이 더 논리적이고 효율적인지 따져본다",b:"누가 소외되거나 상처받지 않게 흐름을 조절한다"},
  {type:"JP",q:"약속 장소가 정해졌는데 세부 일정이 비어 있으면?",a:"만나는 시간부터 동선까지 어느 정도 정리해두고 싶다",b:"만나서 그때 끌리는 대로 움직여도 괜찮다"},
  {type:"JP",q:"할 일이 여러 개 쌓였을 때 나는?",a:"먼저 순서를 정하고 하나씩 끝내야 마음이 놓인다",b:"지금 눈에 들어오는 것부터 처리하면서 흐름을 탄다"},
  {type:"JP",q:"갑자기 계획이 틀어졌을 때 나는?",a:"바뀐 상황에 맞춰 새 계획을 빨리 다시 세운다",b:"어차피 바뀐 김에 더 재밌는 방향을 찾아본다"}
];

const rData={
  ENFP:{name:"스파클링 에너지",sub:"좋은 에너지는 크게 살리고, 산만한 흐름은 줄이면 좋은 쪽",g:["먼저 친근하게 다가가기","신나게 분위기 띄우기","기발한 아이디어 제안","긍정적인 말 건네기","눈치껏 상황 맞추기","열정적으로 시작하기","진심으로 공감해주기","유연하게 생각하기"],r:["감정 널뛰기 티내기","중요한 일정 깜빡하기","금방 흥미 잃고 포기","남의 말에 휩쓸리기","기분파 충동구매","이리저리 산만하게 굴기","작은 말에 상처받기","선 넘어서 참견하기"]},
  INFP:{name:"포근한 솜이불",sub:"다정함은 장점이고, 혼자 꾹 참는 습관은 줄이면 좋은 쪽",g:["묵묵히 이야기 들어주기","따뜻하게 위로해주기","창의적인 상상하기","세심하게 배려하기","나만의 감각 표현하기","진정성 있게 대하기","편견 없이 바라보기","약한 사람 도와주기"],r:["혼자 상처받고 숨기","과하게 남 눈치 보기","싫어도 거절 못하기","현실 도피하고 미루기","혼자 우울감에 빠지기","생각만 하고 안 움직임","연락 끊고 잠수타기","쓸데없는 망상하기"]},
  ESTJ:{name:"고장난 불도저",sub:"실행력은 장점이고, 너무 밀어붙이는 건 줄이면 좋은 쪽",g:["계획대로 완벽히 끝내기","책임감 있게 총대 메기","효율적으로 일정 짜기","시간 약속 칼같이 지키기","팩트 기반으로 말하기","추진력 있게 밀어붙이기","객관적으로 판단하기","정해진 규칙 지키기"],r:["내 방식만 정답이라 우기기","융통성 1도 없이 굴기","상대방 감정 무시하기","꼬치꼬치 잔소리하기","결과만 보고 평가하기","새로운 변화 거부하기","너무 엄격하게 잣대 대기","팩트로 뼈 때리기"]},

let step=0;
let score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

function startTest(){
  document.getElementById("control-area").style.display="none";
  document.getElementById("screen-start").classList.remove("active");
  document.getElementById("screen-result").classList.remove("active");
  document.getElementById("screen-question").classList.add("active");
  renderQ();
}

function renderSignalProgress(){
  const wrap=document.getElementById("signal-progress");
  wrap.innerHTML="";
  for(let i=0;i<12;i++){
    const dot=document.createElement("div");
    dot.className="signal-dot";
    const color=i%3===0?"green":i%3===1?"yellow":"red";
    if(i<step){
      dot.classList.add("done",color);
    }
    if(i===step){
      dot.classList.add("done",color,"now");
    }
    wrap.appendChild(dot);
  }
}

function renderQ(){
  const q=qData[step];
  document.getElementById("q-num").innerText=`Q. ${step+1} / 12`;
  document.getElementById("q-label").innerText=`Q${step+1}`;
  document.getElementById("q-text").innerText=q.q;
  document.getElementById("btn-a").innerText=q.a;
  document.getElementById("btn-b").innerText=q.b;
  renderSignalProgress();
}

function selectAns(choice){
  const type=qData[step].type;
  if(choice===1) score[type[0]]++;
  else score[type[1]]++;

  step++;
  if(step<qData.length){
    renderQ();
  }else{
    showResult();
  }
}

function showResult(){
  let mbti="";
  mbti+=score.E>=score.I?"E":"I";
  mbti+=score.S>=score.N?"S":"N";
  mbti+=score.T>=score.F?"T":"F";
  mbti+=score.J>=score.P?"J":"P";

  const data=rData[mbti];

  document.getElementById("mbti-nickname").innerText=data.name;
  document.getElementById("result-sub").innerText=data.sub;
  document.getElementById("green-list").innerHTML=data.g.map(t=>`<div class="trait-item">${t}</div>`).join("");
  document.getElementById("red-list").innerHTML=data.r.map(t=>`<div class="trait-item">${t}</div>`).join("");

  document.getElementById("screen-question").classList.remove("active");
  document.getElementById("screen-result").classList.add("active");
  document.getElementById("control-area").style.display="flex";
  window.scrollTo(0,0);
}

function restart(){
  step=0;
  score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  document.getElementById("control-area").style.display="none";
  document.getElementById("screen-result").classList.remove("active");
  document.getElementById("screen-question").classList.remove("active");
  document.getElementById("screen-start").classList.add("active");
  window.scrollTo(0,0);
}

function paintLightsForCapture(){
  const lights=document.querySelectorAll(".light");
  const original=[];

  lights.forEach(light=>{
    original.push({el:light,style:light.getAttribute("style")});

    if(light.classList.contains("red-on")){
      light.setAttribute("style","background:#d94a4a!important;background-color:#d94a4a!important;box-shadow:none!important;border:2px solid #000!important;");
    }

    if(light.classList.contains("yellow-on")){
      light.setAttribute("style","background:#ffd12f!important;background-color:#ffd12f!important;box-shadow:none!important;border:2px solid #000!important;");
    }

    if(light.classList.contains("green-on")){
      light.setAttribute("style","background:#28d866!important;background-color:#28d866!important;box-shadow:none!important;border:2px solid #000!important;");
    }
  });

  return original;
}

function restoreLightsAfterCapture(original){
  original.forEach(item=>{
    if(item.style===null){
      item.el.removeAttribute("style");
    }else{
      item.el.setAttribute("style",item.style);
    }
  });
}

function saveImage(){
  const target=document.getElementById("capture-area");
  const originalLights=paintLightsForCapture();

  setTimeout(()=>{
    html2canvas(target,{
      scale:2,
      backgroundColor:"#fff",
      useCORS:true,
      foreignObjectRendering:false,
      logging:false
    }).then(canvas=>{
      restoreLightsAfterCapture(originalLights);
      document.getElementById("modal-img").src=canvas.toDataURL("image/png");
      document.getElementById("modal").style.display="flex";
    }).catch(()=>{
      restoreLightsAfterCapture(originalLights);
    });
  },100);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function share(){
  if(navigator.share){
    navigator.share({
      title:"레드레드 성격 테스트",
      text:"나의 긍정 신호와 주의 신호 알아보기",
      url:window.location.href
    }).catch(console.error);
  }else{
    navigator.clipboard.writeText(window.location.href).then(()=>{
      alert("테스트 링크가 복사됐어요");
    });
  }
}
