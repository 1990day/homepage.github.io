<script>
    const TEST_TITLE = '테스트잇 여름 아이템 성격 테스트';
    const SHARE_URL = 'https://test-it.co.kr/test394';

    const questions = [
        {
            type: "EI",
            q: "드디어 기다리던 여름휴가!<br>내가 가장 먼저 하는 생각은?",
            a: "친구들이랑 어디로 놀러 갈까?<br>끝내주게 놀고싶어!",
            b: "집에서 에어컨 빵빵하게 틀고<br>밀린 드라마나 보고싶다"
        },
        {
            type: "SN",
            q: "여름 옷을 고를 때<br>가장 중요하게 생각하는 건?",
            a: "시원한 소재인지, 편한지<br>자주 입을 수 있는지",
            b: "이 옷을 입었을 때<br>내가 추구한 느낌이 날 지"
        },
        {
            type: "TF",
            q: "여름 축제에서<br>친구가 꼭 먹고 싶다던 간식 줄이 엄청 길다",
            a: "기다릴 가치가 있는지 보고<br>다른 걸 하자고 한다",
            b: "같이 기다리는 시간도<br>추억이라고 생각한다"
        },
        {
            type: "JP",
            q: "워터파크에 가는 날 나는?",
            a: "입장 시간, 준비물,<br>놀이기구 순서를 생각해둔다",
            b: "들어가서 사람 적은 곳부터<br>가면 된다고 생각한다"
        },
        {
            type: "EI",
            q: "이번 여름휴가는 호캉스다!<br>호텔에서 내가 가장 놀고 싶은 곳은?",
            a: "사람들과 어울려 놀 수 있는<br>수영장이나 라운지 바",
            b: "푹신한 침대가 있는<br>나만의 쾌적한 객실"
        },
        {
            type: "SN",
            q: "워터파크에서 무서운 슬라이드를 타기 위해<br>줄 서 있을 때 내 머릿속은?",
            a: "줄 진짜 길다.. 언제 줄어들지?<br>재밌겠다 또는 무섭겠다",
            b: "타다가 중간에 멈추면 어떡하지?<br>튜브가 뒤집어지는 건 아니겠지?"
        },
        {
            type: "TF",
            q: "바닷가에서 놀다가<br>실수로 선글라스를 바다에 빠뜨렸다",
            a: "아깝지만 어쩔 수 없지<br>새로 하나 사야겠다",
            b: "아 좀 조심할걸...<br>속상한 기분이 오래간다"
        },
        {
            type: "JP",
            q: "여름 세일 기간에 쇼핑할 때 나는?",
            a: "필요한 품목을 정해두고<br>할인율을 비교해서 산다",
            b: "마음에 드는 게 보이면<br>바로 사는 편이다"
        },
        {
            type: "EI",
            q: "폭염주의보가 뜬 주말<br>더 끌리는 건?",
            a: "친구랑 시원한 카페나<br>실내 쇼핑몰로 놀러가기",
            b: "집에서 에어컨 틀고<br>혼자 아무것도 안 하기"
        },
        {
            type: "SN",
            q: "휴가지 소품샵에서<br>귀여운 여름 아이템을 발견했다!",
            a: "예뻐도 쓸모없어 보이면 사지 않는다",
            b: "볼 때마다 오늘이 떠오를 것 같으면 산다"
        },
        {
            type: "TF",
            q: "여름 여행 중 돈을 예상보다 많이 썼다",
            a: "남은 예산을 다시 계산해서 조절한다",
            b: "그래도 즐거웠으면 괜찮다고 생각한다"
        },
        {
            type: "JP",
            q: "여름휴가를 갈 때<br>내가 더 선호하는 쪽은?",
            a: "큰 흐름이 정해져 있어서<br>헤매지 않는 여행",
            b: "계획 없이 움직이다가<br>예상 밖의 재미를 만나는 여행"
        }
    ];

    let currentIdx = 0;
    let scores = {
        E: 0, I: 0,
        S: 0, N: 0,
        T: 0, F: 0,
        J: 0, P: 0
    };

    function startTest() {
        document.getElementById('start-button-wrap').style.display = 'none';
        nextScreen('screen-start', 'screen-quiz');
    }

    function nextScreen(hideId, showId) {
        document.getElementById(hideId).classList.remove('active');
        document.getElementById(showId).classList.add('active');
        window.scrollTo(0, 0);

        if (showId === 'screen-quiz') {
            showQuestion();
        }
    }

    function showQuestion() {
        if (currentIdx >= questions.length) {
            calculateResult();
            return;
        }

        const percent = (currentIdx / questions.length) * 100;
        document.getElementById('progress-bar').style.width = percent + '%';

        const qData = questions[currentIdx];
        document.getElementById('question-text').innerHTML = qData.q;
        document.getElementById('btn-a').innerHTML = qData.a;
        document.getElementById('btn-b').innerHTML = qData.b;
    }

    function submitAnswer(choice) {
        const qData = questions[currentIdx];
        const dim = qData.type;

        if (choice === 'A') {
            scores[dim[0]]++;
        } else {
            scores[dim[1]]++;
        }

        currentIdx++;
        showQuestion();
    }

    function calculateResult() {
        document.getElementById('progress-bar').style.width = '100%';

        let mbti = "";
        mbti += (scores.E >= scores.I) ? "E" : "I";
        mbti += (scores.S >= scores.N) ? "S" : "N";
        mbti += (scores.T >= scores.F) ? "T" : "F";
        mbti += (scores.J >= scores.P) ? "J" : "P";

        displayResult(mbti);
    }

    function displayResult(mbti) {
        const resultImage = document.getElementById('result-image');

        resultImage.src = 'img_' + mbti.toLowerCase() + '394.png';
        resultImage.alt = TEST_TITLE + ' ' + mbti + ' 결과 이미지';

        document.getElementById('screen-quiz').classList.remove('active');
        document.getElementById('screen-result').classList.add('active');
        document.getElementById('out-of-frame-buttons').style.display = 'flex';

        window.scrollTo(0, 0);
    }

    function saveResultImage() {
        const captureArea = document.getElementById('capture-area');
        const resultImage = document.getElementById('result-image');

        const capture = () => {
            html2canvas(captureArea, {
                useCORS: true,
                allowTaint: true,
                scale: 2,
                backgroundColor: '#dff8ff'
            }).then(canvas => {
                document.getElementById('saved-image').src = canvas.toDataURL('image/png');
                document.getElementById('save-modal').classList.add('active');
            });
        };

        if (resultImage && resultImage.src && !resultImage.complete) {
            resultImage.onload = capture;
            resultImage.onerror = capture;
        } else {
            capture();
        }
    }

    function closeModal() {
        document.getElementById('save-modal').classList.remove('active');
    }

    function shareTest() {
        if (navigator.share) {
            navigator.share({
                title: TEST_TITLE,
                url: SHARE_URL
            }).catch(() => {});
        } else if (navigator.clipboard) {
            navigator.clipboard.writeText(SHARE_URL).then(() => {
                alert('테스트 링크 주소가 복사되었습니다.');
            }).catch(() => {
                copyShareUrlFallback();
            });
        } else {
            copyShareUrlFallback();
        }
    }

    function copyShareUrlFallback() {
        const textarea = document.createElement('textarea');
        textarea.value = SHARE_URL;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.top = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();

        try {
            document.execCommand('copy');
            alert('테스트 링크 주소가 복사되었습니다.');
        } catch (e) {
            alert(SHARE_URL);
        }

        document.body.removeChild(textarea);
    }
</script>
