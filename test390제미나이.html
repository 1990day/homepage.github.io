<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>테스트잇 미니홈피 프로필 성격 테스트</title>
<link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    :root {
        --cy-bg-outer: #b0c4de;
        --cy-frame-grey: #e0e0e0;
        --cy-border: #808080;
        --cy-tab-active: #17a2b8;
        --cy-tab-inactive: #f0f0f0;
        --text-color: #333;
        
        --theme-bg: #ffccde;
        --theme-table: #ffb3d1;
        --theme-wall-l: #ffdae6;
        --theme-wall-r: #ffe6f0;
        --theme-floor: #ffd1e1;
        --theme-label: #ff6699;
    }

    * {
        box-sizing: border-box;
        font-family: 'NeoDunggeunmo', sans-serif;
        margin: 0;
        padding: 0;
    }

    body {
        background-color: var(--cy-bg-outer);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 40px 20px;
        min-height: 100vh;
        color: var(--text-color);
    }

    .app-wrapper {
        width: 100%;
        max-width: 550px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    #minihompy-layout {
        display: flex;
        width: 100%;
        position: relative;
    }

    #cyworld-content {
        flex: 1;
        background-color: var(--cy-frame-grey);
        border: 2px solid var(--cy-border);
        border-radius: 8px;
        padding: 10px;
        box-shadow: 4px 4px 15px rgba(0,0,0,0.2);
        display: flex;
        flex-direction: column;
        z-index: 2;
    }

    .cy-title-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 12px;
        background-color: #d1d1d1;
        border: 1px solid var(--cy-border);
        font-size: 14px;
        font-weight: bold;
        margin-bottom: 5px;
        border-radius: 4px;
    }
    .cy-controls { display: flex; gap: 4px; }
    .cy-btn-small {
        width: 18px; height: 18px;
        background-color: white; border: 1px solid var(--cy-border);
        display: flex; justify-content: center; align-items: center;
        font-size: 11px; line-height: 1;
    }

    .cy-body {
        display: flex;
        width: 100%;
    }

    .cy-main-window {
        flex: 1;
        background-color: white;
        border: 2px solid var(--cy-border);
        border-radius: 5px;
        min-height: 550px;
        height: auto;
        position: relative;
        padding: 15px;
    }

    .cy-tabs {
        width: 38px;
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-top: 35px;
        margin-left: -2px;
        z-index: 1;
    }
    .cy-tab {
        background-color: var(--cy-tab-inactive);
        border: 2px solid var(--cy-border);
        border-left: none;
        padding: 12px 2px;
        writing-mode: vertical-rl;
        text-orientation: upright;
        font-size: 13px;
        text-align: center;
        border-radius: 0 6px 6px 0;
        letter-spacing: 2px;
        cursor: default;
        transition: background-color 0.3s;
    }
    .cy-tab.active {
        background-color: var(--cy-tab-active);
        color: white;
    }

    .screen {
        display: none;
        flex-direction: column;
        width: 100%;
        height: 100%;
    }
    .screen.active {
        display: flex;
    }

    .content-padding {
        padding: 25px 5px;
        align-items: center;
    }

    .action-btn {
        background-color: white;
        border: 2px dotted #888;
        padding: 14px 20px;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
        max-width: 350px;
        margin-bottom: 15px;
        transition: 0.2s;
        border-radius: 4px;
    }
    .action-btn:hover { background-color: #f0f0f0; border: 2px solid #555; }

    .today-is { align-self: flex-start; font-size: 14px; margin-bottom: 30px; color: #555; }
    .screen-title { font-size: 26px; margin-bottom: 40px; line-height: 1.5; color: #2ea6c4; text-align: center; }
    
    #screen-input .screen-title { color: #17a2b8; font-weight: bold; font-size: 24px; }
    .input-wrapper { width: 100%; max-width: 350px; margin-bottom: 25px; text-align: left; }
    .input-wrapper label { display: block; margin-bottom: 8px; font-size: 16px; font-weight: bold; color: #333; }
    .input-wrapper input[type="text"], .select-group select {
        width: 100%; padding: 12px; border: 1px solid #ccc; font-size: 16px; color: #555; border-radius: 2px;
    }
    .select-group { display: flex; gap: 8px; }

    .progress-box { width: 100%; max-width: 350px; height: 16px; background-color: #eee; border: 1px solid #999; margin-bottom: 50px; }
    .progress-fill { height: 100%; background-color: #2ea6c4; width: 0%; transition: width 0.3s; }
    .q-text { font-size: 22px; margin-bottom: 50px; min-height: 80px; display: flex; align-items: center; justify-content: center; text-align: center; word-break: keep-all; line-height: 1.4; }

    .result-theme-bg {
        background-color: var(--theme-bg);
        padding: 15px;
        height: 100%;
        display: flex;
        flex-direction: column;
    }

    .result-header {
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        padding: 10px 0;
        border: 2px solid var(--text-color);
        background-color: var(--theme-bg);
        margin-bottom: 15px;
    }

    .result-miniroom {
        height: 220px;
        border: 2px solid var(--text-color);
        position: relative;
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        border-radius: 4px;
        overflow: hidden;
    }
    .room-walls {
        flex: 6;
        display: flex;
        width: 100%;
    }
    .wall-left {
        flex: 1;
        background-color: var(--theme-wall-l);
        border-right: 1px solid rgba(0,0,0,0.1);
        position: relative;
    }
    .wall-right {
        flex: 1;
        background-color: var(--theme-wall-r);
        position: relative;
    }
    .room-floor {
        flex: 4;
        background-color: var(--theme-floor);
        border-top: 1px solid rgba(0,0,0,0.1);
        position: relative;
        background-image: radial-gradient(rgba(255,255,255,0.4) 1px, transparent 1px);
        background-size: 15px 15px;
    }

    .room-prop-1 { position: absolute; bottom: 10px; right: 20px; font-size: 40px; z-index: 1; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1)); }
    .room-prop-2 { position: absolute; bottom: 20px; left: 20px; font-size: 35px; z-index: 1; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1)); }

    .miniroom-label {
        position: absolute;
        top: -1px; left: -1px;
        background-color: var(--theme-label);
        color: white;
        padding: 4px 10px;
        font-size: 13px;
        font-weight: bold;
        border-right: 2px solid var(--text-color);
        border-bottom: 2px solid var(--text-color);
        border-radius: 0 0 8px 0;
        z-index: 5;
    }

    .room-chars {
        position: absolute;
        bottom: 10px;
        width: 100%;
        display: flex;
        justify-content: space-around;
        padding: 0 30px;
        z-index: 3;
    }
    .char-box { display: flex; flex-direction: column; align-items: center; position: relative; }
    .char-emoji { font-size: 55px; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.2)); }
    .char-bubble {
        background: white; border: 2px solid #333; padding: 8px 12px; font-size: 13px;
        border-radius: 8px; position: absolute; bottom: 65px; text-align: center;
        white-space: pre-wrap; min-width: 110px; box-shadow: 2px 2px 0 rgba(0,0,0,0.1);
    }
    .char-bubble::after {
        content: ''; position: absolute; bottom: -7px; left: 50%; transform: translateX(-50%);
        border-width: 7px 7px 0; border-style: solid; border-color: #333 transparent transparent transparent;
    }

    .profile-info-box {
        background-color: white;
        border: 2px solid var(--text-color);
        padding: 15px;
        display: flex;
        flex-direction: column;
    }
    
    .info-table {
        display: flex;
        background-color: var(--theme-table);
        border: 1px dotted var(--text-color);
        margin-bottom: 15px;
    }
    .info-cell { flex: 1; padding: 10px; text-align: center; font-size: 16px; font-weight: bold; }
    .info-cell:first-child { border-right: 1px dotted var(--text-color); }

    .traits-list { list-style: none; padding: 0; margin: 0; }
    .traits-list li {
        text-align: center;
        padding: 15px 0;
        border-bottom: 1px solid #999;
        font-size: 15px;
        line-height: 1.4;
        word-break: keep-all;
    }
    .traits-list li:first-child { padding-top: 5px; }
    .traits-list li:last-child { border-bottom: 1px dotted #999; padding-bottom: 15px; }

    .bgm-player-box {
        margin-top: 15px;
        align-self: flex-end;
        background-color: white;
        border: 2px solid #ccc;
        border-radius: 3px;
        padding: 4px 8px;
        font-size: 12px;
        display: flex;
        gap: 10px;
        align-items: center;
        box-shadow: 1px 1px 0 rgba(0,0,0,0.1);
    }
    .bgm-song {
        background: #f0f0f0;
        border: 1px solid #aaa;
        padding: 2px 6px;
    }

    #out-of-frame-buttons {
        display: none; 
        width: 100%;
        flex-direction: column;
        align-items: center;
        gap: 10px;
    }
    .btn-save {
        background-color: #17a2b8; color: white; border: none; padding: 15px 20px;
        font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; max-width: 400px;
        border-radius: 4px; box-shadow: 2px 2px 5px rgba(0,0,0,0.2);
    }
    .btn-save:hover { background-color: #138496; }
    .btn-sub { background-color: white; border: 1px dotted #666; padding: 12px 20px; font-size: 15px; cursor: pointer; width: 100%; max-width: 400px; }

    #save-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); z-index: 999; justify-content: center; align-items: center; flex-direction: column; }
    #save-modal.active { display: flex; }
    #saved-image { max-width: 90%; max-height: 75vh; border: 2px solid white; margin-bottom: 20px; }
    .modal-text { color: white; font-size: 18px; margin-bottom: 20px; text-align: center; line-height: 1.5; }
    .close-modal-btn { background: white; border: none; padding: 10px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; }

    @media screen and (max-width: 500px) {
        body { padding: 15px 5px; font-size: 14px; }
        .app-wrapper { gap: 10px; }
        
        #cyworld-content { padding: 4px; border-radius: 4px; }
        .cy-title-bar { padding: 4px 8px; font-size: 12px; }
        .cy-main-window { padding: 8px 4px; min-height: 400px; }
        
        .screen-title { font-size: 20px; margin-bottom: 25px; }
        .q-text { font-size: 18px; margin-bottom: 30px; }
        
        .result-theme-bg { padding: 8px; }
        .result-header { font-size: 16px; padding: 8px 0; margin-bottom: 10px; }
        
        .char-bubble { font-size: 11px; padding: 6px 8px; min-width: 90px; bottom: 60px; word-break: keep-all; }
        .char-bubble::after { border-width: 5px 5px 0; bottom: -5px; }
        .char-emoji { font-size: 45px; }
        
        .profile-info-box { padding: 10px 5px; }
        .info-cell { font-size: 14px; padding: 6px; }
        
        .traits-list { padding: 0; }
        .traits-list li { font-size: 13px; line-height: 1.35; padding: 12px 2px; }
        
        .bgm-player-box { font-size: 11px; gap: 5px; padding: 4px 6px; }
        .bgm-song { padding: 1px 4px; }

        .cy-tabs { display: none; }
    }
</style>
</head>
<body>

<div class="app-wrapper">
    
    <div id="minihompy-layout">
        <div id="cyworld-content">
            <div class="cy-title-bar">
                <span>미니홈피.exe</span>
                <div class="cy-controls">
                    <div class="cy-btn-small">_</div>
                    <div class="cy-btn-small">□</div>
                    <div class="cy-btn-small">X</div>
                </div>
            </div>

            <div class="cy-body">
                <div class="cy-main-window">
                    
                    <div id="screen-start" class="screen content-padding active">
                        <div class="today-is">TODAY IS.. 맑음 ☀️</div>
                        <div class="screen-title">테스트잇 미니홈피<br>프로필 성격 테스트</div>
                        <div style="font-size: 60px; margin-bottom: 50px;">👾</div>
                        <button class="action-btn" onclick="nextScreen('screen-start', 'screen-input', 'tab-profile')">테스트 시작하기</button>
                    </div>

                    <div id="screen-input" class="screen content-padding">
                        <div class="today-is">TODAY IS.. 두근두근 💗</div>
                        <div class="screen-title" id="input-title">프로필 정보 입력</div>
                        
                        <div class="input-wrapper">
                            <label>이름 또는 닉네임</label>
                            <input type="text" id="userName" placeholder="예: 짱구">
                        </div>
                        
                        <div class="input-wrapper">
                            <label>생년월일</label>
                            <div class="select-group">
                                <select id="userYear"></select>
                                <select id="userMonth"></select>
                                <select id="userDay"></select>
                            </div>
                        </div>
                        
                        <button class="action-btn" style="margin-top: 20px; background-color: #17a2b8; color: white; border: none;" onclick="startTest()">입력 완료</button>
                    </div>

                    <div id="screen-test" class="screen content-padding">
                        <div class="today-is">TODAY IS.. 집중 🧐</div>
                        <div class="progress-box">
                            <div class="progress-fill" id="progress-bar"></div>
                        </div>
                        <div class="q-text" id="question-text"></div>
                        <button class="action-btn" id="answer-a" onclick="handleAnswer('a')"></button>
                        <button class="action-btn" id="answer-b" onclick="handleAnswer('b')"></button>
                    </div>

                    <div id="screen-result" class="screen">
                        <div class="result-theme-bg" id="result-theme">
                            <div class="result-header">테스트잇 미니홈피 프로필 성격 테스트</div>
                            
                            <div class="result-miniroom">
                                <div class="miniroom-label">Miniroom 🏠</div>
                                <div class="room-walls">
                                    <div class="wall-left"><div class="room-prop-2" id="room-prop-2"></div></div>
                                    <div class="wall-right"><div class="room-prop-1" id="room-prop-1"></div></div>
                                </div>
                                <div class="room-floor">
                                    <div class="room-chars">
                                        <div class="char-box">
                                            <div class="char-bubble" id="char-speech-1"></div>
                                            <div class="char-emoji" id="char-sprite-1"></div>
                                        </div>
                                        <div class="char-box">
                                            <div class="char-bubble" id="char-speech-2"></div>
                                            <div class="char-emoji" id="char-sprite-2"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="profile-info-box">
                                <div class="info-table">
                                    <div class="info-cell" id="res-name"></div>
                                    <div class="info-cell" id="res-zodiac"></div>
                                </div>

                                <ul class="traits-list" id="traits-list">
                                </ul>
                            </div>
                            
                            <div class="bgm-player-box">
                                <span class="bgm-icon">🎵 BGM ▶ || </span>
                                <span class="bgm-song" id="bgm-title"></span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div> 

        <div class="cy-tabs" id="cy-tabs-menu">
            <div class="cy-tab active" id="tab-home">홈</div>
            <div class="cy-tab" id="tab-profile">프로필</div>
            <div class="cy-tab" id="tab-guestbook">방명록</div>
        </div>
    </div>
    
    <div id="out-of-frame-buttons">
        <button class="btn-save" onclick="saveResultImage()">결과 이미지 저장하기</button>
        <button class="btn-sub" onclick="location.reload()">다시 해보기</button>
        <button class="btn-sub" onclick="alert('다른 테스트 페이지로 이동 준비중입니다.')">다른 테스트 해보기</button>
        <button class="btn-sub" onclick="shareTest()">테스트 공유하기</button>
    </div>

</div>

<div id="save-modal">
    <div class="modal-text">아래 이미지를 꾹 눌러서<br>내 폰에 저장해 보세요!</div>
    <img id="saved-image" src="" alt="결과 이미지">
    <button class="close-modal-btn" onclick="closeModal()">닫기</button>
</div>

<script>
    window.onload = function() {
        const yearSelect = document.getElementById('userYear');
        const monthSelect = document.getElementById('userMonth');
        const daySelect = document.getElementById('userDay');
        
        yearSelect.options.add(new Option("년도", ""));
        for(let i = 2024; i >= 1970; i--) yearSelect.options.add(new Option(i + "년", i));
        
        monthSelect.options.add(new Option("월", ""));
        for(let i = 1; i <= 12; i++) monthSelect.options.add(new Option(i + "월", i));
        
        daySelect.options.add(new Option("일", ""));
        for(let i = 1; i <= 31; i++) daySelect.options.add(new Option(i + "일", i));
    };

    function getZodiac(month, day) {
        if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return "물병자리";
        if ((month == 2 && day >= 19) || (month == 3 && day <= 20)) return "물고기자리";
        if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return "양자리";
        if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return "황소자리";
        if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) return "쌍둥이자리";
        if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) return "게자리";
        if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return "사자자리";
        if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return "처녀자리";
        if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) return "천칭자리";
        if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) return "전갈자리";
        if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) return "궁수자리";
        return "염소자리";
    }

    function nextScreen(hideId, showId, activeTabId) {
        document.getElementById(hideId).classList.remove('active');
        document.getElementById(showId).classList.add('active');
        
        const tabsMenu = document.getElementById('cy-tabs-menu');
        if (showId === 'screen-result') {
            tabsMenu.style.display = 'none';
        } else {
            tabsMenu.style.display = 'flex';
        }
        
        const tabs = document.querySelectorAll('.cy-tab');
        tabs.forEach(tab => tab.classList.remove('active'));
        
        if (activeTabId) {
            const targetTab = document.getElementById(activeTabId);
            if (targetTab) {
                targetTab.classList.add('active');
            }
        }
        window.scrollTo(0, 0); 
    }

    const questions = [
        { type: 'EI', q: '주말에 약속이 취소되었다. 나의 반응은?', a: '아쉬워하며 다른 친구에게 연락해본다.', b: '속으로 기뻐하며 넷플릭스를 켠다.' },
        { type: 'EI', q: '새로운 사람을 만나는 자리에서 나는?', a: '먼저 다가가서 인사를 건네며 분위기를 주도한다.', b: '누군가 말 걸어주기를 기다리며 관찰한다.' },
        { type: 'EI', q: '스트레스를 푸는 나만의 방법은?', a: '사람들과 시끌벅적하게 수다를 떤다.', b: '혼자 방에서 조용히 취미 생활을 한다.' },
        { type: 'SN', q: '멍 때릴 때 주로 하는 생각은?', a: '오늘 저녁 뭐 먹지? 내일 뭐 입지?', b: '내가 만약 투명인간이 된다면 어떨까?' },
        { type: 'SN', q: '노래를 들을 때 내가 더 꽂히는 부분은?', a: '신나는 멜로디와 착착 감기는 비트!', b: '가사의 깊은 의미와 전달하는 메세지' },
        { type: 'SN', q: '요리를 할 때 나의 주방 스타일은?', a: '레시피에 적힌 계량스푼과 정량을 엄수한다.', b: '내 감을 믿고 눈대중으로 재료를 넣는다.' },

        }
        const qData = questions[currentQ];
        document.getElementById('question-text').innerText = qData.q;
        document.getElementById('answer-a').innerText = qData.a;
        document.getElementById('answer-b').innerText = qData.b;
        
        const progress = ((currentQ + 1) / 12) * 100;
        document.getElementById('progress-bar').style.width = progress + '%';
    }

    let isProcessing = false;
    function handleAnswer(ans) {
        if (currentQ >= 12 || isProcessing) return;
        isProcessing = true;

        const type = questions[currentQ].type;
        if (ans === 'a') scores[type.charAt(0)]++;
        else scores[type.charAt(1)]++;
        
        currentQ++;
        
        setTimeout(() => {
            showQuestion();
            isProcessing = false;
        }, 100);
    }

    function showResult() {
        let mbti = "";
        mbti += (scores.E >= scores.I) ? "E" : "I";
        mbti += (scores.S >= scores.N) ? "S" : "N";
        mbti += (scores.T >= scores.F) ? "T" : "F";
        mbti += (scores.J >= scores.P) ? "J" : "P";

        const zodiacStr = getZodiac(userMonth, userDay);
        const data = resultData[mbti];
        const theme = mbtiThemes[mbti];

        const resultThemeElement = document.getElementById('result-theme');
        resultThemeElement.style.setProperty('--theme-bg', theme.bg);
        resultThemeElement.style.setProperty('--theme-table', theme.table);
        resultThemeElement.style.setProperty('--theme-wall-l', theme.wall_l);
        resultThemeElement.style.setProperty('--theme-wall-r', theme.wall_r);
        resultThemeElement.style.setProperty('--theme-floor', theme.floor);
        resultThemeElement.style.setProperty('--theme-label', theme.label);

        document.documentElement.style.setProperty('--cy-tab-active', theme.label);

        document.getElementById('res-name').innerText = userName;
        document.getElementById('res-zodiac').innerText = zodiacStr;
        
        document.getElementById('char-sprite-1').innerText = data.sprite;
        document.getElementById('char-speech-1').innerText = data.speech;
        
        document.getElementById('char-sprite-2').innerText = data.sprite2;
        document.getElementById('char-speech-2').innerText = data.speech2;

        document.getElementById('room-prop-1').innerText = theme.prop1;
        document.getElementById('room-prop-2').innerText = theme.prop2;
        
        document.getElementById('bgm-title').innerText = data.bgm;

        const traitUl = document.getElementById('traits-list');
        traitUl.innerHTML = "";
        data.traits.forEach(trait => {
            const li = document.createElement('li');
            li.innerText = trait;
            traitUl.appendChild(li);
        });

        nextScreen('screen-test', 'screen-result', null);
        document.getElementById('out-of-frame-buttons').style.display = 'flex';
    }

    function saveResultImage() {
        const captureArea = document.getElementById('cyworld-content');
        const saveBtn = document.querySelector('.btn-save');
        saveBtn.innerText = "이미지 생성 중...";

        html2canvas(captureArea, { scale: 2, backgroundColor: null }).then(canvas => {
            const imgData = canvas.toDataURL('image/png');
            document.getElementById('saved-image').src = imgData;
            document.getElementById('save-modal').classList.add('active');
            saveBtn.innerText = "결과 이미지 저장하기";
        }).catch(err => {
            alert("이미지 저장 중 오류가 발생했습니다.");
            saveBtn.innerText = "결과 이미지 저장하기";
        });
    }

    function closeModal() {
        document.getElementById('save-modal').classList.remove('active');
    }

    function shareTest() {
        if (navigator.share) {
            navigator.share({
                title: '미니홈피 프로필 성격 테스트',
                url: window.location.href,
            }).catch(console.error);
        } else {
            alert('주소를 복사하여 친구들에게 공유해보세요!\n' + window.location.href);
        }
    }
</script>
