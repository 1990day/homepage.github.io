<style>
:root {
    --bg-outer: #f7efe6;
    --card-bg: #fffaf4;
    --text-color: #2f2a25;
    --border-color: #2f2a25;
    --accent-pink: #ff5aa8;
    --accent-cream: #fff8ef;
    --accent-yellow: #fff0b8;
    --theme-bg: #f7efe6;
    --theme-shadow: rgba(90, 57, 71, 0.18);
}

* {
    box-sizing: border-box;
    font-family: 'NeoDunggeunmo', sans-serif;
    margin: 0;
    padding: 0;
}

body {
    background: #f7efe6;
    color: var(--text-color);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px;
    min-height: 100vh;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.28;
    background-image:
        linear-gradient(115deg, transparent 0 6%, rgba(47,42,37,0.07) 6.2% 6.5%, transparent 6.8% 100%),
        linear-gradient(15deg, transparent 0 10%, rgba(47,42,37,0.06) 10.2% 10.45%, transparent 10.7% 100%),
        linear-gradient(70deg, transparent 0 14%, rgba(47,42,37,0.05) 14.2% 14.45%, transparent 14.8% 100%);
    background-size: 360px 230px, 300px 240px, 280px 200px;
}

.page-header {
    width: min(650px, calc(100% - 2px));
    margin: 0 auto 14px;
    min-height: 56px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border: 2px solid var(--border-color);
    background: #fff8ef;
    box-shadow: 4px 4px 0 rgba(47, 42, 37, 0.12);
}

.logo-text {
    font-size: 20px;
    font-weight: 900;
    text-decoration: none;
    color: #2f2a25;
    flex-shrink: 0;
}

.main-nav {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    justify-content: flex-end;
}

.main-nav a {
    padding: 6px 8px;
    border: 1.5px solid var(--border-color);
    background: #ffe7f1;
    text-decoration: none;
    color: #2f2a25;
    font-size: 12px;
}

.app-wrapper {
    width: 100%;
    max-width: 650px;
    background: var(--accent-pink);
    border: 2px solid var(--border-color);
    box-shadow: 7px 7px 0 rgba(47, 42, 37, 0.16);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

.app-shell-top {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 12px;
    border-bottom: 2px solid var(--border-color);
    background: rgba(255,255,255,0.14);
}

.shell-brand {
    font-size: 14px;
    color: #fffaf0;
}

.shell-leds {
    display: flex;
    gap: 6px;
}

.shell-leds span {
    width: 12px;
    height: 12px;
    border: 2px solid var(--border-color);
    background: #fff6dd;
    display: inline-block;
}

.shell-leds span:nth-child(2) { background: #ffd36b; }
.shell-leds span:nth-child(3) { background: #ffc7e0; }

.screen {
    display: none;
    flex-direction: column;
    width: 100%;
    padding: 18px 12px 22px;
    align-items: center;
}

.screen.active {
    display: flex;
}

.start-screen {
    gap: 16px;
}

.main-image-wrap {
    width: 100%;
    background: transparent;
}

.main-image {
    width: 100%;
    display: block;
    border: 2px solid var(--border-color);
    background: #fff8ef;
}

.start-btn {
    margin-top: 2px;
}

.input-screen,
.result-screen,
.loading-screen {
    padding-top: 20px;
}

.device-card,
.result-device,
.loading-device {
    width: 100%;
    max-width: 500px;
    background: var(--accent-pink);
    border: 2px solid var(--border-color);
    padding: 16px 16px 14px;
    position: relative;
    box-shadow: 5px 5px 0 rgba(47, 42, 37, 0.14);
}

.device-card::after,
.result-device::after,
.loading-device::after {
    content: "";
    position: absolute;
    top: 10px;
    right: 12px;
    width: 10px;
    height: 34px;
    border: 2px solid var(--border-color);
    border-bottom: none;
    background: #ffe8f2;
}

.device-screen,
.result-device-screen,
.loading-device-screen {
    background: var(--accent-cream);
    border: 2px solid var(--border-color);
    position: relative;
}

.device-screen {
    padding: 14px 14px 12px;
    min-height: 190px;
}

.result-device {
    max-width: none;
    margin: 0 6px 14px;
    padding: 12px 12px 10px;
}

.result-device::after {
    top: 8px;
    right: 10px;
    width: 9px;
    height: 28px;
}

.result-device-screen {
    padding: 10px 10px 8px;
    min-height: auto;
}

.device-icon-row,
.result-icon-row,
.loading-icon-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: #4a4038;
}

.device-icon-row {
    font-size: 16px;
    margin-bottom: 10px;
}

.result-icon-row {
    font-size: 13px;
    margin-bottom: 5px;
}

.loading-icon-row {
    font-size: 15px;
    margin-bottom: 10px;
}

.device-title {
    font-size: 28px;
    line-height: 1.35;
    text-align: center;
    margin: 8px 0 10px;
}

.device-sub {
    text-align: center;
    font-size: 14px;
    line-height: 1.5;
    color: #534840;
}

.device-input-area {
    width: 100%;
    margin-top: 14px;
}

.input-wrapper {
    width: 100%;
    margin-bottom: 12px;
}

.input-wrapper label {
    display: block;
    margin-bottom: 8px;
    font-size: 15px;
    font-weight: bold;
    color: #fffaf0;
    padding-left: 2px;
}

.select-group {
    display: flex;
    gap: 6px;
    margin-bottom: 6px;
}

.select-group select {
    width: 100%;
    padding: 12px 10px;
    border: 2px solid var(--border-color);
    background: #fff8ef;
    font-size: 15px;
    outline: none;
    color: #2f2a25;
    border-radius: 0;
    appearance: none;
}

.action-btn {
    background: #fff8ef;
    color: #2f2a25;
    border: 2px solid var(--border-color);
    padding: 15px 18px;
    font-size: 17px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    border-radius: 0;
    box-shadow: 4px 4px 0 rgba(47, 42, 37, 0.14);
}

.action-btn:hover,
.btn-save:hover,
.btn-sub:hover,
.close-modal-btn:hover {
    transform: translate(1px, 1px);
    box-shadow: 3px 3px 0 rgba(47, 42, 37, 0.14);
}

.device-controls,
.result-device-controls,
.loading-device-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 12px;
    gap: 10px;
}

.device-left-btn,
.result-left-btn,
.loading-left-btn {
    width: 38px;
    height: 20px;
    border: 2px solid var(--border-color);
    background: #fff8ef;
    border-radius: 14px;
}

.device-mid-btn,
.result-mid-btn,
.loading-mid-btn {
    flex: 1;
    max-width: 86px;
    height: 22px;
    border: 2px solid var(--border-color);
    background: #fff8ef;
    border-radius: 16px;
    position: relative;
}

.device-mid-btn::before,
.result-mid-btn::before,
.loading-mid-btn::before {
    content: "~~~";
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
}

.device-right-btn,
.result-right-btn,
.loading-right-btn {
    width: 38px;
    height: 38px;
    border: 2px solid var(--border-color);
    background: #ffd66f;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
}

.result-theme-bg {
    background: var(--theme-bg);
    width: 100%;
    padding: 8px 4px 0;
    display: flex;
    flex-direction: column;
}

.result-header {
    text-align: center;
    font-size: 20px;
    font-weight: bold;
    line-height: 1.35;
    padding: 13px 12px 12px;
    border: 2px solid var(--border-color);
    background: #fffaf0;
    color: #2f2a25;
    margin: 4px 6px 16px;
    box-shadow: 4px 4px 0 var(--theme-shadow);
}

.result-device-title {
    text-align: center;
    font-size: 14px;
    margin: 2px 0 7px;
    color: #4e433b;
}

.peak-age-box {
    border: 2px solid var(--border-color);
    background: var(--accent-yellow);
    padding: 10px 8px 12px;
    text-align: center;
    margin-bottom: 0;
}

.peak-age {
    font-size: 20px;
    line-height: 1.25;
    color: #2f2a25;
    font-weight: bold;
}

.profile-info-box {
    background: #fffaf0;
    border: 2px solid var(--border-color);
    padding: 15px;
    display: flex;
    flex-direction: column;
    box-shadow: 4px 4px 0 var(--theme-shadow);
    margin: 0 6px 0;
}

.traits-list {
    list-style: none;
    padding: 0;
    margin: 0;
    width: 100%;
}

.traits-list li {
    text-align: center;
    padding: 13px 5px;
    border-bottom: 1px dashed #c7b8ad;
    font-size: 15px;
    line-height: 1.35;
    word-break: keep-all;
}

.traits-list li:last-child {
    border-bottom: none;
}

.loading-device-screen {
    padding: 18px 14px 16px;
    min-height: 250px;
    display: flex;
    flex-direction: column;
    justify-content: center;
}

.loading-title {
    text-align: center;
    font-size: 24px;
    line-height: 1.4;
    margin: 6px 0 10px;
    color: #2f2a25;
}

.loading-sub {
    text-align: center;
    font-size: 14px;
    line-height: 1.5;
    color: #5b5149;
    margin-bottom: 18px;
}

.loading-box {
    border: 2px solid var(--border-color);
    background: #fff0b8;
    padding: 16px 12px;
    text-align: center;
}

.loading-main-text {
    font-size: 18px;
    line-height: 1.5;
    color: #2f2a25;
}

.loading-dots {
    display: inline-flex;
    gap: 5px;
    vertical-align: middle;
    margin-left: 4px;
}

.loading-dots span {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: #2f2a25;
    display: inline-block;
    animation: blinkDot 1.2s infinite;
}

.loading-dots span:nth-child(2) {
    animation-delay: 0.2s;
}

.loading-dots span:nth-child(3) {
    animation-delay: 0.4s;
}

.loading-stars {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 14px;
    font-size: 18px;
    color: #5e4d42;
}

.loading-stars span {
    animation: floatStar 1.4s ease-in-out infinite;
}

.loading-stars span:nth-child(2) {
    animation-delay: 0.2s;
}

.loading-stars span:nth-child(3) {
    animation-delay: 0.4s;
}

.loading-stars span:nth-child(4) {
    animation-delay: 0.6s;
}

.device-card::after,
.result-device::after,
.loading-device::after {
    display: none;
}

#out-of-frame-buttons {
    display: none;
    width: 100%;
    max-width: 650px;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    margin-top: 15px;
}

.btn-save,
.btn-sub {
    width: 100%;
    border: 2px solid #2f2a25;
    padding: 14px;
    font-size: 16px;
    cursor: pointer;
    border-radius: 0;
    font-weight: bold;
    box-shadow: 4px 4px 0 rgba(47, 42, 37, 0.12);
}

.btn-save {
    background: var(--accent-pink);
    color: #fffaf0;
    padding: 16px;
    font-size: 18px;
}

.btn-sub {
    background: #fff8ef;
    color: #2f2a25;
}

#save-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#save-modal.active {
    display: flex;
}

#saved-image {
    max-width: 75%;
    max-height: 65vh;
    border: 2px solid white;
}

.modal-text {
    color: white;
    font-size: 18px;
    margin-bottom: 15px;
    text-align: center;
    font-weight: bold;
    line-height: 1.45;
}

.close-modal-btn {
    background: var(--accent-pink);
    color: #fffaf0;
    border: 2px solid #fffaf0;
    padding: 10px 25px;
    cursor: pointer;
    font-weight: bold;
    font-size: 15px;
}

@keyframes blinkDot {
    0%, 80%, 100% { opacity: 0.25; transform: translateY(0); }
    40% { opacity: 1; transform: translateY(-2px); }
}

@keyframes floatStar {
    0%, 100% { transform: translateY(0) scale(1); opacity: 0.65; }
    50% { transform: translateY(-6px) scale(1.08); opacity: 1; }
}

@media screen and (max-width: 600px) {
    body { padding: 8px; }
    .page-header { min-height: 52px; padding: 9px 10px; }
    .logo-text { font-size: 18px; }
    .main-nav { gap: 4px; }
    .main-nav a { font-size: 13px; padding: 6px 8px; }
    .screen { padding: 14px 8px 18px; }
    .device-card { padding: 12px 12px 10px; }
    .device-screen { padding: 12px 10px 10px; }
    .device-title { font-size: 23px; }
    .device-sub { font-size: 13px; }
    .input-wrapper label { font-size: 14px; }
    .select-group { gap: 4px; }
    .select-group select { font-size: 14px; padding: 11px 8px; }
    .action-btn { font-size: 16px; padding: 14px 16px; }
    .result-header { font-size: 17px; padding: 13px 8px 11px; margin: 4px 2px 15px; }
    .result-device,
    .loading-device { padding: 10px 10px 9px; margin: 0 2px 12px; }
    .result-device-screen,
    .loading-device-screen { padding: 10px 8px 9px; }
    .peak-age { font-size: 18px; }
    .traits-list li { font-size: 14px; padding: 12px 2px; }
    .loading-title { font-size: 21px; }
    .loading-main-text { font-size: 16px; }
}
</style>
</head>

<body>

<header class="page-header">
    <a class="logo-text" href="https://test-it.co.kr/">테스트잇</a>
    <nav class="main-nav">
        <a href="https://test-it.co.kr/test.html">성격</a>
        <a href="https://test-it.co.kr/face.html">얼굴</a>
        <a href="https://test-it.co.kr/etc.html">그외</a>
        <a href="https://test-it.co.kr/saju.html">사주</a>
    </nav>
</header>

<div class="app-wrapper" id="capture-area">
    <div class="app-shell-top">
        <div class="shell-brand">테스트잇 사주 전성기 테스트</div>
        <div class="shell-leds"><span></span><span></span><span></span></div>
    </div>

    <div id="screen-start" class="screen active start-screen">
        <div class="main-image-wrap">
            <img src="img_main393.png" alt="테스트잇 사주 전성기 테스트 메인이미지" class="main-image">
        </div>
        <button class="action-btn start-btn" onclick="nextScreen('screen-start','screen-input')">테스트 시작하기</button>
    </div>

    <div id="screen-input" class="screen input-screen">
        <div class="device-card">
            <div class="device-screen">
                <div class="device-icon-row">
                    <span>✦</span>
                    <span>☾</span>
                    <span>☀</span>
                </div>
                <div class="device-title">테스트잇<br>사주 전성기 테스트</div>
                <div class="device-sub">생년월일시를 입력하면<br>내 전성기 흐름을 확인할 수 있어요</div>
            </div>

            <div class="device-input-area">
                <div class="input-wrapper">
                    <label>생년월일</label>
                    <div class="select-group">
                        <select id="calendarType">
                            <option value="solar">양력</option>
                            <option value="lunar">음력</option>
                        </select>
                        <select id="leapMonth">
                            <option value="normal">평달</option>
                            <option value="leap">윤달</option>
                        </select>
                    </div>

                    <div class="select-group">
                        <select id="userYear"></select>
                        <select id="userMonth"></select>
                        <select id="userDay"></select>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label>태어난 시간</label>
                    <div class="select-group">
                        <select id="userTime"></select>
                    </div>
                </div>

                <div class="input-wrapper">
                    <label>성별</label>
                    <div class="select-group">
                        <select id="gender">
                            <option value="">성별</option>
                            <option value="0">여자</option>
                            <option value="1">남자</option>
                        </select>
                    </div>
                </div>

                <button class="action-btn" style="margin-top:10px;" onclick="startTest()">결과 확인하기</button>
            </div>

            <div class="device-controls">
                <div class="device-left-btn"></div>
                <div class="device-mid-btn"></div>
                <div class="device-right-btn">★</div>
            </div>
        </div>
    </div>

    <div id="screen-loading" class="screen loading-screen">
        <div class="loading-device">
            <div class="loading-device-screen">
                <div class="loading-icon-row">
                    <span>✦</span>
                    <span>☾</span>
                    <span>☀</span>
                </div>

                <div class="loading-title">테스트잇<br>사주 전성기 테스트</div>
                <div class="loading-sub">지금 내 전성기 흐름을 찾고 있어요</div>

                <div class="loading-box">
                    <div class="loading-main-text">
                        사주 보는 중
                        <span class="loading-dots">
                            <span></span><span></span><span></span>
                        </span>
                    </div>
                    <div class="loading-stars">
                        <span>✦</span>
                        <span>☾</span>
                        <span>✦</span>
                        <span>☀</span>
                    </div>
                </div>
            </div>

            <div class="loading-device-controls">
                <div class="loading-left-btn"></div>
                <div class="loading-mid-btn"></div>
                <div class="loading-right-btn">★</div>
            </div>
        </div>
    </div>

    <div id="screen-result" class="screen result-screen" style="padding:10px;">
        <div class="result-theme-bg" id="result-theme">
            <div class="result-header">테스트잇 사주 전성기 테스트</div>

            <div class="result-device">
                <div class="result-device-screen">
                    <div class="result-icon-row">
                        <span>✦</span>
                        <span>☾</span>
                        <span>☀</span>
                    </div>
                    <div class="result-device-title">나의 사주 전성기</div>

                    <div class="peak-age-box">
                        <div class="peak-age" id="peak-main-age">--</div>
                    </div>
                </div>

                <div class="result-device-controls">
                    <div class="result-left-btn"></div>
                    <div class="result-mid-btn"></div>
                    <div class="result-right-btn">★</div>
                </div>
            </div>

            <div class="profile-info-box">
                <ul class="traits-list" id="traits-list"></ul>
            </div>
        </div>
    </div>
</div>

<div id="out-of-frame-buttons">

function mod(n, m) {
    return ((n % m) + m) % m;
}

function safeCall(obj, methodName) {
    try {
        if (obj && typeof obj[methodName] === "function") return obj[methodName]();
    } catch (e) {
        return "";
    }
    return "";
}

function gzToKor(gz) {
    if (!gz || gz.length < 2) return "";
    const gan = ganKor[gz.charAt(0)] || gz.charAt(0);
    const zhi = zhiKor[gz.charAt(1)] || gz.charAt(1);
    return gan + zhi;
}

function nextElement(el) {
    return elementOrder[mod(elementOrder.indexOf(el) + 1, 5)];
}

function prevElement(el) {
    return elementOrder[mod(elementOrder.indexOf(el) - 1, 5)];
}

function controls(el) {
    return { "목":"토","화":"금","토":"수","금":"목","수":"화" }[el];
}

function controlledBy(el) {
    return { "목":"금","화":"수","토":"목","금":"화","수":"토" }[el];
}

function addScore(scores, element, value) {
    if (!element) return;
    scores[element] += value;
}

function toArray(value) {
    if (!value) return [];
    if (Array.isArray(value)) return value;
    return String(value).replace(/\s/g, "").split(/[,\，、]/).filter(Boolean);
}

function getGanZhiElement(gz) {
    if (!gz || gz.length < 2) return { gan:null, zhi:null };
    return {
        gan: ganElement[gz.charAt(0)],
        zhi: zhiElement[gz.charAt(1)]
    };
}

function getElementBalanceScore(targetElement, elementInfo, usefulElements, weight) {
    let score = 0;

    if (!targetElement) return 0;

    if (usefulElements.includes(targetElement)) score += 2.2 * weight;
    if (targetElement === elementInfo.lowElement) score += 1.4 * weight;

    if (elementInfo.isStrong && targetElement === elementInfo.highElement) {
        score -= 1.2 * weight;
    }

    if (!elementInfo.isStrong) {
        if (targetElement === elementInfo.dayElement) score += 1.2 * weight;
        if (targetElement === prevElement(elementInfo.dayElement)) score += 1.0 * weight;
    }

    return score;
}

function scoreGanZhi(gz, elementInfo, usefulElements, weight) {
    const els = getGanZhiElement(gz);
    let score = 0;

    score += getElementBalanceScore(els.gan, elementInfo, usefulElements, weight);
    score += getElementBalanceScore(els.zhi, elementInfo, usefulElements, weight * 1.25);

    if (els.gan && els.zhi && els.gan !== els.zhi) {
        score += 0.35 * weight;
    }

    return score;
}

function getSolarByInput(year, month, day, hour, minute, calendarType, leapMonth) {
    if (calendarType === "solar") {
        return Solar.fromYmdHms(year, month, day, hour, minute, 0);
    }
    const lunarMonth = leapMonth === "leap" ? -month : month;
    return Lunar.fromYmdHms(year, lunarMonth, day, hour, minute, 0).getSolar();
}

function getAgePart(age) {
    const n = Math.abs(parseInt(age, 10)) % 10;
    if (n <= 3) return "초반";
    if (n <= 6) return "중반";
    return "후반";
}

function getAgeWindowText(age) {
    const n = parseInt(age, 10);
    if (isNaN(n)) return "전성기 흐름";

    const start = Math.max(20, n - 2);
    const end = n + 2;
    const startDecade = Math.floor(start / 10) * 10;
    const endDecade = Math.floor(end / 10) * 10;
    const startPart = getAgePart(start);
    const endPart = getAgePart(end);

    if (startDecade === endDecade) {
        if (startPart === endPart) return startDecade + "대 " + startPart;
        return startDecade + "대 " + startPart + "에서 " + endPart;
    }

    return startDecade + "대 " + startPart + "에서 " + endDecade + "대 " + endPart;
}

function stringToSeed(str) {
    let hash = 0;
    for (let i = 0; i < str.length; i++) {
        hash = ((hash * 31) + str.charCodeAt(i)) >>> 0;
    }
    return hash;
}

function pickBySeed(arr, seed, offset) {
    if (!arr || !arr.length) return "";
    return arr[(seed + offset) % arr.length];
}

function analyzeElements(eightChar, timeUnknown) {
    const scores = { "목":0, "화":0, "토":0, "금":0, "수":0 };

    const year = safeCall(eightChar, "getYear");
    const month = safeCall(eightChar, "getMonth");
    const day = safeCall(eightChar, "getDay");
    const time = safeCall(eightChar, "getTime");

    addScore(scores, ganElement[year.charAt(0)], 0.9);
    addScore(scores, zhiElement[year.charAt(1)], 1.1);
    addScore(scores, ganElement[month.charAt(0)], 1.4);
    addScore(scores, zhiElement[month.charAt(1)], 2.2);
    addScore(scores, ganElement[day.charAt(0)], 2.0);
    addScore(scores, zhiElement[day.charAt(1)], 1.5);

    if (!timeUnknown) {
        addScore(scores, ganElement[time.charAt(0)], 1.0);
        addScore(scores, zhiElement[time.charAt(1)], 1.2);
    }

    const hideGroups = [
        toArray(safeCall(eightChar, "getYearHideGan")),
        toArray(safeCall(eightChar, "getMonthHideGan")),
        toArray(safeCall(eightChar, "getDayHideGan")),
        timeUnknown ? [] : toArray(safeCall(eightChar, "getTimeHideGan"))
    ];

    hideGroups.forEach((group, groupIndex) => {
        const baseWeight = groupIndex === 1 ? 0.42 : 0.28;
        group.forEach((gan, idx) => {
            addScore(scores, ganElement[gan], Math.max(0.12, baseWeight - idx * 0.08));
        });
    });

    const sorted = Object.entries(scores).sort((a, b) => b[1] - a[1]);
    const dayElement = ganElement[day.charAt(0)] || "토";
    const supportScore = scores[dayElement] + scores[prevElement(dayElement)];
    const drainScore = scores[nextElement(dayElement)] + scores[controls(dayElement)] + scores[controlledBy(dayElement)];
    const isStrong = supportScore >= drainScore * 0.88;

    return {
        scores,
        dayElement,
        isStrong,
        highElement: sorted[0][0],
        lowElement: sorted[sorted.length - 1][0]
    };
}

function getUsefulElements(info) {
    const dayElement = info.dayElement;
    if (info.isStrong) {
        return [info.lowElement, nextElement(dayElement), controls(dayElement), controlledBy(dayElement)];
    }
    return [info.lowElement, dayElement, prevElement(dayElement)];
}

function getDaYunBaseAge(yun) {
    const startYear = parseInt(safeCall(yun, "getStartYear"), 10) || 0;
    const startMonth = parseInt(safeCall(yun, "getStartMonth"), 10) || 0;
    const startDay = parseInt(safeCall(yun, "getStartDay"), 10) || 0;
    const startHour = parseInt(safeCall(yun, "getStartHour"), 10) || 0;

    const decimalAge = startYear + (startMonth / 12) + (startDay / 360) + (startHour / 8640);
    return Math.max(1, Math.round(decimalAge));
}

function getDaYunDisplayAges(yun, daYun) {
    const index = daYun.getIndex ? parseInt(daYun.getIndex(), 10) : 0;
    if (!index || index < 1) return null;

    const baseAge = getDaYunBaseAge(yun);
    const startAge = baseAge + (index - 1) * 10;
    const endAge = startAge + 9;

    return { startAge, endAge };
}

function makeResultSeed(result) {
    const source = [
        safeCall(result.eightChar, "getYear"),
        safeCall(result.eightChar, "getMonth"),
        safeCall(result.eightChar, "getDay"),
        safeCall(result.eightChar, "getTime"),
        result.daYunGanZhi,
        result.peakAge,
        result.elementInfo.dayElement,
        result.elementInfo.highElement,
        result.elementInfo.lowElement
    ].join("|");

    return stringToSeed(source);
}

function getPeakStage(age) {
    if (age < 30) return "빠른 전성기";
    if (age < 40) return "상승 전성기";
    if (age < 50) return "중심 전성기";
    if (age < 60) return "완성 전성기";
    return "후반 전성기";
}

function calculatePeak(data) {
    const birthSolar = getSolarByInput(
        data.year,
        data.month,
        data.day,
        data.hour,
        data.minute,
        data.calendarType,
        data.leapMonth
    );

    const lunar = birthSolar.getLunar();
    const eightChar = lunar.getEightChar();
    const gender = parseInt(data.gender, 10);
    const yun = getYunByLibrary(eightChar, gender);
    const daYunList = yun.getDaYun();

    const elementInfo = analyzeElements(eightChar, data.timeUnknown);
    const usefulElements = getUsefulElements(elementInfo);

    let best = null;

    daYunList.forEach(daYun => {
        const index = daYun.getIndex ? parseInt(daYun.getIndex(), 10) : 0;
        const daYunGanZhi = daYun.getGanZhi ? daYun.getGanZhi() : "";

        if (!daYunGanZhi || index < 1) return;

        const ages = getDaYunDisplayAges(yun, daYun);
        if (!ages) return;

        const startAge = ages.startAge;
        const endAge = ages.endAge;

        if (endAge < 18 || startAge > 79) return;

        const daYunScore = scoreGanZhi(daYunGanZhi, elementInfo, usefulElements, 1.4);

        let liuNianList = [];
        try {
            liuNianList = daYun.getLiuNian ? daYun.getLiuNian() : [];
        } catch (e) {
            liuNianList = [];
        }

        if (!liuNianList || !liuNianList.length) {
            const middleAge = Math.round((startAge + endAge) / 2);
            if (!best || daYunScore > best.score) {
                best = {
                    peakAge: middleAge,
                    score: daYunScore,
                    daYunGanZhi,
                    startAge,
                    endAge
                };
            }
            return;
        }

        liuNianList.forEach((liuNian, liuIndex) => {
            const age = startAge + liuIndex;
            if (age < 18 || age > 79 || age > endAge) return;

            const liuNianGanZhi = liuNian.getGanZhi ? liuNian.getGanZhi() : "";
            const liuNianScore = scoreGanZhi(liuNianGanZhi, elementInfo, usefulElements, 1.0);

            let totalScore = daYunScore + liuNianScore;
            if (age >= 27 && age <= 58) totalScore += 1.2;
            if (age >= 34 && age <= 49) totalScore += 0.8;

            if (!best || totalScore > best.score) {
                best = {
                    peakAge: age,
                    score: totalScore,
                    daYunGanZhi,
                    startAge,
                    endAge
                };
            }
        });
    });

    if (!best) {
        best = {
            peakAge: 36,
            score: 0,
            daYunGanZhi: "",
            startAge: 32,
            endAge: 41
        };
    }

    const peakElementInfo = getGanZhiElement(best.daYunGanZhi || safeCall(eightChar, "getMonth"));
    const peakElement = peakElementInfo.zhi || peakElementInfo.gan || usefulElements[0] || elementInfo.dayElement;

    return {
        solar: birthSolar,
        lunar,
        eightChar,
        yun,
        elementInfo,
        usefulElements,
        peakAge: best.peakAge,
        peakElement,
        daYunGanZhi: best.daYunGanZhi,
        startAge: best.startAge,
        endAge: best.endAge,
        timeUnknown: data.timeUnknown
    };
}

function buildTraits(result) {
    const seed = makeResultSeed(result);
    const dayGz = safeCall(result.eightChar, "getDay");
    const dayTexts = dayPillarTextMap[dayGz] || ["내 주관이 뚜렷하고 판단력이 좋아요", "내 고유한 매력을 밀고 나가면 성공해요"];
    const daYunText = gzToKor(result.daYunGanZhi);
    const peakStage = getPeakStage(result.peakAge);
    const strengthKey = result.elementInfo.isStrong ? "strong" : "weak";
    const daYunDetail = daYunTextMap[result.daYunGanZhi] || daYunText + " 대운에는 내 중심을 확실히 잡아야 해요";

    const dayEl = result.elementInfo.dayElement || "토";
    const peakEl = result.peakElement || "토";

    const strengthOptions = strengthTextMap[dayEl] ? strengthTextMap[dayEl][strengthKey] : ["내 페이스를 잘 지키는 게 중요해요"];
    const strengthDetail = pickBySeed(strengthOptions, seed, 9);

    const ageStageOptions = ageStageTextMap[peakStage] ? ageStageTextMap[peakStage][peakEl] : ["내 인생의 멋진 전성기가 찾아옵니다"];
    const ageStageDetail = pickBySeed(ageStageOptions, seed, 19);

    const peakElementDetail = peakCommentMap[result.peakElement] || "내 운의 흐름이 또렷해지는 시기예요";

    const traits = [
        "전성기는 " + getAgeWindowText(result.peakAge) + "에 확실하게 찾아와요",
        dayTexts[0],
        dayTexts[1],
        daYunDetail,
        strengthDetail,
        ageStageDetail,
        peakElementDetail,
        daYunText ? daYunText + " 대운이 전성기 흐름의 핵심이에요" : "내 흐름이 살아나는 시기를 잘 잡는 게 중요해요"
    ].filter(Boolean);

    const unique = [];
    traits.forEach(text => {
        if (unique.indexOf(text) === -1) unique.push(text);
    });

    return unique.slice(0, 8);
}

function startTest() {
    if (typeof Solar === "undefined" || typeof Lunar === "undefined") {
        alert("사주 라이브러리를 불러오지 못했어요. 인터넷 연결이나 CDN 주소를 확인해주세요.");
        return;
    }

    const calendarType = document.getElementById("calendarType").value;
    const leapMonth = document.getElementById("leapMonth").value;
    const year = parseInt(document.getElementById("userYear").value, 10);
    const month = parseInt(document.getElementById("userMonth").value, 10);
    const day = parseInt(document.getElementById("userDay").value, 10);
    const timeIndexStr = document.getElementById("userTime").value;
    const gender = document.getElementById("gender").value;

    if (!year || !month || !day || timeIndexStr === "" || gender === "") {
        alert("생년월일시와 성별을 모두 선택해주세요!");
        return;
    }

    const checkDate = new Date(year, month - 1, day);
    if (
        calendarType === "solar" &&
        (
            checkDate.getFullYear() !== year ||
            checkDate.getMonth() !== month - 1 ||
            checkDate.getDate() !== day
        )
    ) {
        alert("존재하지 않는 날짜예요!");
        return;
    }

    const timeInfo = timesList[parseInt(timeIndexStr, 10)];

    try {
        const result = calculatePeak({
            calendarType,
            leapMonth,
            year,
            month,
            day,
            hour: timeInfo.hour,
            minute: timeInfo.minute,
            timeUnknown: !!timeInfo.unknown,
            gender: parseInt(gender, 10)
        });

        pendingResult = result;
        showLoadingScreen();
    } catch (e) {
        alert("사주 계산 중 오류가 발생했어요. 음력 윤달 여부나 날짜를 다시 확인해주세요.");
        console.error(e);
    }
}

function showLoadingScreen() {
    document.getElementById("out-of-frame-buttons").style.display = "none";
    nextScreen("screen-input", "screen-loading");

    if (loadingTimer) clearTimeout(loadingTimer);

    loadingTimer = setTimeout(() => {
        if (pendingResult) {
            showResult(pendingResult);
            pendingResult = null;
        }
    }, 3000);
}

function showResult(result) {
    const theme = elementTheme[result.peakElement] || elementTheme["토"];
    const resultThemeElement = document.getElementById("result-theme");

    resultThemeElement.style.setProperty("--theme-bg", theme.bg);
    resultThemeElement.style.setProperty("--theme-shadow", theme.shadow);

    document.getElementById("peak-main-age").innerText = getAgeWindowText(result.peakAge);

    const traitUl = document.getElementById("traits-list");
    traitUl.innerHTML = "";

    buildTraits(result).forEach(trait => {
        const li = document.createElement("li");
        li.innerText = trait;
        traitUl.appendChild(li);
    });

    nextScreen("screen-loading", "screen-result");
    document.getElementById("out-of-frame-buttons").style.display = "flex";
}

function saveResultImage() {
    const captureArea = document.getElementById("capture-area");
    const saveBtn = document.querySelector(".btn-save");

    saveBtn.innerText = "이미지 생성 중...";

    html2canvas(captureArea, {
        scale: 2,
        backgroundColor: "#f7efe6",
        useCORS: true
    }).then(canvas => {
        document.getElementById("saved-image").src = canvas.toDataURL("image/png");
        document.getElementById("save-modal").classList.add("active");
        saveBtn.innerText = "결과 이미지 저장하기";
    }).catch(() => {
        alert("이미지 저장 중 오류가 발생했어요.");
        saveBtn.innerText = "결과 이미지 저장하기";
    });
}

function closeModal() {
    document.getElementById("save-modal").classList.remove("active");
}

function shareTest() {
    const shareData = {
        title: TEST_TITLE,
        text: TEST_TITLE,
        url: TEST_URL
    };

    if (navigator.share) {
        navigator.share(shareData).catch(console.error);
    } else if (navigator.clipboard) {
        navigator.clipboard.writeText(TEST_URL).then(() => {
            alert("주소가 복사됐어요!");
        }).catch(() => {
            alert("주소를 복사하여 공유해보세요!\n" + TEST_URL);
        });
    } else {
        alert("주소를 복사하여 공유해보세요!\n" + TEST_URL);
    }
}
