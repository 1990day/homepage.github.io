let step=0;
let score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

function startTest(){
  document.getElementById("start-control").style.display="none";
  document.getElementById("control-area").style.display="none";
  document.getElementById("screen-start").classList.remove("active");
  document.getElementById("screen-result").classList.remove("active");
  document.getElementById("screen-question").classList.add("active");
  renderQ();
}

function renderSignalProgress(){
  const wrap=document.getElementById("signal-progress");
  wrap.innerHTML="";
  for(let i=0;i<12;i++){
    const dot=document.createElement("div");
    dot.className="signal-dot";
    const color=i%3===0?"green":i%3===1?"yellow":"red";
    if(i<step){
      dot.classList.add("done",color);
    }
    if(i===step){
      dot.classList.add("done",color,"now");
    }
    wrap.appendChild(dot);
  }
}

function renderQ(){
  const q=qData[step];
  document.getElementById("q-num").innerText=`Q. ${step+1} / 12`;
  document.getElementById("q-label").innerText=`Q${step+1}`;
  document.getElementById("q-text").innerHTML=q.q;
  document.getElementById("btn-a").innerHTML=q.a;
  document.getElementById("btn-b").innerHTML=q.b;
  renderSignalProgress();
}

function selectAns(choice){
  const type=qData[step].type;
  if(choice===1) score[type[0]]++;
  else score[type[1]]++;

  step++;
  if(step<qData.length){
    renderQ();
  }else{
    showResult();
  }
}

function showResult(){
  let mbti="";
  mbti+=score.E>=score.I?"E":"I";
  mbti+=score.S>=score.N?"S":"N";
  mbti+=score.T>=score.F?"T":"F";
  mbti+=score.J>=score.P?"J":"P";

  const data=rData[mbti];

  document.getElementById("mbti-nickname").innerText=data.name;
 document.getElementById("result-sub").innerHTML=data.sub;
  document.getElementById("green-list").innerHTML=data.g.map(t=>`<div class="trait-item">${t}</div>`).join("");
  document.getElementById("red-list").innerHTML=data.r.map(t=>`<div class="trait-item">${t}</div>`).join("");

  document.getElementById("screen-question").classList.remove("active");
  document.getElementById("screen-result").classList.add("active");
  document.getElementById("control-area").style.display="flex";
  window.scrollTo(0,0);
}

function restart(){
  step=0;
  score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  document.getElementById("control-area").style.display="none";
  document.getElementById("start-control").style.display="block";
  document.getElementById("screen-result").classList.remove("active");
  document.getElementById("screen-question").classList.remove("active");
  document.getElementById("screen-start").classList.add("active");
  window.scrollTo(0,0);
}

function paintLightsForCapture(){
  const lights=document.querySelectorAll(".light");
  const original=[];

  lights.forEach(light=>{
    original.push({el:light,style:light.getAttribute("style")});

    if(light.classList.contains("red-on")){
      light.setAttribute("style","background:#d94a4a!important;background-color:#d94a4a!important;box-shadow:none!important;border:2px solid #000!important;");
    }

    if(light.classList.contains("yellow-on")){
      light.setAttribute("style","background:#ffd12f!important;background-color:#ffd12f!important;box-shadow:none!important;border:2px solid #000!important;");
    }

    if(light.classList.contains("green-on")){
      light.setAttribute("style","background:#28d866!important;background-color:#28d866!important;box-shadow:none!important;border:2px solid #000!important;");
    }
  });

  return original;
}

function restoreLightsAfterCapture(original){
  original.forEach(item=>{
    if(item.style===null){
      item.el.removeAttribute("style");
    }else{
      item.el.setAttribute("style",item.style);
    }
  });
}

function saveImage(){
  const target=document.getElementById("capture-area");
  const originalLights=paintLightsForCapture();

  setTimeout(()=>{
    html2canvas(target,{
      scale:2,
      backgroundColor:"#fff",
      useCORS:true,
      foreignObjectRendering:false,
      logging:false
    }).then(canvas=>{
      restoreLightsAfterCapture(originalLights);
      document.getElementById("modal-img").src=canvas.toDataURL("image/png");
      document.getElementById("modal").style.display="flex";
    }).catch(()=>{
      restoreLightsAfterCapture(originalLights);
    });
  },100);
}

function closeModal(){
  document.getElementById("modal").style.display="none";
}

function shareTest(){
  const shareUrl = "https://test-it.co.kr/test385";
  const text = "테스트잇 레드레드 성격 테스트";

  if(navigator.share){
    navigator.share({
      title: text,
      text: text,
      url: shareUrl
    });
  }else{
    navigator.clipboard.writeText(text + "\n" + shareUrl).then(function(){
      alert("테스트 링크가 복사되었습니다.");
    });
  }
}
