<body>
    <header class="page-header">
        <div class="header-top">
            <span>Vol. 369 / Lifestyle</span>
            <span>Est. 2024</span>
            <span>March 2026</span>
        </div>
        <h1><a href="index.html"><img class="logo" src="img_logo.png" alt="test it"></a></h1>
        <nav>
            <ul class="main-nav">
                <li><a href="https://test-it.co.kr/test.html">Character</a></li>
                <li><a href="https://test-it.co.kr/face.html">Face</a></li>
                <li><a href="https://test-it.co.kr/etc.html">Etc</a></li>
                <li><a href="https://test-it.co.kr/saju.html">Saju</a></li>
            </ul>
        </nav>
    </header>

    <article class="start">
        <img id="img_main" class="mt-3" src="img_main369.png">
        <button type="button" class="btn custom-jelly-button" onclick="start();" style="background-color: #1a1a1a !important; color: #fff !important;">시작하기</button>
    </article>

    <article class="question">
        <div class="progress">
            <div class="progress-bar" role="progressbar" style="width: calc(100/12*1%)"></div>
        </div>
        <h6 id="title">문제를 불러오는 중입니다...</h6>
        <input id="type" type="hidden" value="EI">
        <button id="A" type="button" class="btn custom-jelly-button">A</button>
        <button id="B" type="button" class="btn custom-jelly-button">B</button>
    </article>

    <article class="result">
        <img id="img" src="" alt="result">
        <div class="addthis_inline_share_toolbox_ougq mt-3"></div>
        <button type="button" class="btn custom-jelly-button" onclick="downloadImage()">SAVE IMAGE</button>
        <button type="button" class="btn custom-jelly-button" onclick="location.href='test369.html'">RETAKE TEST</button>
        <button type="button" class="btn custom-jelly-button" onclick="location.href='/'">MORE TESTS</button>
        <button type="button" id="share-btn" class="btn custom-jelly-button">SHARE</button>
    </article>

    <div class="coupang_ad">
        <script src="https://ads-partners.coupang.com/g.js"></script>
        <script>new PartnersCoupang.G({"id":798186,"template":"carousel","trackingCode":"AF4391881","width":"350","height":"140"});</script>
    </div>

    <input type="hidden" id="EI" value="0">
    <input type="hidden" id="SN" value="0">
    <input type="hidden" id="TF" value="0">
    <input type="hidden" id="JP" value="0">

    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script>
        var num = 1;
        var q = {
            1: {"title": "유행하는 밈을 알게 되면<br><br>나는?", "type": "EI", "A": "바로 주변 사람들에게 공유한다", "B": "혼자 보고 웃고 끝낸다"},
            2: {"title": "화제가 되는 밈이나<br><br>유행어의 유래를 알게 되었을 때", "type": "SN", "A": "아 이런 뜻이구나 하고<br>적절한 상황에 맞춰서 재미있게 쓴다", "B": "어쩌다 이게 퍼지게 된거지?<br>뒷얘기가 궁금해진다"},
            3: {"title": "새롭게 떠오르는 패션 아이템이<br><br>전국적으로 대유행 중이다", "type": "EI", "A": "유행하는 건 한번 입어보고 싶다<br>바로 사서 약속에 입고 나간다", "B": "똑같은 옷 입은 사람 마주칠까 봐<br>무난한 내 스타일을 고수한다"},
            4: {"title": "핫플 동네 놀러 갈 때", "type": "JP", "A": "일단 만나서<br>발길 닿는 대로 걷는다", "B": "점심 식당, 카페, 소품샵 동선을<br>미리 다 짜놓는다"},
            5: {"title": "인스타에서 핫플인 카페에 갔을 때", "type": "SN", "A": "인테리어 깔끔하다<br>근데 의자가 좀 불편하네", "B": "여기 사장님은 한 달에 얼마나 벌까?<br>마케팅 진짜 잘했네"},
            6: {"title": "유행하는 디저트를 비싼 돈 주고 먹었는데<br><br>맛이 없을 때", "type": "TF", "A": "기대 엄청 했는데 너무 아쉽다<br>그래도 유행하는 거 먹어본 걸로 만족", "B": "가격이 너무 거품이네<br>마케팅 비용인가 보다"},
            7: {"title":"유행하는 다이어트 방법으로<br><br>친구가 5kg 뺐다고 할 때", "type": "TF", "A": "헐 진짜 고생했겠다!<br>독하게 맘먹었네 축하해!", "B": "식단 어떻게 했어?<br>운동은 하루에 몇 시간씩 했고?"},
            8: {"title": "유행하는 디저트를 먹을 때", "type": "SN", "A": "식감이 바삭하네<br>근데 너무 달다 등 맛평가 위주", "B": "이거 유행 언제까지 갈까?<br>다음엔 또 뭐가 뜰까? 등 상계 위주"},
            9: {"title": "다이소 꿀템 대란 났을 때", "type": "JP", "A": "길 가다 보이면 들어가서 찾아본다", "B": "재고 조회 미리 해보고 출발한다"},
            10: {"title": "유행하는 빵 사려고 오픈런 했는데<br><br>내 바로 앞에서 품절됐을 때", "type": "TF", "A": "아침부터 고생했는데<br>진짜 너무 허무하고 짜증남", "B": "재고 관리 어떻게 하는 거야<br>다음엔 30분 더 일찍 와야겠다"},
            11: {"title": "핫플로 소문난 동네에 놀러 갔는데<br><br>길거리에 사람들이 바글바글하다", "type": "EI", "A": "활기찬 분위기에 덩달아 신이 나고<br>구경할 게 많아져서 텐션이 올라간다", "B": "사람 많은 걸 보자마자<br>벌써 기가 빨리는 기분이다"},
            12: {"title": "요아정 배달시킬 때", "type": "JP", "A": "오늘은 왠지 초코가 당기네?<br>매번 기분 따라 토핑을 바꾼다", "B": "평소에 늘 먹는 실패 없는<br>꿀조합 레시피 그대로 시킨다"}
        };

        var result = {
            "ISTJ": {"img":"img_istj369.png"}, "ISFJ": {"img":"img_isfj369.png"},
            "INFJ": {"img":"img_infj369.png"}, "INTJ": {"img":"img_intj369.png"},
            "ISTP": {"img":"img_istp369.png"}, "ISFP": {"img":"img_isfp369.png"},
            "INFP": {"img":"img_infp369.png"}, "INTP": {"img":"img_intp369.png"},
            "ESTP": {"img":"img_estp369.png"}, "ESFP": {"img":"img_esfp369.png"},
            "ENFP": {"img":"img_enfp369.png"}, "ENTP": {"img":"img_entp369.png"},
            "ESTJ": {"img":"img_estj369.png"}, "ESFJ": {"img":"img_esfj369.png"},
            "ENFJ": {"img":"img_enfj369.png"}, "ENTJ": {"img":"img_entj369.png"},
        };

        function start(){
            $(".start").hide();
            $(".question").show();
            next();
        }

        $("#A").click(function(){
            var type = $("#type").val();
            var preValue = $("#"+type).val();
            $("#"+type).val(parseInt(preValue)+1);
            next();
        });

        $("#B").click(function(){
            next();
        });

        function next(){
            if(num==13){
                $(".question").hide();
                $(".result").show();
                var mbti = "";
                ($("#EI").val()<2) ? mbti+="I" : mbti+="E";
                ($("#SN").val()<2) ? mbti+="N" : mbti+="S";
                ($("#TF").val()<2) ? mbti+="T" : mbti+="F";
                ($("#JP").val()<2) ? mbti+="J" : mbti+="P";
                $("#img").attr("src",result[mbti]["img"]);
            } else {
                $(".progress-bar").attr('style','width: calc(100/12*'+num+'%)');
                $("#title").html(q[num]["title"]);
                $("#type").val(q[num]["type"]);
                $("#A").html(q[num]["A"]);
                $("#B").html(q[num]["B"]);
                num++;
            }
        }

        function downloadImage() {
            var imgSrc = $("#img").attr("src");
            if (imgSrc) {
                var link = document.createElement('a');
                link.href = imgSrc;
                link.download = 'RESULT.png';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }

        document.getElementById("share-btn").addEventListener("click", function () {
            const testURL = "https://test-it.co.kr/test369";
            if (navigator.share) {
                navigator.share({ title: '유행 디저트 성격 테스트', url: testURL });
            } else {
                navigator.clipboard.writeText(testURL);
                alert("URL 복사 완료!");
            }
        });
    </script>
</body>
</html>
