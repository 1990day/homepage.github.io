/* --- 화면 전환 --- */
.screen {
  display: none;
  min-height: 100vh;
  position: relative;
}

.screen.active {
  display: block;
}

.scene {
  position: absolute;
  inset: 0;
  overflow: hidden;
  pointer-events: none;
}

.sun-glow {
  position: absolute;
  width: 240px;
  height: 240px;
  right: -40px;
  top: -50px;
  background: radial-gradient(circle, rgba(255,244,178,0.75) 0%, rgba(255,244,178,0.2) 48%, rgba(255,244,178,0) 72%);

}

.cloud {
  position: absolute;
  background: rgba(255,255,255,0.95);
  border-radius: 999px;
  box-shadow: 0 6px 16px rgba(170, 193, 180, 0.14);
}

.cloud::before,
.cloud::after {
  content: "";
  position: absolute;
  background: rgba(255,255,255,0.95);
  border-radius: 50%;
}

.cloud.c1 {
  width: 108px;
  height: 34px;
  left: 8%;
  top: 9%;
  animation: drift 19s linear infinite;
}

.cloud.c1::before {
  width: 38px;
  height: 38px;
  left: 16px;
  top: -14px;
}

.cloud.c1::after {
  width: 42px;
  height: 42px;
  right: 18px;
  top: -18px;
}

.cloud.c2 {
  width: 130px;
  height: 38px;
  right: 14%;
  top: 16%;
  animation: drift 25s linear infinite;
}

.cloud.c2::before {
  width: 44px;
  height: 44px;
  left: 18px;
  top: -16px;
}

.cloud.c2::after {
  width: 52px;
  height: 52px;
  right: 20px;
  top: -22px;
}

.cloud.c3 {
  width: 90px;
  height: 28px;
  left: 52%;
  top: 7%;
  opacity: 0.8;
  animation: drift 28s linear infinite;
}

.cloud.c3::before {
  width: 30px;
  height: 30px;
  left: 14px;
  top: -10px;
}

.cloud.c3::after {
  width: 34px;
  height: 34px;
  right: 14px;
  top: -14px;
}

@keyframes drift {
  0% { transform: translateX(0); }
  50% { transform: translateX(16px); }
  100% { transform: translateX(0); }
}

.hill {
  position: absolute;
  border-radius: 50%;
}

.hill.h1 {

  left: -15%;
  bottom: -155px;
  background: #d8efb6;
}

.hill.h2 {
  width: 110%;
  height: 270px;

  bottom: -122px;
  background: #b9df89;
}

.hill.h3 {
  width: 70%;
  height: 140px;
  left: -4%;
  bottom: 120px;
  background: rgba(187, 228, 146, 0.82);
  transform: rotate(-8deg);
  filter: blur(1px);
}

.path {

  width: 72%;
  height: 190px;
  right: -10%;
  bottom: 85px;
  background: #dbc08f;

}

.picnic-blanket {
  position: absolute;
  width: 168px;
  height: 120px;
  left: 10%;
  bottom: 115px;
  border-radius: 12px;
  background:
    linear-gradient(to right, rgba(241,181,205,0.95) 0 18%, transparent 18% 32%, rgba(241,181,205,0.95) 32% 50%, transparent 50% 68%, rgba(241,181,205,0.95) 68% 84%, transparent 84% 100%),
    linear-gradient(to bottom, rgba(241,181,205,0.95) 0 18%, transparent 18% 32%, rgba(241,181,205,0.95) 32% 50%, transparent 50% 68%, rgba(241,181,205,0.95) 68% 84%, transparent 84% 100%),
    #fde8f0;
  transform: rotate(-7deg);
  box-shadow: var(--shadow-soft);

}

.picnic-basket {
  position: absolute;
  left: 17%;
  bottom: 160px;
  width: 36px;
  height: 26px;

  box-shadow: inset 0 -5px 0 rgba(0,0,0,0.08);
}

.picnic-basket::before {
  content: "";
  position: absolute;

  height: 12px;
  border: 3px solid #b7834f;
  border-bottom: none;
  border-radius: 18px 18px 0 0;

  top: -9px;
}

.tree {
  position: absolute;
}

.tree .trunk {
  position: absolute;
  bottom: 0;
  width: 18px;
  height: 96px;
  background: #9b7656;
  border-radius: 12px;
}

.tree .crown {
  position: absolute;
  bottom: 68px;
  width: 120px;
  height: 120px;
  background: #9ad595;
  border-radius: 50%;
  box-shadow:
    -26px 18px 0 8px #9cd49b,
    30px 12px 0 4px #87c88b,

}

.tree.tree-left {
  left: -12px;

}

.tree.tree-left .trunk {
  left: 56px;
}

.tree.tree-left .crown {
  left: 6px;
}

.tree.tree-right {
  right: 8px;
  bottom: 138px;
  transform: scale(1.04);
}

.tree.tree-right .trunk {
  left: 58px;
}

.tree.tree-right .crown {
  left: 0;
  background: #f6c8dc;
  box-shadow:
    -26px 18px 0 8px #f4d6e3,
    30px 12px 0 4px #efb8d0,
    12px -26px 0 0 #f7dfe9;
}

.tree.tree-back {
  left: 72%;
  bottom: 230px;
  transform: scale(0.58);
  opacity: 0.72;
}

.tree.tree-back .trunk {
  left: 56px;
}

.tree.tree-back .crown {
  left: 0;
  background: #9fd59f;
  box-shadow:
    -26px 18px 0 8px #b4e1ac,
    30px 12px 0 4px #8bc58d,
    12px -26px 0 0 #a7d99f;
}

.flower-clump {
  position: absolute;
  width: 78px;
  height: 50px;
  bottom: 126px;
  right: 23%;
}

.flower-clump span {
  position: absolute;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #ffb3c6;
  box-shadow:
    8px 0 0 #ffd46a,
    -8px 0 0 #ff8fb3,
    0 8px 0 #ffc0cb,
    0 -8px 0 #ffd98a;
}

.flower-clump span:nth-child(1) { left: 8px; top: 18px; }
.flower-clump span:nth-child(2) { left: 30px; top: 8px; transform: scale(0.9); }
.flower-clump span:nth-child(3) { left: 52px; top: 20px; transform: scale(1.06); }
.flower-clump span:nth-child(4) { left: 26px; top: 28px; transform: scale(0.82); }

.bush {
  position: absolute;
  width: 96px;
  height: 54px;
  background: #9ed88d;
  border-radius: 40px;
  bottom: 106px;
  left: 35%;
  box-shadow:
    -20px 8px 0 #aedf9a,
    18px 6px 0 #89c777;
}

.tiny-grass {
  position: absolute;
  width: 18px;
  height: 14px;
  border-left: 2px solid #8eb56a;
  border-right: 2px solid #8eb56a;
  border-top: 2px solid transparent;
  border-radius: 50%;
  opacity: 0.55;
}

.tiny-grass::before,
.tiny-grass::after {
  content: "";
  position: absolute;
  width: 2px;
  height: 10px;
  background: #8eb56a;
  bottom: 0;
  border-radius: 2px;
}

.tiny-grass::before {
  left: 5px;
  transform: rotate(-16deg);
}

.tiny-grass::after {
  right: 5px;
  transform: rotate(18deg);
}

.g1 { left: 20%; bottom: 110px; }
.g2 { left: 46%; bottom: 132px; transform: scale(0.9); }
.g3 { left: 67%; bottom: 118px; transform: scale(0.8); }
.g4 { left: 84%; bottom: 154px; transform: scale(0.95); }
.g5 { left: 7%; bottom: 155px; transform: scale(0.75); }
.g6 { left: 58%; bottom: 170px; transform: scale(0.82); }

.petals {
  position: absolute;
  inset: 0;
  overflow: hidden;
}

.petal {
  position: absolute;
  width: 12px;
  height: 8px;
  background: rgba(255,255,255,0.95);
  border-radius: 10px 10px 10px 2px;
  box-shadow: 0 2px 4px rgba(198, 182, 189, 0.12);
  animation-name: fall;
  animation-timing-function: linear;
  animation-iteration-count: infinite;
}

.petal.p1 { left: 8%; top: -5%; animation-duration: 13s; animation-delay: -1s; transform: rotate(16deg); }
.petal.p2 { left: 20%; top: -8%; animation-duration: 11s; animation-delay: -4s; transform: rotate(-14deg); }
.petal.p3 { left: 35%; top: -6%; animation-duration: 14s; animation-delay: -2s; transform: rotate(28deg); }
.petal.p4 { left: 52%; top: -7%; animation-duration: 15s; animation-delay: -8s; transform: rotate(-10deg); }
.petal.p5 { left: 64%; top: -10%; animation-duration: 12s; animation-delay: -6s; transform: rotate(22deg); }
.petal.p6 { left: 80%; top: -4%; animation-duration: 16s; animation-delay: -10s; transform: rotate(-24deg); }
.petal.p7 { left: 92%; top: -9%; animation-duration: 17s; animation-delay: -12s; transform: rotate(12deg); }

@keyframes fall {
  0% {
    transform: translate3d(0, 0, 0) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  100% {
    transform: translate3d(70px, 110vh, 0) rotate(300deg);
    opacity: 0.85;
  }
}

.content-wrap {
  position: relative;
  z-index: 3;
  width: 100%;
  max-width: 550px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 52px 18px 34px;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

.start-area {
  padding-bottom: 0;
  margin-top: 0;
}

.main-hero-img {
  display: block;
  width: 100%;
  max-width: 100%;
  height: auto;
  object-fit: contain;
  border-radius: 24px;
  box-shadow: var(--shadow);
  margin: 30px 0 14px;
}

.start-btn {
  font-family: inherit;
  width: 100%;
  border: none;
  outline: none;
  cursor: pointer;
  border-radius: 24px;

  font-weight: 800;
  box-shadow:

  transition: transform 0.18s ease, box-shadow 0.18s ease;
}

.start-btn:hover {

.start-btn:active {

/* 질문화면 전체를 2번 코드 느낌으로 변경 */
.test-wrap {
  position: relative;
  z-index: 3;
  width: 100%;
  max-width: 550px;
  margin: 0 auto;
  min-height: 100vh;
  padding: 74px 14px 38px;
}

.test-wrap::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(circle at 10% 8%, rgba(255,255,255,0.95) 0 48px, transparent 49px),
    radial-gradient(circle at 18% 10%, rgba(255,255,255,0.95) 0 34px, transparent 35px),
    radial-gradient(circle at 78% 11%, rgba(255,255,255,0.92) 0 54px, transparent 55px),
    radial-gradient(circle at 87% 14%, rgba(255,255,255,0.92) 0 28px, transparent 29px),
    radial-gradient(circle at 73% 28%, rgba(255,245,193,0.95) 0 78px, transparent 79px),
    radial-gradient(circle at 8% 72%, rgba(255,233,244,0.85) 0 90px, transparent 91px),
    radial-gradient(circle at 87% 78%, rgba(201,248,255,0.9) 0 120px, transparent 121px);
  opacity: 0.9;
}

.test-top,
.question-area {
  position: relative;
  z-index: 2;
}

.test-top {
  max-width: 100%;
  margin-bottom: 0;
}

.q-chip-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 10px;
  font-size: 13px;
  color: #688096;
  font-weight: 900;
}

.q-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 92px;
  padding: 7px 12px;
  border-radius: 999px;
  background: rgba(255,255,255,0.82);
  border: 2px solid #c6ddec;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
  color: #5a738b;
  font-size: 12px;
  font-weight: 900;
}

.q-chip strong {
  color: inherit;
}

.progress-box {
  width: 100%;
}

.progress-track {
  width: 100%;
  height: 22px;
  padding: 3px;
  border-radius: 999px;
  border: 3px solid #b0cadf;
  background: #edf8ff;
  box-shadow: inset 0 2px 0 rgba(255,255,255,0.75);
  overflow: hidden;
  position: relative;
}

.progress-bar {
  width: 0%;
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #ffbfd7 0%, #ffe78d 30%, #b8efff 64%, #cef4b1 100%);
  transition: width 0.3s ease;
  position: relative;
}

.progress-bar::after {
  display: none;
}

.question-area {
  margin-top: 16px;
  background: rgba(255,255,255,0.97);
  border: 3px solid var(--line);
  border-radius: 28px;
  overflow: hidden;
  box-shadow:
    0 16px 0 rgba(149, 189, 214, 0.35),
    0 30px 40px rgba(105, 150, 181, 0.16);
}

.question-area::before {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(circle at 88% 18%, rgba(255,223,126,0.28) 0 58px, transparent 59px),
    radial-gradient(circle at 14% 82%, rgba(207,255,190,0.32) 0 92px, transparent 93px),
    radial-gradient(circle at 80% 78%, rgba(255,211,233,0.24) 0 82px, transparent 83px);
  opacity: 0.95;
  z-index: 0;
}

.question-card {
  position: relative;
  z-index: 2;
  background: transparent;
  border: 0;
  border-radius: 0;
  padding: 0;
  box-shadow: none;
  backdrop-filter: none;
  overflow: visible;
}

.question-card::before,
.question-card::after {
  display: none;
}

.question-label {
  position: relative;
  z-index: 3;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px 16px 14px;

  background: linear-gradient(90deg, #a5e4ff 0%, #cbfff3 28%, #fff1a8 64%, #ffd7e7 100%);

  margin: 0;
  border-radius: 0;
  font-size: 15px;
  font-weight: 900;
  color: #3f5d78;
  gap: 0;
}

.question-label .flower-mini {
  display: none;
}

.question-text {
  margin: 0;
  font-size: 20px;
  line-height: 1.5;
  font-weight: 900;
  color: #4f6a84;
  letter-spacing: -0.4px;
  word-break: keep-all;
  position: relative;
  z-index: 2;
  padding: 0;
}

.question-visual {
  position: relative;
  z-index: 2;
  margin: 16px 18px 16px;
  height: 126px;
  border-radius: 24px;

/* 기존 질문비주얼 제거 */

.question-visual .mini-hill-back,
.question-visual .mini-hill-front,
.question-visual .mini-path,
.question-visual .mini-blanket,
.question-visual .mini-basket,
.question-visual .mini-bush,
.question-visual .mini-tree,
.question-visual .mini-flower,
.question-visual .mini-petals {

}

.question-visual .mini-cloud {
  position: absolute;
  height: 18px;
  border-radius: 999px;
  border: 2px solid #bed8eb;
  background: rgba(255,255,255,0.95);
}

.question-visual .mini-cloud::before,
.question-visual .mini-cloud::after {
  content: "";
  position: absolute;
  border-radius: 50%;
  border: 2px solid #bed8eb;
  background: rgba(255,255,255,0.95);
}

.question-visual .mc1 {
  width: 50px;
  top: 18px;
  left: 18px;
  animation: cloudFloatA 10s ease-in-out infinite alternate;
}

.question-visual .mc1::before {
  width: 18px;
  height: 18px;
  top: -10px;
  left: 8px;
}

.question-visual .mc1::after {
  width: 20px;
  height: 20px;
  top: -11px;
  right: 8px;
}

.question-visual .mc2 {
  width: 58px;
  top: 26px;
  right: 20px;
  animation: cloudFloatB 11.5s ease-in-out infinite alternate;
}

.question-visual .mc2::before {
  width: 20px;
  height: 20px;
  top: -10px;
  left: 8px;
}

.question-visual .mc2::after {
  width: 22px;
  height: 22px;
  top: -12px;
  right: 8px;
}

/* 대관람차 */
.question-visual .wheel-mini-wrap {
  position: absolute;
  left: 50%;
  bottom: 12px;
  width: 96px;
  height: 96px;
  transform: translateX(-50%);
}

.question-visual .wheel-shell {
  position: absolute;
  inset: 0;
}

.question-visual .wheel-rotator {
  position: absolute;

<script>
const questions = [
  "나는 아직도 부를 수 있는 만화 주제가가 있다.",
  "가끔 문방구 앞에 멈춘다.",
  "하늘을 보면 예쁜 모양의 구름을 찾는다.",
  "놀이공원에 가면 범퍼카 한 번은 타야한다.",
  "뽑기 기계 앞에서 승부욕이 생긴다.",
  "어릴 때 별명을 아직 기억한다.",
  "남 모르게 횡단보도 하얀색 선만 밟을 때가 있다.",
  "내가 만화의 주인공이라고 상상할 때가 있다.",
  "우리 집에 왜 왔니 가사가 자동 재생된다.",
  "종이를 보면 비행기 한 번은 접어본다.",
  "음식 먹을 때 제일 맛있는 건 마지막에 먹는다.",
  "나는 아직도 학교 앞에서 먹던 컵 떡볶이가 생각난다.",
  "눈이 오면 첫 발자국을 찍고 싶어진다.",
  "놀이터를 지나가면 한 번쯤 그네가 타고 싶어진다.",
  "종 치는 소리를 들으면 괜히 반응한다.",
  "비밀 얘기할 때 괜히 목소리가 더 작아진다.",
  "버튼을 보면 누르고 싶다.",
  "누군가 내 이름을 불러주면 괜히 반갑다.",
  "나는 아직도 어릴 때 만들었던 이메일을 사용한다.",
  "포장지를 뜯기 전에 괜히 한번 흔들어본다."
];

const mainScreen = document.getElementById("mainScreen");
const testScreen = document.getElementById("testScreen");
const resultScreen = document.getElementById("resultScreen");

const startBtn = document.getElementById("startBtn");
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const saveImageBtn = document.getElementById("saveImageBtn");
const goMainBtn = document.getElementById("goMainBtn");
const shareBtn = document.getElementById("shareBtn");

const questionCount = document.getElementById("questionCount");
const progressBar = document.getElementById("progressBar");
const questionText = document.getElementById("questionText");
const resultImage = document.getElementById("resultImage");
const questionBadge = document.getElementById("questionBadge");

let currentIndex = 0;
let score = 0;
let locked = false;

function showScreen(screen) {
  mainScreen.classList.remove("active");
  testScreen.classList.remove("active");
  resultScreen.classList.remove("active");
  screen.classList.add("active");
  window.scrollTo(0, 0);
}

function renderQuestion() {
  questionCount.textContent = `QUESTION ${currentIndex + 1} / ${questions.length}`;
  questionText.textContent = questions[currentIndex];
  questionBadge.textContent = `QUESTION ${currentIndex + 1}`;
  progressBar.style.width = `${(currentIndex / questions.length) * 100}%`;
}

function startTest() {
  currentIndex = 0;
  score = 0;
  locked = false;
  renderQuestion();
  showScreen(testScreen);
}

function chooseAnswer(isYes) {
  if (locked) return;
  locked = true;

  if (isYes) {
    score += 1;
  }

  currentIndex += 1;

  setTimeout(() => {
    if (currentIndex < questions.length) {
      renderQuestion();
      locked = false;
    } else {
      showResult();
    }
  }, 160);
}

function showResult() {
  progressBar.style.width = "100%";
  resultImage.src = `img0101_${score}.png`;
  resultImage.alt = `동심 테스트 결과 ${score}점`;
  showScreen(resultScreen);
  locked = false;
}

function goMain() {
  showScreen(mainScreen);
}

startBtn.addEventListener("click", startTest);
yesBtn.addEventListener("click", () => chooseAnswer(true));
noBtn.addEventListener("click", () => chooseAnswer(false));
goMainBtn.addEventListener("click", goMain);

saveImageBtn.addEventListener("click", () => {
  const link = document.createElement("a");
  link.href = resultImage.src;
  link.download = "동심테스트_결과.png";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
});

shareBtn.addEventListener("click", () => {
  if (navigator.share) {
    navigator.share({
      title: "동심 테스트",
      text: "나의 동심 지수는 몇 점일까? 테스트해보세요!",
      url: window.location.href,
    }).catch(console.error);
  } else {
    navigator.clipboard.writeText(window.location.href).then(() => {
      alert("테스트 링크가 복사되었습니다!");
    });
  }
});
</script>
</body>
</html>
