    .save-modal {

  <script>
    const questions = [
      {
        q: "밤에 활동하는 티나는 사람을 줄여 부르는 말은?",
        guide: "정답을 입력하세요. 띄어쓰기 없이",
        answers: ["밤티"]
      },
      {
        q: "요즘 밈에서 자주 보이는 신체 부위 단어입니다.<br>빈칸에 들어갈 말은?",
        guide: "정답을 입력하세요. 띄어쓰기 없이",
        answers: ["골반"]
      },
      {
        q: "무언가 성공했을 때 가볍게 외치는 말입니다.<br>아자스와 비슷하게 쓰이는 말은?",
        guide: "정답을 입력하세요. 띄어쓰기 없이",
        answers: ["아자스", "아자쓰"]
      },
      {
        q: "밤티와 반대 느낌으로 쓰이는 유행어입니다.<br>낮도 밤도 아닌 중간 느낌의 이 말은?",
        guide: "정답을 입력하세요. 띄어쓰기 없이",
        answers: ["중티"]
      },
      {
        q: "뭔 말인지 알지의 줄임말입니다.<br>요즘식으로 줄이면?",
        guide: "정답을 입력하세요. 띄어쓰기 없이",
        answers: ["뭔말알"]
      },
      {
        q: "구글의 AI 이름입니다.<br>한글로 쓰면 무엇일까요?",
        guide: "정답을 입력하세요. 띄어쓰기 없이 한글로",
        answers: ["제미나이", "재미나이"]
      },
      {
        q: "2024년에 온라인에서 크게 화제가 된 지역 축제입니다.<br>김천의 이 축제는?",
        guide: "정답을 입력하세요. 띄어쓰기 없이",
        answers: ["김밥축제"]
      },
      {
        q: "초코 과자 이름이면서 밈으로도 자주 보이는 단어입니다.<br>무엇일까요?",
        guide: "정답을 입력하세요. 띄어쓰기 없이",
        answers: ["칸쵸"]
      },
      {
        q: "요즘 말끝에 붙는 짧은 밈 표현입니다.<br>한 글자로 입력해 주세요.",
        guide: "정답을 입력하세요. 띄어쓰기 없이",
        answers: ["슨"]
      },
      {
        q: "젊은 감성을 따라가려는 40대를 부르는 말입니다.<br>무엇일까요?",
        guide: "정답을 입력하세요. 띄어쓰기 없이",
        answers: ["영포티"]
      }
    ];

    const numQuestions = questions.length;
    let currentQuestion = 1;
    let correctAnswers = 0;
    let checked = Array(numQuestions).fill(false);
    let isSharing = false;

    function normalizeText(value) {
      return value
        .toString()
        .trim()
        .replace(/\s/g, "")
        .toLowerCase();
    }

    function renderQuestions() {
      const questionWrap = document.getElementById("question-wrap");
      questionWrap.innerHTML = "";

      questions.forEach((item, index) => {
        const questionNum = index + 1;
        const page = document.createElement("section");
        page.className = "question-page";
        page.id = `question-page-${questionNum}`;

        page.innerHTML = `
          <div class="exam-paper question-paper">
            <div class="question-head">
              <div class="question-title">테스트잇 영크크 유행 테스트</div>
              <div class="question-count">${questionNum} / ${numQuestions}</div>
            </div>

            <div class="progress-area">
              <div class="progress-text">
                <span>문제 ${questionNum}</span>
                <span>${Math.round((questionNum / numQuestions) * 100)}%</span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" id="progress-${questionNum}"></div>
              </div>
            </div>

            <div class="question-box">
              <p class="question-number">문제 ${questionNum}.</p>
              <div class="question-text">${item.q}</div>
            </div>

            <p class="answer-guide">${item.guide}</p>
            <input type="text" class="answer-input" id="answer-${questionNum}" autocomplete="off" placeholder="정답 입력">

            <button class="submit-button" type="button" onclick="checkAnswer(${questionNum})">
              ${questionNum === numQuestions ? "제출하기" : "다음 문제"}
            </button>
          </div>
        `;

        questionWrap.appendChild(page);
      });

      document.querySelectorAll(".answer-input").forEach((input) => {
        input.addEventListener("keydown", function(event) {
          if (event.key === "Enter") {
            const questionNum = Number(this.id.replace("answer-", ""));
            checkAnswer(questionNum);
          }
        });
      });
    }

    function showFirstQuestion() {
      if (!document.getElementById("question-page-1")) {
        renderQuestions();
      }

      const startPage = document.getElementById("start-page");
      const resultPage = document.getElementById("result-page");
      const firstQuestion = document.getElementById("question-page-1");

      if (!startPage || !resultPage || !firstQuestion) {
        return;
      }

      startPage.style.display = "none";
      resultPage.style.display = "none";

      document.querySelectorAll(".question-page").forEach((page) => {
        page.style.display = "none";
      });

      currentQuestion = 1;
      firstQuestion.style.display = "block";
      updateProgress(1);

      setTimeout(() => {
        const firstInput = document.getElementById("answer-1");
        if (firstInput) {
          firstInput.focus();
        }
      }, 100);
    }

    function updateProgress(questionNum) {
      const progress = document.getElementById(`progress-${questionNum}`);
      if (progress) {
        progress.style.width = `${(questionNum / numQuestions) * 100}%`;
      }
    }

    function checkAnswer(questionNum) {
      const input = document.getElementById(`answer-${questionNum}`);
      if (!input) {
        return;
      }

      const answer = normalizeText(input.value);

      if (!answer) {
        alert("정답을 입력해 주세요.");
        input.focus();
        return;
      }

      const acceptedAnswers = questions[questionNum - 1].answers.map(normalizeText);

      if (!checked[questionNum - 1] && acceptedAnswers.includes(answer)) {
        correctAnswers++;
      }

      checked[questionNum - 1] = true;

      if (questionNum < numQuestions) {
        const currentPage = document.getElementById(`question-page-${questionNum}`);
        const nextPage = document.getElementById(`question-page-${questionNum + 1}`);

        if (currentPage) {
          currentPage.style.display = "none";
        }

        if (nextPage) {
          nextPage.style.display = "block";
        }

        currentQuestion = questionNum + 1;
        updateProgress(currentQuestion);

        setTimeout(() => {
          const nextInput = document.getElementById(`answer-${currentQuestion}`);
          if (nextInput) {
            nextInput.focus();
          }
        }, 100);
      } else {
        showResult();
      }
    }

    function showResult() {
      document.querySelectorAll(".question-page").forEach((page) => {
        page.style.display = "none";
      });

      const resultPage = document.getElementById("result-page");
      const resultImage = document.getElementById("result-image");

      if (!resultPage || !resultImage) {
        return;
      }

      resultPage.style.display = "block";

      const score = correctAnswers * 10;

      if (score === 100) {
        resultImage.src = "387-100.png";
      } else if (score === 90) {
        resultImage.src = "387-90.png";
      } else if (score === 80) {
        resultImage.src = "387-80.png";
      } else if (score === 70) {
        resultImage.src = "387-70.png";
      } else if (score === 60) {
        resultImage.src = "387-60.png";
      } else if (score === 50) {
        resultImage.src = "387-50.png";
      } else if (score === 40) {
        resultImage.src = "387-40.png";
      } else if (score === 30) {
        resultImage.src = "387-30.png";
      } else if (score === 20) {
        resultImage.src = "387-20.png";
      } else if (score === 10) {
        resultImage.src = "387-10.png";
      } else {
        resultImage.src = "387-0.png";
      }

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function openSavePreview() {
      const resultImage = document.getElementById("result-image");
      const savePreviewImage = document.getElementById("save-preview-image");
      const saveModal = document.getElementById("save-modal");

      if (!resultImage || !savePreviewImage || !saveModal) {
        return;
      }

      savePreviewImage.src = resultImage.src;
      saveModal.classList.add("show");
    }

    function closeSavePreview() {
      const saveModal = document.getElementById("save-modal");

      if (saveModal) {
        saveModal.classList.remove("show");
      }
    }

    function restartTest() {
      currentQuestion = 1;
      correctAnswers = 0;
      checked = Array(numQuestions).fill(false);
      isSharing = false;

      const shareButton = document.getElementById("share-button");
      if (shareButton) {
        shareButton.disabled = false;
      }

      document.querySelectorAll(".answer-input").forEach((input) => {
        input.value = "";
      });

      document.querySelectorAll(".progress-fill").forEach((progress) => {
        progress.style.width = "0%";
      });

      document.querySelectorAll(".question-page").forEach((page) => {
        page.style.display = "none";
      });

      const resultPage = document.getElementById("result-page");
      const startPage = document.getElementById("start-page");

      if (resultPage) {
        resultPage.style.display = "none";
      }

      if (startPage) {
        startPage.style.display = "block";
      }

      window.scrollTo({
        top: 0,
        behavior: "smooth"
      });
    }

    function shareTest() {
      const url = "https://test-it.co.kr/test387";
      const shareData = {
        title: "테스트잇 영크크 유행 테스트",
        text: "테스트잇 영크크 유행 테스트",
        url: url
      };

      if (navigator.share) {
        navigator.share(shareData).catch(() => {});
      } else {
        navigator.clipboard.writeText(url).then(() => {
          alert("링크 복사 완료");
        });
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      renderQuestions();
    });
  </script>
