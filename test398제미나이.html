      background: #f8fafc;
      padding: 20px;
    }
    
    .match-title {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #475569;
    }

    .match-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .match-card {
      border: 1px solid var(--line-light);
      background: #ffffff;
      padding: 14px 10px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .match-label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
      font-weight: 600;
    }

    .match-nemo {
      font-size: 15px;
      font-weight: 700;
      color: var(--ink-dark);
    }

    .button-area {
      width: 100%;
      max-width: 440px;
      margin: 24px auto 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .result-btn {
      width: 100%;
      min-height: 52px;
      font-size: 15px;
      font-weight: 600;
      background: #ffffff;
      border: 1px solid var(--line);

    .result-btn.primary {
      background: var(--ink-dark);

    }
    .result-btn:hover { background: #f8fafc; }

    .ad-box {

    }

    .save-modal {
      position: fixed;

    .save-box {

    @media (max-width: 480px) {

<body>
  <div class="wrap">
    <header>
      <div class="header-inner">
        <a href="https://test-it.co.kr/" class="logo">테스트잇</a>
        <nav class="nav">
          <a href="https://test-it.co.kr/test.html">성격</a>
          <a href="https://test-it.co.kr/face.html">얼굴</a>
          <a href="https://test-it.co.kr/etc.html">그외</a>
          <a href="https://test-it.co.kr/saju.html">사주</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="screen active" id="mainScreen">
        <div class="nemo-frame">
          <div class="hero-title-box">
            <h1 class="hero-title">
              <span class="title-block title-brand">테스트잇</span><br>
              <span class="title-block title-main">네모네모 사주 성격 테스트</span>
            </h1>
          </div>
          <div class="desc-box">
            내 생년월일(양력)을 입력하면<br>
            60가지 고유 일주(日柱)를 정확하게 분석하여<br>
            나만의 성격이 12개의 직관적인 네모칸에 채워집니다.
          </div>
          <button type="button" class="action-btn" onclick="showScreen('inputScreen')">테스트 시작하기</button>
        </div>
      </section>

      <section class="screen" id="inputScreen">
        <div class="nemo-frame">
          <div class="hero-title-box" style="padding: 24px 10px;">
            <h2 class="hero-title" style="font-size:18px; font-weight: 700; margin:0;">정밀 분석 정보 입력</h2>
          </div>
          
          <div id="inputFormArea">
            <div class="input-group">
              <span class="input-label">닉네임</span>
              <input type="text" id="userName" class="text-input" placeholder="닉네임 입력 (최대 6자)" maxlength="6">
            </div>

            <div class="input-group">
              <span class="input-label">생년월일 (양력)</span>
              <div class="select-wrap">
                <select id="birthYear" class="select-box"></select>
                <select id="birthMonth" class="select-box"></select>
                <select id="birthDay" class="select-box"></select>
              </div>
            </div>

            <button type="button" class="action-btn" style="margin-top:12px;" onclick="calculateAndShowResult()">사주 분석 시작</button>
          </div>

          <div id="loadingArea" class="loading-wrap">
            <div class="spinner"></div>
            <p style="margin:0; font-size:15px; font-weight: 600; color: #475569;">개별 만세력 명조 연산 중...</p>
          </div>
        </div>
      </section>

      <section class="screen" id="resultScreen">
        <div class="capture-card" id="captureArea">
          <div class="result-header">
            <div class="result-name-tag" id="resNameTag">ㅇㅇㅇ님의 일주는</div>
            <div class="result-ilju" id="resTitle">일주 네모</div>
            <div class="result-hanja" id="resSubTitle">한자 표기</div>
          </div>

          <div class="element-desc">
            <span class="element-badge" id="resBadge">오행 기운</span><br>
            <span id="resDesc">성향 해설 요약</span>
          </div>

          <div class="trait-grid" id="resTraits"></div>

          <div class="match-wrap">
            <div class="match-title">네모 기운 조화</div>
            <div class="match-grid">
              <div class="match-card">
                <div class="match-label">잘 맞는 일주 네모</div>
                <div class="match-nemo" id="goodMatch">궁합 일주</div>
              </div>
              <div class="match-card">
                <div class="match-label">조심할 일주 네모</div>
                <div class="match-nemo" id="badMatch">상충 일주</div>
              </div>
            </div>
          </div>
        </div>

        <div class="button-area">
          <button type="button" class="result-btn primary" onclick="saveResultImage()">결과 이미지 저장하기</button>
          <button type="button" class="result-btn" onclick="restartTest()">다시 해보기</button>
          <button type="button" class="result-btn" onclick="location.href='https://test-it.co.kr/'">다른 테스트 보기</button>

      <div class="ad-box">

        <script>

            trackingCode: "AF4391881",
            width: "350",
            height: "140"

  <div class="save-modal" id="saveModal">
    <div class="save-box">
      <h3>이미지가 완성되었습니다!</h3>
      <p>아래 결과 화면을 길게 누르거나 우클릭하여<br>기기에 안전하게 저장하세요.</p>
      <div class="save-preview-wrap">
        <img class="save-preview" id="savePreview" alt="결과 이미지">
      </div>
      <div style="padding-top:4px;"><button type="button" class="close-btn" onclick="closeSaveModal()">창 닫기</button></div>
    </div>
  </div>

  <script>
    const testUrl = "https://test-it.co.kr/test398";
    
    const ganList = ["갑","을","병","정","무","기","경","신","임","계"];
    const ganHanja = ["甲","乙","丙","丁","戊","己","庚","辛","壬","癸"];
    const ziList = ["자","축","인","묘","진","사","오","미","신","유","술","해"];
    const ziHanja = ["子","丑","寅","卯","辰","巳","午","未","申","酉","戌","亥"];

    const gabjaNames = [];
    const gabjaHanja = [];
    for (let i = 0; i < 60; i++) {
      gabjaNames.push(ganList[i % 10] + ziList[i % 12]);
      gabjaHanja.push(ganHanja[i % 10] + ziHanja[i % 12]);
    }

    const elementThemes = {
      "목": { bg: "#f0fdf4", bd: "#bbf7d0", name: "푸른 나무(木)의 기운" },
      "화": { bg: "#fff5f5", bd: "#fed7d7", name: "타오르는 불(火)의 기운" },
      "토": { bg: "#fefce8", bd: "#fef08a", name: "듬직한 흙(土)의 기운" },
      "금": { bg: "#f8fafc", bd: "#e2e8f0", name: "단단한 금속(金)의 기운" },
      "수": { bg: "#eff6ff", bd: "#dbeafe", name: "맑은 물(水)의 기운" }
    };

    // 60개 일주가 모두 독립적이고 확실한 12개 성격 문장을 갖는 100% 분리형 마스터 데이터베이스
    const iljuDatabase = {
      "갑자": {
        elem: "목", good: "기축일주", bad: "경오일주",
        desc: "겉으로는 반듯하고 듬직해 보이지만, 내면에는 지혜롭고 꼼꼼하게 실속을 챙기는 치밀함이 숨어있습니다.",
        traits: ["생각이 무척 깊음", "남에게 아쉬운 소리 안 함", "조용하게 내 할 일 다 함", "자존심이 무척 강함", "나만의 확고한 기준", "속마음을 쉽게 안 들킴", "은근히 주도권을 잡음", "거짓말을 절대 못함", "한번 꽂히면 직진함", "비밀 유지를 확실히 함", "치밀하고 꼼꼼한 성격", "정이 많아 거절을 못함"]
      },
      "을축": {

        desc: "넓은 바다 같은 포용력과 훌륭한 눈치를 바탕으로 모든 사람과 상황을 유연하게 조율합니다.",
        traits: ["공감과 감정 조율의 진정한 정점임", "눈치와 주변 센스가 신의 영역에 도달", "유연하고 낙천적인 열린 마인드의 영혼", "태평양처럼 넓고 깊은 바다급 이해심 소유", "기가 막히게 잘 들어맞는 천재적인 촉 보유", "누구든 편하게 안아주는 대인배 같은 포용", "온화하고 평온하여 주변을 편안하게 만듦", "싸우지 않고 조율하여 해결하는 평화주의자", "상황 변화에 유연하게 대처하는 역량 최고", "사소한 배려를 소리 소문 없이 수시로 행함", "정보 수집력과 상황 판독이 대단히 뛰어남", "상냥하고 다정다감하여 만인의 호감을 삼"]

    function initSelectBoxes() {
      const yearSel = document.getElementById("birthYear");
      const monthSel = document.getElementById("birthMonth");
      const daySel = document.getElementById("birthDay");

      let currentYear = new Date().getFullYear();
      for (let y = currentYear; y >= 1930; y--) {
        yearSel.options.add(new Option(y + "년", y));
      }
      for (let m = 1; m <= 12; m++) {
        monthSel.options.add(new Option(m + "월", m));
      }
      for (let d = 1; d <= 31; d++) {
        daySel.options.add(new Option(d + "일", d));
      }
      yearSel.value = "2000";
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(screen => {
        screen.classList.remove("active");
      });
      document.getElementById(id).classList.add("active");
      window.scrollTo(0, 0);
    }

    // 1900년 1월 1일 (갑술일) 기준 정확한 만세력 연산 로직
    function getIljuIndex(y, m, d) {
      const baseDate = new Date(Date.UTC(1900, 0, 1));
      const targetDate = new Date(Date.UTC(y, m - 1, d));
      const diffTime = targetDate - baseDate;
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      
      let idx = (diffDays + 10) % 60;
      if (idx < 0) idx += 60;
      return idx;
    }

    function calculateAndShowResult() {
      const nameInput = document.getElementById("userName").value.trim();
      const y = parseInt(document.getElementById("birthYear").value);
      const m = parseInt(document.getElementById("birthMonth").value);
      const d = parseInt(document.getElementById("birthDay").value);

      if (!nameInput) {
        alert("닉네임을 입력해 주세요!");
        return;
      }
      
      const testDate = new Date(y, m - 1, d);
      if (testDate.getFullYear() !== y || testDate.getMonth() !== m - 1 || testDate.getDate() !== d) {
        alert("올바르지 않은 생년월일입니다. 날짜를 다시 확인해 주세요.");
        return;
      }

      document.getElementById("inputFormArea").style.display = "none";
      document.getElementById("loadingArea").style.display = "flex";

      setTimeout(() => {
        const iljuIdx = getIljuIndex(y, m, d);
        renderResult(nameInput, iljuIdx);
        
        document.getElementById("inputFormArea").style.display = "block";
        document.getElementById("loadingArea").style.display = "none";
        showScreen("resultScreen");
      }, 1200);
    }

    function renderResult(name, idx) {
      const iljuKey = gabjaNames[idx];
      const hanjaName = gabjaHanja[idx];
      
      const targetResult = iljuDatabase[iljuKey];
      const theme = elementThemes[targetResult.elem];

      document.getElementById("resNameTag").textContent = `${name}님의 일주는`;
      document.getElementById("resTitle").innerHTML = `${iljuKey}일주 네모`;
      document.getElementById("resSubTitle").textContent = `${hanjaName} | 개별 정밀 분석`;
      
      const badge = document.getElementById("resBadge");
      badge.textContent = theme.name;
      badge.style.background = theme.bg;
      badge.style.borderColor = theme.bd;
      
      document.getElementById("resDesc").textContent = targetResult.desc;

      // 60개 일주가 완벽하게 다르게 보유한 12개 고유 성격 문장을 12칸 정형 레이아웃에 배치
      const traitsWrap = document.getElementById("resTraits");
      traitsWrap.innerHTML = targetResult.traits.map(t => {
        const formattedText = t.replace("\n", "<br>");
        return `<div class="trait-box" style="border-color: ${theme.bd}; background-color: ${theme.bg}60;">${formattedText}</div>`;
      }).join("");

      document.getElementById("goodMatch").textContent = targetResult.good;
      document.getElementById("badMatch").textContent = targetResult.bad;
    }

    function restartTest() {
      document.getElementById("userName").value = "";
      showScreen("mainScreen");
    }

    function shareTest() {
      const shareData = {
        title: "테스트잇 네모네모 사주 성격 테스트",
        text: "내 생년월일로 구성하는 60개 개별 일주 사주 성격 특징 분석!",
        url: testUrl
      };

      if (navigator.share) {
        navigator.share(shareData).catch(() => {});
      } else if (navigator.clipboard) {
        navigator.clipboard.writeText(testUrl).then(() => {
          alert("테스트 공유 링크가 안전하게 복사되었습니다.");
        }).catch(() => {
          alert("공유를 지원하지 않는 브라우저입니다.");
        });
      } else {
        alert("공유를 지원하지 않는 브라우저입니다.");
      }
    }

    async function saveResultImage() {
      const captureArea = document.getElementById("captureArea");

      if (!window.html2canvas) {
        alert("캡처 기능을 준비 중입니다. 잠시 후 다시 시도해 주세요.");
        return;
      }

      try {
        captureArea.classList.add("capture-ready");
        await new Promise(resolve => setTimeout(resolve, 100));

        const canvas = await html2canvas(captureArea, {
          backgroundColor: "#ffffff",
          scale: 2,
          useCORS: true,
          logging: false
        });

        const dataUrl = canvas.toDataURL("image/png");
        document.getElementById("savePreview").src = dataUrl;
        document.getElementById("saveModal").classList.add("active");
      } catch (e) {
        alert("이미지 변환 저장 중 오류가 발생했습니다.");
      } finally {
        captureArea.classList.remove("capture-ready");
      }
    }

    function closeSaveModal() {
      document.getElementById("saveModal").classList.remove("active");
    }

    window.addEventListener("load", () => {
      initSelectBoxes();
    });
  </script>
