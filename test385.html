<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>테스트잇 레드레드 성격 테스트</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

*{box-sizing:border-box}
html,body{margin:0;padding:0;font-family:'Pretendard',sans-serif;background:#f3f4f6;color:#111}
a{text-decoration:none;color:inherit}
button{font-family:inherit;border:0;cursor:pointer}

.page-header{background:#fff;border-bottom:1px solid #e5e5e5}
.wrapper{max-width:520px;margin:0 auto;padding:0 16px}
.header-inner{height:56px;display:flex;align-items:center;justify-content:space-between}
.logo img{height:28px;display:block}
.main-nav{display:flex;gap:13px;font-size:13px;font-weight:800;color:#222}

#app-container{width:100%;max-width:430px;margin:0 auto;padding:18px 12px 36px}
.screen{display:none}
.screen.active{display:block}

.app-card{
  background:#fff;
  border:2px solid #111;
  box-shadow:8px 8px 0 #111;
  padding:18px;
}

#capture-area{
  background:#fff;
}

.signal-bar{
  width:188px;
  height:58px;
  margin:0 auto 18px;
  background:#191919;
  border:2px solid #111;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;
}

.light{
  width:34px;
  height:34px;
  border-radius:50%;
  border:2px solid #000;
  background:#555;
  box-shadow:inset 0 3px 8px rgba(0,0,0,.55);
}

.red-on{background:#ff2b2b;box-shadow:0 0 14px rgba(255,43,43,.9),inset 0 3px 8px rgba(0,0,0,.45)}
.yellow-on{background:#ffd12f;box-shadow:0 0 14px rgba(255,209,47,.9),inset 0 3px 8px rgba(0,0,0,.45)}
.green-on{background:#18c95a;box-shadow:0 0 14px rgba(24,201,90,.9),inset 0 3px 8px rgba(0,0,0,.45)}

.title{
  text-align:center;
  font-size:36px;
  line-height:1.08;
  letter-spacing:-1.8px;
  font-weight:950;
  margin:0 0 14px;
}

.title .red-word{color:#ff2b2b}
.title .green-word{color:#13ad4d}

.desc{
  text-align:center;
  font-size:16px;
  line-height:1.5;
  font-weight:800;
  color:#333;
  margin:0 0 22px;
}

.green-text{color:#13ad4d;font-weight:950}
.red-text{color:#ff2b2b;font-weight:950}

.start-info{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-bottom:16px;
}

.info-card{
  border:2px solid #111;
  padding:13px 11px;
  min-height:94px;
  color:#fff;
}

.info-card.green{background:#13b552}
.info-card.red{background:#ff2b2b}
.info-card b{display:block;font-size:22px;font-weight:950;margin-bottom:8px}
.info-card span{font-size:13px;line-height:1.35;font-weight:850;word-break:keep-all}

.btn{
  width:100%;
  min-height:52px;
  padding:14px 16px;
  border:2px solid #111;
  background:#fff;
  color:#111;
  font-size:16px;
  font-weight:950;
  box-shadow:4px 4px 0 #111;
  margin-bottom:10px;
}

.btn.start{background:#ffd12f}
.btn.green{background:#13b552;color:#fff}
.btn.red{background:#ff2b2b;color:#fff}

.progress-wrap{
  margin-bottom:16px;
  border:2px solid #111;
  background:#fff;
  padding:12px;
}

.progress-top{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  font-weight:950;
  margin-bottom:8px;
}

.progress{
  height:14px;
  background:#e9e9e9;
  overflow:hidden;
}

.progress-fill{
  height:100%;
  width:0;
  background:linear-gradient(90deg,#18c95a 0%,#ffd12f 50%,#ff2b2b 100%);
  transition:.2s;
}

.q-card{
  background:#fff;
  border:2px solid #111;
  box-shadow:6px 6px 0 #111;
  padding:18px;
}

.q-num{
  display:inline-flex;
  align-items:center;
  height:32px;
  padding:0 12px;
  background:#111;
  color:#fff;
  font-size:14px;
  font-weight:950;
  margin-bottom:14px;
}

.q-text{
  font-size:23px;
  line-height:1.35;
  letter-spacing:-.8px;
  font-weight:950;
  margin:0 0 20px;
  word-break:keep-all;
}

.answer-btn{
  text-align:left;
  font-size:16px;
  line-height:1.45;
  font-weight:850;
  background:#fff;
}

.answer-btn.green-answer{
  background:#e2ffe9;
  border-color:#13b552;
}

.answer-btn.red-answer{
  background:#ffe2e2;
  border-color:#ff2b2b;
}

.result-top{text-align:center;margin-bottom:16px}
.result-label{font-size:12px;font-weight:850;color:#555;margin-bottom:6px}
.result-name{font-size:30px;line-height:1.12;font-weight:950;letter-spacing:-1.2px;margin-bottom:7px;color:#111}
.result-sub{font-size:14px;line-height:1.4;font-weight:800;color:#444;word-break:keep-all}

.result-wrapper{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
}

.result-section{
  border:2px solid #111;
  background:#fff;
}

.sec-header{
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  font-weight:950;
  color:#fff;
}

.green-sec .sec-header{background:#13b552}
.red-sec .sec-header{background:#ff2b2b}

.sec-desc{
  padding:9px 11px 0;
  font-size:12px;
  line-height:1.35;
  font-weight:850;
  word-break:keep-all;
}

.green-sec .sec-desc{color:#0b7f35}
.red-sec .sec-desc{color:#c51d1d}

.traits-list{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px 10px;
  padding:11px;
}

.trait-item{
  display:flex;
  align-items:flex-start;
  font-size:13px;
  line-height:1.28;
  font-weight:850;
  letter-spacing:-.6px;
  word-break:keep-all;
}

.trait-item:before{
  content:"";
  width:7px;
  height:7px;
  margin:5px 6px 0 0;
  flex:0 0 auto;
}

.green-sec .trait-item:before{background:#13b552}
.red-sec .trait-item:before{background:#ff2b2b}

.control-btns{
  display:none;
  flex-direction:column;
  gap:10px;
  margin-top:20px;
}

.control-btns .btn{margin-bottom:0}

#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.86);
  z-index:1000;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  padding:18px;
}

.modal-txt{
  color:#fff;
  font-size:15px;
  line-height:1.45;
  font-weight:900;
  text-align:center;
  margin-bottom:14px;
}

#modal-img{
  width:86%;
  max-width:320px;
  border:2px solid #fff;
}

.close-btn{
  margin-top:16px;
  background:#ffd12f;
  color:#111;
  border:2px solid #111;
  padding:13px 34px;
  font-weight:950;
}

@media(max-width:390px){
  #app-container{padding:14px 10px 32px}
  .app-card{padding:15px}
  .title{font-size:31px}
  .q-text{font-size:21px}
  .result-name{font-size:26px}
  .result-sub{font-size:13px}
  .traits-list{gap:7px 7px;padding:9px 8px 10px}
  .trait-item{font-size:11.7px;letter-spacing:-.85px}
  .sec-header{height:37px;font-size:16px}
  .sec-desc{font-size:11px;padding:8px 8px 0}
  .main-nav{gap:9px;font-size:12px}
}
</style>
</head>
<body>

<header class="page-header">
  <div class="wrapper header-inner">
    <a class="logo" href="https://test-it.co.kr/">
      <img src="img_logo.png" alt="테스트잇">
    </a>
    <nav class="main-nav">
      <a href="https://test-it.co.kr/test.html">성격</a>
      <a href="https://test-it.co.kr/face.html">얼굴</a>
      <a href="https://test-it.co.kr/etc.html">그외</a>
      <a href="https://test-it.co.kr/saju.html">사주</a>
    </nav>
  </div>
</header>

<div id="app-container">
  <div class="app-card" id="capture-area">
    <div id="screen-start" class="screen active">
      <div class="signal-bar">
        <div class="light red-on"></div>
        <div class="light yellow-on"></div>
        <div class="light green-on"></div>
      </div>

      <h1 class="title">
        테스트잇<br>
        <span class="red-word">레드레드</span><br>
        <span class="green-word">성격 테스트</span>
      </h1>

      <p class="desc">
        내가 잘하는 행동은 <span class="green-text">그린그린</span><br>
        줄이면 좋은 행동은 <span class="red-text">레드레드</span>
      </p>

      <div class="start-info">
        <div class="info-card green">
          <b>GREEN</b>
          <span>네가 잘하고 계속 하면 좋은 행동</span>
        </div>
        <div class="info-card red">
          <b>RED</b>
          <span>네가 자주 하지만 하면 안 되는 행동</span>
        </div>
      </div>

      <button class="btn start" onclick="startTest()">테스트 시작하기</button>
    </div>

    <div id="screen-question" class="screen">
      <div class="progress-wrap">
        <div class="progress-top">
          <span id="q-num">Q. 1 / 12</span>
          <span>REDRED TEST</span>
        </div>
        <div class="progress">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
      </div>

      <div class="q-card">
        <div class="q-num" id="q-label">Q1</div>
        <div id="q-text" class="q-text">질문</div>
        <button class="btn answer-btn green-answer" id="btn-a" onclick="selectAns(1)">답변 A</button>
        <button class="btn answer-btn red-answer" id="btn-b" onclick="selectAns(2)">답변 B</button>
      </div>
    </div>

    <div id="screen-result" class="screen">
      <div class="signal-bar">
        <div class="light red-on"></div>
        <div class="light yellow-on"></div>
        <div class="light green-on"></div>
      </div>

      <div class="result-top">
        <div class="result-label">테스트잇 레드레드 성격 테스트</div>
        <div id="mbti-nickname" class="result-name"></div>
        <div id="result-sub" class="result-sub"></div>
      </div>

      <div class="result-wrapper">
        <div class="result-section green-sec">
          <div class="sec-header">그린그린</div>
          <div class="sec-desc">이런 행동은 계속 하면 좋고, 네가 잘하는 쪽</div>
          <div id="green-list" class="traits-list"></div>
        </div>

        <div class="result-section red-sec">
          <div class="sec-header">레드레드</div>
          <div class="sec-desc">이런 행동은 자주 해도, 하면 안 되는 쪽</div>
          <div id="red-list" class="traits-list"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="control-area" class="control-btns">
    <button class="btn green" onclick="saveImage()">결과 이미지 저장하기</button>
    <button class="btn start" onclick="restart()">다시 해보기</button>
    <button class="btn" onclick="location.href='https://test-it.co.kr/test.html'">다른 테스트 해보기</button>
    <button class="btn red" onclick="share()">테스트 공유하기</button>
  </div>
</div>

<div id="modal">
  <div class="modal-txt">이미지를 꾹 눌러서 저장해주세요</div>
  <img id="modal-img" src="" alt="결과 이미지">
  <button class="close-btn" onclick="closeModal()">닫기</button>
</div>

<script>
const qData=[
  {type:'EI',q:'친구가 주말에 번개 모임을 불렀다!',a:'오 완전 좋아! 당장 나갈게!',b:'아... 나 이미 누워있는데... 다음에 보자'},
  {type:'EI',q:'사람이 많은 엘리베이터 안, 정적이 흐를 때 나는?',a:'가끔 처음 보는 사람에게도 가벼운 스몰토크를 던진다',b:'속으로 어색해하며 누가 말해주길 바란다'},
  {type:'EI',q:'스트레스를 엄청 받았을 때 나의 해소법은?',a:'친구들 만나서 맛있는 거 먹고 신나게 수다 떨기',b:'방에 틀어박혀 혼자만의 조용한 시간 보내기'},

  {type:'SN',q:'사과를 보면 드는 생각은?',a:'빨갛다, 맛있겠다, 백설공주',b:'만약 사과가 파란색이면 우주 맛이 날까?'},
  {type:'SN',q:'노래를 들을 때 내가 더 꽂히는 부분은?',a:'멜로디 분위기와 현실적으로 공감되는 가사',b:'가사 속에 숨겨진 의미와 스토리텔링'},
  {type:'SN',q:'요리를 할 때 나의 방식은?',a:'레시피의 용량과 순서를 정확히 지킨다',b:'레시피는 참고만 하고 내 감을 믿는다'},

  {type:'TF',q:'친구가 시험 망쳐서 우울하다고 한다면?',a:'무슨 과목 망쳤어? 다음엔 어떻게 공부할 거야?',b:'진짜 속상하겠다. 맛있는 거 먹으러 갈까?'},
  {type:'TF',q:'내가 더 상처받는 말은?',a:'너 일처리 진짜 비효율적으로 한다',b:'너 진짜 배려심 없다'},
  {type:'TF',q:'고민 상담을 해줄 때 나는?',a:'객관적으로 상황을 분석하고 해결책을 찾아준다',b:'감정적인 공감이 먼저 나가고 위로해 준다'},

  {type:'JP',q:'내 방 책상의 상태는 주로 어떤가?',a:'물건들이 제자리에 각 맞춰 정리되어 있다',b:'나름의 질서가 있지만 남들이 보기엔 어질러져 있다'},
  {type:'JP',q:'여행 계획을 짤 때 나의 스타일은?',a:'시간 단위로 동선과 플랜B까지 세팅한다',b:'비행기, 숙소만 잡고 나머지는 현지에서 정한다'},
  {type:'JP',q:'외출 준비를 할 때 나는?',a:'여유롭게 준비하도록 미리 시간을 계산해 둔다',b:'나가기 직전까지 미루다가 후다닥 준비한다'}
];

const rData={
  ENFP:{name:'스파클링 에너지',sub:'좋은 에너지는 크게 살리고, 산만한 흐름은 줄이면 좋은 쪽',g:['먼저 친근하게 다가가기','신나게 분위기 띄우기','기발한 아이디어 제안','긍정적인 말 건네기','눈치껏 상황 맞추기','열정적으로 시작하기','진심으로 공감해주기','유연하게 생각하기'],r:['감정 널뛰기 티내기','중요한 일정 깜빡하기','금방 흥미 잃고 포기','남의 말에 휩쓸리기','기분파 충동구매','이리저리 산만하게 굴기','작은 말에 상처받기','선 넘어서 참견하기']},
  INFP:{name:'포근한 솜이불',sub:'다정함은 장점이고, 혼자 꾹 참는 습관은 줄이면 좋은 쪽',g:['묵묵히 이야기 들어주기','따뜻하게 위로해주기','창의적인 상상하기','세심하게 배려하기','나만의 감각 표현하기','진정성 있게 대하기','편견 없이 바라보기','약한 사람 도와주기'],r:['혼자 상처받고 숨기','과하게 남 눈치 보기','싫어도 거절 못하기','현실 도피하고 미루기','혼자 우울감에 빠지기','생각만 하고 안 움직임','연락 끊고 잠수타기','쓸데없는 망상하기']},
  ESTJ:{name:'고장난 불도저',sub:'실행력은 장점이고, 너무 밀어붙이는 건 줄이면 좋은 쪽',g:['계획대로 완벽히 끝내기','책임감 있게 총대 메기','효율적으로 일정 짜기','시간 약속 칼같이 지키기','팩트 기반으로 말하기','추진력 있게 밀어붙이기','객관적으로 판단하기','정해진 규칙 지키기'],r:['내 방식만 정답이라 우기기','융통성 1도 없이 굴기','상대방 감정 무시하기','꼬치꼬치 잔소리하기','결과만 보고 평가하기','새로운 변화 거부하기','너무 엄격하게 잣대 대기','팩트로 뼈 때리기']},

let step=0;
let score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};

function startTest(){
  document.getElementById('control-area').style.display='none';
  document.getElementById('screen-start').classList.remove('active');
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-question').classList.add('active');
  renderQ();
}

function renderQ(){
  const q=qData[step];
  document.getElementById('q-num').innerText=`Q. ${step+1} / 12`;
  document.getElementById('q-label').innerText=`Q${step+1}`;
  document.getElementById('q-text').innerText=q.q;
  document.getElementById('btn-a').innerText=q.a;
  document.getElementById('btn-b').innerText=q.b;
  document.getElementById('progress-fill').style.width=`${(step/qData.length)*100}%`;
}

function selectAns(choice){
  const type=qData[step].type;
  if(choice===1) score[type[0]]++;
  else score[type[1]]++;

  step++;
  if(step<qData.length){
    renderQ();
  }else{
    document.getElementById('progress-fill').style.width='100%';
    showResult();
  }
}

function showResult(){
  let mbti='';
  mbti+=score.E>=score.I?'E':'I';
  mbti+=score.S>=score.N?'S':'N';
  mbti+=score.T>=score.F?'T':'F';
  mbti+=score.J>=score.P?'J':'P';

  const data=rData[mbti];

  document.getElementById('mbti-nickname').innerText=data.name;
  document.getElementById('result-sub').innerText=data.sub;
  document.getElementById('green-list').innerHTML=data.g.map(t=>`<div class="trait-item">${t}</div>`).join('');
  document.getElementById('red-list').innerHTML=data.r.map(t=>`<div class="trait-item">${t}</div>`).join('');

  document.getElementById('screen-question').classList.remove('active');
  document.getElementById('screen-result').classList.add('active');
  document.getElementById('control-area').style.display='flex';
  window.scrollTo(0,0);
}

function restart(){
  step=0;
  score={E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  document.getElementById('control-area').style.display='none';
  document.getElementById('screen-result').classList.remove('active');
  document.getElementById('screen-question').classList.remove('active');
  document.getElementById('screen-start').classList.add('active');
  window.scrollTo(0,0);
}

function saveImage(){
  const target=document.getElementById('capture-area');
  html2canvas(target,{scale:2,backgroundColor:'#fff',useCORS:true}).then(canvas=>{
    document.getElementById('modal-img').src=canvas.toDataURL('image/png');
    document.getElementById('modal').style.display='flex';
  });
}

function closeModal(){
  document.getElementById('modal').style.display='none';
}

function share(){
  if(navigator.share){
    navigator.share({
      title:'레드레드 성격 테스트',
      text:'나의 긍정 신호와 주의 신호 알아보기',
      url:window.location.href
    }).catch(console.error);
  }else{
    navigator.clipboard.writeText(window.location.href).then(()=>{
      alert('테스트 링크가 복사됐어요');
    });
  }
}
