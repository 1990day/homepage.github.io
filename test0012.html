<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>픽셀몬 성격 테스트</title>
    <link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@1.530/neodgm/style.css" rel="stylesheet">
    <style>
        /* 헤더용 변수 및 레트로 컬러 설정 - 핑크톤 */
        :root {
            --bg-pink: #FFEBEE; /* 아주 밝은 핑크 */
            --line-color: #000000;
            --win-bg: #FCE4EC; /* 밝은 핑크색 회색 */
            --win-border-light: #ffffff;
            --win-border-dark: #D81B60; /* 진한 핑크 */
        }

        body {
            font-family: 'NeoDunggeunmo', sans-serif;
            background-color: var(--bg-pink);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 헤더 CSS */
        .header-wrapper {
            width: 100%;
            background-color: var(--bg-pink);
            border-bottom: 2px solid var(--line-color);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1100px;
            margin: 0 auto;
            padding: 6px 4% !important; 
        }

        .retro-logo {
            text-decoration: none;
            color: #000;
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 5px;
            background-color: var(--win-bg); 
            padding: 5px 10px; 
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            border-right: 2px solid var(--win-border-dark);
            border-bottom: 2px solid var(--win-border-dark);
        }

        .retro-logo:active { 
            border-top: 2px solid var(--win-border-dark);
            border-left: 2px solid var(--win-border-dark);
            border-right: 2px solid var(--win-border-light);
            border-bottom: 2px solid var(--win-border-light);
            padding: 6px 9px 4px 11px; 
        }

        .page-header h1 {
            margin: 0 !important;
            padding: 0 !important;
            border-bottom: none !important;
        }

        .main-nav {
            display: flex;
            flex-wrap: nowrap !important;
            align-items: center;
            list-style: none;
            margin: 0;
            padding: 0;
            gap: 12px; 
        }

        .main-nav li {
            margin-left: 0;
        }

        .main-nav a {
            display: block;
            text-decoration: none;
            color: #000;
            font-weight: 700;
            background: var(--win-bg);
            border-top: 2px solid var(--win-border-light);
            border-left: 2px solid var(--win-border-light);
            border-right: 2px solid var(--win-border-dark);
            border-bottom: 2px solid var(--win-border-dark);
            padding: 4px 10px;
            font-size: 14px; 
            white-space: nowrap;
            box-sizing: border-box;
        }

        .main-nav a:active {
            border-top: 2px solid var(--win-border-dark);
            border-left: 2px solid var(--win-border-dark);
            border-right: 2px solid var(--win-border-light);
            border-bottom: 2px solid var(--win-border-light);
            padding: 5px 9px 3px 11px; 
        }

        @media (max-width: 480px) {
            .page-header {
                padding: 6px 12px !important;
            }
            .retro-logo {
                font-size: 16px; 
                padding: 3px 8px; 
            }
            .main-nav {
                gap: 6px; 
            }
            .main-nav a {
                padding: 4px 6px; 
                font-size: 13px; 
                letter-spacing: -0.5px; 
            }
        }

        /* 본문 컨텐츠 영역 */
        .content-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .folder-container {
            width: 100%;
            max-width: 450px; /* 이미지가 더 크게 보이도록 최대 너비 살짝 증가 */
            position: relative;
        }

        .folder-tab {
            width: 120px;
            height: 30px;
            background-color: var(--win-bg);
            border: 2px solid #000; /* 선 두께 2px로 얇게 변경 */
            border-bottom: none;
            border-radius: 0; 
            margin-left: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.1); /* 그림자도 얇게 맞춤 */
        }

        .folder-body {
            background-color: var(--win-bg);
            border: 2px solid #000; /* 선 두께 2px로 얇게 변경 */
            border-radius: 0; 
            padding: 8px; /* 패딩을 줄여서 내부 이미지가 꽉 차게 보이도록 수정 */
            box-shadow: 6px 6px 0px rgba(0,0,0,0.2); /* 그림자 두께 조절 */
            min-height: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .screen {
            display: none;
            width: 100%;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .screen.active {
            display: flex;
        }

        /* 이미지가 화면에 꽉 차도록 수정 */
        .full-image {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 10px;
            border: 2px solid #000; /* 선 두께 2px로 얇게 변경 */
            box-sizing: border-box;
        }

        /* 결과 이미지는 테두리를 없애거나 더 꽉 차게 만들고 싶다면 추가 클래스 사용 */
        #result-image {
            border: none; /* 결과 이미지가 깔끔하게 꽉 차 보이도록 테두리 제거 */
            margin-bottom: 15px;
        }

        /* 광고 이미지 전용 스타일 */
        .ad-image {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 15px;
        }

        button {
            font-family: 'NeoDunggeunmo', sans-serif;
            background-color: #fff;
            border: 2px solid #000; /* 선 두께 2px로 얇게 변경 */
            padding: 15px;
            width: 100%;
            margin: 8px 0;
            font-size: 16px;
            cursor: pointer;
            box-shadow: inset -2px -2px 0px rgba(0,0,0,0.2);
            transition: all 0.1s;
            white-space: normal;
            word-break: keep-all;
            line-height: 1.4;
        }

        button:active {
            box-shadow: inset 2px 2px 0px rgba(0,0,0,0.2);
            transform: translate(2px, 2px);
        }

        .progress-container {
            width: 100%;
            border: 2px solid #000; /* 선 두께 2px로 얇게 변경 */
            height: 20px;
            margin-bottom: 20px;
            background-color: #fff;
            box-sizing: border-box;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--win-border-dark); 
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-text {
            font-size: 18px;
            margin-bottom: 30px;
            min-height: 50px;
            word-break: keep-all;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="header-wrapper">
        <header class="page-header wrapper">
            <h1><a href="https://test-it.co.kr/" class="retro-logo">테스트잇</a></h1> 
            <nav>
                <ul class="main-nav">
                    <li><a href="https://test-it.co.kr/test.html">성격</a></li>
                    <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
                    <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
                    <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
                </ul>
            </nav>
        </header>
    </div>

    <div class="content-wrapper">
        <div class="folder-container">
            <div class="folder-tab">테스트잇</div>
            <div class="folder-body">
                
                <div id="main-screen" class="screen active">
                    <img src="img_main0012.png" alt="메인 이미지" class="full-image">
                    <button onclick="startTest()">테스트 시작하기</button>
                </div>

                <div id="question-screen" class="screen">
                    <div class="progress-container">
                        <div id="progress-bar" class="progress-bar"></div>
                    </div>
                    <h2 id="question-number" style="margin-bottom: 10px;">Q1.</h2>
                    <div id="question-text" class="question-text">질문 내용이 들어갑니다.</div>
                    <button id="answer1" onclick="nextQuestion(0)">답변 1</button>
                    <button id="answer2" onclick="nextQuestion(1)">답변 2</button>
                </div>

                <div id="result-screen" class="screen">
                    <img id="result-image" src="" alt="결과 이미지" class="full-image">
                    <img src="광고-문구.png" alt="광고" class="ad-image">
                    <button onclick="location.reload()">다시하기</button>
                </div>

            </div>
        </div>
    </div>

    <script>
        const questions = [
            { type: 'EI', q: '처음 보는 사람들 사이에 들어갔을 때 더 자연스러운 쪽은?', a: ['먼저 말을 붙이고 분위기를 빠르게 파악한다', '잠깐 지켜보다가 편한 타이밍에 천천히 섞인다'], isScored: true },
            { type: 'EI', q: '스트레스를 풀고 싶을 때 나는?', a: ['사람 만나고 밖에서 시간을 보내며 정리한다', '집이나 조용한 공간에서 쉬어야 회복된다'], isScored: true },
            { type: 'EI', q: '고민이 생겼을 때 해결 방법은?', a: ['주변 사람들에게 말하며 조언을 구한다', '혼자 진지하게 생각하며 마음을 정리한다'], isScored: true },
            { type: 'EI', q: '일주일 동안 집밖에 안 나간다면?', a: ['답답해서 미칠 것 같고 우울해진다', '세상에서 가장 행복한 일주일이 된다'], isScored: false }, 
            
            { type: 'SN', q: '낯선 길을 찾아가야 할 때 나는?', a: ['지도의 건물명과 거리를 꼼꼼히 확인하며 간다', '대략적인 방향만 보고 일단 감으로 직진한다'], isScored: true },
            { type: 'SN', q: '새로운 취미를 시작할 때 더 먼저 보는 것은?', a: ['준비물, 비용, 시간처럼 실제로 필요한 정보', '이 취미가 내 일상에 어떤 재미를 줄지에 대한 상상'], isScored: true },
            { type: 'SN', q: '미래를 상상할 때 주로 드는 생각은?', a: ['당장 내일이나 이번 달에 해야 할 현실적인 계획', '10년 뒤 나의 모습이나 먼 미래의 막연한 꿈'], isScored: true },
            { type: 'SN', q: '대화할 때 나의 기본적인 태도는?', a: ['상대방이 말하는 사실 관계를 파악하며 듣는다', '상대방의 말 뒤에 숨겨진 의도나 감정을 읽으려 한다'], isScored: false }, 
            
            { type: 'TF', q: '누군가에게 조언을 해줄 때 나의 스타일은?', a: ['잘못된 점을 명확히 짚어주고 현실적인 대안을 준다', '상대방이 상처받지 않게 말을 고르고 응원 위주로 한다'], isScored: true },
            { type: 'TF', q: '대화 중 의견 충돌이 생겼을 때 나의 태도는?', a: ['누가 옳은지 시시비비를 가리는 것이 가장 중요하다', '관계가 서먹해지는 게 싫어서 적당히 양보하고 맞춘다'], isScored: true },
            { type: 'TF', q: '시험에서 아쉽게 떨어졌을 때 듣고 싶은 말은?', a: ['다음번엔 이 부분을 보완하면 충분히 합격할 수 있어', '그동안 고생 많았어 너의 노력을 내가 다 알아'], isScored: true },
            { type: 'TF', q: '상대방의 말실수를 발견했을 때 나는?', a: ['바로 정정해주거나 팩트를 짚어준다', '무안해할까 봐 그냥 넘어가거나 분위기를 맞춘다'], isScored: false } 
        ];

        let currentQuestion = 0;
        let scores = { E: 0, I: 0, S: 0, N: 0, T: 0, F: 0 };

        function startTest() {
            document.getElementById('main-screen').classList.remove('active');
            document.getElementById('question-screen').classList.add('active');
            updateQuestion();
        }

        function updateQuestion() {
            const progress = ((currentQuestion + 1) / questions.length) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';

            const q = questions[currentQuestion];
            document.getElementById('question-number').innerText = `Q${currentQuestion + 1}.`;
            document.getElementById('question-text').innerText = q.q;
            document.getElementById('answer1').innerText = q.a[0];
            document.getElementById('answer2').innerText = q.a[1];
        }

        function nextQuestion(choiceIndex) {
            const currentQ = questions[currentQuestion];
            
            if (currentQ.isScored) {
                const qType = currentQ.type;
                if (qType === 'EI') choiceIndex === 0 ? scores.E++ : scores.I++;
                if (qType === 'SN') choiceIndex === 0 ? scores.S++ : scores.N++;
                if (qType === 'TF') choiceIndex === 0 ? scores.T++ : scores.F++;
            }

            currentQuestion++;

            if (currentQuestion < questions.length) {
                updateQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('question-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');

            let mbti = '';
            mbti += (scores.E > scores.I) ? 'E' : 'I';
            mbti += (scores.S > scores.N) ? 'S' : 'N';
            mbti += (scores.T > scores.F) ? 'T' : 'F';

            const imgFileName = `img_${mbti.toLowerCase()}0012.png`; 
            document.getElementById('result-image').src = imgFileName;
        }
    </script>
</body>
</html>
