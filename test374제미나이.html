<body>
  <div class="header-wrapper">
    <header class="page-header wrapper">
      <h1><a href="https://test-it.co.kr/" class="retro-logo">테스트잇</a></h1>
      <nav>
        <ul class="main-nav">
          <li><a href="https://test-it.co.kr/test.html">성격</a></li>
          <li><a href="https://test-it.co.kr/face.html">얼굴</a></li>
          <li><a href="https://test-it.co.kr/etc.html">그외</a></li>
          <li><a href="https://test-it.co.kr/saju.html">사주</a></li>
        </ul>
      </nav>
    </header>
  </div>

  <main class="container">
    <section class="window98" id="capture-area">
      <div class="window-topbar">
        <div class="window-title-wrap">
          <span class="window-icon"></span>
          <span class="window-title">테스트잇 만우절 성격 테스트</span>
        </div>
        <div class="window-controls">
          <span class="control-btn min"></span>
          <span class="control-btn max"></span>
          <span class="control-btn close"></span>
        </div>
      </div>

      <div class="browser-row">
        <span class="nav-square">◀</span>
        <span class="nav-square">⌂</span>
        <div class="address-bar">https://test-it.co.kr/test374</div>
      </div>

      <div class="window-body">
        <div id="start-screen" class="screen active">
          <div class="panel start-panel">
            <div class="start-badge">만우절 테스트</div>
            <div class="start-hero-box">성격</div>
            <h1 class="main-title">테스트잇 만우절<br>성격 테스트</h1>
            <p class="sub-text">
              평소처럼 고르면 됩니다.<br>
              마지막에 반전이 나옵니다.
            </p>
            <button class="start-btn" type="button" onclick="startTest()">테스트 시작하기</button>
          </div>
        </div>

        <div id="question-screen" class="screen">
          <div class="progress-wrap">
            <div class="progress-top">
              <div class="progress-text" id="progress-text">1 / 12</div>
              <div class="progress-text"></div>
            </div>
            <div class="progress-bar">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
          </div>

          <div class="question-box">
            <h2 class="question-title" id="question-title"></h2>
          </div>

          <div class="choices">
            <button class="choice-btn" type="button" onclick="selectAnswer(0)"></button>
            <button class="choice-btn" type="button" onclick="selectAnswer(1)"></button>
          </div>
        </div>

        <div id="result-screen" class="screen">
          <div class="result-box">
            <div class="result-alert">
              <div class="result-alert-titlebar">
                <div class="result-alert-title-left">
                  <span class="result-alert-icon"></span>
                  <span class="result-alert-title-text">테스트 결과</span>
                </div>
                <span class="result-alert-close"></span>
              </div>

              <div class="result-alert-body">
                <div class="result-badge">
                  <div class="result-type" id="fake-type">ENTJ</div>
                </div>

                <div class="result-main">
                  <h2 id="result-title"></h2>
                  <p id="result-desc"></p>
                </div>
              </div>
            </div>

            <div class="traits-box">
              <div class="traits-grid" id="traits-grid"></div>
            </div>

            <div class="reveal-line">
              사실 만우절 테스트라 반대로 나온것... 실제 결과는 <span id="real-type-inline">ISFP</span>!
            </div>
          </div>

          <div class="action-stack" id="result-actions">
            <button class="action-btn save" type="button" onclick="saveResultImage()">결과 이미지 저장하기</button>

    let currentQuestion = 0;
    const scores = {
      E: 0, I: 0, S: 0, N: 0, T: 0, F: 0, J: 0, P: 0
    };

    function startTest() {
      currentQuestion = 0;
      resetScores();
      showScreen("question-screen");
      renderQuestion();
    }

    function resetScores() {
      Object.keys(scores).forEach(function (key) {
        scores[key] = 0;
      });
    }

    function showScreen(id) {
      document.querySelectorAll(".screen").forEach(function (screen) {
        screen.classList.remove("active");
      });
      document.getElementById(id).classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function renderQuestion() {
      const q = questions[currentQuestion];
      const progress = ((currentQuestion + 1) / questions.length) * 100;

      document.getElementById("progress-text").textContent = (currentQuestion + 1) + " / " + questions.length;
      document.getElementById("progress-fill").style.width = progress + "%";
      document.querySelectorAll("#question-screen .choice-btn")[0].textContent = q.answers[0].text;
      document.querySelectorAll("#question-screen .choice-btn")[1].textContent = q.answers[1].text;
      document.getElementById("question-title").textContent = q.question;
    }

    function selectAnswer(index) {
      const q = questions[currentQuestion];
      const chosenType = q.answers[index].type;
      scores[chosenType] += 1;
      currentQuestion += 1;

      if (currentQuestion < questions.length) {
        renderQuestion();
      } else {
        showResult();
      }
    }

    function calculateRealMBTI() {
      const ei = scores.E >= scores.I ? "E" : "I";
      const sn = scores.S >= scores.N ? "S" : "N";
      const tf = scores.T >= scores.F ? "T" : "F";
      const jp = scores.J >= scores.P ? "J" : "P";
      return ei + sn + tf + jp;
    }

    function reverseMBTI(type) {
      const map = {
        E: "I", I: "E",
        S: "N", N: "S",
        T: "F", F: "T",
        J: "P", P: "J"
      };
      return type.split("").map(function (char) {
        return map[char];
      }).join("");
    }

    function showResult() {
      const realType = calculateRealMBTI();
      const fakeType = reverseMBTI(realType);
      const fakeData = resultData[fakeType];

      document.getElementById("fake-type").textContent = fakeType;
      document.getElementById("result-title").textContent = "";
      document.getElementById("result-desc").textContent = "";
      document.getElementById("real-type-inline").textContent = realType;

      const traitsGrid = document.getElementById("traits-grid");
      traitsGrid.innerHTML = "";

      fakeData.traits.forEach(function (trait) {
        const item = document.createElement("div");
        item.className = "trait-item";
        item.textContent = trait;
        traitsGrid.appendChild(item);
      });

      showScreen("result-screen");
    }

      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(shareText).then(function () {
          alert("테스트 링크가 복사됐어요");
        }).catch(function () {
          fallbackCopy(shareText, "테스트 링크가 복사됐어요");
        });
      } else {
        fallbackCopy(shareText, "테스트 링크가 복사됐어요");
      }
    }

    async function saveResultImage() {
      const captureArea = document.getElementById("capture-area");
      const actions = document.getElementById("result-actions");

      try {
        actions.style.display = "none";

        const canvas = await html2canvas(captureArea, {
          backgroundColor: "#dfd8db",
          scale: 2,
          useCORS: true
        });

        actions.style.display = "flex";

        const dataUrl = canvas.toDataURL("image/png");
        document.getElementById("image-modal-img").src = dataUrl;
        document.getElementById("image-modal").classList.add("active");
        document.body.style.overflow = "hidden";
      } catch (error) {
        actions.style.display = "flex";
        console.error(error);
        alert("이미지 저장 중 오류가 났어요. 다시 시도해 주세요.");
      }
    }

    function closeImageModal() {
      document.getElementById("image-modal").classList.remove("active");
      document.getElementById("image-modal-img").src = "";
      document.body.style.overflow = "";
    }

    function fallbackCopy(text, message) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
      alert(message);
    }

    document.getElementById("image-modal").addEventListener("click", function (e) {
      if (e.target.id === "image-modal") {
        closeImageModal();
      }
    });

    window.startTest = startTest;
    window.selectAnswer = selectAnswer;
    window.restartTest = restartTest;
    window.goOtherTest = goOtherTest;
    window.shareTest = shareTest;
    window.saveResultImage = saveResultImage;
    window.closeImageModal = closeImageModal;
  </script>
</body>
</html>
