<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>테스트잇 사계절 사주 성격 테스트</title>
<link href="https://cdn.jsdelivr.net/gh/neodgm/neodgm-webfont@latest/neodgm/style.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
    :root {
        --bg-outer: #fff7fb;
        --card-bg: #fffdf8;
        --text-color: #3f3642;
        --border-color: #3f3642;
        
        --theme-bg: #ffe8f3;
        --theme-table: #ffd5e8;
        --theme-label: #ff7eb6;
    }

    * {
        box-sizing: border-box;
        font-family: 'NeoDunggeunmo', sans-serif;
        margin: 0;
        padding: 0;
    }

    body {
        background: linear-gradient(180deg, #fff1f8 0%, #fffaf0 48%, #eefbff 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 10px;
        min-height: 100vh;
        color: var(--text-color);
    }

    .page-header {
        width: min(650px, calc(100% - 2px));
        margin: 0 auto 15px;
        height: 56px;
        padding: 0 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border: 2px solid var(--border-color);
        background: #fffef8;
        border-radius: 10px;
        box-shadow: 4px 4px 0 rgba(255, 190, 216, 0.65);
    }

    .logo-text {
        font-size: 20px;
        font-weight: 900;
        text-decoration: none;
        color: #3f3642;
    }

    .main-nav {
        display: flex;
        gap: 5px;
    }

    .main-nav a {
        padding: 6px 8px;
        border: 1.5px solid var(--border-color);
        background: #fff0f7;
        border-radius: 6px;
        text-decoration: none;
        color: #3f3642;
        font-size: 12px;
    }

    .app-wrapper {
        width: 100%;
        max-width: 650px;
        background: var(--card-bg);
        border: 2px solid var(--border-color);
        border-radius: 16px;
        box-shadow: 6px 6px 0 rgba(255, 190, 216, 0.6);
        display: flex;
        flex-direction: column;
        overflow: hidden;
    }

    .screen {
        display: none;
        flex-direction: column;
        width: 100%;
        padding: 30px 10px;
        align-items: center;
    }

    .screen.active {
        display: flex;
    }

    .screen-title { 
        font-size: 28px; 
        margin-bottom: 30px; 
        line-height: 1.4; 
        color: #ff6fae; 
        text-align: center; 
        font-weight: bold;
        text-shadow: 2px 2px 0 #fff4b8;
    }

    .input-wrapper {
        width: 100%;
        max-width: 400px;
        margin-bottom: 20px;
    }

    .input-wrapper label {
        display: block;
        margin-bottom: 8px;
        font-size: 16px;
        font-weight: bold;
    }

    .input-wrapper input[type="text"],
    .select-group select {
        width: 100%;
        padding: 12px;
        border: 2px solid #f2aac9;
        background: #fffafd;
        font-size: 16px;
        border-radius: 8px;
        outline: none;
        color: #3f3642;
    }

    .select-group {
        display: flex;
        gap: 5px;
        margin-bottom: 5px;
    }

    .action-btn {
        background-color: #ff8fc4;
        color: #fff;
        border: 2px solid #3f3642;
        padding: 16px 20px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        max-width: 400px;
        border-radius: 10px;
        box-shadow: 3px 3px 0 #ffd2e5;
    }

    .action-btn:active {
        transform: translate(2px, 2px);
        box-shadow: 1px 1px 0 #ffd2e5;
    }

    .result-theme-bg {
        background-color: var(--theme-bg);
        width: 100%;
        padding: 15px 10px;
        display: flex;
        flex-direction: column;
    }

    .result-header {
        position: relative;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        line-height: 1.35;
        padding: 13px 12px 12px;
        border: 2px solid var(--border-color);
        background: #fffdf8;
        color: #3f3642;
        border-radius: 8px;
        margin: 4px 6px 16px;
        box-shadow: 4px 4px 0 rgba(255, 126, 182, 0.35);
    }

    .result-header::before {
        content: "TESTIT";
        position: absolute;
        top: -11px;
        left: 14px;
        padding: 2px 8px;
        background: #fff4b8;
        border: 2px solid var(--border-color);
        border-radius: 999px;
        font-size: 10px;
        color: #3f3642;
    }

       .result-header::after {
        content: "♥";
        position: absolute;
        top: -9px;
        right: 14px;
        font-size: 18px;
        color: #ff6fae;
        text-shadow: 2px 2px 0 #fff4b8;
    }

    .result-landscape {
        height: 170px; 
        border: 2px solid var(--border-color);
        position: relative;
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        border-radius: 10px;
        overflow: hidden;
        background: #fff;
    }
    
    .landscape-sky {
        flex: 5;
        width: 100%;
        position: relative;
    }

    .landscape-ground {
        flex: 5;
        border-top: 2px solid var(--border-color);
        position: relative;
    }

    .season-label {
        position: absolute;
        top: 0;
        left: 0;
        background-color: var(--theme-label);
        color: white;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: bold;
        border-right: 2px solid var(--border-color);
        border-bottom: 2px solid var(--border-color);
        z-index: 10;
    }

    .prop {
        position: absolute;
        z-index: 2;
        filter: drop-shadow(2px 2px 0px rgba(255, 255, 255, 0.55));
    }

    .prop-1 { top: 10px; left: 15px; font-size: 50px; }
    .prop-2 { top: 10px; right: 20px; font-size: 40px; }
    .prop-3 { bottom: 5px; left: 10px; font-size: 35px; }
    .prop-4 { bottom: 10px; right: 15px; font-size: 40px; }

    .landscape-chars {
        position: absolute;
        bottom: 10px;
        width: 100%;
        display: flex;
        justify-content: center;
        z-index: 5;
    }

    .char-emoji {
        font-size: 60px;
        filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.18));
    }

    .char-bubble {
        background: #fffdf8;
        border: 2px solid var(--border-color);
        padding: 6px 12px;
        font-size: 14px;
        border-radius: 8px;
        position: absolute;
        bottom: 70px;
        text-align: center;
        white-space: pre-wrap;
        min-width: 120px;
        font-weight: bold;
        box-shadow: 3px 3px 0 rgba(255, 210, 229, 0.9);
    }

    .profile-info-box {
        background-color: #fffdf8;
        border: 2px solid var(--border-color);
        border-radius: 10px;
        padding: 15px;
        display: flex;
        flex-direction: column;
        box-shadow: 4px 4px 0 rgba(255, 210, 229, 0.55);
    }
    
    .info-table {
        display: flex;
        background-color: var(--theme-table);
        border: 2px solid var(--border-color);
        border-radius: 8px;
        margin-bottom: 15px;
        overflow: hidden;
    }

    .info-cell {
        flex: 1;
        padding: 12px;
        text-align: center;
        font-size: 15px;
        font-weight: bold;
    }

    .info-cell:first-child {
        border-right: 2px solid var(--border-color);
    }

    .traits-list {
        list-style: none;
        padding: 0;
        margin: 0;
        width: 100%;
    }

    .traits-list li {
        text-align: center;
        padding: 14px 5px;
        border-bottom: 1px dashed #f0aaca;
        font-size: 15px; 
        line-height: 1.4;
        word-break: keep-all;
        white-space: normal;
    }

    .traits-list li:last-child {
        border-bottom: none;
    }

    #res-name {
    background: #ffd6e8;
}

#res-season.spring-season {
    background: #c9ef8f;
}

#res-season.summer-season {
    background: #aee8ff;
}

#res-season.autumn-season {
    background: #f6b56b;
}

#res-season.winter-season {
    background: #ffffff;
}

    #out-of-frame-buttons {
        display: none; 
        width: 100%;
        max-width: 650px;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        margin-top: 15px;
    }

    .btn-save {
        background-color: #ff8fc4;
        color: white;
        border: 2px solid #3f3642;
        padding: 16px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
        width: 100%;
        border-radius: 10px;
        box-shadow: 3px 3px 0 #ffd2e5;
    }

    .btn-sub {
        background-color: #fffdf8;
        border: 2px solid #3f3642;
        padding: 14px;
        font-size: 16px;
        cursor: pointer;
        width: 100%;
        border-radius: 10px;
        font-weight: bold;
        box-shadow: 3px 3px 0 rgba(189, 244, 231, 0.75);
    }

    #save-modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0,0,0,0.85);
        z-index: 999;
        justify-content: center;
        align-items: center;
        flex-direction: column;
    }

    #save-modal.active {
        display: flex;
    }

    #saved-image {
        max-width: 95%;
        max-height: 80vh;
        border: 2px solid white;
        border-radius: 8px;
    }

    .modal-text {
        color: white;
        font-size: 18px;
        margin-bottom: 15px;
        text-align: center;
        font-weight: bold;
    }

    .close-modal-btn {
        background: #ff8fc4;
        color: white;
        border: none;
        padding: 10px 25px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }

    @media screen and (max-width: 600px) {
        .screen-title {
            font-size: 22px;
        }

        .result-header {
            font-size: 17px;
            padding: 13px 8px 11px;
            margin: 4px 2px 15px;
        }

        .result-landscape {
            height: 150px;
        }

        .char-emoji {
            font-size: 50px;
        }

        .char-bubble {
            font-size: 13px;
            bottom: 65px;
            padding: 5px 8px;
            min-width: 100px;
        }

        .info-cell {
            font-size: 13px;
            padding: 10px;
        }

        .traits-list li {
            font-size: 14px;
            padding: 12px 2px;
        } 
    }
</style>
</head>
<body>

<header class="page-header">
    <a class="logo-text" href="https://test-it.co.kr/">테스트잇</a>
    <nav class="main-nav">
        <a href="https://test-it.co.kr/test.html">성격</a>
        <a href="https://test-it.co.kr/face.html">얼굴</a>
        <a href="https://test-it.co.kr/etc.html">그외</a>
        <a href="https://test-it.co.kr/saju.html">사주</a>
    </nav>
</header>

<div class="app-wrapper" id="capture-area">
    <div id="screen-start" class="screen active">
        <div class="screen-title">테스트잇<br>사계절 사주 성격 테스트</div>
        <div style="font-size: 80px; margin-bottom: 40px; filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.1));">🌲</div>
        <button class="action-btn" onclick="nextScreen('screen-start', 'screen-input')">테스트 시작하기</button>
    </div>

    <div id="screen-input" class="screen">
        <div class="screen-title">정보 입력</div>
        
        <div class="input-wrapper">
            <label>이름 또는 닉네임</label>
            <input type="text" id="userName" placeholder="예: 짱구">
        </div>
        
        <div class="input-wrapper">
            <label>생년월일시</label>
            <div class="select-group">
                <select id="userYear"></select>
                <select id="userMonth"></select>
                <select id="userDay"></select>
            </div>
            <div class="select-group">
                <select id="userTime"></select>
            </div>
        </div>
        
        <button class="action-btn" style="margin-top: 10px;" onclick="startTest()">결과 확인하기</button>
    </div>

    <div id="screen-result" class="screen" style="padding: 10px;">
        <div class="result-theme-bg" id="result-theme">
            <div class="result-header">테스트잇 사계절 사주 성격 테스트</div>
            
            <div class="result-landscape">
                <div class="season-label" id="season-label-box">Season</div>
                <div class="landscape-sky" id="land-sky">
                    <div class="prop prop-1" id="prop-1"></div>
                    <div class="prop prop-2" id="prop-2"></div>
                </div>
                <div class="landscape-ground" id="land-ground">
                    <div class="prop prop-3" id="prop-3"></div>
                    <div class="prop prop-4" id="prop-4"></div>
                    <div class="landscape-chars">
                        <div class="char-box">
                            <div class="char-bubble" id="char-speech-1"></div>
                            <div class="char-emoji" id="char-sprite-1"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="profile-info-box">
                <div class="info-table">
                    <div class="info-cell" id="res-name"></div>
                    <div class="info-cell" id="res-season"></div>
                </div>
                <ul class="traits-list" id="traits-list"></ul>
            </div>
        </div>
    </div>
</div>

<div id="out-of-frame-buttons">
    <button class="btn-save" onclick="saveResultImage()">결과 이미지 저장하기</button>
    <button class="btn-sub" onclick="location.reload()">다시 해보기</button>
    <button class="btn-sub" onclick="alert('다른 테스트 페이지로 이동 준비중입니다.')">다른 테스트 해보기</button>
    <button class="btn-sub" onclick="shareTest()">테스트 공유하기</button>
</div>

<div id="save-modal">
    <div class="modal-text">아래 이미지를 꾹 눌러서<br>내 폰에 저장해 보세요!</div>
    <img id="saved-image" src="" alt="결과 이미지">
    <button class="close-modal-btn" onclick="closeModal()">닫기</button>
</div>

<script>
    const timesList = [
        "모름", "자시(23:30~01:29)", "축시(01:30~03:29)", "인시(03:30~05:29)", 
        "묘시(05:30~07:29)", "진시(07:30~09:29)", "사시(09:30~11:29)", 
        "오시(11:30~13:29)", "미시(13:30~15:29)", "신시(15:30~17:29)", 
        "유시(17:30~19:29)", "술시(19:30~21:29)", "해시(21:30~23:29)"
    ];

    window.onload = function() {
        const yearSelect = document.getElementById('userYear');
        const monthSelect = document.getElementById('userMonth');
        const daySelect = document.getElementById('userDay');
        const timeSelect = document.getElementById('userTime');
        
        yearSelect.options.add(new Option("년도", ""));
        for(let i = 2026; i >= 1950; i--) yearSelect.options.add(new Option(i + "년", i));
        for(let i = 1; i <= 12; i++) monthSelect.options.add(new Option(i + "월", i));
        for(let i = 1; i <= 31; i++) daySelect.options.add(new Option(i + "일", i));
        timesList.forEach((t, i) => timeSelect.options.add(new Option(t, i)));
    };

    function nextScreen(hideId, showId) {
        document.getElementById(hideId).classList.remove('active');
        document.getElementById(showId).classList.add('active');
        window.scrollTo(0, 0); 
    }

    const gapjaList = ["갑자", "을축", "병인", "정묘", "무진", "기사", "경오", "신미", "임신", "계유", "갑술", "을해", "병자", "정축", "무인", "기묘", "경진", "신사", "임오", "계미", "갑신", "을유", "병술", "정해", "무자", "기축", "경인", "신묘", "임진", "계사", "갑오", "을미", "병신", "정유", "무술", "기해", "경자", "신축", "임인", "계묘", "갑진", "을사", "병오", "정미", "무신", "기유", "경술", "신해", "임자", "계축", "갑인", "을묘", "병진", "정사", "무오", "기미", "경신", "신유", "임술", "계해"];

    const seasonThemes = {
        'spring': { bg: '#e8f5e9', table: '#c8e6c9', label: '#689f38', skyGradient: 'linear-gradient(to bottom, #74ebd5, #acb6e5)', groundColor: '#9ccc65', props: ['☀️', '🦋', '🌱', '🌼'], sprite: '🌷', labelText: 'Spring' },
        'summer': { bg: '#e3f2fd', table: '#bbdefb', label: '#0288d1', skyGradient: 'linear-gradient(to bottom, #2193b0, #6dd5fa)', groundColor: '#ffeb3b', props: ['🌞', '🌴', '🍉', '🏖️'], sprite: '😎', labelText: 'Summer' },
        'autumn': { bg: '#fff3e0', table: '#ffe0b2', label: '#e65c00', skyGradient: 'linear-gradient(to bottom, #f7b733, #fc4a1a)', groundColor: '#a1887f', props: ['🌤️', '🍁', '🌾', '🐿️'], sprite: '🦊', labelText: 'Autumn' },
        'winter': { bg: '#f3e5f5', table: '#e1bee7', label: '#2c3e50', skyGradient: 'linear-gradient(to bottom, #2c3e50, #000000)', groundColor: '#ffffff', props: ['🌙', '❄️', '⛄', '🌨️'], sprite: '🐧', labelText: 'Winter' }
    };

    const iljuTraits = {
    "갑자": ["도덕성과 신념이 강한 이상주의자", "지적 호기심이 많은 학구파", "자존심이 강해 쉽게 굽히지 않음", "어려운 상황에서도 품위를 지킴", "자신만의 세계가 뚜렷한 편", "인정받고 싶은 욕구가 강함", "감수성이 풍부하고 섬세함", "참모 역할에서 강점을 보임"],

"을축": ["묵묵히 노력하는 성실한 타입", "인내심과 끈기가 강한 편", "안정적인 삶을 중요하게 여김", "은근한 고집과 뚝심이 있음", "현실 감각과 재물 감각이 좋음", "늦어도 결국 성과를 만들어냄", "내 사람에게 애정이 깊은 편", "모험보다 안정을 선호함"],

"병인": ["밝고 긍정적인 에너지가 강함", "창의적인 아이디어가 풍부함", "남을 돕는 걸 좋아하는 성품", "자신감 있고 적극적인 편", "직관력과 눈치가 빠름", "감정 표현이 솔직한 편", "시작은 강하지만 마무리는 약함", "어딜 가도 존재감이 드러남"],

    function startTest() {
        const userName = document.getElementById('userName').value.trim();
        const y = parseInt(document.getElementById('userYear').value);
        const m = parseInt(document.getElementById('userMonth').value);
        const d = parseInt(document.getElementById('userDay').value);
        const timeIndexStr = document.getElementById('userTime').value;

        if (!userName || !y || !m || !d || timeIndexStr === "") {
            alert("입력 정보를 다 채워주세요!");
            return;
        }

        let targetDate = new Date(Date.UTC(y, m - 1, d));
        if (parseInt(timeIndexStr) === 1) targetDate.setDate(targetDate.getDate() + 1);

        const baseDate = new Date(Date.UTC(2000, 0, 1)); 
        const diffDays = Math.floor((targetDate - baseDate) / (1000 * 60 * 60 * 24));
        let iljuIndex = (54 + diffDays) % 60;
        if (iljuIndex < 0) iljuIndex += 60;
        const myIlju = gapjaList[iljuIndex];
        
        let seasonKey = "winter"; let seasonName = "겨울";
        if ([2, 3, 4].includes(m)) { seasonKey = "spring"; seasonName = "봄"; }
        else if ([5, 6, 7].includes(m)) { seasonKey = "summer"; seasonName = "여름"; }
        else if ([8, 9, 10].includes(m)) { seasonKey = "autumn"; seasonName = "가을"; }

        showResult(userName, seasonKey, seasonName, myIlju);
    }

    function showResult(userName, seasonKey, seasonName, ilju) {
        const theme = seasonThemes[seasonKey];
        const traits = iljuTraits[ilju] || ["매력 넘치는 성격임"];
        const bubbleSpeech = iljuSpeech[ilju] || "나의 성격 분석";

        const resultThemeElement = document.getElementById('result-theme');
        resultThemeElement.style.setProperty('--theme-bg', theme.bg);
        resultThemeElement.style.setProperty('--theme-table', theme.table);
        resultThemeElement.style.setProperty('--theme-label', theme.label);

        document.getElementById('land-sky').style.background = theme.skyGradient;
        document.getElementById('land-ground').style.backgroundColor = theme.groundColor;

        document.getElementById('res-name').innerText = userName;
        document.getElementById('res-season').innerText = seasonName + " 사람";
        document.getElementById('season-label-box').innerText = theme.labelText;
        
        document.getElementById('prop-1').innerText = theme.props[0];
        document.getElementById('prop-2').innerText = theme.props[1];
        document.getElementById('prop-3').innerText = theme.props[2];
        document.getElementById('prop-4').innerText = theme.props[3];

        document.getElementById('char-sprite-1').innerText = theme.sprite;
        document.getElementById('char-speech-1').innerText = bubbleSpeech;

        const traitUl = document.getElementById('traits-list');
        traitUl.innerHTML = "";
        traits.forEach(trait => {
            const li = document.createElement('li');
            li.innerText = trait;
            traitUl.appendChild(li);
        });

        nextScreen('screen-input', 'screen-result');
        document.getElementById('out-of-frame-buttons').style.display = 'flex';
    }

    function saveResultImage() {
        const captureArea = document.getElementById('capture-area');
        const saveBtn = document.querySelector('.btn-save');
        saveBtn.innerText = "이미지 생성 중...";
        html2canvas(captureArea, { scale: 2 }).then(canvas => {
            document.getElementById('saved-image').src = canvas.toDataURL('image/png');
            document.getElementById('save-modal').classList.add('active');
            saveBtn.innerText = "결과 이미지 저장하기";
        });
    }

    function closeModal() { document.getElementById('save-modal').classList.remove('active'); }
    function shareTest() {
        if (navigator.share) {
            navigator.share({ title: '테스트잇 사계절 사주 성격 테스트', url: window.location.href }).catch(console.error);
