<script>
    const storedData = localStorage.getItem("userData");
    const userData = storedData ? JSON.parse(storedData) : null;

    function sendToGoogleSheet(user1, user2, email, paymentItem) {
      // 네가 준 새로운 구글 앱스 스크립트 주소 적용
      fetch("https://script.google.com/macros/s/AKfycbxjRaWyXIVH7ImqyFLU0em3BX1mptho0dvRiS91rwSvbKEBY4fO4I5iXdStJmGvg6hfdw/exec", {
          method: "POST",
          mode: "no-cors",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
              user1Name: user1.name,
              user1Gender: user1.gender,
              user1BirthDate: user1.birthDate,
              user1BirthType: user1.birthType,
              user1BirthTime: user1.birthTime,
              user2Name: user2.name,
              user2Gender: user2.gender,
              user2BirthDate: user2.birthDate,
              user2BirthType: user2.birthType,
              user2BirthTime: user2.birthTime,
              userEmail: email,
              paymentItem: paymentItem,
              paymentTime: new Date().toLocaleString()
          })
      });
    }

async function confirmPayment() {
    const urlParams = new URLSearchParams(window.location.search);
    const paymentKey = urlParams.get("paymentKey");
    const orderId = urlParams.get("orderId");
    const amount = urlParams.get("amount");

    if (!paymentKey || !orderId || !amount) {
        alert("결제 정보가 누락되었습니다. 다시 시도해 주세요.");
        return;
    }

    try {
        const response = await fetch("https://api.tosspayments.com/v1/payments/confirm", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Basic " + btoa("live_gsk_DnyRpQWGrNL20vzK4mRb3Kwv1M9E:")  
            },
            body: JSON.stringify({
                paymentKey: paymentKey,
                orderId: orderId,
                amount: parseInt(amount)
            })
        });

        if (response.ok) {
            alert("결제가 성공적으로 완료되었습니다!");
            if (userData) {
                sendToGoogleSheet(userData.user1, userData.user2, userData.email, userData.paymentItem);
                localStorage.removeItem("userData");
            }
        } else {
            window.location.href = "https://test-it.co.kr/payment-fail3";
        }
    } catch (error) {
        window.location.href = "https://test-it.co.kr/payment-fail3";
    }
}

window.onload = function() {
    confirmPayment();
};
</script>
